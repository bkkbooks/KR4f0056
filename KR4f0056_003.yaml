front:
  text: 更生齋詩卷第三
  hash: sha256:29800829df5c6a49afd23cdf568fee4f9a4f55d52a1f41b1b96f712b4599f28c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_003-1a}
body:
  text: 陽湖洪亮吉著山椒避暑集辛酉正月二日步至前橋村上冢兼至大姊宅久憇我行八九里筋力喜尚強前扺松栢林連㕓眺層岡步緊不敢舒先世之所藏何意俯仰間愛弟亦在旁攀條泫然悲我鬢久已蒼地下骨肉多㑹面庶久長半里謁姊居迎門慶扶將亦有容桼居闔戶羅酒漿三田昨大收已彀一歲糧我謂隙地多代補幾樹桑却待菜作花還來啜新黃天寧寺僧借月兩以詩見投戲得八百二十字報之我性不佞佛而喜方外交苦憶揚州僧八旬名誦苕西山有顚禪神理亦復超不語已九年見客兩手招今爲謫吏歸偶詣知客寮聞有借月僧形癯事推𫾣爲爾攜蠟屐爲爾經谿橋爾從百僧中揖我坐砌坳我于儔類間望爾成詩豪峩峩㢲宮樓肖爾詩筆高迢迢西蠡河似爾詩致遙不然艤舟亭綠水可半篙與子攜竹鑪悠悠泛輕橈不然紅梅閣絳蕋已半飄與子學坐忘沉沉爇香茅否則樓三層夜半禮絳霄否則塔七級凌晨歴高標猶勝居一菴時時坐團蕉蒲牢吼五更木魚響終朝禮佛佛不知泥塑而木雕㖽佛佛不譍唇乾而口焦竆老盡氣時生趣總不聊不聞金剛禪能拒鬼伯邀不聞大乗經能使罪孽消他人飫八珍爾獨食一瓢他人襲重茵爾僅絮一條趨承衆檀那世故仍膠膠經營伊蒲餐歲儉猶嗷嗷不知天生人洪鑪鼓鴻毛天無所容心人何必太勞我得定命丹非世所及料生老與病死安坐任所遭不知人在世蟣蝨處緼袍附身身不知偶或相􅐡搔我得養生法身外一切抛雞豬與蔥蒜遇便卽飽饕結習苟未忘間或追風騷我唱子必和我歌子其謠三百六十日往往忘昬朝一十二萬年茫茫齊壽夭縱有甲子期何必詢大撓似聞三神山亦已沉六鼇羣靈無所歸空中任翔翺誰向足厎過不士嗤盧敖生生遞銷除物物難堅牢惟有行樂方可解末俗嘲麯生時時來向我屢折腰醉鄕何其寬一世皆并包炎精貢火梨金母致木桃灤河鹿重胎淮浦蟹兩螯流沙割幺鳳雚水烹文鰩芸芳出陽華桂樹生招搖閩中紅荔支涼土黃葡萄南州設寒具北地致冷淘妖姬蕚綠華童眞王子喬爲我彈素琴爲我吹玉簫湘靈鼓瑤瑟洛浦鏗雲璈或欲赤雙足或復垂雙髫翩翩有光施裊裊難摩描醉飽爲語言古欲過卦爻縑鋪三百軸軸軸鮫人綃文簫與采鸞爲我玉手鈔醉呼日月星啜我醨與糟狂叱江海流變作醇與醪子其從我遊飄颻復飄颻庶幾末路惺不爲異說淆彼敎倘有人卽以子作柖仍煩走諸方一一呼其曹或歸士與農或混漁與樵同祈享靑牛老子廟白馬社公祠古屋門齊敞疎燈架已支凍梅纔放後春月正圓時却向雲谿步無嫌夜漏遲辛酉元夕燈詞十首百串歌珠百串燈綠楊枝外九龍升商量踏徧城東路先把浮屠七級登更闌女伴各招邊八字尖西巷數條走得三橋更思五迎春橋轉玉梅橋撥灰誰復認前塵被酒黃壚屢欠伸只有溪童偏識姓廿三年上喚舟人今宵無月有疎星僻巷行來草乍靑挈得蔣三茶話去洗心池上小方亭燭龍七節影俱無空有邗溪似畫圖却約十番諸子弟孫家㕔北戲於菟夜久頻將玉笛催白雲尖上冷徘徊谿流到此先嗚咽不見紅窗四扇開轉憶輪臺樂事紆蠻姬十隊合吹竽三更人馬皆同色杏子紅衫汗血駒一條春港乍冰開艇子如風去復來看盡廟燈三十架所思不到雨偏來兩邊簾幕影參差方玉堂西月午時只向最無人處走芒鞵先踏晏公祠日日衙齋燈火盈一樓絲竹慶昇平人生只有鄕園樂萬里孤臣夢尚驚積雨簡趙兵備翼三月不雨當如何內河水涸連外河吳船寸步行不過斷港日日挑泥螺忽然一雨卽五日怒雷聲聲喧不歇人言未蟄先啓蟄一百廿日晴晝失西鄰翁歌苦寒昨見示苦寒歌束手三日書難觀東鄰叟歌苦雨隔巷招邀期亦阻皇天有意寬災黎米價不復能居奇昨朝三十今廿五只有菜把仍拖泥米價稍平惟蔬價甚昻市沽常襍泥出鬻君不見龍嘴灘舤盡走豬婆灘停不久銜尾糧船出京口雨中得莊刺史炘榆林寄書言甘陜盜賊已盡喜而有作閉門六晝雨如塵枉却江南乍好春只有蟲書消永日愁無蠟屐走西鄰茅齋伴客餐乾糗竈屋呼童爆溼薪稍喜八行夾遠道早聞盜賊靖三秦廿四午後暫晴翌日復有雨意再柬趙兵備乞得田間自在身課晴課雨閱昬晨天山尚夢三時雪人海初平十丈塵浪說戈頭能淅米幾曾釜厎乞分薪燒燈市外雲如墨辜負風光過早春東西街近屢經過各有門迎八字河此客半千殊未敵買鄰百萬不爲多書生絕檄曾磨盾先生曾奉命參傅文忠公征緬甸軍事逐客新疆偶荷戈咫尺五湖烟水闊得閒休負釣魚簑二月二日獨行至城東北謁土神祠幾徧回途至玉梅橋觀社火作二首巷南行已徧巷北此重經一陣社公雨三層雲母屏水心初漾白柳眼乍回靑絕憶年時事斜橋且暫停土風今已變社日勝元宵草綠烏衣巷花明朱雀橋滿堤喧畫鼓隔院喚餳簫聊復行歌去城東有酒標花朝日乍晴邀諸同人各攜一壺一楪至檥舟亭小飮乗月乃歸卽席成長句一首檐漏乍歇谿風淸天放一角東南晴同人㝛約竟思踐十里五里同遊行檥舟亭枕大河側五兩往往衝簾旌布帆樓外出無數去者如送夾如迎辛夷纔放梅未落墻角老杏先敷榮風光好處一亭嵌綠柳裊裊空中縈與花對面設高座雄談四出聽者驚烹蔬各復出新意洗盞未了仍飛觥沉思往事亦何幸昨歲此日烏孫城磨刀置頸久乃釋賜以區脫全餘生豈知此日對花飮座上八客皆知名溪光簾影恍如昨一一逞態來檐楹諸公莫更堅拇陣頭上怪石危將傾喧聲入樹鳥巢動老鶻宇出筵前鳴酒酣各復繞廊步衫袖拂處香何淸臨河亭子闊丈五玦月未出波先明嫣然修竹靜如笑似與花朶爭高擎嘿攜一盞向何處苔滑石洞穿崢嶸祝花生日并自壽笑我一往饒深情髯翁去後七百載或者海外仍騎鯨不然卽跨赤壁寉落落游戲歸蓬瀛文章在世匪偶爾動與氣數關虛盈矧公大節越流輩詎止洛蜀稱耆英零篇斷簡映天地文采縱落留精誠此詩此筆復繙讀代有作者誰能爭卽如硯池祇一泓墨瀋尚在光晶瑩餘波沾漑及一世淸亦可濯塵中纓眼前樂事最難得何必擊筑兼吹笙君不見仙亦不羨茅初成幻亦不學王方平五侯鯖復懶入口狎客詎識樓君卿關心别有一二事梁上語燕林間鶯商量桃李及時放牡丹勺藥況已萌山陰淸酒京口釀誰其爲我儲百甖此生萬事不可料未審明歲將何營興闌一笑出門去攔客花影偏縱横十三日同人復約至趙恭毅祠看杏花回飲蔣太守熊昌宅賞玉蘭花作五更枕上聞剝啄痩僕排門徑相速爲言紅杏開半株恭毅祠西一間屋江鄕又饋刀䱶至驚筍出籬剛一束眼前光景期不負遠拉髯吳俊臣及癯陸伯才南華先生有加饌出水鯸鮧悍雙目潁州食指久已動有客樽前避酖毒厨娘洗手緩烹飪脇若凝脂肪如玉其餘蔬果七八種糟漉蟹螯鹽漬肉吾徒寧僅事口腹冀欲昨詩今夜讀況聞阿買近已殤謂蔣騏昌通判昨殤一孫約至西齋慰歌哭荒㕔留客談益縱茶味方回酒剛熟雛僧又復攜花至七尺亭亭樹如沐爲花位置久乃妥徑把墻西古苔劚旁栽修竹或四五白璧終須伴蒼㲄主人意欲傾家釀一斗初完百壺續參軍觴政束溼薪作吏極良糾則酷淋漓百盞急思避口令瀾翻及詞曲雖然盤樂亦當戒雅興何須十分足半圭春月縱未墮已換兩番銀蠟燭歸途南北更握手天外濛濛柳絲綠靑錢三百倘復嬴明日定來看覆局時太守與兩吳君角棋互有勝負十五夜獨至雲谿步月燕後花前春好鷗邊竹外樓高黃舒新柳一搦綠響回波半篙可惜舊時風月都銷一徑雲烟倪嫗閣仍臨水卽鬻餻倪宅王家艇在誰邊舊雲溪有渡舟篙師名王太年十七日趙兵備翼蔣少府廷曜叠邀賞山查及杏花薄晩歸看燈作山查花紅杏花白兩地賞花日已夕寬衣側帽行水東却好徑側來和風趙家茶花甲城郭赤繖當空日華薄蔣家文杏種亦殊昔時一株今兩株闌干影裏分南北花上晩霞皆五色春花艷極乃不香祗以顏色酣春光風光只有花朝好燕剪乍來蜂尚少兩家觴客酒百壺月出隔岸聞歡呼樓臺一帶光凌亂花影入波波亦絢沿溪約略三兩家歸客攀樹驚棲鴉齋鐘初動客初醒花外萬枝燈火影十八日戴村土人約食河豚因放舟詣其居并留㝛鯸鮧肪白土花斑夙約凌晨出北關却到戴村渾半日舵工云轉十三灣牛宮斜對讀書堂纔出堂扉便廣場不種疎梅與桃李門前十里菜花黃十九日偕陳刺史明善同詣亦園夜㝛卽席賦贈我初來亦園主人眈賦詩坐客劉文學駿邵文學辰煥屠刺史紳各各拈吟髭我再來亦園主人思彈冠名士欲出山笑殺蔣侍御舅氏與袁大令枚山中猨寉抛離久卅載復來園畔走紅香亭暗綠閣傾一壑一邱何所有亦園主人亦可憐五十乞養囊無錢折腰空拜道旁吏歸骨已少城南田竆州遠在風沙窟自說歸􅋔僅冰雪賣刀買犢記前時作字煥鵞空此日主人工書時賣字作活主人雖貧仍愛友布置一筵談夜漏園空月出棲鳥驚醉折園花爲君壽月上攜酒花神祠下小飮夢中欲去醒復還門外流水聲潺潺主人約客啓一關天嬌十二排紅闌神兮却立玉作顏佩影空際鳴珊珊仙人顏色皆渥丹騎寉無數雲頭看案旁一人堆髻鬟艷若桃李香吹蘭格高意遠不可攀幸昨識面緣非慳乍離乍合彈指間嫣然笑口合覺難三十三徧春花殘始知神仙在世亦不閒況我木石心同頑作詩題壁興亦闌月午花朶偏班斕放船出口越數灣卧看一桁船頭山古香齋栢樹歌爲陳刺史賦古香齋頭兩株栢出土根同榦如劈主人齋屋斜向東一樹從南一從北虬枝擊屋屋已破拔地靑蒼刺天黑森然四角沉陰滿日出當心不能赤人間落落古丈夫天半亭亭挺孤直飽經雨露顏仍黝不與凡姿竸顏色主人愛客客奇絕三十年前住昕夕客行握別樹始栽樹竟幾番長過客今來盤薄山齋內樹與主人皆素識摩挲撫樹對主人可惜主人頭竟白客今行周三萬里樹亦添高廿餘尺祁連山頭樠木滿曾遜此株雄且特頂平不待修雷斧榦老偏能挽風力枝經數折撑霄漢根已三重透泉脉因思復有三十年樹欲抉天人入穴沉吟不厭百回步徙倚每聞三歎息十圍櫟樹枝皆俯半里松濤響誰敵心空早厭禽巢閙眼冷靜將人海閱商量何物伴歲寒移得園東丈人石二十日微雨自徐墅七里步至潘墅買舟歸徐墅及潘墅弓肖路七里雨絲雖驟灑客步亦徐起買舟東岸下柳外天始霽紆徐路何曲偪仄橋欲圯行至西小湖驚翻一雙鯉廿一日同人游東嶽廟久憇禮斗樓奇花初孕寉初胎曾約幽人一再來要望紫雲飛過處大家排手上層臺長日悶從何處破拈得𥿄燈繙夜課三層樓上月當心燕子不來人獨坐寒食巳刻趙兵備翼招同趙比部繩男蔣太守熊昌莊宮允通敏陳大令賓劉宮贊種之小飮山茶花下卽席賦贈萬花紅處屐初停勝踏橋南百草靑此樹果然同晝錦故交先已若晨星十餘年前曾同盧學士文弨莊明府繩祖讌此今皆下世才奇耻著談龍錄席間主人論及近時人詩議極平允屋廣仍餘旋馬㕔何幸洛中耆老㑹始衰先得附頽齡坐中客自八十至六十惟余年僅五十餘是日晩偶成月到廿三剛半夜客從二十便孤征何因沙漠歸來早重見江鄕節序更蒸黍未嘗忘絕域伊犁淸明日以蒸黍饋客賣餳先已報淸明籬桃乍放溪梅落算在人間又一生莫折柳歌淸明日早起見人家皆折柳插門戶感而賦此君不見道旁人歲復歲傷陽春又不見道旁柳年復年摧客手赭白馬迎人歸所種樹皆成圍門內人門外樹縱相離無十步客欲折人已嗔人愛樹花憐人前花朝後寒食柳眼靑人鬢白淸明日早起一片迎神鼓驚從枕上來最憐新節序須覓好地臺鳥逐吟聲囀花同笑靨開兒童漫相詫廿載客初回予自己亥後至此始値里中淸明廿四日西堂獨坐魏紫姚黃放尚遲東風先落小桃枝梨花白到銷魂處只有雙雙鴝鵒知廿七日上城東浮屠遠望偶踏城東路孤僧爲煮茶因登七層塔看得一城花挂帆東北去尚未越溪灣只有吟眸闊能看百里山廿八日莊徵君宇逵招飮小山堂看花作抱病經時履跡稀忽傾家釀佐鮮肥春從傍水朱門入花繞扶風絳帳飛雲外子規啼緩緩夢中胡蝶影依依主人未是耽狂飮憐我新抛短後衣初二日味辛齋看海棠作無香色已冠香林艶向亭坳屋角尋隔岸綠先浮曉漲對牀紅欲膩重衾秋花祗作傷心草蜀魄原疑共命禽一曲闌干三尺影幾回燒燭到更深三月三日攜酒出遊并上城東浮屠風光眞巳勝淸明杏葉扶疎柳葉輕上巳幾年悲遠客先庚三日喜新晴初一日晩積雨始晴至初四爲庚辰日書從薄洛津邊至是日得蔣仲先河南書酒向浮圖頂上傾不是遇花偏痛飲更誰佳節住江城顏大令崇榘寄示明楊忠愍公名印敬賦二律不與頭俱碎惟餘石一拳百年宗社託三字姓名傳入世心先剖登壇肘偶懸何須尋四角應有怒蛟纏却憶明中葉權奸盜國章幾人關氣運此石閱滄桒尙有朱丹色彌爭日月光危塗如借佩螭魅爾何藏趙兵備詩來嘲余牡丹未開遽爾召客因走筆用原韻作四百二十字報之并邀同作前日上巳過後日穀雨至天公逞春容伎倆已畢試惟餘木勺藥墻缺尚需次含苞雖未吐已復極姿致春鶯翩然來胡蝶各展翅鄰家雙紫燕日向闌楯伺主人亦瞿然此足助詩思萬物取氣先遲恐不及事以口試問心催花具當治倘經三兩日蜂蝶必大肆成團舞花下人反無位置鄰翁顧相嘲笑我先設施何如花放日花下具筵熾看花仍縱飮乃拜主人賜不知主人心葢亦有所自流年如電掣稍縱卽欲逝前時餞辛夷欲待月十四十三風雨破白璧忽捐棄留花無别怯祇隕花下涕因之悟消息事事須早計一觴兼一詠庶不失交臂諸公誠詩豪亦可預先製名篇早流播不使有疵累又聞此花開神仙定游戲以我厠其間造物或者忌何如先數日看此欲開意花光雖未破先足嗅花氣棃桃及棠杏四美況兼備縱然輸國色紅白亦奇麗午餘新月好旭日又晴霽譬如名姝來先已媵姪娣遲延至月望花迺徧甲第家家排花筵勢必竆百味而我先設餐庶不哂粗糲先生展然笑此或自爲地牡丹開十日鶯粟又當替藤花三兩架紫艷半空蔽芙渠與金粟一一緣此例主人詞已畢客或笑詞費仍須罸主人别具餅一笥謝花兼謝客并助詩氣勢花月皆十分何妨再揚觶趙兵備以十四日招客讌牡丹花下先期以花朶絕小作詩解嘲因用原韵復得五百八十字答之我家一叢花發自月初九將開及全放自卯看至酉凌晨攜卧具月午佇尤久今年比前年花朶益穠厚將傾十家產約此數執友忽然𫾣門來遞到詩一首千言何反覆欲自飾怩忸主人詞未畢花巳若蒙垢我爲花歎息轉向主人叩解嘲旣前作踵韵曷敢後名花同主客兩造愈紛糾今來展詩讀花乃開笑口主人非憎花其實乃惜酒酒纔量升合花敢大如斗如能傾㝛釀日日約儕耦更呼筝琵琶花外小垂手園亭雖未廣水木足淵藪池寧嫌屈曲山不厭培塿尋檐引芻尼闢港貯蝌蚪斜飛紅蛺蝶倒挂綠鸚䳇花光旣全舒花藴始盡剖圓花與圓月上下璧合紐自然圍徑尺益復致抖擻酣春倚池臺窺客入戶牖黄紅紫墨綠五色無不有主人不負花花肯主人負今聞乃不然花亦欲回詬年前春乍半挈棹至虎阜買花先靳價遂不計美醜歸同薪把束益致種襍糅譬如龍鳳姿肯齒牛馬走名雖市娉婷實則計子母花神暗中笑此老亦奚取如何不自責反使花受咎不見劉中允種之不見蔣通守騏昌千金買傾國臉杏臂則藕錢刀惟不惜貴在得幼婦名花倚闌檻靜女執箕帚理固無不同珍皆等瓊玖主人讀新詩唯唯又否否花無纖介失過總主人受鼠姑開已徧次欲到鴉舅香丁紫瑣碎菜甲黃蕾萻翩反山櫻桃旖旎水楊柳蓺蘭成一頃樹蕙又數畝凡茲眼前景均足佐樽卣如思共晨夕竝可約誰某名花分向背好友列左右目成原不易心賞亦非偶闌干巡乍徧墻角放偏陡商量設几席羅列到瓮缶肴寧侈水陸囿自足筍韭沿林採松簟搜徑覓竹􅔺將雛雉登木合隊魚麗罶山陰醅正熟淮北麵須􅘞一一炊溼薪時時具乾糗花前成勝賞兼爲主人壽我若醉百回頺然亦成叟偶游夾城菴題壁夾城菴風日好人欲往橋先倒牛羊多人跡少百株花一坡草僧歸遲燕來早十五夜小飮牡丹花下待崔三景侃不至燕燕鶯鶯久作羣墻頭入夜望如雲得天獨厚開盈尺與月同圓到十分何處更容傾國見此香先已上樓聞誰憐露白燈紅夜倚徧熏爐待鄂君劉中允種之齋頭紅牡丹盛開招同人小集卽席賦贈入座香風已四飛姚黃魏紫認都非神仙隊裏仍耽酒富貴叢中獨賜緋影共朱霞相激射情於紅袖最因依平泉十載纔開宴怪厎從前識面稀自無錫放舟至梅里謁泰伯祠山城距山鄕卅里挂帆往土風何淸淳耕釣尚相讓崇岡經數折土殿亦軒敞東西無襍木列栢振淸響咫尺堯峯山堯時日初上古藤歌藤相傳爲宋蘇文忠公寓孫氏宅時手植今宅歸湯方伯雄業三月十九日湯公子招同人宴集花下卽席賦此建中靖國藤一條剖半化作濳潭蛟猶餘半榦卧偏穩閱歲七百如崇朝心空貌古枝尤禿自砌及檐剛五曲居停偶憶孫居士移種竟傳蘇玉局花時一巷吹古香紫燕不敢棲雕梁借公眞氣方壽世木理亦肖公文章距花百步看乃足高榦都遮出檐木沿溪左右三十家一半看花盡升屋葛仙橋邊路四通香氣已過橋欄東半空紫􅓫益奇絕千朶萬朶飛玲瓏竟思遠挈郫筒酒祝樹與公同不朽因花我復憶名花香國亡來亦云久藤側有香海棠一株亦文忠手植康熙中燬于火滁山釀水首重回風味不減歐家梅滁州醉翁亭側水上有歐陽文忠手植梅廬陵幾載作滁守公亦三度常州來才名一代兼風義落落寰中此師弟詩狂久已上靑天榦古尚能蟠大地樓窗八扇正面花欄楯屈曲枝丫权若將座客比花壽細校歲月無多差坐中十客年共計六百餘君不見紫藤花開墨池漲東坡洗硯池本在藤花側四十年前始移至檥舟亭古色班斕各相抗此花畢竟始何時我欲東行咨石丈雲谿行送楊上舍元錫北遊月出雲谿東照見雲谿西雲雞鯉魚亦成隊生世不肻離雲谿柰何溪邊人屢放溪邊艇我向溪頭望遠行布帆一一飛無影君居雲溪已七世三世及交情竝摯君族祖衣文印曾及尊人敦復皆余故交矧君才筆勝昔人使我論交復傷逝牡丹花紅繡毬綠搖蕩溪光數間屋家無長物殊可笑祇有貯詩餘舊簏城東别墅高數層君家有園在玉梅橋側俗名楊園老樹尚挂千年藤昨因酒後一臨眺君已薄醉難同登最憐雲溪春更向雲溪步我屬溪頭赤鯉魚送君直到江干渡廿三日沈廣文元輅招飮餞春苜蓿盤雖舊櫻桃讌已新是日始嘗櫻桃歌仍呼趙鬼論早薄錢神二句櫽括座申事半夜乍升月五更猶是春更欣時雨足歸路洗街塵屋後圃中鸎粟盛開率成一律日日衝簾柳絮風送春巴覺酒杯空墻頭新月半鉤綠屋後好花三畝紅芳草更縈人跡外艷陽都在鳥聲中誰憐萬里烏孫道錦様韶光罩郭東伊犂年來鸎粟最盛花朶視內地加倍蔣州守業晉寄天遠歸雲圖索題江漢爭流處茫茫鸚武洲又隨鴻北去直到海西頭楚國萍如斗天山月挂鉤何因暫謀面兩地訝同遊余兩至楚中一詣塞外與君略同而路較遠又戊午年乞假歸曾于吳門一識君萬里遄歸日輪臺雨夜過夢餘淸淚落天外斷雲多此客情何逸勞人鬢亦皤披圖一惆悵疑聽郢中歌端五日偶成二首卽柬趙兵備古人稱禁煙不聞禁竸渡此如唐水嬉亦若漢賜酺一年惟數日犇走及婦孺書生縱憂俗施設當有素調劑得其中貴在審時務何因興大獄幾至成黨錮甘陵判南北此事匪細故流傳到絕域衆口尚含怒欲救舉國犴惜哉謀已誤余昨歳入嘉峪關卽知里中因禁龍舟至興大獄白雲一曲溪夢寐三十載流觀眼厎人已苦乏同輩今晨新雨霽耕者釋耜耒萬屐鏗有聲紛然聚闤闠榴花紅似火村女滿頭戴橋左幔已張溪光迭晴晦沿溪尤曲折窗牖分向背龍舟銜尾至畫舫亦成隊俗奢原可慮幸此豐歲再江魚頻入饌山果隨所愛水明樓上望趙傁已先在相應攜蒲觴終日與晤對雲溪競渡詞十二首雲溪如畫水如油今歲歡場昨歲留不肯更將風景煞六龍城現四龍舟高處燈光碍月輪軒窗無地着飛塵生生視昔加三倍樹上禽巢樹下人怒雷激電滿平川艇子如風不及旋齊向白雲尖上立萬堆蠟屐雨聲圓傳來新調唱攤黄分半吳姬束急􅋔八角鼓完三弄笛十番絃索一齊忙萬艇如梭集水隈兩邊樓閣亦齊開官河塞斷雙龍嘴不管吳門水馬來吳船􅋔束近來工南北窗櫺面面通一晌夕陽紅不定杏黃衫子立當風枇杷桃杏滿盤堆遠有江鮮入饌來屈指半旬交夏至洞庭船不送楊梅河泥船好六倉寬村女梳頭映水看燕麥兎葵蠶豆莢曉涼先向舵樓餐占得雲溪好景多前門船向後門過詩翁住處人能識八字門臨八字河趙兵備所居前後皆枕溪角黍堆盤酒滿壺家家歡喜易新符董龍社橘人猶指更禁魚蝦入市無一旬日日敞華筵醉向東頭閣上眠怪厎月光飛不到船船燈影接靑天夢裏雲山一萬重生還眞荷主恩濃升平樂事誰能譜我本江鄕識字農續競渡詞十首紅板平橋次第咼未昬燈火塞城河風光暗覺年來換畫舫珠簾卜夜多緩雲閣接甌香館一帶紅欄間碧欄正値白雲谿水漲龍舟南北打招寛鳴鉦日午說傳餐鄕味偏驚水陸全抛却萬錢邀七客將軍原合住樓船劉總鎭烜讌客極費爰戲及之無舟可買上藍輿祇覺今年興有餘畫舫塞河人塞岸更無隙地著禽魚郭東千尺水雲寬老白龍來盡改觀更向榜頭題御覽天津城北昔迎鑾五色牙旗按五方東西北廟爇眞香更穿白馬司徒港去謁金龍四大王水中彩鷁岸雲車鉦鼓聲喧襍晩笳同向赤烏橋外過霓旌紅閃半天霞百尺濃雲水上開嫩晴先已過黃霉白須社長從頭說二十年中第一回兩邊簾幕不須遮日日輕橈泛水涯笑煞隔河諸女伴釵鈿質盡不歸家雲簑雨笠剰閒身夢後樓臺愴客神依舊瑣窗飛燕剪就中偏少賭茶人趙兵備以地理數事見訪因走筆奉答猥蒙長篇奬假幷目爲行袐書因率成四截句酬之卽戲效其體百篇君有連城璧萬卷吾無紀事珠一賦十年如製就願同逵載注三都尚慙正卯記醜博敢說師丹老善忘莫更一瓻緣舊例次公猶恐醒而狂來詩欲緣借書之例問一事卽贈洒一瓻故戲及之一巷東西本接連數椽應愧卜居先倘逢欵戶求文者大作家今在那邊三伏將臨九夏長不辭揮汗走門坊奚奴拍手還相笑此兩閒人何大忙西谿漁隱歌爲曾都轉燠賦我家近南江乃望北江北桃花洲上三面山久欲臨流築居宅君家住西江乃憶西湖西西湖盡處一溪在碧水蕩漾天低迷我爲北江農志不謀稻粱江潮壁立一亭嵌日校五雅兼三蒼君爲西溪漁意不在魴鯉綠簑一領不肻穿日日吟詩北窗裏萬言落筆不得休雕琢欲使前人愁明堂左右列樽俎武庫甲乙森戈矛西溪漁隱詩六卷派與西江亦殊判沉思早抉天地奥古色不供時世玩竹西風月宦十年珠履賓客盈三千平山堂縱日登眺淸夢只落西溪邊西溪近界江海中溪上南北雙高峰詩筒往往襍釣筒得句時復驚蛟龍才名京國誰能偶輩行居然欲稱叟西淸東觀及外臺十六年中一千首歐陽戀潁湖安石號半山名流所在寓淸興好景何必皆鄕關卽如西溪邊咫尺接東海拔地倚天詩筆在潮生潮落爾許忙漁弟漁兄欲誰待君不見宮亭湖上源兩支章水貢水流無時西江宗派吾豈知快意且讀西溪詩袁文學廷檮移居載書圖不惜兼金百計儲牙簽時卷復時舒一瓻日詣袁居士欲讀人間未見書委巷南頭與北頭三遷我敢比前修丹黃句讀依然在時復傷心上小樓中河橋側委巷中有小樓二楹余少孤時母太宐人授經處也今從弟顯吉等尚居之袁文學集明東林諸賢及黃石齋手札彚成長卷索題不知我者不可言知我何不書連篇笳花委鬼正當路舉筆欲下心憂煎二周一魏書如此悼歎人生不如死求忠于孝古所云忠節門仍生孝子銅山先生起漳泉萬言一疏人爭傳明知末路不可挽獨抱白日歸虞淵蓼洲詩石齋集筆厎欲扶天地立快論時歌復時泣明家社屋巳百年紙上尚復生雲烟君不見季侯箋孔時箋跋巨超上人足踏萬峰卷子天下佳山水南條與北條我餐蔥嶺雪目斷海門潮是處皆飛錫何峰合挂瓢言從贊公㝛相與話迢遙佛國鳩羅什仙都梅子眞欲尋方外友喜得箇中人論已參禪悅菴仍借隱淪百篇心賞在幽谷乍生春十五日自京口渡江至焦山憇定慧寺作西南行盡路萬千返棹乃訪茲山巓茲山風急不得上幸有巨石攔洲前山坳一石戴一屋步縱曲折心安便側身東望始寥廓初日欲上潮無邊心飛西海足東海下瞰無地高惟天放臣逐客罪應死跬步懼有神拘牽山靈怪我貌衰老頭上雪色來祁連齋厨粥飯客寮酒彈指已近三十年僧雛髮白野猿老只有寉頂紅逾鮮四山松栢悉合抱榦老盡起靑蒼烟少年事業百不就削壁僅把新詩鐫浮名在世究何益回顧我已慙焦先塵勞擾擾及一世足繭欲乞空山眠來歸萬里去萬里祇覺豎亥堪隨肩昨呼漁叟與堅約終老誓種江南田東升樓看日出海日欲出海先有黿鼉鳴靑氣一綫來潮與佛閣平樓上客未眠光景榻畔生一杵京口鐘先遞瓜州城山半訪隱君洞此山開何年此客殊宇兀形骸生卽委眞性任汨没遂令巖樹上飛鳥性皆拙想見千載藤猶纏隱君骨觀音厓待月我來觀音巖月出斷厓口棱棱𥿄聲碎壁上蜥蜴走海風吹幡竿石冷坐偏久夜半扶月歸淸輝􅕹人手法界樓夜坐龍界與人界相去僅咫尺夜半驅潮來知􅑀夜叉力枯僧樓上坐親見髮如㦸復恐漁叟驚懸燈照昬黑山齋訪冒鳴茹壽衢兩秀才并招小飮書聲出戶蟲不鳴山鬼一足深宵行人頭魚身慣窺戶見慣不怪心能平昨來酷暑剛三夕讀得好書盈一尺鄰翁最喜文字交夜半煮酒來相邀翠屛洲訪王秀才豫此洲樓閣何參差五十年前盡江水廣陵城低波浪闊藉此居然障東海圍洲三面煙水空正與北固成屏風更殘日出東海東照見一角樓窗紅六月二十一爲宋歐陽文忠公生日同人賦醉翁操以壽幷邀同作卽呈曾都轉燠醉翁去後七百五十年平山堂下仍復開賓筵醉翁生日重理醉翁操欲使醉翁心跡一一傳人間醉翁十年二十年孤露蹤迹殊可憐父書讀罷母垂涕窆骨尚未營新阡卅年四十年醉翁作直臣彞陵滁州兩遷謫身縱可屈睂仍伸幾年作詞臣幾年作循吏治平至和中遂爾登政地醉翁文筆世莫儔超軼六代直接韓潮州遠不識柳開近不數穆修醉翁志節尤崢嶸手挈正士歸明廷是時靑苗免役新法尚未行洛黨蜀黨亦未交相傾醉翁居朝端一世仰作範仁宗朝相不下數十人公也獨參韓富范醉翁勳業又如此一世如公幾人耳醉翁吟吟一篇惜乏沈夫子亦無杜彬琵琶皮作絃醉翁操操土風此曲依約來滁中當時坡翁及涪翁門生後進詩筆縱極工若論文福一一皆輸公昔者楊靈州道公我前身楊州守芳燦顧進士敏恒扶乩所言如此見所著梁溪筆記公名如太山詎敢追逸塵惟餘一事薄相似唇不掩齒厥效何其神無事得謗如前人因之壽醉翁醉翁或不嗔泠泠絲竹公賞音逸興更或彈鳴琴斜月欲墮長江潯陳後山謂東浦方伯曾南豐詩名官爵皆可次醉翁不見題襟館中來日集都轉生辰後公二日荷榦荷葉依舊吹香風滿堂樺燭漏盡不須剪正好來日直接朝曦紅寄酬曾都轉見題荷戈集詩二首記程一萬六千里蔥嶺遙遙接蒜山今日竹西歌吹地又從吟榻夢陽關我于經閣論心久君已詩壇駐足牢絕似鄴中諸子㑹主人吟比客吟豪附原贈作曾燠君得爲詩是國恩長歌萬里入關門笑他紹聖元符際蘇軾文章禁不存滄江風雨一船高招我松寥看海濤君時在焦山避暑擬往訪之絕少行吟憔悴色知君未肻著離騷題襟館贈寉空廊怪厎步不前五寉一客隨吟肩廊斜入屋勢尤窄寉步故緩人爭先回風開窗捲羅幕客醉欲眠聞擊析閒扉六扇夜不扃窗裏客眠窗外寉又贈柳柳枝西北禽巢大枝下砌蟲鳴百箇三更星暗月欲來蟬響復從枝上墮乍眠乍起天欲明絲柳拂面人先醒比肩豈獨同心友添得三株水楊柳巨超偕棲霞僧慧超過訪喜賦一僧江北去復挈一僧來把卷憶前度論詩日幾回病依笻作命瘦與寉同胎夜久生衣薄相遲般若臺月波臺夜坐萬聲聽不絕人靜此樓頭地缺洲三面天空月一鉤烏鴉爭噪暑蟋蟀遽鳴秋夜半龍吟水寥寥衆響收贈巨超慧超卽題二僧詩集巨公居江心慧公住江滸詩筆如龍復如虎句成寶氣燭九霄龍虎鉢中頭盡俯生平我喜七字詩不可一世人儘知眼中無人締方外一任下士相嘲嗤君看建業東來水日夜滔滔欲歸海二僧筆力可截江端坐已受潮頭降餘力更把焦山扛巨公欲雲遊慧公欲高卧飛錫竝從天外墮他日蓮臺孰高坐廿六日同人月波臺看潮東南風轉急全不見朝暾雲欲沉江島潮爭截海門鬢因思舊白眼覺讀碑昬偶問滄桒事枯僧幾個存曾都轉燠及諸賓客約以廿六日至焦山見訪聞至瓜洲阻風二日尚不得渡作此戲柬七日東南風不止倒捲滄溟入揚子順流一葉不得下斷渡先從象山始一客旣去不得來一客留滯仍難回時翠屏洲王卞二生過訪一留象山一留此皆不得渡松寥閣小一無事飽看雪浪飛千堆回頭却憶瓜洲客日日江樓看風色别來幾日心眼客淸夢時與焦公通君不見波濤繞榻一萬重正好日試登山笻時叱檻外巡江龍酬慧超僧二首因觀竹栢樓月遠指高旻寺燈三世佛前老衲六朝山下詩僧嬾到不參佛座閒來唯理詩瓢寰中五岳難住海外三山見招廿八日同巨公慧公松寥閣早飯山僧約客松花飯破曉同登竹葉樓正爾日長思就枕未妨風急遽回舟始聞都轉等以阻風回舟怕傳消息來三楚時楚中敎匪尚未淨盡閒理心情說十洲淺醉更從窗外揖午潮無際接天流將至消夏灣在新塘守風晚値雷雨一湖水欲入船一湖風欲揭竿雨沉沉三十里消夏灣在波厎泊舟夾浦七夕此夕新湖汊口昨年古浪城樓笑看新月生處曾到斜陽盡頭一叟自談衷曲十年寄跡湖邊衣食全家已足瓜田盡處桒田夜攜酒至湖口望縹緲峰作明月鋪不滿全湖半生陰東山飛鳥來欲㝛西山岑一觴初完一觴續倦向望湖橋上㝛潮生月落方賞心天盡海飛空極目東南風急不得至西山因回舟從伍浦抵東山作白鷗入我夢知我無竆意憐茲眼前景不作身後計浮名生在死卽休不見敗筆作冢糟成􅏀石公咫尺不得進回棹決向東山游自新塘至伍浦溪行襍詩溪水綠已竆巖扃忽重閉日華與山翠層叠川上膩前村爨煙好穿此石林細一徑山雨來寥寥入秋氣瓜花黄無端被此一川綠晨涼把竿好閑坐此谿曲人家隔坡水路暗通石谷日午攜榼來人聲出山腹兩村本一村中有雲水界溪流經數折南北已分派連宵風色緊目送去帆快人定波有聲神魚望星拜陸行富桒麻水行富蔆芡惟茲雲水鄕不虞年歲儉門前臨水路鵞鴨數堪點屈指白露交秋禾又將歛寄長興邢大令澍二首幷柬李司馬賡芸故人久宰長興邑逐客新遊消夏灣甚欲牽船遠相訪斜陽影外浪如山年前寄我長牋好前寄質經說數條逋峭文章擅一時更憶南荒李司馬同官同榜兩經師偶成橫風兩日住江干甕厎桃花米已完咫尺荒村無處糴芡頭蓮實扺朝餐溼雲堆裏漾龍鱗一片荒寒景色新猶勝玉門關外路案頭無水動經旬伍浦夜泊高士宅邊新月上伍胥浦口落潮餘多應念與雙峰結未覺途經百里紆别路更須尋馬蹟此行端不爲鱸魚宵殘燭跋攤書卧靜聽松聲落枕虛五鼓自伍浦渡湖至東山到來靑歴歴七十二峰巓駭浪魚先拜驚雷鳥已顚水聲搖短夢風色眯長年昨夜前山雨茫茫笠澤煙喜晤程司理思樂我借全湖水來淸百斛塵故人吟骨健遷客鬢絲新感激樽前語扶持難後身廨旁營釣舫久約共垂綸憇東山道院松杉千百株小者僅及肩歴盡松杉梢一院開山巓黄庭讀未完丹爐火猶煎道士識未來勸我山頂眠白雲有堦級倘可升靑天孫總戎廷璧坐上卽席賦贈二首幷憶亓總戎九敘四川軍營孫爲庚辰科武探花萬頃洪濤艇似梭相逢先唱定風波山中共說支離叟天上同魁甲乙科話舊半皆淪宦海謂畢宮􅍖沅童少宰鳯三諸人溯源先已到黃河狂吟痛飮三更盡衣上分明燭淚多獵獵營前秋雨斜將軍筵上說龍沙何曾一醉輪臺酒余出關卽戒酒憶昨同乘博望槎薄譴最憐家似夢感恩新覺鬢添華誰知萬里歸來客依舊軍門聽曉笳時亓在四川軍營効力已補都司矣初九夜乗月自東山放舟至西山消夏灣㝛荷花內花光碍月舟不前花氣薰客宵難眠三更一棹破花出客夢尚結花香邊東山荷花十里長千枝萬枝送客忙花朶露滴波心涼西山荷花一灣好千枝萬枝迎客早曙色上波花愈姣楊梅樹繞荷花灣深紫已落新紅殷荷花香破夢亦闌再轉已入仙人關梅花仙人歌爲程司理思樂賦伯牙臺前花一山君家梅子山下愛花人住梅花灣無夢不與花相關莫釐峰頭花萬樹愛花人宦梅花渚却喜官閑作花主少年愛名花花外無性情離花一步不肻行四十不復營功名中年愛名花花外少肝膈一官雖卑意亦適靜對花枝已忘食世人不知君笑君作花癡君聞亦夷然直受顧不辭滿堂花開滿堂客客或呼君作花癖君聞若不聞意亦良自得一花初開詩一首爲酧花枝亦呼酒花神感君祝君壽來歲居然七旬叜花癡花癖君寧然意與花有前生緣君不見梅花賦就三百篇我今署作梅花仙消夏灣歌贈蔡博士九齡全湖三萬頃包此千仭山湖流再轉已不見山腹復有溪彎環溪流逈與湖流異湖水如油溪水膩荷花世界夢亦香淺白深紅炫天地幽人家在花深處正闢軒窗摘蓮蘂蜻蜓舟小迓客回半日醉客荷筒杯荷筒杯醉君酒荷露烹茶沁人口荷花中間結一樓主人約客樓上頭烹魚煮藕日尚早手劈蓮房客先飽白雲白雲濛濛空所依傍天風吹之偶落坡上魚吹浪蹴忽爾孤往空中亭亭儼若覆盎成陰旣溥一世咸仰新浴後怡雲閣望縹緲峰不向前山䇿短笻新涼浴後且從容幽窗正苦日西轉陡落一支縹緲峰雨花臺待同人不至淩晨發淸興瘦馬入絕壁沿山石理􅉳雨點亦深黑馬力忽已微斜行憇危石風雷莽成障花雨渺無跡却啟西北扉高臺望孤客四鼓自西山渡湖挂席向何處五更風色微海雲天半立山雨月中飛百念籌關隴全家理釣磯東峰此歸去魚鳥爾何依
