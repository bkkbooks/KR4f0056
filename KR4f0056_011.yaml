body:
  text: 陽湖洪亮吉著五陘聯騎集辛亥壬子雨窗讀何水部道生詩適有饋蟹者率賦一首即題卷末平明生輕寒秋雨閉門大窗風扇如鬼梢人竹數個起來天冥冥枯坐無一做攫得一本詩中邊頁先破案頭光正黑捉就窗隙卧讀一首兩首大呌急起坐波濤欲掀屋日月忽顛簸無端蟠虹霓光怪生土莝排空一枝筆五嶽透皆過凝然七字出重欲百馬馱又如五兵利當者無不挫讀時忽狂笑一屋悉驚邏一句復一滴恍與簷漏和雖然萬言富無救一日餓忽然𫾣門來送蟹有鄰左是時雖正晝墻外黑若磨安排醋盈盞疊取薑桂銼呼童急斟酒好句我欲賀遺經懶書寫即此當清課時為幼子書爾雅讀詩一兩卷食蟹七八個快哉復快哉屋漏頂上墮自蘆溝橋西人山至花犁坎道中作山程七十里半道馬巳死時同行劉檢計湛齋馬忽斃主人寄坐僕告歸一馬乃載三人來前山蒼蒼月初出對面一山看落日微紅入水尚有光水底巳復鋪新黃山風斜衝兩山口倦客欲眠山石走一峯槲葉下趂人車上鈴鐸聲疑嗔客行無糧馬無草三兩人家閉門早却怪前頭紅樹多槖駝不到山初好自慧聚寺北行歷化陽朝陽觀音諸洞晚上極樂峯作峯形南北殊凹凸入地上天皆一日潛行五里不見天躐炬光遠空浮煙莓苔森森緑疑夢蝙蝠手捫皆不動一風衝出微帶腥足底萬竅聲俱鳴好奇徑欲窮顛末行僮失聲炬將滅四人急轉我後來風黑恍有千人追是時屈指當交酉出洞見天天尚晝飮泉百盞神始清坐調鼻息方遠行樹巔斜行途轉窄鴉點撲人如雨黑東行一洞勢較低一洞復出淸泉西斜陽沉沉嶺頭落客意極疲龕極樂下方巳黑天頂青側帽恐礙當頭星自潭柘寺至龍潭久憩一亭蓋清泉再轉泉巳失山腹空若囊時時怪風出青松高穴蒼鼠肥紅葉遠雜烏雛飛四山茫茫樵迹稀山翠沁骨思添衣斜陽下嶺客上山山寺防虎門先關坡陀百轉行客餓林果却從頭上墮宿慧聚寺山房寺門望殿樓樓逈若天上一松蟠殿角高復出千丈山僧導客行不休石屋轉出青松頭客行開窗玩松頂下視僧房若居井秋衾鋪月夢不成一夜枕七皆松聲松耶雲耶不能省月裏千重百重影三更闢戶禮上真北斗正南來瞰人日午抵潭柘寺至猗玕亭久坐到門諸峯低青翠收一殿直上百級奇雲紅撲人面穿廊入厨院百匝水聲遍危亭圍衆緑當午無所見林杪開北風晴陽落如線山窗當殿展涼燠亦時變朝飢誰可喻山果幸時薦吳筠雖説餅束晳仍賦麵卧枕明昌碑狂思永和宴亭有流觴曲水故云慧聚寺夜起行馬鞍山麓三更東峯明斜月逗林左連閭無人聲獨往意亦果北戶昨巳扃山風自開鎖梢南通一徑細路出墻垜碧樹合作屏黃雲散成朵低同馴鹿步高與彌勒坐一寺十數廊間行止餘我徘徊念儔侣水黑月巳墮歸路愁徑昏山榴綻如火山房與卲侍講晉涵話舊兼呈曹侍御錫齡劉檢討錫五張運判道渥憶昨從君逰青山謝公宅五更搖夢醒君苦行不得出門殘月尚在牆照見四野黃花黃傍花前行衣𬒮香緑鬢欲與花爭光看山百度花千度鏡裏朱顔已非故五嶽雖成汗慢逰一春每被風光誤洪崖仙人寧足誇君亦懶種青門瓜雲山無意忽相合且拾山果烹溪茶對床七輩今誰似可惜三人巳前死壬辰三月同逰青山七人今朱竹君先生張上舍方海黃二尹仲則並下世學士才名上舍詩還餘李嶠真才子今日張顛有替人曹劉聯轡出風塵青松白石談遙夜艷李夭桃訂好春時約明歲三月重逰歸途逰石鏡山作馬行半日城皆陡槲葉隨風出林走桑乾河北飲馬時却望樹色還參差平沙茫茫埋馬膝復有一山當路出遠尋千級到寺巔寺外城堞皆衝天紅林蕭疏日光薄破樓無鐘殿扉落庭隅堆草濕一邊夜半或有山魈眠梧桐葉梧桐葉秋來大如掌肅肅西風催蕭蕭打門響何工部道生招飲即席羅山人䀻曹指揮鋭張運判道渥合作一圖名秋堂雅集因繫以詩一人畫山一人畫樹旁有六七人嘐嘐屋中住曹興宗昔時畫馬今畫松羅江東畫人不工畫鬼工張風子畫即有風獦葉恍起秋堂中兵曹詩百篇法時帆舍人酒一斗劉湛齋比部談天李石農我義手屋頭有樹樹杪山却怪樹底門常關晚晴巷口車聲接一徑呼僮掃紅葉斜陽入樹留一分道遠客欲趨城門時帆居內城君不見山雛窺客喜復嗔認是昨日逰山人逰古寺入門悄無人北風吹小住誰肯揖先生長身一松樹朱孝女奉親圖孝女婺源人誓志不嫁以養父母父亡事母幾二十年及母沒孝女年巳五十依兄弟以居繪父母象懸室中朝夕事之如生其兄某為作奉親圖索詩云爾二十事父母三十依偏親四十作藐孤哀哀逮晨昏父亡事毋毋亦亡高齋却掃為影堂影堂西偏兒所住生死不離親一步行年五十不下堂父毋以外無尊章畫師敬復瞻顔色髮白未笄何可得椿兮萱兮合作圖旁有几榻兼詩書君不見孝可生孝可死由周秦逮今此伊誰作配光青史北宫之女嬰兒子歲暮飲酒詩十篇一屋無間人勉復出門走一巷無間人驅車出坊口東西街十里排戶欵良友皆云出門久十至九不偶沿路爆竹聲兒童拍雙手車來仍復返斜日巳交酉一世無間人誰同飲杯酒飲酒或不樂時時復嘯歌讀書有時疲披箋亦吟哦設榻書案旁所以消睡魔房廊亦周行時還撫庭柯大扺一日中良朋間經過飲酒時究少讀書時究多自為京朝官童僕色不展連晨朔風至寒色到雞犬吳奴昨告去朱戶别思欵今辰關右僕衣被亦將捲欲留心不忍各為計安善十年依倚久一旦忽辭遠周親復交詈食窘衣不暖笑讀東觀書何如北門管學士不能飮而時負酒錢法時帆喜招客侍講久輟詩卲二雲獨喜客贈篇孝亷耽宵吟王愓甫日出擁被眠廣文退食遲汪劍潭負劵愁逼年皆隔十里遙誰能比吟肩歡悰杳難尋俗纍苦復牽惟應孫比部淵如時闖笙歌筵比鄰指揮署對戶車裸坊鄰雞第一聲馬嘶人亦忙否則公案側貫索聲琅琅羣動既巳繁吾行起倣徨門戶尚未開初日上北墻窺厨炊煙稀正苦瓶無糧吾師昔人言冬日則飮湯歸鴉值歸鴉十十復五五酒人憶酒人相思倍云苦寥寥心一寸誰復可傾吐欲因西逝日寄此蜀江滸江水杳以深高原復相阻思君不能見夜起聽更鼓安得雙鯉來奇篇概今古此首寄張同年船山屋頭無星辰積晦巳三夕淩晨先習霰騎馬懶入直生徒來饋歲野鶩間鮮鯽更有酒一樽聊云破岑寂雖慚通德里差比草元宅呼兒開美醖小酌經案側正好無俗人門前雪盈尺人皆處城西我獨居城東城西人不來賓坐時時空非徒息紛紜藉卧篇籍中日旰弱弟歸粥飯喜與同兒曹誦經餘得句輒復工為善無近名我師陳仲弓干祿不欲多我法邴曼容興至即舉杯消磨寺樓鐘昨來京華居闢室作影堂晨昏覲吾親旬朔申瓣香祿苦不逮親時時我心傷幸伴弱弟居諸甥亦隨行誨以勤讀書庶幾能顯揚歲晏風雪中懷人益傍偟一舅依郭門兩姊居江鄉何時能合并築室先壠旁向生無他奇貧甚益偃蹇人言年歲竟屏當無一件開函展然笑一室尚仰偃泉明乞食詩吾行恐難免欣然喻妻子且設歲除宴為歡極今日先把百愁遣待過元日朝衣裘亦堪典歲除以酒炙酹亡僕窺園并繫以詩自余為諸生汝即侍左右皖江隨學使姑熟依太守兩年居白下一載住京口逮擢明經科相從浙東走窮冬遭大故九死返林藪汝也痛哭隨衣穿露跟肘經年堊廬內料理及糔􅘞一僕乘間逃蓬門汝兼守余心感其義待汝乃不苟除喪來日下百事益粉糅春秋兩闈試十上九顚踣屈指十五年所值苦不偶親知久相棄汝乃誓不負落落十數州商量覔升㪹逰梁才匝歲客陜時最久中謀金半百為汝歸娶婦南下不半年長飢婦先詬踉蹌復追及欣室有病母汝才工料事兼復習科蚪每寫百幅書人疑出余手余交遍區宇能一數某某孫黃暨崔趙識我交最厚不來同我憶來即具尊酒各能諳食性默為理菘韭武昌城郭外客歲歷申酉地也南北衝村墟雜花柳平生汝頗謹苦被僚僕誘到此亦有由都緣婦奇醜妄心希外遇或可副箕帚放艇夜渡江時時逐雞狗衙推頻乘隙間值墨尿毆有時方縱笑遭我出行陡厲色一禁之鞭笞願甘受扶疴方就道風雪復連嘍余來幸通籍解汝顔色愀遣歸迎眷屬兼為覔糧糗汝時雖巳病聞語尚抖擻今年附舟至面色益昏黝殷勤覔醫藥病早醫乃後短至節氣長時時伏床嘔屏除諸食品日僅啖菱藕沈疴由自取將死乃一剖彌留三兩日作札呼汝舅瞪目不得言頭從枕邊叩卅年為一世誰識汝不壽汝行雖厠僕汝義實兼友汝不善攝生吾行又誰咎急為馳惡耗書至月巳九汝母哭定癡汝父顔亦叟伶仃遺弱女學語未離勃一棺雖草草必為枕邱首除夕酹一杯傷心汝知否小除日寓齋卷施閣祭詩作昨年祭詩日同館挈仙史謂張船山今年祭詩時闔戶僅兒子一兒讀詩業未醇一兒學選粗有文呼來筵上作陪祭不向屋外招詩人事功一歲慙何有詩一百篇文十首偕之作達亦可憐敢向衆中誇不朽此筵設自我此例舉自唐浪仙詩句鏤肝腎積歲預恐心神戕我詩直欲寫胸臆元氣未劚何由傷雖然一日間檢韻亦巳忙灤河仙鹿北谷羊作脯聊潤詩人腸南鄰詬誶聲北巷市􅒡沸吾廬雖冷一事無尤喜門無索租吏一詩焚筵前一詩寄蜀中狂生避債作臺後預想掩戶浮千鐘我行亦返卷施谷欲仿長江作詩屋更邀諸老同祭詩短趙狂孫附癯陸陸秀才繼輅年尚幼巳工詩兒子友也小除夕從家大人祭詩歌飴孫兒時放孰庭前過重慈提擕侍行坐桑陰屋側隨嬉逰手捧新詩當餘課十年負笈從師逰樓前學詠珊瑚鈎間中分賦荷奇賞出語不肯同朋儔歸來朗誦喜阿母慈顔一笑開睂愁歲除亦解束詩卷雅伴積軸堆床頭屋傍十畝富風景絶愛春晚兼新秋偶然好句覺自得僮僕往往嗤咿嚘􅋈舟亭畔蠡河地花落花開總能記年華二十春二分入世文章敢逰戲春明北上隨慈親歲星在亥月在辰曾登鳬繹望泰岱更喜擊楫經渾淪看山看水不相識問名一一窮本根祝風咒雨一枝筆行客舟子驚竒珍燕中隨宦樂趨侍一卷兀兀隨晨昏過庭重誡爾小子學詩一語言重申間堂月好命分賦擘箋搦管噓陽春一篇偶合長者笑一篇若拙長者嗔弟昆相賀復相戒冥索時復煩心神金臺芍藥閘河柳快飮百杯詩百首夜闌掩戶時朗吟一屋兒童都上口卷施閣集排西東更列酒脯酬天工庭除恪侍作陪祭釭穗凝緑花冥𪷟太華培塿並時列光氣淩亂殊青紅瓣香縱不在前哲敢説家學能兼通他年倘得嫻一藝略比過邁隨坡公花朝日獨逰二閘歸適馮編修集梧得田侍郎雯大通橋秋泛卷子索題因率書長句于後花朝日展重陽圖百年風光今在無蓼紅荇碧色不減只有卷裏人俱徂河流北去都成岸驢背紅塵亦頻換誰從物外觀古今石塔亭亭峙天半惜哉秋好何如春津水乍緑無纎塵獨逰徑苦意蕭瑟坐恨不見當時人百年似此清逰寡都䇿疲驢不騎馬沿堤正好迎面風攬得柳絲盈一把米船東來畫舸西百丈往往牽朱旗羣公觴詠致堪樂可念民力東南疲君不見東南十郡沿江滸陟險誰憐挽輸苦就中若以河沙量我亦江鄉一編戶田郎仁者固不同刻石告誡垂橋東即論文筆亦殊健赤幟巳植騷壇中風光過眼誰能久感舊懷人一杯酒春禽送客如有情約我重來看新柳葉舍人雯移居觀菜園上街東作圖索詩為賦長句樓頭擘山作兩峯門外江漢流無窮先生開軒日正東繞宅萬樹桃花紅朝烹武昌魚草飮江渚酒卅年撰述無不有博士一官堪白首無端欲將閶闔排愛看紅藥翻當階江頭池館覔人住反使猿鳥情俱乖水程迢迢陸程少糧盡唯憑讀書飽津門橋南賃百驢囊金雖少書有餘朅來都門三易居菜圃開處真吾廬盤盤老屋橫街後分半貯書嫌不彀鎖廳退直事亦忙目力若短書聲長談心時接北街李小松編修聨句尚有南頭王愓夫孝亷君不見買山何似還山住一樣門前幾株樹屋頭添得十丈塵失却雙川合流處法學士式善屬題曹指揮鋭張運判道渥所繪二卷子蓬壺有仙人早歲即食祿所居尤禁近丹闕森在目官清饒暇日當干駐車軸閉門詩作命萬事不貯腹我頃謂先生身外物皆足無須更誅茆天地即詩屋苦吟朝復夜雙舉日月燭惟愁鑿幽險或致鬼夜哭元氣不可漓期君返真璞詩名試屈指海內不五六餘如閲傳舍彼此可駐宿賞心雖偶寄過眼亦苦速茲龕庶􅊳兀表以出簷木名山原有待壇坫今已築我亦念故居卷施一隅谷右詩龕圖我家門前接早潮却行一里數十橋橋邊朱樓橋下艇千尺闌干漾清影扶橋楊柳高接天樓上著客疑飛仙偶然窗際落高詠却惹逰魚出波聽此橋此屋别幾年轉眼風月凋朱顔幸從塵外覔棲止百步尚有泉濺濺車聲馬聲何日歇每遇橋名輒驚絶橋心何止無水流反惹岸塵高尺一先生詩思本最超更喜畫裏逢溪橋桃花溪南楊柳梢著一斗室如鴉巢我因鄉夢頻生妒君為尋詩盍延佇徑擕秃筆及團蕉明日從君畫中住右溪橋詩思圖寒食出逰詞墻頭無雨聲墻下無草色杏花一枝空復情薄暝吹香作寒食春衣初試欲出門東風吹塵日已昏天嬌南去路如掌楊柳缺處藏春墳春墳高高盡尺五貼遍紙錢知有主橋西燕子飛不停啄得幾家墳上土啄殘墳上土來作梁間塵堂前宴客開酒樽即是掃墓歸來人世間行樂皆如此一邊生人一邊死消沉代謝那得知冷眼却輸雙燕子東風吹塵日向西燕子亦逐逰蜂飛成團蝴蝶出門去屋角幾樹桃花低城陀高低土無隙高種花枝下栽麥老翁往歲食有餘麥穗既黃桃實赤今年無雨桃少華麥隴三月飛黃沙關心歲事各惆悵令我興盡思還家歸來閉戶同誰語一枕輕寒夜如許忽驚飛夢到江南借得鵓鴣來喚雨館僮折梨花一枝供膽瓶中率賦一絶折枝聊復詡春華插向文窗影絳紗蝴蝶一雙來入定錯疑添得樹頭花三月草三夜丁香花下獨坐適法學士式善以庚戌辛亥兩年所作詩屬訂定因跋于後丁香花底展君詩花穗千條月一絲句向卷中吟欲活月從窗裏墮多時商量握管題長句珍重臨風嗅亞枝明日欲邀花下醉更憑殘朵索新詞三月晦前一日清曉獨逰法源寺看海棠花下值馮戶部敏昌因同過寺旁亡友黃二景仁舊寓室已傾圯不可入感賦一首出門誰是看花路縱馬直前知不誤斜行七里破曙光馬不識途能嗅香平明一寺攔街出萬緑衝門馬驚逸客行下馬方拂塵花下巳有先來人羡君何止尋花早花氣入簾餐欲飽十分花事惜巳過砌下漸比枝頭多明朝更惜花無幾窗外怪風成陳起看花人老花莫悲花下幾見常追隨不然花枝南頭兩間屋曾有詩魂抱花宿眠時如鷗立如鶴看得開時復看落如今寂寞鎖幾春花屋祇當詩人墳門闌雨圯紙窗破時聆吟聲夜深墮君行歎息欲出門我更代花招客魂君不見客魂定在花深處怪底曙鴉啼不住暇日校法學士式善張大令景運近詩率賦一篇代柬我詩時苦難法詩時苦易若欲詩筆工兩人先易地張君下筆有古人我詩下筆苦有我若論詩格超有人有我皆不可咄哉詩道匪易言何況雅頌至此巳及三千年誰無好句播人口大扺來往起滅一一如雲煙天有日月星地有嶽與瀆筆端撼之不能動何以奴視荆朱僕賁育若夫一身之內理更該心志各淩爍口眼各闔開不將我之心志口眼寄于古人四體百骸內始覺我與天地錯立成三才不能已于心乃復出諸口為天地立言于我亦何有有所溢于目乃復矢厥音為山水寫照而我何容心一言二言精不磨千語萬語寧嫌多鋪箋直可概八極濡墨真欲成江河然後張君詩法君詩牛腰巨卷擲我我欲頂禮同所師且令前萬古與後萬古得我數輩中立藉可相支持晦日卷施閣餞春偶賦十首紅杏枝前拜朔來丁香花底餞春回冷官一日無餘事祇向疏闌數舉杯經旬常坐此花前花幔愁開日影煎怪底鬢絲都不潤江南拋却已三年白雲間有護花心時墮高枝作曉陰雲起接天花委地欲憑誰與判升沉細語簷鈴那得聞城東風物感羈魂春原一樣平如掌只少菜花黃到門雨絲真欲比黃金尺五間階草未侵九十日春晴過了却餘今日是春陰春殘排日鎮飛沙自掩疏櫺護碧紗誰向燕南記風土屋頭青草窖中花間禽多半向城東花裏高樓面面通不看生紅看生緑天壇十里柳絲風送春歸處敞斜扉星露微茫點夾衣休更梯墻看風色明朝不放紙鳶飛悟徹繁華總是空興來擫笛自西東尚餘幾尺斜陽影要與春花鬥晚紅一種心情小婢猜四更猶自踏蒼苔燕疑殘月衝簾出那識幽人秉燭來惜春詞一風吹自東一雨來自西風催花作塵雨催花作泥作塵飛揚作泥定誰是春花舊心性桃枝欲窺廊柳枝欲窺樓窺廊見客行不休樓上柳眼看春愁入門復出門不見碧天色離離滿徑堆緑陰明月欲從何地白心長夜短睡不甘曉夢亦復歸江南夢時看花醒時呌芍藥如盤向人笑四月十三日張運判道渥招同王給諫友亮劉舍人錫五伊比部秉綬何水部道生胡文學翔雲陶上舍渙悅至海北寺街古藤書屋看花小集分韻得花字一屋如舫門開斜半空吹香不見花入門老幹復橫路根古半入鄰人家抬頭花向竹梢颭一架正把天光遮緑雲𪷟𪷟雜紫霞花朵缺處蜂為衙花光豈止潤睂宇坐久衣上濃香加主人華筵開咄嗟有畫可質無須賖巷南喧喧來酒車花片驚落隨飛鴉以花入酒沁齒牙海濱石首津門蝦更喜蘆筍先抽芽年光慨如赴壑蛇春止一日須豪奢十五日立夏握拳透爪拇陳譁上樹百遍能搔爬酒盞嵌入枝了􅒎不爾恐有旁人拿十三清宵月正華笑視竹影生窗紗忽思逃席路復義一徑却好鳴官蛙到家冥冥吹曉笳袖底香氣留些些自御園回半道逰五塔寺寺中有古樹二株出簷幾數十丈花開覆屋寺僧曰銀杏也為賦一律五塔寺邊雙樹奇馬行迂道欵禪扉高枝似向雲中出落蘂猶能天半飛清磬幾聲催夕照疏香十里點朝衣鄰齋東去春如海寺旁即極樂寺牡丹薔薇盛放較爾濃陰覆院稀草二日侵曉偕孫大至豐臺看芍藥馬聲嘶過柳梢頭宛轉雲容清淺流十畝竟從人外闢萬花如向鏡中浮狂思海國春三月夢斷江城尺五樓小坐不妨遲日出滿汀濃緑撲簾鈎國花堂看牡丹新緑叢邊競吐芽柳陰先為障飛沙縱教風雨無寒色占得樓臺是此花幾日酒中勞悵望有人簾底惜韶華如盤莫向間時笑第一銷魂數謝家崇效寺看海棠入寺先教蜂蝶忙殿前一樹倚朝陽若逢蜀客應回首不作秋花恐斷腸夢雨心情初挹露冠春顔色肯施香紅紅白白看千朵莫更臨風笑野棠題阿少空彌達西尋河源卷子鞭梢生層雲馬尾搖晴暉却行數里即天上側帽忽礙星芒歸雲外一株樹我疑是落棠不然何以夸父擲杖來茲方石林何周遭復疑天盡處不然何以豎亥逡巡欲回步地高于天石壓雲北斗背上生崚峋幾回洗眼望來路祇覺黃氣一縷從東奔漢家西南羌元人鄂端尾去此不知凡有幾一條天路雖分明歷萬萬古無人經飮源三日馬亦靈五色石上飛而行天河轉近滄溟遠三面銀光截雲斷行經萬里無一人立久氣如春日暖乃知山經水注皆放哉眼底甫覔真源回道逢青鳥亦不訝見慣捧日黃人來圖中繪花翎黃馬挂君不見相公奉命安河流怒濤如雷喧七州此時那識鑿空使藐爾巳據天西頭一尋其源一疏委同日奏功天子喜雲梯關北望板桐只隔地中三萬里立秋前一日法庶子式善邀諸同人至積水潭滙通寺泛舟觀荷分韻得學字入門一徑何磽確山鳥迎人如鼓樂繞垣三折到寺樓松櫟圍堂密如幄是時正值新晴後破曙園亭色班駮張顛窗裏先揮翰以指擘箋如可學卷頭祇寫波一層巳覺清光動榱桷苦吟尚厭人聲雜徑上高枝與商榷何生入座先邀客後日出逰期可確時約逰南西門外金尚書園亭坡陀高下石百堆坐啖氷稜與瓜瓝新蓮去菂桃芟核客未及餐遭鳥啄纍纍紅果堆緑陰不問鄰家棗先撲誰人升屋思逃酒墻角銀衫險遭捉樹頭啖果人不知風峭時時墮菱殼碧筒杯好長三尺荷露殊清酒偏濁東西拇陳何喧雜熱暑欲將衣袖濯趁間拉客淩波去忽有小舟無木榷船頭三四船梢兩喜得吳儂體修揱豈惟快飲荷盤露盤底嫩紅時一搦離離百頃生晚涼此樂江南庶堪較坐中誰復吟詩健欲以持橈抵橫槊弄波東去香尤逈指爪時驚刺菱角潭平日落風正生手撼前汀鷺絲覺法學士以康熙巳未鴻博前輩徐嘉炎等崇效寺雪公房探梅詩册索題為賦一律棗花寺裏看花日我後諸君祇百年見説雪公疑古佛却驚梅幹亦飛仙馬蹄聲冷春三月鴻爪泥留尺五天莫哂阿儂題卷末後來應又作前賢
