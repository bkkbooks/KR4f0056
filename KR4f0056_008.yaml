front:
  text: 更生齋詩卷第八
  hash: sha256:539eecd53a8ed541300e72b95865f03af185977cad9d636e8436aff60858c7db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_008-1a}
body:
  text: 陽湖洪亮吉著北郊種樹集讀史六十四首大九州藏小九州大瀛海外水仍流九州各有開天聖迭拄乾坤到盡頭啾啾唧唧四邊鳴造字臺邊夜哭聲足見一篇無鬼論便從上古已難行一粟先看世界浮女媧搏土不曽休自從未有人行日玉兔金烏已出頭魯陽戈已嫌多事第一尤憎后羿弓正要不分昏與旦懸他十日照寰中棋家國手説秋儲此局開從允子朱破盡工夫究何用笑他一著竸嬴輸何須刻意别靈頑物物同生宇宙間各有出奇爭勝處翼填東海擘開山蠶食何堪四面來陽人負黍踵難回周家八百年天下末路惟餘避債臺曉饌牲牢夜擊鮮華堂養士各三千何如五百田橫客蹈海都同魯仲連督亢先看具地圖樊于期忽仰天呼燕齊海上多奇士狗盜要難及狗屠一椎一築一匕首三客果誰能策勳滄海君來亦無用先知獨讓滈池君開國先愁乏遠圖西都習尚逮東都漢家一代崇虛誕黃石兵書赤伏符緣知隆凖是真龍白帝先愁試劍鋒功狗已烹高鳥盡祇留一雉雊深宮萬卷先從客舍儲撰成八覽紀乘除笑他只善居奇貨也學虞卿強著書漢家中葉慶連綿元狩元封國祚延天上歲星來執戟如何天子不長年前殿危言批逆鱗後宮恩重亦忘身朱雲折檻熊攀檻越顯名臣與美人蘭茝招魂些續歌椘天萬里不生波願將魚腹詞人弔文考湘江屈汨羅宣元以後治優柔況復專朝有五侯正與商君法相反虱官不去鼠姦留客未登車主候門世家家法已無存史臣倘為宣尼諱十四傳中削此孫烈士傷心古道旁一生曽未值孫陽却看老驥還千里正負鹽車上太行法堯禪舜亦家風二十韶年作上公不見露臺曽惜費偏能全賜蜀山銅著書空費萬黃金剽竊根源尚可尋呂覽淮南盡如此兩家賓客太欺心並世才能識魏公死猶兩女嫁英雄炙雞斗酒無多費我欲時時酹冢中大將王常太尉牟嗇夫遊徼盡通侯東京人物寥寥甚卓茂居然冠輩流同時北海出儒宗邴管仍堪合作龍畢竟漢朝經學貴黃巾爭拜鄭司農祖尚元虛自晉賢黃初人物已開先漢家盛日尊黃老不習南華內外篇霸業王基並有因轉嫌封拜不酬勳虞侯賜劍燕王刎恐負難兄付託殷謂孫大帝宋太宗東京文格本來卑一字無慚語亦欺不被古人瞞到底曹娥碑與郭君碑多金贖女出丐奴友誼曹瞞絶世無愧煞君家五官將刀頭難赦仲宣孤聖證篇成漢學亡六書訓詁孰推詳一編難與專門較杜預春秋寧榖梁家世何應出阿戎嗜錢鑽核作門風葫蘆麈尾皆長柄莫哂南朝王侍中絃歌小邑最風流一令寧輸督八州強使名賢附華胄泉明地下亦包羞江東王氣總綿延晉宋梁陳代屢遷只有蔣山惟一帝居然香火占千年白雀空矜一世才新支堡下忽徘回死胡尚嚙生天子何怪堅頭入夢來漁人何事舌偏饒厯數炎精迄本朝從此桃源不淳古并知劉石與苻姚虛無上八洞真仙稗史新傳委宛編不信堯時白蝙蝠能知混沌與開天已見苻堅過項城八公寉唳與風聲淮南雞犬都仙去尚剩沿山草木兵妄思成佛反遭魔厯劫應知負債多何必贖身同泰寺纍他臨殁喚荷荷武都山接谷軒轅百頃仇池富水源不是氐羌來據險人間此亦種桃園蕭曹丙魏冠西京房杜淪亡姚宋生只有漢唐人物好中興開國盡名卿三峯髙接華山巔下視蒼茫幾點煙不是謫仙人在世好詩誰敢問靑天胡雛相異兆生時鐵額銅頭并護持制得豬婆龍死命僅須一箇李豬兒中唐風節數韓公詎止文章一代雄異類強藩盡低首王庭湊與鰐魚同總是滄桑劫裏來唐除丑口呂書回何應一落金門第不作仙人即盜魁萬羊太尉李文饒食料誰知命所招日啖半升原作相何需八百石胡椒轉覺雙鬟有定評旗亭聲價一時傾怪他九級慈恩塔遍檢都無李杜名絶代才人韓致光百篇詩句一奩香虎須捋罷吟么鳳鐵是心肝錦作腸𫐠怪稽神作語林誰知劫數已相尋冠貂衣紫人如豆篩下南朝徐楚金年名五代不多時七姓官家盡健兒辛苦九朝長樂老朝秦草楚費支持魯論半部篋中藏垂老應知亦健忘怪底一朝多語録用他學究佐興王香孩兒事最堪疑滅迹思將一代欺身上黃袍袖中稿製成恐不是臨期百事都嫌強出頭扶乩壇上亦來遊神仙何苦名心重處處題詩向酒樓詩案曽留御史臺憸人亦轉歎奇才雄文却要蛟龍助不枉先生過海來尚書别有古文傳西蜀才人著太􅏏僭聖亦同非聖例楊雄梅𦣱趙師淵今所傳通鑑綱目實朱子門人趙師淵所作揚以太􅏏擬易趙以綱目擬春秋與梅賾撰偽古文尚書其罪一也一成一旅總堪憑萬頃洪濤一葉淩不據西湖據東海趙家端可號中興儒林道學本同原分傳翻嫌史例繁只我欲書三獨行石工軍校鄭監門石工安民殿前軍校施全監安上門鄭俠萬乘曽為孤注來惹他讒口一時開契丹西夏非強敵祇覺中原乏將才七尺終當死報君黃冠南下屬傳聞一編琬名臣録都讓王家生祭文戴主恩如戴昊天投荒百日準歸田家風尚愧鄱陽集雪窖冰天十五年詩情畫筆號專門三絶雖兼格不尊説到彥回先齒冷更誰人數趙王孫讀史常侵夜漏餘時時一夢到華胥可知不在靑天外竟欲乘風去卜居都似空中飛鳥過強分名目費編摩試將列傳平心看一代傳人本不多千日中山醖已嘗便須一鍤冡中藏伯倫死酒非真死想要逃名入醉鄉飮啄何須更好名修真先要近人情烹龍炮鳳瑶池宴誰説仙家不殺生晉代旌陽唐李筌是誰人已得真詮近來老輩神仙少數到元時白玉蟾寓興一身從何來父母之所卑既須建修名亦以綿世繫受全歸亦全所係實非細瞢然魂魄化仍與親附麗一一返厥原同歸天與地形骸既速化齒骨朽亦易留貽世間者不滅惟此氣古人善讀書書亦本來少經年可卒業不必徹昏曉沉酣六經外袐籍偶􅊧討方書亦無幾素問及本草百二十國書一一名作寶少才能肆力多即難見巧陳編逮今日富至不勝考所以無用書空資蠧魚飽天地雖至大物力本不多惟兹樽節心為能養天和日食數萬錢遠聞王與何飛走不得逃高下設網羅曽誇鱉重裙兼詡四足鵝風俗近益奢背峯炙明駝俊味罔不登􅊧及燕雀窠末流心竊憂詎敢揚厥波非有求福心又豈懼譴訶甘受鄙吝名不敢知其他學術本一途後乃判釋道魏收最無識作史列三教三教中復分十百富名號爭奇仍鬥捷一一欲建效遂令淸淨域無事亦爭剽民生半無業物力因已耗合一縱甚難何不各守要兼收更非計分路或同到惟求心所安誓不惑果報新進喜事人不可位相將持其一偏見遑復計得喪紛然變成法畢竟無一當古來大聖人貴𫐠不貴創周官不善讀邪説復首唱靑苗市易行天地為播蕩巴東亦不免時露好事狀偉哉無口瓢此乃真宰相側聞飛仙人上者居列洞騎龍跨鳳外頑石亦能控遊行一世間風伯自迎送怡神雖足樂于世究無用況經年五百劫數亦殊重我意不謂然隃糜復時弄空言如有裨後世亦諷誦無為守丹竈寧可抱酒甕化人王無功日昨屢入夢沉冥雖巳久顔色益飛動醉鄉苦無書為寫酒德頌家儲萬黃金或者有憂色行乞得數錢陶然樂昕夕賤者未必非貴者未必得置身豐歉外庶不為物役鍾乳一千兩胡椒八百石縱如彭祖壽亦恐難畢食徒然使後來笑聲千載劇少歲盛意氣不願為詞人垂老筋骨衰勤力始作文投荒昨歸田松菊僅有存親亡逮卅年兼復鮮弟昆偕老願亦違骨肉滿墓門尚幸一室中不乏子與孫久客偶一歸旨酒又巳溫僕婢立我前勸我盡一樽慰勞固多方嚬笑恐未真欲營山水區庶畢勞瘁身持此一寸心不死期報恩北轅窮大宛西轡隃棧閣洪河狎蛟蜃滄溟截鯨鰐回思至危境亦即寓至樂豈惟豁雙眸胸次亦已拓丈夫處閭巷百事苦束縛終年心賞處僅止一邱壑低瞻慙赤鯉髙視愧元鶴寧知轆轤屩天外亦飛落平生無别嗜有景必􅊧索生當恣遊覽死即安冥漠一世誰最愚南山石成槨束髮事結交良友堪悉數文章與談宴各有投合處立身復不同分道各馳騖揚雄性沉默逡秀欣世務君看華與管始合分末路彼此不必非邪正性所賦即如同學者意見亦參互王何標理解張趙崇傳注璣稱善名物曜乃詳訓詁一得皆可傳無須學跬步君看天上星東西各分布飛何必嗤走赤亦難誚素絶交論亦褊故者無失故學術尚周孔治術尚黃老漢家西京前異説不得擾官皆核名實學亦具師表黃初尚元言配老乃以莊治術日以頺沿流益荒唐明道崇理學升孟以配孔專門學益希語録衍千種寥寥一千年感此風教殊實政罕逮民私心競師儒誰祀周元公誰讀軒轅書獨遊水西登煙雨亭久憩追悼朱學士筠江太守恂壬辰四月曽同遊此山城一水環如帶雙塔影飛三里外行人望塔路不迷斜日已過山城西别來江水依然緑竹樹千尋路千曲林梢盡處立一亭日氣轉赤煙光青亭危一角驚先拆使我傷今復懷昔春燕巢空春草枯憑誰更問春消息當時逸氣橫九垓桃李迎客爭先開寧知過眼若飛電三客坐處生莓苔卅年舊事愁難再何況風光隔千載龍徙空山杳莫尋寉歸華表寧能待芒鞋已倦蒲帆舉别意惟同夜烏語行客多時怨水風危亭入夢仍煙雨過水西渡已作如塵似夢看殘春曽此一停鞍能迎三十年前客只有參天竹萬竿靑弋江舟行順流轉比逆水難北風吹水欲上山風中歸鳥性偏急逆浪逆風穿樹入靑山影外溪流足溪水亦輸江水緑水西明月來水東却罩一角斜陽紅夜起窗櫺髙下緑低迷夜半何人發水西留得月䀶剛一線却教山鵲盡情啼長至後一日消寒第一集諸及門餞余洋川書院之生雲閣分賦得山樓即事四首前宵雨初停濕霧一山皺白鳥入白雲延回飛不透樓閣三百家溪流自環繞澗底出笙歌年豐賽神早却倚靑松樹迤東築小樓昨宵驚驟冷靈鵲宿牀頭紅林千百株一夕已無影山風颯然來巢禽各延頸蕪湖喜晤張太守祥雲時攝道事暫移五馬駐雄關意外相逢遞往還同輩漸如秋後葉異書高比屋頭山人傳海上魚龍橫時洋匪在寶山嘉定一帶滋事我共江干鷗鷺間濶别十年重握手喜君靑鬢不曽班答友人贈梅一棹欲歸江浦五株誰贈溪梅却掃軟紅塵去安排蕚緑華來港口小泊濛濛雨細天垂黑白鷺欲將行客嚇眼前風浪轉不驚飛鳥蹈空人跖實消寒第二集陳孝亷懿本招遊蕪湖城東沿後湖隄至三昧菴看黃梅作後湖三百頃煙霧忽微茫寺作前山界隄真夾水塘瓜分留寓縣東晉時改蕪湖立襄垣定陵逡遒三僑縣果熟薦空王坐久還成雨黃梅發古香十五日晚自東梁山移舟至西梁山泊晨起阻雨東梁山上雲欲作西梁雪移此江南舟過江看落日江干三尺霧又向江南結三更迎面雨隱此當頭月巳有曙鵲聲愁霖苦難歇守風西梁山竟日雲從西走東頃刻一山出回瞻東梁山復向雲表沒寧惟南下少北去帆亦絶檣烏與林鵲對語較淸切荒庵懸陟岸正晝色如漆我倦亦枕書陶然醉終日舟過蕪湖始聞彭尚書元瑞之訃謹挽一首不求立異不從同十載追隨朵殿東編集會昌名一品蓋棺光政贈三公沒後奉諭旨仍贈協辦大學士升沉總在雲霄上公自副相降補閣學復擢侍郎尚書皆直南書房恩怨都銷氣焰中最惜石渠天祿署更誰博物比司空公聞見最博尤悉本朝掌故一時無兩十七日晨起北風尚徑書此遣悶昨宵雨如煙今晨雨如霧多謝西梁山留人三日住咫尺不見娥睂開山溜隱隱喧驚雷明朝未敢望江浦只願征帆泊牛渚是日晚抵采石因獨遊三元洞作西來長江一萬里盡向石竇光中收回頭滄海亦不遠初日欲上潮驚流孤僧聽慣亦不訝枕上長江六時卸長明燈燼巳十年空水光中不知夜夜起登太白樓凖擬宵深秉燭遊然犀亭下泊扁舟青天無月人無酒辜負三更太白樓十八日早自采石挂帆將抵江寧訪孫大星衍先寄一篇即以志别時將赴山東監司任今晨挂席思凌空五色己曜帆檣東舵樓翻書未一卷席帽亂捲三山風新睛水面鋪朝旭影外波濤尚如斛艱危厯盡心已平水狎黿鼉岸麋鹿此時却憶單居使可己乘流向揚子白髮樽前有底忙素心海內無踰此河流雖濁官能清河隄使者憎好名得間篆仿徐內史好古客呼劉石經功名試問誰能足仕宦我知貧最樂他時靑兖來看山北扺二嶗東岱嶽十九日早過烈山作烏江浦口暫徘徊昨日舟從采石開半晌柁樓眠未穩六朝山已上帆來十一月二十一日消寒第三集胡戶部稷昆仲邀同孫兵􅊀星衍冒雨至小倉山房探梅并留飮小眠齋即席賦呈並贈袁公子遲曽見郎君入抱時傳經近復課佳兒古梅似向間人揖舊事都應老寉知墩割一隅袁大令枚即葬山房側埋謝傅錦留五色付丘遲談深紅燭全銷焰門外三更雨若絲十二月二日消寒第四集李兵􅊀廷敬招同人集平遠山房觀宋四家墨迹即席同賦裝成橘頌荔枝詩尚憶煙雲過眼時余久客畢宮保署見所藏宋四家至二十餘種尤奇者蘇文忠橘頌蔡端明荔枝詩也一代傳人原磊落百年真氣藉扶持寒梅消息遲霜信殘臘心情付酒卮我是庾公樓上客摩挲故物劇相思題秦宮人曉粧圖仙雲如綺復如羅天上新看鏡乍磨錯認廣寒宮小集一輪圓月一恆娥李兵􅊀以會勘江浙地界泛海至羊山信宿公事畢繪泛海圖屬題率成長句以正一帆出海何飄然五百甲卒藏戈船帆檣解與潮勢鬥五色幢上蛟龍纒竿梢時浮復時沒蜃氣回環一山出海風吹人若步虛却及島中方履實誰言海外一事無文案積若牛腰粗經時履勘事甫竣瞰海絶壁如浮圖故人尚有洪崖在挂席何應不相待請公别買一葉舟我亦時來看東海初四日消寒第五集李明經筠嘉招同李兵􅊀廷敬何徵君琪陸孝亷繼輅林鎬儲桂榮楮華李學璜鮑熙改琦徐棠諸文學並鐡舟上人吾園小集時余以明日旋里諸公皆即席賦詩相餞醉後率答一篇即以留别一寉引一客間步汀西頭汀西閣上人一一如眠鷗元裳丹頂時窺牖野寉居然戀紅袖有時合隊出探梅七尺亭亭影俱瘦簾前新月輝簾外踈梅開春人結束登春臺鼓吹復從門外來主人約客排宵宴落日暉暉坐中見陸郎年少飮亦豪十七人中稱最健香巖儲髙詠竹圃鮑歌激得閣外生回波就中匿笑何春渚七十風懷尚能補坐中有歌者四人解衣作畫改七薌我亦石上題箋忙鐡舟開士詩才逸畫筆年來亦如鐡謫仙開衙東海頭好客絶似劉荆州穀人詞老梅村叟前後可稱雙祭酒時遲吳祭酒錫騏以病不至微嫌病酒及十旬明歲花開可來否一更飛觴至二更坐上客始連翩行冥濛歸路不知數幸有導騎持燈迎君不見新知雜故知卜晝又卜夜三更未醒船已行挂席當從蠡河缷鐡舟上人邀至南園早飯晨餐未了午雞啼好客應知劇孟齊上人坐上食客嘗滿一味孤行最相稱公參玉版我黃韲舟過昆山有感徐司寇乾學王司農鴻緒舊事率賦二絶句傳是樓空水榭荒百年先已感滄桑早知身後名皆在何必師生軋百場司寇奉命所修一統志及司農明史稿皆係可傳之書人言太僕繼南豐微覺前賢面目同我讀亭林居士集不求工處自能工初七日消寒第六集瞿應謙别駕擕酒招遊虎丘久憩生公石時宿霧漫山飮畢不見一人悵然而返分賦得石字山僧啓山關驚出雙逸翮寧知擕榼者先巳候門隙僧寮雖未啓己布行客席樓臺丹碧影裹此寒霧白三載偶一來為歡感今昔兼擕亡友句時適擕亡友遂寧張問簪詩為閲定久憩生公石同儕攖世事一晌間不得時待諸同人並不至千人石上苔寥寥坐雙客臘八日破曉過錫山作山雨接天白破寒溪上來北風吹别袂南酒勸銜杯宿鳥依林顫驚魚蹴浪回呼僮泛膏粥聊賞膽瓶梅先壠側形家言尚有昭穆二穴因以昭穴葬亡婦而舍弟冡適被水漂遂遷葬于穆穴自此先壠已無隙地他日子姓不得更附葬并作此詩以為戒約暇日復課兒子等添種松百本作籬衛之庶幾封殖之義云爾憶從葬西原子姓殊不少一輩課十株佳柯已繚繞冬青女貞樹墳道藉以表東南離百步溝水成曲沼春到上冡船粼粼碧波小經營三十載齒髮慙已老無貽地下羞吾行倘堪保十步依我祖五步依吾親料量松柏株芟此荆與蓁石几清且修藉以列俎尊吾弟近亦遷庶免水嚙墳弟冡為水嚙墓門爰遷袝穆穴全家骨肉多欎欎滿墓門統計一室中誰亡復誰存恆幹有自來吾以還二人逐臣西戌日卜冡渾河源回頭蔥嶺高萬仞瞰北原豈知螻蟻微竟荷天地全荷戈復歸來衣敝履亦穿得袝先壠旁此事豈偶然願既遂首􅏀萬念盡可捐所慙德未酬以朂子與孫憶昔初結褵白雲溪畔室追隨三十載亦既衣翟茀一朝人事改丹旐屋頭設明明同命者今日乃獨活忍心奚若此委彼在林樾翁姑歲時饋地下冀修潔却待松有濤吾行亦歸骨十七日消寒第七集楊上舍槐招同趙兵􅊀翼莊宮允通敏劉宮贊種之金太守􅙺方明府寶昌早飯石竹山房復至秦園茶話始别分體得五古一首春筍未及抽石竹已成列草堂花氣暖無異宴春日主人工治饌厨婢亦修潔溪魚及園韭日昨已梳剔樽羅會稽釀盤滿洞庭橘寧惟充口腹志意亦怡悅尤欣嘉會早宴罷日方昃復有縮地方秦園茗堪啜宅北有茶亭仿錫山秦園為名更生齋獨坐更生齋獨坐俗客無一到圖書堆滿案藉以拓褱抱主人五十八始覺有白須蓋棺無幾時所幸樂有餘前時葬山妻日昨哭亡友平兹萬古愁庶藉一杯酒林梅既寒香水仙亦幽姿呼兒開甕頭屈指當祭詩讀歸方伯景照猶女佩珊詩册率跋一首時聞方伯已從戌所旋里即以寄之每詡嬌兒筆陳遒憶偕臣叔戌西郵李騰空仙不旋踵段秀實歸仍戴頭種樹經曽擕萬里方伯在塞外蒔菊種至數百簪花格已定千秋東山絲竹真堪慰各有深閨侍唱酬過白土鎮古縣華陽驛前朝白土鄉剩坡餘臘雪微雨出朝陽月向螭頭墮人從驢背忙盤飱思往事乙未冬過此本鎮茂才紀開旭以盤飱斗酒見餉頻問讀書堂青元觀仙人髙臥處觀後即葛仙翁大冡一巷亂雲飛列闕真如峙蒼松相與依鵲靈朝語警寉古道身肥法侶來迎客仍穿禮斗衣重至句容展亡友王廣文吉士殯率賦一篇即呈令兄司馬周南理問斗南卅年不到華陽岡岡南栝柏都巳蒼縣中老友誰更健腹痛最憶西頭王與令兄周南分居東西宅當時賓從頻來往修竹山房及西舫漫士心情沈隱侯校官風度王元長騎驢已倦牽車來醉客何止三千回淡香吟屋賦詩處采筆一一埋青苔朱茂才鏞及令姪潞暨駱秀才三竒均已下世孫郎遠宦鴻河口我亦荷戈天外走前時白夾諸少年相對各驚成老醜青元館前訪葛仙更向鳥翅岡頭眠三峯遠復有前約時將遊茅山道士待客排雙筵城南欲别頻回首復挈城西草葊酒一杯酹爾應快心生友竟堪成死友臘月十九日消寒第八集王司馬周南招宋學博保暨令弟理問斗南文學簡可陪遊獨寉山莊看梅歸飮修竹精舍即席賦贈分韻得莊字三十年來事渺茫塢中藤蔓屋頭桑何期句曲羣仙會重醉先生獨寉莊天上黃人曽捧日時話西清舊事月邊靑女自飛霜遲眠緩步消餘酒嗅盡寒梅樹樹香二十一日自句容沿破岡瀆抵緑野村裴主政暢招同楊文學鳳翔暨小阮中翰錡上舍針集金粟山房作消寒第九集并約明日同遊茅山即席分體得長短句一首我飮秦淮水欲覔秦淮源荒岡百折走不盡側耳已聽流聲喧未遵赤山湖先逢破岡瀆古澗寒流三尺足其上莓苔蓋深緑關心七日即小除爆竹響已盈衝途年殘只我無一事尚向山腹􅊧竒書道人相貽緑玉笻一笑欲上髙髙峯寧知遊興昨方發大茅山頂雲先紅招邀伴侶皆踈散祀竈黃羊亦充饌饋歲人貽赤鯉魚經時我啖青精飯主人頻開緑野堂更約入夜傾千觴一門羣從悉來謁問我何事投遐荒遐荒萬古風沙集我感君恩仍雨泣不是天邊早賜環何能地上周遊屐陶貞白葛仙翁拍手空際欣相逢神仙大半遊世上宰相亦復居山中清涼境地真殊絶一樹寒梅一甌雪我向梅花樹下眠羅帷夜半飛明月遊裴氏園亭深澗遊魚五色小樓乾鵲千聲寒日欲斜松阜亂雲已暗山城破岡瀆夾岸皆栽桃裴明經針于此送别更約花時復遊因作此贈之破岡瀆後亂山多結屋欣看傍澗阿此是碧桃花世界不妨開日更經過入茅山自黃仙墓至乾元觀宿死非死生非生黃仙蛻處還留塋出不出處不處宰相居山究何補平生不解陶華陽念念都欲縈君王惟餘一事差快意愛聽千尺松聲涼宦途不礙神仙境句漏旌陽兩仙令但使能修駐景方周妻何肉都非病我來依茅岡咫尺鄰荒墳山風蕭瑟溪水溫夜半白狼來叩門山北尋老君垂雲諸洞半月西巳墮半月東復升團團滿月光莓苔結三層一洞嵌碧月一洞垂紫雲紫雲欲下倏復上離地驚看不盈丈髙低元氣若吐吞一朵宇出驚當門其餘一朵復一朵忽若雕盤貯新果朵雲盡處叩石鐘復有雷鼓聲隆隆君不見蠻中飛雲亦已竒此洞何止雲能飛洞中英英鋪不足却惹生雲夜來宿乾元觀夜起乘殘月看梅萬夢初醒處回廊厯幾周好花紅蝶背新露白烏頭徑轉風千尺簾斜月一鉤是誰喧客耳春水竹中流宿乾元觀有懷孫兵􅊀星衍百轉千回厯欎岡跨驢前事渺難忘曽擕天上神仙侶來憩山中宰相堂今日故人分出處更憐餘子半存亡乙未冬同遊者兵􅊀外為林公子崇緝與及門鄭聯華今均已下世蓬萊海水都清淺道書以陶貞白為蓬萊都水監故及之畢竟誰尋駐景方張太守鳳枝謫戌伊犁以愛姫冉寄其姊滎陽令署華太君處越歲太守札致太君偶不及姫姫本思憶成病復因是銜恨遂雉經卒太守自戌所還傷之屬賦此詩繁臺幾化望夫山却待征人久未還情到死生何以報揮殘老淚入陽關七千里外别銷魂姫貴州人十五年前誓尚存郎不薄情儂薄命再生端欲入空門地府永埋千載恨天山不寄一行書傷心三尺生綃影入夢多時尚未除索嶺盤江歎遠官相隨幾見月團欒定情金縷裙猶在摺向空箱不忍看東坡南海公西海草雨朝雲夢總空寂莫小桃墳上樹異花猶染淚珠紅魂小仍隨油壁回憶郎門向裏河開築他燕子樓千尺供養平生畫像來瞥見驚鴻影未真在貴陽日太守曽喚姫出拜靑綾步幛動遊塵多應平視劉公幹罰作新詩悼洛神尚有西臺讞案存誓心終不出侯門九原若遇河陽令謂陳大令熙藩時亦久卒更欲低頭拜昔恩小除日更生齋招諸同人祭詩年殘風雪寒良朋悉遄歸如何未入春石砌已墮梅東西比鄰中雅有數子才招來更生齋相與銜深杯諸君盡華年感我草景催送客復入門晴陽尚暉暉趙司馬懷玉自山左奔喪歸同官贈以一舟至淸江浦渡河膠敗舟坼八口幾至覆沒以救得免司馬作厄解自嘲并索余一詩記事大舟峩峩髙百尺敗久無人肯相索先生途窮欣得之輦致妻孥及書策忙中方渡天妃閘意外忽趨河伯宅無端宇起尺一波竟敢馮陵四千石兼攝本郡馮生詎欲謁陽侯展氏不關多隱慝艙無阿堵物堪羡舟有辛餘靡亦坼郎君幸免魚頭戴如願本從龍窟得篙工舵手聲齊奮撒網持鉤拯亦亟微軀險欲為人鮓定例并須援嫂溺孤兒一日三番哭水厄仍兼絶糧厄推量其故亦可曉至寶隨身遭迫逼龍神要看瀧岡碑鮫府思􅊧辟雍刻不然畫寶吳道元或者字藏黃魯直遭風濕米考竟升落水蘭亭價誰敵評書既貴屋漏痕佞佛本當衣壞色但令釡底不生魚何必篋中長貯帛罷官尚飮八閘水助葬誰貽一船麥可憐剩有朝衫緑亦復染成天水碧窮經先已集坎坎讀禮還遲卜窀穸曝日神方時傴僂見星歸路難匍匐髮膚未毁真天幸妻子得全容衆力王楊盧駱半遭此君曽刋唐四傑集才大例須沉澤國先生盛名亦不減一死何妨塞其責即令萬一免沉淪從此尤應斷縑墨如何更不思愆咎更準解嘲成解厄君毋更以性命戲勢必重遭神鬼劾一官靑社既偃蹇三載堊廬須簡默仍愁溺後陸士龍照見麻衣笑聲劇受業曹景先校字
