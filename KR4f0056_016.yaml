  text: 卷施閣詩卷第十六
  hash: sha256:c66af52965758af004f3eea4d58d31210102ee005cc8af5eceb2ddc97e6fbefc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_016-1a}
body:
  text: 陽湖洪亮吉著蓮臺消暑集乙卯乙卯人日早登黔靈山扶雲入山門一壁削天半青松三百樹直上寡曲幹危崖嵌樓閣懸處鐵索斷開軒同客話響與禽雀亂窗紗裂盈尺臘雪尚堆案僧延翻佛藏石匱鼠驚竄雲光開半郭下視起煙爨東西萬家屋驛道復中貫一徑促下山藤枯屢縈絆嶄巖生對面欲下削如岸風寒砭肌骨坐處裘屢換忍凍舌本強輿丁尚揮汗回途自郭外東轉至雪崖洞小憩危橋背郭幾人家石徑東西路轉斜清淺溪山浮曉日冥𪷟樓閣散棲雅間身乍懶非關病春氣原馨不繫花一帶壁龕藏古佛幾回欲與論年華十五日立春元夕春百年少日月食皆逢卯鴉聲愁鵲聲喜兔申頭虎曵尾雷憑憑電光掣春朝風元夜雪二十日送客久憩圖寧關黃塵飛百尺樓上馬蹄聲道古高于屋山奇逼若城闢軒春睡足窺徑晚煙生莫更留行客勞勞尚半程二月初六日偶成春雲黯黯飛一城城角缺處花枝橫風吹折枝供膽瓶不向樹上箋其生烏烏角聲吹不停憶昨夜過三千兵山陰美酒貰百瓶傾耳欲聽苗蠻平時銅仁苗匪滋事巡撫以下並領兵親往羣公花下來駐旌醉過寒食兼清明初十日侵曉至龍場銀燈影外星初落一山開雲矗樓閣冥𪷟花氣不知名十里曉風浮絳蕚花前鶯語聲猶澀花底春衫著疑薄晴光艷艷鋪郊甸青氣茫茫注巖壑馬頭回處客亦驚却值曉暾紅出郭阿江汛道中一山途四出曉日正當頭好鳥背人立清泉擇地流霧歸僧閣暗雲出寺門浮半晌沿林走偏忘路阻修杏花一絶屈指好春惟二月稱心小閣却三層多應獨夜愁無侣來向書窗惹客燈十九日出城東門看花至芳杜洲作只有尋芳興未闌間排僻徑出層關淡紅十里杏花路淺碧四圍楊柳山夢好尚憐春思冷塵飛時望捷書還征東將士應無恙何日先平板楯蠻時銅仁逆苗尚未授首曉發龍埸二月氣尚寒蟄蟲扃未啓冥濛菜甲花飄黃十餘里南瞻黃盡處一線日初起人家依竹木分半住坡底東風灑然來綻此桃與李宵露濯滿枝浮香出垣裏寒鴟蹲屋角兩兩鳴未巳一晌雨復來高原忽如洗延江道中桃花巳全紅李花未全白翩翩馬上人高比花逾尺初陽才出樹紅紫相映射花梢度人影花底縈馬䇿西顧殘月䀶冥濛淡無色沿溪籬落好風定爨煙直香氣不可名交飛蝶如織早渡延江蠻鄉居巳久不復知蠻中蠻水一彎緑蠻花千樹紅蠻人如飛禽舉足能蹈空但覺雲四飛眼底青𪷟𪷟倏忽下萬山驚流蕩心胸青緑漬一堤撲此睂宇濃解纜語未完舟巳當水衝中渡驚語聲我僕留岸東蒼蒼鸕鷀羣送客飛逆風將至螺堰塘白雲埋西山雲破花一谷花光接雲氣交處香斷續沿山行十里稍覺展地軸高下極水田參差萬畦緑波流縈折處臺榭亦回復溪魚能入市驚筍穿石腹日午飯巳香幽人候茅屋養馬塘道中延江及播州山勢忽平易坡陀騎馬入逼仄始見地衡門兩下屋搆製亦微異曲巷分數門平堤溢川氣連岡西北展斜與碧天際居人汲深泉百級盤石砌雲容間梨杏稍覺天宇膩一頃黃花風牛羊下山細曉發遵義四十里鋪𪷟𪷟雨不停十里天尚黑春塘白鷺絲寒傍梨花立沿溪數十家斜左窗並啓風遞人馬聲吹笳入雲裏遵義試院二月春光好幽尋使院西草迷儃室暗花壓步壛低馬病離槽立禽間擇樹啼樓前小家巷時聽屐衝泥二月晦曰使院小樓看桃花長水捷書當可逹銅仁逆苗聞巳進勦尚未得實信播州春雨不能晴山圍城郭常時暗花發簾櫳徹夜明精舍未妨勤課士粗官聊願與談兵如掾紅燭燒何事樓上間來酒獨傾試院小樓獨坐柬嵇太守承孟風光多在小樓西無數山雲壓檻低與客生踈惟燕剪背人開落有棠梨酒逢地主慙中戶君量最宏札報天兵過五溪時得福公相書言巳幸黔兵入辰沅間矣早晚捷書來郡閣春融拚共醉如泥曉發遵義深淺山拗內時浮一樹花白猶零露雨紅不見人家澗水碧于玉雲光薄似紗面西樓閣好翻恨路東叉八里水塘道次十日雨始晴高原鬱春氣連山亘南北濃緑漲天地斷嶺一以開花紅亦無際連綿芳草合來路渺難記幽香惹行客處處欲停轡竹屋三四家鳴泉響頺砌臨波亭自好新筍大如臂窗櫺紅八扇花裏自開閉簫鼓知賽神村厨爨煙膩鴨溪行館一巷黃鸝語多于雞犬聲酒邊人去住花裏徑縱橫戌火上樓見山泉傍榻生居人最勤力月黑未歸耕石壁塘道中一程六十里昨午發蠻郡窮鄉不知途祇覺嶺奇峻坡陀懸絶處十退乃九進人方驚失足頭上鳥飛迅敗葉巳隔年因風尚成陳輿夫行視地石削利如刃岐途仍百出荒絶少人問冥𪷟山澗緑壓客睂宇潤一晌花氣紅山村巳知近發半水塘南原寡桃李桑樹圍成村桑葉尚未抽稍待春氣溫居人數十家咸闢臨水門無事遠汲勞清泉繞山根山厨豁然開餘􅅹傾瓦盆斜左一徑寬呼聲集雞豚深屋復數重遠揚簾幕痕巳有白髮人樓頭曝朝暾度虹安礄分半溪聲作雨飄暗風時復響餳簫百重花路行初透又踏春紅過小橋短篷風捲落花多却趁春晴曝雨簑捉得鯉魚長一尺小舟如葉旋回波宿沙溪行館依然下馬厯重扃宛轉房廊屈曲屏添得蠻中一旬雨屋頭山比去年青風光都被亂雲遮水閣南頭路較賖看到小桃紅盡處夕陽幾點著歸鴉過三重堰上嶺蠻方積煙霧日午氣始開梨桃搖天風引客上北臺衆山西南趨中峯獨東回迤左削一崖俯瞰緑萬堆值此春雨餘山泉響如雷飛斾過北林飢烏巳驚猜半道值戌樓復有畫角催陰寒中人深屢剔衣上苔稍休下前山呼童剪蒿菜渡渭水橋晚抵牛埸塘崖東無暝色一谷李花明澗底水流響雲頭人語聲半橋楊柳占獨徑鷺絲行正有衝寒意欣逢候火迎黔西州廨海棠一株大可半畝到曰花正盛開喜而作兩年心迹寄喬柯喜向花時整玉珂碧澗雨餘泉溜急紅闌風定日華多山光著客濃于酒簾影隨雲逝若波要與東皇再三約好留十曰待重過看墻外桃花池臺斜占水波東無數繁枝壓砌紅醉裏似聞鶯燕語桃花顔色稱春風宿海棠庭院墻頭香氣時飄忽騎馬入門絲雨歇春風亭外二分花夜色簾前半規月梨桃杏李春事忙參差一畝橫海棠三更窺徑花如活紅氣入窗蒸夢熱自黔西州至新鋪道中春陰何重重花外路如墨擡頭見鳴鳩咒雨一雙黑坡陀過新鋪稍覺徑夷直高原三日雨千頃抽宿麥溪山最雄竒大氣自闔闢森森松柏幹雲外挺怪特生苗饒種類作屋崖畔匿年來厭追呼塞徑橫巨石居然判畦畛遊騎停不得遙望一畝花沿波弄春色寒食大定試院試威寧等三州童生竟日坐聽事作日午臺前試夾衣柝聲清脆掩雙扉多應人氣蒸如雨惹得梁禽觸紙飛十五日薄草作枕上紅燭攤書看貂裘壓被防晚寒離居誰信是寒食簷外風雨來無端登樓試聎山南北薄暝窗櫺巳無色萬點歸鴉何處棲冥濛壓得桃花黑清明三年寒食住三州前年在安順昨年在黎平並皆扃院試士一樣攤書據案頭春半雨多頻臘屐蠻中花好不登樓扄門鶯燕時來覻出谷烽煙昨巳收時得馮巡撫知會初二日在嗅腦勦殺逆苗二千餘人正大營道路巳通却笑青襟未知事漫思投筆佐軍籌時有畢節附生熊瑶具呈欲移送軍前效力余巳諭却之十七日晴使院後圃望遠分半山城入畫中炊煙都裊岸西東房廊映水多時緑衫袖承花一色紅上冢船歸雅咒雨築毬人去馬嘶風年年桃塢春如許辜負鄉園三兩叢將抵西溪欹斜石徑杳難通來往輪蹄若蹈空却好一村居谷底爨煙開處萬花紅冥𪷟曉露濕花心欲到橋西路莫尋三兩鷺絲明似雪隔溪飛不破春陰西溪泛即事蒼蒼山巳深渺渺流不止無嫌鳥飛疾撇浪魚若矢稍休崖石上四面聒流水風勢聚一橋驚看去雲駛橋西村落好人語罷朝市紅白花萬堆中飛爨煙紫重至黔西宿海棠庭院闌干十二敞銀屏尤喜芳時此再經雙柳有情垂檻緑萬山如夢壓簾青花邊惆悵尋前約葉底參差間曉星依舊燕鶯飛不定可能重把夜窗扃將扺鎮西衛兩山離百步中挂一絶壁人攀崖樹上碎石傷馬膝穿雲過深澗飛露灑如雪高下千級田𪷟𪷟漾朝日房廊臨水好雲向枕邊出茶樹花亦香迎人下山歇偶寫荷花便面寄費方伯淳小閣才看暑雨過一拳奇石面層阿知君雅有鄉山念為寫錢唐一頃荷端五日聞官兵捷音是日夏至今年節候竒元夜立春節如何日長至復值端午日榴花紅處排兩筵却值露布來東邊興酣邀客共劈箋鐃吹雅樂吟連篇官兵早破黃瓜寨賊勢愁亡榔木隘後隊仍燒蘭草坪前軍巳逼花園界固知廟算無遺䇿逺近花苗更輸力臺築三層號受降詩歌六月勞還役主將翩翩善出竒搜牢應遣種無遺還憐春夏行軍久倘念西南民力疲自春及夏淫雨連綿倉池荷花十減六七感賦一篇近柬馮侍郎光熊張兵僃繼辛銅仁尼堪巴圗魯臬使思州並寄薑兵僃開陽甘肅前年築臺面池水昨歲花放池臺前朋來喚我作花主日日樓上開賓筵今年霖雨無停刻水緑衝臺臺欲缺三層閣上無一人花亦悄然如惜别征東軍容盛如火憶昨出城來別我殘荷隔歲尚數莖臘雪初看出梅朵城頭一別經草旬轉眼巳值看花辰豈徒花色減疇昔把酒苦憶花前人幾年愧作單車使不獲荷戈先戰士昨日軍符又發兵僰童捲甲東行駛此時花發不欲看月裏間却紅闌干巳涼天氣才幾日一任風雨搖無端轉思萬里橋邊水多半樓臺雨中毁臬使署中荷花最盛今空署半年聞樓閣半傾花亦憔悴非昔兩地看花無一人寥寥壁上詩箋在藏春塢北偶傍偟風急猶聞遞逺香莫更城東招小史左官先巳扺伊涼謂薑臬使開陽時以事左遷平慶兵僃道小史郭郎即薑所眷者何時一輩重相聚笑折花枝賦長句屈指平苗露布來主人亦欲辭花去平苗凱歌十章即寄福康安公相行營海宇年來慶謐寧偶移旌節涖邊庭鉤陳十二明如月上相星聨上將星軍律嚴同細柳營聲威先巳懾蠻荆櫜鞬大將皆趨左詔統川滇五路兵萬仭蒼崖一線通兜零火照馬頭紅原知廟算真無敵先定黔中下楚中五姓花苗敢獗猖曾傳吳畢石雞娘烏羅地大如甌子又見天兵下石梁明史士司傳宣德五年石各野紏同石雞娘吳畢郎等擾亂銅仁亦會川湖兵討平之出險方看建鼓旗居然綘灌列偏禆前軍早報花連布巳解長圍入永綏南出羅蒙北哨關十旬先定五溪蠻摩崖好壓中興頌勒遍壷頭百尺山閫外軍威敢自專國恩重疊與傳宣勞來不用歌周雅六月王師巳凱旋黃旗植處許歸耕一半蚩氓慶更生神武聖仁原不殺詔書先築受降城五度殊方討不庭淩煙圗上鬢猶青酬庸此日原無兩耀首新頒三眼翎榴花紅遍四山梁初度欣看日正長十萬貔貅齊下拜凱歌聲裡慶傳觴楊兵僃揆兩至黔中皆不及見今得書知又扺軍營寄懷一首我生遊迹殊通逹禹貢九州今歷八雖然輸爾涉河源遠度崑崙越哈察東西南北五萬里頭上翠翎風細戛如拳大字如椽筆先把天山石磨刮銘功紀德字五千髙比浮屠七層剎居然遠壓神邱頌何日重煩墨工刷丈夫志業真難量一半貔貅歸統轄昨來雪嶺今炎山車不停輪况脂舝花門異種方稽顙五姓苗偏肆輕猾盤陀斗絶隆棚險一半休誇地形圠搜牢匝月肯暫停山搏熊羆水擒獺滇黔楚蜀雖同勦神武聖仁非嗜殺杈丫怪樹當山巔百歲根株一朝拔尚煩竒計參帷幄頓使蠻方靖戈鎩讀君露布才益竒鬼膽先看破羅寧知馬上殺賊手正復翩翩如俊鶻相思苦欲専人訊道遠又愁泥滑滑重陰天氣發一緘黴雨應零八行札聞銅仁日來復有賊警辰水決城數丈馮侍郎光熊率官辨晝夜堵禦寄懷一首天乙虹梁暑雨交昨傳江水決城壕蠻中䆉稏紅千頃峽裏舟船緑半篙六月可能平板楯一軍聞尚駐松桃蕭蕭白髮籌邊夜誰識馮唐志意勞酷暑至蓮臺夜坐六月六日天乍煦窄袖葛衫猶苦暑連房早厭人語稠却曳襆𬒳來樓頭蓮臺三面波光漾一榻居然最清曠濛𪷟桃樹月西斜鳥影斜生𥿄窗上自六月朔日移至蓮臺避暑聞兒子飴孫疾尚未愈書示一首經旬魯未涉南臺藥裹頻從禁滿開却笑兒曹未耽讀燕瘑才去雁瘑來七夕陳大令熙藩邀集城南鳴玉山房即席賦贈一首感時青鬢欲如何初地聊從暇日過赤甲一軍爭渡久時續調滇粵兵甫過境紫微雙樹得秋多陳邱巳保思卭水劉秩應嗤曳落河莫向尊前問牛女早憑天漢洗兵戈中秋日曉望城南未見烽煙歇忘却秋中有佳節陰寒霧雨迷一旬才見清涼此宵月烹葵剝棗飲不休逸興且上城南樓忽然黃葉下如鳥笑過三歲蠻中秋秋海棠一種嬌無那新涼小院東葉猶棲敗蝶根巳泣秋蟲艷色偏嗟晚酸心孰與同昨宵鄉夢破露冷一庭空中秋夜坐上弦及初圓一夜輒三起連廊南北抱靸履行未巳闌干嫌露重空處聊徙倚衫袖葉葉風斜穿竹華裏樓臺萬家夢燭影沉不起簷瓦弄月光空明忽如洗簾櫳中外徹暗牖不須啓照水水亦空魚鱗逗波底蠻鄉三載住良夜能有幾握管欲賦詩朝曦墮林尾乙卯貴州揭曉會城書院生徒獲雋者二十七人回途率成五百字志喜全用十四緝韻即呈吳烜陳希曾兩主試及許刺史學范諸同考前年使者來冬仲月初拾奉命宣化條窮經事尤急周行十三府日或不暇給苴蘭及毋斂亘古屬蠻邑山拗城郭俯視類蟲蟄無旬不淫雨萬古地卑濕蠻生粗識字書不入行笈刪除到筆硯所事者簑笠間歲試學官泥塗甫衣褶低睂對文卷窘若遭縛縶四聲踈不講顛倒出篇什化俗具苦心庠宫飭修葺陳書數十篋云以待溫習兼疏聲韻譜潤此舌本澀峩峩講堂開一善皆引汲經旬輒分俸俾得備糧粒行之勤不懈多士志方輯貴山儲人才兩歲雋及卌謂貴山書院生徒甲乙兩科中式者至四十餘人方欣讀書效私自理囊裛昨歌鹿鳴來城府巳麕集然聞聘同考頗復論階級賀方伯代監臨試考官以朱經厯龍藻文為第一然不預內簾朱雲名不預執卷每嗚唈朱鐫其擬墨遍送同人闢門逢月朔雨霽路微㬤監司逮州縣一一連騎入堂深更扃鑰門外植雙鈒朱墨卷二千兩吏相對執名皆抗聲唱得失判呼吸挨排附欄楯頭上墨淋汁聞書五經魁千百燭光煜紅箋名在手咸擬破鍵㧀白屋士較多􅒡聲沸如潗我行然炬返欣此輿論翕酬恩願粗了行且具舟楫三年飽看山大峘小者岌籠南箐東北靡險不搜緝誰云鬼方惡直欲勝宣歙麻衣三百輩門外時鵠立諄諄戒勤學士行尚謙挹紅苗前蠢動論此嘗悒悒昨聞大芟勦不日兵可戢高低萬山田耕者看俋俋頻年仍大有喜氣溢原隰持衡兩君子公望庶諧諿筵排多士卷一一蒙訪及庶幾能相馬拔十真得十翩然召陵許文不尚沿襲前時鎖廳見贈子先一揖掄材盡如此願為執羈馽談深嫌夜短時復飯薌皀只惜北郭生猶然向隅泣時諸生中知名者惟賀世清獨不售賀居北郭故云十九日獨酌偶成是日家纍南回不覺蕭蕭雨風聲徹戶涼又添新别恨獨對古重陽石鏡花千朵琴臺酒一觴遙憐車騎遠凝睇此高岡徐太守曰紀屬題桐廬申屠氏宗譜中山水畫册八幅雙婆澳嶺頭時有窄徑江口皆通小河鄭姥宅連杜姥陳婆溪繞楊婆兩坂村爭傳上坂下坂却界前村後村漁網陰邊小市稻香深處衡門黃山名擬三天子嶂秀參五老人峯莫訝山田龜坼時瞻雲氣如龍范井家移浙水平壤里本陳留外黃瓣香我憶傭叟汲井人傳壻鄉譜云申屠氏自漢代遷居富陽之屠山及宋時有贅于范氏者又移居荻浦焉井即范氏之舊也慈濟寺紅雲高閣初啓白鴿春田四飛待得孤僧入定鐘聲穿出松扉荻花溪高低山合村塢南北江連渚沙消受九秋明月輸他千頃蘆花雞頭峯欲賽社翁社姥相邀漁弟漁兄雞頭峯頂晨雪鴨嘴船邊夜明松濤浦閣外蒼苔一片門前碧水三篙居屋不殊居艇松濤遠接江濤屠二紳自尋甸州守擢判廣南道過貴陽留飮三日醉後賦贈依緑亭邊識君日三十年來五回别一回握別一傾倒我越壯年君未老天憐狂客愛遠遊遠宦皆出天南頭君行斗大得一州我亦持節來邊郵囊空衣敝官初改厯盡蠻山飮炎海北來驛使遞一箋驟閲反疑君左遷人言宦廣勝宦滇俸入乃逾十萬錢平原坐上多良友比日談君不容口忽然一客來欵門矯首徑入無寒溫旁人驚看僕夫笑三寸麴塵猶在帽卸􅑽先約欲促􅋔為爾南去程途長秋花黃處頻高會一日為謀兩回醉朋來尚未悉姓名脫口遽巳聞歌聲我行一一為分析故態狂奴總如昔不爾先防欲逃席昨日醉外臺今日醉縣中歌盡百曲傾千鐘新交有嵇陳舊交憶孫趙鄉語連翩述難了君不見少歲瞥我去幸有少歲交紅闌百尺挂酒瓢恍若醉我城北之山橋山橋邊即鄉社我距君家不三舍何日同歸醉橋下喜代人將至率賦六詩留以志別并貽新學使談戶部祖綬我饒山水癖乃官山水鄉黎平及都勻靈秀之所藏大山何峩峩長川亦洋洋五嶽四瀆外得此庶頡頏間歲輒一遊竒蹤匹翶翔靈氣歸筆端奇矯得未嘗詩文及千篇藉以壓客􅋔仲冬當北征念之尚傍偟約客頻出遊時時陟高岡西郊松竹幽南郭蘭杜芳作詩别山靈此景殊難忘東從相見坡西去亦資孔茫茫三十驛鎮遠迄南籠疲氓居要道百事實倥偬民夫徵不足􅊧剔到蠻洞負擔行萬山心傷足俱腫衙胥不之恤而復相驚恐我朝恩澤厚域外悉帡幪況茲梁楚界大吏所控總所期仁及物役不到繁冗公廉率其下守宰自惶悚昨來馳尺一荒戶給田種軍行所過郡秋不賦秸􅖽愚民縱無知戴德巳山重東南傳露布草野悉躍踊聞宣寬大詔却立手俱拱花苗既輸誠吏勿輕煽動雲山殊戀別忽作兩月晴自八月十四日至此巳兩月並無大風雨土人云為數十年所未有清晨來閣中霞采東南明連岡何蒼蒼修林亦英英機事庶久忘物亦諒此情伴我日讀書不覺寒暑更謝者尚未謝生者日以生愛此三載中日添雛鳥聲新篁手所栽亦樂觀其成牂柯及夜郎古乃列益部今茲十三州夔郢實門戶津船通列貨間亦雜書賈流傳坊市本十竟不登五刪除到羣經擢髮罪難數我行􅊧左孰見此赫然怒嗟嗟蠻嶠士化久隔鄒魯開篋出六經仍疏四聲譜口陳兼手畫聽者若環堵精微難遽悉冀或得其粗餘間陳列史俾得究今古憶昨桉部回書聲滿堂廡紛然陳藝暇略亦通訓詁明明尹荆州庶思能步武後漢書西南夷傳牂柯郡人尹珍從汝南許慎應奉受經書圖緯學成還鄉里教授常璩華陽國志尹珍母斂人官荆州刺史此方雖蠻方楚蜀粵上遊延江及沅江其源一何修沉埋唐宋間地志苦不收前年使者來一一窮險幽鄨水既合溫黔江亦通涪盤南鎖鐵橋勻左刳木舟我行皆乘之遍歷十二州惟銅仁府寄考鎮遠桉部所不至馬上作一書分此楚蜀流芟除土俗名不使混固彪庶以示後來不貽茲土羞香樨南北廊修竹東西徑紅雲樓百仞白藕花千柄兹廬最間適旁榭亦幽靚豈茲崇土木藉以適身性昨者偶讀書欣聞有除命前旌臨沅水當遣騶從迎周閭更修飾砌石拭如鏡雖為居者計客暫寄歌詠分番扶美植惡木久除屏以此黽勉心庶幾貽後政同里諸君子邀集蘇參軍鳳池廨舍餞別即席賦贈一首逶迤徑折入琅玕蠻府參軍廨宇寬巳覺朔風傷謝眺不妨微雨過蘇端羣公雅稱芙蓉幕一老曾餐苜蓿盤聞徐太守曰紀亦欲入坐拚得花前幾回醉馬蹄應又踏長安
