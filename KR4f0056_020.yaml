front:
  text: 卷施閣詩卷二十
  hash: sha256:de093f10c77d2bd8283fdd7fe081dadb2f4a0148348f7eed54b63e5f63913fb0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_020-1a}
body:
  text: 陽湖洪亮吉著單車北上集已未初九日楓橋訪袁上舍廷檮挂帆東南行百里祇瞬息非徒訪疏梅兼詣幽人宅幽人宅傍寒山住臘雪在門曾一顧三條水涸今復通依約門前繫舟樹洞庭山人約客遊鼓浪擬到湖東頭吳船屈指須三宿好插疏梅滿船屋三鼓自木瀆放舟至胥口濛濛露未收黯黯月方墮三更欲渡湖先此理征柂幽人眠正熟估客浪先破微茫接天水厯落綴星顆感此一葉微驚濤屢掀簸披衣看曙色早向柁樓坐穿黑旅雁飛聲從半空過自胥口渡湖看山三十年甫欲遂初服間居又經歲人事苦拘束朅來湖東頭藉洗塵百斛伸睂視初日紅展鏡中緑湖寬三萬頃差足養心目潛鱗方俯視飛鳥匆高矚物物各有天欣欣遂其欲空明無障礙高下不局促我亦心志怡終朝坐船屋何來南下客苦欲附童僕中坐忽告言西南尚蠻觸湖心遇風偶向篷窗臥誰傳風色顚情懷消短夢身命付長年浪已高千尺衣才濕半邊奚童休股栗險未及從前謂癸巳十月將至東山作沿山半日行欣此巖壑美微覺風北來千帆皆貼水濛𪷟鷗鷺影一半出蘆葦亦有蚱蜢舟船沿坐烏鬼篷窗展衾枕客倦臥移晷神淡夢亦淸經時絶塵纍暫憩東山麓一塔高千丈魚龍氣尚浮灑空松柏暗陟險鬼神愁古佛依人臥馴禽導客遊面西窗莫啓兀自濺驚流翠微禪院東山白雲起欲與西山接寧知飛鳥路亦向浮雲貼蒼蒼幾重岡一寺出山脅登樓半無見蔽此松柏葉軒窗何玲瓏橘柚貯重疊回廊斜北啓庶足展睂睫穿牖出一燈枯僧理經笈客夏孫總戎廷璧約遊東山以事未果新正八日訪梅鄧尉因便詣衙齋值他出不遇兩公子留住信宿意甚勤摯爰留别二首并呈總戎為有將軍約來隨估客槎半帆懸雪月百里走風沙公子欣除舍疏梅正作花夜闌銀燭裏留與鬥新茶憶昨吳淞浦樓船出海遲枕戈時待旦橫槊偶題詩豈意萑苻澤頻煩組練師報恩知有在莫惜鬢如絲同孫公子錦暨令弟鑲至翠峯枕流閣訪梅昨留潄石居客冬寓西湖潄石居半月今訪枕流閣川程逾十驛勝地乃交錯靑松千丈接水隈十步五步梅花開僧房盡處一株好幹古錯落青莓苔山凹石屋何鱗次五騎如龍後先至門開正值東北風笑語吹入雲當中客倦倚石牀馬亦繫天井一亭稜稜據山頂主人敲詩僕烹茗窗隙太湖三萬頃即席贈程司理師樂淸絶程司理官貧日課詩心香原有屬手板不曾持肯作通方吏寧為多士師時以課徒自給梅花三百首風味耐尋思鄭司馬時泰招飮賦贈一首剖符殊不俗分領此山中屬吏如梅福謂程司理通家得孔融孫總戎父子快談當世事饒有古人風臨别仍相約同來訪石公約夏半遊西山渡湖與鈕布衣樹玉同舟因出其所著説文新附考見示賦贈一首即柬錢少詹大昕王給事念孫假明府若膺孫兵僃星衍東山三萬戶僅止一儒者童年耽竹素暇復討蒼匹説文五百部寢食不暫捨蠅頭排細字時把心得寫茅簷兩三層住乃近橘社家貧長物少書反盈兩厦扁舟偶相訪坐久燭屢灺口陳六書失如水向盆瀉維時四座客耳口若聾啞二徐生唐末不甚曉通假諧聲兼會意一一多苟且強編新附字合者蓋已寡惟生糾厥失證以毛鄭馬隋音庶劉曹唐疏陋孔賈陵夷南北宋棄置若土苴長編侈稱引又出張郭下方今富儒術小學亦媕雅王錢暨孫段見爾手定把倚柂贈一篇飄風忽飛瓦十三日鄧尉訪梅憶昔遊寄錢大令維喬蔣文學陳尊昔遊錢蔣殊不間獨我近自山中還連宵淸夢屢飛越聞説梅放西山灣西山灣中萬樹花古幹鬱勃枝交義山中猿寉盡無恙豈識世事紛如麻草元亭圯季重亡謂楊比部夢符吳上舍祖健天末回首思崔郎景侃間心檢點壁間句蝸篆剝蝕無偏旁湖亭三面交遠風香氣擾入湖光中看花歲月苦難駐花亦憔悴無歡容君不見看花背花立少時别有會意誰能知忽然大笑出山去峯頂落落雲分馳光福鎮哭徐處士堅魂歸萬樹梅花內家在三更寉唳中我欲哭君無處所半山殘月滿湖風過鄧尉感舊首春來吳門訪客入雲榭相邀擕蠟屐告我苦無暇寧知人事改歲月屢代謝别來山中客已葬山花下摩挲墳上樹一半梅枝亞花光縱奇麗未肯照長夜念寂獨舉杯初陽出林罅元墓小憩穿林十里只一鞭花影灑地松浮天松濤覆屋客眠穩夢覺香氣來無邊波流到戶聲先約花影入波魚誤嚼松間客倦欲少休且汲寒泉斟木杓香雪海久坐下方臘屐聲何急郤惹山禽出巢立山禽欲下客徑登相與􅔡此岡三層風吹花氣入遠空一半上接山雲紅君不見人間淸福消未易幸是玉皇香案吏北行三月束􅑽歸二月束􅑽發出門才十稔抵家無百日昨為弟喪歸今為國喪出我勞何敢憚我淚忽嗚咽揮淚北向行程程冒風雪已為還山雲復作出山水看雲心尚戀照水色增愧親朋苦留餞臨發期敢改前行誰與共一僕瘦如鬼初日上蒜山回頭望東海過沂水橋柬族孫梧二月十二日沂河之水淸且徐先二十日來祓除風光春半尚未足鶯燕見客猶生疏參差流水兼修竹緑映橋南萬家屋橫流昨歲喜乍平數郡創痍漸將復時以曹縣河決鄰郡皆助工作路人為言太守賢貪吏昨已褫歸田君不見吾宗兩守皆稱職記否趙人思順德君兄朴守順德有惠政别敖陽鎮二日敖山尚可見因題壁茲山雖一拳靑出天地外連晨走三驛路已及新泰瞻山仍在目風尚送淸籟迤南方數武蒙嶺亘如帶再轉望始迷翻嫌去程快羊流店望岱精誠與山通百里覺迅速夜半岱頂雲飛來冒車屋冥濛雲皺處顧視炫心目月出斗柄東森然衆山緑靑松一千丈霞采時斷續想有飛仙人排空走如鹿夜半忽大風雪驚雷徹曉三更驚雷奔匆復雪沒膝神區信靈異寒暑一夕出狂颷來若怒激電去如掣稜稜簷瓦落厯厯冰柱折思沽山後酒屢斷門外轍遙程瞻尤驚一白色突兀將至泰安于崔莊驛壁敬讀太上皇遺誥泣賦一首平明欲出門靑氣已四布崔莊行草里木末天始曙驚傳上皇誥涕泣滿行路黃縑曵三丈急遞頒鎮戍山崩川復潰此事關氣數茲方當孔道八見翠華駐成功告天地神亦𬒳休祚今來山色改慘戚若蒙霧時當春仲後急雪匪無故神人哀痛切井邑先縞素微臣等蟣蝨夙昔感恩顧俄焉驚遏密旬日急奔赴山靈鑒微誠恍若導前步百里行不休橫流馬驚渡山雲濛濛四山雲欲出不敢出回瞻岱宗上白練飛一匹一匹白練當空馳四山出雲圍繞之君不見出山為霖未可知何日更是歸山時泰山道中五首茲山亘東方鬱勃截生氣虛輪扇風海空腹入天地其高無端倪一半植空際滃滃雲出始裊若絲髮細俄焉分道騁寰宇悉衣𬒳洪荒逮今日年代渺誰記登封壇數尺藉以驗興替允哉神明區心精默相契山人渡海來告我山勢尊波面日出時與山相吐吞遙看不知山謂是天有根峯稜破空垂倒挂日月輪靑冥一氣中高下固不分伊誰啓鴻濛當有主者存雙崖劃然開截作天東門一山戴一山重戴至谷口遵山視重戴高僅及社首方知衆高積拔勢乃得陡山坳環數郡元氣蒸澤藪中虛藴靈寶萬古誰敢剖天閶雖已逼地軸亦孔厚七十二代君貞符藏北斗山形非徒高遠莫測所屆滄溟三萬里石脈透海外當其勢奔騰顯越齊魯界低瞻饒嶽瀆並此析支派巍巍兼蕩蕩克配天體大其標難正視萬象怵光怪支峯皆整肅略不涉奇態風遞滄海濤山前作淸籟三更望茲峯月出石腹內雲容方欲展雷雨已在背明明神所宅乃復遘陰晦冰柱十丈長驚看石崖戴居然神斧落崖半亦奔潰回颷搜激電雪月光迸碎遂令登陟客倏忽迷向背淸遊雖暫阻未敢遽思退終當擕松明絶壁掃蕪穢雪霽日昨大冰雪地寒天宇陰今晨已晴和冰雪在我心在地或可消在心終不忘庶幾炎暑時胸次餘淸涼二鼓抵鄚州故城宿南關居人時向女墻耕一片東風百草生忽地樓臺空裏現三更月上鄚州城重抵蘆溝橋有懷亡弟橋下層冰積雪寒春明重到感無端白鬚老吏當車立猶是欷歔説故官跋金文學學蓮悼亡詩册後春花紅美人結屋花當中秋草碧美人悽然立花側花花草草無一年含淚永訣梅枝前梅枝陰陰滿天雪豈止燕歸雛亦失巢空難居隻燕欲回一日百匝飛鳴徘徊燕行思雛復思偶況值主人亡未久明朝雪霽花欲開忍覩新燕巢中來蘆溝折柳圖送金文學至大梁東西南北人皆向長安走蘆溝橋上往復來便折橋頭一枝柳蘆溝橋柳年年秃折盡柔條剩枯木幽燕客罷客大梁楊柳作絮飛何忙莫作道旁枝莫作道旁客道旁枝手易折道旁客頭易白萍梗篇為友人作不作天上星乃為地下萍星宿有定位萍梗流無停一風吹從西一風吹從東萍面作草緑萍背疑花紅紅既不如花緑亦不若草我送浮萍歸頗思故鄉好哭任軍門承恩槐里朱雲本最狂藉公時復語通方同遊愛詠新題句分道為收舊奏章豫去歲大考後即以弟喪乞假歸都下盛傳豫疏競相傳寫間有失真者公恐又成偽稿之事百計為購而焚之死友誼真逾骨肉殤兒疾巳入膏盲公六十後甫得子不久即殤以是疾益亟厝㕓何止時來唁一事相思奠一觴法源寺看花即送言八朝標至夔州任卷施一谷中花好無不有主人緣獨慳花發出門走黃沙撲面三千里待得看花已春尾花前既少雙鵓鴣花下更有誰提壺櫓聲咿啞花外斷白日馬足塵糢糊花光何似江南好花氣薰人亦難倒君不見看花偏值别花辰走馬從戎趁好春會看白帝城頭立郤笑黃金臺下人春盡日夢八卷施谷看花窗前十餘株窺牖復窺弄高低拂牀榻紅紫疊壓夢幽人眠正熟壓夢識春重伊誰伴淸􅓦新燕昨巢棟波光猛飛越春半已消凍緣階栽緑竹一碧欲無縫奇書堆面面正此酌春甕一晌魂已飛南鄰笛三弄題左大令輔葛嶺蒿廬圖北江至西湖五百里而遠一歲上冡忙春分及秋晚十年遠宦嗟何及丙舍蒿先沒階級魚飱麥飯遠莫將反使孤兒抱圖泣孤山葛嶺西南開我昨詣君先冡來摩挲松柏一回首拜石為洗靑莓苔虔心豈獨私吾友雅聆南陵政聲久君不見孤兒倘思親欲親傳不朽豐碑百尺亦何有不若好官碑在口四月二日法祭酒式善邀同人至極樂寺小憩分韻得月字我前遊莫釐正值早春月濤聲猶在耳迫促詣京闕凡花幾開謝月祇兩圓缺船頭經花朝馬背閲佳節我病何敢辭我勞誰可述風沙眯人目紅紫色不别雷車時聒耳塵土鼻仍窒蝸廬甫能定春去已飄匆花開思走避俗恐砭肌骨偶得學士緘邀我敘契濶賓朋集三五飯罷強之出前遊雖隔歲門徑亦粗别桃李七八叢紛披倚禪窟縱談當世事喜罷或嗚噎側聞秦隴蜀兵苦不得歇至尊憂黎元御殿每日昃時時思讜論何異飢與渴開誠布條教欲使黎庶活奈何諸大吏敷告尚不實民猶困科斂吏不奉法律文書巧相抵百變難致詰居然貪欺成不復畏斧鑕兩湖全陜地事變可臚列因循及弛廢百事待剛決倒縣誠已久水火救宜切我官非諫靜詎敢肆筆舌幸多同志友肝膽素鬱勃能言固堪貴尤在通治術敷陳政之要置彼事纖屑雖爭焚諫草道路有傳説吾儕究多幸貯見蕩平日花前時時來一醉百憂豁送同年祝兵僃曾至陜西軍營即題其山寺讀書卷子男兒少日貧如此四面亂山如破紙仍無一屋可蓋頭暫借僧房作棲止僧房似竇排山麓夜半雲奇欲穿屋林空無人竄驚鹿山鬼依微伴宵讀扄門不出眼界空意見不與時雷同丈夫豈肯忘世事四海九域環胸中一朝山雲破空去人亦公然得奇遇山深幸喜住十年不爾何來濟時具君不見殷深源房次律畢竟讀書無本末君今上馬能殺賊下馬檄書成頃刻亦知平生饒素識召對尤蒙賜顔色散關峩峩去天尺一賊不除歸不得露布期君在朝夕濟時已了倘欲還仍作山中讀書客偶成二十首我聞荀生言善惡皆有性忍于殺人者乃反惜物命此非性之真轉展惑報應仍緣薄滋味可自託淸淨百偽寡一真吾心湛明鏡我昨謁達官先有後堂客思陳天下事四坐皆簡默移牀前復郤日影去階尺寧惟言不省反欲斥狂惑朔風吹橫門簷瓦響厯厯中有揮麈人豐貂饒菜色近時士大夫蔬食者十有六七廣場三十頃乃在池以南近移居西華門外南池關帝廟自非土偶居即作木佛菴土功何煌煌香火積一龕日與神鬼居禍福念不參陰陽縱回翔奈性所不諳攤書梵篋旁相與同沉酣一身雖不資事有大于此何因賢與哲僅自計生死端居勤學道民物寧可恃驅馬出北街殷然念朝市八紘誠巳廣所見乃尺咫欲貢出位言愁呼妄男子千金構亭臺百金施繪采天公矜物力不使成遽毀前門方逮訊後戶巳遷賄復壁不匿人惟應穴金在主人雖已易朱戶仍不改春半燕子來啁啾舊時壘男兒不出門出門路四岐對面即太行途危不逶迤裏糧思長征白日忽已西揮汗走不停百里或庶幾我寧遭豺狼不逐狐與狸承平百餘載風俗漸喜誇物力苦不多踵事而增華我頃讀風詩頗願刪木瓜苞苴之所興禮節日以奢君子愼厥初百事除萌芽遊魚性喜沉林鳥性喜浮人生居其中渺不克自由回颷吹飛蓬旋轉何日休自非金石性皆逐流波流東海雖已廣何能積沉憂庶幾三神山可與逸客遊人生一世間駒隙影易度飮食與衣服詎云皆細故所惜士大夫視同經世務不然營土木樓閣極回互平生名好客惟見揖樓護落落張伯松望門先卻步束髮事結交相知本難得馳驅三十載已寡素心客稍能知大義半死刀劍側精魂歸大漠時向夢中識昨得插羽書憂仍在西北沉酣非我志藉以遣晨夕縛茅作一亭正面微向東四壁盡斥除依傍庶一空侵晨即披衣陡覺曙色紅社日既已過遍野饒春農擕編省藝鉏勤苦理則同倦憩亭北隅引領眺澤宮他時開八窗藉以通八風師臣者三王友臣者五伯逮茲秦漢後視下比厮役長孺前正論天子輒變色惜哉公孫宏其性本便辟庸儒司國柄何事足裨益田蚡暨衛霍半又起外戚當日嚴憚人庶幾惟汲直寒暑飮食中所獲本微恙忌醫兼諱疾自恃一身壯天時日乘除精采忽不王陰寒入筋絡危至莫名狀遂令皮毛疾惡乃攻府臟和緩失色啼庸醫又何況孔明相巴蜀貴在飭綱紀斷獄斬幼常時時面流涕古來真將軍親愛法不廢所以百萬師常若身使臂桓桓司馬法無事出奇計恩多不能勸用法乃始勵莊賈後即誅庶乎知此意依草而附木自信不如此平生戒受恩盍自賢者始伊余少迍邅本不盼榮仕遭逢況逾格業已𬒳驅使兼之凜慈訓詎敢背尺咫吹律暖不回其人已心死平生何所慕所慕在同調三川恣沿洄五嶽寄歌嘯靑雲忽緣履白日斜壓帽側聞唐太尉勳業繼周召功雖積山阜事往何足道只惜平泉莊生時不重到疾風走空谷奔此霆與雷鬱鬱松杉姿高幹罔不摧一朝營華居悼歎無良材良材本無多大匠意不回我欲從唐虞先借皋與夔開誠而布公一世識所歸君看參天枝夫豈旦夕栽操持本不優又欲守成例遂令一世才受制幾胥吏危疑偶相值苦乏經遠計盈庭皆雷同誰肯獨立異雷同心始愜獨立遭所忌根矩兀傲人英英動心氣鷹隼善摶物尚懼鳳鳥嗔豺狼欲噬人道恐逢麒麟今乃知不然麟鳳性益馴積骸雖如山委以不見聞轉于水火中救此至不仁或云西方法祇乞見在身羣生究何辜冤痛杳莫伸少年頗耽奇氣欲吞名山有時驅樓船入海不願還倏忽三十年塵土冒鬢顔顯晦亦偶然山水興未闌著書高于身準待同志刪要皆真氣存足訂懦與頑興至欲舉杯天風響禪關送陳太守熙藩至貴州即寄馮侍郎光熊吳兵僃超暨程太守國璽諸人五年我已别南雲又向金門見此君幾許故人皆抗節謂彭廷棟花連布兩軍門無多健吏亦從軍張太守鳳枝近以事發新疆工愁吳質官先罷垂老馮唐力尚勤珍重雪崖亭畔月好封書札慰離羣為法祭酒式善題漢晉人畫象東國奇男子重瞳是故人偶然欹一足天上動星辰右嚴子陵百千儔類中乞食亦一等我欲拜督郵琴心先不肯右陶淵明書事憶昨倉皇際防生肘腋憂何嘗動聲色先已決機謀訊鞫歸藩邸傳呼出殿頭縞冠才幾日褫服作纍囚斂怨知何似茫茫八極中干戈兆秦楚珠玉罄南東逼迫歸邪教搜求過正供明明祖宗法百計壞淳風全家俱內侍甥舅暨婚姻推轂歸豫季分符引所親病仍升鼎鼐敗亦繪麒麟日晚塵如織高門接要津尺五城南第經時締構崇閣摹元武闥人出上陽宮金屋參天半銅山穴地中是誰搜復壁珍蓄頓教空漢廷誰巧宦賣友得呈身不是懷中奏難成坐上賓商量最高秩汲引幾私人附傳他時好崔倪倘後塵怙寵真逾昔辜恩遽若斯小車穿殿過隻騎繞廊馳地密誰能舉天高倘未知監奴益無忌通籍上軒墀屈指承恩盻南頭一侍郎祇緣新歲近催送侍姬忙粉墨乖淸議銀黃奪舊章浪傳收騎過失足墮匡牀火城三十步煙焰欲薰天故相揮門外真王拜轎前幾人容接膝同列敢隨肩一事尤奇絶酋豪願執鞭金字書恩地由來在賜㕓憑人説雞狗堅自乞貂蟬詞筆慙三榜圖書冠一船直廬淸切處莫謂少流傳誰説台司重真憐骨相輕上公偏下視直級亦斜行偶舉遺忘事時矜聰察名猶應勝齊虜五鼎食非烹單車催上道特敕不隨人奏草除元惡爰書比叛臣脅從先股栗判吏乍睂伸畢竟能行詐題篇炫鬼神賜盡圜扉日無聊舉百觴攀龍知已後牽犬歎偏長西市鳴鉦急東原啓土忙恨無朱椽在親葬董雲陽為法祭酒題移竹圖一竹緑一窗十竹緑一牖尋常百竿竹能使雲水皺雖然竹性北不宜幹葉縱具淸蔥稀先生愛竹識竹性先引活水周階畦豈惟竹下流泉迸竹裏白雲圍半頃穿廊戞牖響不停嫩緑都浮碧天影廣文先生苜蓿盤京俸苦薄無餘餐長飢婢僕尚林立一一瘦若靑琅玕先生暇日翻僮約婢未裏頭奴赤腳擔土汲泉前復郤一亭誅茅泉一勺亭外更須營略彴一壻一兒顔戍削喚取筵前侍杯酌君不見何時新筍出一林我欲載酒來相尋哭管侍御世銘半生每自誇龍尾晚節憎人説鳳毛獨有上書心事在不教風節並錢曹聞先生客秋欲上封事屬草已定遽卒莊刺史炘尚及見之錢曹為錢南園曹劍亭兩侍御哭董太守思􅬼玉杯珠柱書難著鳳髓龍筋判獨傳記得白雲溪水漲凌最送上浙江船君回里中匝月由浙江水程赴潯州任到官甫七日而謝世自勵寧作不才木不願為桔槔桔槔亦何辜俯仰隨汝曹權丫適當時旋轉如風濤高原多低枝感汝汲引勞一朝時雨行棄置眠蓬蒿寧作無知禽不願為反舌衆鳥皆啁啾反舌聲不出豈繄果無聲無乃事容悅依依簷宇下飲啄安且吉何忍視蜀鵑啼完口流血涼夜草蟲忽無聲人倦鳴亦倦疏螢夜不飛悄立蒲葵扇長廊不燒燈夜久佇殘月秋風驀地來十二簾齊揭三更涼意多蒲葉響回波斜界龍樓影遊魚不敢過暑氣夜不收移牀入林隙帳頂明一星森森知大白牧牛詞門前黃牛老牧兒甫襁褓兒年四五即飼牛牛轉惜兒年過小六七歲甫交兒肩及牛腰昨年上書兒八歲兒足居然跨牛背飼牛已了仍牧牛牛知兒心喜出遊登隴涉水無時休半年送兒入村孰半歲書從牛背讀兒思阿耶牛憶犢郤鼓長鞭入牛屋牛背下來書爛熟種魚詞祖遺十頃田乃在城門邊低窪不堪耕郤引河水流濺濺一船淤泥兩船重肥土出魚何必種南邊菰蒲北茭葑更灑浮萍作魚俸波面既養鴨波砥復種螺昨宵一雨通北河隊鴨更挈成羣鵝小時魚苗怕鵝鴨魚大竟同鵝鴨狎掉尾時時欲相壓賣魚歲入得萬錢不羡鄰舍耕原田君不見原田遭荒無六穀豈若魚池歲常熟畜鴿詞老翁誅茅作一堂東西南北皆鴿房老翁無妻有女郎引鴿入室還穿廊朝來糴得新舂稻鴿剩方令女郎飽鴿欲出房先郤掃老翁呼鴿皆以名好在一一能承迎翁倦鴿亦眠無聲休嫌養鴿形神敝與鴿居能助精氣間上翁衣立翁臂君不見老翁龍鍾女遠適死仗鴿羣為弔客養蠶詞飼牛須小兒飼蠶須小女小女才上頭靈明已如許堂中一筐復一筐屋左屋右皆柔桑挑桑作蠶衾挑桑作蠶褥蠶食蠶衣無不足間來習靜深閨裏一種心情更堪喜與蠶同眠復同起蠶行作繭女嫁夫裁繭作女身上𥜗君不見養蠶雖勞得蠶效拜得馬頭娘上轎寄石太守韞玉聞説東川守騎驢過百城書仍寄旁午地未塞夷庚啓事人先悚君以川匪曲折作啓事致成親王王即以上聞登壇衆盡驚巴渝兵火地何以慰疲氓雨歇高下窗櫺竹柏生南池雨歇近三更夜涼殘月淸無寐聽到秋蟲第一聲即事擕尊訪幽客三至不一遇門前秋樹好樹下石堪據涼風西南來竟爾挈衾具近刪詩不作頗復減思慮惟于人事外時得少佳趣白鳥笑客狂翩翩入林去朝陽出偏遲昨夜路仍濕車行三里外已有暗香襲幽人邀客住一屋大如笠平鋪波萬頃高下見階級居然空色相顧視尚難入萬朵白藕花鷺絲何處立讀書倦後偶題齋壁蕭齋賃三間長日渺何事因無用世心益堅傳世志行􅑽本無幾并疊陳篋笥所居幸深遠熱客無一至中年驚已過盍扣囊砥智不見七十翁辭官課奇字時正寄書錢少詹大昕索所著聲類遣興千杯百杯皆已空昨者醉夢殊怔忪承天之高豈一柱受地之命惟孤松孤松流靑柏流翠冷眼看人百年內當前何事尚營營入後有人思潰潰堅持一念皆可傳瓦硯木榻驚齊穿丈夫自信不役物方寸以內嘗湛然性靈自足供抒寫美醜都看入陶冶三千里外賦歸與十九年來忘兀者後遊仙詩地在天中見可真半從高處望紅塵冥濛似蟻還如豆都是三千世界人誰打泠泠澗底鐘月眀人宿第三峯朱符夜半催行雨臥聽天龍喚地龍詔集周秦漢宋儒寓言曲筆敕刪除修成三十三天史一字都無梵釋書月午濤聲響怒雷滄溟盡處覺扉開誰憐天外花如海只我騎鯨一再來雨雨風風春事休誰言上界總無愁可憐淸淺銀塘水不彀天孫日飮牛碧虛景色太蒼蒼日月從無背面光乞取火珠三百顆凌晨先與挂明堂爾許遊蹤向客誇偶隨漢使泛星槎九天九地行都遍輸與仙人蕚緑華作賦何須定馬枚偶􅊧淹滯出塵埃詞人下第文人老流落都歸天上來天田近亦種桑麻略遣仙人識歲華偷住碧虛三十載曰紅從不到窗紗可是東皇意見殊上方日日有遷除神仙自恐無才思偷讀人間未見書淸虛一别事茫然消息誰從下界傳聞説白榆天上樹夜涼時亦噪秋蟬呼吸疑通下界潮天孫機畔水迢迢月中仙桂如堪斫先與裁成獨木橋不用爐峯向上薰四邊香氣自氤氲生來著色屏風好檢取嵩高岱頂雲神仙多半是中年白髮從無挂兩肩更與種桃園裏異天街行遍少厨煙天河迢遞隔天關露氣雲光日往還不放雙魚住天上怕傳消息到塵寰踏得星光顆顆靑撥雲時坐白沙汀天街一事偏惆悵可惜從無疏雨聽獨構茅齋靜見聞年來四氣總難分偶扃北牖開南牖已覺漫天盡火雲百年一瞬夢何曾超劫先居最上層飛下九天三萬里郤驚足底日華升欲踏雲梯第一層生驚石礎潤難登冥濛下界三旬雨引得靈河氣上蒸雲生雲滅望初窮知隔黃塵幾萬重獨占一天誰與共兩三蝙蝠數株松間來多是坐忘時不讀丹經不賦詩怪底東南雲似墨書仙半日偶臨池昨宵騎寉下蓉城一舉千杯醉未成蒼狗白衣都不管隨他足底亂雲生要從天上捉迷藏銀漢紅墻界畫方粗服亂頭編一隊董雙成與杜蘭香誅茅都在白雲巔學道心淸自不眠抽得地坪三四尺倒呼明月到床前白楊種不到天門自詡飛仙萬劫存要向天公破陳例凌虛高築醉人墳雲林一到一徘徊選勝頻同逸客來構得山亭要奇古剝殘星斗種莓苔天邊甲子記依稀宵半晴光已四飛齊向玉虛稱賀朔曉霞紅作上朝衣北出雲門磴數盤天風時一憑闌干因看太白峯頭雪始識稜稜下界寒東南一抹是揚州天外山排十二樓欲趁新涼看滄海月高吹笛下雲頭偶得東皇食料單烹龍炮鳳亦全刪淸虛自有餐霞法東海靈芝進一山玉軸牙籤散不收偶逢間日亦勾留名心畢竟銷難盡檢得奇書作枕頭疏星三兩逗河津新月如船欲載人便擬裁帆向東去麻姑傳説海揚塵行童一輩隨徐福避世千年住武陵華嶽峯頭毛女笑一般鄉里各飛升白寉峯頭到偶遲三生一笑本難支何妨背面仍分手萬歲千秋見有時天然顔色勝吳娃住近西池阿母家養得靈蠶大如虎也應喫盡佛桑花偷將暇日闖華筵一輩誰如張老顚只自愛看塵世界倒騎驢子上靑天玉皇香案住多時慧業偏教上界知惹得洞天三十六都來乞我作新詩雲腳微黃雨腳靑望中日腳復瓏玲前頭去海無多路且借天腰作暫停七夕偶題寄女紡孫匝月都居水上頭夜涼雲向竹間流輸他百鳥啼春遍一箇吟蟲欲占秋層層暝色上間廳簾底翻書手暫停買得一瓜如斗大豆花棚底祀雙星花氣衝廊竹塞門全家應復坐雲根間將故事從頭説壓倒符孫與胙孫佳辰偏要耐心腸曝過奇書曝畫忙第一莫將花染指預防紅色汙靑箱宗崔月令手全鈔誰似吾家幼女嬌莫證瓜期是初六怕他烏鵲再填橋江南人皆以初六夜為七夕神魚曲大魚立水長一丈昻頭看船不相讓船撑欲近魚忽飛白浪濕盡舟人衣抽帆追魚魚不及夜夢大魚波外立明朝風浪急護持咫尺看我成龍時神狐曲狐強神弱爭一屋狐悍操兵穴神腹神逃荆棘不敢言白晝狐枕神龕眠遊神訴天狐始悔為神不終願為鬼君不見重新社屋迎故神畢竟狐尚居承塵有饋蟹者戲答萬羊太尉唐代萬鴨詞林本朝若許各從所好願烹十萬霜螯偶成眼冷心空日長安始易居三更池閣上眠對白芙渠受業呂培談正治校字
