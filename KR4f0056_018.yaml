front:
  text: 卷施閣詩卷十八
  hash: sha256:6d8ea5ba5f325fe64887958473f44a108378275bfce01784cbebcc746ba4265e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_018-1a}
body:
  text: 陽湖洪亮吉著侍學三天集丁巳正月十四日雪霽溫舍人汝能招飮分韻得兼字且插梅花壓帽簷乍來香氣欲衝簾籠街月與燈光合繞砌霜將雪色兼縱飮未妨朝客罵朗吟生怕夜烏嫌千言一例輕揮灑已有春華上筆尖十五夜琉璃厰步月一市人如海塵從隙處穿帷車排巷窄社火壓場圓濁酒呼朋飮奇聞藉客傳欲尋容足地飛爆向肩然元夕有懷四首半生思紀外家聞朱文公有外家紀聞淸淚時時滴典墳十六人中留上壽舅氏再從兄弟共十六人惟舅氏屆八十七千里外寄竒文豫典學貴州時舅氏將生平所述作寄存余處難忘閣上三更月只占溪南一塢雲莫哂霸陵亭醉尉阿誰能識李將軍憶州倅舅氏一居闤闠一居鄉零落年來姊妹行少賤每教通世故長貧時與話家常封書寄弟箋曾濕對鏡梳頭髮已蒼腸斷𨝍溝東去路適汪氏二姊下世已及十六年所居天井巷小樓屢過之不忍登也小樓空鎖月昏黃憶姊晴暉橋北學場東竹屋時時與夢通砌繞石泉三寸碧窗分梅蕊一株紅已將復閣棲嬌女可有新詞寄阿翁猶憶北行牽袂處萬家燈火五更風憶女余以庚戌元夕北上故人生子我生孫世執還應擬弟昆趙舍人得子最遲僅長余孫一歲竹馬跨時才識路𥿄鳶放處定當門攤書已分傳家業學語差憐具夙根遲汝長安來繞膝看翁日日倒金尊憶孫吳上舍文桂倚梅圖黔南冀北走紅塵昨夢江鄉正好春何不石旁添畫我承明同作憶梅人才過燒燈無幾日誤書穀雨我心驚來札雨水日誤書榖雨多應仙客思家切預想踏靑人出城劉刺史大觀為亡友黃二景仁刋悔存軒集八卷工竣感賦一首即柬刺史一瓣心香契獨神此公高義出風塵應憐少日齊名者已作千秋傳世人檢點溪山餘笠屐刪除花月少精神詩為翁學士方綱所刪凡稍涉綺語及飮酒諸詩皆不録入向平婚嫁為君畢君一子一女皆君沒後為之婚嫁亦擬穿雲訪列真題蕭照所繪宋高宗瑞應圖六幅剩得東南半壁天忍將奇瑞説從前何曽楚璧能歸趙轉使吳州又姓錢朝野雜記徽宗夢錢武肅王入宫而生光堯內殿早教皈繡佛小朝真欲泣金仙蕭郎落墨非無意只畫樓臺夕照邉不少當時命世雄􅐤鞬都覺有儒風誰令密計參張慤却以中原付杜充唾手燕雲時已異傷心懷愍事將同茫茫一局全輸却轉悔飛棋入九宫天水南流讖不成臨安城異汴州城到來捷縱誇三矢從此寒應在六更未覺赤龍能踐夢好防白鴈欲渝盟冰天雪窖吾家事坐使披圖百感生三月三日作不妨衣冷更裝綿十里衝寒籠玉鞭到處雨猶零昨日别來人乍入三天是日入直上書房情懷已分難成夢消息緣知欲禁煙只有御河橋畔柳臨風裊裊試初眠送吳文學文桂旋里我從黔中來共子客京邸君今新安去是我舊鄉里旄頭星落白虎傾屈指井絡當銷兵二千石吏倘奉法五斗米賊何難平金門索米空年載無補于時亦思退黃花半頃麥一畦努力同輸太平稅送郭同年淳乞假還里春秋三榜悉同年入直同趨朵殿偏手版􅔡思參俗吏時同年外任者頗衆頭銜莫更説神仙著書我續容齋筆述祖君箋爾雅篇他日講堂來問訊胥臺側畔越溪邉古意十首貽晉齋應教同作魚遊濁水中鳥宅高枝上托身雖不同遙遙亦相望連枝新月出鳥影波上漾魚樂我自知沿流擘輕浪晨興必資餐夕寢必資𬒳一身雖無多物物無不備從兹百年內殊覺太繁費當前欣各足安用事心計微名在身後亦以付天地惟時把書讀掩卷輒垂涕持此一寸心寥寥欲誰寄莫辭家出門出門路即岐處既誰可偕出亦誰可依身非我之身父母之所遺敢學陳孟公一世隨高低松筠及桃李羣焉托春風先時及後凋命意乃不同桃李方華滋松筠亦靑蔥共結靑帝知幽芳間香叢榮悴任所操不居造化功所以深識人澄觀悟初終五日一浣衣十日一休沐衆中常緩步敢逞絶塵足齋糧時告匱祇復購薪束不知何奇書然火樓上讀昨者卧復起忽然心憂煎前古與後古一身居其間責備之所歸安得不懼焉何以貽後來何以承昔賢當食三歎嗟高懷惜徂年反羡行路人逐便可息肩繁星與望舒晨夕麗天闕司存各有在取道亦殊别如何百星光難補員景缺北斗亦自知光輝不如月我不為神仙非徒厭荒渺亦恐過百年事能生意表間居偶然夢列闕事幽討洪崖與浮丘容顔那能好微聞田橫客近尚住仙島畢竟忠義人後天而不老人言記誦佳不必炫文采寧知華與實兩兩實相待生為行祕書一死究何在何如能涉筆自命可千載締交數十年夜夢隔魂魄忽然來同心半面成素識神明苟相契不在今與昔孔程乍傾蓋華管久分席君看曹平陽方延掃門客送鮑郎中之乞假南歸五年不復同簪筆忽向東華語將别高齋學士我自慙長慶老郎君第一草年前憶夫容城君官我尚為書生一篇君賦初月影我把君卷時緃橫十年前過昆陽驛君作使星吾尚客八句君嘲退院僧僧把君詩倍珍惜驛旁僧有娶妻生子者君作詩嘲之僧每舉以示客朅來同宦曾幾時君復僦屋鄰曹司銜杯每苦暮鐘動一僕一馬趨城遲君寓內城此回别君真草草道遠飯君須及早練塘湖北蒜山西他日訪君應未老西爽村雅集應教平波三十頃樓閣總如浮聽雨來簷隙穿雲歷樹頭竹梢時礙鹿花點欲驚鷗不是春光滿還疑雪苑遊三雍開祕笈萬畢述奇辭古樂阿間獻新碑丞相斯主人工小篆時觀所橅嶧山碑阜同分陜陌水軼定昆池喜值端居暇賔筵酒不辭淸明日同人各携酒至陶然亭餞吳侍讀錫麒分韻得郭字今晨值淸眀淺步不出郭言登西南亭稍覺筍鞋拓窗櫺無用掩空翠四垂幕天半遞逺風輕雲落如鶴梨棠間桃杏花暗一層閣春蔬羅數十所喜新意各泥飮苦不豪停觴歎離索東瞻暨吳會西念及商洛時聞賊匪竄入魯山如何遲露布顧望期屢錯吾子又告歸心期渺誰託中年富筋力敢退事耕鑿無容籌去住且復視寥廓客去酒忽醒泠泠戞車鐸閉門見花落有感麈勞擾擾復紛紛却掩重門杜見聞入世早推能慮事到頭何止僅工文間花積地驚三寸薄酒澆愁只一分欲搆草元亭未就暫將奇字課劉棻晚坐草花艷紫林花紅胡蝶五色飛當中刺梅黃更出墻角白玉一樹嬌春風藤床坐久春陰薄香氣冥𪷟合成幕忽地吹來雨腳斜梨花樹上桃花落四月十一日綺春園雅集應教名園一棹水沄沄柳正披香草乍薰畫舫已教延碧月紫藤偏欲上靑雲欣傳檄報秦關捷不礙顔從魯酒醺雅有剡溪箋百幅時觀成親王所書堂額亦乞寫卷施閣榜醉餘書許乞羊欣昆明湖水接天流揖客都從水上頭正好柳陰三弄笛未妨花裏一登樓迂踈尚荷賢王禮擾攘誰分聖主憂殘盜莫矜盤踞穩早看飛將下神州趙忠毅鐵如意歌三尺鐵作如意誰其握之趙忠毅惜哉公生明巳季委鬼茄花吹滿地恨不擊王孟津門生有此真亂羣恨不擊烏程魏故人子已成敗類半生所遇總如此悼歎公生不如死鐡兮别主二百年倔強宛若公生前君不見我雖不見公幸見公遺物稜稜一方硯凜凜三尺鐵嗚呼二物偶流傳想見公心如鐵石米圖南鐵笛歌一聲遲一聲疾雲將穿石欲裂不知何人製頑鐵百錬鋼成三弄笛空園初春窅其無人水際一曲蛟龍欠伸排淸風出明月樓高高聲不絶三更已還客興闌百舌軟語花開顔望雨作朝望雨雨不來烏鵲聲裏紅雲開暮望雨雨不下柝聲茫茫星影瀉五陘山十日不出雲赤日炙竄牛羊羣昆明湖一旬水減尺靑草欲生魚鱉窟東西紫陌飛麯塵祈禱日煩兩聖人君不見安得簷頭雨如注更望驛西傳露布時望陜西捷音甚切草六日新雨後作燕歸梁雀歸牖雅巢左邉鵲巢右延回只有雙老烏無樹無巢向空門先生看雨出屋頭破暝復聞呼婦鳩風聲蕭蕭葉聲亂一尺鯉魚飛上岸頻夜起看殘月有作少歲如新月初三及上弦最憐光滿夜亦似客中年齒髮今如此情懷愈黯然回回過宵半判與看殘蟾偶成殘月出半宵殘客扶半醉月從門外入披牖與之對客行既不前月影亦不退何如鋪桃笙就此月中睡澄懷園即事十首讀書樓上一燈紅穿破踈簾入水中隔牖乍驚錢庶子誤疑殘夜月升東所居與錢庶子􅯆相接雨濕溪光畫不成平堤百尺水雲生過橋時有琤琤響學士廳前落子聲張學士運暹與王侍講綬裴編修謙暇輒對局直廬遙對寺門開童大理鳯三寓廬獨在澄懷園外分得西山一角來載酒欲過童大理十年重與話繁臺十年前曾同客開封八分日影上階除張檢討綬出入每刻日影為度風動簾紋自卷舒携得剡溪藤十幅成王書罷定王書嫩涼時節雨初過格子千行墨數螺却笑病餘陳贊善萬全索書人比索逋多屈指風光五月前蛙聲閣閣草綿綿宫紗賜罷頒宫扇日午傳宣集後天偶向花前共舉觴自慙小戶遜三張謂學士及檢討䎖綬花豬肉好梅蘇熟更憶西頭達侍郎達侍郎椿飲饌兼人破曙同看入左門金爐宿火尚餘溫傳經不愧真司業分課皇家五代孫邵司業玉淸督課最嚴時分授皇元孫經洗馬淸談昔擅名説經祭酒亦鏗鏗闌干日午天風起吹徹南來笑語聲謂王學士坦修汪祭酒廷珍間㕓一畝富莓苔正值花時借榻來架却紫藤扶住竹淸陰仍待主人回豫應居西頭小樓以墻宇盡圯暫假寓萬侍講承風直廬夜起塔頭明月來長徑一千尺非比靑松枝欹斜不能直天中節近有懷里中景物并望家纍入都梅仁如豆杏如丸桃實成拳砌滿盤昨夜江船來海口鰣魚三尺勸加餐薔薇一架後先開不向墻根問蜀葵襯得石榴紅更好野鶯桃與土玫瑰睡覺西窗雨氣腥戲將采線繫蜻蜓聚頭扇子無多摺自寫黃庭內景經石首江瑶總遜渠品高入市故徐徐銀鱗玉頰疑無骨喚作人間團扇魚新篘白酒透簾香冰齒還嘗薜荔醬却謝水鄉三尺雨楊梅深紫枇杷黃約伴同遊西滆湖梳頭先費睡工夫倦來不怕春魂魘新貼紅梅閣上符蜀山鞭筍出林長紫莧黃瓜取次嘗兔麥上場𧖟豆老便乘舴艋醉新涼枕波樓閣止三椽簫鼓盈盈咽一川已是苧衣涼沁骨更扶殘酒上燈船初三巳是學堂空競渡爭看出郭東六角蒲葵三角黍采絲穿就過天中不見津門信使回小亭遲汝獨銜杯船頭醉蟹船窗酒可彀而翁消夏來山行雜詠人從窗裏卧塔向門外立忽然塔上人欲與窗間揖簷鈴吹笑語高下勢不及無由寄真意飄此頭上笠一晌乘便風翩然墮階級空園半畝花左右交虎迹淸晨客初來怪鳥啼屋脊心空忘喜懼即此鋪尺席鳥亦竟逺飛虎亦不前逼始知忘機人物外有真適信難居滿頰莓苔生出谷雨聲碎入谷雲光肥一出一入中蝴蝶雜客飛疲蹤欲誰投暫借雲所棲一川饒怪蛇百鳥噤不啼何因知宵昏庶賴警曙雞橋東與橋西破曙一招手前行殊未覩隔此水楊柳荒荒行半日月落斷山口居人方啓戶行者倦奔走勸客盍早餐山桃實如斗四望悉無見松杉與簷齊亂石黑半天壓此睂睫低石竅出一門何能辨東西居人耕山田盡向屋脊騎勸客早出山雲生路當迷迷途忘高低蠟屐向空墮𪷟𪷟倒生竹衣𬒮牽向左欲尋人迹問半里斷煙火沿流聊徙倚缺處雲落朵古廟無神靈牛羊占高坐午日拜紗葛香藥之賜紀恩一首弱冠為人師逮今幾卅年人言紳佩榮簪毫入中天經傳聖人孫戍削甫及肩朝朝食天厨虀鹽夢仍牽日午宣賜來鵠立朵殿邊􅌭紛香藥丸紗葛欣有聨才出內左門傳宣復連翩俯念節物佳當食更將涉咸陽避責未築臺塊然身遽亡三十既已逾四十渺難得赴君之喪哭君切伶仃一棺詩數册此時逼側復逼側巫咸岡雲四結昆侖河濤百折炎風蕭蕭雨聲急又疑天為詩人泣詩人亡後十五年新鬼故鬼圍墳前君亡後君配與太夫人皆相繼卒錦州刺史劉大觀獨抱一卷來長安奉錢三百千一一為