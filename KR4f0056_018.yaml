良人無年妾命促手握此花方瞑目萬古貞心托貞木同人約七夕卷施閣小集先作此代柬紅燭千條酒百瓶石闌干外雨初停人間未必輸天上此夕虛堂聚德星七夕詞今歲風波惡濤衝星斗邉時大雨連日永定河決口鴛鴦三十六險欲上靑天茅垣排東西土室圯前後只有天漢邉紅墻尚依舊别夜雲軿斂淩晨綘節移年年當此夕真可説瓜期十一日同人集卷施行閣醉後作十日無一客客至必滿堂十日無一樽客來必千觴主人愛客客亦知皆競來早無來遲鞭絲影拂稜稜瓦洗手花前客停馬淵魚林鳥盡不猜客到先已穿池臺茶爐聲喧話不足失喜一林新果熟雛童攀樹鳥啄枝一徑先入紅參差果中開筵忘爾我上坐主人無不可忽然客句矜速成滿屋盡變為吟聲歡呼座中人歷亂屋頭雨驚雷掣電總不聞銀燭如椽客圍語須臾雨歇月滿廳蠟屐攢響來窺楹半廳人歸半廳坐别掃一廳留客卧金手山等皆留宿閣中三更門索誰更牽知是驚烏夜飛過鳯仙砌下亭亭立應呼侍女花緑須扶徑草紅欲睨窗紗逸幹零朝雨芳心待月華窺籬兩三種因爾倍思家雞冠爾亦知時者忘言得久安未應憐鎩羽空自揭高冠秋實寧同味幽花不並看劉琨思起舞側耳聽無端秋葵八尺簷楹峻枝高尚出楹孤懷終自揭仙掌曉來擎似愧凌霜質徒矜向日名寧隨鮑莊子刖足有餘榮紅蓼秋花雖自好未比水花妍紅紫分三徑江湖别十年舞風踈竹外弄影夕陽前不聽吳娘曲從兹别夢牽秋海棠何事腸俱斷傾城色尚誇春人兩行淚秋雨一叢花恨繞江郎筆愁生蘇小家蟲聲漫鳴咽心緒正如麻玉簪花秦關誰種玉楚國倘亡簪泣露冤難剖埋蒿冷欲尋淡宜涼月曉間稱古墻陰似有泠泠響風前答素琴十七日驚聞畢尚書師楚南之赴翌日于卷施閣中為位而哭哀定賦詩六章即寄莊邠州炘錢乾州坫陜西毛簡州大瀛四川孫兵備星衍山東楊靈州芳燦甘肅方伯揆貴州楊大令倫廣西王大令復河南三十年來事都慿信史編此生誰念我九死欲呼天訃出朝班上魂歸夕照邉報公惟砥節方不負名賢死不為公恨傷公未盡才潢池仍待勦衡嶽遽先頺諸葛中年隕文淵半道摧世儒真淺識猶望歷三台由來三楚事終始一人支微管功寧泯亡彭讖獨奇公少時術士言公官楚南日即當謝世蓋合公姓名為讖也夜星驚櫪馬秋霧濕牙旗千百孤寒淚從今灑路岐遺大投艱後羣疑衆謗中萬言陳至計公去歲請撤湖南兵專勦湖北疏入上嘉其藎誠一死遂孤忠分野旄頭落盤門羽檄通蠻民商配食先在伏波宫老每思巖壑君恩未賜環回天心獨苦匝月鬢都班公體素強自籌楚事旬日鬚鬢皆白事與元勳勒封同五等頒傷心別時語乙卯冬余自黔中報滿入都公留話三日方别原不計生還同人凡幾輩白髮半應飄訝絶全家訃半年以來公仲弟夫婦及冡媳房老皆相繼卒哀騰八月潮公以潮生日生故小名潮生枕鞍書耿耿歸櫬雨瀟瀟他日虛堂宿仍歌楚大招曾都轉燠以六月草一日集平山堂為宋歐陽文忠生日設祀同人賦詩成帙并索亮吉詩因賦此臨安祀東坡𨝍上祀永叔兩公政績猶在人不特高名輩流服異哉平山堂乃祀和仲忘歐陽豫以癸巳甲午客揚州榷署臘月十九日曾兩隨衆于平山堂為蘇文忠設祀門生風義古無匹詎敢僣食來堂皇千秋此論誰折衷乃在七百年後曾南豐雖然文章節義諡並同配食六一庶得睂山翁此後君倘接武雙文忠賔筵開酒人滿太守風流逮都轉昔時門生今里閈誰知誕日尤奇絶君後公生才兩日陳公塘接邵伯湖荷花世界昔所無不羡奏樂章不羡祝嘏詞只羡蜀岡岡頭三日宴正直千朵萬朵紅白花參差古來文福能兼少况復身持節旄早一輩才人座上多二分明月揚州好君不見我亦平生感舊遊吟魂多在庾公樓大星昨報前軍隕昨得弇山尚書赴淸淚揮殘天盡頭君思歐公我思畢同是龍門異今昔十輩門生宦九州謂莊似撰錢獻之孫淵如楊蓉裳荔裳諸同學感恩一日頭俱白王南寧少林太守陳博士澧堂學博我所思兮二三子却憶征南幕下人一篇並寄吳江史册崖文學重哭尚書師三日愁霖漲滿池打門消息到偏遲南來薏苡冤方白北渡瓊瑰夢已知無淚哭公惟有血此身閲世詎多時平原賔客消沉盡誰共筵前奠一卮謂邵學士諸人七夕夜坐戲擬古别離詞寄孫大山東中歲念師友懼或成晨星晨星今亦稀惟剩一啓明啓眀之東我則西天末回首常淒迷一回思君一回切願減光明作殘月一月相隨得旬日不然此滅彼復生君為啓明我長庚昏旦相代東西行我持此語思上告織女黃姑愁未報南極老人先大笑苦雨十日雨不停莓笞緣斗栱虛堂蒸毒霧梁燕欲移棟居鄰斷煙爨欵戶求火種為言墻半圯床榻陷成冡填街三尺水決竇不旋踵憂來展書坐蟲喙集窗孔心切望曉晴偏驚橫螮蝀贈楊州倅廷煥即題其傳硯堂卷子難兄薄宦久蹉跎時令兄倫檢發廣西軍營萬里新從馬伏波小别最憐饒涕淚半程相送越滹沱傳家硯比兼金重賣字錢無落葉多我是孔融交兩世一回展卷一摩挲八月草二日侵曉出西便門扺海淀約任軍門承恩共遊西山因小憩官廨待法祭酒式善何水部道生作我行月初升甫到月未落初日亦已輝星光尚回薄𪷟𪷟開濕霧才止巷南柝官齋野花艷隙地日開拓早飯及射堂紛然具羹􅌜年豐饒稻蟹且喜鱠新斫傳觴休更緩有約在巖壑斜行車屢陷溝水仍未涸周廬欣在望便道一省度園林甫修葺昨已飾丹雘笑指雲外樓今成草元閣時新修澄懷園余已移居近光樓下因便道入視循靑龍橋北入山高原無人居千頃堆白日前行驚眯眼沿道飛石屑流雲勢洶􅍅意欲礙車轍萬葉鼓北風斜衝一門出騎行既回互徒步徑尤劣絶險度一岡同行儼相失􅌑瓏諸石竅往往野花茁秋蟲與相間竹徑亦幽絶到覺萬仞湖孤懸石樓末久憩龍神殿觀泉源并喜春海棠復開墮薪天半落知復有樵人及此林花放幽巖忽覺春稍稍開宿雨黯黯及蕭辰三時金鑑影五色莓苔文土囊風既迅石竇泉初分松陰灑危殿嵐光度寒門層層凌曲磴步步絶流塵禪扄雲欲活初地烏尤馴百念此時寂齋鐘亦不聞登蒼雪菴小軒望安定平則諸門并見白塔松陰甫迎人檞葉忽拒轍士垣從東頺了了露佛闕旋螺方數轉足險入石穴欹斜臻層軒眼界始宇兀窗櫺寧待啓雲怒已飛出重岡莽回環幸有北口缺奔流從此注百里只一瞥𪷟𪷟煙盡處時逗人馬迹心空無窒礙木葉半俱脫誰云飛鳥迅詎若隙駒疾危瞻七層塔天際白如雪斜日下九門丹樓亦齊宇題羅山人聘為周編修厚轅所作移居圖人生安得如淮酒更載奇書及嘉耦書完一卷酒一杯鶯燕一一飛前來倦餘即卧書函下酒得美人斟較雅我疑醉鄉日月不可遊何意復戀鄉溫柔或云藉銷奇氣慿萬卷否則佐此情話須千甌周郎舊乞金門假重到蓬萊已三夏偶然聚得薄笨車家貝如此方移家酸寒頓改儒生素玉軸金叉照衢路遂令畫鬼羅兩峯描繪人物仍能工馬嘶塞路車填轍一笑敵君如有術以劍扺君書以琴扺君妾惟餘酒癖未盡忘醉裏狂談磨齒頰雖然此客尤可防倚酒或恐登君堂書能目十行酒亦吸一斗把君奇書覆君瓿惹得美人開笑口八月草九日扺澄懷園成親王枉騎過訪并辱贈詩謹賦此報謝偶厠談經席頻勞問字車過汀喧列騎入室噪棲鴉土竈茶難熟丹林日易斜不因鄰禁籞猶認野人家中秋日何民部元烺水部道生招同法祭酒式善伊比部秉綬趙舍人懷玉遊法源寺竟日慈仁荒敗崇效逺禪窟此間稱最古維摩立地有丈六傑閣去天才尺五三門乍啓通松徑百步相連有花圃虛堂僧健老復丁靜夜人歸月亭午澄懷園九日荒園秋盡景蕭騷一半松林起怒濤是處岡巒行已遍破除今日不登高澄懷園夜起看月卷簾列宿已全收是處天光接水流剩得一星隨一月慿欄看到五更頭周廬三面麯塵淸風起雲生與地平百步樓臺少人影馬嘶聲和客吟聲管夫人墨竹石徑空𪷟翠欲流琅玕影裏雨初收何緣不寫王孫草多恐人饒故國愁澄懷園即事橫塘萬頃荷花死蓮葉蓮根泣秋水參差鴛瓦鋪新霜螢火一夕收淸光枯楊半掩窗前卧抱葉寒蟬向空墮湖東明月湖西來緑窗此事開未開晚步荒岡南去徑縱橫半里斜飛落葉聲惹得暮鴉成陳噪夕陽人影樹頭生夜起落葉驚人起開軒月露迷却從行馬外斜度濯龍西萬樹風聲肅千門燭焰低勞勞我何意默坐聽荒雞築屋築屋臨官道郵書鎮日馳水寒雲去駛天逈月來遲劍閣初聞捷荆門尚出師南征諸將士知否扺恩施澄懷園偕同人晚步歸鴉已入林未礙客幽尋風遞千門響雲飄四野陰訪經蕭寺冷照水石梁深不是逢搖落誰知天地心袁大令枚寄示擬戊午已未重宴鹿鳴瓊林詩二十首率成十二絶奉簡唐代詩人推李杜何曾雁塔得追陪先生要吐前賢氣兩向慈恩頂上來也逐遊塵上六街不知早已脫芒鞋賔筵開處􅊯􅊯鹿定帶長生苑內牌白首研摩事可憐從來一第比登天名經千佛雙番寫始悟公真劫外仙三月春光暖已回五雲多處綺筵開劉郎前度誰能識錯認耆年賜第來一輩人皆上玉京獨留老眼識羣英先生遊歔蓬萊日多恐諸賢盡未生憶昔追陪聞喜筵記同上相説齊年謂庚戌登第日嵇文恭公重赴禮部宴不知此老來春宴更有何人步謫仙却笑從前向子平苦留婚嫁晚經營先生五嶽書名遍遊戲重題雁塔名老去重登選佛場此翁何似魯靈光斷無門下門生在有亦居然大父行宴罷瓊林走璧車珠簾十里影橫斜當時玉貌誰能識只有宜春苑裏花短笻秋到倍精神無數羣賢逐後塵畢竟姮娥愛蒼老桂枝全借白頭人屢枉山公問訊緘林泉歲月一何淹公與文成公阿桂同舉鄉試今文成已辭世少微不隕中台隕始信公真文福兼王母蟠桃歲月長朅來屢見竊東方曲江杏比瑶池實也要先生三度嘗十月初六日同人集積善大令晚香精舍看菊并出古琴十六相示即乞主人與何水部道生于花下撫琴率成長句琴琴不同聲花花不同色琴標六代元宋唐花放百枝黃赤白古琴泠泠一十六其外蕭踈盡叢菊琴囊滿墻花滿屋一本花開彈一曲主人豈止能愛琴愛琴兼賞琴知音何郎三十妙指法花下一見先題襟主人豈止能愛菊尤愛看花人不俗為花築屋亦殊雅别自扃門不煩僕我生嗜古癖未忘舊物先撫澄心堂主人蓄唐琴三其一即澄心堂物也題名元祐三十字洗以菊水逾淸光灌花初完撫琴好猶有春泥在長瓜琴聲愔愔花裊裊花韻都浮七絃表客彈一回主一回千朵萬朵花徘徊罷琴置酒客不去花下促坐傾千杯琴停既無聲菊暝亦無影主人離披客酩酊明月入來窺藻井挽王大令復二首昨得安陽札安陽趙大令希璜札來始得凶耗連篇悼偃師更憐交友少已愧哭君遲泲上猶相訊孫大昨來札尚詢君近狀函關定未期錢州倅坫茫茫揮老淚西向酹親知謂畢尚書師及君中州民力竭防賊又防河屢處凋殘地偏能惠愛多敢期􅈾上計終自拙催科一卷新詩在明明勞者歌李大令符淸濮陽跨驢卷子琴堂三月别獨跨一驢來面目都非是衙胥各浪猜詎知行役苦安怪壯顔摧他日傳循吏推君利濟才乞友人作歲朝圖胎詒晉齋主人并綴四截句窈窕房櫳水一彎早春偶得著書間休嫌屋後峯巒峻此是淮南大小山沿街都為歲除忙淸絶城西半里坊却憶諸王勤問字未妨門有束修羊詒晉齋中一事無幾聲爆竹歲將除兒童簫鼓轟前後不礙間堂讀道書日晚天街跨馬回小疲聊復舉深杯房廊迤左休教掩要盻西山臘雪來小除日章大令學濓遣人餉酒時適寫歲朝圖却寄并附以詩故人念我寒餉我酒一尊䦱門不敢應恐是催租人催租人不來送灑人踵至時郭大令亦遣人餉酒及食物開顔對使人汝亦大解事主人官赤縣騎馬日出城百事逼歲除猶能念友生銜杯對盆梅前數日承餉盆梅四種此意何可報聊寫春風圖博君元日笑受業吕培談正治校字
