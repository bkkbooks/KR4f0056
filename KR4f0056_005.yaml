front:
  text: 更生齋詩卷第五
  hash: sha256:5a63a12b3795a44a1427a133c7ba51817617d2754108f2523db1613244e67c4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_005-1a}
body:
  text: 陽湖洪亮吉著箬嶺授經集勵志詩三十首獨木可製棟乃反裁作橋獨木之橋心焉搖搖獨木可立柱乃反刳作舟獨木之舟或沉或浮天形不知以農為師地圖或溷引商參問欲知古詢及賈欲通俗訪及僕羅網待物不擇飛走資格縳人不問賢否慢神無福諂亦如之不慢不諂是為得之學佛無益毁佛無損不佞不毁逹人所允萬燈雖明不敵一星九流雖精不敵一經星晶瑩海宇寧經習熟治術足荈佐飮煙佐食腸浸淫口呼吸一火攻一水厄消肌膚鑠精液一家飢寒優及里䣊四民飢寒憂及君相靈狐狺狺善惑世人神祠穴久不媚土偶林禽剪舌巧過百物有法制之禦以木訥身欲死藥不靈心欲死語不經語不經神殛之藥不靈鬼殺之我欲上天祇慿一梯天之高高梯則巳低我欲渡河祇結一壺河流湯湯壺不可泭以力養人力懼不展以心養人活及無算以財濟世財有匱時以言濟世利無窮期妄思奇福必得奇禍妄思窖金必至家破龍行雨聲不聞龍出聲雷即嗔鵬摶風翮不露鵬奮翮天即怒我所思在九域以外九域既窮天地何屆我所思在萬物之究萬物既究孰持其後心無欹傾不畏震霆行無疵纍不畏社鬼社鬼所摶必非強梁雷火所觸人或不祥齊三士可稱勇伏劍死不旋踵魯兩生可號儒叔孫先不能汚齊三士誰可敵田橫島五百客魯兩生孰可同哀平中楚二龔衣無復單難以禦寒家無法紀難以服官衣之有復潤及肌肉家之有法化及鵝鴨惠人升斗莫惠以口殺人刀戟莫殺以舌口惠人怨必叢舌殺人巳必凶妖禽九頭妖狐九尾顧首顧尾不見可喜抃鼇斷足形天斷頭時起時舞不見有憂盜賊水火不過家破飢寒困窮一身之凶妒賢嫉能殃及孫曾利已害物禍至殄滅環堂而行跬步有幾行之不巳可積千里索書而觀書苦易竟循環讀之義乃不盡欲身不病無與物競欲身無災與物共財檻虎縱馴不使導遊吾誰與偕岸有白鷗籠禽雖俊不與論心吾誰欵曲案有素琴不隨俗可挽俗不趨時乃救時父母存苦賤貧虀鹽蔬菽日以奉親父母逝感遭際錢刀錦綺僅以營祭東流滔滔逝不回西日宛宛誰能追行持形骸入蒿萊元堂幽扃永趨陪鵬六翮難傅天蟲百足難陟巔終為人所嗤不為人所憐百步之內必有嘉木吾拜松竹重其先拔俗一林之中必有飛翔吾拜烏鵲重其不出鄉一身之事妻孥不詳欲告我友又苦各一方百年之中半不居里惟蠧魚追隨見我輒喜喜飮海水喜食海魚春夏卜居無逾巨區喜餐湖淥喜采湖菱秋冬讀書宜傍禹陵鏡不留物影過即滅世不待人事去即陳浮雲激電生滅何速視世以心不視以目壬戌新正九日吳封翁端􅉓等邀集世經堂看梅作昨夜羅浮月微黃挂屋端居然半間舫釀足十分寒殘葉樹頭墮古香枝上探花前兩年少吹笛勸加餐十八日偕陸孝亷繼輅莊上舍曾儀黃秀才載華至城東檥舟亭探梅回集卷施閣小飮即送孝亷北上東風才解凍北風又飛雪已傷靑春遲復與友生别陸郎卅載同鄉里早歲聲名日邊起蝶夢莊周昨已醒牛醫黃憲今誰比三君一例皆少年各矯健翮凌風前流光真慨熟羊胛壯志欲餐生彘肩嗟余病巳經時臥五十五年殫指過范雎脅向生前折荀偃頭從夢中墮閉門且學楊子元精義一一離言詮雪花六出梅五出日月右旋天左旋因兹悟徹無生旨大地春光亦如此要從鶯燕識春秋不與蜉蝣共生死燭光千頭淚百堆日昨畫鷁從東來元夕城東戚墅堰有競渡之戲天門一笑即飛電地軸半拆驚轟雷間門却倩梅花守掃徑惟應待良友二頃雖無陽羡田百壺且中山陰酒東門之東花幾株草根樹皮春已蘇大姑城訪東晉剎少伯河接西洮湖荆湘米價平難得楚蜀軍書尚馳驛燈火初回眼已靑干戈乍歇頭先白八角籬門尺五汀暫時分手若為情南行欲趁鳬溪棹北上先題堆塔名將至洋川書院先詣郭北謁别先塋經年方覺定羈魂松柏蕭蕭謁墓門已分頭顱行萬里昨歲蒙恩免死遣戍伊犁至戍所將軍又欲行法亦荷聖恩以免僅留皮骨反孤村長愁擬共張平子妙德慙無袁愍孫揮淚更從原北望鵓鴣聲裏上朝暾過東壩已斷中江路銀林五壩長水難歸震澤波轉宇丹楊别派分天塹低墟減地糧五埧成髙淳諸縣遂為澤國前明遂奏減地租派入宜興荆溪等縣臺濛遺事在三復感滄桑花朝日阻風江口望采石太白樓咫尺不得上今朝花朝無一花今夕月夕亦無月因之酒人無酒飮空向酒仙樓畔歇沉思往事心內傷陳劉應徐均已亡謂三十年前學使署及沈太守業富署中諸賓客如邵學士晉涵高孝亷文照汪明經中諸人我前同公謫夜郎意外復得還江鄉眼中千里與萬里只坐沙洲慵不起忘機雅有忘機伴鵯鵊鷺絲飛不巳君不見江源亦出昆侖中往者險欲探奇蹤伊犁去昆侖䓤嶺皆不遠豈知勞人家住海東岸江水過我始得東朝宗奔馳歲月方三載江水未移靑鬢改竹帛偏憐壯志虛乾坤剩有詩名在二更月出斷崖口遠道呼童復沽酒花時雖無桃杏花且向原南折新柳涇縣道中夜宿春山一路幽蘭香菜甲遠襯斜陽黃藍輿時向杏梢度薄暝尚欲穿層岡一山初平一山出怪石總從頭上突却到山溪夜已闌橋南一樹花如活過茹麻嶺茹麻嶺南無隙地麥隴盤盤上天際靑松陰裏紅杏花波影日光微覺膩踈踈一樹闌干右燕剪未來蜂已逗晴空復聞喚雨鳩呪得一角陰雲浮行次桃花潭山店看杏花作整整斜斜劇可憐桃花潭側杏花妍銷魂樓上三更雨似畫江南二月天小語未妨留睍睆間情只欲惹鞦韆慈恩回首真如夢露冷煙殘又十年山坑道中雲乍離山日向晨浣衣津口淨無塵不知頭上花齊放祇覺遊蜂戀美人扺洋川書院來路雲已遮去路山復塞山禽亦分界飛不妄南北惟愁山外事傳到此山側預戒五尺童不延山外客追思荷戈地亦有萬仞山但覺白氣周無此靑彎環攤書向簷前鳥語殊綿蠻勞攘三十年獲此一歲間生徒十數人曙即攬衣起周廊聽書聲都穿白雲裏與談前世事一一盡色喜所愧學業荒欵門來不已樓前半𤱔花紅氣通八牖朝霞復相間赤白分左右欣兹讀書暇時亦陟岡阜日昨山雨肥園丁獻新韭詠亭側海棠薄暝行山坳花氣籠一谷紅襟一雙燕守此花畔宿紅紅白白競半春只此花態尤淸淳亦如名姝善守身艷極不欲銷人魂一花初開承一葉葉上時時綴胡蝶雲紅露白夜不眠要看殘月來花前曉起看梨花一白疑無影亭亭物外斜祇宜將曉月襯此欲開花飛瀑空相照幽禽靜不譁闌干兩三曲何處著春華山樓喜雨歌一月不雨憂三田四山出雲高接天雨聲似挾海潮至一夜迸落山窗前山中懸溜本數重添出百道如飛龍喧聲忽然入室中欲挾床几淩虛空漫空花雨尤堪訝桃花李花成陳下海棠可惜昨始開連蘂都飛北窗罅園丁失喜農師幸風伯差嫌煞風景翻盆雨驟晴亦驟北斗仍看挂松頂沉思往事聲暗吞憶昨雨急趨烏孫竄身無地得空穴雷電又入􅊧驚魂雨行作雪夜若年我僕尚滯南山巔羊裘濕盡不得脫指凍欲裂飢腸煎即今生還萬事足況復眼前書可讀雨聲風聲縱淩厲足不下床頭戴屋君不見雨餘濕翠復幾堆曵杖更欲登層臺老叨無端笑口開明日驚筍登盤來山館靜坐憶孫大星衍戊戌年曾共隨學使者按臨過此縣境峽號塤箎澗響琴卅年前事一追尋巖腰柳尚凝靑眼谷口蘭真愜素心偶爾塞翁悲失馬依然山館仿來禽舊遊十輩今誰在最少如君白髮侵將至旌德趙兵備翼枉詩相餞未暇報也山館無事戲作長句柬之并約同遊黃山逐臣初歸戀鄉土日日醉眠腸欲腐有花即向花前飮不問誰賓復誰主少年英英丁與陸明經履恆孝亷繼輅跌宕文場氣頗粗就中我敬西頭趙七十高年健如虎哦詩一字不相讓往往雷霆雜吞吐牡丹八首尤奇絶老筆轉能生媚嫵百年文獻差不愧一輩賓朋試重數忘筌莊叟善高論中允通敏荷􅓩伯倫稱大戶舍人召揚沈吳近又結詩社廣文元輅封君端彛劉蔣頻招宴花圃太守熊昌總鎮烜賽神我憶月草三去歲二月草三日清明競渡人喧日端五波光已覺淨如綺筆力復看強過弩座中詩派判唐宋壁上兵鋒看秦楚危詞縱纍十二碁定律不差分寸黍便教長樂嚴刁斗敢與淮陰鬪旗鼓強梁幾欲扛周鼎弱肉何堪試蕭斧叢譏杜老作詩瘦轉學荀卿著書苦此來百里程迢遞實避千言氣莽鹵仍擕季豹同趨孰時挈兒子符孫人孰未礙伯鸞居賃廡萬山已距南來轍一屋祇開東向戶三天子障肩堪並五老人峯頭復俯九華山距此不及二百里雲光破曉嵌睂睫淸氣厯時充肺腑耻同詞伯競壇坫可許散仙居洞府狂遊尚未卜時日鄙意終須待儕伍我餐黃獨才匝月君跨靑驄去何所時聞有吳門之行名山欲入先鼓興此老若來當步武朱砂泉記仍可續紅杏原詩不須補緩程水定由靑弋回路嶺仍登白紵狂思策蹇升龍脊醉或然犀燭牛渚餘間并可覔酒人陳巡撫淮近寓居蕪湖得暇未妨談食譜君如爽約當有説意必兩端持首鼠蹤疲既畏行客笑句劣或恐山靈侮興公果係天機淺安石輒為人事阻縱然曳踵看山色應悔埋頭住江滸溪南帆席不肻挂屋北降旗定須豎歸時擲示一巨編讓我長歌擅今古登山半小閣一閣瞰四山缺處望箬嶺山坳一千戶厯厯若居井白雲穿入牖曉夢尚難醒幾家晨爨早煙縷上山頂煙光觸花氣倏忽暗朝景獨坐心轉淸憑闌試新茗山下訪友門前古樹分向背千枝百枝鳥聲碎有時出屋不及冠頭上白雲如可戴興來欲訪溪南友水鳥鷺絲分作隊橋心甫過魚驚竄瘦影亭亭嵌波內南山雲晴北山暗坐覺一窗殊顯晦野人留客頗勤懇手剪靑靑一畦菜家貧不諱瓶無粟舍北村南總堪貸飯餘一晌眠初熟倐忽怒雷喧水碓竹中一徑穿曾慣人去鳥來都不礙零星舊事談難竟送過前溪步方退為言山僻有一龕明日倘來堪晤對侵曉送客過嶺孤帷隱一燈行客尚未起殘月下北山寥寥犬初吠一峯抱一峯劣徑入隻騎十里吹濕香原空瀉花氣偶成鳥聲不下樹蛙聲不上山夢醒聞衆聲寥寥隔層關前宵一雨山光緑添得水聲飛上屋三層閣倚百尺松飽聽日午吟蒼龍連日風雨花事零落殆盡牡丹芍藥尚無消息感而有作即示諸生岡北岡南厭登涉十日看花都作葉風飄萬朵無一存隔隴蔬花尚層疊間情幾日少歸束春夢百畨難妥怗負暄行客乍脫綿驟暖高齋欲搖箑無端頃刻變晴雨或者陰陽欠調燮名花縱謝柔桑嫩樹上家家有𧖟妾擕壺挈榼上冡忙劚土四邊封馬鬛茶畦偏多麥畦少久矣斯風盛宣歙洋川書院挺山半築屋居然象城堞一瓻我尚遠借書百里最慙爭負笈間翻左氏獲麟史教倣羲之換鵝帖蜂腰終覺句可商鴂舌半憐音不叶九經四史孰淹貫八體六書宜涉獵百房燈影遙相射半里書聲恍如接埋頭已覺遙夜永陟足偏欣上山捷諸生英英志莫惰春日遲遲睡防魘何時便可放勺藥此信定難瞞蛺蝶花寬十日五日約香已千枝百枝裛新蟾屈指黃半鉤嫩蘂關心紅一捻二分才向枝頭吐一朵誰先鬢邊貼花前勸我頻擕酒花下阿誰時步屧醉同山簡接㒿倒雨學郭公巾角墊金罍總向人前㵼玉笛須從樹頭擪半街月霧籠衫袖五色花光照睂睫商量却待榴火紅靑弋江應放歸楫度嶺一山初平一山起更有一山生足底怪峯稜稜都礙履山鴉啼愁山鵲喜翠柏靑松淨如洗山頭回身望山尾來路都沉白雲裏天梯初升石門啓已隔下方三十里山樓曉望花紅宜朝暾花白宜曉月梨花尚帶殘月光一樹棠梨已迎日人家分住東西嶺菜甲作花連十頃平田雨後飛濕光雲朵亦與花爭黃微雨天半浮雲過山頭暗一重早涼開北牖微雨入前峯已度三層澗全迷萬壑松冥濛看飛鳥歸樹尚從容山行添衣欲出門日色驟晴煦濛濛北原上春氣零若雨斜穿松櫟徑百鳥頭上語草花三兩種曲折礙芒屨前渡淺水灘牽衣待儔侶三月三日憶里中雲溪諸勝今晨三月三禁煙亦此日風花無一朵淸冷值佳節擕樽上高阜轉覺鄉思切遙憐池館好踈雨亦將歇北郭展嫩晴雙橋上新月應有挑菜人延回出城闕我家白雲溪雲白溪亦漲一鳥溪上鳴千花樹頭放近移東半里築屋轉相向春來倘無夢夢輒在溪上樓前楊柳樹闢牖可間望花落溪水深春人定惆悵郁李階前郁李多只惜花瑣碎沉沉春晝影迷客有如醉幽蘭獨高格開尚與人背梨花嫣然姿亦出桃李內庶幾顔色淡蜂蝶所不愛三春孰蹤迹一客獨盼睞欣然擕茗具晴晝看至晦詎忍折一枝夜窗仍晤對半山看雨雨聲欲走北風力欲挽西遂令一谷雲分向西北飛風驚西來雨北走天頂依然挂星斗風聲雨聲入夜昏鳥歸人歸爭一門君不見歸人歸鳥何太急鳥亦有巢人有笠大風拔木歌寒食前一日危亭不合皆畫龍怪底拔宅思騰空爪牙森森頭角挺惹得天龍下窺影雨聲飛完復飛雹風力驟回先拔木飛泉如濤響空谷餘勢尚摧花與竹畫耶真耶不可知但見半壁雲分馳雷聲亦自屋中劈照見鱗甲光參差江南山高水復濶幽處盡為龍所窟以龍招龍龍即出或者真龍怪唐突黃山之西白嶽東勸翁掃壁更畫高高峯不爾龍挾此屋飛入雲當中寒食偶成伊犁河上值淸明東距關門尚百程今日萬山深處坐雨花如夢撲簾旌誰向洋川紀歲華沿門都已採新茶山中春事忙如許桃李先開半月花日午山窗睡起遲東風吹夢入遊絲愁無一架秋千影間煞滿庭紅杏枝衰遲未敢説春愁棖觸鶯花憶舊遊只有白雲知我意隨風都到海東頭偕諸生至下洋川修褉各賦一首我來已半月未及洋水濱兹逢禁煙節又值上巳辰諸生學經時用志已不紛相擕勝地來驗此心賞真聯行亦無多童冠八九人牽衣過石橋酌蠡向水漘頗感歲月馳奄忽及草春吾徒勤讀書尤在志行純心性苟不漓遑計泰與屯朱雲折安昌其氣尚未馴及對嶭贛君品乃絶等倫寥寥一千年冀欲追絶塵狂狷致失中又恐戾聖門同堂貴參稽得間盍共陳歸及新月輝陶然飮芳尊淸明日望遠三更白雲四更雨踏靑人聽更􅋊鼓鼓聲才絶人聲優巳見春衫度林杪濛濛松竹徑尚昏春燕亦復隨春人風光縱好春人訝似怨桃花已先謝山中一歲止一來棠棣枝下仍徘徊一旬春鬢無顏色却戴幽蘭露猶滴洋川曲折徑亦斜沿路喜尋親串家湔裙春水年年好只惜紅顏鏡中老階前草花黃白可愛為賦一絶黃黃白白滿窗紗破悶聊拈午後茶從此不嫌風景淡草花能替樹頭花淸明日憶女紡孫却寄小白長紅幾樹桃嫩黃淺碧柳條條春光偶到三層閣客夢頻牽八字橋壻可學文愁病肺兒能涉筆幸垂髫謂符孫他時卜宅烏衣巷時得孫大季仇札約買宅共住江寧故云門外川光即六朝偶成校得南華內外篇晚春巳覺日如年新紅看罷看新緑正是江南麥秀天夜起尋詩似厭春晝忙三更起行百尺廊紅蘭花前月尤皎白鷺影外天何長樓臺密處欄干復北斗正垂闌北曲水西一燈行不休夜半已到山南頭欵門殷殷人不識失喜偏逢寄書客山深不及羅酒漿飯客祇有蔬花黃主人將眠客復起欲到縣中還卌里水北三松歌日日樓上看三松今日甫向松根過亭亭拔地百餘丈遠望仍疑水邊臥松邊一橋亦千步橋盡松根始全露盤空夭矯不可名一半橫遮水南路松梢沉沉足煙霧白鶴不來棲白鷺一枝北出勢更奇罩得樓臺復無數五松中間兩已枯間向岸北尋根株移南倘復十數武老幹直欲捎浮圖霜皮一尺裂一縫堆得苔錢已無空風聲雷聲昨倥􅘓龍欲出山雷雨踵倒海排山浪齊湧只有此松兀不動攫拏星辰疑有力回轉陰陽不踰刻根株盤盤穿入石透出石中枝尚直松聲近樹反不聞數里外覺驚濤奔鄰翁下見五代孫自説輩行無松尊愛之不忍手撫玩一月幾回來斷岸君不見四山中間人迹斷此客此松聊作伴暮窗看霧分半山坡枕水涯讀書樓上一燈斜怪來眼界空如許白霧漫漫蓋萬家望遠挑菜湔裙總未曾半旬常自睡瞢騰小桃落盡春無夢雙燕歸遲夜有燈舊友許貽京口酒新詩都寫剡溪藤惟餘望遠心偏切月黑高樓上幾層山杜鵑十日不出戶杜鵑紅滿山始知造化功足補春事􅋊紫藤亦牽花掩映松竹間胡蝶去已久何時復飛還曳杖一縱觀花露衣上班側聞鄰翁言消息到牡丹有此匝月紅庶可待藥欄山中山中雨半宵三日足淸響蛙鼓亦上山寥寥非意想即事山雲朵朵欲凌空罩得山花處處紅自覺著書心地徹不知身在白雲中雨夜友人過訪友涇縣人竹笠􅉭鞋猛叩關匆匆知自震州還故人欲話三年事積雨先沉四面山勸客酒杯心轉怯照人燈火鬢初班離家早已忘家纍擬築幽居水乙灣所居水西山水尤勝洋河橋題柱洋川三面是人家到得橋頭路已義却趕牸牛山北去不教喫盡野田花頭士女遊春圖白白紅紅草亦香且扶新月過橋梁春光似海人如海不避遊人説大方羅衫葉葉趁春遊竹粉時時拂面流摘得菜花何處用嫩黃先襯玉搔頭黃蜂何處覔遊蹤欲上層梯意轉慵拂面遊絲已無數第三層塔且從容驟晴驟雨筆難描一朵輕紅未破苞乳燕尚嫌毛羽重祇教胡蝶上枝梢曲曲溝塍之字斜踏靑才了路偏賖一條春巷門無數何處能尋阿姊家十四日夜起及此三更後吟堂􅓦不譁夜雲時作態春月亦能華蝶夢穿書幌蟲聲落畫義空明一灣水似不隔窗紗十五日詣日涉園看牡丹紅踈緑暗悵無端路僻山深夜尚寒似爾鏡中花爛漫鬥他天上月團圞風光艷憶餐霞閣香味淸逾承露盤迢遞樽前小兒女故鄉春好不同看昨歲友人貽異種數叢植卷施谷中此時當亦盛開故憶及之看花歸值急雨雲頭倏已昏雨腳來亦驟歸途經略彴四面水聲湊忘擕簑笠具衫袖薄將透幸兹坡險處我僕已迎候扶擕到軒墀早復注簷溜樓頭窗八扇看雨敞前後只隔山兩重空明月如晝夜坐好書圍四面復屋住三層花氣能消酒雲光不礙燈下帷更乍永擁被月初升只此淸涼境年前得未曾十八日詣延芳書屋看牡丹别分池館枕汀洲花外才停喚雨鳩修到紅顏仍有福開從緑野不知愁吹香簾下頻牽夢照影波中亦並頭倘仿徐熙圖沒骨焉支山下我曾遊歸途復過日涉園花事尚盛别來莫恨花開緩月缺一分花尚滿風風雨雨即不時梅枝李枝能護持牡丹旁有梅一株高出簷角為蔽風雨梅枝高更出簷角雨縱日飛花不覺固知顏色異泛常樹亦曲意憐花王花前草緑都如帶花影將沉夕陽外朝霞色淡草色紅雨後花尚嬌春風片時危坐北窗裏靜聽周廊鵲聲喜君不見林陰初昏客初起香氣逐人還半里二十日大風雨屋瓦皆飛至四鼓乃睡四山都羃雨雲氣代成峯怪響時穿屋飛濤半入松夜燈迷百級露瓦揭三重誰説高居好眠遲待曉鐘案頭盆蕙盛開書才完一卷蕙已舒九朵淸絶山館中幽花伴人坐二十八日破曉雷雨驚雷一片穿窗紙花上稜稜電光紫朝霞欲上倏復收讓此霹靂穿雲頭日光初明電光暗雲外數峯雷尚占陰晴百變誰得知􅋊月尚挂靑松枝連日風雨山杜鵑紅者盡落復有黃色一種花朵較大滿山谷喜而有作昨朝山杜鵑一雨紅盡退今來黃更艷萬朵出山背深山花事好五色若相代花黃不到處點入四山黛渺渺碧合流䯂䯂緑成隊如拳復如合花朵不繁碎已有采藥人嬌黃鬢邊戴自十五六日雨至此十餘日不止春事將闌感而有作只惜花千片都隨雨腳飛此時孤客夢樓上一燈微夜久頻牽幔春寒孰寄衣惟應入簾燕話舊尚依依衆響居然寂天風靜掃關􅋊春懷遠道斜月逗前山影逐孤雲上魂隨獨鶻還鄰翁縱相約花事恐闌珊二十九日稍霽向山後縱步上山平下山險霞光舒露光斂雲頭尚有瀑一重雨腳亂飛花萬點崖窮谷斷步欲回對面樵客穿雲來沿流飛渡捷于鳥詫説北山花事好山樓讀書雜詩朝陽出東山生氣滿空谷春禽飛不到時亦響啄木經時春露好潤此松與竹間披東北牖偶復眺村屋空外飛爨煙應知飯將熟晨興對聖賢夜夢侍親側神明渙然開真趣誰復識孤生百年內所苦駒過隙庶幾餘寸晷藉以獲三益平生尤與悔至此巳冰釋平臯三日晴原野漲春氣裊裊靑竹竿森森逼天際髙低楊柳外鳥亦鳴得意而我久客斯孤生或如寄山農勤播種僻壤少隙地昨者餉豆苗盈筐緑猶細山樓極高寒所苦山霧重誰云春日暖幽谷未消凍軒墀行迹絶草密已無縫冠裳束高閣月朔偶一用離俗愧未能經旬有鄉夢間身三十年一日書不離每于積軸中獲此神解奇一義苟豁然詎識渴與飢遊山素所耽近屢改日期亦恐心志専或以耳目移􅋊漏披北窗攤書竟忘疲山雲不出山舒卷如在我林禽知客意時亦近窗左軒墀無别物積軸致堆垜而我顧樂之時行復時坐風花雖已謝又綻滿林果今日山杜鵑入簾開幾朵頻年著左傳詁已欲告成偶題一律頻年几案整精神訓詁方輿勘較真于世已疑成棄物此經未愧號功臣時將古意參前哲不肻多端誤後人紅豆一株今在否莫教嘉種化為薪紅豆山房惠徵君定宇所居也此書采徵君九經古義頗多故憶及之三十日餞春屈指將長至攤書晝漏長日濃花氣淡山靜水聲忙紅隱新遷社靑連古戰場北去即蘭石為晉宣城守桓彛屯兵距蘇峻處􅋊春今已盡三復舉離觴山館即事三重碧澗客難渡一片白雲吾與居平心已任喚牛馬壯志偶欲箋蟲魚樓頭靑松下芳草樓上著書人未老經旬窺徑無一人抗手欲招飛過鳥花光一重雲一重花氣香入雲當中雲頭花香亦分缷高下任逐泠泠風幽居百日絶妄念山在屋頭看不厭惟嫌村酒淡不醲卅里呼童走山店初七日夜偕同人至鄭氏園亭看勺藥歸途遇雨作閉戶才旬日高原麥已黃亂流雲外湧百草雨中香地僻留春氣廊虛閃月光居人無乃笑曛黑看花忙喜靑陽陳明經蔚過訪驚起山南鳥鵲羣筍輿穿徑已斜曛意中欲定千秋業時以所作乞訂定并乞序肩上猶飛五色雲種蛤近添新事業近于江北置水田數頃射魚仍憶故將軍君客福建將軍署中五年他時九子峯頭路訪罷東巖便訪君東巖即九華東峯三十年前與君分手處也時訂重遊九華豐溪道中望天都峯作山南地陷如眢井人鳥爭巢松柏頂高低山麥皆已刈留得白雲鋪十頃千峯萬峯雨糢糊一峯獨立天所都記曾曳杖至絶頂七百里瞰高浮圖戊戌歲隨學使者遊黃山曾偕土人陳某登天都峯頂天氣晴朗約略望見江寧城外報恩寺浮圖蓋相距已七百里矣陳某土人名爬山虎聞死已及十年名山厯遍人驚老如虎健兒今亦少君不見置身高處眼界開足底復有千山來晝睂嶺竹笠芒鞋雨腳粗更從峯隙望平蕪畫睂嶺上無多地除却茶菴便酒壚涇縣道中山行水東水西天下最一縣好山都染黛人行螺旋不得休才欲出山雲復礙溪光五采霞五色霞外樓臺好登陟草頭黃白時有花紫燕交飛亦如織仙人溪上雲冥冥山靑一路至敬亭君不見車箱驢背坐已怕欲借仙人鯉魚跨琴高溪小憩連山雲氣暗層岡瘦僕偏憐䇿蹇忙只有雨絲無日影琴高溪上十分涼琴魚琴筍更琴茶琴高魚之外地産茶筍亦極佳土人名為琴茶琴筍似與仙人共一家欲約麻姑過溪上平田添種女桑花渡小南湖稍晴渡南湖波濶三十里鸕兹及鸂􅴞水面飛不已一線日影中湖頭逹湖尾四山靑乍露雲已伏不起何因吳地犬見日亦鳴吠只有南下人推篷展然喜時陰雨巳及半月第一村圗于徵君宗林家在蒜山之麓相傳即晉時孫子荆所居第一村也壬戌六月十日徵君招余過洲上信宿並命幼弟淵問業于余坐次出此圗索題因作長句以贈京江西頭第一村大水細水吞柴門柴門開處一峯立對門即九子山直上稜稜百千級水邊楊柳分三層鳥巢人屋魚有􅊻水光不動山雲化魚鳥與人皆入畫東瞻北固南五洲屋背更壓金山頭徴君兄弟文筆優闢屋别築藏書樓草堂時來第一流十日五日能勾留萬株靑竹竿百頃香水稻九派江流入懷抱君不見晉人風流安可效合署此村名有道余過介休日曾兩詣郭有道村十一日同人遊九子山今朝北風好吹我入南山一谷怒當路千花靜掩關時繡毬薔薇尚盛開客從三伏斷雲自五州還却挂征帆去幽巖未及攀擬重遊獅子窟未果剪江至焦山并遊巨公崖諸勝火雲燒處戶難開却被支公信使催我比海潮還有信兩隨圓月渡江來石骨崚嶒石髮纎海雲東上日西淹來春我看桃花處之字江流品字巖崖正對桃花洲巨超上人于焦公洞西北復闢一崖境極奇峭十二日邀余及同人避暑其下并乞命名余因以巨公名之復繫以詩道人夜洗山洗入北山腹玲瓏逢一竅貼若巨黿伏梳爬及三日寬已半間屋西來山勢猛至此始盤曲石石悉欲雙惟兹石成獨安排靑石磴甫可展遊目南瞻及京口西正眺浮玉欎欎卅里洲雲煙互重復鑿山疏水績始事尤足録成功雖欲讓衆論久已屬剝苔題數字庶配朗公谷十三日早至别峯菴看日出一峯既别出一水亦别流山水各有别于兹起危樓樓上八牖開正對東海頭百怪未及藏光已燭郁洲森森赤玉盤正向案上浮朝景既已開夜氣始盡收我心亦空明障翳一不留僧雛訝久淹敬進水一甌移榻閣上眠心神與天遊詣高旻寺如鑑上人招登天中塔望海不信帆檣上居然戶牖開岸疑穿地出山欲渡江來舫屋東西接樓􅊑楚蜀回贊公招手處飛鳥亦驚猜此日隨飛錫多年歎轉蓬三層厯霄漢百級出樊籠天意誰能問坤輿已欲窮請看東海水流入尾閭中茱萸灣别墅與諸同人納涼分賦即放生池茱萸灣中無六月水竹水雲涼沁骨支公迓客鶴亦隨毛羽離披脛先折房廊已遠官河口四壁都依水楊柳幽人見慣亦不驚水面大魚人立久斜陽欲入雙徑松一杵已遞焦山鐘雷塘螢火忽飛到百劫尚識臨江官石牀旁邊安竹榻僧古説詩如説法道心不止鷗鷺喻善念都看到鵝鴨勞勞行客厯八荒誰識此子疲津梁天山冰雪話難竟客詢及出塞舊事座客心地皆淸涼茶杯鬥罷鬥酒杯七客反送孤僧回君不見東西咫尺涼燠異隔岸火雲飛驛騎高旻寺行宫敬賦一水居然跨兩州塔前千尺步廊周怪蛇古柏爭橫砌海燕溪雲各上樓話久緑莎廳外路涼生黃屋殿西頭誰憐憔悴江干客曾侍長楊五柞遊侵曉詣放生池看荷花因夏仲雨水過多花事寥落池上謝公祠等又半燬于火感而有作回途復至卞家池上小憩謝公祠畔路不是不能來水雲既已荒水上無樓臺半池枯菡萏十頃黃蒿萊沿溪三兩家枕此蘆荻隈終朝女墻影鏡裏常裴回待此曉日升久坐石砌苔回經卞家池紅荷反齊開盆蕙盛開東南卅步回廊直香氣出門如索客尋香覔蕊淡不分花葉稍分淺深色一枝亭亭凡九花根蒂尚帶山中沙君不見離山更憶居山日萬朵奇花一鈎月洋川書院在山半此花尤多哭張編修惠言直為朝廷計尤須惜此人義堪風有位官僅作詞臣嫉俗睂常斂憂時意獨真研心仲翔易骨相亦同屯君時注虞翻易萬里逢嚴譴三秋值抱疴避人來請室鞭馬及渾河已未八月余在請至中君無日不入訪瀕行復扶病送至蘆溝橋聚談竟夕閲世知心少思鄉别夢多屢欲乞假歸未果十年無淚灑為爾一滂沱校禮圗為淩同年廷堪賦君年三十正據鞍相與共客河之于丁未戌申曾同客河南撫署是時我有左傳癖未暇從子研周官禮經盤盤若干例君近著禮例一書釋例甫完先擢第木天粉署非所願只覔著書將母地宣城僻在水一方昔為詩藪今禮堂驚人不賦謝眺句解詁間學盧中郎我行千里與萬里羡子枕書眠不起昨宵訪舊來此州萬卷都堆竹窗裏遊談我已戒不根况子經術今專門留賓亦復太狡獪倉猝為我羅雞豚君不見溪茶可煮筍可食官滿十年階欲陟他時博士擢禮官兀兀看君稱其職受業吕培談正治校字
