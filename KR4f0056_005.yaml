front:
  text: 更生齋詩卷第五
  hash: sha256:5a63a12b3795a44a1427a133c7ba51817617d2754108f2523db1613244e67c4a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_005-1a}
body:
  text: 陽湖洪亮吉著箬嶺授經集勵志詩三十首獨木可製棟乃反裁作橋獨木之橋心焉摇摇獨木可立柱乃反刳作舟獨木之舟或沉或浮天形不知以農爲師地圖或溷引商参問欲知古詢及賈欲通俗訪及僕羅網待物不擇飛走資格縳人不問賢否慢神無福諂亦如之不慢不諂是爲得之學佛無益毁佛無損不佞不毁逹人所允萬燈雖明不敵一星九流雖精不敵一經星晶瑩海宇寧經習熟治術足荈佐飮菸佐食腸浸滛口呼吸一火攻一水厄消肌膚鑠精液一家飢寒優及里䣊四民飢寒憂及君相靈狐狺狺善惑世人神祠穴久不媚土偶林禽剪舌巧過百物有法制之禦以木訥身欲死藥不靈心欲死語不經語不經神殛之藥不靈鬼殺之我欲上天祇慿一梯天之高高梯則巳低我欲渡河祇結一壺河流湯湯壺不可泭以力養人力懼不展以心養人活及無算以財濟世財有匱時以言濟世利無窮期妄思奇福必得奇禍妄思窖金必至家破龍行雨聲不聞龍出聲雷卽嗔鵬摶風翮不露鵬奮翮天卽怒我所思在九域以外九域旣窮天地何屆我所思在萬物之究萬物旣究孰持其後心無欹傾不畏震霆行無疵累不畏社鬼社鬼所摶必非強梁雷火所觸人或不祥齊三士可稱勇伏劍死不旋踵魯兩生可號儒叔孫先不能汚齊三士誰可敵田横島五百客魯兩生孰可同哀平中楚二龔衣無複單難以禦寒家無法紀難以服官衣之有複潤及肌肉家之有法化及鵝鴨惠人升斗莫惠以口殺人刀戟莫殺以舌口惠人怨必叢舌殺人巳必凶妖禽九頭妖狐九尾顧首顧尾不見可喜抃鼇㫁足形天㫁頭時起時舞不見有憂盗賊水火不過家破飢寒困窮一身之凶妒賢嫉能殃及孫曾利已害物禍至殄滅環堂而行跬歩有幾行之不巳可積千里索書而觀書苦易竟循環讀之義乃不盡欲身不病無與物競欲身無災與物共財檻虎縱馴不使導遊吾誰與偕岸有白鷗籠禽雖俊不與論心吾誰欵曲案有素琴不隨俗可挽俗不趨時乃捄時父母存苦賤貧虀鹽蔬菽日以奉親父母逝感遭際錢刀錦綺僅以營祭東流滔滔逝不囘西日宛宛誰能追行持形骸入蒿萊元堂幽扃永趨陪鵬六翮難傅天蟲百足難陟巔終爲人所嗤不爲人所憐百歩之内必有嘉木吾拜松竹重其先㧞俗一林之中必有飛翔吾拜烏鵲重其不出鄕一身之事妻孥不詳欲告我友又苦各一方百年之中半不居里惟蠧魚追隨見我輒喜喜飮海水喜食海魚春夏卜居無逾巨區喜餐湖淥喜采湖菱秋冬讀書宜傍禹陵鏡不留物影過卽滅世不待人事去卽陳浮雲激電生滅何速視世以心不視以目壬戌新正九日吳封翁端􅉓等邀集世經堂看梅作昨夜羅浮月㣲黃挂屋端居然半間舫醸足十分寒殘葉樹頭墮古香枝上探花前兩年少吹笛勸加餐十八日偕陸孝亷繼輅莊上舍曾儀黃秀才載華至城東檥舟亭探梅囘集卷施閣小飮卽送孝亷北上東風纔解凍北風又飛雪已傷靑春遲復與友生别陸郞卅載同鄕里早歳聲名日邊起蝶夢莊周昨已醒牛醫黃憲今誰比三君一例皆少年各矯健翮凌風前流光眞慨熟羊胛壯志欲餐生彘肩嗟余病巳經時臥五十五年殫指過范雎脅向生前折荀偃頭從夢中墮閉門且學楊子元精義一一離言詮雪花六出梅五出日月右旋天左旋因兹悟徹無生旨大地春光亦如此要從鶯燕識春秋不與蜉蝣共生死燭光千頭淚百堆日昨畫鷁從東來元夕城東戚墅堰有競渡之戯天門一笑卽飛電地軸半拆驚轟雷閒門却倩梅花守掃徑惟應待良友二頃雖無陽羡田百壺且中山陰酒東門之東花幾株草根樹皮春已蘇大姑城訪東晋刹少伯河接西洮湖荆湘米價平難得楚蜀軍書尙馳驛燈火初囘眼已靑干戈乍歇頭先白八角籬門尺五汀暫時分手若爲情南行欲趁鳬溪棹北上先題㕍塔名將至洋川書院先詣郭北謁别先塋經年方覺定羈魂松栢蕭蕭謁墓門已分頭顱行萬里昨歳蒙恩免死遣戍伊犁至戍所將軍又欲行法亦荷聖恩以免僅留皮骨反孤村長愁擬共張平子妙德慙無袁愍孫揮淚更從原北望鵓鴣聲裏上朝暾過東垻已斷中江路銀林五垻長水難歸震澤波轉宇丹楊别派分天塹低圩減地糧五埧成髙淳諸縣遂爲澤國前明遂奏減地租派入宜興荆溪等縣臺濛遺事在三復感滄桑花朝日阻風江口望采石太白樓咫尺不得上今朝花朝無一花今夕月夕亦無月因之酒人無酒飮空向酒仙樓畔歇沉思往事心內傷陳劉應徐均已亡謂三十年前學使署及沈太守業富署中諸賓客如邵學士晉涵高孝亷文照汪明經中諸人我前同公謫夜郞意外復得還江鄕眼中千里與萬里只坐沙洲慵不起忘機雅有忘機伴鵯鵊鷺絲飛不巳君不見江源亦出昆侖中往者險欲探奇蹤伊犁去昆侖䓤嶺皆不遠豈知勞人家住海東岸江水過我始得東朝宗犇馳歳月方三載江水未移靑鬢改竹帛偏憐壯志虚乾坤剩有詩名在二更月出㫁厓口遠道呼童復沽酒花時雖無桃杏花且向原南折新柳涇縣道中夜宿春山一路幽蘭香菜甲遠襯斜陽黃藍輿時向杏梢度薄暝尙欲穿層岡一山初平一山出怪石總從頭上突却到山溪夜已䦨橋南一樹花如活過茹麻嶺茹麻嶺南無隙地麥隴盤盤上天際靑松陰裏紅杏花波影日光㣲覺膩踈踈一樹䦨干右燕剪未來蜂已逗晴空復聞喚雨鳩呪得一角陰雲浮行次桃花潭山店看杏花作整整斜斜劇可憐桃花潭側杏花妍銷魂樓上三更雨似畫江南二月天小語未妨留睍睆間情只欲惹鞦韆慈恩囘首眞如夢露冷烟殘又十年山坑道中雲乍離山日向晨浣衣津口浄無塵不知頭上花齊放祇覺遊蜂戀美人扺洋川書院來路雲已遮去路山復塞山禽亦分界飛不妄南北惟愁山外事傳到此山側預戒五尺童不延山外客追思荷戈地亦有萬仞山但覺白氣周無此靑彎環攤書向檐前鳥語殊綿蠻勞攘三十年獲此一歳閒生徒十數人曙卽攬衣起周廊聽書聲都穿白雲裏與談前世事一一盡色喜所愧學業荒欵門來不已樓前半𤱔花紅氣通八牖朝霞復相間赤白分左右欣兹讀書暇時亦陟岡阜日昨山雨肥園丁獻新韭詠亭側海棠薄暝行山坳花氣籠一谷紅襟一雙燕守此花畔㝛紅紅白白競半春只此花態尤淸淳亦如名姝善守身艶極不欲銷人魂一花初開承一葉葉上時時綴胡蝶雲紅露白夜不眠要看殘月來花前曉起看梨花一白疑無影亭亭物外斜祇宜將暁月襯此欲開花飛瀑空相照幽禽静不譁䦨干兩三曲何處著春華山樓喜雨歌一月不雨憂三田四山出雲高接天雨聲似挾海潮至一夜迸落山窗前山中懸溜本數重添出百道如飛龍喧聲忽然入室中欲挾床几淩虛空漫空花雨尤堪訝桃花李花成陣下海棠可惜昨始開連蘂都飛北窗罅園丁失喜農師幸風伯差嫌煞風景翻盆雨驟晴亦驟北斗仍看挂松頂沉思徃事聲暗吞憶昨雨急趨烏孫竄身無地得空穴雷電又入􅊧驚魂雨行作雪夜若年我僕尙滯南山巔羊裘濕盡不得脫指凍欲裂饑腸煎卽今生還萬事足況復眼前書可讀雨聲風聲縱淩厲足不下床頭戴屋君不見雨餘濕翠復幾堆曵杖更欲登層臺老饕無端笑口開明日驚筍登盤來山館静坐憶孫大星衍戊戌年曾共隨學使者按臨過此縣境峽號壎箎澗響琴卅年前事一追㝷巖腰柳尙凝靑眼谷口蘭眞愜素心偶尔塞翁悲失馬依然山館仿來禽舊遊十輩今誰在最少如君白髪侵將至旌德趙兵備翼枉詩相餞未暇報也山館無事戯作長句柬之并約同遊黄山逐臣初歸戀鄕土日日醉眠腸欲腐有花卽向花前飮不問誰賓復誰主少年英英丁與陸明經履恒孝亷繼輅跌宕文場氣頗粗就中我敬西頭趙七十高年健如虎哦詩一字不相讓往往雷霆雜吞吐牡丹八首尤奇絶老筆轉能生媚嫵百年文獻差不愧一輩賓朋試重數忘筌莊叟善高論中允通敏荷􅓩伯倫稱大戸舎人召揚沈吳近又結詩社廣文元輅封君端彛劉蔣頻招宴花圃太守熊昌摠鎭烜賽神我憶月廿三去歳二月廿三日清明競渡人喧日端五波光已覺浄如綺筆力復看強過弩座中詩派判唐宋壁上兵鋒看秦楚危詞縱累十二碁定律不差分寸黍便敎長樂嚴刁斗敢與淮陰鬪旗鼔強梁幾欲扛周鼎弱肉何堪試蕭斧叢譏杜老作詩瘦轉學荀卿著書苦此來百里程迢遞實避千言氣莽鹵仍擕季豹同趨塾時挈兒子符孫人塾未碍伯鸞居賃廡萬山已距南來轍一屋祇開東向戸三天子障肩堪並五老人峯頭復俯九華山距此不及二百里雲光破暁嵌睂睫淸氣厯時充肺腑耻同詞伯競壇坫可許散仙居洞府狂遊尙未卜時日鄙意終須待儕伍我餐黄獨纔匝月君跨靑驄去何所時聞有吳門之行名山欲入先鼔興此老若來當步武朱砂泉記仍可續紅杏原詩不須補緩程水定由靑弋囘路嶺仍登白紵狂思策蹇升龍脊醉或然犀燭牛渚餘閒并可覔酒人陳巡撫淮近寓居蕪湖得暇未妨談食譜君如爽約當有説意必兩端持首鼠蹤疲旣畏行客笑句劣或恐山靈侮興公果係天機淺安石輙爲人事阻縱然曳踵看山色應悔埋頭住江滸溪南帆席不肻挂屋北降旗定須豎歸時擲示一巨編讓我長歌擅今古登山半小閣一閣瞰四山缺處望箬嶺山坳一千戸厯厯若居井白雲穿入牖曉夢尚難醒幾家晨爨早烟縷上山頂烟光觸花氣倏忽暗朝景獨坐心轉淸憑䦨試新茗山下訪友門前古樹分向背千枝百枝鳥聲碎有時出屋不及冠頭上白雲如可戴興來欲訪溪南友水鳥鷺絲分作隊橋心甫過魚驚竄瘦影亭亭嵌波內南山雲晴北山暗坐覺一窗殊顯晦野人留客頗勤懇手剪靑靑一畦菜家貧不諱瓶無粟舍北村南總堪貸飯餘一晌眠初熟倐忽怒雷喧水碓竹中一徑穿曾慣人去鳥來都不碍零星舊事談難竟送過前溪步方退爲言山僻有一龕明日倘來堪晤對侵曉送客過嶺孤帷隱一燈行客尙未起殘月下北山寥寥犬初吠一峯抱一峯劣徑入隻騎十里吹濕香原空瀉花氣偶成鳥聲不下樹蛙聲不上山夢醒聞衆聲寥寥隔層關前宵一雨山光綠添得水聲飛上屋三層閣倚百尺松飽聽日午唫蒼龍連日風雨花事零落殆盡牡丹芍藥尙無消息感而有作卽示諸生岡北岡南厭登渉十日看花都作葉風飄萬朶無一存隔隴蔬花尙層叠閒情幾日少歸束春夢百畨難妥怗負暄行客乍脱綿驟暖高齋欲揺箑無端頃刻變晴雨或者陰陽欠調燮名花縱謝柔桑嫩樹上家家有𧖟妾擕壺挈榼上冡忙劚土四邊封馬鬛茶畦偏多麥畦少乆矣斯風盛宣歙洋川書院挺山半築屋居然象城堞一瓻我尙遠借書百里最慙争負笈閒繙左氏獲麟史敎倣羲之換鵝帖蜂腰終覺句可商鴂舌半憐音不叶九經四史孰淹貫八體六書宜渉獵百房燈影遥相射半里書聲恍如接埋頭已覺遥夜永陟足偏欣上山㨗諸生英英志莫惰春日遲遲睡防魘何時便可放勺藥此信定難瞞蛺蝶花寛十日五日約香已千枝百枝裛新蟾屈指黃半鉤嫩蘂關心紅一捻二分纔向枝頭吐一朶誰先鬢邊貼花前勸我頻擕酒花下阿誰時步屧醉同山簡接䍦倒雨學郭公巾角墊金罍總向人前㵼玉笛須從樹頭擪半街月霧籠衫袖五色花光照睂睫商量却待榴火紅靑弋江應放歸檝度嶺一山初平一山起更有一山生足㡳怪峯稜稜都礙履山鴉啼愁山鵲喜翠柏靑松浄如洗山頭囘身望山尾來路都沉白雲裏天梯初升石門啟已隔下方三十里山樓暁望花紅宜朝暾花白宜暁月梨花尙帶殘月光一樹棠梨已迎日人家分住東西嶺菜甲作花連十頃平田雨後飛濕光雲朶亦與花争黄㣲雨天半浮雲過山頭暗一重早涼開北牖㣲雨入前峯已度三層澗全迷萬壑松㝠濛看飛鳥歸樹尙從容山行添衣欲出門日色驟晴煦濛濛北原上春氣零若雨斜穿松櫟徑百鳥頭上語草花三兩種曲折礙芒屨前渡淺水灘牽衣待儔侶三月三日憶里中雲溪諸勝今晨三月三禁烟亦此日風花無一朶淸冷値佳節擕樽上高阜轉覺鄕思切遥憐池館好踈雨亦將歇北郭展嫩晴雙橋上新月應有挑菜人延囘出城闕我家白雲溪雲白溪亦漲一鳥溪上鳴千花樹頭放近移東半里築屋轉相向春來倘無夢夢輙在溪上樓前楊桺樹闢牖可閒望花落溪水深春人定惆悵郁李階前郁李多只惜花瑣碎沉沉春晝影迷客有如醉幽蘭獨高格開尙與人背梨花嫣然姿亦出桃李内庻幾顔色淡蜂蝶所不愛三春孰蹤跡一客獨盼睞欣然擕茗具晴晝看至晦詎忍折一枝夜窻仍晤對半山看雨雨聲欲走北風力欲挽西遂令一谷雲分向西北飛風驚西來雨北走天頂依然挂星斗風聲雨聲入夜昬鳥歸人歸争一門君不見歸人歸鳥何太急鳥亦有巢人有笠大風㧞木歌寒食前一日危亭不合皆畫龍怪㡳㧞宅思騰空爪牙森森頭角挺惹得天龍下窺影雨聲飛完復飛雹風力驟囘先㧞木飛泉如濤響空谷餘勢尙摧花與竹畫耶眞耶不可知但見半壁雲分馳雷聲亦自屋中劈照見鱗甲光参差江南山高水復濶幽處盡爲龍所窟以龍招龍龍卽出或者眞龍怪唐突黃山之西白嶽東勸翁掃壁更畫高高峯不爾龍挾此屋飛入雲當中寒食偶成伊犁河上値淸明東距關門尙百程今日萬山深處坐雨花如夢撲簾旌誰向洋川紀歳華沿門都已採新茶山中春事忙如許桃李先開半月花日午山窻睡起遲東風吹夢入游絲愁無一架秋千影閒煞滿庭紅杏枝衰遲未敢説春愁棖觸鶯花憶舊遊只有白雲知我意隨風都到海東頭偕諸生至下洋川修褉各賦一首我來已半月未及洋水濱兹逢禁烟節又値上巳辰諸生學經時用志已不紛相擕勝地來騐此心賞眞聯行亦無多童冠八九人牽衣過石橋酌蠡向水漘頗感歳月馳奄忽及草春吾徒勤讀書尤在志行純心性苟不漓遑計泰與屯朱雲折安昌其氣尙未馴及對嶭贛君品乃絶等倫寥寥一千年冀欲追絶塵狂狷致失中又恐戾聖門同堂貴参稽得間盍共陳歸及新月輝陶然飮芳尊淸明日望遠三更白雲四更雨踏靑人聽更􅋊鼔鼔聲纔絶人聲優巳見春衫度林杪濛濛松竹徑尙昬春燕亦復隨春人風光縱好春人訝似怨桃花已先謝山中一歳止一來棠棣枝下仍徘徊一旬春鬢無顏色却戴幽蘭露猶滴洋川曲折徑亦斜沿路喜尋親串家湔裙春水年年好只惜紅顏鏡中老階前艸花黄白可愛爲賦一絶黃黃白白满窻紗破悶聊拈午後茶從此不嫌風景淡草花能替樹頭花淸明日憶女紡孫却寄小白長紅幾樹桃嫩黃淺碧桺條條春光偶到三層閣客夢頻牽八字橋壻可學文愁病肺兒能涉筆幸垂髫謂符孫他時卜宅烏衣巷時得孫大季仇札約買宅共住江寧故云門外川光卽六朝偶成校得南華内外篇晩春巳覺日如年新紅看罷看新綠正是江南麥秀天夜起尋詩似厭春晝忙三更起行百尺廊紅蘭花前月尤皎白鷺影外天何長樓臺宻處欄干複北斗正垂䦨北曲水西一燈行不休夜半已到山南頭欵門殷殷人不識失喜偏逢寄書客山深不及羅酒漿飯客祇有蔬花黄主人將眠客復起欲到縣中還卌里水北三松歌日日樓上看三松今日甫向松根過亭亭㧞地百餘丈遠望仍疑水邊臥松邊一橋亦千步橋盡松根始全露盤空夭矯不可名一半横遮水南路松梢沉沉足烟霧白鶴不來棲白鷺一枝北出勢更奇罩得樓臺復無數五松中間兩已枯間向岸北尋根株移南倘復十數武老榦直欲捎浮圖霜皮一尺裂一縫堆得苔錢已無空風聲雷聲昨倥􅘓龍欲出山雷雨踵倒海排山浪齊湧只有此松兀不動攫拏星辰疑有力囘轉陰陽不踰刻根株盤盤穿入石透出石中枝尙直松聲近樹反不聞數里外覺驚濤奔鄰翁下見五代孫自說輩行無松尊愛之不忍手撫玩一月幾囘來斷岸君不見四山中間人跡斷此客此松聊作伴暮窻看霧分半山坡枕水涯讀書樓上一燈斜怪來眼界空如許白霧漫漫葢萬家望遠挑菜湔裙總未曾半旬常自睡瞢騰小桃落盡春無夢雙燕歸遲夜有燈舊友許貽京口酒新詩都寫剡溪藤惟餘望遠心偏切月黑高樓上幾層山杜䳌十日不出戸杜䳌紅满山始知造化功足補春事􅋊紫藤亦牽花掩映松竹間胡蝶去已久何時復飛還曳杖一縱觀花露衣上班側聞鄰翁言消息到牡丹有此匝月紅庶可待藥欄山中山中雨半宵三日足淸響蛙鼔亦上山寥寥非意想卽事山雲朶朶欲凌空罩得山花處處紅自覺著書心地徹不知身在白雲中雨夜友人過訪友涇縣人竹笠􅉭鞵猛叩關匆匆知自震州還故人欲話三年事積雨先沉四面山勸客酒杯心轉怯照人燈火鬢初班離家早已忘家累擬築幽居水乙灣所居水西山水尤勝洋河橋題柱洋川三面是人家到得橋頭路已义却趕㹀牛山北去不敎喫盡野田花頭士女遊春圖白白紅紅艸亦香且扶新月過橋梁春光似海人如海不避遊人說大方羅衫葉葉趁春遊竹粉時時拂面流摘得菜花何處用嫩黃先襯玉搔頭黃蜂何處覔遊蹤欲上層梯意轉慵拂面遊絲已無數第三層塔且從容驟晴驟雨筆難描一朶輕紅未破苞乳燕尙嫌毛羽重祇敎胡蝶上枝梢曲曲溝塍之字斜踏靑纔了路偏賖一條春巷門無數何處能尋阿姊家十四日夜起及此三更後唫堂􅓦不譁夜雲時作態春月亦能華蝶夢穿書幌蟲聲落畫义空明一灣水似不隔窗紗十五日詣日涉園看牡丹紅踈綠暗悵無端路僻山深夜尙寒似爾鏡中花爛漫鬥他天上月團圞風光艶憶餐霞閣香味淸逾承露盤迢遞樽前小兒女故鄕春好不同看昨歳友人貽異種數叢植卷施谷中此時當亦盛開故憶及之看花歸値急雨雲頭倏已昬雨腳來亦驟歸途經畧彴四面水聲湊忘擕簑笠具衫袖薄將透幸兹坡險處我僕已迎候扶擕到軒墀早復注簷溜樓頭窗八扇看雨敞前後只隔山兩重空明月如晝夜坐好書圍四面複屋住三層花氣能消酒雲光不碍燈下帷更乍永擁被月初升只此淸涼境年前得未曾十八日詣延芳書屋看牡丹别分池館枕汀洲花外纔停喚雨鳩修到紅顏仍有福開從綠野不知愁吹香簾下頻牽夢照影波中亦並頭倘仿徐熈圖没骨焉支山下我曾遊歸途復過日涉園花事尙盛别來莫恨花開緩月缺一分花尙滿風風雨雨卽不時梅枝李枝能䕶持牡丹旁有梅一株高出檐角爲蔽風雨梅枝高更出簷角雨縱日飛花不覺固知顏色異泛常樹亦曲意憐花王花前艸綠都如帶花影將沉夕陽外朝霞色淡草色紅雨後花尙嬌春風片時危坐北窗裏静聽周廊鵲聲喜君不見林陰初昬客初起香氣逐人還半里二十日大風雨屋瓦皆飛至四鼔乃睡四山都羃雨雲氣代成峯怪響時穿屋飛濤半入松夜燈迷百級露瓦揭三重誰説高居好眠遲待曉鐘案頭盆蕙盛開書纔完一卷蕙已舒九朶淸絶山館中幽花伴人坐二十八日破曉雷雨驚雷一片穿窗紙花上棱棱電光紫朝霞欲上倏復收讓此霹靂穿雲頭日光初明電光暗雲外數峯雷尙占陰晴百變誰得知􅋊月尙挂靑松枝連日風雨山杜䳌紅者盡落復有黄色一種花朶較大满山谷喜而有作昨朝山杜䳌一雨紅盡退今來黄更艶萬朶出山背深山花事好五色若相代花黄不到處點入四山黛淼淼碧合流䯂䯂綠成隊如拳復如合花朶不繁碎已有采藥人嬌黄鬢邊戴自十五六日雨至此十餘日不止春事將䦨感而有作只惜花千片都隨雨腳飛此時孤客夢樓上一燈㣲夜久頻牽幔春寒孰寄衣惟應入簾燕話舊尙依依衆響居然寂天風静掃關􅋊春懷遠道斜月逗前山影逐孤雲上魂隨獨鶻還鄰翁縱相約花事恐䦨珊二十九日稍霽向山後縱步上山平下山險霞光舒露光歛雲頭尙有瀑一重雨脚亂飛花萬點厓窮谷斷步欲囘對面樵客穿雲來沿流飛渡㨗于鳥詫説北山花事好山樓讀書雜詩朝陽出東山生氣滿空谷春禽飛不到時亦響啄木經時春露好潤此松與竹閒披東北牖偶復眺村屋空外飛爨烟應知飯將熟晨興對聖賢夜夢侍親側神明渙然開眞趣誰復識孤生百年内所苦駒過隙庶幾餘寸晷藉以獲三益平生尤與悔至此巳冰釋平臯三日晴原野漲春氣裊裊靑竹竿森森逼天際髙低楊桺外鳥亦鳴得意而我久客斯孤生或如寄山農勤播種僻壤少隙地昨者餉豆苗盈筐綠猶細山樓極高寒所苦山霧重誰云春日暖幽谷未消凍軒墀行迹絶艸宻已無縫冠裳束高閣月朔偶一用離俗愧未能經旬有鄕夢閒身三十年一日書不離毎于積軸中獲此神解奇一義苟豁然詎識渴與飢遊山素所耽近屢改日期亦恐心志専或以耳目移􅋊漏披北窗攤書竟忘疲山雲不出山舒卷如在我林禽知客意時亦近窗左軒墀無别物積軸致堆垜而我顧樂之時行復時坐風花雖已謝又綻滿林果今日山杜䳌入簾開幾朶頻年著左傳詁已欲告成偶題一律頻年几案整精神訓詁方輿勘較眞于世已疑成棄物此經未愧號功臣時將古意参前哲不肻多端誤後人紅豆一株今在否莫敎嘉種化爲薪紅豆山房惠徵君定宇所居也此書采徵君九經古義頗多故憶及之三十日餞春屈指將長至攤書晝漏長日濃花氣淡山静水聲忙紅隱新遷社靑連古戰塲北去卽蘭石爲晉宣城守桓彛屯兵距蘓峻處􅋊春今已盡三復舉離觴山館卽事三重碧澗客難渡一片白雲吾與居平心已任喚牛馬壯志偶欲箋蟲魚樓頭靑松下芳艸樓上著書人未老經旬窺徑無一人抗手欲招飛過鳥花光一重雲一重花氣香入雲當中雲頭花香亦分缷高下任逐泠泠風幽居百日絶妄念山在屋頭看不厭惟嫌村酒淡不醲卅里呼童走山店初七日夜偕同人至鄭氏園亭看勺藥歸途遇雨作閉戸纔旬日高原麥已黄亂流雲外湧百草雨中香地僻留春氣廊虛閃月光居人無乃笑曛黑看花忙喜靑陽陳明經蔚過訪驚起山南鳥鵲羣筍輿穿徑已斜曛意中欲定千秋業時以所作乞訂定并乞序肩上猶飛五色雲種蛤近添新事業近于江北置水田數頃射魚仍憶故將軍君客福建將軍署中五年他時九子峯頭路訪罷東巖便訪君東巖卽九華東峯三十年前與君分手處也時訂重遊九華豐溪道中望天都峯作山南地陷如眢井人鳥争巢松柏頂高低山麥皆已刈留得白雲鋪十頃千峯萬峯雨糢糊一峯獨立天所都記曾曳杖至絶頂七百里瞰高浮圖戊戌歳隨學使者遊黄山曾偕土人陳某登天都峯頂天氣晴朗約畧望見江寧城外報恩寺浮圖葢相距已七百里矣陳某土人名爬山虎聞死已及十年名山厯徧人驚老如虎健兒今亦少君不見置身高處眼界開足底復有千山來晝睂嶺竹笠芒鞵雨腳粗更從峯隙望平蕪畫睂嶺上無多地除却茶菴便酒壚涇縣道中山行水東水西天下最一縣好山都染黛人行螺旋不得休纔欲出山雲復礙溪光五采霞五色霞外樓臺好登陟艸頭黄白時有花紫燕交飛亦如織仙人溪上雲冥冥山靑一路至敬亭君不見車箱驢背坐已怕欲借仙人鯉魚跨琴高溪小憇連山雲氣暗層岡痩僕偏憐䇿蹇忙只有雨絲無日影琴高溪上十分凉琴魚琴筍更琴茶琴高魚之外地產茶筍亦極佳土人名爲琴茶琴筍似與仙人共一家欲約麻姑過溪上平田添種女桑花渡小南湖稍晴渡南湖波濶三十里鸕兹及鸂􅴞水面飛不已一綫日影中湖頭逹湖尾四山靑乍露雲已伏不起何因吳地犬見日亦鳴吠只有南下人推篷展然喜時陰雨巳及半月第一村圗于徵君宗林家在蒜山之麓相傳卽晉時孫子荆所居第一村也壬戌六月十日徵君招余過洲上信㝛並命幼弟淵問業于余坐次出此圗索題因作長句以贈京江西頭第一村大水細水吞柴門柴門開處一峯立對門卽九子山直上棱棱百千級水邊楊桺分三層鳥巢人屋魚有􅊻水光不動山雲化魚鳥與人皆入畫東瞻北固南五洲屋背更壓金山頭徴君兄弟文筆優闢屋别築藏書樓草堂時來第一流十日五日能勾留萬株靑竹竿百頃香水稻九派江流入懷抱君不見晉人風流安可效合署此村名有道余過介休日曾兩詣郭有道村十一日同人遊九子山今朝北風好吹我入南山一谷怒當路千花静掩關時繡毬薔薇尙盛開客從三伏斷雲自五州還却挂征帆去幽巖未及攀擬重遊獅子窟未果剪江至焦山并遊巨公厓諸勝火雲燒處戸難開却被支公信使催我比海潮還有信兩隨圓月渡江來石骨崚嶒石髪纎海雲東上日西淹來春我看桃花處之字江流品字巖厓正對桃花洲巨超上人于焦公洞西北復闢一厓境極奇峭十二日邀余及同人避暑其下并乞命名余因以巨公名之復繋以詩道人夜洗山洗入北山腹玲瓏逢一竅貼若巨黿伏梳爬及三日寛已半間屋西來山勢猛至此始盤曲石石悉欲雙惟兹石成獨安排靑石磴甫可展遊目南瞻及京口西正眺浮玉欎欎卅里洲雲烟互重複鑿山䟽水績始事尤足録成功雖欲譲衆論久已屬剥苔題數字庶配朗公谷十三日早至别峯菴看日出一峯旣别出一水亦别流山水各有别于兹起危樓樓上八牖開正對東海頭百怪未及藏光已燭郁洲森森赤玉盤正向案上浮朝景旣已開夜氣始盡收我心亦空明障翳一不留僧雛訝久淹敬進水一甌移榻閣上眠心神與天遊詣高旻寺如鑑上人招登天中塔望海不信帆檣上居然戸牖開岸疑穿地出山欲渡江來舫屋東西接樓􅊑楚蜀囘贊公招手處飛鳥亦驚猜此日隨飛錫多年歎轉蓬三層厯霄漢百級出樊籠天意誰能問坤輿已欲窮請看東海水流入尾閭中茱萸灣别墅與諸同人納涼分賦卽放生池茱萸灣中無六月水竹水雲涼沁骨支公迓客鶴亦隨毛羽離披脛先折房廊已遠官河口四壁都依水楊柳幽人見慣亦不驚水面大魚人立久斜陽欲入雙徑松一杵已遞焦山鐘雷塘螢火忽飛到百劫尙識臨江官石牀旁邊安竹榻僧古説詩如說法道心不止鷗鷺喻善念都看到鵝鴨勞勞行客厯八荒誰識此子疲津梁天山冰雪話難竟客詢及出塞舊事座客心地皆淸凉茶杯鬥罷鬥酒杯七客反送孤僧囘君不見東西咫尺涼燠異隔岸火雲飛驛騎高旻寺行宫敬賦一水居然跨兩州塔前千尺步廊周怪蛇古柏争横砌海燕溪雲各上樓話久綠莎㕔外路凉生黄屋殿西頭誰憐憔悴江干客曾侍長楊五柞遊侵暁詣放生池看荷花因夏仲雨水過多花事寥落池上謝公祠等又半燬于火感而有作囘途復至卞家池上小憇謝公祠畔路不是不能來水雲旣已荒水上無樓臺半池枯菡萏十頃黄蒿萊沿溪三兩家枕此蘆荻隈終朝女墻影鏡裏常裵囘待此曉日升久坐石砌苔囘經卞家池紅荷反齊開盆蕙盛開東南卅步囘廊直香氣出門如索客尋香覔蕋淡不分花葉稍分淺深色一枝亭亭凡九花根蒂尙帶山中沙君不見離山更憶居山日萬朶奇花一鈎月洋川書院在山半此花尤多哭張編修惠言直爲朝廷計尤須惜此人義堪風有位官僅作詞臣嫉俗睂常斂憂時意獨眞研心仲翔易骨相亦同屯君時注虞翻易萬里逢嚴譴三秋値抱疴避人來請室鞭馬及渾河已未八月余在請至中君無日不入訪瀕行復扶病送至蘆溝橋聚談竟夕閱世知心少思鄕别夢多屢欲乞假歸未果十年無淚灑爲爾一滂沱校禮圗爲淩同年廷堪賦君年三十正據鞍相與共客河之于丁未戌申曾同客河南撫署是時我有左傳癖未暇從子研周官禮經盤盤若干例君近著禮例一書釋例甫完先擢第木天粉署非所願只覔著書將母地宣城僻在水一方昔爲詩藪今禮堂驚人不賦謝眺句解詁間學盧中郎我行千里與萬里羡子枕書眠不起昨宵訪舊來此州萬卷都堆竹窗裏遊談我已戒不根况子經術今專門留賓亦復太狡獪倉猝爲我羅雞豚君不見溪茶可煮筍可食官滿十年階欲陟他時博士擢禮官兀兀看君稱其職受業吕培譚正治校字
