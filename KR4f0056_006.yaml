front:
  text: 更生齋詩卷六
  hash: sha256:2e58c1daaa4616ee032557b4831c6ee4da3552620c5cf0de8536e7f83e9cb1c8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_006-1a}
body:
  text: 陽湖洪亮吉著蠡河傷逝集夜宿九華山東巖讀壬辰年朱學使筠題名碑共十二人自亮吉外十一人無一存者感而有作前遊十二人十一登鬼籙惟餘一生者西復窮地軸當其勢倉皇天地為一哭寧知遄返迅又此濯雙足平生時檢點恐負友生屬餘年惟欠死除此萬事足山僧勤問訊把袂恍如昨灑酒對石崖四山紅躑躅度柯沖嶺屋前童失聲屋後山起立尤愁沙石滑空處不置級斜暉初沒水行客勢轉急君看崖上樹迅羽亦不集飛騰如猿猱我僕愧難及明星三兩顆天巳逼斗笠石罅出一門雷霆復相襲時時涼沁體衣袂宿雨濕過嶺望九華淩空向子揖湛淸園夜宿為陳明經蔚點定所輯聨珠集不用屏風六曲遮屋頭了了見金霞門外即金霞峯一門詩集追元祐百里溪光似永嘉墨雨醉看飛四座水雲涼欲罨千家平生幾兩遊山屐到處爭圍問字車下洪溪憩雲嶺書屋贈芮茂才炳泉聲碧􅌑瓏石氣靑靉靆林梢花匼匝潭隙魚瑣碎主人雖獨坐修竹列成隊主人雖孤眠翔禽舞成對間雲知夙契空水識心愛中年富文史亦屢至都會因緣無把臂甘此事恬退况今耽道寂久與俗相背間仍課經卷偶亦勤耜耒扱履不出門寥寥今卅載自廟首至石柱山久憩二石絶不黏高下及三丈淩晨北風峭積勢欲顚蕩將頺仍不下突兀出意想奇峯覿千百此石僅能兩行人經脅下險絶不獲仰無心雲亦懾出谷徑皆枉孤盤千級磴竟少一寸壤艱危厯方盡煙水忽駘岩貪看遊屐過樓閣幾家敞夾岸紅蓼花沿途足心賞歸途訪白山精舍南山與白山勢若不相接靑紅雲萬縷祇向白山貼望中才數步忽隔嶺千疊松梢高復下鬥此筍鞋捷樹杪露石樓參差間層堞山深富文史百里爭負笈讀書精舍者甚衆禽巢及人屋近若睂與睫窗開瞰峯罅鳥道入休歙稜稜飛瀑外山鬼或能涉爆竹偶一聲鼪鼯落如葉松澗藍輿一折已入山百折不獲升松關鳥聲噪客一何急飛瀑復向輿前攔夕陽欲沒仍不沒始覺石門天半突雲頭陡落一片陰且憩松澗聽鳴琴余本約焦山僧巨超同遊九華巨超遲至山二日遂不相值巨超瀕行丹徒顧文學鶴慶繪天臺踏月圗見寄因作長句題後以貽巨超即寄文學及王秀才豫我前遊九華苦乏熟客陪有僧名道成道成俗家江都今主九華飛來峯精舍有峯號飛來登峯挈僧行奇險始盡開猶遲過江僧未及登天臺天臺山高一千丈却值秋中月將望山光正好客不來一谷猿猱致惆悵我來早數時君來逾二夕蒲帆何遲筍鞋疾百里白雲迷去轍數君住近桃花洲見畫忽欲生離愁君不見我今讓爾出一頭逸興竟與神仙儔天空月華露不收任爾徹夜成淸遊余以九月初旬至黃山浴朱砂泉及門靑陽陳博士坡文學壤及孰昆仲後十日始至亦不相值博士等宿文殊院及紫雲菴各二日始下山并迂道過訪出遊山詩相質復率作此篇跋後兼寄巨超半春約客遊天臺芒鞋已返客始來半秋約客入黃海可惜疲蹤復難待山靈笑我屢失期不待伴侶相扶擕豈知事會適然耳僅隔百里趨先岐山山秋爽山山月爾乍入山余轉出題糕説餅興益豪不負秋中兩佳節狂來翻怨天半風不遞笑語來雲中諸君淸福亦誰及各以月滿升中峯一峯參天一拔地盜得乾坤最淸氣環山宣歙十萬家下視泠泠垤中蟻九華既愧雲水僧黃海又復慙吟朋君不見天臺天都讓爾登我轉下厯階千層萬峰中間一水澄寶氣上燭光如燈三宵七浴爾可能痼疾若失神明增靜中道氣時欎蒸他日或者能飛升七月草三日道過宣城淩教授廷堪邀趙舍人良􅉈戴教諭大昌陪遊南樓晚日即飮教授學舍率賦一篇奉贈并呈趙戴二君我前來宣城北樓正盛南樓傾樓頭七客作高會璧月夜半縣簾旌我今來宣城南樓招客北已扃江城不雨及匝月樓上習習涼風生地高正可瞰中外岡阜缺處菰蒲平春歸臺前望敬亭山色無復前時靑流光彈指卅年耳舊友一輩誰峥嶸紫微舍人有盛名前遊正直歌鹿鳴靈光巋然尚及見謂舍人父侍御靑藜余壬辰年隨學使者至此猶及見之令我再到思前型西頭博士官極冷大戴小戴俱橫經教諭子孝亷揚輝亦隨行邀來共向此樓坐意外一一欣合并我行僻路人罕經頗怪百輩隨人行我顏衰慙衛洗馬我句拙愧蘇端明郡人看我亦何意後先轉告喜且驚得母平生性拙罪屢攖或者疑我非人情不然又疑昆侖雪窟在何處怪我萬里遊行輕豈知我荷再生德投卑又許重歸耕此來訪舊亦偶爾難得四面山如屏依然遊興尚未減九子蓮蕚思逢迎淩陽仙人竇子明邀客不惜飛千觥烹鮮斫膾煮菱藕灑掃竹徑開荒廳茶杯初停酒杯續愛我奇論時縱橫主人先醉客轉醒隔屋僕豎杯難停君不見燭花墮穗已四更門外僕馬催長征炎天雖熱夜氣淸嵐翠重疊浮冠纓瞢騰醉客路杳冥照徑幸有東南星南樓北樓此夜一回首落落更鼓餘三聲霜降前二日得家書知山妻病甚亟時以事淹滯未得急歸書此遣悶山館傳經底事忙一旬猶未返江鄉靑林盡變為紅葉那得愁人鬢不霜宿京口于徴君宗林宅日月雙丸竟若梭此愁難遣酒銷磨癸辛雜志從頭讀丁卯荒橋接踵過鄰舫乍驚歌小海寓樓偏苦逼長河淹留信宿非無事課得侯芭奇字多焦山法界樓記夢法界樓前雨乍昏半宵忽復見驚魂夢中不畏波濤險飛盡江關到海門幾畨推枕睡難成索索愁聞故紙聲一語似傳陽羡好微茫或已證來生夢中見蔣宜人似言將往宜興悼亡八首蔣宜人亡已匝月心緒惡劣不能握管昨赴弔吳門舟次無事勉成八律聊寄哀思云爾四壁都無百事非依然佐讀忍朝飢窮年纍日埋頭慣月地花天擕手稀質釧記供除夜宴購書先鬻嫁時衣貴來只憶居貧侯宦海頻頻勸息機會稽僚壻最輕浮心薄酸寒笑不休顧我幾時才奮翮纍卿長日鎮低頭補衣怕在人前綻缺米羞從舍外謀春半好花秋半月可曾結伴出淸遊客久燕臺復吹臺遠人難返遠書回中年總覺愁睂斂上第才令笑口開官俸薄憐隨手盡宫紗新憶稱身裁宜人二次入都皆直端午拜內廷紗葛之賜歡場畢竟平生少夜夜遲眠漏暗催奈此迢迢遠道何行完舟楫上車裸七千里外擕家往三十年來負汝多憶壻夢魂逾紫塞傷兒涕淚滴黃河余視學貴州出都日次子盼孫忽殤宜人思之往往垂淚浮生本擬難重見卿咏飛蓬我荷戈百齡原未敢輕求妄冀同將甲子周昔日望夫幾化石他時喚婦怕聞鳩裏尸馬革吾曾具滴淚牛衣爾尚收奉倩過情蒙叟達悟來一笑欲忘憂常將家計一身支甘苦誰人得盡知慈母羮湯調隔日宜人自都中回母莊孺人年已九十宜人日饋甘旨不絶兒曹衣履製隨時輸官不待催租吏掃室先延課讀師可惜了無情緒在譜他遺事入哀辭深閨解笑元才子捷徑行才冠百僚尚詡俸錢逾十萬可知名節墮終朝偶思卿語間中涕頻把生魂暗裏招我亦營齋更營奠居貧未改舊簞瓢一種傷心譜不成畫睂窗外繐帷橫何堪枕冷衾寒夜重聽兒啼女哭聲隻影更誰憐後死遺言先已訂他生無眠轉羡長眠者數盡踈鐘到五更客中雨夜不寐起坐讀吳祭酒錫騏近所寄詩誰憐奉倩最傷神起坐披書屢欠伸垂老僅餘囊底智獨醒時啖果中仁間將晴雨占庚子未許雌雄判甲辰祭酒與豫同舉鄉試并同庚故戲及之正是客懷凄斷處玉梅窗外影橫陳十二月十日同徐逹源待詔陳煐理問唐在簡潘睂沈翿三秀才呂英馮珍兩上舍遊故宫傅周元理宅後五𤱔園率賦我來黎里鎮冬杪意淒肅悠然思縱眺退傅存老屋維時欵戶客笑語聆皆熟攔門富煙水惜尚少喬木尚書曾一面歸棹昔何速休神家弄日久已鬢毛秃死有五𤱔園生為八州督同時弇山叟亦復振英躅俄焉大星隕倏爾故巢覆並看饒遠略獨此享殊福無端判豐悴誰得識倚伏去去訪墓門靈巖北山麓畢宫保墓在靈巖山麓贈徐逹源待詔居鄰水國號山民校勘陳編事業新官爵偶同文待詔唱隨欣得管夫人君配吳夫人亦工詩有寫韻樓集四卷買書􅊑好通支港寫韻樓高絶點塵屋後女桑三百樹不妨來訪異時春跋屠秀才掞䱐燈筆談吳江書生授徒畢不朽思憑退毫筆文章李益詩韓翃鬼董狐兼作三絶比來作家殊可商數日便已盈巾箱春秋三傳閣上束委宛一册奩間藏豈知著書人貴在義創獲陳編盤盤出心得世事悠悠嗤耳食元之又元倘難冀訛以傳訛究何益韓陵碑外呼以驢沈約傳中嗤作賊遊談縱欲宗儀衍邪説遠不如楊墨仍矜信手書一寸可畏當頭法三尺汗牛充棟出不休郢書燕説吾所羞流傳縱復屏不視雅為世道人心憂掃除一切斯政要昨者竟煩天子詔近有諭旨銷禁説部等書從兹委巷絶傳布不與俗儒資語笑六經置案草史陳吾儒事業本有真見聞自此可畫一風俗或者歸真醇君之此書我所喜有勸有懲非衆比因君發我所欲言白日當空照窗几阻風二首寄吳祠部蔚光􅋊年心迹間如此為訪知交屢阻風料得故人吟案側寥寥先有夢魂通燕然日日荷戈馳苦憶孤蓬聽雨時何幸望湖亭外路阻風中酒更題詩偶成俗儒不知古亦復不識今喜作經世書何異聾與瘖聖人旨昭昭不向六籍尋沉埋語録中痼疾既已深事故紛疊來隨俗而浮沉仍然嗤老莊又復哂向歆一册挾兔園更詡工詠吟遐哉鍾子期何可託賞音阻風二日隨地泊舟率書所見四首昨宿吳淞營今宿海虞鎮官塘咫尺不得近且向波心侯風信雪花夜半縱復橫一燈如豆寐不成老龍窗外欠伸立來聽五夜吟詩聲一村無十家屋背皆黃蘆村前村後集釣徒衣食總靠門前湖大魚網得愁無法倔強先將石砧壓魚多市遠不值錢時割銀鱗飼花鴨人蹤既已稀犬吠亦不聞舟移一村復一村對面忽迫前朝墳荒碑半埋難卒讀落月正縣墳上屋多年翁仲欲出行石馬石羊爭尾逐一舟依魚梁一舟衝蟹籪鴉巢紛披鵲巢亂風急􅊑􅊑欲登岸淸晨糴米路復遙蠟屐險欲經危橋􅊑窗飽飯無一事行客水鳥皆無聊山村雜咏􅋊冬已見蟄蟲蘇晝暖無人詣酒壚看遍市橋春帖于家家都已寫神荼豬欄鴨柵護偏牢柴積先逾屋脊高一事轉驚除夕近堆盤春餅襯年糕蠻方聞未息烽煙近聞廣東復有會匪蠢動造物恩于此地偏但得臘頭三寸雪江村又可卜豐年江鄉厯盡更山場蝦英都看入市忙曉日淡黃天淡墨竹梢先已逗春光自吳江歸取道宜興舟次值同年邢大令澍話舊即席賦贈前年西子湖同訪孤山鶴戊午冬仲在西湖把晤今年鼓歸棹值子鷗波閣我行萬里歸兩年君官一縣還未遷即今大吏舉尤異鞍馬結束行朝天官舟初停我亦泊意外值君殊錯咢山陰踏雪訪安道西陵遇風獻康樂分張久已慨班尹同泛近看追李郭君才轉以繁劇進我境苦從憂患縛吟詩不已復著書君前著全秦藝文録近又欲緝宋會要官齋聚書至三萬卷多有藏書家所無者萬卷總為秦風儲精心復緝宋會要俗吏百輩誰得如邇來𫐠作殊難説往往著書成頃刻惟君畢力究經史餘事猶能及金石家山憶在古隴西君家在階州近聞尚未歇鼓鼙秦川之中血沒腕白日已有妖禽啼怪君語及顏色慘日日心馳到關陜飛書走檄君最慣殺賊持刀我尤敢瀕行索我輿地編我今學業荒可憐投荒來去絶吟咏即有亦不如年前昨來厯遍甘涼肅荒翳從誰借書讀河西子弟多才俊健筆尚須資卷軸君駝萬卷歸秦階可作隴右藏書家開門看山閉門讀課子暇日還咿啞妖氛銷盡山容爽隴底平平亦如掌秦中山川我神往挈杖來遊異時儻夜泊忽風忽雨入黃昏繫艇聊從古樹根五夜單衾驚驟冷卅年舊夢喜重溫荒途似訝非人境密意憑誰寄鬼門我巳傷心不能説更聽鈴鐸語荒村十二月十八日吳祠部蔚光招同邵聖藝封君孫原湘席世昌邵三孝亷雅集小湖田館即席分賦小湖田館值年􅋊難得詩人六輩間映雪半窗聊讀畫衝泥雙屐罷登山休官未免仍憂國荒飮何曾更閉關尤喜賊氛消咫尺符離城外戍兵還昨宿州鹽梟戕官滋事江蘇巡撫亦領兵至徐州防守適聞事已大定兵可撤還打冰行􅊑頭􅒱冰如戞玉􅊑尾打冰如擊築一冰飄來大如斛􅊑尾􅊑頭手皆束北風如虎冰所憑冰面又復添層冰嚴霜一層雪一層照耀白日初東升枯樹灣白楊渡舵樓指點鑿冰處鼻涕先驚作冰柱守凍雙河口竟日對錫山喜賦平時祇覺山容峭不識玲瓏石千窽今晨看山山益奇九峯高處鳥不飛半宵稜稜朔風驟雪壓白雲如絮皺更􅋊缺月上嶺時雲白與雪光參差霜加濃雪增厚襯得空林鳥巢瘦三日凍雲難出岫小除前一日祭詩作過江名士渺難求溫嶠居然第一流懶把黃金鑄生佛間栽碧玉繞新樓時于屋後築一小樓先期種竹以待升歌尚有兒能讀斗酒先無婦可謀誰更殷勤送梨橘蔣宜人在日余夜飮歸必預儲梨橘以待末經沉醉已生愁癸亥元日影堂祀先感賦時蔣宜人亦祔祀收拾全家畫裏看愁從紙上話團欒如卿又已􅋔成軸只我何時定蓋棺殘臘雪封梅蕊白玉更風揚燭光寒朝參久罷朝衣典野老應知禮數寬新正十九日趙兵備翼招同莊宫允通敏劉宫贊種之暨舅氏蔣檢討蘅湛貽堂雅集適同年曾運使燠過訪遂并邀入會並詞館也兵備作三詩紀事余依律奉答并寄顧修撰皋莊吉士騂男謝吉士幹是集本約三君修撰以道阻二吉士以屬疾皆不至堂高真認大羅天五輩飛仙一謫仙同羡玉皇香案吏仍參絳縣老人年檢討舅氏以年過八十賜第巳甘名士稱龍尾里中同館余齒居末曾與將軍導馬前余謫戍伊犁將軍每出多使余前馬今日蓬瀛重預會尚疑枚乘是張騫一院陰陰覆薜蘿淸談原不沸笙歌筵前客尚遲三少修撰及兩吉士座末人猶冠七科余于詞館為後進然下距壬戌新及第諸君子已屬七科前輩矣選日早欣傳里䣊使星偏欲駐巖阿運使以公事赴吳門歸塗阻凍留宿余舍揚州金帶圍休羡只此梅花瑞氣多屈指先庚與後庚兵備以庚午鄉舉余以庚子前後却三十年迢迢卅載許齊名登科記憶蘇和仲諫獵書慙馬長卿九秩乍開稱晚進檢討舅氏年巳近九十宫允與余皆舅氏執經弟子一堂分半禮先生家風雪窖冰天慣敢詡鑾坡世澤淸先文敏謝啓有父子相承四上鑾坡之直云云用及之是日座上有懷孫兵備星衍復成一律即呈諸前輩并寄兵備白門旅客亦詞臣却望歸帆已浹辰坐次尚虛三袐閣飮中原擬八仙人居然皓首稱先輩同向青雲逐後塵兩度木天高會好占他􅋊臘與初春前歲臘八日李亷使廷敬于吳門作高會坐中同館亦有入人吳祭酒錫騏范編修來宗李糧儲奕疇孫兵僃星衍李太守堯棟張吉士漙暨余及亷使也十三日約蔣二廷曜出東郭看迎春今朝却喜值花辰是日梅始放花晴雪能消隔歲塵却約白雲溪畔客試燈風裏看迎春二十四日小窗獨坐聞慧超巨超蓮艇三上人已扺西郭即欲過訪喜賦簿寒開南窗默坐苦不樂忽聞三上人遠到慰離索間雲西北至並落天際鶴呼童掃三徑先把長帚縛溪邊梅樹古細驗開與落山人庭宇窄略復具疏鑿更生新作齋卷施昔名閣沿階攤坐具相與話寥廓未知江上艇能得幾時泊蕭然忘世味蔬止辦藜藿飮罷訪定僧謂天寧寺了月方丈連翩出東郭二十五日雨中同三上人至紅梅閣探梅小憩久晴既望雨久雨亦望晴街泥滑如油擕屐忽遠行一樓入虛無三面柏作屏沿階石狻猊色帶苔蘚靑中藏全真廬翛然誦黃庭遠挈開士來勞此道侣迎淸談忽移時天色又已冥仙人既飛空梅蕊亦不馨時閣後古梅凋落殆盡朔風擘衣裘難臻檥舟亭惟應栴檀香歸塗訪天寧蔣宜人亡已百日感賦一首生離每經年死别又百日感此泉下人時添鬢邊雪薄帷風乍舉暗牖燈自滅如何傷心淚先作冰柱結椒漿聊此奠時物為卿設笑言猶在耳音響已終絶明明稱共命惘惘冀同穴行築土一壞衰年願方畢邢大令澍松林讀書圖作宦已十年讀書近萬卷仍然勤吏事訊讞無剩案時移六經筆頻寫五花判精嚴吏胥懾事事取心斷輕囂吳下俗近已朴而願公餘仍泛覽官廨若經館寧惟勤載籍百氏悉貫串太湖三萬頃此縣實南岸旁通苕與霅百里足溉灌官淸放衙早嵐翠塞庭院挹兹淸遠境逈異繁劇縣松靑三面列竹緑四時看官賢既如此多士亦競勸曾聞哲人訓仕學本同貫作吏即廢書彼哉何足算二月十七日早至淩江閣久憩浣梧道士為招張高士鉉郭孝亷坤早梅花下小集于生淵昆仲聞信亦至日昃更放舟至金山駐江天寺看夕照作即寄浣梧道士淩江高閣平明開橫江一鶴先飛來扉聲殷然磬聲落道士迎門亦如鶴修睂長爪彈素琴朔風泠泠絃上音張生郭生住咫尺招我花下同披襟花當爛漫人惆悵萬事不如花未放初春閣上景亦幽春酒初濃月剛望于生來從第一村拜浪先復驚江豚忽然興發欲西去挂席日昃來山門一山遊完屐方駐樓小如船欲同住回瞻閣勢尚隱然却在斜陽正紅處江天寺晚步一曲中泠泉至此波始濶多年石贔屭筯理巳欲活豐碑八尺柏木韜壓岸不使黿鼉驕靑霞赤日疊絢采神物終須走東海西來閣夜宿一菴名西來圎月向東出江空遙夜永雲水四邊徹僧樓一一高挂空倦客似鳥投樊籠三更以後羣動息萬夢並落蛟潭中曉登慈壽塔孤笻摩靑蒼一塔壓白日稜稜開四牖絶頂海門出濃雲浮江帆不舉江北江南洗春雨高寒鐘磬已絶聲自在一鈴天上語頭陀巖小憩墻頭開鳥巢墻下出蟻垤天風飄客下已復扺石室莓苔靑靑石色赭人語依微出巖罅隂房舉火照始驚百歲枯僧蟄其下方丈僧出宋蘇文忠公玉帶見示並恭讀純皇帝御製四詩敬賦三首八尺囊裁宋刻絲雕盤中有上淸詞平生不合時宜處輸與團團碧玉知七百年來步後塵乘雲遊戲任天真更從以上推前輩只有金貂換酒人蓬萊謫下已多時肯向紅塵挂一絲莫笑寶山空手入髯翁留帶我留詩二月草四日程文學贊皇吉士贊寧王上舍豫招往平山堂探梅即席感賦一首即寄汪司馬端光廣西并近柬儲明經潤書汪秀才文錦花朝已過十餘日梅枝才抒三兩花舍舟登岸一展眺今我三復悲年華浮雲變滅誰能説轉憶𨝍溝授經日當時白夾諸少年眨眼忽驚頭盡白汪生憔悴秀才文錦金生死高郵金明經蘭在揚州日皆寓秋雨菴今久下世秋雨菴中土花紫窮邊遠宦今何在久不得汪司馬端光消息三歲不貽書一𥿄岡南岡北梅花村何處可覔詩人魂他時鶯燕亦惆悵覿面已少前時人新知雖多故知少百歲交情願相保徑草猶稀敗葉深林禽已老雛僧小花枝映水作淺紅沿岸更溯東南風回舟擬向虹橋歇凖待四更山吐月古意十篇奉酬范文學棠見贈作西山望東海東海何茫茫銜此木石來力苦不自量何補涓與埃口舌均已傷靑鳥昨獻規與世期相忘與世而相忘在我殊不敢間居緬前哲所慕莊與黯平生攖世事又苦知識暗欲獻封禪書將毋近于諂諂既不可學戇亦不敢居東溟及西洋三萬里有餘一身周其間力竭敢告劬自非覆冒恩詎返先人廬維兹先人廬經始已卅閏感此聖善恩頻嚴義方訓童年粗有識先戒以千進奉此庶畢生敢稍逾尺寸妖氛昨已殄欣此海宇寧耕鑿率厥常時時詠升平兒曹能讀書僅令畢六經留此朴魯風長為聖人氓河汾伊洛間風氣一何質齊俗愧未能先以訓十室故人從政久半已遁仙佛獨善良所嘉于人貴求益波流何迢迢熠耀亦裊裊經天日月星明豈藉腐草所悲微末質志欲燭昏曉不畏霜霰零衝寒出林杪頻年筋力強日出逐羣動雖耕東海田時有北闕夢投荒獲歸骨恩渥亦云重懷抱尺一書時時隴頭誦平時苦諷誦暇亦窮幽尋尋源酌其流間憩嘉樹林此木經卅年綿綿甫成隂乃知造化功生物具苦心仙人海上來貽我縑數尺蟲書周四角字古不能識緘藏何敢讀讀即三歎息中有經世言今人豈能得汪上舍璨自泰州枉道過訪不值郤寄一首君居海陵倉我客江瀆祠相隔祇百里聞聲久相思故人昨復貽新詠聞説薄寒成小病梅花香裏倘復來同聽茅菴六時磬講院旁即僧寺二月晦日家太守梧招同族子瑩族孫維德小集梅花下用少陵示從孫濟韻見投率酬一篇即用來韻東風被郊原寒久氣已溫泠泠踈梅花宛宛成一村窺簷兩三株樹古皆蟠根吾家太守賢花下羅盤飱招邀數宗盟情話逮日昏宗支雖已踈誼則視弟昆同登三榜中敢云齒末孫吾家歙之西里有通德門峩峩忠宣公品望自昔尊平章及簽樞畫象今尚存所願子姓賢遑計泰與屯我頃荷戈來縱談及昆侖冰天雪窖中氊酪亦雜吞得預合族筵詎非大造恩興到酒反踈頻頻覆空樽時久已節飲閠二月朔日曾同年燠招同人至平山堂探梅歸途值風雨漫賦一首今年花信何太遲採梅幾及修褉時寶珠木筆絶消息風裏未見垂楊絲長春嶺畔花千樹縞袂紅􅑽出無數仙人間有蕚緑華時緑梅數樹尤佳一湖波光飛上花花光炫處波光暝隔岸山容恍如病花前舉酒不得休花外時浮一聲磬東風吹香香乍回雨腳似妒花齊開乍開乍落止一日千點飛入黃金罍花香方濃酒香續消得千條萬條燭主人愛客客亦豪風雨何嘗敗花局一更初聞柔櫓聲二更分燈入北城三更濃香袖中起客夢猶疑殢花底秋雨菴溪花紅不然溪水緑無語曈曈日影中似有蕭蕭雨竹聲穿戶水到門三面皆有春人墳春人墳上梅花發煙露濛濛棲獨鶻鎮海樓一樓枕𨝍溝江水出其右到來東海聲已復走南牖炊煙十萬攢郭門窗隙下瞰千帆奔樓頭城上紞如鼓風急三更遞江浦江口喜遇焦山僧巨超賦贈一首時巨超將從焦山移主山陰縣玉笥山方丈欣逢一棹入江灣與話春波浩渺間笑我轉成僧退院時余以性踈懶將辭楊州梅花講席羡君真有術移山何妨講席頻南北更擬名區遞往還為語若耶溪畔客忘機何似白鷗間題秋海棠卷子即贈金秀才學蓮醉完春酒醉春茶三十才人鬢欲華滿砌海棠雙瘦影時君已兩次悼亡僅擕一姬寓維揚傷心人看斷腸花江左孫郎最少年每吟詩輒問靑天君詩筆絶似吾友孫君星衍少時此才只有君堪替合跨茅龍統衆仙初至梅花書院橫舍東西竹柏林暫停行笈事披尋二分明月三生夢萬樹梅花一客吟閲世更須堅晚節傳經先已負初心枕流潄石吾寧敢且與同堂惜寸陰史閣部祠尚餘壞土枕荒汀冡樹蕭蕭戰血腥末路愁呼大丞相初心思挽小朝廷時危未可無安石事去先驚有隕星擬把烏金鑄螭魅馬程番與阮懷寧淸明日招同人各擕一壺一碟至艤舟亭小集酒半崔三景侃以事先去餘十五人並至月午始歸分韻得闕字十五地上人十五天上月花初紅欲膩月正圎不缺相招花下飮佳節興超忽空濛柳絲外水緑鑑毛髮間汀三五轉怒草生欎勃亭亭辛夷花香氣盈十笏盤飱隨所見各各辦嗟咄無愁觴欲罄門外酒旗揭人生歡會少半又感存殁黃生景仁久埋玉莊叟寶書二人皆昔時同遊者又歸骨神仙吾懶學況肯事禪窟餘生益踈懶久已罷于謁惟餘花月夜往往興孤發客來常不速客去亦倉猝崔生逃席半瘦影竄林樾追之不能到足滑致顚蹶其餘凡幾輩杯底任汩沒天空亭月午淸響益踈越空明無障礙醉影自宇兀終當跨茅龍矯焉歸玉闕舟行一道溪流之字斜阻風阻雨路尤賖柳絲緑入船艙內為泊橋頭賣酒家泊楊家港小樓三面花光顯分半紅深半紅淺濛濛三日春雨絲浸得鵓鴣巢半偃沿階細草三兩叢草心更比花心紅一雙燕子乍前郤似怨簾角西南風過三塔蕩花光照夜都無隙帆底略聞香氣息三層簾外軟東風開到桃花已無力紅窗一扇紗斜破夢裏驚聞𥿄鳶墮湖波添得尺五寬胡蝶驕戅飛不過扺銀林壩溪流南北都如箭風急爭飛萬花片愁看上埧亘高淳不使中江走陽羡沿溪水瘦湖水肥水影分上征人衣一帆如龍忽東去劈浪欲上桃花堤渡小南湖南湖雖小卅里周水面亦復分三州濤聲忽濺柁樓上挂席風急知難收舟輕半日穿湖罅雲氣靑紅不知夜鸕鷀方欲飛入雲激電正穿雲脅下草一日扺宣城偕淩教授廷堪戴孝亷揚輝暨蔣表姪德培至城南看桃花值雨此花綻日征帆開看花直到宣城來泥中處處留鴻爪花笑征人在家少官河一路春雨絲嫩寒莫厭花開遲紅紅白白競顏色敬亭山放朝晴時山雲靑黃水雲墨襯得此花成五色看花人憶卅年前花亦嫣然念疇昔城頭細草已若麻坡底正謝紅山查固知地氣輸不盡餘力尚放山鵑花雨聲蕭蕭走西弄多半春陰壓衣重幽人過曉尚未醒小閣三層結春夢蘭石桓太常墓古戰場邊置古祠祠旁荒冡柏參差猶疑上厠銜刀讖想見攖城伏節時一瓣心香留故治萬年遺臭付佳兒孝侯生札充生徑天道從來未可知重至洋川書院依然林鳥喚春風三面晴窗落采虹採藥僮歸靑嶂外著書人老白雲中東山未肯隨安石北海憑誰問孔融衰病漸將忘世事經旬不更展郵筒山居雜詠白露零有影白雲流有聲靜中一相值倍覺幽興生我欲過石橋眺此殘月明行穿竹柏中踈鐘已三更空際飛瀑來忽向足底橫一月不出門驚筍折衣架偶然窺北牖竹密已無罅山中春仲月氣已若長夏生徒增日課所幸仍有暇意欲校道書間從佛樓借樓居一何高高出雲百丈樓前芳草地一片緑如掌擕燈坐深宵空此一一想竹梢穿入牖坐久不獲仰破曉山鵲鳴官蛙始停響我從居山中不復關世事所苦剝啄聲郵筒有時至經旬及逾月排案已鱗次預擬欲别山從頭一披視案塵僮不拂聊用一相試此僮有機心不遣案旁侍受業吕培談正治校字
