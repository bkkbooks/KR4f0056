  text: 更生齋詩卷第四
  hash: sha256:d0f9e9a50f02105326fb16f1ba152ba3d7de129919aad3957c78a866b791f427
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_004-1a}
body:
  text: 陽湖洪亮吉著滬瀆消寒集題孫文學韶行卷後卽送至浙江幕府江左詞人最擅場卷中亦復唱伊涼通天臺下曾三過怪㡳新篇壓沈郞怨李恩牛意氣眞罪言草罷見經綸能容一個眞名士足抵狐寒八百人重修水繪園卷子爲冒文學鳴作記曾彌勒與同龕園中廢爲僧舍近始復小劫誰從靜後参檢點樓臺及魚鳥風光依舊壓江南人物當年勝永和時時觴詠雜笙歌更䦨偶向樓頭望天上星無座客多雙鬢愁同萬樹凋閒窻話舊雨瀟瀟桒田是處連滄海門外時時起怒潮雲郞去後小楊枝檀板都吟絕妙詞只有夜烏還記得冒家園裏放燈時蔣斗燦童養媳呂貞女題詞烏乎何辜貞女生不見父兮童養于蔣又不及見姑然貞女之幸兮曾未結縭而已得數面其夫何貞女之遇屯兮守義二十五年而尙未及撫孤我聞而心惻兮感外氏之衰徂緬前孫從表兄定安聘妻孫氏亦未嫁守貞年過五十卒而後呂兮顧兩見夫貞姝倘貞女而有後兮吾將代䘏夫遺雛生日自述今朝柴門開親故忽羣集云將壽先生共向草堂揖我聞方猛悟答禮恐不及囘頭語山妻治具爾須急嬌兒與孫子禮數未􅈺習賓來盡歡喜傳語競出入先㸔具杯茗繼復羅酒汁仍愁翁欲醉預向膝前立長孫纔毁齒口語已㨗給私語更五年阿翁剛六十偶成閒從里巷說新事卧聽兒孫讀故書不必更携芒屫出閉門紅日下階除喜張上舍舟過訪口占以贈就中精本祕不傳緘以篋笥承之氊偶逢識者一啓示先掃几席除葷羶何應寒具致汚軸千載以上嗤桓元君家舍宇本精潔又少俗客相糾纒焚香偶復展一卷眼與明月光同圓君不見時逢朔望列一筵不必牢豕須新鮮胥谿菱芡石湖藕一一皆可成加籩書田雅與穀田等報賽或可祈豐年我曾借本細讐校例得陪祭來筵前䖍誠拜罷共飮福一醉欲乞書倉眠九月十三日越來谿見燕寂寞漁莊欵水扉越來谿上月㣲㣲何因燕子不歸去却向夜凉庭院飛自吳松江抵上海與友人夜話吳淞江上路乘月去迢迢海氣全疑雨天風不捲潮夢餘頻悵望雲外偶招邀及此燒紅燭層樓已半宵唐大令仲冕招飮網師園卽席賦贈纔從識面便忘形飯我城東水上亭老友瘦眞同野寉謂王廣文芭孫殘荷多尙比天星百身未易酬恩遇時坐客詢伊犁釋囘日月一石偏敎吐性靈歸去且營耕釣好得閒隴畔便横經偶成爲陳太守廷慶賦一幅蠻牋任屈伸半鈎新月倍精神關心幽鳥能窺客過眼空花不惹塵雲影去來傷往事水光揺蕩識前身悲秋宋玉支離甚况復登臨送遠人過盡三春爛漫時九秋籬落訂交遲來猶背面誰曾見去不囘頭事可知海上早應随范蠡洛中枉自賦陳思黃庭一卷香千縷半欲銷魂半自持顏魯公名印歌一方石千餘年魯公名誰所鐫海中􅊧龍㔉龍骨更點星星老蛟血地老天荒丹不滅君不見公名怪底天子驚河北二十四郡僅一顏眞卿哭蔣二尹齊耀萬里歸來訪病身劇憐面目已非眞余自伊犁歸訪君君半面已毁嘔心疾北龎睂客懸腕書同透爪人兩度悼亡形轉悴一官瀕死志難伸東山絲竹銷沉盡垂老羊曇益愴神余少受侍御舅氏知毎過居第未嘗不揮淚也偶成萬念俱空後寥寥酒易醒未能離世網聊展度人經路暗燈明壑窻疎劍指星書生爾何意空自逞心靈石湖訪范文穆祠分賦得石字兹遊日已斜霞采叠蒼赤携兹書畫舫償我山水癖舟行十餘里心境一開釋杉藤凌澗紫鷗鷺點波白濛濛湖一曲落落嶺千尺非無懷古意風捲渺無迹危登開士閣幽轉范公宅祠卽文穆舊宅斯人預機軸時事已逼窄終焉感滄桒渺爾念疇昔憂時識希交蹈海憶少伯遭逢逮伊管隱顯並賢哲丈夫如有志于世匪無益庻㡬不朽名勒此厓上石夢遊仙詩三十二首屢讌瑶池鬢已蒼偶從天半話滄桒轆轤幸是仙人屫踏盡紅雲到上方科頭跣足任天眞隨分燒香拜紫宸郤喜近來蕭散甚蓬壺管領謫仙人生世應居離恨天愛從生後說生前銅仙又復垂鉛淚㑹面居然五百年白雲紅葉影參差欲向前頭訪素知拖得月華裙半幅却來波面立多時誰從天上號詞宗淡冩新篇墨不濃一朶絳雲環一字笑他人世碧紗籠尋常毎夜不呼燈却坐雲窻第二層一卷道書時背誦惜無人與證飛昇下弦殘月訂幽盟靑鳥傳來誤已成幸有玉妃來世約眼波囘處定三生慣拈針線作生涯剪得靈河一道斜認取近來花様好靑城雲氣赤城霞我識飛仙蕚綠華最憐秋鬢挿春花天田亦種人間果一味香淸愛木瓜繞砌菖蒲倚閣松仙人眠處五雲濃夢囘報道高眞過先鎻閑門十二重出世情懷絕世姿冥濛香氣散如絲紅雲一瓣邀同坐竒福難消是此時紫府新來品秩高隨風上下騁輕軺磨厓五岳都應徧且復題名北斗杓屈曲房櫳宛轉風一樓疑復住虛空盡驅雞犬雲中去獨敞銀屏待八公心思一串最瓏玲更有長睂射眼靑欲筭人間未來事滿盤珠借滿天星挈伴時來阿母家采蓮艇子住雙娃神仙一例嬌羞甚不折天池並蒂花幽居隨處費提防忽報飛星已入房親到下方緣底事借將弧矢禦天狼生來不假麝蘭薰坐處偏離粉黛羣欲灑天山萬年雪罩他巫嶺不生雲住近天河水氣涼萬株荷幹一方塘蓮花蓮蘃都嘗徧不及仙人舌本香欲逃百刧避羣魔天上誰知事更多斵斷玉虹橋百尺神仙從此絕經過桂樹扶踈月影涼漫無情緒守吳剛靈山採藥他年事先與裁成出世􅋔雲漢西頭路幾义浮家眞欲擬乘槎兩三紅淚揮天末都作人間異種花早住扶桑暮落棠仙人遊戯本無方忽然招手來天外認得麻姑指爪長雲軿一步一徘徊不分前途分手來啖得荔枝三百顆此時應向海南囘日月雙丸剩半丸東西海水亦齊乾仙人一笑春風轉萬劫偷從祕籍㸔王母池邊踏月囘羣花妒影不曾開何應三百神仙侶總學劉禎平視來巧笑仍含一種愁見人常自不梳頭朝來偶凭䦨干望自有神光照九州高居豈復有塵情魔境應從道境生惹得龍華先罷㑹人間飛語謗雙成要從南粤達南閩天漢東頭與問津十度錦箋何處寄倩他三百六魚鱗多應淸福不曾修逐浪來居羅刹洲莫歎姻緣簿多錯天孫亦復嫁牽牛朝正儀從最煇煌龍虎前頭列隊忙騎得鳳凰拳一足笑他六六紫夗央鋒車晨夕響如雷結屋星辰頂上來郤約下方人未到天門一日走千囘日正斜時月乍圎紅林處處露珠懸洪厓洞古誰能訪只有修眞謝自然趙兵偹翼以所撰唐宋金七家詩話見示率跋三首一事皆須持論平古人非重我非輕編成七輩三朝集好到千秋萬世名未免尊唐祧魏晉欲將自鄶例元明塵羹土飯眞抛郤獨向毫端抉性情詩家别集已成林一一披沙與檢金作者衆憐傳者少前無古更後無今法家例可平心斷大府文非刺骨深卷卷漫從空處想就中多有指南鍼名流少壯氣難馴老去應知識力眞七十五年纔定論一千餘載㡬傳人殺靑自可緣陳例初白差難踵後塵君意欲以查初白配作八家余固止之只我更饒懷古癖溯源先欲到周秦余時亦作北江詩話第一卷泛論自屈宋起附和作趙翼武進詞客低昻本不平品題間弄腐毫輕但消白首無聊日豈附靑雲不朽名老始識途輸早見貧堪鑿壁借餘明洪崖拍手從旁笑猶是燈窻未了情何限紛紛著作林揀來只剩幾銖金論人且復先觀我愛古仍須不薄今耳食爭誇談娓娓鼻參誰候息深深錦機恐負遺山老枉度鴛鴦舊繡針晩知甘苦擇言馴一代風騷自有眞耄學我悲垂盡歳大名君已必傳人幸同禪窟參三昧不笑元關隔一塵從此國門縣吕覽聽他辨舌騁儀秦偶成愁多久已置形骸㤙重終須異輩儕長慶集仍含諷諭東方論敢雜詼諧銷兵乍喜流亡返横潦仍嫌燮理乖何自近來恒斷肉安貧聊學太常齋汪庶子學金以捉月圖屬題戯成三言詩一首天上月地上人煙茫茫隔十塵隔十塵欲捉月馳風輪風輪遲月輪快不得已及天外隔十塵欲捉月轉地輪月輪寛地輪小不得已出天表隔十塵欲捉月借日輪日輪紅月輪白不得已兩相食上弦月捉不得彎如弓向人射下弦月捉不來愁如睂惨不開十二三十五六圎疑環白疑玉玉與環難把握醉中客總不知時呼月一問之蓬萊山作糟邱捉不得卽拍浮滄溟水作醇酒捉不得卽濡首排千觴列百樽我欲起爲解紛仰明月呼先生爲詩伯爲星精時或醉時或醒酒星暗蟾月明啓明落長庚横萬萬古傍月行曇陽仙觀題壁生天成佛事皆眞二百年來記昔因化寉人歸冤已剖釣鼇客到觀重新觀爲州守鼇圖新建蟲魚篆尙留遺跡麟鳳洲先謁後塵王鳳洲兄弟首先稱弟子畢竟傳疑由弟子曇鸞枉說化前身鳳洲作曇陽仙師傳末侈說師爲曇鸞師後身以致人疑題明姜黃門蓻圃諫草樓二圖折檻朱雲氣已粗時艱不敢作身圖愚忠自欲囘天地臣罪原難保髪膚滄海變來留隙壤危樓築處傍浮屠敬亭山下春蕪滿月黑愁聞杜宇呼吳梅村祠題壁寂寞城南土一邱埜梅零落水雲愁生無木石塡滄海死有祠堂傍弇州同谷七歌才愈老集中有避難仿杜七歌秣陵一曲淚俱流興亡忍話前朝事江總歸來已白頭題王應宸太守洞庭泛月卷子修月八千戸常居天上頭釣湖三萬䑹亦趁水東流我覺飛仙好時陪帝子遊宵涼亦何事嘯起岳陽樓苦愛蓬心叟煙雲筆底濃冥濛舟似蟻活潑水如龍欲到三層閣仍携丸節笻天風忽然遞嶽麓寺前鐘又歳寒宴坐圖不知門外路爾許雪霜深客念此時寂鐘聲昨夜沉淡然忘世味渺爾豁幽襟在在都無著空明此夜心如公能㡬輩未許卧蓬蒿終爲蒼生起應知素望高志猶營宇宙跡暫脫塵囂卽此坐忘處天風響海濤題扇贈汪童子元爵昌黎已序張童子魏國先知貟半千他日蓬萊問家世童子祖父已三世詞館四傳應號小神仙吳舫卽事杜曲城南記最眞繁華悟後始尋春蘭香仙去秋孃老零落尊前見此人水明樓上㑹羣芳屑玉研珠費較量折得一枝紅芍藥鏡臺先欲贈花王别友謫下蓬萊又幾春形骸疑假復疑眞天荒地老重相見君是前身我後身意外相逢是昨宵可憐知復在明朝十三夜月難連曉魂斷溪南長短橋消寒第一㑹萬大令承紀招集吳舫聼寧福校書彈胡琵琶爲賦長句時長至前一日金閶城外人煙宻琵琶一聲萬聲絕萬聲縱沸亦不聞琵琶聲高壓四鄰夕陽欲滅猶未滅喚出團圞海邊月北風吹潮海上來怪響迸入蛟龍堆繁弦促節手不管似有玉虬纒玉腕神明矩度心不關金鳳獨翔金指環一聲舒遲一聲疾霹靂出山天乍裂大絃展拓幺絃收雲霞鋪空地欲浮欲完未完聲一束直立琵琶若鼇足我行昆崙葱嶺二萬里靑氣漫漫障天起非無胡琵琶拉雜彈不已妖姬十五如山魈十指漆黑聲啾嘈招來區脫彈數曲帳外似虎天風號烏孫戍客何曾久意外生還感高厚禽巢南枝獸邱首百里遊行畏䜛口蒲帆無風向東走忽復遭逢數良友烹龍炰鳳爲我壽更拉琵琶佐樽酒金戈鐵馬音鏗鏘奔厓裂石詞激昻玉門關前天雨霜天馬欲走蹄先僵天山界畫陰與陽日月影碍冰硠硠曲終四坐慨以慷似識遷客曾投荒我爲琵琶歌行酒復食炙商婦當年已衰謝何似茲樓起聲價雲英翩翩未經嫁拜起尊前貎閑暇當時樂天淚墮琵琶下我謂時平遷謫何足訝况復經時卽蒙赦南冠初除囚服缺席地幕天無所藉三百六日擇此最長夜金烏玉兎光激射二十八星環水榭君不見樽前情淚何能灑百歳浮生亦虛假胸中之竒誰識者出戸茫茫眺原野有淚或向銅仙㵼消寒第二㑹汪庶子學金趣園座上追賦嘉慶戊午四月編輯婁東詩派成爲諸詩老設供建水陸道場用瑜伽薦度法并考生平行詣分上中下三壇别設閨秀一壇七日乃竣分賦得栢梁體一首玲瓏水上飛千燈東海璧月同時升佛香妙處繙大乘掃屋更結壇三層一壇别設列采繒雲鬢飛入皆鬅鬙天人丰格不敢譝淨名居士智力宏佐以百六高功僧婁東詞客繁名偁恒河沙數量不勝詩編大小束以絙平生慧業此可徵魂魄化去心神凝光采尙若燔薪蒸靈車鬼馬空際騰一一彼岸祈同登否亦尙冀天衢昇仙人心空鑒亦澂品第甲乙復經卟壇改定品第甲乙殊兢兢空中垂問空中譍忠如龍比孝閔曾陳雷朱范篤友朋賈彪郭泰偕李膺拄世風骨眞稜稜就中節義尤所矜生可模楷没豆登列上上乗皆日應其餘稍或寓勸懲亦不以愛不以憎原心略迹目匪瞢大邦齊魯小𣏌鄫州蓼隨絞邾薛滕次等亦復難加增灌夫罵坐肆轢輘樓䕶結客多依馮胸中鱗甲手葛藤甚或遇事全模棱諫垣瑟縮嗤凍蠅酷吏忮猛同蒼鷹亡身破家刺史澄降胡負漢都尉陵品列下下無能陞知人論世最足憑不以文筆相誇淩大弦稍緩幺絃桓筆法直似朱絲繩定論無用参疑丞此邦前代尤崚嶒後先七子稱代興兩王荆石相國弇洲尙書事業世所稱各有祠廟羅肴脀廸功集若雲霞烝日觀噦鳳天池鵬梅村祭酒緒復承此道亦屬三折肱歴年二百留雲礽流光疾若矢射堋琅邪太原壇坫仍品題直到驌與騬語簡而當爭鈔膽我于彼法習未曾服此論斷非儚儚忠賢奸佞各列棚竟若二水分淄澠學仙學佛縱不能何必苦判溝與塍山雲欲凍海欲冰萬丈雪霰愁難夌歸􅋔幸有十束綾敬錄一本隨行幐消寒第三㑹王孝廉履荃胡明經金誥邀遊樂郊園因出婁東十老圖索題十老爲王育字石隱年八十陸羲賓字素朴年七十一宋龍字子猶年六十四郁法字儀臣年六十五顧士璉字殷重年六十四盛敬字聖傳年六十二陸世儀字道威年六十一江士韶字虞九年六十陳瑚字言夏年五十九王撰字異公年五十皆婁上明末隱君子也十人惨惨荒江潯時歌時哭天爲陰朝無食案夜乏衾尙扱朱履行空林沈思古昔淚雨淋往者不作何况今魯連旣向滄海蹈屈子又復湘江沉田光刎頸萇宏胣漸離矐目豫讓瘖吹簫吳市亦時有撃鼔河岸誰能尋寰中止剩伯倫鍤海上自拊成連琴龔生未授新祭酒伏勝尙屬秦儒林以之相較盡不愧餘子未足披深襟歸迂顧怪在咫尺庶可與爾稱同心消寒第四㑹汪刺史廷昉座上賦南園古梅歌梅爲前明王文肅公手植名一隻瘦寉一雙鳳去不囘一隻寉翩然來城北卽雙鳳鎭翩然下啄莓與苔渺爾化作羅浮梅羅浮仙夢何時醒幻作梅花尙朱頂三生落落出世姿七尺亭亭照波影不飛不鳴作高格四出枝猶排逸翮亭空月冷露欲零仙客欲騎騎不得百餘年來丁令威游戯倘復時來歸人民城郭縱非是尙認一樹衝寒開幽人幾日園南住香氣横飛海東路滄溟今已作桑田婁河口今叠長海沙遂至淤塞此樹應須憬然悟園林之主先後殊昔者太保今尙書南園近爲畢秋帆尙書購得以居甥沈慤師圍棋賭墅偶然得痩骨尙欲凌高株研薌居士開賓閣邀客詠梅如詠寉長身安得居樊籠復恐化寉飛横空消寒第五集田大令鈞邀集官廨卽爲題荆樹山房圖卷子荆樹山房爲大令六世祖明萍郷令所建嘉慶三年錢唐黃司馬易爲補圖田家集在何處門前淸濟㑹濁河百世流傳紫荆樹紫荆樹老花愈多四出不復分枝柯尋根旣悟一本義攀樹時作同心歌我願兄弟心化作此樹陰祥風甘雨萃一林三冬三夏不使嚴霜烈日交相侵仍願手足誼化作此花蒂千枝百枝同一氣花葉雖繁枝不替李家花蕚樓馮家棠棣碑不及君家此樹好顏色千古萬古名猶垂山房三間下有池容易得値花開時花前盈盈酒滿卮旣不識尺布斗粟三字辭亦不聼然萁煮豆七歩詩君家此樹眞堪愛大令逮君剛六代一門草木皆異常芣苢不吟蘐樹背龔梧生黃小松爲君作圖作記皆極工君不見紫荆花花色異絶愛君家好昆季六世相傳㡬循吏更覓甘棠栽隙地消寒第六㑹汪公子彥國招集復初齋觀王石谷繪山水直幅畫係石谷贈公子七世祖明處士汪溥溥亦工畫爲婁東第一手我行徧天下却愛黔中山黔中山勢盡壁立出地萬仞無彎環南峰升雲北峰月畫裏溪山亦竒絕靈泉破空山石裂飛出千年萬年雪崖窮路古林光倩斷壑奔灘鬼神現林花對客纔一笑山鳥窺人剛半面洞門怪響七尺笻竒古似是商山翁商山翁居海曲得意時歌復時哭地老天荒一間屋滄浪之水淸濯足鵯鵊鸕茲與同浴放艇時來玉峰麓森然非松亦非竹植立門前聞剝啄主人開戸喜不速邀坐茅檐背同曝忽然一筆冩不足肌膚如山骨如玉狂叫自呼王石谷我題此畫亦非偶二百年前倘良友畫中蕭踈兩閒叟著罷枯棊偶垂手瞥見洪厓拍肩否王石谷自題有洪厓拍肩之語山中古洞如敲開两翁曵杖還能來消寒集上醉幾囘大笑手覆三千杯消寒第七集唐明府仲冕招集吳縣倉廨觀唐六如畫馬唐生畫馬如畫寉仙骨棱棱難捉摸不識人間有罵絡唐生畫馬如畫人霞采奕奕光瞳神氣軼天半心難馴唐生本是神仙謫畫馬亦與龍麟匹眼空千里萬里程一點飛從草頭黑蹄高四尺尾徑尺全力都從尾間出頭肩背腹鬉踁膝大氣囘環如一筆蠻靴烏㡌衫落拓此客我疑孫伯樂不然何以神采飛騰氣磅礡我曾行經大宛兼烏孫枕戈萬里求絕塵生還豈意復相値雪夜對此開芳樽六如畫品陶山詩落筆往往饒精思前生不是趙承㫖或者卽爲李伯時君不見旄頭星尙照巴蜀眼急㨗書來不速十萬驊騮競馳逐饑火燒心尾毛秃何如此馬眞有福飛行限以尺一幅低首且食太倉粟消寒第八集孫兵偹星衍邀同人泛舟至永昌鎭訪孫武大冢率成四首初日甫欲升照我出東郭巫門已迷離何况冢廓落言尋永昌鎭十里路初拓英雄骨未朽其上已耕鑿雖然巢冢鵲鷹隼不敢摶繙罷越絕書酸風下懸閣伍胥貢竒士本欲爲國謀寥寥一寸心亦報身家讎要離與專諸詎與公等儔蕭蕭吳宫中頸血五步流遂令姑胥臺濃春倏成秋平原不知兵亦斬笑者頭生齊而仕吳位視客卿例如何盖世才乃用作兒戯兵鋒纔一試已取鄢郢地嗟嗟甬東叟不及盡竒計至今十三篇海內悉衣被荒墳極十頃上有柏樹根高碑止留趺文字已不存茫茫今古殊地尙名孫墩百步絕采樵没世若有神千年倘思鄕魂登望齊門消寒第九集臘八日李廉使廷敬招同人至虎阜憇梅花書屋看黃梅作十步亘一閣五步橫一臺藐姑仙人尙未來風信先已催黃梅門開稜稜石千尺徑險最宜雙蠟屐小樓開處三面花花下屋古如浮槎䦨干東西屋前後不及捲簾香已透紅紅白白不並時南枝北枝開故遲維餘寒影互激射凍蕋落葉光參差黃蜂千頭綴枝冷只惜南園蝶無影紇千山雀時一雙噪得遊人發深警日當臘八月上弦樓上兩兩排華筵飲中八客疑八仙是日同在詞館者共有八人不飮我欲花前眠花光旣分飛燈影亦交錯君不見談深不覺冬日促幾樹夕陽黃不落古㑹晤詞囘頭卽相思對面忽無語妾身雖堅貞妾意已相許妾如團欒月無缺儂似曉星常逐月升天入地影不離何必更判雲與泥古訣别詞紫騮不曾歸靑驄不曾去同行複道中意外復相遇黃梅一株香未折花㡳忍寒來訣别暗影朦朧啓北扉嚴霜正白城頭月䢴溪步月空外月華直幽人此際來寒梅三兩樹並影一齊開臘月十九日卷施閣邀同人爲宋蘇文忠公生日設祀作東坡謫南海我謫西海頭東坡更三歲尙未離儋州我頃荷戈來僅止三月留我歸正値黃流漲海外竒花未全放天山六月汗不流冰雪千層萬層障朅來半載荒江沚一念感恩先欲死江田時陸復時沉自歎浮生亦如此年殘百事如蝟毛歲未全稔民仍勞憶公更憶初度日置酒遠復邀朋曹初陽離離開竹屋黃白種梅香乍馥遠行萬里今甫歸濯足卷施一隅谷君不見坐中七客鬢皆斑難得人閒歲亦閒同獻樽前一杯酒祝公生日我生還凌同年廷堪以其族曾祖明侍御遺札屬題率賦一首一紙留遺墨千秋識藎臣更因懸腕疾彌覺剖心眞臣節終橫草朝端尙厝薪傷心江總輩文采竟亡陳借月歌爲措月上人賦出門卽看山閉門卽抱膝上人于世何所需祗借天空一瓢月有時欲閒吟一瓢月在心空濛百斛光先與袪煩襟有時欲說法一瓢月在頰靈明百琲珠如看㵼行篋空空相色非非想瓢月時時復盈掌離鄕忽欲念鄕山天姥天台或長徃去年住城東看此瓢月生㢲宫樓前燈影明今年住城北看此瓢月蝕天王堂中香炷熄僧旣不還俗月亦不上天假而不歸凡幾年聞說塵劫歴百年經千天邊之月時或缺月在一瓢光不烕許上舍汝原觀濤圖避人何敢學乘桴東下滄溟住得無轉眼忽憐塵世小一杯海水一葫蘆三千里路客何久十八家村住亦難我欲與君同卜築城南陽羨好溪山題畫峰峰嵐氣誰能辨一色采雲分一面山形正闕西北峰郤好海霞生片片山深六月徹骨涼世事不到三間堂囘厓偶爾透日光水流花開天地忙石壇中間棋局具五客入門饒逸趣纔完一局已卅年騎鹿公然上天去荅友人問近狀門前三萬六千頃架上二千四百年胸次近來無一事釣竿纔放枕書眠跋唐豐溪處士吕從慶詩集後處士本大梁人以唐廣明元年避黃巢之亂至歙又自歙移旌德之豐溪遂家焉處士卒時年已九十七自題其墓碣云唐詩人豐溪漁叟之墓時已届石晉天福中葢處士之不忘唐如此自後遂世居豐溪迄今已九百餘年子姓繁衍多至數千家余來主洋川書院其末孫壐與培皆從余游近復從零縑斷碣中􅊧羅處士之詩并前所刋共得四十五首乞余序之因并繫以詩君詩四十有五篇流傳九百十六年豐溪自此占居籍百世尙識開封遷人丁至萬戸至千前後南北圍墳田淸明歳歳上先冡十里以外聞香煙千年家法堪則傚不用西方化人敎牲牢奠後布路囘墳頭從不飛𥿄灰君不見司空表聖羅昭諫唐末英英義聲見詩人豈藉詩句傳大節所在尤昭然豐溪處士生晩唐末路乃値晉與梁時唫時輟心內傷醉後自北陶柴桒烏衣山王官峪糾嶺栅峰同岝􆇆九原數子如可作愧煞陵陽杜荀鶴友人貽所知集見卷中録先君子詩頗多敬讀一過感賦親承色笑猶如昨孤露餘生五十秋夢好尙能依膝下愁多時復上睂頭傳家舊業詩千首卜築新塘土一抔便種梅花滿墳屋他時地下鎭從遊
