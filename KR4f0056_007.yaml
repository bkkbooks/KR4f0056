  text: 更生齋詩卷第七
  hash: sha256:d4e5ffd025b7f696f40c34333e8cb78ca9d7a23e9c5039b92ebb1c4b90c1d70d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_007-1a}
body:
  text: 陽湖洪亮吉著西圃疏泉集競渡燈船行燈船尚隔三條橋寶氣已復衝層霄三橋百巷密如櫛波上厯厯人聲囂須臾赤熖將橋鎖分半樓臺燭光裹林鴉林鵲驚四飛鴉背鵲頭都帶火忽然龍爪攫半空千人萬人看燭龍橋回風勢亦稍緩龍忽正面停波中橋南百尺波如沸龍甲龍鱗照天地妖狐竄水魚登岸光景欲從何處避緑楊枝頭閣幾層無數紅袖圍紅燈船燈直與閣燈接咳吐落處雲霞蒸百舟迎龍百舟送别有百舟排不動三更以後扺北關一派火光飛入弄鉦聲已遠簫聲起裊裊聲驚入雲裏蜻蜓舟小琉璃暗有客添衣出蓬底雲溪我住三十年客夢只落雲溪邊回船復向溪上過衫影笠影人疑仙曙光曈曈斷更鼓千萬燭光收入浦君不見何如天上兩燈忙圓月乍傾圓日吐跋錢三維喬自製壙銘及三幻圖説後雖非祖道雹河干易水一名雹河紙上蕭蕭風色寒君是生魂我生挽銀箋聊當白衣冠太虛偶爾綴微塵詎有前身與後身多少樓臺雜松竹君皆疑幻我疑真宗忠簡祠六百年來氣不磨江干遺庿欎嵯峩迎門九派東歸海卧榻三呼北渡河夢裏銅駝餘涕淚望中鐡騎敢經過劉琨祖逖應同傳未了忠心尚枕戈陳少陽祠少陽祠外駐征輪國士應知爼豆尊已覺舉朝忘二帝不妨在野蹈三仁捐軀子諒彈仙客並世朱雲值佞臣一樣書生心迹異酋前叩馬又何人城渡橋訪明唐襄文讀書處荆川臺址尚崚嶒卜宅當時愧未曽余戊午乞假回將卜居于此後不果君慕古人三不朽我甘世事百無能牛腰卷軸傳難必馬革功名謗已騰何似掩關長却掃白頭仍擁讀書燈讀晉書偶成剩得荆揚半壁天偏安王氣尚綿延生憎謝客稱山賊死笑孫恩作水仙南渡化龍才幾日北來飮馬是何年茫茫萬里中原土只惜無人肻著鞭七夕京口淩江閣待友人不至率成四絶即寄張文學崟郭孝亷坤暨及門于生淵兩株高樹倚簷前却擁秋衾自在眠絡緯乍停蟬又響曉霞紅入寺門鮮煉丹臺畔值佳辰也買甘瓜向曉陳不敢更談天上事久安心作謫仙人北固潮頭未肯降忽驚人影出蓬窗誰言一葉舟偏小滿帶秋聲過北江年來百事總闌珊門外江流亦漲灘一枕水窗眠未醒算來還比白鷗間是日過聽秋軒飯并觀瓜果筵作華堂乞巧筵商略祀牛女天邊瓠包星筵上戲摘取華堂乞巧筵商略坐宵永籬角牽牛花迢迢妒星影隂晴客不知榮悴草無語門前洗手花門外洗車雨天孫踏鵲橋中隔雲一片靈鵲不擡頭何由見仙面千聲與萬聲蛩響一何切天邊方停梭地上已促織天上星神過人間兒女忙欲知霄漢事除問杜蘭香擕于生淵夜半剪江至焦山百尺驚濤內呼舟半晚過夜帆明螮蝀秋浪狎黿鼉舊雨南徐少回風北固多到山山已黑撼樹且高歌焦山山頭高士壟山下大江潮一柱中流兀千年古像凋氣猶淩北固名欲並南譙山本名譙山且把心香爇魚龍未敢驕張秀才學仁寄槎圖家山同百里各復感飄蓬我在昆侖上看君滄海東枕戈馳遠夢振袖揖長空咫尺天河近無須更使風吾鄉錢生履坦在南昌日作梅花卷子寄萬刺史廷蘭到日正值刺史八十四壽辰因繪為長卷刺史并作詩紀事邀同人共賦此梅公手植梅壽亦輸公却喜南枝早香浮北屋中老來長句健客到一尊同他日花開處先酬百歲翁翠屏洲秋聲塞港口風急船不過江蘆明百頃一叟截江卧遊鱗逐驚蛇居然上舟柁嘉魚港大水抱細水水盡波忽動中有百頃潭嘉魚歲堪種食之可平心兼乏江海夢種竹軒百竹緑半村十竹緑一巷人從巷口立時與竹竿撞海上螮蝀來餘光半軒絳巨公崖重來巨公崖石石悉迎客惟餘一石傲壓客險及額石上雲亦奇孤飛上天直初九日鄒水部文瑍載酒相訪因約同人松寥閣小集分韻得聲字難得新涼載酒行酒兵鬥罷鬥心兵江光入夢仍如練秋色摶空若有聲悟後雨從衣上落醉餘天向笠邊橫京華舊事勞重説卧看潮頭滅復生初十夜山半步月至三鼓始回出門看山光月色忽無盡簾前秋景好花氣亦徐引江光山光新月光點入秋色逾蒼涼花香堂前一杯酒杯底清光無不有三更以後月愈明興發我欲淩波行秋花倘點頭秋竹若搖手秋鐘泠泠恍開口一風吹人入竹樓竹樓旁邊茶百甌茶香雖清客沉醉七尺竹牀三客睡花香亦若憐酒人忽灑花影來周身夜光齊收夜鐘歇却夢酒魂飛入月十一夜東升閣看盂蘭盆放燈作一燈先出法界樓大魚迎燈爭逆流燈來大魚忽然竄一鬼一燈擎不亂三燈五燈波靣停鬼欲待侶方同行有時一燈衆鬼擎惹得燈影皆深青燈光時分復時集鬼臂壓魚魚直立燈光叢處鬼亦夥魚驚避鬼欲出波大聲軒然波上起盡捲燈光入雲裏鬼車鬼馬已四飛燈去鬼伯愁無依洲東洲西萬聲沸鬼氣居然避人氣樓頭仙客正朗吟激得波響如鳴琴君不見神燈紅鬼燈緑入海無心竸遲速東流燈影西上潮鬼勢瑟縮魚龍驕萬刺史廷蘭邀集令子承紀丹徒官廨小飮即席賦贈萬為壬申庶常前輩方壺員島振公名八十年來始合并佳士盡看稱弟子靈光真欲比先生南遊畫鷁仍須迓時約遊吳門日便道過訪東下飛蝗偶有聲適有飛蝗過境幸不為害今日宰官誠不易好傳良法拯疲氓刺史居官舊有聲江口待慧超僧不至却寄一首松寥髙閣不同登一榻慵眠醒未曽僧性最懶我憶放生池上路秋花病寉與孤僧月波臺夜坐月色轉緑天光青松梢盡處明一星星光忽隨白露零倒射北斗光泠泠星光墮後山光暝竹屋居然覆漁艇三更向盡吹曉笳海上已復生紅霞林下二髯圖為萬刺史昆仲賦北江一漁舟日昨泊北固欣逢西江叟相與話情愫叟顔如春髯若戟髯上泠泠流古色比肩令弟何不來與共官齋話晨夕見公與公語别公展公圖我題詩贈公公見應軒渠君不見林泉不復營生計只有公家好兄弟一執奇書一如意后泉淙淙㵼竒氣石上松花積何膩山果投林有真味阿兄詩成屬余季老友寥寥亦堪寄石門前頭百級砌老木千章萬章蔽門外紅塵即如沸一山遊完一山替五老八公時把臂我昔亦是神仙吏謫下九天居九地他時華髮倘下垂曵杖從公共遊戲六月二十日偕同人載酒至城東陸氏中隱園看荷花至二鼓始歸率賦今年水滿荷花低前後一月稽花期花期忽展六月杪花朵如盤色逾好陸家荷幹捎城墻隔城薰風沸滿塘檥舟亭畔一雙燕聞信遠復來尋芳雛鶯縱老尚引吭蝶翅不待秋間黃花前十客羅百觴過午一一來追涼花枝迎客若問訊一客一花須坐近坐久未窮花底藴花下蛩聲亦殊韻殘蟾出水光何陟花竟嫣然開笑口看花親切花轉羞花己低頭客濡首花梢蓮實花下藕花底誰人小垂手引得荷盤貯杯酒月影星光滿盤走看花既足酒亦完花外尚有千琅玕深緑影護紅團欒不須更與花朵語花外鵲聲催客遽一半酒人穿竹去陸孝亷繼輅洞庭緣樂府下第才人暗自傷忽驚竒福出尋常龍堂入夜波如海别展鮫宮作壻鄉玉茗花殘閣亦傾是誰拈筆與爭名到頭一例神仙夢樂府新傳兩柳生陸公子鎔邀至城北看荷花而客坐正與花相背率賦一首時將遊焦山屋向南頭水北頭背花開宴我殊羞預愁簾蒜遮香氣聊折荷筒抵酒籌有客苦談當世事是誰能代古人憂深杯到手休辭醉明日征帆向潤州清泉濯足長卷門前水屋後山山深深水潺潺紅塵三十年足垢久當浴尋常一曲流又恐汚吾足竒峯千疊溪九回溪流曲處點碧苔客欲濯足時歸來足垢既濯登峯若飛盧敖仙人世外可期飛空遊行有時倦展我北堂三萬卷吉金樂石東西列嗜硯居然又成癖周秦彛器唐漢碑硯材端溪復歙溪何日約客來􅊧竒我擕蜻蛉舟爾居鴻堆浦挂帆一日即詣君與闢一軒談邃古年來里中賽神之會事事競勝較十年前費已百倍矣感而賦此時七月望日俗所傳中元節也令節尋常事奢風幾歲開綺羅裁幟翣金玉裹輿儓神豈餘威及人爭罄産來徒充里胥槖一日醉三回鳴鳩圖占得危巢復幾時滿天風雨劇相思一枝費盡林鳩意只有山禽總不知江流斷處有停水數十步荷花盛開偶賦黃雲昏處盡黃蘆留住荷花世界無渚上鷺絲為料理約風三日水平鋪新搆卷施閣成登眺偶賦萬瓦縱橫內居然峙一樓愛從雲盡處看到郭東頭世味都應熟吾生合少休掃梁迎舊燕相與話初秋題范秀才來鳳鐡琴詩草以鐡作簫以鐡作笛何如鐡琴聲出金石琴或以石琴或以銅何如鐡琴逸響遏空君家鐡琴詩堅古亦如鐡前古與後古試問欲誰敵一編能窺天地心白電掣屋霜飛林我擕君詩及鐡琴海上落落求知音月夜登北固更望金焦二山回途與友人憩演武廳小飮作更從石脊眺昏黃無盡江流入渺茫百歲過人疑短夢兩山與月鬥圓光鸕鷀影逐浮漚沒蟋蟀聲隨墜露涼北府健兒京口酒算來今日總尋常哭同年楊大令倫一生心術及詩萹都復研摩到昔賢稷契許身聊復爾君生平作詩服膺杜氏所著有杜詩鏡詮二十卷羲皇入夢致悠然填胸卷軸逾三萬歸骨程途渺七千未敢與君中外敘豫與君皆蔣氏甥君母則余外家姊也忘形且自託齊年登别峯菴望海忽值風雨朝曦色染滄溟緑東望海門如半粟滄溟宇處天蕩搖頃刻已見西來潮象山南頭蒜山尾一舸倒流還數里風威不敵潮勢狂吹角北岸停帆檣君不見日居萬瓦鱗鱗內眼暗頭低殊不耐此時懷抱覺暫開足底隱隱聞驚雷天公似把炎蒸洗東海叱龍龍盡起一晌江都電影來翠屏洲上紅三里山中避暑聞同年曽都轉燠將報最入都却寄一首野客空山避暑遲正聞軺傳入都時西京鹽鐡何妨論南國鶯花盡入詩應有功名參計相最憐風味似經師愛才一例尤難及報到平安杜牧之地燈行五月朔燈髙懸不照地乃照天七月晦燈下墜不照天乃照地燈髙懸禮北壇土人云天燈為天地水府而設其實元張士誠有德于蘇常蘇常之民于其死日懸燈一月以報之託言天地水三官神也天地水府稱三官燈下墜出東郭幽明教主轄萬族俗傳地藏為幽明教主天燈不接天僅與星斗聯地燈不貼地都復罩階砌地燈數比天燈多五里直接官塘河雜以梵唄兼笙歌千舫百舫燈前過君不見天燈完地燈接更有水燈波上貼三燈看盡無燈看秋半皓月升團圞偶檢故書得三友人遺札各賦一首通政司副使錢灃早年重望出遐陬六詔人文第一流作史舊曽居柱下建言頻見伏螭頭鷹從鳩化心仍恕蓬自麻生節亦遒君與余同年葉舍人雯最善嘗共寓居每以名節相朂我是庾公樓上客彈章傳到亦生愁指甲辰年紏陕甘署督畢宮保一事太子太保提督花連布提督死事尤烈其諭祭碑文余在翰林時所擬進也與余同官貴州交契尤密生平本以志墓文見委故所撰碑文敘其死事頗詳盡云尺書肯為故人題已值倉皇盡命期生戴頭來知秀實死餘膽在説薑維蠻荒屢共中宵宴絶徼曽褰大將旗君先在金川署功八百里騅休更御送公天上去騎箕君有善馬嗜之成癖鳳山縣知縣贈雲騎尉湯大奎草年里巷憶同居廟食今看義烈俱君少時與余同居中河橋委巷中巷口即隋陳司徒杲仁祠祠額名英風義烈未到斷頭先墮指最憐歸骨尚銜鬚書埋魚腹濤空沸餉轉羊腸道苦紆君年前曽解餉甘涼畢竟酒人能報國君尤善飲霸陵醉尉亦捐軀時里中王麗可亦以佐雜殉節陕西近築西圃將次落成偶賦八截句堆胸竒氣漸銷磨山不嶙峋水不波只有露臺高百尺偶然平視到羲娥剃草澆花久乏人攤書聊剩此間身不妨我少元章癖滿架傾欹滿座塵荷戈歸後鬢初絲未礙齋頭睡起遲忽夢天山萬年雪一燈如豆酒醒時轉憶童時奉母居三遷遺訓尚欷歔半間板屋孤兒占聊扺親存侍板輿心事初冬鬢晚秋只餘春夏氣仍留旁人莫笑間居早五嶽遊完住此樓人説池亭入畫圖臨流時悼影形孤防他春到鳩鳴急巢好先無婦可呼作逹時時憶樂天尚嫌七十始歸田一􅉌一壑吾應足不更描摩池上篇屈指平生志業虛勞勞蹤迹五旬餘東西豎亥行將遍才得蝸牛一角居蔣通判騏昌官興平縣日于土中得漢張騫印一方興平古槐里也壬戌歲出以相示并屬作一篇以紀西京世數傳至九文為仁君武英后張騫鑿空縱萬里金印何嘗大如斗姓名惟剩玉一拳誰果好事為流傳玉方一寸白如雪或者采自黃河源當時開邊承意指堂邑氏奴同出使隨軍即以勳得侯終是人間妄男子功名雖竒意則妄地上行完厯天上惟應地下名不傳想欲擕之伴深葬騫經絶域我亦經只少一棹天邊行伊江傳有故侯碣伊犁傳有張騫石碣􅊧訪究未能得也搜訪百日終沉冥四周雖完一角折世上誰能盡完璧漢家末葉益可傷傳國璽猶輕一擲君不見廢􅉌千載剩荒􅉌故物摩挲説故侯國士一壞何處覔轉因槐里憶朱遊朱雲槐里人墓已無考同里戈裕良世居東郭以種樹纍石為業近為余營西圃泉石饒有竒趣暇日出素箑索書因題三絶句贈之竒石胸中百萬堆時時出手見心裁錯疑未判鴻濛日五嶽經君位置來知道衰遲欲掩關為營泉石養清間一峯出水離竒甚此是仙人劫外山三百年來兩軼羣山靈都復畏施斤張南垣與戈東郭移盡天空片片雲中秋夜坐天上風初緊人間暑盡收獨搖明月影頻訪市橋秋暗響蟲藏砌華燈燕出樓年年當此夜坐待曙光流八月二十日扺寧國同年魯太守銓邀遊北樓并留飮桂花樹下賦贈二首自有兹樓復幾年爭傳句好問青天人言李白曽低首我是洪崖許拍肩不覺玉盤遲出海何訪金粟早開筵羣仙高會今三度余與太守同年同門然把晤甚少惟己未歲太守謁選入都會飮二次及此而三耳一榻仍容醉後眠汝潁東西頌宰官一麾出守又江干魚頭參政家聲古鶴背仙人鬢影寒秋老茱茰先釀酒衙荒苜蓿罷堆盤凌教授欲招飮以此而止升沉中外誰能記仍作龍華會上看半月臺久坐正值下弦候來登半月臺夢中雙屐遠足底萬扉開閲世餘喬木流光漬古苔他時闌楯葺太守欲修北樓及此臺應許醉千回席上喜晤施上舍晉賦贈十年不遇施居士金粟花開偶來此白須居士金粟花我鬢亦與霜爭華主人開筵當日夕夕日暉暉照杯赤我傾一斗君百杯秋老頓覺春風回陵陽仙人作校官邀我苜蓿餐闌干我嫌苜蓿不救飢却向太守求甘肥山隂之尊飮不竭滿案溪菱間山栗仙人赤鯉膾作絲興發不顧琴高嗤青松枝頭碧月來移酒欲上元暉臺眼前百事不措意肘後花朵驚齊開山禽飛回水禽集只覺樓高渺難及何時百尺為貯梯時北樓梯拆不得上送我白雲頭上立琴溪客館作拉拉雜雜彈琵琶蕭蕭瑟瑟開渚花青天沉沉忽無見殘月黯黯生光華迢迢溪水何方瀉漠漠山窗已成夜膠膠擾擾雞一鳴雨點落落煙冥冥曉度篛嶺屏山髙萬仞厚亦徑千尺空明初日照表裏恍不隔寧知深谷底夜氣未收墨白鳥倚樹眠青蟲抱枝蝕林梢開百里下嶺勢尤仄天都雖半露地脈已全坼平塗無十步絶頂一關厄亭午日氣紅楓林亦齊赤夜宿許村許村凡五里路險客難到回崖視昏旦絶頂宇夕照高低皆萬仞山石時露竅昏鴉無樹集占此社公廟原北色已暝原南赤如燒蹤疲思托宿地陷忽如窖明晨還屈指卅里路森峭夜半囈語多擔夫時競道與程吏部振甲話舊精廬百里走難停依舊山排屐齒青老眼讀碑猶似月故人堆鬢已多星揮毫尚記參旁午君久值機廷鑿險今看邁五丁君尊甫虛谷先生修箬嶺南北道幾及百里至今行人德之君又續修府城中道八門皆遍却喜過庭詩禮在半傳家法半傳經程君欵我于丹􅉌精舍前後凡五日醉後率成二律即贈令子待詔洪溥帶得天都夢來眠石室雲半庭花韻寂一谷草香薰李白金魚佩羊欣白練裙醉中揮墨懶且與話離羣山雲猶殢夢山溜已驚眠林果堆衾上秋蟲出枕邊宿酲吾尚病縱飮客疑仙問訊諸即好溪茶手自煎河西橋太白酒樓歌同汪孝亷燡及程待詔洪溥作春人不肻留春燕亦難駐秋風開簾帷微黃入山樹山葉欲落禽驚翔紅樓參差已夕陽一千年上事誰識樓上有客傾千觴新安茶多苦無酒何似山隂剡溪走仙人遊戲無定方飛去飛來亦何有我疑黃山六六古未開五字那不題元暉不然元暉去後公復來何以長句不賦空銜杯驚人句好公問天我轉欲問公從前惜哉仙人蹤迹不稍待只見樓外山色黯黯溪水鳴濺濺公前只有樓公後復有橋石橋千步樓百尺遠視城郭何迢迢白雲中間立少時適有遠札馳相思時得方明經如川札約遊巖寺同遊年少亦清絶瀟灑並若崔宗之君不見樓頭一派揚之水直下嚴灘復難待故人憶我我憶公雲自歸山水歸海烏聊山女墻沿山百千級客到女墻皆却立城南暝色似拒人一片昏鴉堞樓集山頺五石皆隕星宇處尚帶天光青山僧煮茗餉山客五客一人蹲一石山頭有落星石今裂為五太函山離居幾日無情緒雁尚未來春燕去城頭乾鵲時一雙咒得蘆花白如絮太函山人晝掩關五客偶復遊兹山丹􅉌南頭碧潭左一塔對窗如揖我傍溪菴西風泠泠響天關炊煙一城飛出山炊煙飛青水煙白襯得斜陽滿江赤新安古剎皆李唐此剎勢復凌層岡石崖中飛雲縷縷佛頂古苔堆寸許環峯閣雲光開處穿飛騎一嶺蓼花紅到地瓜花黃蔓復上天石屋踈踈集秋氣屏風一曲隱一牀窗扇重疊穿朝陽芙容花生溪水死一半遊鱗鏡中紫留别程吏部茶香清後酒魂蘇更對竒峯引百壺明日兩重山外路夢君先欲夢天都偶向新安踏市塵蕭然六合此間身煉丹池畔揮千紙赤鯉先驚化墨鱗贈沈教授成渭我愛沈夫子平生見地超鬢踈秋後葉筆徑午前潮地僻成雞市官間類馬曹醉談先世事七十恍垂髫贈莊司訓雋申我愛莊夫子中年薄宰官君大挑一等呈改教職芙容開晥晚苜蓿笑闌干世事心知熟羣經口誦完俸錢餘數百先約客晨餐出郭望天都峯三為歙嶺遊一詣天都頂天都頂上人今晨若居井蓮花何欎欎蓮蕊何迢迢蓮峯雖絶竒未與天爭高我雖憶天都天都不思我天風響空中青紅落雲朵昨登九子山正面天都峯濶别三十年舉手揖半空芒鞋久已穿遊客亦俱蛻謂壬辰歲同遊諸君我憶天都峯無心返吳會半道宿吳公壁危途怯宵征百步亦千折我攀飛鳥巢忽見孤僧室同儕亦驚喜天上一燈出寧知到天上石屋左右列酌我山腹泉心空水清徹重陽猶未屆霜露已成雪危梯延客卧膚凍慘欲裂濛濛衾枕膩嵐翠入窗密燒燈雖未燼辨色戒行疾出屋望始驚山禽挂枝歇道中偶得二絶句即寄洪溥并呈瑤田徵君煉丹池北小方亭無數山光入幕青嬴得閉門三日醉持螯左手不曽停易田三禮彛齋史更有魚門五七言怪底郎君家學好春華秋實萃篁墩徵君及文學敦編修晉芳皆篁墩支山中夜起山空羣動息木葉已先凋衆響從何至天風與蕩搖砌涼蟲語寂閣暗鼠聲囂夜半催人發新霜幕外飄霜降節在重陽日時甫月初五重陽日霜降白衣方送酒青女正飛霜聊記重陽節今年在下洋唐二軼華罷東流縣尉寓居皖口己二十年昨得問訊書作此奉答并勸歸里唐本名鵬後以字行昔年曽住屋西頭薄宦離家已卅秋彭蠡九江時北望廟溝一水尚南流君舊居也踏殘春草思前度數到晨星憶舊遊􅉌壠近聞荒翳甚待君歸更理枀楸見落葉有感年已迫遲草無復少壯時落葉既辭樹終難上故枝今年故枝衰明歲新枝好亦如人代謝子老孫復抱明年春異今年春老人衰遲喜抱孫花開千回落千遍孫復抱孫吾不見乘月行宣城道中葉葉隨風逐去程半空殘月出殘更秋林紅到傷心處先有曙鴉啼數聲李白西樓朓北樓南樓又占庾江州老夫才地雖然減也築危樓東海頭登北樓作卅載時牽夢今辰眺覽真頺然五蒼柏都似六朝人徑有元暉月樓無庾亮塵更應招白也同醉小陽春是日立冬夜泊小南湖小南湖畔路舟泊已初更四壁懸星影千灘出雁聲夢零前夜雨雲識哲朝睛魚鼓𫾣何急如從枕上鳴溧陽道中木橋分西南澗水四邊集人家臨澗好門外水聲急青山無半里朝爽近堪挹村翁無一事倚杖水邊立兒曹農事竟茅屋飭修葺禽鳥靜不譁深村啄餘粒滆湖夜望沿林風轉急紅葉裹歸僧隱隱青山隙迢迢露塔燈夜雲空際落殘魄望中升十月南湖涸魚龍氣尚蒸題畫留得春風自掩關三層閣上著書間只饒碧蘚無紅葉不使秋冬氣入山蠡河感舊挂席去無影夕陽空閉門重經昔時地頻斷昨宵魂檻折春禽占廊虛暗水吞尚餘煙柳在依約舊衫䀶乘月行攝山道中至朝陽門作水雲村樹共彎環樹裏人家未啓關正是四更殘月好騎驢行遍六朝山南岡北阜界初分遠憶茅濛蔣子文江左名山本無幾讓他一帝一真君過徐中山王墓道有感難從英辟共功名事過猶令野客驚彭越醢非三尺法謂藍玉傳友德等范增疽盡一杯羮中山病疽特賜鵝炙一臠食之乃卒龍蟠帝闕形仍壯燕啄王孫兆已成猶幸開平得前死不然險欲壞長城送孫大星衍仍兵􅊀山左葛仙祠畔早披襟在句容訂交不信居然草景侵兩世逮君皆皓首君祖母年近百齡尊甫年已七十五君須髮盡白又數年矣一生于我伴長吟知交出處關成數天地分明鑒寸心良史異時商合傳莫教廊廟愧山林采石重謁大白樓枯僧驚為起蓬關三十年前棹始還身後名輸一杯酒眼中人隔幾重山前與孫大同遊今孫大尚留滯吳門夢留蔥嶺煙雲外月挂蛾睂杳靄間公謫夜即余更遠得歸公亦代開顔然犀亭懷古過江名士竟誰優到死猶爭第一流倘遇可兒先拔舌早逢英物一開眸孤亭正對天門峙百怪將從地府搜却憶登壇誓師日義旗幾欲指荆州一事傷心説倚閭求忠于孝果非虛勤王縱使能投袂將母何因便絶裾休更火犀然穴鼠也應風樹泣臯魚留賓截髮兒能報羡殺陶家奉板輿涇縣黃田訪朱吉士珔因留宿培風閣即席賦贈并寄哲昆觀察理閩中君家門前溪水足大石寬于百間屋到來三折山已深鎖徑一橋環碧玉四山蒼蒼合一澗澗水時聞不曽見青松點入紅葉灘時有水雲飛片片溪風蕭瑟溪雨涼鸕鷀直來問字堂縹緗堆架一何滿山鵲亦聽書聲忙樓頭讀書日幾回樓上客兩官蓬萊西園子弟盡才俊作賦險欲追鄒枚一更月出斷崖口却對好山為置酒醉向培風閣上眠窗踈不礙看星斗談深復憶神仙侶槖筆乍完仍叱馭溪山如此不歸來却復看山厦門去列岫軒久憩峯巒三面峻都抱讀書堂半夜吟聲苦層霄月影涼偶懸徐稚榻真認鄭公鄉他日來相訪門前荷芰香二十二日夜雨曉起見山頂皆白蓋天氣嚴寒山半以上均已作雪也喜而有作飛雪不到地祇積髙髙峯髙處亦不停旋轉西北風稜稜夜半風尤猛東嶺雪仍移北嶺樓頭一白直接天樓上客真同坐井清寒入骨難久留北風吹人下小樓衝寒簾下一杯酒酒色絶似清江流曉風初收晚鐘動山骨吟肩疊髙聳圍爐倚酒欲作書飛白先驚入窗孔復憩松竹塢即贈陳孝亷寶泉松竹軒中説授經授經人已久知名詩傳一一鶴聲峭考比非非國語精墨鯉鏡中浮浪起蒼龍天半怒濤生闌干月上應無事更掃書堂鬥酒兵莫愁湖久憩并謁徐中山王畫象結綺臨春事久非湖北即清涼山臨春結綺舊址在焉隔坡樓殿尚依稀到來海燕樓襌幄運去山龍暗衮衣空館尚餘調鶴地真王徒剩釣魚磯今湖尚屬中山子孫收稅惟應兒女英雄淚灑向秋空作雨飛感賦年來里中同歲者相繼物故近聞劉舍人召揚亦殁于山左亦同歲之一也感而賦此流光到眼若飛塵零落知交倍愴神鄉曲苦無同歲友名場嗤作過時人酬知事每失交臂傳世書仍欠等身只有壯遊聊自慰記經星海陟昆侖偶書示友習尚多年即一更後生原不及先生好名亦是文人事不近情人不近名楊大令倫劉舍人召揚歸櫬尚未扺里復追悼一首一作郎官一省曹五旬年命不堅牢管寧死後無龍尾謝守生前有鳯毛君為劉文定少子學博可曽編説苑愁多先已反離騷殘秋旅櫬仍難返望斷清江緑半篙天王堂謠堂在城東太平與國寺天王堂中屋不修雨腳總打天王頭耳中穴鼠雀啄眸力士杵亦隨波流欲修天王堂泥閉天王目一臂天王已先剝臂落金剛復傷足擡天王出募錢募錢疏挂天王肩募錢縱多僧醉飽却任天王坐旁倒以長至日太和殿早朝詩課院中諸生亦敬賦一首鴛瓦千行瑞雪消火城三靣集金貂記曽采服趨中禁特荷殊恩拜內朝至日皇上或不御殿則百官朝服列班午門外行禮惟值內廷諸臣準采服拜乾清門階下萬里烽煙清禹甸丙辰丁巳長至日皆得西南捷音九天音樂奏虞韶觚稜回首真如夢獨向江村聽麗譙萬卷歸裝圖為孫大賦每耻前人我不如年來妄念始消除笑君積習偏難盡尚喜人間未見書君正褰帷我荷戈買書錢已苦無多丹黃别有三千卷或可釐君校本訛月午樓歌仙人好居樓樓築青山頭樓居又比山居好八牖居然拓天表山樓明月不待宵海上月出光先搖讀書聲髙月亦髙月午尚覺書聲飄前黃髙峯後箬嶺書聲飄壓四山頂松梢夜半老寉醒寉唳亦比書聲清樓頭寉影兼人影樓外雲鋪百餘頃仙人世外無書看聽書日日來簷端月亦不得落書亦不得完君不見紅闌干前白玉盤讀倦且把明霞餐受業崔辛化校字
