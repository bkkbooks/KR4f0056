body:
  text: 陽湖洪亮吉著關嶺衝寒集八月十五夜蠻方今夜月兒女集樽前迢遞思鄕國􅇛欒敞客筵塔光雲外隱菱角雨中牽不寐緣何事相將話昔年十六夜雨䦨干沉不見都在雨聲中細霧吞簾白􅀌花隱幔紅半街籠畫燭一笛引涼風正好臨流坐寥寥爽氣通秋日登城南甲秀樓訪鄂文端公紀功鐵柱層樓設重扃事罕與俗接芳洲歴春夏送客偶陟躐節序􅁣巳移青林半黃葉􅀟橋通梵刹三面俯城堞攝􅂂偶上征褰裳畏深渉豐功緬疇曩徃事稽故牒銷金清四野立石表三捷勲名旣鷹揚文史復漁獵丹方初奠定黃閣藉調燮俯仰跡巳陳苗蠻志猶懾叢祠扉乍展荒徑露還浥詎止􅄃勝心􅀌懐濟時業九日偕富尚書綱馮侍郞光熊重至甲秀樓登高菊巳衰黃柳尚青更尋芳杜出前汀殊方再値重陽日候館欣聨五使星是日送黔􅋄兩主司北上諸􅁑廟旁開石舫伏波灘畔訪金銘惟公志業差無愧十五年來邊徼寧富節制滇黔巳十五年徐太守日紀餉菊數十盆因結作花龕并邀同人共賞卽席賦謝太守十日苦雨三日晴秋老巳覺無歡情打門有客送花至一笑紅紫紛相迎來鴻去燕無消息剰得山雛日啁嘖攤書堂北日猶長人與花枝共高格衝寒花性昔所諳斗室合作藏花龕重重簾幕夜難放勾取殘月來花南秋堂夢好偏能醒看足花䰟抱花影寥寥風味許誰參不稱醇醪稱清茗醒時看花倦卽眠人意花意交相憐君不見紅塵十丈官道邊誰有清福來花前沈太守丙招集寓齋賞菊三間古屋如浮槎静掃四壁懸秋花扃門不出究何事却與此花商位置篔簹三寸截作瓶刳腹滿貯寒泉清高􅊠花色誰能省恍􅀂銀河瀉星影一花前頭酒一盃客􅀂不飮花徘􅆦酒傾十斛花千朶醉倒倩花扶客坐三更以後客較狂月影花影催浮觴君不見花前五客皆濡首花意未知嫌客否從花乞假亦可憐明日閉門須病酒嘉杜軒公讌嘉杜軒初搆今看一再來霰從雲外落花向雨中開夜已侵三漏狂猶酹百杯主人留客摯籠鳥亦徘􅆦馮刺史克鞏招集七研齋窗前葉葉芭蕉雨坐上沈沈簫管聲不是主人情較重醉眠誰遣到三更入坐先敎飮百壺簾鉤影裏燭花粗狂來合被時苗罵蒋濟頭銜是酒徒題篇已擅沈休文頌酒仍須劉伯倫謂坐中沈太守丙劉太守雁題明日馬頭西北去醉顔還剰十分春自新鋪至永寧馬上尤愁撲面風坡陀百折誤西東初晴也識朝陽淡添得千堆野火紅山南山北路嶙峋只隔蘆花便絕塵削壁四圍溪半折野鷹盤處定無人安南扺安姑作幾日西風撲面吹􅄥􅄥尙有柳絲垂鳩方逐婦天偏霽馬到安姑路轉危渇思乍拈籬畔橘閑心還讀道旁碑山程紅燭誰相迓􅁍喜前邨月半規將扺南籠道中作羊場驛外千山􅅍一郡如巢􅋓天半藍輿百折入郭門細水中分兩峯斷高􅊠半日坡難上斜處􅁍留行客館尤愁馬瘦蹄應碎不覺役疲肩屢換居然一巷深如井對面樓臺􅀂居岸如龍松柏競瞰城幸有女墻高處判巳看日没繁星景難得雪天揮雨汗􅀟旌早駐前山麓一屋尤爲衆峯冠排衙􅂊了且賦詩百尺龍山作吟案南籠試院卽事衙齋高處逼浮屠天半樓臺落日􅀌雲氣大都紅似火居人多半黑于烏城隅尙隔三層嶺樹杪驚看四出途也識􅅮㺜饒瘴厲怕從􅀡北展輿圖十八先生墓按南籠府志明桂王由榔自廣西至貴州孫可望處之安籠所四年無人臣禮從臣呉貞毓張􅒢周􅁢吉楊忠徐極蔣乾昌李元開李頎朱議㞙鄭􅁢元趙賡禹蔡縯易士佳胡士瑞朱東旦任斗墟等憤甚與内侍張福祿全爲國謀遣之滇南諭李定國共圗可望事􅂥皆爲可望所害時人哀之収遺骸葬于城外西山之麓題云明十八先生成仁處自是桂王復入于滇蓋國朝順治五年事也七千里路接蠻鄕十八先生併命場絕勝瀛洲唐學士就中寧有許高陽黔中樂府十二首賽神謡山腰十數家屈指無百人樹頭營危巢云以祀土神前門飄風後門􅀨偪仄半間神乏侣村女􅂊燒一辦香社公腹内秋蛇語打虎謡斑斑猛虎文彎彎水牛角牧童􅀐牛來乘便虎欲撲虎凴爪鋭牛角尖兩兩轉鬥來山巖腥風沾林血粘草虎卧病創倀出禱起龍謡黔中怪底淫霖注石腹龍藏不知數閒來龍穴看起龍頭大如瓮聲疑鐘晴天亦覺風雷湧百步龍堂陷如冡排林牧馬􅇀不収日盻生駒得龍種網魚謡上山忙下山緩花深深波滿滿踏波不須郎儂衣正將浣腰肢不怕春波濕村樹陰邊裏衣脫沿回半晌卽出波八幅裙拖鯉魚出漏天謡東黃平西普定十驛雨中行不竟有時雲際露日光萬戸争曝泥衣裳蠻山萬叠愁霖透不說天荒說天漏老翁自詫八十年生日未逢晴正晝跳月謡一年中好時節前中秋後元夕錦袜碧當胸羅裙紅染血蘆笙吹徹人欲還眼波一瞥郞上山上山亦識儂心切天際黑雲來􅇁月摘蔬謡厨中苦無鹽盤内久無肉幸喜一方田青青菜畦足山家食料常如此􅀲蒂深黃茄色紫筠藍挑滿手暫停牽得樹梢紅柿子采茶謡今晨儂獨來昨􅇀歡未遇製得憶歡歌沿山采茶去春慵不嫌歸路遲茶藍枕首眠少時村花滿頭紅未放胡蝶一􅀟釘頰上宴客謡男行欲成婚女行欲出嫁􅇛􅇛茅柴筵􅂊把生客迓石臺却有八尺長東西南北羅酒漿座旁誰牽牛一隻黃犢離村亦爲客嫁女謡十五愁嫁遲十三欣嫁早嫁女雖十三偏愁歡已老山羊十角米百擡嫁女不惜傾家財歡來牽儂儂不宿却抱黃羊水邊哭織錦謠阿娘理紅絲阿妹理彩綫竹閣止一間織絲看四面眼波時向郞邊瞥十指纎纎化工出春禽怪㡳齊上樓織得一堤花欲活曳纜謠上官來役夫走百板􅀟繩齊在手上山居前下山後排頭雨汗揮不停􅁂上都插山花馨生苗出語眞無緒官好牽他上天去自南籠至新城道中病酒一程􅂊了日平西遠近岡巒望欲迷渇馬縱蹄尋野水閒禽展翅曝山泥節臨長至猶餘燠天入南荒漸覺􅊠慙愧故人知病酒滿籃黃橘早封題新城行館獨坐獨坐竹軒内泠泠夜欲分半窗斜入月空徑静生雲病酒宵餐減抛書吏牘勤同儕知欲至隱隠馬嘶聞小病小病初除偶自思料應不及少年時酒能忤客先宜減墨欲磨人漸不支婦􅄙藥方參服食兒通􅃟學付鈔詩君親一例酬難盡閑處齋心懔四知三昧塘道中一帶坡隨馬首東記程今夜宿波中敲殘石虎尋雲母見慣山羊􅀋雨工傍屋種松憐地窄冠厓營閣與天通寥寥橘柚今餘幾留伴楓林鬥晩紅自高伍塘至安姑宿高伍塘邊渡􅂩河緩程不覺夕陽過人疑夸父西追日路識安姑北下坡白首僧從初地出茜裙苗憶仲家多桑間三宿眞成戀況復頻聞子夜歌自安姑扺安南道中界首塘東路復彎情懐眞耐雨闌珊無魚偶作經旬客多虎全荒一縣山捲地黑風迷鬼箐排天紅葉出禪關安南令尹驚相訊走馬來偏走馬還余徃還此縣皆􅀐馬以避三旺坡老鴉關諸險范公子學敏讀書倉􅅟索題伏波能聚米上蔡亦監倉移作攤書地眞成避客方水泉朝瀹茗石鼎夜焚香落月諸峯好玲瓏影上床自保甸塘望盤江對岸諸山半日行尚未到感而有作半程誰識路途修百折巖􅉾尚未休只有鳥飛偏逕􅀡徃來曾不礙雲頭侵曉渡關嶺之字山程卍字樓昨宵剛値月當頭一聲雞唱出門去小市夜燈猶未収松櫟爲扉石作壇罡風吹袖覺衣單相看即是青天上莫更頻歌蜀道難去歲三月自安順按試南籠道過安莊花事甚盛今復經此則秋林盡搖落矣感而賦此安莊汛北路頻叉使節重來感歲華依舊野羊眠道左半林紅葉替春花歲􅇀懐人二十四首袁大令枚清福能消四十年老來仍作地行仙居然手筆空千古隨分頭銜寫一編公頭銜或書庶吉士或書江南知縣或書陜西候補知縣不拘一例名士竟須依作主美人聞已放歸禪存亡舊例都參破生輓詩鈔萬口傳錢少詹大昕燕呉楚越路偏長君官京師余在里中及君服闋友人延修浙中志余亦自楚中歸甫得相見十載􅂊申一瓣香絶業竟傳齊稷下此翁何似魯靈光竒搜秦漢碑無缺例校金元史獨詳我亦誼應參北面淵源寧止丈人行畢尚書師時緣事降撫山東全湖南北節初移聖主優容俾近畿五斗未能除薄俗兩旬聞已昧先幾右才毎搆千間厦左宦仍披一品衣山東巡撫兼提督銜此日汲公難卧治九州分半入封圻山東一省全得青兖二州境其迤北迤南及迤東諸處又兼有幽豫徐三州地也錢通判維喬相識寧論行輩先爾來久已訂忘年早傳吏績人呼佛晩避詩魔自學仙百種盡除留畫癖幾時重與枕書眠勸君歸後余􅂊宦面目多應愧此賢王侍郎昶聞聲卅載苦相思􅀌露同看母作師猨寉從軍憐早歲蓴鱸歸計惜衰遲眼前事業千頭橘身後才名萬首詩一卷苦争君記否三條官燭校文時盧學士文弨文格蓬萊賦紫微罷官依舊苦長饑六經校後眞無誤七十行來尚􅀂飛雅苦俗儒嗤狗曲閒謀􅂩地築漁磯草元亭在雲溪上除却侯芭問字稀君自言主講常州三年能請益者惟臧鏞堂一人邵侍讀晉涵苦憶餘姚卲夫子授徒却待勘經回君兼百經國史二館下􅀡卽復授徒殊師肯啖公羊餅君擅榖梁學絕業誰營爾雅臺憶共五陘連榻住也同六郡校文來謂在朱笥河先生安徽學使署青山回首應惆悵斷送高張幾許才謂同幕高東井張方海黄仲則諸人屠刺史紳案牘如山目已迷趁閒偏欲逞篇題縱官刺史無千石却學君卿有十妻好友總抛蠻嶂外全家憶住小湖西所居名西小湖何時共泛南歸棹卧聽溪禽自在啼李太守廷敬五載欣看厯四州清郞出守􅇰風流曾登祕省稱前輩重到蘇臺感舊遊愛客自拈金縷曲迎人多上木蘭舟呉閶風月梁溪酒可憶人居天盡頭法祭酒式善翰林詩格冠詞場屢改頭銜作漫郞左手書應成絕技苦心詩已入中唐兩番胄監遷官速百本名經􅃟佛忙君時選同館課藝我愧枚公賦情拙莫將疎陋玷班揚管侍御世銘積歲機庭苦未閒昨觀除目與開顔青驄早避鮑司隸溫樹難言孔博山作賦卄年推老宿爲郞十載冠清班也應寫􅀉争臣論好待昌􅀺出使還趙舎人懐玉并酬入􅀡見懐之作舍人入􅀡題牋日驄馬南行按部時明設提學御史今尚沿稱學院却憶紫微􅆹北路聊吟紅杏驛中詩鄕園漸喜田除稅余有田二頃入京後皆爲主者贖去聞君年來亦割田償債故云兄弟都驚􅁂有絲遮莫善愁兼善病得閒須復强支持王學博吉士誰是南宗與北宗阿兄城北弟城東穿籬却有三間舫人市頻驅五尺童産破中人憐沈駱宰迎上客說孫洪痩羊博士今何處薄宦聊應似轉蓬君尚未補缺惟東西署事楊大令倫及令弟煒迎春橋北放生池猶憶平生訪舊時門巷一􅀟前進士家風五葉老經師藏花席上看君醉君拙于酒令問字堂邊待我遲同在龍城書院肄業羯末封胡俱下世謂大令煒伯兄簡及仲弟煓從弟煐諸人不愁君不鬢添絲汪明經中不敢隨車試大廷頭銜眞許號明經人言蠭目同荆尹自詡龍頭壓管寧喜讀梵書排釋氏慣餐劣藥兾修齡狂來更頌東陵跖君有狐父之盗頌一篇手劈蠻牋寫作屏陳軍門大用識字何須五石弓昇平儒將􅇰謙沖争看隨陸司兵籍無復伊涼唱土風江國別來饒艶句海氛清後寡奇功軍門只在千花内好買鱸魚鬥酒筒汪助敎端先卅載閒情不自持蕭疎今已􅁂添絲􅂊看薄宦拘平子多分揚州誤牧之我欲共參山水月人傳三絶畫書詩年來苦憶梅花館開徧南枝到北枝孫比部星衍早入承明侍從廬爲郞莫更嘆紆徐經時偶斷船官獄何日同乘使者車郭芍藥詩成本事鄭櫻桃室作安居奇寒可憶茅山夜兩客同驅一蹇驢張檢討問陶西蜀奇人作冷官青氊猶剰十分寒何妨日住蓬萊頂不改常餐苜蓿盤子美數間吟舎窄淳于一石酒膓寛金􅁫典盡睂常歛欲畵仍須拂鏡看君篤于伉儷呂學博星垣卅載詞場志已􅁅狂名猶被世人推好奇欲破古今格傲俗肯交中下才不覺一官餐苜蓿依然十幅寫玫瑰年年避債君尤窘曾與同登百尺臺己酉年除夕君避債城東曬經臺余訪君劇談竟日王孝廉􅉮孫人言風貎太酸寒那識詞源萬斛寛呉下早聞呼短李禁中久已識詩韓傳經帳後縑雙叠君以賣文爲活寫韻軒前墨數丸誰似阿儂夫婦好賣琴錢少減晨餐揚州守芳燦曁令弟觀察揆家山百里望堪通君住溪西我水東兄弟才名吳二陸宦途階級漢諸馮射羌身手知還健君前守伏羌城射殺一番回入蜀詩篇詡􅇰工我在黔中七千里寄書應趁石尤風左大令輔當時踪跡􅇰清閒繞屋梅花自掩關千首早摹梅處士一官今傍謝家山緣知小弟才尤捷可識衰宗客未還謂黃仲則子時在廣東余屬至君署中讀書應舉膓斷卄三年上事黄公壚在白雲灣莊公子逵吉兩載何因􅆡故鄣一鞭聞已入咸陽多金結客家頻破廣柳蔵人事已忘狂甚竟聞呼彦國貧來先欲弃姬姜何時磈壘澆應盡與築糟邱醉百􅂣續懐人詩十二首紀尚書昀子雲筆札君卿舌當代無人可並論􅀡閣新銜同掌院文淵閣開先生首兼􅀡閣事曲臺故事號專門研心十載讎皇覽快意千篇續瑣言謂近所著說部五六種只我􅇰饒知巳感下春官第枉高軒先生主甲辰㑹試余試卷􅇰爲所賞欲首擢之爲監試御史所阻而止于卷未題惜春詞六首有云萬紫千紅號花海冠春畢竟讓槐黃徹􅁄後又枉道過訪江布衣聲家傍要離尺五墳布衣七十甫名聞因題刺字摹秦􅂐君生平未嘗作楷書卽題刺亦皆篆字爲愛尚書詈古文生世未嘗知鮑謝學徒差喜得芭棻君自少至老從未有授館者近忽有市賈延君敎子執禮甚㳟亦竒人也閱音亭長今同調謂錢州判坫一様嶔㟢不入羣家編修梧機庭綸閣兼詞館十載勤趨朶殿東家世我慚稱大阮制科人巳比三洪君兄弟三人皆以召試得中書人比之鄱陽三洪云全抛舊業因廉史君伯兄樸出守順德清節絶人家以此中落合譜新詞􅀉阿翁君尊人塡詞􅇰工兩樹櫻桃一樽酒風懐閒日與誰同管漕督幹珍早歲清名滿石渠東南久巳駐軺車君巡江南漕至三任數程不異官鄕郡十省今看領國儲嚴檄早清飛輓路閒心時復故入書堂開依舊塵凝坐爲有耽吟習未除方上舎正澍家本新安客上元半生知巳得隨園工愁五十偏無恙避俗三旬竟不言手筆捷如錐脫穎肩輿行比鶴乘軒梅花百本扃門住尚厭朝來鳥雀喧徐太守大榕曁從弟縣丞書受二十年前􅆻􅇰深鳴珂南巷酒時斟阿兄作吏能强項小弟裁詩學嘔心七子才名虛擬議一家官爵竟升沉篝燈倘憶初逢處只惜秦州宰木森余初識縣丞時方從董州守熙讀書今州守聞巳下世唐少府軼華中河橋左廟溝西老屋三間戸􅇰低蠟􅄚毎思穿巷過粉書時復到門題卑官巳屈陶彭澤侫佛何如孟㑹稽一事至今忘未了謝家園裏有鶯啼園在君宅後章進士學誠鼻窒居然耳復聾頭銜應署老龍鍾未妨障麓留錢癖竟欲持刀扺舌􅄡君與汪明經中議論不合幾至揮刃獨識毎欽王仲任多容頗詈郭林宗安昌門下三年住一事何嘗肯曲從君性剛鯁居梁文定相公寓邸三年􅇰爲相公所嚴憚蔣少府廷耀曁令弟上舍馨君增十歲稱齋長我後三人作學徒外家兄弟五人余齒居第四逃塾早曾窺睥睨背燈時欲學吚唔樓扉敞覺書聲脆紙仿描驚字跡粗重向講堂尋舊事桂花零落杏株枯莊縣丞寳書夢來阿㜷竟無徵從母生君時有夢兆五十驚看白髪増詩社早參三健守君詩集中與蔣太守熊昌徐太守大榕及從子通守炘唱和􅇰多通守時攝興安府事書名誰似兩聾丞君書法與蒋縣丞齊耀並名回車尚憶南皮飮丁未夏訪君河問客邸歸艇同尋北寺燈指庚戌年元夕荒徧外家㕔畔路竹梯邪斷杳難登馮戸部敏昌早向長安鬥酒盃之秦之楚屢追陪一官止抵傳經席五嶽都成避債臺君以避債岀都遂徧遊五嶽此日􅇰推長句好名山曾歩後塵來己酉春余北上枉道遊王屋時君甫出山數日耳青松兩樹花千本頓使先生笑口開在都日屢同詣法源寺看花姜廉使開陽憶自蠻鄕入帝都舊營池館日荒蕪三層閣上簾虛掩萬里橋邊水亦枯臬署有萬里橋搜篋雅知亷吏窘時甫謀捐復道員持杯誰念酒人􅀌何戡早逐西飛雁謂君所善歌者喜兒爲問先生記得無福公相康安自全蜀移節滇黔近聞巳扺威寧寄呈四首烏撒山川界蜀滇遠勞上相復行邊拜公鄧禹年三八鑿空張騫路萬千左道更須嚴折石偏鑪誰敢鑄浮錢時辨理大寧邪敎兼清􅁵錢法旁人莫羨頭仍黑國事辛勤巳久肩束髪争傳命世才相門出相著風裁何妨早日登三省巳覺奇勲塞八垓兩度廣陽看飮至頻從絕域受降回朱轓玉節雍容甚分野星明接上台昨傳使節入秦關威望先馳壓百蠻三萬里踰星宿海八千人上賀蘭山偏裨盡注通侯籍掌記猶分侍從班方太常惟甸楊侍讀揆近日皆曾隨幕府􅁍笑燕然地猶近竇公容易勒銘還外臺何幸接班聨溫語頻番荷報牋一刺記投通德里庚戌夏公自兩廣率安南國王入覲余時新入館會謁公里第十年乆領大羅天欣陪節􅃏來荒徼敢向蓬瀛說散仙幾度自慙文思拙欲將􅆪筆頌凌烟安平行館見梅輕裘覺暖寒猶淺峻嶺初平路轉叉獨坐小窗斜日裏膽瓶風拆一枝花衙齋十詠貴州學使公􅅟􅇰湫隘乾隆癸巳今大學士孫公士毅視學此方始于其後積土爲堂名曰近山然屋止三楹不足以資燕息余扺任後復于堂西􅂩地築屋十數楹或高而爲臺或曲而爲塢或因樹搆屋或臨溪製軒賓僚觴詠之暇昕夕讀書恒于此焉開歲將報滿入都爰分詠十截句以貽後之來者云官􅅟各占山貴州官􅅟自巡撫以下各占一山惟學使署在平地此但與山近􅇰喜開北軒寥寥發松韻堂後與東山咫尺右近山堂獨坐思話軒􅀌吟悵無侶幸有黃栗留時來伴人語右思話軒筑中山􅇰高況復據山頂披香夜半開東西眺星景右千葉蓮臺春來樓檻外百卉盡抒紅欲別風花味香生苐幾叢右紅香館屋仿江南船聊住江南客所苦一百旬􅀌篷雨如織右聽雨篷日坐此閣中著書愁未了窗櫺三面陰綠徧卷施草右卷施閣蠻中金粟花三歲偶開一方牀夢醒時婆娑滿窗月右金粟山房惡木旣巳鋤篔簹植千个只有問字人時穿竹中過右修竹廊無日不讀書無日不晨起闢牖看啟明濛􅄥鵲聲喜右曉讀書齋天無一日晴地覺四時暖持此養寸心滃然春氣滿右藏春塢
