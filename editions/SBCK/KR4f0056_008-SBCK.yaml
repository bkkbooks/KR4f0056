front:
  text: 更生齋詩卷第八
  hash: sha256:539eecd53a8ed541300e72b95865f03af185977cad9d636e8436aff60858c7db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_008-1a}
body:
  text: 陽湖􅇝亮吉著北郊種􅀣集讀史六十四首大九州藏小九州大瀛海外水仍流九州各有開天聖迭拄乾坤到盡頭啾啾喞喞四邊鳴造字臺邊夜哭聲足見一篇無鬼論便從上古已難行一粟先㸔世界浮女媧搏土不曽休自從未有人行日玉兎金烏已出頭魯陽戈已嫌多事第一尤憎后羿弓正要不分昬與旦懸他十日照寰中棋家國手說秋儲此局開從􅁢子朱破盡工夫究何用笑他一著竸嬴輸何須刻意别靈頑物物同生宇宙間各有出奇争勝處翼塡東海擘開山蠶食何堪四面來陽人負黍踵難囘周家八百年天下末路惟餘避債臺曉􅄿牲牢夜擊鮮華堂養士各三千何如五百田横客蹈海都同魯仲連督亢先㸔具地圖樊于期忽仰天呼燕齊海上多奇士狗盗要難及狗屠一椎一筑一匕首三客果誰能策勲滄海君來亦無用先知獨讓滈池君開國先愁乏遠圖西都習尙逮東都漢家一代崇虛誕黄石兵書赤伏符緣知隆凖是眞龍白帝先愁試劍鋒功狗已烹高鳥盡祇㽞一雉雊深宮萬卷先從客舍儲􅁧成八覽紀乘除笑他只善居奇貨也學虞􅀸強著書漢家中葉慶連綿元狩元封國􅍈延天上歳星來執㦸如何天子不長年前殿危言批逆鱗後宮㤙重亦忘身朱雲折檻熊攀檻越顯名臣與美人蘭茝招魂些續歌椘天萬里不生波願將魚腹詞人弔文考湘江屈汨羅宣元以後治優柔況復專朝有五侯正與商君法相反虱官不去鼠姦㽞客未登車主候門世家家法已無存史臣倘爲宣尼諱十四􅀓中削此孫烈士傷心古道旁一生曽未値孫陽􅁍看老驥還千里正負鹽車上太行法堯禪舜亦家風二十韶年作上公不見露臺曽惜費偏能全賜蜀山銅著書空費萬黄金剽竊根源尙可尋呂覽淮南盡如此両家賓客太欺心並世才能識魏公死猶両女嫁英雄炙雞斗酒無多費我欲時時酹冢中大將王常太尉牟嗇夫游徼盡通侯東京人物寥寥甚卓茂居然冠輩流同時北海出儒宗邴管仍堪合作龍畢竟漢朝經學貴黃巾争拜鄭司農祖尙元虚自晉賢黃初人物已開先漢家盛日尊黃老不習南華內外篇霸業王基並有因轉嫌封拜不酬勳虞侯賜劍燕王刎恐負難兄付託殷謂孫大帝宋太宗東京文格本來卑一字無慚語亦欺不被古人瞞到底曹娥碑與郭君碑多金贖女出匃奴友誼曹瞞絶世無愧煞君家五官將刀頭難赦仲宣􅀌聖證篇成漢學亡六書訓詁孰推詳一編難與專門較杜預春秋􅇞榖梁家世何應出阿戎􅄝錢鑽核作門風葫蘆麈尾皆長柄莫哂南朝王侍中絃歌小邑􅆟風流一令寧輸督八州強使名賢附華胄泉明地下亦包羞江東王氣總綿延晋宋梁陳代屡遷只有蔣山惟一帝居然香火占千年白雀空矜一世才新支堡下忽徘囘死胡尙嚙生天子何怪堅頭入夢來漁人何事舌偏饒厯数炎精迄本朝從此桃源不淳古并知劉石與苻姚虚無上八洞眞僊稗史新􅀓委宛編不信堯時白蝙蝠能知混沌與開天已見苻堅過項城八公寉唳與風聲淮南雞犬都仙去尙剩沿山草木兵妄思成佛反遭魔厯劫應知負債多何必贖身同泰寺累他臨殁喚荷荷武都山接谷軒轅百頃仇池富水源不是氐羌來據險人間此亦種桃園蕭曹丙魏冠西京房杜淪亡姚宋生只有漢唐人物好中興開國盡名􅀸三峯髙接華山巓下視蒼茫幾􅀧煙不是謫仙人在世好詩誰敢問靑天胡雛相異兆生時鐵額銅頭并䕶持制得豬婆龍死命僅須一箇李豬兒中唐風節數韓公詎止文章一代雄異􅀋強藩盡􅊠首王庭湊與鰐魚同總是滄桒劫裏來唐除丑口呂書囘何應一落金門第不作仙人卽盗魁萬羊太尉李文饒食料誰知命所招日啖半升原作相何需八百石胡椒轉覺雙鬟有定評旗亭聲價一時傾怪他九級慈恩塔徧檢都無李杜名絶代才人韓􅆀光百篇詩句一奩香虎須捋罷吟幺鳳鐵是心肝錦作腸􅄒怪稽神作語林誰知劫數已相尋冠貂衣紫人如豆簁下南朝徐楚金年名五代不多時七姓官家盡健兒辛苦九朝長樂老朝秦􅇀楚費支持魯論半部篋中藏垂老應知亦健忘怪㡳一朝多語錄用他學究佐興王香孩兒事􅆟堪疑􅌍迹思將一代欺身上黃袍袖中稿製成恐不是臨期百事都嫌強出頭扶乩壇上亦來遊神仙何苦名心重處處題詩向酒樓詩案曽留御史䑓憸人亦轉歎奇才雄文􅁍要蛟龍助不枉先生過海來尙書别有古文􅀓西蜀才人著太􅏏􅆫聖亦同非聖例楊雄梅􅞾趙師淵今所􅀓通鑑綱目實朱子門人趙師淵所作􅀭以太􅏏擬易趙以綱目擬春秋與梅賾􅁧僞古文尙書其罪一也一成一旅總堪憑萬頃􅇝濤一葉淩不據西湖據東海趙家端可號中興儒林道學本同原分􅀓翻嫌史例繁只我欲書三獨行石工軍校鄭監門石工安民殿前軍校施全監安上門鄭俠萬乘曽爲􅀌注來惹他䜛口一時開契丹西夏非強敵祇􅁴中原乏將才七尺終當死報君黄冠南下属􅀓聞一編琬名臣錄都譲王家生祭文戴主㤙如戴昊天投荒百日準歸田家風尙愧鄱陽集雪窖冰天十五年詩情畫筆號專門三絶雖兼格不尊說到彦囘先齒冷更誰人數趙王孫讀史常侵夜漏餘時時一夢到華胥可知不在靑天外竟欲乘風去􅁲居都似空中飛鳥過強分名目費編摩試將列􅀓平心看一代􅀓人本不多千日中山醖已嘗便須一鍤冡中藏伯倫死酒非眞死想要逃名入醉鄕飮啄何須更好名修眞先要近人情烹龍炰鳳瑶池讌誰說仙家不殺生晉代旌陽唐李筌是誰人已得眞詮近來老輩神仙少數到元時白玉蟾寓興一身從何來父母之所􅂌旣須建修名亦以綿世繫受全歸亦全所係實非細瞢然魂魄化仍與親附麗一一返厥原同歸天與地形骸旣􅄩化齒骨朽亦易留貽世間者不滅惟此氣古人善讀書書亦本來少經年可卒業不必徹昬曉沉酣六經外袐籍偶􅊧討方書亦無幾素問及本草百二十國書一一名作寶少􅂊能肆力多卽難見巧陳編逮今日富至不勝考所以無用書空資蠧魚飽天地雖至大物力本不多惟兹樽節心爲能養天和日食數萬錢遠聞王與何飛走不得逃高下設網羅曽誇鼈重裙兼詡四足鵝風俗近益奢背峯炙明駝俊味罔不登􅊧及燕雀窠末流心竊憂詎敢揚厥波非有求福心又豈懼譴訶甘受鄙吝名不敢知其佗學術本一途後乃判釋道魏収􅆟無識作史列三教三教中復分十百富名號争奇仍鬥㨗一一欲建效遂令淸浄域無事亦争剽民生半無業物力因已秏合一縱甚難何不各守要兼収更非計分路或同到惟求心所安誓不惑果報新進喜事人不可位相將持其一偏見遑復計得喪紛然變成法畢竟無一當古來大聖人貴􅄒不貴創周官不善讀邪說復首唱靑苗市易行天地爲播盪巴東亦不免時露好事狀偉哉無口瓢此乃眞宰相側聞飛仙人上者居列洞騎龍跨鳳外頑石亦能控游行一世間風伯自迎送怡神雖足樂于世究無用況經年五百劫數亦殊重我意不謂然隃糜復時弄空言如有裨後世亦諷誦無爲守丹竈寧可抱酒瓮化人王無功日昨屢入夢沉冥雖巳乆顔色益飛動醉鄕苦無書爲寫酒德頌家儲萬黃金或者有憂色行乞得數錢陶然樂昕夕賤者未必非貴者未必得置身豐歉外庶不爲物役鍾乳一千両胡椒八百石縱如彭祖壽亦恐難畢食徒然使後來笑聲千載劇少歲盛意氣不願爲詞人垂老筋骨衰勤力始作文投荒昨歸田松菊僅有存親亾逮卅年兼復鮮弟昆偕老願亦違骨􅁏滿墓門尙幸一室中不乏子與孫乆客偶一歸㫖酒又巳温僕婢立我前勸我盡一樽慰勞固多方嚬笑恐未眞欲營山水區庻畢勞瘁身持此一寸心不死期報恩北轅窮大宛西轡隃棧閣􅇝河狎蛟蜃滄溟截鯨鰐囘思至危境亦卽寓至樂豈惟豁雙眸胷次亦已拓丈夫處閭巷百事苦束縛終年心賞處僅止一邱壑􅊠瞻慙赤鯉髙視愧元鶴寧知轆轤屩天外亦飛落平生無别􅄝有景必􅊧索生當恣游覽死卽安冥漠一世誰􅆟愚南山石成槨束髪事結交良友堪悉數文章與談讌各有投合處立身復不同分道各馳騖揚雄性沉黙逡秀欣世務君看華與管始合分末路彼此不必非邪正性所賦卽如同學者意見亦参互王何標理解張趙崇􅀓注璣稱善名物曜乃詳訓詁一得皆可􅀓無須學跬歩君看天上星東西各分布飛何必􅅓走赤亦難誚素絶交論亦褊故者無失故學術尙周孔治術尙黃老漢家西京前異說不得擾官皆核名實學亦具師表黃初尙元言配老乃以莊治術日以頺沿流益荒唐明道崇理學升孟以配孔專門學益希語錄衍千種寥寥一千年感此風教殊實政罕逮民私心競師儒誰祀周元公誰讀軒轅書獨遊水西登煙雨亭久憇追悼朱學士筠江太守恂壬辰四月曽同遊此山城一水環如􅅁􅀟塔影飛三里外行人望塔路不迷斜日已過山城西别來江水依然綠竹􅀣千尋路千曲林梢盡處立一亭日氣轉赤煙光青亭危一角驚先拆使我傷今復懐昔春燕巢空春草枯凴誰更問春消息當時逸氣橫九垓桃李迎客争先開寧知過眼若飛電三客坐處生莓苔卅年舊事愁難再何況風光隔千載龍徙空山杳莫尋寉歸華表寧能待芒鞋已倦蒲帆舉别意惟同夜烏語行客多時怨水風危亭入夢仍煙雨過水西渡已作如塵似夢看殘春曽此一停鞍能迎三十年前客只有参天竹萬竿靑弋江舟行順流轉比逆水難北風吹水欲上山風中歸鳥性偏急逆浪逆風穿􅀣入靑山影外溪流足溪水亦輸江水綠水西明月來水東􅁍􅇁一角斜陽紅夜起窗櫺髙下綠􅊠迷夜半何人􅀤水西留得月㾗剛一線􅁍教山鵲盡情啼長至後一日消寒第一集諸及門餞余洋川書院之生雲閣分賦得山樓卽事四首前宵雨初停濕霧一山皺白鳥入白雲延囘飛不透樓閣三百家溪流自環繞澗底出笙歌年豐賽神早􅁍倚靑松􅀣迤東築小樓昨宵驚驟冷靈鵲宿牀頭紅林千百株一夕已無影山風颯然來巢禽各延頸蕪湖喜晤張太守祥雲時攝道事暫移五馬駐雄關意外相逢􅉍徃還同輩漸如秋後葉異書高比屋頭山人􅀓海上魚龍橫時洋匪在寶山嘉定一帶滋事我共江干鷗鷺閒濶别十年重握手喜君靑鬢不曽班荅友人贈梅一棹欲歸江浦五株誰贈溪梅却掃軟紅塵去安排蕚綠華來港口小泊濛濛雨細天垂黒白鷺欲將行客嚇眼前風浪轉不驚飛鳥蹈空人蹠實消寒第二集陳孝亷懿本招遊蕪湖城東沿後湖隄至三昧菴看黃梅作後湖三百頃煙霧忽微茫寺作前山界隄眞夾水塘􅀲分留寓縣東晉時改蕪湖立㐮垣定陵逡遒三僑縣果熟薦空王坐久還成雨黃梅發古香十五日晩自東梁山移舟至西梁山泊晨起阻雨東梁山上雲欲作西梁雪移此江南舟過江看落日江干三尺霧又向江南結三更迎面雨隱此當頭月巳有曙鵲聲愁霖苦難歇守風西梁山竟日雲從西走東頃刻一山出囘瞻東梁山復向雲表没寜惟南下少北去帆亦絶檣烏與林鵲對語較淸切荒庵懸陟岸正晝色如漆我倦亦枕書陶然醉終日舟過蕪湖始聞彭尙書元瑞之訃謹輓一首不求立異不從同十載追隨朶殿東編集㑹昌名一品葢棺光政贈三公没後奉諭㫖仍贈協辦大學士升沉總在雲霄上公自副相降補閣學復擢侍郎尙書皆􅀡南書房㤙怨都銷氣燄中􅆟惜石渠天祿署更誰博物比司空公聞見􅇰博尤悉本朝掌故一時無両十七日晨起北風尙勁書此遣悶昨宵雨如煙今晨雨如霧多謝西梁山留人三日住咫尺不見娥睂開山溜隱隱喧驚雷明朝未敢望江浦衹願征帆泊牛渚是日晩抵采石因獨遊三元洞作西來長江一萬里盡向石竇光中収囘頭滄海亦不遠初日欲上潮驚流􅀌僧聽慣亦不訝枕上長江六時卸長明燈燼巳十年空水光中不知夜夜起登太白樓凖擬宵深秉燭遊然犀亭下泊扁舟青天無月人無酒辜負三更太白樓十八日早自采石挂帆將抵江寧訪孫大星衍先􅀉一篇卽以志别時將赴山東監司任今晨挂席思凌空五色己曜帆檣東舵樓繙書未一卷席帽亂捲三山風新睛水面鋪朝旭影外波濤尙如斛艱危厯盡心已平水狎黿鼉岸麋鹿此時􅁍憶單居使可己乘流向揚子白髪樽前有底忙素心海內無踰此河流雖濁官能清河隄使者憎好名得閒篆仿徐內史好古客呼劉石經功名試問誰能足仕宦我知貧􅆟樂他時靑兖來看山北扺二嶗東岱嶽十九日早過烈山作烏江浦口暫徘徊昨日舟從采石開半晌柁樓眠未穩六朝山已上帆來十一月二十一日消寒第三集胡戸部稷昆仲邀同孫兵􅊀星衍冒雨至小倉山房探梅并留飮小眠齋卽席賦呈並贈袁公子遲曽見郎君入抱時􅀓經近復課佳兒古梅似向閒人揖舊事都應老寉知墩割一隅􅀽大令枚卽葬山房側埋謝傅錦留五色付丘遲談深紅燭全銷焰門外三更雨若絲十二月二日消寒第四集李兵􅊀廷敬招同人集平遠山房觀宋四家墨蹟卽席同賦裝成橘頌荔枝詩尙憶煙雲過眼時余久客畢宮保署見所藏宋四家至二十餘種尤奇者蘓文忠橘頌蔡端明荔枝詩也一代􅀓人原磊落百年眞氣藉扶持寒梅消息遲霜信殘臘心情付酒卮我是庾公樓上客摩挲故物劇相思題秦宮人曉粧圖仙雲如綺復如羅天上新看鏡乍磨錯認廣寒宮小集一輪圓月一恒娥李兵􅊀以㑹勘江浙地界泛海至羊山信宿公事畢繪泛海圖属題率成長句以正一帆出海何飄然五百甲卒藏戈船帆檣解與潮􅀔鬥五色幢上蛟龍纒竿梢時浮復時没蜃氣囘環一山出海風吹人若歩虛􅁍及島中方􅂂實誰言海外一事無文案積若牛􅆎粗經時履勘事甫竣瞰海絶壁如浮圖故人尙有􅇝厓在挂席何應不相待請公别買一葉舟我亦時來看東海初四日消寒第五集李明經筠嘉招同李兵􅊀廷敬何徵君琪陸孝亷繼輅林鎬儲桂榮楮華李學璜鮑熙改琦徐棠諸文學並鐡舟上人吾園小集時余以明日旋里諸公皆卽席賦詩相餞醉後率荅一篇卽以留别一寉引一客閑歩汀西頭汀西閣上人一一如眠鷗元裳丹頂時窺牖埜寉居然戀紅袖有時合隊出探梅七尺亭亭影俱痩􅄕前新月輝􅄕外踈梅開春人結束豋春臺鼓吹復從門外來主人約客排宵讌落日暉暉坐中見陸郎年少飮亦豪十七人中稱􅆟健香巖儲髙詠竹圃鮑歌激得閣外生囘波就中匿笑何春渚七十風懐尙能補坐中有歌者四人解衣作畫改七薌我亦石上題牋忙鐡舟開士詩才逸畫筆年來亦如鐡謫仙開衙東海頭好客絶似劉荆州穀人詞老梅村叟前後可稱雙祭酒時遲吳祭酒錫騏以病不至微嫌病酒及十旬明歲花開可來否一更飛觴至二更坐上客始連翩行冥濛歸路不知數幸有導騎持燈迎君不見新知雜故知􅁲晝又􅁲夜三更未醒船已行挂席當從蠡河缷鐡舟上人邀至南園早飯晨餐未了午雞啼好客應知劇孟齊上人坐上食客嘗滿一味􅀌行􅆟相稱公参玉版我黃韲舟過昆山有感徐司宼乾學王司農鴻緒舊事率賦二絶句傳是樓空水榭荒百年先已感滄桒早知身後名皆在何必師生軋百塲司寇奉命所修一統志及司農明史稿皆係可􅀓之書人言太僕繼南豐微􅁴前賢面目同我讀亭林居士集不求工處自能工初七日消寒第六集瞿應謙别駕擕酒招遊虎丘久憇生公石時宿霧漫山飮畢不見一人悵然而返分賦得石字山僧啟山關驚出雙逸翮寧知擕榼者先巳候門􅂩僧寮雖未啟己布行客席樓臺丹碧影裹此寒霧白三載偶一來爲歡感今昔兼擕亡友句時適擕亡友遂寧張問􅆪詩爲閲定久憇生公石同儕攖世事一晌閒不得時待諸同人並不至千人石上苔寥寥坐雙客臘八日破曉過錫山作山雨接天白破寒溪上來北風吹别袂南酒勸銜杯宿鳥依林顫驚魚蹴浪囘呼僮泛膏粥聊賞膽瓶梅先壠側形家言尙有昭穆二穴因以昭穴葬亡婦而舍弟冡適被水漂遂遷葬于穆穴自此先壠已無􅂩地他日子姓不得更附葬并作此詩以爲戒約暇日復課兒子等添種松百本作籬衛之庻幾封殖之義云爾憶從葬西原子姓殊不少一輩課十株佳柯已繚繞冬青女貞􅀣墳道藉以表東南離百歩溝水成曲沼春到上冡船粼粼碧波小經營三十載齒髪慙已老無貽地下羞吾行倘堪保十歩依我祖五歩依吾親料量松栢株芟此荆與蓁石几清且修藉以列俎尊吾弟近亦遷庻免水嚙墳弟冡爲水嚙墓門爰遷袝穆穴全家骨􅁏多欎欎滿墓門統計一室中誰亡復誰存恒榦有自來吾以還二人逐臣西戌日􅁲冡渾河源囘頭蔥嶺高萬仞瞰北原豈知螻蟻微竟荷天地全荷戈復歸來衣敝履亦穿得袝先壠旁此事豈偶然願旣遂首􅏀萬念盡可捐所慙德未酬以朂子與孫憶昔初結褵白雲溪畔室追隨三十載亦旣衣翟茀一朝人事改丹旐屋頭設明明同命者今日乃獨活􅃘心奚若此委彼在林樾翁姑歲時饋地下冀修潔􅁍待松有濤吾行亦歸骨十七日消寒第七集楊上舍槐招同趙兵􅊀翼莊宮􅁢通敏劉宮贊種之金太守􅙺方明府寶昌早飯石竹山房復至秦園茶話始别分體得五古一首春筍未及抽石竹已成列草堂花氣暖無異讌春日主人工治􅄿厨婢亦修潔溪魚及園韭日昨已梳剔樽羅㑹稽釀盤滿洞庭橘寧惟充口腹志意亦怡悅尤欣嘉㑹早讌罷日方昃復有縮地方秦園茗堪啜宅北有茶亭仿錫山秦園爲名更生齋獨坐更生齋獨坐俗客無一到圖書堆滿案藉以拓褱抱主人五十八始􅁴有白須葢棺無幾時所幸樂有餘前時葬山妻日昨哭亾友平兹萬古愁庻藉一杯酒林梅旣寒香水仙亦幽姿呼兒開甕頭屈指當祭詩讀歸方伯景照猶女佩􅃢詩冊率䟦一首時聞方伯已從戌所旋里卽以􅀉之毎詡嬌兒筆陣遒憶偕臣􅅩戌西郵李騰空仙不旋踵段秀實歸仍戴頭種􅀣經曽擕萬里方伯在塞外蒔菊種至數百􅆪花格已定千秋東山絲竹眞堪慰各有深閨侍唱酬過白土鎭古縣華陽驛前朝白土鄕剩坡餘臘雪微雨出朝陽月向螭頭墮人從驢背忙盤飱思徃事乙未冬過此本鎭茂才紀開旭以盤飱斗酒見餉頻問讀書堂青元觀仙人髙臥處觀後卽􅁑仙翁大冡一巷亂雲飛列闕眞如峙蒼松相與依鵲靈朝語警寉古道身肥法侶來迎客仍穿禮斗衣重至句容展亡友王廣文吉士殯率賦一篇卽呈令兄司馬周南理問斗南卅年不到華陽岡岡南栝栢都巳蒼縣中老友誰更健腹痛􅆟憶西頭王與令兄周南分居東西宅當時賓從頻來徃修竹山房及西舫漫士心情沈隱侯校官風度王元長騎驢已倦牽車來醉客何止三千囘澹香吟屋賦詩處采筆一一埋青苔朱茂才鏞及令姪潞曁駱秀才三竒均已下世孫郎遠宦鴻河口我亦荷戈天外走前時白袷諸少年相對各驚成老醜青元館前訪􅁑仙更向鳥翅岡頭眠三峯遠復有前約時將遊茅山道士待客排􅀟筵城南欲别頻囘首復挈城西草葊酒一杯酹爾應快心生友竟堪成死友臘月十九日消寒第八集王司馬周南招宋學博保曁令弟理問斗南文學簡可陪遊獨寉山莊看梅歸飮修竹精舍卽席賦贈分韵得莊字三十年來事渺茫塢中藤蔓屋頭桒何期句曲羣仙㑹重醉先生獨寉莊天上黄人曽捧日時話西清舊事月邊靑女自飛霜遲眠緩歩消餘酒嗅盡寒梅􅀣􅀣香二十一日自句容沿破岡瀆抵綠野村裴主政暢招同楊文學鳳翔曁小阮中翰錡上舍鍼集金粟山房作消寒第九集并約明日同遊茅山卽席分體得長短句一首我飮秦淮水欲覔秦淮源荒岡百折走不盡側耳已聽流聲喧未遵赤山湖先逢破岡瀆古澗寒流三尺足其上莓苔葢深綠關心七日卽小除爆竹響已􅄹衝途年殘只我無一事尙向山腹􅊧竒書道人相貽綠玉笻一笑欲上髙髙峯寧知遊興昨方發大茅山頂雲先紅招邀伴侶皆踈散祀竈黄羊亦充􅄿饋歲人貽赤鯉魚經時我啖青精飯主人頻開綠埜堂更約入夜傾千觴一門羣從悉來謁問我何事投遐荒遐荒萬古風沙集我感君㤙仍雨泣不是天邊早賜環何能地上周遊􅄚陶貞白􅁑仙翁拍手空際欣相逢神仙大半遊世上宰相亦復居山中清凉境地眞殊絶一􅀣寒梅一甌雪我向梅花􅀣下眠羅帷夜半飛明月遊裴氏園亭深澗遊魚五色小樓乾鵲千聲寒日欲斜松阜亂雲已暗山城破岡瀆夾岸皆栽桃裴明經鍼于此送别更約花時復遊因作此贈之破岡瀆後亂山多結屋欣看傍澗阿此是碧桃花世界不妨開日更經過入茅山自黄仙墓至乾元觀宿死非死生非生黄仙蛻處還留塋出不出處不處宰相居山究何補平生不解陶華陽念念都欲縈君王惟餘一事差快意愛聽千尺松聲涼宦途不礙神仙境句漏旌陽兩仙令但使能修駐景方周妻何􅁏都非病我來依茅岡咫尺鄰荒墳山風蕭瑟溪水温夜半白狼來叩門山北尋老君垂雲諸洞半月西巳墮半月東復升團團滿月光莓苔結三層一洞嵌碧月一洞垂紫雲紫雲欲下倏復上離地驚看不􅄹丈髙􅊠元氣若吐吞一朶􅋓出驚當門其餘一朶復一朶忽若雕盤貯新果朶雲盡處叩石鐘復有雷鼓聲隆隆君不見蠻中飛雲亦已竒此洞何止雲能飛洞中英英鋪不足􅁍惹生雲夜來宿乾元觀夜起乘殘月看梅萬夢初醒處囘廊厯幾周好花紅蝶背新露白烏頭徑轉風千尺􅄕斜月一鉤是誰喧客耳春水竹中流宿乾元觀有懷孫兵􅊀星衍百轉千囘厯欎岡跨驢前事渺難忘曽擕天上神仙侶來憇山中宰相堂今日故人分出處更憐餘子半存亡乙未冬同遊者兵􅊀外爲林公子崇緝與及門鄭聯華今均已下世蓬萊海水都清淺道書以陶貞白爲蓬萊都水監故及之畢竟誰尋駐景方張太守鳳枝謫戌伊犁以愛姫冉􅀉其姊滎陽令署華太君處越歲太守札致太君偶不及姫姫本思憶成病復因是銜恨遂雉經卒太守自戌所還傷之属賦此詩繁臺幾化望夫山􅁍待征人久未還情到死生何以報揮殘老淚入陽關七千里外别銷魂姫貴州人十五年前誓尙存郎不薄情儂薄命再生端欲入空門地府永埋千載恨天山不􅀉一行書傷心三尺生綃影入夢多時尙未除索嶺盤江歎遠官相隨幾見月團欒定情金縷裙猶在摺向空箱不􅃘看東坡南海公西海􅇀雨朝雲夢總空寂莫小桃墳上􅀣異花猶染淚珠紅魂小仍隨油壁囘憶郞門向裏河開築他燕子樓千尺􅉆養平生畫像來瞥見驚鴻影未眞在貴陽日太守曽喚姫出拜靑綾歩幛動遊塵多應平視劉公幹罸作新詩悼洛神尙有西臺讞案存誓心終不出侯門九原若遇河陽令謂陳大令熙藩時亦久卒更欲􅊠頭拜昔㤙小除日更生齋招諸同人祭詩年殘風雪寒良朋悉遄歸如何未入春石砌已墮梅東西比鄰中雅有數子才招來更生齋相與銜深杯諸君盡華年感我􅇀景催送客復入門晴陽尙暉暉趙司馬懷玉自山左奔喪歸同官贈以一舟至淸江浦渡河膠敗舟坼八口幾至覆没以救得免司馬作厄解自嘲并索余一詩記事大舟峩峩髙百尺敗久無人肯相索先生途窮欣得之輦致妻孥及書策忙中方渡天妃閘意外忽趨河伯宅無端􅋓起尺一波竟敢馮陵四千石兼攝本郡馮生詎欲謁陽侯展氏不關多隱慝艙無阿堵物堪羡舟有辛餘靡亦坼郞君幸免魚頭戴如願本從龍窟得篙工舵手聲齊奮撒網持鉤拯亦亟微軀險欲爲人鮓定例并須援嫂溺􅀌兒一日三番哭水厄仍兼絶糧厄推量其故亦可曉至寶隨身遭廹逼龍神要看瀧岡碑鮫府思􅊧辟雍刻不然畫寶吳道元或者字藏黄魯􅀡遭風濕米考竟升落水蘭亭價誰敵評書旣貴屋漏痕佞佛本當衣壞色但令釡㡳不生魚何必篋中長貯帛罷官尙飮八閘水助葬誰貽一船麥可憐剩有朝衫綠亦復染成天水碧窮經先已集坎埳讀禮還遲􅁲窀穸曝日神方時傴僂見星歸路難匍匐髪膚未毁眞天幸妻子得全容衆力王楊盧駱半遭此君曽刋唐四傑集才大例須沉澤國先生盛名亦不減一死何妨塞其責卽令萬一免沉淪從此尤應斷縑墨如何更不思愆咎更準解嘲成解阨君毋更以性命戲􅀔必重遭神鬼劾一官靑社旣偃蹇三載堊廬須簡黙仍愁溺後陸士龍照見麻衣笑聲劇受業曹景先校字
