front:
  text: 卷施閣詩卷十九
  hash: sha256:ab4cf81587929ea80dbb9e6e97b3e8be33fe66be4b5dd4a0dd8571174d058c11
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_019-1a}
body:
  text: 陽湖洪亮吉著全家南下集戊午偶成黄埃飛百尺難辨馬頭人只有雲生處都無一􅀧塵三冬及半春雪白不葢地遂令墻頭蒿枯黄刺天際欲留不留歌贈張太守鳯枝欲留不留厰橋西頭欲坐不坐横街斜左攔門一人龍鍾可憐千里萬里將戍極邊念爲置酒勸之加餐酒沾衣裳淚落食柈高高三天下者九地一身居中生死不易白骨不朽行當長征􅁈心不剖誰能暫生風吹車帷高至屋脊三更出門聊與訣别人日讌客薄醉聞韓孝亷崧及令弟觀察崶招諸同人作消寒四集因䦨入痛飮醉後孝亷兄弟屬題聽雨圖率筆作長句應命一杯人日酒醉我至元夕君家兄弟皆可人肻放非時欵門客欵門客豈眞酒狂或者以醉韜其光孝亷說我詩名好比部訂交愁不早滿堂華燈滿堂客半不相知半相識長安人海宦十年屈指觴政皆居先閑坊冷巷行還坐酒嫗酒翁都識我卽如今宵痛飮亦偶然坐客握手一一稱前緣忽然牛腰巨卷擲我前屬我醉後放筆題長篇繪圖伊誰馬秋葯趙詩舍人懷玉頗詳盛詩畧侍御惇崇兄弟畫中兩人顔戍削分案讀書分盞酌聽雨木牀三隻腳君不見長安八月無雨聲屋脊祇有蓬蒿横愁君欲聽不得聽此景令我思江城吾家令弟昔抱闗昨者共我趨朝還蓴羮鱸膾興莫遏先我一載還鄉山觀君斯圖意相觸我家亦有雲溪之老屋雨聲琳琳如戞玉不爾共泛吳船之百斛聽雨層湖亦酣足梁溪之酒傾百鍾此樂豈與長安同君今四十當建功伯也亦是人中龍縱饒有宅江水東何暇聽雨眠􅀌篷昬燈一盞簷漏重千里百里雲頭濃蕭蕭瑟瑟聲灑空韻事合讓歸田翁卷圖一笑生長風將乞假南歸仍于行寓種花蒔藕以貽來者戲題壁一首雙橋口栽新柳乞歸未遽歸更種横塘藕寥寥春風不過短墻􅇛團明月剛滿曲廊桃花蹊李花隄海棠一株香絶奇黄薔薇紅郁李紫藤花牽北窻裏君不見月月花開主人喜種花人隔三千里澄懷園夜起作前宵風昨宵雨一花初開鵲傳語樓高榻冷夜不眠紅燭艶艶光􅄕前長安道上車輪駛只有半宵聲暫止三更向盡横門開枕上馬蹄聲已來卽事一屋都無壁禽聲四面穿斷崖冰柱􅍸高􅀣日光圓便作攤書舫愁無載酒船幽眠正酣處促起聽傳宣十九日綺春園觀燈卽席應敎一燈迎人過橋去忽有千燈萬燈聚水中燈影乃益奇百影已化千虹蜺爆聲飛林􅍎墮巢火艶燭水魚驚逃􅀣頭彎環燈若橋赤焰儼欲烘三霄玻瓈屏風八窻列一房燈光疑入月持燈作衖上石梁歴徧十二空中廊稍餘一角天光白太乙星芒大逾尺斜飛燈影復百枝碧月欲升升不得三更熾火列帳旁酒人門酒嫌酒涼開窻意欲待殘月不覺幕底飛新霜廣場棱棱千歩拓大聲如雷轟爆竹前行􅊠頭穿壑谷百仭冰山穴其腹裁冰爲鏡雪作燈高下社火飛千層禽蟲飛揚獸馳突陽一縷透逺紅􅁍􅀍松杉􅇁深綠牽牛亭北環橋東八窻齊開迎八風囘途咫尺春波漲燕剪都從馬頭颺淸明日侵曉自南城扺澄懷園道中作幽人春夢方迷曉催客鴉聲出林早持燈夜待門闗開一片曉霞城上來横門西來卅餘里泥滑馬蹄聲不起揩眼春光忽逼人五雲樓閣桃花裏澄懷園早起主人枕上眠方起百種禽聲入窻裏西飛殘月東飛星花香此時偏杳㝠平明畧彴誰同過一隻鷺􅁝人一箇千門萬戶交春風日影已射金鋪東三月初四日驚聞舍弟南中之訃因凖古人期功之喪去官例乞假南囘書此志痛卽留别京邸同人往昔朞功例去官聞喪何􅃘更盤桓斯人詎料中年隕異事偏留老眼㸔肻學右軍先誓墓欲同元伯一慿棺鴒原已抱無窮戚况聽荒鷄感萬端廿年彈指别親闈此日初衣願已違敢詡入山成遠志轉傷無母寄當歸餐蟆縱後張長史化鶴將隨丁令威聞說草堂親購就祇應分半貯斜暉西厓詩爲法式善祭酒賦昨者法祭酒索我西厓詩西厓以人重不在水一陂寂寥今昔人斷續往來水流波照居人前後差濟美相公居前朝文作一代雄􅀕酒生去官例乞假南囘書此志痛卽留别京邸同人往昔朞功例去官聞喪何忍更盤桓斯人詎料中年隕異事偏留老眼㸔肻學右軍先誓墓欲同元伯一慿棺鴒原已抱無窮戚况聽荒鷄感萬端廿年彈指别親闈此日初衣願已違敢詡入山成逺志轉傷無母寄當歸餐蟆縱後張長史化鶴將隨丁令威聞說草堂親購就祇應分半貯斜暉西厓詩爲法式善祭酒賦昨者法祭酒索我西厓詩西厓以人重不在水一陂寂寥今昔人斷續往來水流波照居人前後差濟美相公居前朝文作一代雄􅀕酒生瀕行詣韓城座師話别兼憶舊遊卽席賦呈一首汪于劉李汪明經炤子文學劉編修汝謨李刺史瑞岡向並在幕府並蹉跎歳月眞隨東逝波如許少年成老輩記曾賔坐縱狂歌憂時早見扶鳩杖賜第都堪設雀羅與諸城相公隔巷淸節亦同差喜鄉闗馳露布元戎新已剪幺䯢時姚之輔齊王氏皆在陜西授首湛懷園留别諸藩邸草元亭外水粼粼日晩軒車載酒頻自覺漫郎饒意味不妨要路絶依因半春我約隨歸雁一疏人傳批逆鱗詎敢便尋忘世侣報恩終擬剩閒身臨行張刺史鳯枝走送書此志别蠻鄉血戰經三昔慷􅁣故人多廟食謂軍門彭廷棟花連布諸人南籠老守僅脫身亦作西􅂷戍邊客臨行握别淚不流荷校送我城南頭東飛黄塵西掣電不死他時㑹相見東方朔故里題壁敢言竟比汲􅀡巧宦何如馬安漢家自有法度先生游戲無端扺兖州日適孫大星衍自濟寧囘署卽日邀遊南樓席上賦贈東武城南古兖州暫停歸騎一登樓奔鯨駭浪方迷目時河决口未合野寉閒雲偶掉願林壑總留他日約時約遊濟寧諸名勝以行促未果神仙應妒此宵遊試㸔百里賢人集時王石華張止原畢恬溪楊雲三王景桓劉霞裳皆不期而集㑹見祥光燭斗牛臨别戲贈孫大并索和章時河臣以孫未諸河務奏離本任候補少日齊名孫與洪卽今相對儼衰翁䟽渠君苦桃花汛蕩漿吾欣柳絮風津吏㡬時沉白馬時决口尙未合詞臣有客避靑驄自余征邪敎䟽出毎有京邸讌集居諫垣者必引避十年共挂神仙籍刼外居然勝刼中錢少詹大昕林屋夜遊圖我携鐵杖遊林屋此事如今及卅春蝙蝠竅中時見日蛟龍堆裏不逢人竹籠貯火驚穿穴石墨留名記隔塵便欲辦鞵三百兩徑從山脅上昆侖萬頃湖環三大州飄然一葉忽西浮要尋委宛奇書讀眞向嶙峋古洞遊百里未妨通地肺一拳先欲壓人頭先生何事臨厓返却惹靈威笑不休時同人皆至隔凡惟先生以足力不及中止靈巖謁畢尙書師墓墓卽水木明瑟園奇勲久勒凌煙閣遺愛猶留墮淚碑公與古人爭不朽我思前事感無涯篋中章奏千篇富屋後峯巒百尺垂便擬一年來一度野花村酒奠江􅎠虎丘謁白公祠卽呈同年任太守兆炯祠卽太守所建大歴才人剩此翁百篇稍已變唐風因思白傅談詩好雅與生公說法同言外自然参妙悟箇中兼可喻童䝉西昆詞格西江派只惜彫鐫語太工同攀仙桂無多日得䕃甘棠已十年差喜故人皆守郡時魏君成憲亦擢守揚州可容傲吏早歸田租船卽繫祠邊􅀣築屋都模池上篇何止政淸詞筆麗望君心跡繼前賢上海􅅦署與李兵備廷敬夜話卽席賦贈八載重來訪素知訝公頭白我添􅁝樽前萬里投荒客時牛太守稔文在坐卽當赴雲南􅊹江任篋㡳千篇寓興詩激電入樓飛一瞬怪風吹海立多時更䦨急遞書何數只覺樓船出浦遲時崇明狼山二鎮㑹勦洋匪久未出海偕牛太守稔文范孝亷至砲臺望海澂江太守老能奇邀我同來陟翠微人與魚龍爭􅁬迅㠶從鷗鷺各紛飛天光澄碧遮睂宇海色靑紅上裌衣便欲乘風向東去空􅄥一􅀧著魚磯將發上海寄王博士􅉮孫我乘松江潮欲泊松江郭殢人連日酒酒醒潮已落仙人海上忽見招要㸔六月飛寒濤搜巖剔壑匪無事窟穴恐有潛蛟逃時正搜捕洋匪閒中賔從閒臺榭難得羣公政多暇李兵備連日邀客遊吳淞砲臺及葉氏園溪南笑指白雲生别有故人廬此下砲臺觀海歌平生頗耽奇欲岀天地間飛行忽履北閣巔下巳無地高惟天目光遥遥百餘里􅈂送靑天入波㡳天波合處界畫明一縷黄霧分空靑漫天重叠魚龍色夕照沉沉不能赤驚雷出海聲已􅀵似怯惡浪先囘頭忽然激電來如箭一􅀧微茫著洋面海中黑子人盡驚十萬煙火崇明城更從此外尋源委上已無天下無水㝠然􅀌坐閣上頭靜攝耳目從天遊鷺􅁝窺客久不去或者疑我同眠鷗客行將歸客不樂自覺身心杳無托囘瀾萬里生遠風一笠飛從海中落李兵備邀集葉氏園小集待客久不至贈楚僧鐵舟一千章木生囘風邀我早集斯亭中客來不來勞久待閣外飛樓有僧在我不待客先揖僧僧握客臂從東升僧言與客成三友身外一琴年代久横琴在膝欲􅎥􅃶忽有鼓吹來門前吳淞江道中雜詩前山已挂龍咫尺雨當到危橋面西北曲處可停棹長年知燥濕語每得其要驚雷衝小暑所慮伏秋潦樵人驅牛羊亦下山北道所居雲水鄉鷗鷺共生長全家生計足一屋一魚網門前雖有路屋後别通舫還因粗識字不斷客來往日昨雨没竿池寛鴨堪養海居饜海觧日日市江鯽江魚餐亦厭復把野蔬擷商量釀村酒知近插秧月日午餉北田雷喧雨飄忽村女花滿頭因之感時節一村據高阜去海不千步兒童忽驚傳龍蟠廟中􅀣遂令羊與犬奔走岀門戶莓苔䝉塑像久已斷香炷日晩吹北風前溪雨如注曲處排石林欲把海潮捍地形西漸下人盡住東岸西溪形製好曲折啟山館漁人網魚至各各出門喚再轉忽已迷坡陀􅀣遮斷生死不相遠十屋間一墳街衢與丘隴畛域無由分連廬爨煙稀燐火飛岀門客行阻風潮繫艇枯􅀣根牛亭月白時鬼語時時聞感舊往事只如昨囘頭已卅年瑣窗曽瞰客白髪遽􅂷肩薜月冷無恙花溪淸可憐傷心石橋立南北數人煙九峯園感舊一雨園林足泉聲百道來夕陽明螮蝀高閣暗莓苔燕繞横塘楫魚窺曲水杯古藤應識我親見五囘開慧山酌第二泉自來茲泉側水厄乃不避竹爐煎松明靜聽蟹眼沸一椀至百椀走卒苦急遞淸涼生齒頰兼復沁心肺童奴皆竊笑巳破往時例先生語童奴汝太不解意我重在山泉兼之故鄕味神淸不思睡偃仰借初地村居卽事對面魚梭擲回頭鵲羽驚貪㸔過橋影錯應隔墻聲徑小穿林入村斜割澗成乍涼思午睡隨意拂桃笙跋陳方伯奉茲敦拙堂詩後杜陵叟作前輩栗里翁眞替人我從東浦酌蠡不向西江問津門前彭蠡九派屋後匡廬數峯先生擲筆而起章水貢水朝宗累我長唫短諷知君後樂先憂所爲五字七字不減嘉州道州力厚欲蟠崧華氣奇􅀡薄星辰眼空前古後古膽破千人萬人後湖觀打魚歌横街一雨水急流擔夫爭道趨湖頭漁人挾具來尤早背上一舟蓮葉小舟輕入水若蹈空一一漾出波心中大魚蹴浪高于屋尾急觸舟舟欲覆一舟一漿去不停倏爾舟散如浮萍魚多網重收難住􅋓有一魚飛上樹風聲離離水聲怒半空鳥與魚爭路跳波不已復擲波來往倏忽疑穿梭忽然脫網逃偏急水面居然學人立須臾風急帆亦收千頭百頭齊入舟鳴榔港口聲何數泊岸舟多水先濁舟人停舟魚赴壑我縱非魚識魚樂晩靜閣聽山僧鏡澄彈琴冥冥復濛濛簾外雨絲小移來烏木几屈作琴牀好先有剪刀聲枯僧削長􅀲一松覆一庭空外怒濤集寥寥琴韵起松響時参入風遞三兩聲禽驚出巢立快園雅集雨餘蠟􅄚集南城竹樹蕭疎古意生一徑野雲疑寉影半廊人語雜蟲聲間中花氣穿簾入坐上詩篇刻燭成莫怪比來歡讌數承明容易得歸耕水閣秦淮一雨水初通昨日江潮到閣東妾自拜星魚拜浪夜涼同㝛電光中白秋海棠墻角離離殿衆芳空濛影不上斜陽孤花忘到色香味一洗俗名稱斷腸題金文學捧閶客窗續筆後蹤迹山巓及水涯齊梁久客不思家移居誰似先生便頰上時縣鬼一車正是華年賦壯遊靈奇都藉筆端收小閒欲乞談天口海外重繙大九州􅉚巴鼓瑟伯牙琴􅁌外泠泠得賞音不譜詼奇譜淳行就中尤識捄時心屋後回環西小湖談空時覔北街屠謂屠刺史紳時亦著瑣蛣雜記等書比鄰各逞如椽筆爭作人間鬼董狐泲上相逢眼乍靑白門仍約共揚舲空江夜靜煩揮麈要使魚龍出水聽桃花洲歌贈王文學豫北江入海我所家從岸北望迷津涯焦山金山兩回抱中有百里洲欹斜南阡北阡路不賖天遠水遠雲難遮平明日射三山腳􅋓出一洲如木杓樓臺空濛樹依約樓中居人益纖削恍似連林鳥巢着春江綠淨磨靑銅黄寉九子排屏風桃花開時天地紅桃花魚􅃞波玲瓏下襯十里黄花叢其外綠柳煙濛濛花朶盡處雲光濃京江西北瓜步東奇氣不盡歸魚龍乃有逸士生其中春來放棹春江側載酒兩頭隨所適㸔海㸔山兼㸔客船屋奚童飭吹笛船後筝琶亦時摘江神江神本相識爲我春江展如席小西湖雅集舫屋三兩間門外立一塔天風墖上來泠泠語相荅案頭靑綠堆浮屠腳下十頃環靈湖靈湖盡處大魚集一一網出供山厨眼前百輩奇人集海外覊孤亦闌入歸塗星黑雨欲來空裏塔光飛九級時座中有安南國遣戌人八月初七日秦司業承業招同座師劉少宰曁戴學使均元張侍講燾茅學士元銘李兵僃廷敬許太守兆椿集隱仙菴㸔桂并聽王樸山道士彈琴丙夜乃返平明欲出門一巷忽飛雨前行及山店雲白穿縷縷衫裳半日嵐氣濃不覺已入雲當中雲中道士爭相揖天半一亭如斗笠秋林蕭蕭冠葢集林外馬蹄盤百級樓臺旣参差老桂復兩三前身金粟本不凡逸榦四出陵松杉花梢棱棱度遠帆花厎客並能淸談側聞千年枝化作兩童子倏忽十數年此生彼卽死爲花爲人偶然耳游戲人間乃如此天風吹客不得休忽然招我百尺之飛樓樓房盡處繙書坐㝛露時從竹梢墮瓊臺貝闕驚早寒琴韵雜雨來無端一聲遲回一聲疾百鳥飛集紅闌干紅䦨干外零星地認是臨春兼結綺五條􅁌上六朝山一夕分明感秋氣天􅊠月黑江怒潮過嶺艸木聲蕭蕭琴彈一曲續一曲坐使江月復白冮天高樸山道士翻新譜能令人歡令人苦我願頑仙住世間眼空不復知今古琴聲欲畢滿進觴琴韵復入杯中涼鳴蛩百種􅈝然絶飛雨瑟瑟鳴空廊三更歸路誰能見下嶺水波明一綫衝泥正欲尋冶城如雨秋螢撲人面蔡明經元春天花亂落長卷我從皇初平曾詣蔡經宅麻姑長爪亦出迎啖以松花及桃實翩然一别三十年此老白髪都垂肩半時挈我堂北語苦詢雲中舊時侶雲中舊侶散八州時問楊蓉裳孫淵如近狀宦海出沒歸無舟洪厓仙人格較優許脫手板東南遊坐君天花齋臥㸔天花落蹁蹮對影兩不俗門內一翁門外寉蟂磯夫人像爲方亷使昂賦廟門斜對石磯開一日靈潮兩度來好屬錦鱗三十六劉郎浦口寄書回識力居然軼輩羣卷中依約說三分二喬莫更誇夫壻天下英雄只使君一舸翩翩下武昌歸寧以後史難詳惠陵松栢如南指尚認江東作壻鄕越羅猶認嫁時衣花艸吳宮事已非只有杜鵑啼血夜江聲如哭撼危磯吳頭楚尾路迢迢家國多年恨未銷咫尺望夫山上石一般心事付江潮一賦驚鴻謗議騰寓言詞客本難憑洛川終古留遺恨不及江波徹厎澄蔣上舍徵蔚雨窗讀史圖三百六十日日日可讀書晴日客苦多不若雨斷途堂東堂西檐漏徹堂裏讀書盈一尺朝研羣經􅇀諸子其外六時皆讀史先生用目不用耳一目驚㸔十行駛客來百喚百不應靜裏目光時透紙驚雷掃戸雨瀉盆何法可使先生聞先生此時只閉門但怪昏黑無朝暾我今用耳不用目目力雖衰尚耽讀買山何不與君鄰君日讀書吾耳熟友人屬題春山覔句圖借得仙人屩轆轤不知曾徧九州無我慙結習除難盡一岳遊成繪一圖叠嶂連峯春到遲江南山淺好尋詩野猨相見不相識跳上月明松樹枝初九日侵曉至攝山待劉少宰座師李兵僃同年共遊㝡高峯及紫峯谷白鹿泉諸勝竟日乃返别山二十年夢寐松色古松濤已岀􅀜迎人至江滸江雲欲上山雲下紅紫壁問相激射泠泠淸梵雲中岀五色樓臺不知夜藍輿過嶺夢始醒海日甫上天鷄鳴山僧揖我樓前坐無數馬嘶知客過齋堂小憇路轉東寉葢共厯高高峯背峯乃識峯奇狀百轉千回不容上齋心旣久身世空峯頂飯罷聞疎鐘綠雲庵紫峯谷一石一雲㸔不足桃花澗白鹿泉一僧一客來偶然謂許封君兆桂及僧黙庵秋風吹山秋氣深座上别念時時侵東南良會有如此屈指何日重幽尋醉中飛觴益何急怪石扶人向空立岀山南北不復知松下頽然一長揖八月十五日晩聯舫邀方上舍正㴻儲廣文潤書汪文學文錦曁諸名士至靑溪泛月遂暢飮達旦醉中作隔岸先有月隔舫先招呼樓頭一燈淡欲無月裏啼殺城頭烏欲浮秦淮潮雙鯉告潮歇城烏約客東北行去弄靑溪古時月一船送酒一舫迎約客未至杯先傾前舟阻淺勅勿停抗手茭葦叢中行橋高百尺樓千丈紅袖居然岀天上三更已盡復四更天上人聲雜鷄唱水色飛上檻月采飛上梁平堤南北亘無極水月盡處交天光荒荒城南隅柝聲知欲盡月照小姑祠團團尚如鏡我今欲問城上烏靑溪小姑汝識乎六朝人物本如海可有一客狂如吾涼風吹水水拂衣雙漿始復分頭飛陸行爭興水爭渡送客未完天已曙廿九日邀同人至陳渡艸堂小集陸行四里餘水行乃三倍登樓望江城正與郭門背西蠡河外通西滆引水入橋高數尺秋林八月山果紅山鳥啄墮溪流中風吹欲岀橋門鎖鳥口啄殘魚腹果園扉陰陰當晝開主人不約客亦來君不見滿堂花香客酩酊網得一魚長似艇冒雨至錫山作冥濛竹樹交成片炊煙和雲不能辨溪光淨處豁一橋泉水下注聲如簫山腰一抺人家少山不能深徑偏杳擡頭正喜山果肥已有黄葉林間飛阮大令升基約遊陽羡山水先寄一首五岳尋都徧鄕山獨未遊偶逢賢令尹約共小句留天外峯初現雲邊翠欲收年豐萬民樂冠葢亦探幽龍池寺蒼蒼山已深古木復回互冥􅄥松樹杪一綫日華吐嶙峋盤百級石碎馬蹄怒危瞻斜壁外飛瀑影微露蓬蒿深十尺已斷采樵路雲光偶然開石屋􅋓無數厨煙生胯下岸仄窘回步枯僧迎客遠約共石梁渡東西排梵篋丹白别經注盥手禮法壇山精瞰庭戸善權洞靈奇信無端顯晦各一窟高征摩蝠竅俯視入蟲穴攀枝禽共迅履險蠖同屈峯峯環如螺厯厯堕若蟄樽罍亦奇古甕盎别凹凸危橋中偶斷巨釡下先缺導􅀐怱失聲行童屢迷轍微明空際下怪響壁中出石牀延客坐了了察顚未半晌出石樓松梢已新月善權寺訪祝英臺讀書處及三生堂故址百折溪流斷藍輿束急裝碧山迎客遠紅樹導人忙道昃侵官柳臺荒倚女桑三生益何􅄅茶話此閒堂偶成一度相思一舉杯昨宵書到手難開彎彎竹徑濛濛月記得人來夢亦來偶向山中度歲華浹旬春事已如麻世情怪厎闌珊甚又報東風嫁杏花初八日斷橋晚步閒從獨寉行偶與孤僧遇落葉忽驚飛衝人入林去南高峯上月徐度北高峯坐使全湖綠都飛匣鏡中偶成􅂊飮湖頭酒百杯笳聲巳向堞樓催船船都載夕陽去郤讓後湖新月來與陸七嵇三游湖卽送入城諸公虎嘯我龍蹲踏遍松杉竹栢根但祈兩日作一日不放夕陽紅對門城門不夜巳吹笳陸七嵇三盍到家誰共湖頭飮春酒德生菴裏華秋槎湖上作朝㸔湖上山一一雲中岀莫㸔湖上山一一煙中沒雲煙岀沒不可常雨後滿郭生靑光離離雲動山疑活城縱界山山勢越山腰樓閣一萬家天半炊火紅如霞山中望湖頭一水明于鏡紅樹千條􅇁鏡中寥寥更落招提磬竆冬十日湖上居日飮湖水烹湖魚人說客貌淸而腴客行時醉還時醒郤愛㸔山復酩酊城扉闔處興轉孤飛出一城燈火影􅇀歸湖頭淺醉歸來日竹裏軒窗自在眠不怕幽人夢難醒夕陽紅到枕函邊余內􅀡日與胡總憲高望􅀡廬咫尺總憲沒及半年適余假歸以事至武陵與總憲遺櫬同日抵湖上厝屋又甚逼近不勝存沒今昔之感爰賦一詩哭之卽寄謝方伯啟昆馮鴻臚􅀿榴二君皆總憲同年生也彈指人生歲月遷感公歸骨我歸田并無華屋棲恒榦自有淸名過昔賢魂魄詎應淪九地班聯曾共􅀡三天何因舟旐飄搖日又結居鄰水榭邊時以無居第權厝湖上龍井小憇山已深百折水亦曲百回怪哉茲山巓石石如飛來石腹中偶虛欹斜寺門開憇我雲中亭悍石立萬堆側坐不敢安石恐頭上頽所幸機事忘魚鳥不我猜深山十月中香已逗古梅冥坐厯片時泉聲殷如雷靈隠山房浴雲林信幽奇古木互盤曲到門途逼仄忽復展地軸嶙峋非意想一石戴一屋山僧穿飛廊迅疾乃逾鹿山房留客夢山寺招客浴詎止淸我心兼堪濯雙足竆冬天地閉水尙作春綠浴罷望始驚危樓挂深谷蘇文忠公祠二首卽呈秦同年瀛祠卽秦所創長篇千首恨雷同近時學公詩者極多不無流弊不敢師公祇慕公畧有瓣香歸栗里久因奇節說文忠祠前蘋藻三時潔屋外梅花一頃紅擬作蜀遊仍未果好移淸夢入湖中只我重遊日湖淤已厯時倘尋良吏傳并建白公祠花發來時路官饒去後思他年商爼豆到汝汝應知秦在浙中極有政聲秦同年瀛觀察浙江重新淮海先生祠落成索賦君于淮海稱初祖我距忠宣亦末孫各有祠堂留浙嶺互將詩筆溯淵源廿年何愧蘇持節百首先嗤陳閉門今日奠公吾自忝掃㕔擬更潔淸尊春溪垂釣圖爲秦同年賦好向波心築釣磯溪風吹鬢水湔衣不妨分作江湖夢魚已忘機客息機文書堆案鬢添􅁝忙裏能閒樂不支三兩桃花一雙燕伴渠垂釣覺多時春濃魚不厭波寒淸切眞如鏡裏㸔知否太湖三萬頃得歸隨爾把魚竿五柳居食魚夢憶湖頭雙鯉魚十年重向此幽居溪童拍手還相識卻繞紅闌引客裾文窗窈窕夕陽鮮一様湖光落榻前添得柳絲長百尺隨風與客拂吟肩十一日待蔣大齊耀昆仲不至因買舟往御敎􅂣聖果寺船船都不是偏復到門前别鼓尋幽艇仍擕買酒錢半湖搖落日一棹破輕煙到晩休相訪山公醉欲眠是日晩蔣裕之擕歌者相訪遂至湖心亭及蘇公祠痛飮醉中作偶擕春酒至湖頭難得春人鏡裏遊半舫賓朋誰是主一隄風月尚疑秋禽魚雅識閑中􅃐絲竹都飄水上樓爛醉莫辭歸去晩斷橋掃榻待淹留月夜自湧金門泛湖至潄石居城頭吹角促客行客醉尚戀茶香淸關門持鑰不敢下一燈遙遙岀門罅舟斜欲趁北岸風月影已落南高峯高低岀沒十餘里水面飄忽南屏鐘湖心跳浪聲何急魚厭波寒出波立三更歸路月已昬剩得一星明斗笠壑菴訪破迷和尙不値題壁壑菴一石塞一壑桂子石邊無數落菴有香桂數株種絶奇我餐松子石上眠初日正墮山窗前山窗四面黏吟句挂壁木魚搖不住松花飯熟僧不歸聞說南屏訪師去十三夜自花神庿夜歸南屏鐘未歇且復小遲留月黑花王殿春生酒嫗樓朗吟驚㝛鳥緩步逐眠鷗忽有千燈岀冥濛水盡頭鳳皇山頂望江海及裏外湖作湖水綠江波黄海氣五色浮空蒼山形抱湖江抱山大海東北仍回環峯形南走連閩廣百轉千回勢蒼􅐯回頭一望歎絶奇十萬煙火山城低南峯雄奇北峯峭中有孤峯復回抱茅菴煑茗厯少時海口潮上聲如馳閒穿石罅玲瓏走一半磨厓大如斗前吳越後建炎王氣落落東南延祗憐老樹心空早欲問前朝竟誰曉朔風吹客下頂峯峯面尚挂斜陽紅君不見南遷怪㡳營作宮上有十二巫山峯山頂有巨石十二大皆數十圍吳越時呼爲排衙石卽此長至日擕酒至葛嶺訪初陽臺半閑堂故址昨訪閱古泉今來半閑堂小朝廷事碎如火蘚石剝落誰能詳初陽臺上初陽出可惜蓬蒿沒山骨仙翁祠屋亦已欹鼪鼠都從石龕穴神仙畢竟不可爲化寉或恐仍歸來試問葛稚川何似丁令威荒荒昔人臺落落今日酒城中招客不得閒地下寥寥呼死友由華津洞登蓮花峯􅀡石立作龕横石臥作庿尤奇穿石樹宛與石形肖巉巖理斜出阻客入深奥彈碁形畧具伊昔誰所造擾擾此暫停茫茫發􅀌嘯陰厓落蟲篆絶壁出鳥道擡頭礙峯頂側足限石竅寧知雲路滑欲下心尚掉齋心無妄念平地冀可到洗眼㸔北山参差入斜照由鳳皇山半至勝果寺復從寺後尋石門及仙姑洞郭公泉升天梯諸勝幽人欲移笻石石先下嶺前行三兩客一一如墮穽峯奇非意想欲去屢延頸玲瓏穿石罅時漏夕陽影飛樓當山腰屋古極修整升臺雖百級坐處尚如井搜奇興尤劇屋後豁異境雙扉斗然落一水過淸冷迤西峯雜遝欲往迫短景空處怱有梯延緣望山頂月夜從六橋歸欲訪漁師舊釣磯鐘聲沉水月光㣲六橋行遍無人跡楊柳居然挽客衣雲棲寺望五雲山并訪蓮池大師塔院到來一谷雲空白濕朝露披雲尋絶磴生翠落無數濛濛萬竿竹中有接天路谷禽飛不透怒欲攫雲住巑岏正迷目塔院忽回步緇流吾豈識重此本儒素遺規尚堪仰百代守其故引泉來山門飛雨屋上注齋厨隨粥飯不更闢堂戸衆生皆簡黙勞客久延佇淸磬出石房悠然發靈悟向晚由徐家村至理安寺理安萬株松雲棲萬竿竹理安較雲棲山徑益深複高低萬綠冥濛聚攔住夕陽飛不去歸鴉招客入一林山鳥嗔人復相拒千回百折上石臺嵐翠膩屋扉難開山僧總覺睂宇綠古佛亦臥靑莓笞􅈝然一片山風惡綴壁萬松搖欲落厓危石峭路亦竆松頂偶㸔支一閣林梢一抺野火然手拾松子煎山泉紅查花開臘梅破繞屋異香延客坐下石屋嶺徧遊石屋水樂諸洞風聲遞水聲松影接天影千盤靑雲梯百折白石嶺􅀌禽前若導嘶馬後如警危驚天半石截若水中艇東西列尊罍高下别畦町莊嚴三百輩襴袂悉修整恍疑泛滄溟一一咸引領滃然水聲出古樂誰更省齋心讀銅篆洗眼摩石鼎欲發僧苦留遲歸僕頻請表忠觀拜錢武肅王像不爲東帝只稱臣江左眞王僅此人故里錦衣殊赫奕中原棋局太紛綸州排十四疑無敵弩射三千若有神依舊吳宮好花月遺民從未識煙塵躍馬提戈海上回儒風早喜􅀍江陔年名不改唐天祐國士能容羅秀才使宅例皆除艸創陌頭歌已報花開門材百世猶全盛時有文孫握節來靈巖山重展畢尚書墓感賦江左方傳箭天南佇洗兵時聞川陜㨗音更馳新露布無復舊書生丘壑心徒戀公屢欲遂初不果巖巒氣未平松杉識人意都作怒濤聲石湖戈氏園訪戈上舍襄復不値一程趨水國百折走巖扄欲雪地先白過雲峯轉靑怪禽摩絶壁老寉啄空汀訪客仍難遇空題石上銘小除日城東晩步百事抛殘歳欲終得閑聊復步城東念沉淸磬一聲外影入歸鴉萬􅀧中叠港乍添新雨綠小樓斜帶夕陽紅道人正把雙扉闢知要堂西訪寓公崑山道中阻雨時吳門友人已有書相促野禽飛不透雲氣十分濃夕照昏如此前山路復重遠煩馳越使昨已發吳淞到恐難拘日遥椷莫早封臘月二十九日澹香斜月西堂吿成招陸秀才繼輅等及兒子祭詩年除百事費支持檢􅀧閒情付酒卮卻約比鄰三陸到掃㕔同與祭新詩瓣香同奉此淸才百様春醪百種杯要與先生洗寒痩迎神歌裏報花開受業吕培譚正治挍字
