front:
  text: 更生齋詩餘卷二
  hash: sha256:f5174f7f8aa3774872dea79591f3304a3159f4890ec114f80c6a5efebe2ecb23
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_002-1a}
body:
  text: 陽湖􅇝亮吉著機聲鐙影詞蝶戀花題畫絲雨絲煙湖上道夢裏年華深淺誰知道天上玉梅開過了又敎人世東風早春事及今偏艸艸有分披圖月與花枝小􅍦立數峯吟句峭乾坤分半輸褱抱鷓鴣天學畫􅃻詩興轉闌更從花裏響銅環雕籠出語偏生脆翻遣鸚哥課小蠻顏冷落致闌􅃢萬重密意總相關鄰家姊妹邀同坐說夢先消春晝閒點絳唇春病隔箇紅窻强將八字排來㸔自憐魂斷欲把他生算支枕應難且復憑詩案誰相伴喘聲􅊠緩虧得鸚哥喚風入松題春山獨往圖翛然一境逈難攀幾家人住谿灣踈籬敗壁凴誰補借亭亭隔岸靑山小史亂頭粗服先生雨笠雲衫生綃忽破酒人顏淸夢置其閒谿塘正好營高閣待他時風月人還仲蔚蓬蒿須補劉安鷄犬都刪醜奴兒令海棠小院春深見一晌難描千種無聊容易將人挂眼梢􅊠徊不解傷春句一卷離騷纖手難抛自把蠅頭小字鈔紅林檎近紅錦香猶淺白閒春正長睡起懶無事鬢花碍釵梁春衫􅂝來早皺呼小婢熨沉香屈指挑菜年光待畫艇尋芳麗句傳鸚母名絲繡雁娘妝樓無事鏡邊㪅展縹緗算傷春未敢閒愁無據背人私自禱海棠點絳唇送春又是春殘海棠花外游絲亂淚珠成串待把年光換惜别匆匆鎭倚閒庭院闌干畔綠愁紅怨約畧傷春劵漁家傲題陳野航畫竹午餘睡起茶初熟一竿愛寫玲瓏玉葉葉枝枝濃淡各還須屬三更窻外秋聲莫娟娟穩稱輕綃薄圖成好置闌干角待得晩涼新雨足天如沐月痕倒挂梢頭綠酒泉子驀地行來一樹好花離地出雕闌排玉砌陟瓊臺四更玉笛聲三弄肩上露華堆重與雲飛隨月上逐風回探春令題侍女屏風晩妝初罷怯春寒約伴花閒步正一縷愁來無著處把十三􅃶偷訢玉簫斜倚林閒路想個儂丰度到宵深霜月空濛錯認作梅花幾樹醉桃源前題薰風池閣簾微亞曰暖豪犀偷卸行到綠沉窻下一樹榴花謝滿樽蒲酒人初暇結伴消他長夏采戲又還輸卻些事關心者紅窻聽前題一院飛花空白晝㸔結束春弓閒走隄畔盈盈堆絮厚襯得鞵帮瘦簾幕深深垂錦繡闌干外總燒金獸昨宵霜冷今宵風驟屈指剛三九買陂塘題錢孝廉㴻川鸚鵡媒傳奇爲多情靑衫血淚生生判向愁老冰􅃶誰把傷心譜又早别懷縈擾幽會巧君不見茫茫碧落相思鳥芳心寸拗待密約重圓愁盟暗續一一淚珠繳銷魂處我亦靑鸞信杳年來暗損懷抱江南江北傷春恨付與斷腸衰艸辜負了是舊日金釵鈿盒情多少閒愁待掃又一兩三聲無端逗起淸夢隔簾悄河瀆神迷藏游戲共登壇窄靴小袖衣單身輕總欲避遮攔空裏時時指彈同是曲欄何處躱慧心先向偏左女伴盡皆藏過百忙何苦尋我淸平樂楊花凭早不待春歸了可惜玉人渾未曉逗點與他知道晝長人倦敲詩畫屏一枕閒支睡覺數聲搏黍消他春日遲遲點絳唇花事關心東風吹到茶䕷架燕兒多謝呪得春成夏不放春歸斜日簾微亞秋千下游絲無賴又向荷錢惹鵲橋仙玉鉤響斷玉簫聲斷更苦玉人音斷淸明上已總無聊欲飛去晴江南岸小園春半小窗月半尤喜小樓天半黄鶯紫燕不曾來只螮蝀與人作伴望江南幽夢破斜倚小紅樓又是卷簾人不見滿街絲兩糁春愁綠暗幾重流昭君怨江行帶得綠簑鐵笛消受短篷秋月帆影入江流小于鷗目極楚天遙甸潮接海門如線一點着杯梢是金焦減字木蘭花垂垂一樹曾見個儂珍重處已分成陰頭白蕭郞恐不禁還憐飛絮一樣東風飄泊去郞已沾泥莫趁流鶯是處飛相見歡夢中作無端踏卻輕鷗共淸遊夢裏居然東海向西流雲中屩風中纛不能收幸喜天鷄初呌始回頭一叢花林禽喚我作春遊煙景逼南州藍輿卸處幽吟好尋僧話又引閒愁無事銜盃有山埋骨此外總悠悠消沉白了少年頭靑鏡惜風流江山勝處余歸也等幾度白玉成樓悟徹孤花彫殘心字春總不如秋靑玉案十三夜玩月東風又把緗梅染㸔靜裏簾斜捲追取十年前事轉亭涼月暗漏深花滿兩兩傷春劵如今細雨沿門糁幾陣落紅愁欲浣鐵笛五更吹更惨任他風雨任他憔悴再也無人管千秋歲瓶梅春來心性花與人同命香未拆愁先迸一枝聊􅉆汝五夜誰相訊􅆟好是百花頭上懨懨病晝永寒先警骨冷魂尤勁花總謝香難並幾絲芳意織一瓣心香永拚得是閉門風雨無人省買坡塘邵二雲姚江歸棹圖黯然歸一肩行李春風不遣人住姚江雙漿悠悠去去也更休回顧天意苦要汝是名山夜雨成千古功名射虎只亘亘平生才皆中下李蔡豈君伍當年事千佛名經曾數一枝原􅆟高處衫靑袍紫都閑物惹我酒閒起舞君莫誤君尚有數椽茅屋秋風浦萍蹤語汝恐又引先生酒闌燈炧淸泪滴殘炷天仙子溪上鷺絲忙報客玉人遣透春消息怔忪相送巳嫌遲無可說祗相憶門外滆湖千頃碧蝶戀花落梅白白紅紅開未止一擅孤標卽兆飄零始如此人生剛半世問年一樣輸餘子入夜春愁爲剪紙屬汝重來休昧初來旨多分柔魂猶在水五更吟斷梅花誄又窻外游絲空復漾十見花殘那得人無恙莫向酒閒矜跌宕春風已把飛瓊葬花未開時愁巳釀寄語桃根春到休輕放人世有情還有障招魂􅉆汝靑綾帳賣花聲獨客正思家到曉啼鴉灑窻寒雨又如麻不放南枝開到好春有些差客裏事堪嗟似錦年華幾人紅泪隔窻紗燕子平生眞恨事不見梅花倦尋芳春星寂寥銀闕怪厎瓊妃媵他數個三五春宵可許玉階同坐人說高寒應讓汝九重天上還難妥咲風詩只咏到衾裯被他喚做也知我殷勤㸔爾駐向樓頭幾番難過錦樣連錢一例被風吹墮仙掌夜過防暗摘月盤露冷愁輕簸寄新詩先問汝點頭也麽荷葉杯病到幾番委頓誰問曲闌旁畫睂頻喚不能住猜是甚心腸蝶戀花啼鳩和仲則艸繡平堤花繡樹如此江南􅃗影堪飛度畢竟塵情猶未悟雨晴簾角聞呼侶倚樹鷦鷯爭笑汝三度營巢依舊無家住幾日酒痕兼墨汚樓頭催澣春袍袴前題鷓鴣莫向天涯棲苦竹只遇啼䳌歸計須頻屬望帝愁魂魂已續此閒樂亦應思蜀何事啼聲常傍屋解喚哥哥引起春人獨花到黄陵千度落這回尚憶詩人谷憶秦娥春時節春人住處春光别春光别膩紅花朶膩黄新月濛􅄥膩綠千條結樓梯欲上愁三折愁三折文簫聲動剪刀聲歇柳梢靑新柳次高東井韵向曉層巒將煙做霧釀雨成寒鬢綠衫靑睂長眼瘦于女何干一枝折了重㸔怪徹厎春愁總諳柳㝛前身萍花再世我亦差堪沁園春題萬黍維持籌握算圖儒林傳􅁘貨殖傳􅁘君因併書嘆百不如人一籌還展十嘗九誤些子都輸業可抛經讀宐從律且把蒼生經濟儲他年㸔㸔致君事了更累錙銖滿盤算了還虛怕仰屋他年更苦劬只田從玉局須求陽羨家從杜牧更創吾廬我謂先生歸謀之婦料理牀頭阿堵鋪先生笑有五銖七幣盍往觀乎摘得新難得來休敎到便回屋頭􅀟喜鵲久徘徊紅窗故啄墮靑梅勸銜杯玉珥墜金環晝永窻虛嫩寒先把花朝做幾番凝恨上重樓樓又敎人鎖長自雨篩風簸把春陰當成功課沉思往事判盡浮名換他眞個寂寞深園小桃也肯留人坐細拈春夢寫春愁夢又將人躱知道枕衾孤臥算風光幾曾到我年華誤盡到了今番更敎難妥東風第一枝桃花團泪成花搓煙做骨商量不遣春瘦幾番醉了重蘇依然十三時候前塵誤汝應一例向風回首笑無端占了珠簾肯放玉人垂手只花也憐人非舊問此度探春何後簸錢堂上重來不似那時淸晝芳心易逗算薄命永􅉆人咒待拈他花片緘來付汝一春消受八聲甘州又西風吹雨上空樓點點雜更聲正涼隨雁至宵同燭永夢與年更十二鏡雲何處江館聽吹笙多分樓前約不記啼鶯一半塵封玉鎖㸔碧紗籠處墨雨縱横只蠻箋消息何事苦難凴想蕭郞傷春恁遠料夢魂逗不上銀屏須知我靑衫泪濕不爲浮名南鄕子自雲溪放舟至靑山莊藥王廟晏公祠北關剛値午晴時三折水程欣已到都贊好門外水田門內沼花塢曲月廊周半塘煙雨幾時收百步小橋隨鶴過思久坐翡翠北軒晴日墮長亭怨慢蟹猛霜風漸肥郭索是處橙香薦他黄玉記得年時酒徒醉月小樓曲深盃浮綠陟地向天公祝臣願把浮名都付與蟹螯添足稻熟漸燈明深港糁破一溪寒綠鱸魚便美怎占得九秋名目第一是左手須閒怕明日故人相速只紫蛤紅螺風味幾堪作僕金縷曲寒夜重光齋頭㸔秋海棠因言前曾于花下掘得古櫬發之儼內妝宮嬪也余感其事因併賦之嬪葢齊梁時宮人云燭冷人初醒正虛廊角聲吹徹商聲又警籬落寒花開自好露點欲斜仍整粧惨淡玉人微病不向春園誇勝事伴艸根菜甲三秋永其下有波如鏡千年舊事思量猛被西風吹將世換泪珠紅併一半齊梁遺蹟在漠漠土花塡井待說與古懷誰省落月微黄天乍曙向闌干逗出銷魂影重認取刼􅁅冷玉燭新窺􅄕新月小卻數朶花枝照人寒峭新詩寄與雙環巧故把幽期漏了文鴛堆枕密意取夜香薰好又早是玉漏星星門前乳鴉啼曉紅箋付與殷勤只此恨平分幾時堪繳歸期及早重到也不是玉簫年少萍浮絮裊試逗點與他知道須記取錦瑟年華暗中易老鶯啼序關神武廟後有􅂩地里人别搆諸葛忠武祠落成謹賦丞相祠堂㸔古栢陰陰翠繞重來處一瓣名香空裡晴絲自裊黄石兵書吾懶讀靑田洞府愁難到只先生志業今古幾人同調凴高回首炎精中燼天意殊難曉聞說定軍山下翠羽靈旗山昏月黑鼓聲猶惱陰平貽悞䕫門敗踵滿盤都錯何須說更譙周黄皓知幾早相隣壯繆遺祠未了忠心此時重表茲地當年紫髯虎踞更周郞年少柰江山數著殘棋着手便敎輸了把荆梁十郡名區輸織􅋰小兒坐嘯尚躊躇北定中原南淸江島當途高也往日紛紛割據算曹瞞尤狡匹馬過秦中早鷄筯全抛虎鬚重燎巾幗謀臣彈棊胄子一揮羽扇愁俱倒只遺恨在五原秋艸十年深計擬將赤帝關河重藉手還高廟法駕導引補赤城韓夫人詞天上樂天上樂博戲更藏鈎怪厎燭龍呼不醒兩丸日月覆金甌螢火照淸秋雲漠漠雲漠漠飛渡赤城梁摘取列星歸北斗倒傾銀漢入西江天闕費平章銀漢畔銀漢畔織女起高樓玉作􅄕衣花作座海雲爲佩月爲兠縹緲坐牽牛偕勝侶偕勝侶仙閣坐虛無一賦玉樓猶未竟人閒甲子總糢糊長爪比麻姑點絳唇次黄仲則韵尺五荒墳小桃一樹傷心艷寄將花片沒個人兒便芳艸多情引他歸騎尋敎遍糢糊見月殘如線霧隱傷春面如夢令簾外日遲風簸簾内粉消香涴未慣是樗蒲輸了更抛金鎖還我還我莫被小鬟猜破摸魚兒淸風亭故址又斜陽晚林一抺天空飛破歸鳥危亭覔遍蓬篙徑咫尺謝家山到吟未了算好景如前好句還輸眺初三月早㸔一縷吟魂寒鴉爭瘦逗去碧波小當年事此地放歌孤嘯狂來幾側烏帽詩名天地成何補身後一椽誰保吟愈峭把長句風前漫博先生笑思君欲老怕騎鶴還來此間亭上留得醉中艸靑玉案過凌敲臺故址凌敲臺剩荒基也雨洗石苔侵瓦到日短衣尋客話庾郞年少衆中爭羨不醉㸔盤馬孤域陟築寒山罅城裏猶聞暮潮打休怪客愁容易惹那邊人語者邊雁呌月照荒荒野減蘭聞遊采石早起披衣㸔曙色不敢窺簷烏鵲南枝夢正甜酒衫芒屩二十男兒工跳躍一縷吟魂先向風前逗早春金縷曲淸風亭夢李白天與人俱老又何爲一千年後此閒凴弔一半江山歸李白一半分還謝眺我到也祗餘衰艸畢竟微軀容易盡覔些須身後名纔好勤打叠零星藳靑衫百計􅉆人笑只悠悠非公知我恨和誰吿金粟前身眞小刼墮作五湖年少有夢也不離蓬島猛憶人生何者是只浮雲偶寄孤飛鳥殘夢破余歸了前調再次汪劍潭韵花是明朝放只萋萋滿城芳艸已􅉆凝望多病年時誰付與綠酒紅愁同量且小立雨中惆悵若許鶯花還再世拉春人早向春風葬簾蒜揭心旌蕩樓高總伴閒雲上有當年鏡盟衫誓􅐟懷琴况可惜韶光都健在春到也須微恙莫輸與個儂門巷我比絮泥心更定背夭桃穩坐靑綾帳塵夢覺釵鈿響前調蠟􅄚嫌疎放任些時殘紅剩紫幾曾凝望廿載可憐靑鬢改江水未勝愁量春付與别人惆悵我慕蠧魚能再死趁餘香好伴殘編葬渾未管流鶯蕩聽歌人在靑雲上只年時招邀勝侶尚牽游况杜牧揚州人巳換只有月還無恙照惨惨幾家門巷尺五桃潭三徑艸瓣心香􅉆汝靑綾帳添一綫春潮響前調倒次汪劍潭韵夢遠金鈴響正無聊紅窻睡足倚帷牽帳羅襪閒行花露重頗怯曉風深巷渾悟到玉人春恙薄酒多愁眠易醒問樓高更有何情况梯隱約難重上傷春早怕春飄蕩把泥金書成梵字伴花同葬一例有情應解取花也對人惆悵巳開滿十分春量此度見花應背面誤人人簾厎三年望屬來歲休輕放醉花陰爲孫大和婦王采薇韵日午麴塵何處避斷粉零紅且自由天地三十年華愁也未不回頭負春人意情到九原須更記骨冷􅁅飛􅁅冷情還膩幽夢壓簾魂壓被醉醒怕沒絲兒氣浪淘沙路遠小樓􅊠花朶分飛依然銜恨上重梯何止舊人尋不見梁燕都非愁裏闢窻扉殘月剛西畫簾風破鏡臺欹只有曲屏風六扇猶􅇁羅衣點絳唇鬥艸歸來一窻好夢非無據筆床茶具且復安排預强自支持鬼病終難愈誰來覷藥爐煙畔只有風飄絮憶王孫山􅉾池閣水邊樓一雨銀塘便覺秋長日無人掉小舟水分流胡蝶閒來立鴨頭靑玉案算來未到銷魂地偏是識愁滋味欲寫紅箋珍重寄随肩小妹隨身小婢多恐難回避幔垂不放通花氣又早早斜陽把門閉莫道文窗蹤跡祕黄鶯紫燕畫睂百舌箇箇知人意浣溪沙二首玉腕偏憐金釧寛鳳􅁫頻撥獸煙寒萬重心事壓闌干杜牧已留來世約蕭郞不作路人㸔雖然猶覺恨無端前調背面難禁萬種愁見時無語只凝眸初陽一綫下簾鉤百計未能通一語暫時曾許共扁舟淚痕和露咽心頭傷春怨劍客七首飛將過到處人頭疑墮日昨詣叢祠土偶居然離坐旋空中如磨電影終難挫驀地指晴空一道采虹中破金縷曲僮窺園從予八年矣體弱善病今年予秋試被落忽爾辭去念事傷離不能無作命沽酒歌此調以送之衣薄還如紙􅆟凄凉前宵毷􅫍今宵送爾八載追隨無别事傷病傷離傷死總誤爾朝飢飮水苦訪蟲魚摩篆籀但論才爾便成佳士休更作朱門使無家我共僧居寺只蕭蕭寒雲丙舍尚堪南指入夢總從吾父母醒處怕逢妻子况薄命久無人齒明日出門誰念我就飄蓬斷梗商行止爾去矣淚流駛前調重九日陶然亭作車馬長安道有誰憐中秋雨暗重陽花少尺五閒亭三徑柳亭徑尚餘秋艸更難得紅塵似掃半舫斜陽新月影借團蒲穩夢仙人島算懷抱此時好玉山莫向壚前倒只空􅇸俸錢難假酒錢輸了門外鍾聲催客去衣上薄寒淸峭料理是餔糟代飽無數樓臺凝醉眼訝籬頭果大星辰小歸尚有未棲鳥前調僮得前詞泣不􅃘去復成此闋暗裏驚聞泣一聲聲無端惹我靑衫又濕多病經旬誰得似欲共候蟲秋蟄爾似燕舊巢還入典盡衣裘頻擁絮更同扶瘦影當風立渾不怕霜華襲八年侍我肩差及笑􅇸空新詩屢付傭錢未給費爾一杯村落酒爲我解除狂習說月好今宵初十樓上三更雲氣淨㸔星辰如豆天如笠吟正遠催歸急靑玉案十一日同人飮長安酒樓臨街樓上泠泠語醪味薄催添糈一院酒人揮不去持螯手冷潑醅顏􅀬繞著筵吟句臨街樓外踈踈樹已覺秋聲落無數一院酒人招不住來時天惨去時月暗繞著城徒步憶秦娥寄季仇鍾已動一聲破我長安夢長安夢世情未了鬢絲先種書乍捧故人遲我華陽洞華陽洞丹沙塡壙碧山成冢浣溪紗薄暝微醺枕酒瓢病心一縷逐風搖夢無來厯入鴉巢初八夜星還照曉十三涼月卻終宵􅍸魂尤避出林鵰買坡塘送繆公子笠莊至江浦趁霜風沿林飛徧巢荒去住無據雁聲卻有東歸信切莫更留征羽凄燕語道千里同來千里應同去霜鴻未許算我願隨陽􅀸尤避􅀬各自歎覉旅天涯路來日風風雨雨别離頓起愁緒江南兄弟誰能健羨爾雁行有序須記取只紫塞重逢可識前時侶天空欲舉穩待爾重來春風三月共㸔滿林絮漁家傲宣武坊前淸酒美多錢約客誰來會日午闢窻人似海孤劍在萬金難買心無愧畢竟浮名猶可待少年莫學呈身銳鼎鼎百年君誤再棺已葢幾時贖取從頭悔一蕚紅龔孝亷克一寓居晉陽庵側因屬余顏其齊日聞鐘并係以詞傍禪關搆閒亭似舫四面啟疎櫺十五良宵一􅀟人影三千里外鐘聲有多少春人心事柰秋窻黄葉巳先零借了蒲圑繙殘梵頁悟徹鐙檠我亦能來聽此只靑衫似夢百倍凄淸苦竹疎蘆幽花淡艸此身如在江城况惹起寒蟲鳴砌又丁丁蓮漏滴殘更待得蕭齋響寂人語還生摸魚子龔克一邀遊夕照庵卽展其令弟紫樹殯正無衣壚頭索醉油車忽引君到愁中天氣還如霧咫尺遠山舒眺煙柳道算怕是逢人只是逢僧好無多落照但挂近禪房和將夕磬便有暮雅呌荆高市酒人一樣潦倒塵沙埋盡年少江干舊侶今誰在癸巳秋予與劍潭紫樹同客姑孰至宣城始别可惜龔生竟夭渾未料㸔冠葢如雲更有閒人弔高原古廟但肻費茶瓜時時欵客我輩不須召荷葉杯自夕照庵步至萬柳塘三里望中依約樓角亭館太荒蕪萬株楊柳一行無風急戰菰蘆林際黑歸一片雅點隔寺暮鐘聞寂寥城上去閒雲雲薄帶斜曛小重山舊日紅闌已作薪玉蘭花滿樹曬春裙經過燕子亦嫌貧呢喃語故故入西鄰寂寞掩重門小樓三面暗易斜曛屏風吹淨十年塵中還有兩小舊啼痕謁金門送龔曉升南歸卽題其長松片石行幛歸亦得卷裏天靑雲白不誤今宵歸計决誤前時爲客屋三閒醒夢適何止長松片石七十二峯晴厯厯在先生窻􅂩梧桐影將至仙遊潭迷路馬獨來南山麓厓上石樓􅂊一閒推門且抱神龕㝛玉女泉淸無極雲外木魚聲不停三更月向東峯􅀡臨江仙溪山秋曉卷子十里空濛雲外水水雲光隱回汀􅆟無人處小舟行到來谿館泠秋燕語分明渾異踏靑前度至滿坡花氣將迎剩他幾樹綠無情四更山曙早紅葉點疎星蘇墓遮寒禽枯木卷子綠初離紅乍失白釀層雲黄澹初升日空裏數聲禽語切似說宵寒約畧明朝雪凍絲黏冰綫結莫折高枝恐有東風出轉向竹稍深處歇玲瓏石愛蓬山骨臨江仙蘇州紅鶴谿山烏鵲館金閶從古繁華三分樓閣二分花一分留􅂩地隨分種桑麻海物新奇爭入市晨餐都厭魚蝦等閒吳語六時譁笙歌叢作隊脂粉瀉成洼玉樓春園空膽小愁無侶錦幕時時風欲舉生憎梁燕不歸來銜得徑泥何處去三更又是瀟瀟雨剩得燈光靑幾聚小樓西畔窅無人一片落花浮鬼語點絳唇傳粉攤書硯旁小匣先安鏡梅花同命瘦到年時影小别生疎問語都愁應更初定爲憐春病偷向床頭省好事近抱處恍如無柰小語心尤怯夢裏有誰知覺紅上雙􅀟頰三更碧月淡紗帷涼把重衾壓欲訴二年情事和淚開吟篋金縷曲元夕柳子廟道中作綠鬢還如舊又依然長隄風細碧空雲皺艸艸柴門元夜到催送斷腸時候幸濁酒數杯還彀愁欲成癡眠轉醒怕相思一夕人天瘦欹枕處淚痕透樓高往日長垂袖摘疎枝殷勤記取柳邊花右分半紅窻堆卷軸多付個儂消受渾可惜此生難又欲倩雪衣爲懺悔更煩他百舌聲聲咒春夢破月如晝霜天曉角讀天寶遺事開元政倦無逸圖先換頒到秋來羽扇無多日賢臣竄戚畹更相煽羯奴先兆亂河北河南皆叛何須責哥舒翰河湟使典宰相居然忝天子更思康􅙒還應惜無人薦傳箭出郊甸馬嵬軍又變啟釁堂開月偃休專怨長生殿臨江仙八月十一夜雲谿晩步有感猶記石橋橋畔路死生離别匆匆綠波搖月去如風唾痕都作血岸柳不曾紅留得一行臨别語幾生重得相逢夜臺沒箇寄書鴻廿年如夢過來聽渡頭鐘減字臨江仙十二夜步月葛仙橋十日秋陰情緒減乍眠卻喜新晴紅墻千尺月華生水明鐙暗依約卷簾聲谿口寂寥尋渡少酒徒多分飄零柳絲笑客眼猶靑好天涼夜祇剩一人行烏夜啼十三夜水邊門掩重重海棠紅不信者般顏色墮西風相扶醉相偎睡意惺忪正好一鐙私語伴秋蟲中年一種情牽病懨懨欲借舊家樓閣訢當年黄庭卷丹爐畔學飛仙留得一絲兒恨未生天小冲山十四夜無月三更後微雨一種閒情那得知乍眠還又起出門遲秋鐙替月巳多時三橋走衣袂雨絲絲空外影参差西風吹不斷柳絲兒昵他燕子說相思還生怕燕子笑人癡滿江紅十五夜坐雨百事輸人祇嬴得幾番沉醉又苦是宵燈替月秋霖成歲說餅齋抛荒徑外采蔆舟泠靑溪內倚闌干聽雨到更殘何曾睡風轉處枝枝背檐漏處聲聲碎只無端兠起舊愁無柰白玉盤埋雲惨淡黄金花買秋憔悴擘蠻牋題恨寄花前花垂淚人月圓十六日顧唐橋步月昨宵細雨沿門糁深巷掩重扉繞砌寒蟲滿廊歸燕秋思依依今宵暢好橋邊樓上人月雙輝曉漏將殘夜烏啼徹􅀡自忘歸醉太平十七夜庭桂甚開鄰人復有貽秋葵野菊者獨飮偶賦葵芳菊芳蜂忙蝶忙小庭節近重陽是秋花總黄疎枝貼窻濃陰滿廊人閒月午淸涼比天邊更香金縷曲送唐大令蔗園之嵊縣任衣上春雲起記征程錢唐到日好花開矣兄領三州君作縣穩稱陸家難弟只手版也須隨例昨夢越江東去好是紅塵不到天光膩官事少㸔山未京華往日曾聯騎憶匆匆斜陽古道柳絲同繫丁未春偕君及孫淵如計偕北上一幅東風吹上了兩兩金門高第偏剩得杜陵書記捉鼻功名知不免笑他時我亦神仙吏輸一著早曾計買坡塘送莊舍人植三南歸並寄蔣太守星仲趙舍人億生莊進士葆琛又懵騰幾番煙月東風吹過年少寂寥三徑尋遊侶只有阿蒙還小忘不了是當日曾經擲果蘭陵道一官亦好㸔衣桁簪花佩􅇸槖筆渾稱此風貌夷門路金尊昨日頻倒天涯尚未生艸同來恁不同將去撓亂數旬懷抱歸正巧算剪韭烹葵煑筍都堪飽寄聲短趙更瘦蔣風流癯莊緼藉相憶令人老虞美人二十夜楊孝廉敬之招集騰光館㸔桂艸元亭在雲溪北暇日能邀客寂寥深院倒金尊添得幾絲疎雨易黄昏廿年前記題詩處花壓闌干住故人多半起雲霄只我閒居尚赴小山招南歌子古州道中似柳應同韵疑花未解羞慣抛白足上危樓喜折連枝果葉插人頭生熟居然異形聲逈不侔怪來行立總如猴拗得脆蛇寸寸啖同遊生苗有能啖蛇者人月圓黎平試院作蠻中三月春光好新雨又新晴纔離豚水仍盤獅嶺又抵黎平昨宵上已今辰寒食來日淸明釀碧成蒼催紅做綠有甚心情浣溪紗楊太守席上㸔牡丹作雲作簾衣絮作塵向前還有幾多春艶陽天氣說生辰圓比十三將望月嬌如二八上鬟人畹蘭香味玉精神又杏花一晌花枝欲上樓東風先爲揭簾鉤和煙和露搭床頭百五時光容易過十三年紀不知愁初陽籬落悄凝眸菩薩蠻淇縣道中贈譚上舍子受靑泉落處紅雲碎馬啼亂踏林聲脆十里繞淇泉愁無靑竹竿遲行雖數里巳覺唫聲起知我欲回車來朝度曲徐桂殿秋飯已熟忽呼茶滿盤堆得雨前芽甆杯到手復揮去獨自開簾㸔杏華三字令天上月枕邊來似追陪香一盒貯玫瑰襯珠蘭和玉蕊髻旁堆羅幕外燕疑猜蝶徘徊鐘巳歇漏仍催婢朦朧窗􅂩報渚蓮開
