body:
  text: 陽湖洪亮吉著黔中持節集癸丑甲寅初五日近山堂消寒一集分體詠秦官人鏡鏡銘云天上見長心思君王八字六王雖畢閭左空男行築城女入宫長城東西萬餘里永巷迢迢亦無㡳宫中永巷邊長城内外結成􅁈苦聲入宫詎識君王面三十六年曾不見轉思天上歲月閒那識相見期仍難班班血涙銷難盡剰得團欒一方鏡擕來照影影亦寒明月尚作秦時看非珍异物思垂鑒背上千年土花艶君不見鏡銘八字誰所爲篆體絕似東封碑留伴斯刻千秋垂家大人命同作飴孫祖龍一卧羣雄起三月阿房土花紫千年宫鏡出人間徃事分明亦如此玉容顧影人争羨昔日紛華鏡中見驪山明月夜梳頭竹宫歌舞朝勻面鏡能察面難察心冷眼那及金銅人菱花徑尺青絲紐拂影都誇好身手可憐三十六宫懸不辨興亡辨妍醜天上迢迢望本奢昭陽銘後事如麻誰擕玉匣閨中物去照宜春􅁐裏花初十日潄石山房銷寒第二集題張太守鳳枝珠還圖圖爲太守侍姬冉氏所作姬母無賴妄搆訟端姬由是遣歸其母謀别嫁之姬剪髪自誓乃止同人感其義勸太守復迎焉爰作是圖名曰珠還亦所以美太守也瑣􅆹圍坐燭如山本事詩成手自删輸與清廉海南守六旬傳說去珠還自返蓬門百事非香雲和淚剪依微從茲百幅梅花帳不覺蕭娘鬢影肥兩條官燭影䦨珊百詰初窮語扺讕絕勝河陽舊潘令種花猶易護花難謂陳大令暇日間窺青瑣旁玉山筵上未頺唐扺他一曲翾風怨只有銷䰟淚兩行姫以訟事未結留貴陽守署匝月一日隨徐㳟人觀劇偶窺坐客見棫齊太守在席不覺垂淚輕車油碧許迎回紈扇親拈出鏡臺臨行徐恭人以二絕題紈扇贈之不是求仙舊童女肯隨徐福住蓬萊垂老休嫌善賦愁使君宗法本風流他時九曲梁溪上合與修成燕子樓十五日蔵春塢消寒三集題范巨卿碑額卽送張州守曾垿南還昨者黃少尹此碑刻係戊戌年夏亡友黃君仲則所貽貽我金鄕碑摩天石刻掲巨孝復有獨行名􅀌垂洪流浩蕩豐碑没僅識青龍舊年月八分徑寸誰所書無乃山陽縣君㠔傳觀足令友誼敦二千年來八字存若言至性刋金石不數王貢兼雷陳一篇論愧朱公叔中世交期益翻覆賣友人傳酈曲周面朋我恥蕭光祿史家創格非好奇欲與薄俗貞心期不傳吏蹟傳友誼此意亦愁知者稀開緘淚巳垂言下恨不還君伴長夜匹馬招䰟又一時荒阡種樹知何暇百徧摩挲紙亦光含情重送郅君章他時北上金鄕道酹酒應臨官道旁家大人命同作飴孫烈士相交祇情性一千年來傳獨行偶從山縣拓此碑姓氏偏敎坐生敬卓哉山陽范使君獨抱古意超倫羣豈其交誼足不朽乃􅀉金石垂斯文千秋一語饒竒㫖生死論交自君始始知友誼殊可珍交到重泉合心死郅君章與殷子徵未識死友焉知生長沙學生新野卒縱不生交亦心折巨卿好友不顧身落落死後殊無人幻形誰復論爾我一徃􅀡欲兼幽明鄕民翟循縣君薛留得金鄕墓前碣􅂐文不特軼八分好補酈元經注缺建安以來世俗澆􅁣然何止劉孝標願將剝落數行字持贈世人同石交蠻鄕刺史殊今昔況値窮冬束裝日偶讀廬江太守碑一篇還贈張元伯張州守瀕行又以素册索詩復成二絶句風雪連晨偶􅆡留行蹤莫爲左遷愁君看判府威名重絶勝西南領小州紅塵十載鬢初班却喜今因定省還欲借寒威暢離緒留君十日住黔山時留作消寒第三集二十日􅃪雨蓬消寒第四集同詠諸􅁑燈尚從遺製識英靈五夜軍書肯暫停収燼未應忘火德穴胸先巳勒金銘虚疑絶徼留銅鼓遠憶高原墮大星畢竟出師餘恨在至今燈影作深青卄三日寫歲朝圖贈馮巡撫光熊並繋以二詩如水臣門日徃還識公清節服諸蠻何妨饋歲無長物自寫黔南幾尺山餳香粥鼓滿平疇閙得花香出樹頭都是蠻方小兒女春風竹馬十三州二十五日思補齊消寒第五集卽題徐太守日紀陽春有脚圖何妨遣婢中閤聊爾充君下陳欲賜人間湯沐先回天上陽春蓮蕋屛風凍􅀨梅花紙帳春雲待過消寒九九預防修竹彈文附飴孫溫和足㡳有春光着意眞能識熱膓頓憶孤山林處士梅花多處太淒涼早從洗濯見風流一晌春華偶滯留不着人間閒冷暖此郷端合號溫柔一室樂恬靖房廊稍曲折衆詫若仙境堂阿鋪長筵胾脯雜餈䵃霜螯搗初碎鮮鯽巳剔鯁滇榴曁勻橘兼不棄梨梬南方來百物圓􅛔長者蠯歲除饒食品一一列盤皿非徒祀心神藉以壓灾眚明燈懸四角香炷紅耿耿高杯羅數十文石及生礦雄黃鐫兕虎犀角刻蔆荇或如肘生柳或􅀂瓠有癭争先誇大戸蓄意欲吞併盤飧來陸續誰識夜巳丙慙余少􅀌露敢說有殊秉時時避詩債獨處心怲怲永豐才尤竒筆早露鋒穎創爲小言賦剖析到句鼆南籠年六十齒硬截春餅雖然能飽啖不改顔痩㾪惟愁酒杯寛苦語求減省參軍揮千言尙說才未逞微知所宗法天問及哀郢浙西饒秀士遠復勝汝潁宰官仁及物讞獄繼張邴心雖尚寛大酒政獨嚴猛藏􅍐兼拇陣十九兾徼倖興酣開牖望繁麗富星景衙齋濶西北􅂩地得一頃雖非二三月春樹巳華靚兒曹不入座窗􅂩屢延頸大兒粗有筆頗復愛習静年來通􅃟學出語喜彪炳盤盤祭詩筵得預良巳幸小兒才十歲逃塾毎遭打攔門喧畫鼓日轉益頑獷阿翁防醉仆座外戲扶綆酣眠到童僕百問百不省皆言沐餘歡沉湎誰可儆窗櫺頭互觸蠟炬險失抦更䦨客辝主失笑喉復哽肩輿北風大各各蔽笭箵輿前馬居後爛醉戒馳騁何須更持燎太白光冏冏新正五日消寒第七集同人集陳大令熙藩霅溪吟舫大令以盆栽素心蘭見贈卽席賦謝此日何日窗櫺陰陰撫序不樂求我素心素心之人其室如斗街南巷西爲約良友春酒旣熟園蔬雜陳雖未投轄童先閉門離離光明一室四出重簾無人花影􅀂月坐客黙坐咸披素襟所愧空谷跫然足音移花居前移酒在左友知我心舉以贈我我家南頭一閣面山山桃水仙位置其間人之素心花亦相肖言詮巳忘静不索笑時或獨醉時還􅀌眠半窗冥冥香徹曙前賀方伯長庚屬題其尊人蘭竹卷子畫蘭不畫􅀨雨巳飛晴空畫竹不畫風風巳出􅆬中稜稜數竿風卷此楚波白亭亭幾枝雨亦勝楚天碧先生偶開門漢水澨水流無㾗先生偶楗戸蘭枝竹枝約同住卅年豈以畫得名轉借蘭竹抒幽情乃知氣味本無别與蘭同心竹同節一幅雪景一幅晴末幅皎月枝間明君不見蘭枝竹枝幅盈十并冩森森石林立展圖不及見先生竒石當前且長揖人日消寒第八集同人登黔靈山復迂道訪聖泉歸飮王參軍湛恩一角山房雜成三十二韵兩載逢人日三年住鬼方路疑窮北首􅀨欲破南荒過臘餳簫􅂃初晴筍􅄚忙願尋何地勝咸指此山岡峻嶺回天外竒􅄘立斗旁浮青界滇粤濃綠壓城隍交壁松烟暝岐途栢􅆬擋幾回衝馬首百折走羊膓積霰鋪層殿罡風響曲廊解鞍懸石磴易􅂂坐繩床果向僧衣落禽從佛面翔怪聲穿土穴仙掌拓蠻鄕半郭巒光歛全黔地勢張天龍煩說偈野鹿看傳觴更許陪開士凴誰禮法王客方搜古蹟巘巳下斜陽詎可辜清興仍須束急裝澗幽留剝蘚寺僻富修篁毁廟神無火陰崖虎有倀微黃辨樵徑曛黑墮漁梁聖水名終妄上人言投一錢泉郞漲起試之不驗同人擬易其名爲廉泉廉泉改未妨逸情嫌晝短回路覺川長候騎依官柳宵鐘出女墻雙街籠燭樹一角訪山房濁酒何能減逋篇久不償􅆪裾來淨域旗鼓集虛堂當代爲長句羣公雅擅場俊才同鮑沈堅筆鬬班揚設榻容􅀌卧行厨約徧嘗擁爐斟淺碧升閣望空蒼此㑹多應羨他年誌勿忘靈山今夜月添影照詩狂十五日五鼓起看雪攔門語忽驚僮報四山晴蠻地少冬雪逢人詫夜明冷光飛列帳寒影淡􅀌檠幸有辛盤在聊將卯酒傾陳大令熙藩屬題城南雅集卷子茲方當九日撫序却三秋早陟高眞觀客秋按試平越九日在高眞觀登高遥思甲秀樓果然逢大尹于此集名流愧未陪逰􅄚題詩􅇰上頭十六日消寒九集湛碧亭禪房看雪至二鼓乃返及此初更後冥冥雪乍晴林巒互蕭瑟水月與空明兀訝樓臺影寒流鳥雀聲倩誰圖作障一角傍山城蠻方慙久駐豐歲喜頻仍一尺道旁雪萬家門外燈爆從氷柱裂月共凍雷升是夕大雪中有雷聲此夕清虛景還應念遠朋時徐太守馮開州以疾不至寒風送別圗送張太守鳳枝南歸甲寅新正十二日太守遭外艱去任將于春杪奔䘮南歸同人欲作黔山折柳圖贈行余意有未安易爲寒風送別葢仿燕丹時白衣冠送荆卿之例攷白衣冠本弔服非執䘮者所衣吾輩與太守交厚于其行故當素車白馬送之情事方稱爰賦三詩卽邀諸君同作名山人日記勾留乘興聊同麋鹿逰一度巷門重問訊麻衣如雪感蜉蝣歸及江鄕五月時北堂正好夢􅀌兒思君欲贈忘憂草不向風前折柳枝易水千年事巳陳歌聲猶􅀂繞梁塵何妨更舉前修例皆白衣冠送此人初春折柳圖送陳大令熙藩北上前年來黔陽長官攝疲邑貴定城東南馬前驚一揖昨年駐㑹城長官爲劇縣衙齋欣咫尺投謁乃無算長官爲政甫及今大吏拭目民輸心琴堂愔愔静撫琴暇復伴我耽幽吟一行作吏何嘗廢赤棒森森墨胥避簿書叢裏集賓朋􅁧得城南一篇記謂所作城南雅集圖記初春柳絲黄及肩拂拭鞍馬行朝天蠻方百姓心難足官好更防遷去速燒燈節過持瓣香私向山神社公祝十月種麥四月秧官歸正好麥上場吏胥無權戸殷阜但祝官遷此方守出貴定城雨至高家塘稍止今晨山氣寒呵凍集徒侣行穿石罅中濕霧黑如許蕭蕭松竹徑馬首寒不舉前旌瞻後隊似隔烟萬縷忽然衝山風捲去一層雨稍復見晴雲山樵喜相語自蔣塘岡至谷洞塘寒空時復捲風聲石削橋傾道未成忽訝禽巢落人語山樓都向竹梢生連山無際水無涯過嶺南來一徑斜不是數聲山犬吠全邨都被雪花遮早發谷洞塘一峯雲一峯雪一峯冥冥影未開猶帶前溪夜深月須臾天平明月向雪峯墮冷光百道飛撲人穿得白雲如縷破前山日欲岀後山􅀨復來深谷隠隱喧輕雷君不見蠻方氣候殊凌􅅍曉日須裘午須扇落月西塘馬首迢迢溯北風兩山青破酒顔紅我來似欲齊昏旦落月塘西日正中將至都勻道中一山途四出一水流百曲山奇方礙帽水冷復紫足途危輿轉穩空處交竹木前行皆俯視一綫入山腹茅檐無冬春􅄥􅄥土花綠花苗迎使節半嶺注紅燭十里戍鼓鳴蘆笙響空谷橋頭汎過橋方數折正對石塘西却望來時路蒼蒼樹巳迷野蔬全上屋春水半吞堤莫厭山程緩才􅃪日午雞初六日小雨至都勻府西門外試射士半里冥􅄥霧山邨􅀨不成野雲隨地落春樹接天生白訝懸泉影青流飛矢聲射堂寒較甚馬過亦驚鳴初七日射堂試士畢登劍河橋聳翠亭望西北諸山沿流都有鷺􅁝飛空翠時時沁客衣忽訝危厓􅋓人影似驚鳴鏑啟山扉回潭西去綠沄沄一角樓臺上夕曛傾耳却聞空際響入山雲鬥出山雲匀陽書院春望春波濶處春堤狹十二回塘滿浮鴨晴鳩催換裌衣忙樓上人閒盡開篋半城花香裊􅀂絲新綠對岸愁參差銷䰟別有東風柳絕似春人十五時多結塘多結塘邊􅀨似麻沿途風峭尙飛沙無人知道春將半時有出墻紅杏花晩度大登高小登高諸險一山當面氣冥冥高下燈光接樹青不是􅀨絲飄左右玲瓏猶認半天星都江舟中危厓春正半花氣欲薰天劇愛東風樹斜生北斗邊淩空自樓閣絕壑􅄅雲烟一帶人家好簾垂飛瀑前下陡坡渡鷄賈河上征誠云難下逹亦非易橫空旋􅀂磨百折始及地藍輿寧敢却頭上壓飛騎欲前仍縮足矗處石犀利胡蝶忽一􅀟飛來立人臂厓窮坡復陡入􅂩途轉細平視雞賈塘斜陽落巖際羊忙塘行徑羊忙塘奇石破空下壓雲排萬仭時裂一尺罅飛泉頭上岀光景相激射稜稜峯斷處欲徃少凴藉馬首卷北風􅀌桃向空謝杉林轉􅀩密間亦露臺榭頗念北山人幽棲􅀂長夜石檻灘俗名石門檻始棹發都江江干日初起鑼聲行不絕奮迅巳百里蒼蒼兩邊山厓斷石將圯驚梭時一擲險欲没潭底石脚萬窽鳴時時出濳鯉前行經石檻舟子展然喜風暖日亦晴沿邨數桃李雷音灘一舟挈一繩一繩長百尺繩頭持十輩畢力踞巖􅂩高􅊠懸半里觀者咸失色一瞥倏巳過微驚眼光黑危崖排石齒都向舵樓􅋓我僕忽失聲頭􅊠險遭嚙長年欣過險緩棹出厓側却望四邊山蒼蒼路仍塞都江夜行前山誠欲雨其奈後山晴澗水忽然暝李花無數明墨鱗成隊岀白鳥破空行卧聽花苗曲勞勞􅄙送迎古州登抱膝亭春望山城二月花光足空處香飄萬家屋桃枝揺岸柳拂簷花裏兩兩懸珠簾樓臺影外春陰薄試茗重登一層閣日斜盤馬射堂西却送菜花黃出郭抱膝亭望憇園花木甚盛欲徃未果小築烏蠻地全家綠水灣數聲花外􅄚千尺􅀨中山午倦童呼茗春閒鹿抱關上頭容展眺未肯說緣慳渡溶江登五榕山兼謁諸􅁑祠作溶江江頭石如磨五龍徘徊一龍卧排空一石支一樓高榦四出扶樓頭一枝雅復高羣木樹腹空于百間屋􅊠枝欲雨高葢晴臘雪尚向枝梢明年深樹古禽難宿剰有一巢藏廟祝行人入廟火伴驚嗚嗚角聲巢上鳴孫司馬鑑招同彭軍門廷棟書副將麐飮署西諸􅁑臺並角射至二鼓乃返䦨干曲處林陰􅀡官裏春閒試鳴鏑平坡十頃吹細香日色裊裊垂鵝黃笛聲初停鼓聲警舫屋深深􅀂居井忽地排空雨作絲梨花白得春無影八匡塘一邨都不見全被李花遮澗水到門合山樓出樹斜露光開梵刹雲影抱人家時有遠香至應知春事賖夜宿寨麻有苗女年十三四者結隊來歌苗童吹蘆笙和之歌管初停舞袖忙燭花紅處勸飛觴前身合是梁間燕猶着烏衣入畫堂苗女衣裙皆黑故云山中夜行小􅀨乍三日梨花合一邨夜燈紅覆屋春樹綠當門卷幕留禽影開扉驗水㾗更殘月將出山氣尚昬昬九朝塘嘈嘈天半響笙簧雉尾排肩繡兩襠三百蠻姬擁前後藍輿飛過九朝塘大容塘値春分薄寒初散酒初醺炊火斜連嶺上雲小閣兩層山四面百花香裏度春分宿路􅇛行館使節遥從柳外村一間茅屋侣鷄豚妖禽入樹花先顫薄霧吞簾鏡亦昏吹夢夜風寒有影接天春水月無痕柴扉莫謂誰來欵宵半驚雷欲劈門將扺黎平厯滚馬坡諸險古州及黎平天黒少白日忽然雲際一閃紅天外雷驚劈山出沿山巨石悉欲崩轉眼巳失千家邨白雲茫茫時吐吞陰厓束人疑鬼門一坡􅀡下如注矢削壁棱棱僅容趾輿夫歎息何至此呼吸真堪判生死峯形中斷裂􅀂溝鞭馬一躍愁回頭前峯行完後峯起上欲摩天下無㡳眼前親切雲霧生足㡳忽巳開山城君不見平岡鱗鳞鋪萬瓦􅋓起一峯名滚馬岀黎平南門街衢南北嶺西東柳外高樓面面通一晌曉霞紅不定前旌行入百花中依然江水綠無邊不信離家道七千絶似踏青南陌路暖風晴日裌衣天射堂卽事出郭􅄥􅄥霧林烏背客啼梨花三百樹白到射堂西隔岸坡陀好人希馬作羣過橋飛矢急穿破一溪雲極目望層城春融萬家屋祇覺遠天􅊠靡靡接新綠山樓鼓角忙歸􅀐出橫塘無數春人影斜陽落女墻南泉山今朝天氣晴靈鵲聲有喜言遵南泉山异境乃獨唘喬枝森上聳側出悟石理生翠􅇈一山空青露如洗蹤疲方問路絶頂尚三里裊裊石鼎香迎人入亭裏天風盪衣袂雲白欲緣􅂂卑瞻窮萬仞微辨㸑烟起却哂下方人經旬居釡底靈觀閣春望千折泉岀山百折人上嶺尋源至亭側石闕方􅀂井禽聲千百種蠻語本難省手掬石上流呼童試新茗郡齋憐窅寂飛􅀐餉春餅幽人居絶壑搆屋恍橫艇微風振林杪斜日逗光景䦨干飛百尺坐處據松頂半日衣袂香􅄥􅄥逗花影過少寨河橋平蕪一雨春花謝濃綠樓臺􅀂深夜雲陰如夢不逢人澗水分從馬頭瀉波空􅀂行明鏡中鷗鷺兩兩舒春容水田百級行方半攔路野雲蹊忽斷牽衣避道厯少時大石如牛復當岸行人欲歇嘶馬催村店正向雲頭開山􅉾石磴暫延佇衣上綠綴寒莓苔冥􅄥路向松梢破絶頂一山如石磨清泉落處花朶妍山翠壓樓人尚眠平江塘晴鳩聲裏燕呢喃高下藍輿睡乍酣好向春波寄花片迢迢此水入江南春殘是處綠芊眠十里平蕪盡􅅁烟胡蝶欲高高不得野花黃巳上青天出錦屛縣城上斗坡一山綿一縣高下里三十高者仰如跂下者俯如揖愁霖行撲面碎石險埋膝中途勢倉皇懸溜復飛及天風下林莽石窽自呼吸蟠澗三兩松人禽亦争集厓深羣燎火盪此衣袂濕濛􅄥雲氣蔽却向空際立石罅忽唘扉生苗下山汲黃泥峽馬蹄真巳踏千峯上嶺叢杉下嶺松當午日光分顯晦南山雲淡北山濃誰將界石作横梁上是黎陽下㵲陽怪㡳廟門開向北南行不炷嶺頭香紫雲橋春山一片疑無骨都作紫雲扶曉日馬頭隨意厯西南無數樓臺復飛出沿溪一橋如一舟橋上三面開朱樓前旌後隊何回緩似向長虹腹中轉橋心倒插十丈餘飛葢過處驚遊魚君不見一山前頭復如井却喜嫩晴鋪十頃師子厓我行及􅀟溪大石黑半天人緣石􅂩中有􅀂蛇蜿蜒危巖何陰森行處正壓肩懸瀑復四飛時聞響濺濺藤蔓百尺垂倒岀花朶妍空處􅋓一亭簾垂裊青烟延回岀層厓萬頃鋪水田清絶半里程人家總疑仙沙鳥亦有情飛蹲筍輿前早發卭水早行出卭溪殘月溪上漾濛􅄥千樹花正􅇁卭溪上花朶落盡巢禽不知逰魚吹花香氣􅀂絲花光深萍色淺襯出魚苗綠千􅀧枕波樓閣三百家春夢正好驚啼鴉橋東覔路才能出暗影溪頭自飄忽千林綠重曙不開一樹梢紅甫迎日瓦寨半程卌里走沙礫一寨四面圍松枏雄黃出穴百蟲伏牡丹壓䦨羣卉慙洞形如扉日韜采天頂􅀂握雲拖藍相㩦活火欲烹茗却有死谷邀停驂鬼鳥塘石徑空􅄥露有光四山風刺裌衣涼杜鵑一樹紅于血月黑愁過鬼鳥塘路瀨塘道中路瀨塘西石逕遒人家竹屋半臨流􅊠飛胡蝶高飛雨百種花香出草頭高下岡巒馬去遲緩行剛及午晴時山南一片波如掌閑看兒童捉活師雨夜至石阡溫泉浴月黒雨聲愁穿林到嶺頭似防湯谷沸飛瀑入池流昨宵江水深没却江干樹老鶻無處棲從人屋檐住延江兩生行示貴筑熊生煥章思南安生延江水流千里一生居江頭一生住江尾熊生十八貌􅇰癯自搆竹屋臨江居一室窘乏文豐腴安生英英年十九從宦三年住清口尊人官江南桃源令落筆居然學劉柳我前持節來衡文萬言日試童子軍惟二子者超倫羣雖然日課文一篇不􅀂日讀書一卷赤文綠字填方寸激電驚虹注􅀟腕嗟余遲􅇀猶勤學矧復生年甫當冠九垓一瞬何難届尺璧寸陰寧得換抉起三霄翮欲全遠行百里程方半佇看子筆排風霰㑹見余言匪河漢君不見蠻中一雨何綿連延江水流行拍天吾曹學術亦如此努力來看有源水袁太守純德招遊城南文昌閣並歸飮署齋卽席賦贈并壽太守七十我前逰秦中聞君宰米脂十年來荆襄君官擢同知盤盤政績推尤異佐郡淹留賞心地尚書清節號知人我作門生君屬吏昨慙持節來黔陽君亦五馬官思唐秦中知名楚中見何似黔中日謀面春殘約客城南頭江漲欲從城上流看花步幛逰山􅄚誰信使君年七十窗櫺八面閣四層飛步早從高處立日斜回馬東南街轉厯百級來官齋亭危正面延江口我飮一杯君一斗眼中落落五老峯且挈浮邱爲君壽雨發思南袁太守純德鄒逰戎寛率兵弁出小厓關相送卽席賦贈一首袁君揖我處絶壁立千丈藍輿方欲下飛瀑眼前滉竹亭留少坐茶話覺清曠雨立三百人升頭致微悵愁霖敢安坐急騎出厓上澗水奪路流巖門不能抗前行泥滑滑黑霧馬前障五里甫岀山晴光草頭放發都匀日枉道過七星山入仙舟引洞偪仄疑無路隨雲七里東水從深徑黑果向怪厓紅削壁風徐下幽軒日乍中正憐書韻好鳥語復􅌑瓏諸生徐時英等讀書其中
