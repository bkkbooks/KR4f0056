front:
  text: 更生齋詩卷第七
  hash: sha256:d4e5ffd025b7f696f40c34333e8cb78ca9d7a23e9c5039b92ebb1c4b90c1d70d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_007-1a}
body:
  text: 陽湖􅇝亮吉著西圃䟽泉集競渡燈船行燈船尙隔三條橋寶氣已復衝層霄三橋百巷宻如櫛波上厯厯人聲􅅝須臾赤熖將橋鎖分半樓臺燭光裹林鴉林鵲驚四飛鴉背鵲頭都帶火忽然龍爪攫半空千人萬人看燭龍橋囘風􅀔亦稍緩龍忽正面停波中橋南百尺波如沸龍甲龍鱗照天地妖狐竄水魚登岸光景欲從何處避綠楊枝頭閣幾層無數紅袖圍紅燈船燈􅀡與閣燈接咳吐落處雲霞烝百舟迎龍百舟送别有百舟排不動三更以後扺北關一派火光飛入衖鉦聲已遠簫聲起裊裊聲驚入雲裏蜻蜓舟小琉璃暗有客􅄈衣出蓬底雲溪我住三十年客夢只落雲溪邊囘船復向溪上過衫影笠影人疑仙曙光曈曈斷更鼓千萬燭光收入浦君不見何如天上兩燈忙圓月乍傾圓日吐跋錢三維喬自製壙銘及三幻圖說後雖非祖道雹河干易水一名雹河紙上蕭蕭風色寒君是生魂我生輓銀牋聊當白衣冠太虛偶爾綴微塵詎有前身與後身多少樓臺雜松竹君皆疑幻我疑眞宗忠簡祠六百年來氣不磨江干遺庿欎嵯峩迎門九派東歸海卧榻三呼北渡河夢裏銅駝餘涕淚望中鐡􅀐敢經過劉琨祖逖應同􅀓未了忠心尙枕戈陳少陽祠少陽祠外駐征輪國士應知爼豆尊已􅁴舉朝忘二帝不妨在野蹈三仁捐軀子諒彈仙客並世朱雲値佞臣一様書生心跡異酋前叩馬又何人城渡橋訪明唐襄文讀書處荆川臺址尙崚嶒􅁲宅當時愧未曽余戊午乞假囘將􅁲居于此後不果君慕古人三不朽我甘世事百無能牛腰卷軸􅀓難必馬革功名謗已騰何似掩關長􅁍掃白頭仍擁讀書燈讀晉書偶成剩得荆揚半壁天偏安王氣尙綿延生憎謝客稱山賊死笑孫㤙作水仙南渡化龍􅂊幾日北來飮馬是何年茫茫萬里中原土只惜無人肻著鞭七夕京口淩江閣待友人不至率成四絶卽􅀉張文學崟郭孝亷堃曁及門于生淵兩株高􅀣􅀝檐前􅁍擁秋衾自在眠絡緯乍停蟬又響曉霞紅入寺門鮮煉丹臺畔値佳辰也買甘􅀲向曉陳不敢更談天上事久安心作謫仙人北固潮頭未肯降忽驚人影出蓬窗誰言一葉舟偏小滿􅅁秋聲過北江年來百事總闌􅃢門外江流亦漲灘一枕水窗眠未醒算來還比白鷗閒是日過聽秋軒飯并觀􅀲果筵作華堂乞巧筵商略祀牛女天邊瓠包星筵上戲摘取華堂乞巧筵商略坐宵永籬角牽牛花迢迢妒星影隂晴客不知榮悴草無語門前洗手花門外洗車雨天孫􅂿鵲橋中隔雲一片靈鵲不擡頭何由見仙面千聲與萬聲蛩響一何切天邊方停梭地上已促織天上星神過人間兒女忙欲知霄漢事除問杜蘭香擕于生淵夜半剪江至焦山百尺驚濤内呼舟半晩過夜帆明螮蝀秋浪狎黿鼉舊雨南徐少囘風北固多到山山已黒撼􅀣且高歌焦山山頭高士壟山下大江潮一柱中流兀千年古像凋氣猶淩北固名欲並南譙山本名譙山且把心香􅅡魚龍未敢驕張秀才學仁􅀉槎圖家山同百里各復感飄蓬我在昆侖上看君滄海東枕戈馳遠夢振袖揖長空咫尺天河近無須更使風吾鄕錢生履坦在南昌日作梅花卷子􅀉萬刺史廷蘭到日正値刺史八十四壽辰因繪爲長卷刺史并作詩紀事邀同人共賦此梅公手植梅壽亦輸公􅁍喜南枝早香浮北屋中老來長句健客到一尊同他日花開處先酬百歲翁翠屏洲秋聲塞港口風急船不過江蘆明百頃一叟截江卧游鱗逐驚蛇居然上舟柁嘉魚港大水抱細水水盡波忽動中有百頃潭嘉魚歲堪種食之可平心兼乏江海夢種竹軒百竹綠半村十竹綠一巷人從巷口立時與竹竿撞海上螮蝀來餘光半軒絳巨公厓重來巨公厓石石悉迎客惟餘一石傲壓客險及額石上雲亦奇􅀌飛上天􅀡初九日鄒水部文瑍載酒相訪因約同人松寥閣小集分韵得聲字難得新涼載酒行酒兵鬥罷鬥心兵江光入夢仍如練秋色摶空若有聲悟後雨從衣上落醉餘天向笠邊横京華舊事勞重說卧看潮頭滅復生初十夜山半歩月至三鼓始囘出門看山光月色忽無盡􅄕前秋景好花氣亦徐引江光山光新月光􅀧入秋色逾蒼涼花香堂前一杯酒杯底清光無不有三更以後月愈明興發我欲淩波行秋花倘􅀧頭秋竹若摇手秋鐘泠泠恍開口一風吹人入竹樓竹樓旁邊茶百甌茶香雖清客沉醉七尺竹牀三客睡花香亦若憐酒人忽灑花影來周身夜光齊収夜鐘歇􅁍夢酒魂飛入月十一夜東昇閣看盂蘭盆放燈作一燈先出法界樓大魚迎燈争逆流燈來大魚忽然竄一鬼一燈擎不亂三燈五燈波靣停鬼欲待侶方同行有時一燈衆鬼擎惹得燈影皆深青燈光時分復時集鬼臂壓魚魚􅀡立燈光叢處鬼亦夥魚驚避鬼欲出波大聲軒然波上起盡捲燈光入雲裏鬼車鬼馬已四飛燈去鬼伯愁無依洲東洲西萬聲沸鬼氣居然避人氣樓頭仙客正朗唫􅈭得波響如鳴琴君不見神燈紅鬼燈綠入海無心竸遲􅄩東流燈影西上潮鬼􅀔瑟縮魚龍驕萬刺史廷蘭邀集令子承紀丹徒官􅅟小飮卽席賦贈萬爲壬申庻常前輩方壺員島振公名八十年來始合并佳士盡看稱弟子靈光眞欲比先生南遊畫鷁仍須迓時約遊吳門日便道過訪東下飛蝗偶有聲適有飛蝗過境幸不爲害今日宰官誠不易好􅀓良法拯疲氓刺史居官舊有聲江口待慧超僧不至􅁍􅀉一首松寥髙閣不同登一榻慵眠醒未曽僧性􅆟嬾我憶放生池上路秋花病寉與􅀌僧月波臺夜坐月色轉綠天光青松梢盡處明一星星光忽隨白露零倒射北斗光泠泠星光墮後山光暝竹屋居然覆漁艇三更向盡吹曉笳海上已復生紅霞林下二髯圖爲萬刺史昆仲賦北江一漁舟日昨泊北固欣逢西江叟相與話情愫叟顔如春髯若㦸髯上泠泠流古色比肩令弟何不來與共官齋話晨夕見公與公語别公展公圖我題詩贈公公見應軒渠君不見林泉不復營生計只有公家好兄弟一執奇書一如意后泉淙淙㵼竒氣石上松花積何膩山果投林有眞味阿兄詩成属余季老友寥寥亦堪􅀉石門前頭百級砌老木千章萬章蔽門外紅塵卽如沸一山遊完一山替五老八公時把臂我昔亦是神仙吏謫下九天居九地他時華髪倘下垂曵杖從公共遊戲六月二十日偕同人載酒至城東陸氏中隱園看荷花至二鼓始歸率賦今年水滿荷花􅊠前後一月稽花期花期忽展六月杪花朶如盤色逾好陸家荷榦捎城墻隔城薰風沸滿塘檥舟亭畔一􅀟燕聞信遠復來尋芳雛鶯縱老尙引吭蝶翅不待秋間黄花前十客羅百觴過午一一來追涼花枝迎客若問訊一客一花須坐近坐久未窮花底藴花下蛩聲亦殊韵殘蟾出水光何陟花竟嫣然開笑口看花親切花轉羞花己低頭客濡首花梢蓮實花下藕花底誰人小垂手引得荷盤貯杯酒月影星光滿盤走看花旣足酒亦完花外尙有千琅玕深綠影䕶紅􅇛欒不須更與花朶語花外鵲聲催客遽一半酒人穿竹去陸孝亷繼輅洞庭緣樂府下第才人暗自傷忽驚竒福出尋常龍堂入夜波如海别展鮫宮作壻鄕玉茗花殘閣亦傾是誰拈筆與争名到頭一例神仙夢樂府新􅀓兩柳生陸公子鎔邀至城北看荷花而客坐正與花相背率賦一首時將遊焦山屋向南頭水北頭背花開讌我殊羞預愁簾蒜􅃒香氣聊折荷筒抵酒籌有客苦談當世事是誰能代古人憂深杯到手休辭醉明日征帆向􅃳州清泉濯足長卷門前水屋後山山深深水潺潺紅塵三十年足垢久當浴尋常一曲流又恐汚吾足竒峯千叠谿九囘溪流曲處􅀧碧苔客欲濯足時歸來足垢旣濯登峯若飛盧敖仙人世外可期飛空游行有時倦展我北堂三萬卷吉金樂石東西列􅄝硯居然又成癖周秦􅃔器唐漢碑硯材端溪復歙溪何日約客來􅊧竒我擕蜻蛉舟爾居鴻㕍浦挂帆一日卽詣君與闢一軒談邃古年來里中賽神之㑹事事競勝較十年前費已百倍矣感而賦此時七月望日俗所􅀓中元節也令節尋常事奢風幾歲開綺羅裁幟翣金玉裹輿儓神豈餘威及人争罄産來徒充里胥槖一日醉三囘鳴鳩圖占得危巢復幾時滿天風雨劇相思一枝費盡林鳩意只有山禽總不知江流斷處有停水數十歩荷花盛開偶賦黄雲昬處盡黄蘆留住荷花世界無渚上鷺絲爲料理約風三日水平鋪新搆卷施閣成登眺偶賦萬瓦縱横內居然峙一樓愛從雲盡處看到郭東頭世味都應熟吾生合少休掃梁迎舊燕相與話初秋題范秀才來鳳鐡琴詩草以鐡作簫以鐡作笛何如鐡琴聲出金石琴或以石琴或以銅何如鐡琴逸響遏空君家鐡琴詩堅古亦如鐡前古與後古試問欲誰敵一編能窺天地心白電掣屋霜飛林我擕君詩及鐡琴海上落落求知音月夜登北固更望金焦二山囘途與友人憇演武㕔小飮作更從石脊眺昬黄無盡江流入􅄅茫百歲過人疑短夢兩山與月鬥圓光鸕鷀影逐浮漚没蟋蟀聲隨墜露涼北府健兒京口酒算來今日摠尋常哭同年楊大令倫一生心術及詩萹都復研摩到昔賢稷契許身聊復爾君生平作詩服膺杜氏所著有杜詩鏡詮二十卷羲皇入夢􅆀悠然塡胷卷軸逾三萬歸骨程途􅄅七千未敢與君中外叙予與君皆蔣氏甥君母則余外家姊也忘形且自託齊年登别峯菴望海忽値風雨朝曦色染滄溟綠東望海門如半粟滄溟􅋓處天蕩搖頃刻已見西來潮􅁚山南頭蒜山尾一舸倒流還數里風威不敵潮􅀔狂吹角北岸停帆檣君不見日居萬瓦鱗鱗內眼暗頭􅊠殊不耐此時懷抱覺暫開足㡳隱隱聞驚雷天公似把炎蒸洗東海叱龍龍盡起一晌江都電影來翠屏洲上紅三里山中避暑聞同年曽都轉燠將報􅆟入都􅁍􅀉一首野客空山避暑遲正聞軺􅀓入都時西京鹽鐡何妨論南國鶯花盡入詩應有功名参計相􅆟憐風味似經師愛才一例尤難及報到平安杜牧之地燈行五月朔燈髙懸不照地乃照天七月晦燈下墜不照天乃照地燈髙懸禮北壇土人云天燈爲天地水府而設其實元張士誠有德于蘇常蘇常之民于其死日懸燈一月以報之託言天地水三官神也天地水府稱三官燈下墜出東郭幽明教主轄萬族俗􅀓地蔵爲幽明教主天燈不接天僅與星斗聯地燈不貼地都復􅇁堦砌地燈數比天燈多五里􅀡接官塘河雜以梵唄兼笙歌千舫百舫燈前過君不見天燈完地燈接更有水燈波上貼三燈看盡無燈看秋半皓月升團圞偶檢故書得三友人遺札各賦一首通政司副使錢灃早年重望出遐陬六詔人文第一流作史舊曽居柱下建言頻見伏螭頭鷹從鳩化心仍恕蓬自麻生節亦遒君與余同年葉舍人雯􅆟善嘗共寓居毎以名節相朂我是庾公樓上客彈章􅀓到亦生愁指甲辰年紏陕甘署督畢宮保一事太子太保提督花連布提督死事尤烈其諭祭碑文余在翰林時所擬進也與余同官貴州交契尤宻生平本以志墓文見委故所􅁧碑文叙其死事頗詳盡云尺書肯爲故人題已値倉皇盡命期生戴頭來知秀實死餘膽在說姜維蠻荒屢共中宵讌絶徼曽褰大將旗君先在金川署功八百里騅休更御送公天上去􅀐箕君有善馬嗜之成癖鳳山縣知縣贈雲騎尉湯大奎廿年里巷憶同居廟食今看義烈俱君少時與余同居中河橋委巷中巷口卽隋陳司徒杲仁祠祠額名英風義烈未到斷頭先墮指􅆟憐歸骨尙銜鬚書埋魚腹濤空沸餉轉羊膓道苦紆君年前曽解餉甘涼畢竟酒人能報國君尤善飲霸陵醉尉亦捐軀時里中王麗可亦以佐雜殉節陕西近築西圃將次落成偶賦八截句堆胷竒氣漸銷磨山不嶙峋水不波只有露臺高百尺偶然平視到羲娥薙草澆花久乏人攤書聊剩此閒身不妨我少元章癖滿架傾欹滿座塵荷戈歸後鬢初絲未碍齋頭睡起遲忽夢天山萬年雪一燈如豆酒醒時轉憶童時奉母居三遷遺訓尙欷歔半間板屋􅀌兒占聊扺親存侍板輿心事初冬鬢晩秋衹餘春夏氣仍留旁人莫笑閒居早五岳遊完住此樓人說池亭入畫圖臨流時悼影形􅀌防他春到鳩鳴急巢好先無婦可呼作逹時時憶樂天尙嫌七十始歸田一􅉌一壑吾應足不更描摩池上篇屈指平生志業虛勞勞蹤迹五旬餘東西豎亥行將徧􅂊得蝸牛一角居蔣通判騏昌官興平縣日于土中得漢張騫印一方興平古槐里也壬戌歲出以相示并属作一篇以紀西京世數􅀓至九文爲仁君武英后張騫鑿空縱萬里金印何嘗大如斗姓名惟剩玉一拳誰果好事爲流􅀓玉方一寸白如雪或者采自黄河源當時開邊承意指堂邑氏奴同出使隨軍卽以勲得侯終是人間妄男子功名雖竒意則妄地上行完厯天上惟應地下名不􅀓想欲擕之伴深葬騫經絶域我亦經衹少一棹天邊行伊江􅀓有故侯碣伊犁􅀓有張騫石碣􅊧訪究未能得也搜訪百日終沉冥四周雖完一角折世上誰能盡完璧漢家末葉益可傷􅀓國璽猶輕一擲君不見廢􅉌千載剩荒􅉌故物摩挲說故侯國士一坏何處覔轉因槐里憶朱游朱雲槐里人墓已無考同里戈裕良世居東郭以種􅀣累石爲業近爲余營西圃泉石饒有竒趣暇日出素箑索書囙題三絶句贈之竒石胷中百萬堆時時出手見心裁錯疑未判鴻濛日五嶽經君位置來知道衰遲欲掩關爲營泉石養清閑一峯出水離竒甚此是仙人劫外山三百年來兩軼羣山靈都復畏施斤張南垣與戈東郭移盡天空片片雲中秋夜坐天上風初緊人間暑盡収獨搖明月影頻訪市橋秋暗響蟲藏砌華燈燕出樓年年當此夜坐待曙光流八月二十日扺寧國同年魯太守銓邀遊北樓并留飮桂花􅀣下賦贈二首自有兹樓復幾年争傳句好問青天人言李白曽􅊠首我是􅇝厓許拍肩不覺玉盤遲出海何訪金粟早開筵羣仙高會今三度余與太守同年同門然把晤甚少惟己未歲太守謁選入都㑹飮二次及此而三耳一榻仍容醉後眠汝潁東西頌宰官一麾出守又江干魚頭参政家聲古鶴背仙人鬢影寒秋老茱茰先釀酒衙荒苜蓿罷堆盤凌教授欲招飮以此而止升沉中外誰能記仍作龍華㑹上看半月臺久坐正値下􅁌候來登半月臺夢中雙􅄚遠足㡳萬扉開閱世餘喬木流光漬古苔他時闌楯葺太守欲修北樓及此臺應許醉千囘席上喜晤施上舍晉賦贈十年不遇施居士金粟花開偶來此白須居士金粟花我鬢亦與霜争華主人開筵當日夕夕日暉暉照杯赤我傾一斗君百杯秋老頓􅁴春風囘陵陽仙人作校官邀我苜蓿餐闌干我嫌苜蓿不救飢􅁍向太守求甘肥山隂之尊飮不竭滿案溪菱間山栗仙人赤鯉膾作絲興􅀤不顧琴高􅅓青松枝頭碧月來移酒欲上元暉臺眼前百事不措意肘後花朶驚齊開山禽飛囘水禽集只􅁴樓高渺難及何時百尺爲貯梯時北樓梯拆不得上送我白雲頭上立琴溪客館作拉拉雜雜彈琵琶蕭蕭瑟瑟開渚花青天沉沉忽無見殘月黯黯生光華迢迢溪水何方瀉漠漠山窗已成夜膠膠擾擾鷄一鳴雨􅀧落落煙冥冥曉度篛嶺屏山髙萬仞厚亦徑千尺空明初日照表裏恍不隔寧知深谷底夜氣未収墨白鳥􅀝􅀣眠青蟲抱枝蝕林梢開百里下嶺􅀔尤仄天都雖半露地脉已全坼平塗無十歩絶頂一關阨亭午日氣紅楓林亦齊赤夜宿許村許村凡五里路險客難到囘厓視昬旦絶頂􅋓夕照高􅊠皆萬仞山石時露竅昬鴉無􅀣集占此社公廟原北色已暝原南赤如燒蹤疲思托宿地陷忽如窖明晨還屈指卅里路森峭夜半囈語多擔夫時競道與程吏部振甲話舊精廬百里走難停依舊山排􅄚齒青老眼讀碑猶似月故人堆鬢已多星揮毫尙記参旁午君久値機廷鑿險今看邁五丁君尊甫虚谷先生修箬嶺南北道幾及百里至今行人德之君又續修府城中道八門皆徧􅁍喜過庭詩禮在半傳家法半傳經程君欵我于丹􅉌精舍前後凡五日醉後率成二律卽贈令子待詔􅇝􅄎􅅁得天都夢來眠石室雲半庭花韵寂一谷草香薰李白金魚佩羊欣白練裙醉中揮墨嬾且與話離羣山雲猶殢夢山溜已驚眠林果堆衾上秋蟲出枕邊宿酲吾尙病縱飮客疑仙問訊諸卽好溪茶手自煎河西橋太白酒樓歌同汪孝亷燡及程待詔􅇝􅄎作春人不肻留春燕亦難駐秋風開簾帷微黄入山􅀣山葉欲落禽驚翔紅樓参差已夕陽一千年上事誰識樓上有客傾千觴新安茶多苦無酒何似山隂剡溪走仙人遊戲無定方飛去飛來亦何有我疑黄山六六古未開五字那不題元暉不然元暉去後公復來何以長句不賦空銜杯驚人句好公問天我轉欲問公從前惜哉仙人蹤跡不稍待衹見樓外山色黯黯谿水鳴濺濺公前衹有樓公後復有橋石橋千歩樓百尺遠視城郭何迢迢白雲中間立少時適有遠札馳相思時得方明經如川札約遊巖寺同遊年少亦清絶瀟洒並若崔宗之君不見樓頭一派揚之水􅀡下嚴灘復難待故人憶我我憶公雲自歸山水歸海烏聊山女墻沿山百千級客到女墻皆􅁍立城南暝色似拒人一片昬鴉堞樓集山頺五石皆隕星􅋓處尙􅅁天光青山僧煮茗餉山客五客一人蹲一石山頭有落星石今裂爲五太函山離居幾日無情緒雁尙未來春燕去城頭乾鵲時一􅀟咒得蘆花白如絮太函山人晝掩關五客偶復遊兹山丹􅉌南頭碧潭左一塔對窗如揖我傍溪菴西風泠泠響天關炊煙一城飛出山炊煙飛青水煙白襯得斜陽滿江赤新安古刹皆李唐此刹􅀔復凌層岡石厓中飛雲縷縷佛頂古苔堆寸許環峯閣雲光開處穿飛􅀐一嶺蓼花紅到地􅀲花黄蔓復上天石屋踈踈集秋氣屏風一曲隱一牀窗扇重叠穿朝陽芙容花生溪水死一半遊鱗鏡中紫留别程吏部茶香清後酒魂蘇更對竒峯引百壺明日兩重山外路夢君先欲夢天都偶向新安􅂿市塵蕭然六合此閒身煉丹池畔揮千紙赤鯉先驚化墨鱗贈沈教授成渭我愛沈夫子平生見地超鬢踈秋後葉筆勁午前潮地僻成鷄市官閒􅀋馬曹醉談先世事七十恍垂髫贈莊司訓雋申我愛莊夫子中年薄宰官君大挑一等呈改教職芙容開晥晩苜蓿笑闌干世事心知熟羣經口誦完俸錢餘數百先約客晨餐出郭望天都峯三爲歙嶺遊一詣天都頂天都頂上人今晨若居井蓮花何欎欎蓮蕋何迢迢蓮峯雖絶竒未與天争高我雖憶天都天都不思我天風響空中青紅落雲朶昨登九子山正面天都峯濶别三十年舉手揖半空芒鞵久已穿遊客亦俱蛻謂壬辰歲同遊諸君我憶天都峯無心返吳㑹半道宿吳公壁危途怯宵征百歩亦千折我攀飛鳥巢忽見􅀌僧室同儕亦驚喜天上一燈出寧知到天上石屋左右列酌我山腹泉心空水清澈重陽猶未届霜露已成雪危梯延客卧膚凍惨欲裂濛濛衾枕膩嵐翠入窗宻燒燈雖未燼辨色戒行疾出屋望始驚山禽挂枝歇道中偶得二絶句卽􅀉􅇝􅄎并呈瑤田徵君煉丹池北小方亭無數山光入幕青嬴得閉門三日醉持螯左手不曽停易田三禮􅃔齋史更有魚門五七言怪㡳郎君家學好春華秋實萃篁墩徵君及文學敦編修晉芳皆篁墩支山中夜起山空羣動息木葉已先凋衆響從何至天風與蕩搖砌涼蟲語寂閣暗鼠聲囂夜半催人發新霜幕外飄霜降節在重陽日時甫月初五重陽日霜降白衣方送酒青女正飛霜聊記重陽節今年在下洋唐二軼華罷東流縣尉寓居皖口己二十年昨得問訊書作此奉荅并勸歸里唐本名鵬後以字行昔年曽住屋西頭薄宦離家已卅秋彭蠡九江時北望廟溝一水尙南流君舊居也􅂿殘春草思前度數到晨星憶舊遊􅉌壠近聞荒翳甚待君歸更理枀楸見落葉有感年已廹遲􅇀無復少壯時落葉旣辭􅀣終難上故枝今年故枝衰明歲新枝好亦如人代謝子老孫復抱明年春異今年春老人衰遲喜抱孫花開千囘落千徧孫復抱孫吾不見乘月行宣城道中葉葉隨風逐去程半空殘月出殘更秋林紅到傷心處先有曙鴉啼數聲李白西樓朓北樓南樓又占􅁃江州老夫才地雖然減也築危樓東海頭登北樓作卅載時牽夢今辰眺覽眞頺然五蒼柏都似六朝人徑有元暉月樓無庾亮塵更應招白也同醉小陽春是日立冬夜泊小南湖小南湖畔路舟泊已初更四壁懸星影千灘出雁聲夢零前夜雨雲識喆朝睛魚鼓􅃻何急如從枕上鳴溧陽道中木橋分西南澗水四邊集人家臨澗好門外水聲急青山無半里朝爽近堪挹村翁無一事􅀝杖水邊立兒曹農事竟茅屋飭修葺禽鳥靜不譁深村啄餘粒滆湖夜望沿林風轉急紅葉裹歸僧隱隱青山􅂩迢迢露塔燈夜雲空際落殘魄望中升十月南湖涸魚龍氣尙烝題畫留得春風自掩關三層閣上著書閒衹饒碧蘚無紅葉不使秋冬氣入山蠡河感舊挂席去無影夕陽空閉門重經昔時地頻斷昨宵魂檻折春禽占廊虛暗水吞尙餘煙柳在依約舊衫㾗乘月行攝山道中至朝陽門作水雲村􅀣共彎環􅀣裏人家未啟關正是四更殘月好􅀐驢行徧六朝山南岡北阜界初分遠憶茅濛蔣子文江左名山本無幾讓他一帝一眞君過徐中山王墓道有感難從英辟共功名事過猶令野客驚彭越醢非三尺法謂藍玉􅀓友德等范增疽盡一杯羮中山病疽特賜鵝炙一臠食之乃卒龍蟠帝闕形仍壯㷼啄王孫兆已成猶幸開平得前死不然險欲壞長城送孫大星衍仍兵􅊀山左􅁑仙祠畔早披襟在句容訂交不信居然􅇀景侵兩世逮君皆皓首君祖母年近百齡尊甫年已七十五君須髪盡白又數年矣一生于我伴長唫知交出處關成數天地分明鑒寸心良史異時商合􅀓莫教廊廟媿山林采石重謁大白樓枯僧驚爲起蓬關三十年前棹始還身後名輸一杯酒眼中人隔幾重山前與孫大同遊今孫大尙留滯吳門夢留蔥嶺煙雲外月挂蛾睂杳靄間公謫夜卽余更遠得歸公亦代開顔然犀亭懷古過江名士竟誰優到死猶争第一流倘遇可兒先㧞舌早逢英物一開眸􅀌亭正對天門峙百怪將從地府捜却憶登壇誓師日義旗幾欲指荆州一事傷心說􅀝閭求忠于孝果非虛勤王縱使能投袂將母何因便絶裾休更火犀然穴鼠也應風􅀣泣臯魚留賓截髪兒能報羨殺陶家奉板輿涇縣黄田訪朱吉士珔囙留宿培風閣卽席賦贈并􅀉哲昆觀察理閩中君家門前溪水足大石寛于百間屋到來三折山已深鎖徑一橋環碧玉四山蒼蒼合一澗澗水時聞不曽見青松􅀧入紅葉灘時有水雲飛片片溪風蕭瑟溪雨涼鸕鷀􅀡來問字堂縹緗堆架一何滿山鵲亦聽書聲忙樓頭讀書日幾囘樓上客兩官蓬萊西園子弟盡才俊作賦險欲追鄒枚一更月出斷厓口􅁍對好山爲置酒醉向培風閣上眠窗踈不礙看星斗談深復憶神仙侶槖筆乍完仍叱馭溪山如此不歸來􅁍復看山厦門去列岫軒久憇峯巒三面峻都抱讀書堂半夜吟聲苦層霄月影涼偶懸徐穉榻眞認鄭公鄕他日來相訪門前荷芰香二十二日夜雨曉起見山頂皆白葢天氣嚴寒山半以上均已作雪也喜而有作飛雪不到地祇積髙髙峯髙處亦不停旋轉西北風稜稜夜半風尤猛東嶺雪仍移北嶺樓頭一白􅀡接天樓上客眞同坐井清寒入骨難久留北風吹人下小樓衝寒􅄕下一杯酒酒色絶似清江流曉風初収晩鐘動山骨吟肩叠髙聳圍爐􅀝酒欲作書飛白先驚入窗孔復憇松竹塢卽贈陳孝亷寶泉松竹軒中說授經授經人已久知名詩􅀓一一鶴聲峭考比非非國語精墨鯉鏡中浮浪起蒼龍天半怒濤生䦨干月上應無事更掃書堂鬥酒兵莫愁湖久憇并謁徐中山王􅀞􅁚結綺臨春事久非湖北卽清涼山臨春結綺舊址在焉隔坡樓殿尙依稀到來海燕樓襌幄運去山龍暗衮衣空館尙餘調鶴地眞王徒剩釣魚磯今湖尙属中山子孫収税惟應兒女英雄淚灑向秋空作雨飛感賦年來里中同歲者相繼物故近聞劉舍人召揚亦殁于山左亦同歲之一也感而賦此流光到眼若飛塵零落知交倍愴神鄕曲苦無同歲友名場􅅓作過時人酬知事毎失交臂􅀓世書仍欠等身只有壯遊聊自慰記經星海陟昆侖偶書示友習尙多年卽一更後生原不及先生好名亦是文人事不近情人不近名楊大令倫劉舍人召揚歸櫬尙未扺里復追悼一首一作郞官一省曹五旬年命不堅牢管寧死後無龍尾謝守生前有鳯毛君爲劉文定少子學博可曽編說苑愁多先已反離騷殘秋旅櫬仍難返望斷清江綠半篙天王堂謠堂在城東太平與國寺天王堂中屋不修雨脚總打天王頭耳中穴䑕雀啄眸力士杵亦隨波流欲修天王堂泥閉天王目一臂天王已先剥臂落金剛復傷足擡天王出募錢募錢䟽挂天王肩募錢縱多僧醉飽􅁍任天王坐旁倒以長至日太和殿早朝詩課院中諸生亦敬賦一首鴛瓦千行瑞雪消火城三靣集金貂記曽采服趨中禁特荷殊㤙拜內朝至日皇上或不御殿則百官朝服列班午門外行禮惟値內廷諸臣準采服拜乾清門堦下萬里烽煙清禹甸丙辰丁巳長至日皆得西南㨗音九天音樂奏虞韶觚棱囘首眞如夢獨向江村聽麗譙萬卷歸裝圖爲孫大賦毎耻前人我不如年來妄念始消除笑君積習偏難盡尙喜人間未見書君正褰帷我荷戈買書錢已苦無多丹黄别有三千卷或可􅁵君校本譌月午樓歌仙人好居樓樓築青山頭樓居又比山居好八牖居然拓天表山樓明月不待宵海上月出光先搖讀書聲髙月亦髙月午尙覺書聲飄前黄髙峯後箬嶺書聲飄壓四山頂松梢夜半老寉醒寉唳亦比書聲清樓頭寉影兼人影樓外雲鋪百餘頃仙人世外無書看聽書日日來檐端月亦不得落書亦不得完君不見紅闌干前白玉盤讀倦且把明霞餐受業崔辛化校字
