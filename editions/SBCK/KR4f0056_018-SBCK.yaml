front:
  text: 卷施閣詩卷十八
  hash: sha256:6d8ea5ba5f325fe64887958473f44a108378275bfce01784cbebcc746ba4265e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_018-1a}
body:
  text: 陽湖洪亮吉著侍學三天集丁巳正月十四日雪霽温舍人汝能招飮分韵得兼字且插梅花壓帽檐乍來香氣欲衝􅄕籠街月與燈光合繞砌霜將雪色兼縱飮未妨朝客罵朗吟生怕夜烏嫌千言一例輕揮灑已有春華上筆尖十五夜琉璃厰歩月一市人如海塵從􅂩處穿帷車排巷窄社火壓場圓濁酒呼朋飮奇聞藉客傳欲尋容足地飛爆向肩然元夕有懷四首半生思紀外家聞朱文公有外家紀聞淸淚時時滴典墳十六人中留上壽舅氏再從兄弟共十六人惟舅氏届八十七千里外寄竒文予典學貴州時舅氏將生平所述作寄存余處難忘閣上三更月只占溪南一塢雲莫哂霸陵亭醉尉阿誰能識李將軍憶州倅舅氏一居闤闠一居鄕零落年來姊妺行少賤毎敎通世故長貧時與話家常封書寄弟箋曾濕對鏡梳頭髪已蒼腸斷䢴溝東去路適汪氏二姊下世已及十六年所居天井巷小樓屢過之不􅃘登也小樓空鎻月昬黄憶姊晴暉橋北學場東竹屋時時與夢通砌繞石泉三寸碧窻分梅蕋一株紅已將複閣棲嬌女可有新詞寄阿翁猶憶北行牽袂處萬家燈火五更風憶女余以庚戌元夕北上故人生子我生孫世執還應擬弟昆趙舍人得子􅆟遲僅長余孫一歳竹馬跨時􅂊識路􅁓鳶放處定當門攤書已分傳家業學語差憐具夙根遲汝長安來繞膝㸔翁日日倒金尊憶孫吳上舍文桂倚梅圖黔南冀北走紅塵昨夢江鄕正好春何不石旁添畫我承明同作憶梅人􅂊過燒燈無㡬日誤書穀雨我心驚來札雨水日誤書榖雨多應仙客思家切預想踏靑人出城劉刺史大觀爲亡友黄二景仁刋悔存軒集八卷工竣感賦一首卽柬刺史一瓣心香契獨神此公高義出風塵應憐少日齊名者已作千秋傳世人檢􅀧溪山餘笠􅄚删除花月少精神詩爲翁學士方綱所刪凡稍渉绮語及飮酒諸詩皆不錄入向平㛰嫁爲君畢君一子一女皆君没後爲之㛰嫁亦擬穿雲訪列真題蕭照所繪宋高宗瑞應圖六幅剩得東南半壁天􅃘將奇瑞說從前何曽楚璧能歸趙轉使吳州又姓錢朝野雜記徽宗夢錢武肅王入宫而生光堯內殿早敎皈繡佛小朝眞欲泣金僊蕭郎落墨非無意只畫樓臺夕照邉不少當時命世雄􅐤鞬都覺有儒風誰令宻計參張慤却以中原付杜充唾手燕雲時已異傷心懷愍事將同茫茫一局全輸􅁍轉悔飛棋入九宫天水南流䜟不成臨安城異汴州城到來㨗縱誇三矢從此寒應在六更未覺赤龍能踐夢好防白鴈欲渝盟冰天雪窖吾家事坐使披圖百感生三月三日作不妨衣冷更裝綿十里衝寒籠玉鞭到處雨猶零昨日别來人乍入三天是日入􅀡上書房情懐已分難成夢消息緣知欲禁烟只有御河橋畔柳臨風裊裊試初眠送吳文學文桂旋里我從黔中來共子客京邸君今新安去是我舊鄕里旄頭星落白虎傾屈指井絡當銷兵二千石吏倘奉法五斗米賊何難平金門索米空年載無補于時亦思退黄花半頃麥一畦努力同輸太平税送郭同年淳乞假還里春秋三榜悉同年入􅀡同趨朶殿偏手版􅔡思參俗吏時同年外任者頗衆頭銜莫更説神仙著書我續容齋筆述祖君牋爾雅篇他日講堂來問訊胥臺側畔越溪邉古意十首貽晋齋應敎同作魚遊濁水中鳥宅高枝上托身雖不同遥遥亦相望連枝新月岀鳥影波上􅃞魚樂我自知沿流擘輕浪晨興必資餐夕寢必資􅀍一身雖無多物物無不備從兹百年內殊覺太繁費當前欣各足安用事心計微名在身後亦以付天地惟時把書讀掩卷輙􅂷涕持此一寸心寥寥欲誰寄莫辭家出門出門路卽岐處旣誰可偕出亦誰可依身非我之身父母之所遺敢學陳孟公一世隨高􅊠松筠及桃李羣焉托春風先時及後凋命意乃不同桃李方華滋松筠亦靑葱共結靑帝知幽芳閒香叢榮悴任所操不居造化功所以深識人澄觀悟初終五日一澣衣十日一休沐衆中常緩歩敢逞絶塵足齋糧時告匱祇復購薪束不知何奇書然火樓上讀昨者卧復起忽然心憂煎前古與後古一身居其間責備之所歸安得不懼焉何以貽後來何以承昔賢當食三歎嗟高懷惜徂年反羡行路人逐便可息肩繁星與望舒晨夕麗天闕司存各有在取道亦殊别如何百星光難補員景缺北斗亦自知光輝不如月我不爲神仙非徒厭荒􅄅亦恐過百年事能生意表閑居偶然夢列闕事幽討洪厓與浮丘容顔那能好微聞田横客近尙住仙島畢竟忠義人後天而不老人言記誦佳不必􅋑文采寧知華與實兩兩實相待生爲行祕書一死究何在何如能渉筆自命可千載締交數十年夜夢隔魂魄忽然來同心半面成素識神明苟相契不在今與昔孔程乍傾葢華管久分席君㸔曹平陽方延掃門客送鮑郎中之乞假南歸五年不復同􅆪筆忽向東華語將别高齋學士我自慙長慶老郞君第一廿年前憶夫容城君官我尙爲書生一篇君賦初月影我把君卷時緃横十年前過昆陽驛君作使星吾尙客八句君嘲退院僧僧把君詩倍珍惜驛旁僧有娶妻生子者君作詩嘲之僧毎舉以示客朅來同宦曾㡬時君復僦屋鄰曹司銜杯毎苦暮鐘動一僕一馬趨城遲君寓内城此囘别君真草草道遠飯君須及早練塘湖北蒜山西他日訪君應未老西爽村雅集應敎平波三十頃樓閣總如浮聽雨來檐􅂩穿雲歴􅀣頭竹梢時礙鹿花􅀧欲驚鷗不是春光滿還疑雪苑遊三雍開祕笈萬畢述奇辭古樂阿間獻新碑丞相斯主人工小篆時觀所橅嶧山碑阜同分陜陌水軼定昆池喜值端居暇賔筵酒不辭淸明日同人各携酒至陶然亭餞吳侍讀錫麒分韵得郭字今晨値淸眀淺歩不出郭言登西南亭稍覺筍鞋拓窻櫺無用掩空翠四􅂷幕天半遞逺風輕雲落如鶴棃棠間桃杏花暗一層閣春蔬羅數十所喜新意各泥飮苦不豪停觴歎離索東瞻曁吳㑹西念及商洛時聞賊匪竄入魯山如何遲露布顧望期屢錯吾子又告歸心期􅄅誰託中年富筋力敢退事耕鑿無容籌去住且復視寥廓客去酒忽醒泠泠戞車鐸閉門見花落有感麈勞擾擾復紛紛􅁍掩重門杜見聞入世早推能慮事到頭何止僅工文閒花積地驚三寸薄酒澆愁衹一分欲搆草元亭未就暫將奇字課劉棻晩坐草花艶紫林花紅胡蝶五色飛當中刺梅黄更岀墻角白玉一􅀣嬌春風藤床坐久春陰薄香氣冥􅄥合成幕忽地吹來雨脚斜棃花􅀣上桃花落四月十一日綺春園雅集應敎名園一棹水沄沄柳正披香草乍薫畫舫已敎延碧月紫藤偏欲上靑雲欣傳檄報秦闗㨗不礙顔從魯酒醺雅有剡溪牋百幅時􅀚成親王所書堂額亦乞寫卷施閣榜醉餘書許乞羊欣昆明湖水接天流揖客都從水上頭正好柳陰三弄笛未妨花裏一登樓迂踈尙荷賢王禮擾攘誰分聖主憂殘盗莫矜盤踞穩早㸔飛將下神州趙忠毅鐵如意歌三尺鐵作如意誰其握之趙忠毅惜哉公生明巳季委鬼茄花吹滿地恨不擊王孟津門生有此眞亂羣恨不擊烏程魏故人子已成敗􅀋半生所遇總如此悼歎公生不如死鐡兮别主二百年倔强宛若公生前君不見我雖不見公幸見公遺物稜稜一方硯凜凜三尺鐵嗚呼二物偶流傳想見公心如鐵石米圖南鐵笛歌一聲遲一聲疾雲將穿石欲裂不知何人製頑鐵百錬鋼成三弄笛空園初春窅其無人水際一曲蛟龍欠伸排淸風出明月樓高高聲不絶三更已還客興䦨百舌軟語花開顔望雨作朝望雨雨不來烏鵲聲裏紅雲開暮望雨雨不下柝聲茫茫星影瀉五陘山十日不出雲赤日炙竄牛羊羣昆明湖一旬水減尺靑草欲生魚鼈窟東西紫陌飛麯塵祈禱日煩兩聖人君不見安得檐頭雨如注更望驛西傳露布時望陜西捷音甚切廿六日新雨後作燕歸梁雀歸牖雅巢左邉鵲巢右延囘只有雙老烏無􅀣無巢向空門先生㸔雨出屋頭破暝復聞呼婦鳩風聲蕭蕭葉聲亂一尺鯉魚飛上岸頻夜起㸔殘月有作少歳如新月初三及上􅁌􅇰憐光滿夜亦似客中年齒髪今如此情懷愈黯然囘囘過宵半判與㸔殘蟾偶成殘月岀半宵殘客扶半醉月從門外入披牖與之對客行旣不前月影亦不退何如鋪桃笙就此月中睡澄懐園卽事十首讀書樓上一燈紅穿破踈􅄕入水中隔牖乍驚錢庶子誤疑殘夜月升東所居與錢庶子􅯆相接雨濕溪光畫不成平堤百尺水雲生過橋時有琤琤響學士㕔前落子聲張學士運暹與王侍講綬裴編修謙暇輙對局􅀡廬遥對寺門開童大理鳯三寓廬獨在澄懷園外分得西山一角來載酒欲過童大理十年重與話繁臺十年前曾同客開封八分日影上堦除張檢討綬岀入毎刻日影爲度風動簾紋自卷舒携得剡溪藤十幅成王書罷定王書嫩涼時節雨初過格子千行墨數螺􅁍笑病餘陳賛善萬全索書人比索逋多屈指風光五月前蛙聲閣閣草綿綿宫紗賜罷頒宫扇日午傳宣集後天偶向花前共舉觴自慙小戶遜三張謂學士及檢討䎖綬花豬肉好梅蘇熟更憶西頭達侍郞達侍郎椿飲􅄿兼人破曙同㸔入左門金爐㝛火尙餘温傳經不愧眞司業分課皇家五代孫邵司業玉淸督課􅆟嚴時分授皇元孫經洗馬淸談昔擅名說經􅀕酒亦鏗鏗闌干日午天風起吹徹南來笑語聲謂王學士坦修汪􅀕酒廷珍閒㕓一畆富莓苔正値花時借榻來架却紫藤扶住竹淸陰仍待主人囘予應居西頭小樓以墻宇盡圯暫假寓萬侍講承風􅀡廬夜起塔頭明月來長徑一千尺非比靑松枝欹斜不能􅀡天中節近有懐里中景物并望家累入都梅仁如豆杏如丸桃實成拳砌滿盤昨夜江船來海口鰣魚三尺勸加餐薔薇一架後先開不向墻根問蜀葵襯得石榴紅更好野鸎桃與土玫瑰睡覺西窻雨氣腥戯將采線繫蜻蜓聚頭扇子無多摺自寫黄庭内景經石首江瑶總遜渠品高入市故徐徐銀鱗玉頰疑無骨喚作人間團扇魚新篘白酒透􅄕香冰齒還嘗薜荔醬􅁍謝水鄉三尺雨楊梅深紫枇杷黄約伴同遊西滆湖梳頭先費睡工夫倦來不怕春魂魘新貼紅梅閣上符蜀山鞭筍岀林長紫莧黄􅀲取次嘗兎麥上場􅁞豆老便乘舴艋醉新涼枕波樓閣止三椽簫鼓盈盈咽一川已是苧衣涼沁骨更扶殘酒上燈船初三巳是學堂空競渡爭㸔出郭東六角蒲葵三角􅁰采􅁝穿就過天中不見津門信使囘小亭遲汝獨銜杯船頭醉􅈉船窻酒可彀而翁消夏來山行雜詠人從窻裏卧塔向門外立忽然塔上人欲與窻間揖檐鈴吹笑語高下􅀔不及無由寄眞意飄此頭上笠一晌乘便風翩然墮階級空園半畆花左右交虎迹淸晨客初來怪鳥啼屋脊心空忘喜懼卽此鋪尺席鳥亦竟逺飛虎亦不前逼始知忘機人物外有眞適信難居滿頰莓苔生出谷雨聲碎入谷雲光肥一出一入中蝴蝶雜客飛疲蹤欲誰投暫借雲所棲一川饒怪蛇百鳥噤不啼何因知宵昏庶頼警曙鷄橋東與橋西破曙一招手前行殊未覩隔此水楊柳荒荒行半日月落斷山口居人方啟戶行者倦奔走勸客盍早餐山桃實如斗四望悉無見松杉與檐齊亂石黑半天壓此睂􅊿􅊠石竅出一門何能辨東西居人耕山田盡向屋脊騎勸客早出山雲生路當迷迷途忘高􅊠蠟􅄚向空墮􅄥􅄥倒生竹衣􅃑牽向左欲尋人跡問半里斷烟火沿流聊徙倚缺處雲落朶古廟無神靈牛羊占高坐午日拜紗􅁑香藥之賜紀恩一首弱冠爲人師逮今㡬卅年人言紳佩榮􅆪毫入中天經傳聖人孫戍削甫及肩朝朝食天厨虀鹽夢仍牽日午宣賜來鵠立朶殿邊􅌭紛香藥丸紗葛欣有聨􅂊出內左門傳宣復連翩俯念節物佳當食更將涉咸陽避責未築臺塊然身遽亡三十旣已逾四十􅄅難得赴君之䘮哭君切伶仃一棺詩數冊此時偪側復偪側巫咸岡雲四結昆侖河濤百折炎風蕭蕭雨聲急又疑天爲詩人泣詩人亡後十五年新鬼故鬼圍墳前君亡後君配與太夫人皆相繼卒錦州刺史劉大觀獨抱一卷來長安奉錢三百千一一爲校刋姓名一日長安市交口誦君如未死我頃聞之淚難止􅁍憶石交疑隔世楊大令趙舍人里中昔年稱等倫此時憔悴百僚底轉羡君名日邉起偪側行誰所爲金子亦豈人間才浮名身後總如此不若未死常銜杯一杯復一杯偪側歌偪側􅁍憶虞山山頭論詩夕夜半神祠火雲赤兹遊何期死生隔鳴呼兹遊眞成死生隔送楊大令倫之官粤西儒流誰説不知兵躍馬提戈萬里行猿鶴已堪成一隊時以粤西軍務檢發知縣八人皆先後同行苗蠻從此乞餘生愁經百驛先頭白官比雙江徹底淸莫忘鵝籠舊時事夜寒風細擁􅀌檠南行飛雨北飛沙三十年來事若麻笑我尙難忘輩行羡君先已富才華論詩未欲輸餘子破涕先聞説外家姊弟數人天末住君從洛中赴粤時蔣表兄鴻三久客洛陽表姊適繆氏者全家留滯粤西于君爲從舅氏及從母故并及之㡬時商畧泛歸槎戯簡陳侍講萬全四首時陳新納姫人作詩索和填門索字比催租頗覺仙郎暇日無添與玉人書紙仿者番須破睡工夫偶然一語尙嬌羞説到雙眠着意愁比似早朝還起早怕人簾㡳㸔梳頭昆明湖左路偏賖下􅀡偷歸日已斜好事却同錢庶子五更雙巷響雷車錢庶子棨􅀡澄懷園毎三日必一歸卽于次日五鼓趨海淀入􅀡常以爲例君寓居相近故戯及之倦來鸚鵡替呼茶不掩窻櫺㸔月華我屬司香好調䕶東風􅂊放二分花姫年十四立秋前一日偕顔大令崇榘趙舍人懷玉侵曉詣太液池觀荷便訪法祭酒式善遂自德勝門徒歩至西􅀡門五里長河花事甚盛並過極樂寺勺亭久憇乃返北斗未落天㝠􅄥騎馬獨入蕭齋中夢醒拉客事遊覽曉日未透觚棱東三亭二十有四面所喜面面花香通豈惟花色艶如錦魚尾亦閃明霞紅此時夜色未全散樓閣不受驕陽烘石䦨干落一千丈月影星影穿玲瓏斜枝面水結巢穩鵲夢未破花香濃荷盤承露亦殊好珠光細碎磨鏡銅偶然興發欲出郭三里已至官河衝背城人語太岑寂繞砌百級喧鳴蟲劉家亭子足淸賞細路曲折諮老農斜行距水不三步仄徑尙􅀍蛛􅁝封黄塵車馬閙如織閑處鷗鷺何從容西山咫尺不容見花挺高􅆬遮雙瞳乍紅乍白乍深色裁岀片段非人功環橋石􅀔鬥淸削花亦旋轉如長虹池寛不放水波展風蒲獵獵交水葒迷行半晌始得路歷盡豕栅兼牛宫花前吟客果下馬一一痩步行偏工寺門斜對御園闢當午紅氣酣房櫳􅁫環塞戶不容入是日國花堂爲遊女所占僻巷走避衝斜風􅀲花斷路蓼横徑紫艶映水黄浮空吐􅁝蟲碧轉丸黑堆地􅁄刺仍叢叢何來驟響刮客耳别出水脈穿靑松僧房盡處避人坐􅀲果一任僧雛供開窻望雨不能得雷鼓隱隱聲隆隆冰盤磊落高數尺蠅蚋半日潜無蹤良朋屢約期屢誤世事何苦填心胷團蕉卧久僕夫促來趁斜月歸聞鐘囘車頓覺有秋意一葉正墮靑梧桐二十日早章大令學濓邀遊積水潭㸔荷同人分韵得光字十里長河滙作塘馬嘶人語㸔花忙能閑客總神仙侣當曉潭交日月光斷札㡬行留黯淡時展舊遊長卷見亡友王友亮通副所作㸔荷詩喬松千尺揖靑蒼惟應薄醉牽船好消受荷花面面涼䟦方布衣薰所作春水居長卷後方居士性本􅀌畫水不畫舟畫岸不畫廬縱然畫屋僅結茅前後左右皆禽巢一身居其間意態何嘐嘐縱然畫舟僅一葉四面風聲水聲接掉船何所之似欲岀六合春林綠重煙􅄥􅄥初日淡作臙脂紅杜門百事不挂意闢牖自與天光通方居士富有千頃波貴作五湖伯朝吟晩吟同蟋蟀夜窻無人電光擲人立大魚時揖客不爾前灘訪鸂􅈑偶然興發作此圖一筆卽巳環全湖全湖盡處靑無數知是君家冡前􅀣我與居士交恨未及往還手訂居士詩不識居士顔他時我訪湖西宅爲􅀘四圍松與柏君不見飛去飛來寒鷺􅁝渾疑弔客衣冠白七月朔日雨竟日夜不止作此排悶一夜蕭蕭雨開門水倒流亂雲穿斗栱野鳥㝛􅄕鉤兵甲眞堪洗欃槍尙未收似聞宵旰慮仍在益梁州苦雨待客不至戯成五更雨急檐頭衝壞垣倒屋聲洶洶起尋蠟􅄚出門㸔半里曵入塗泥中西家床頭索瓦瓶東巷歴歴排墻聲重來輦轂又逾歳天漏似向黔中行吾家老屋常掩闗壁倒已覺無遮攔獨愁苦霧翳天半咫尺不見西頭山冷官百事皆相左折柬偏言此晨可齋厨無蔬爨無火拒客先將巷門鎻寧知客念亦早􅁅侵曉誰肯衝泥來厰橋西門水三尺到亦叱馭驅車囘水聲冷泠没及髁掩書無聊酒時把一杯未已復一杯忽爾風狂墮飛瓦君不見天公此意知者寡要向西南洗兵馬哭愍孫爾病眞難起吾衰久矣夫猶應阿兄在次子盻孫于壬子秋殤于京邸莫嘆夜臺􅀌世業慿誰振重慈藉汝扶傷心厝棺地夕照滿平蕪盻孫棺厝于城西夕照寺今亦當同詩冡詩無錫顧兵備光旭􅃟刻同縣人詩爲一集其剩稿賈上舍崧乞得之爲卜地􅄟于梁溪之側三伏日走數千里爲索詩可云好事矣爰爲賦四絶句側栢踈梅插滿塋三千里路走燕京不知何預先生事肯爲詩人觸􅀬行身後浮名定有無尙餘淸淚灑平蕪他年地下傳文苑此事眞推鬼董㧓少日齊名顧虎頭老來吳質倍工愁顧進士敏恒吳明經黼仙于梁溪詩人爲最九原珠玉終難􅄟合置中郞與發丘不結詩人結酒人邇來麴蘖更沉淪潘張陸左誰能識有鍤須埋劉伯倫女貞行爲俞貞女作無􅃬俞貞女許字高郵金明經蘭未㡬明經病卒貞女誓以身殉母兄防之苦貞女畫女貞花一枝題詩于上以見意不半歳終以瘵疾卒其兄孝亷坊爲索詩爰賦此篇花莫作斷膓花草莫作㧞心草㧞心草死尤可憐誰識斷膓花色好俞貞女字金明經二十待年仍未行明經亡貞女病口不欲言心已定寫得一枝祈絶命不繫尺五組不赴淸泠淵兒身雖可捐母意殊拳拳十旬百藥終無効兒雖死貞不傷孝英英女貞􅀣欎欎冬靑枝上有六岀花下有五色芝君不見斷腸可續死可生不若此木尤堅貞良人無年妾命促手握此花方瞑目萬古貞心托貞木同人約七夕卷施閣小集先作此代柬紅燭千條酒百瓶石䦨干外雨初停人間未必輸天上此夕虛堂聚德星七夕詞今歳風波惡濤衝星斗邉時大雨連日永定河决口鴛鴦三十六險欲上靑天茅垣排東西土室圯前後只有天漢邉紅墻尙依舊别夜雲軿歛淩晨綘節移年年當此夕眞可説􅀲期十一日同人集卷施行閣醉後作十日無一客客至必滿堂十日無一樽客來必千觴主人愛客客亦知皆競來早無來遲鞭􅁝影拂稜稜瓦洗手花前客停馬淵魚林鳥盡不猜客到先已穿池臺茶爐聲喧話不足失喜一林新果熟雛童攀􅀣鳥啄枝一徑先入紅参差果中開筵忘爾我上坐主人無不可忽然客句矜速成滿屋盡變爲吟聲歡呼座中人歴亂屋頭雨驚雷掣電總不聞銀燭如椽客圍語須臾雨歇月滿㕔蠟􅄚攅響來窺楹半㕔人歸半㕔坐别掃一㕔留客卧金手山等皆留宿閣中三更門索誰更牽知是驚烏夜飛過鳯仙砌下亭亭立應呼侍女花綠須扶徑草紅欲睨窻紗逸榦零朝雨芳心待月華窺籬兩三種因爾倍思家鷄冠爾亦知時者忘言得久安未應憐鎩羽空自揭高冠秋實寧同味幽花不並㸔劉琨思起舞側耳聽無端秋葵八尺檐楹峻枝高尙出楹􅀌懷終自揭仙掌曉來擎似愧凌霜質徒矜向日名寧隨鮑莊子刖足有餘榮紅蓼秋花雖自好未比水花妍紅紫分三徑江湖别十年舞風踈竹外弄影夕陽前不聽吳孃曲從兹别夢牽秋海棠何事腸俱斷傾城色尙誇春人兩行淚秋雨一叢花恨繞江郞筆愁生蘇小家蟲聲漫鳴咽心緒正如麻玉􅆪花秦闗誰種玉楚國倘亡􅆪泣露􅁈難剖埋蒿冷欲尋淡宜涼月曉閒稱古墻陰似有泠泠響風前荅素琴十七日驚聞畢尙書師楚南之赴翌日于卷施閣中爲位而哭哀定賦詩六章卽寄莊邠州炘錢乾州坫陜西毛簡州大瀛四川孫兵備星衍山東楊靈州芳燦甘肅方伯揆貴州楊大令倫廣西王大令復河南三十年來事都慿信史編此生誰念我九死欲呼天訃岀朝班上魂歸夕照邉報公惟砥節方不􅀒名賢死不爲公恨傷公未盡才潢池仍待勦衡嶽遽先頺諸葛中年隕文淵半道摧世儒眞淺識猶望歴三台由來三楚事終始一人支微管功寧泯亡彭䜟獨奇公少時術士言公官楚南日卽當謝世葢合公姓名爲䜟也夜星驚􅇫馬秋霧濕牙旗千百􅀌寒淚從今灑路岐遺大投艱後羣疑衆謗中萬言陳至計公去歳請撤湖南兵專勦湖北疏入上嘉其藎誠一死遂􅀌忠分野旄頭落盤門羽檄通蠻民商配食先在伏波宫老毎思巖壑君恩未賜環囘天心獨苦匝月􅁂都班公體素强自籌楚事旬日鬚􅁂皆白事與元勲勒封同五等頒傷心別時語乙卯冬余自黔中報滿入都公留話三日方别原不計生還同人凡㡬輩白髪半應飄訝絶全家訃半年以來公仲弟夫婦及冡媳房老皆相繼卒哀騰八月潮公以潮生日生故小名潮生枕鞍書耿耿歸櫬雨瀟瀟他日虛堂㝛仍歌楚大招曾都轉燠以六月廿一日集平山堂爲宋歐陽文忠生日設祀同人賦詩成帙并索亮吉詩因賦此臨安祀東坡䢴上祀永叔兩公政績猶在人不特高名輩流服異哉平山堂乃祀和仲忘歐陽予以癸巳甲午客揚州􅅦署臘月十九日曾兩隨衆于平山堂爲蘇文忠設祀門生風義古無匹詎敢僣食來堂皇千秋此論誰折衷乃在七百年後曾南豐雖然文章節義謚並同配食六一庶得睂山翁此後君倘接武雙文忠賔筵開酒人滿太守風流逮都轉昔時門生今里閈誰知誕日尤奇絶君後公生􅂊兩日陳公塘接邵伯湖荷花世界昔所無不羡奏樂章不羡祝嘏詞只羡蜀岡岡頭三日讌正􅀡千朶萬朶紅白花参差古來文福能兼少况復身持節旄早一軰才人座上多二分明月揚州好君不見我亦平生感舊遊吟魂多在庾公樓大星昨報前軍隕昨得弇山尙書赴淸淚揮殘天盡頭君思歐公我思畢同是龍門異今昔十輩門生宦九州謂莊似撰錢獻之孫淵如楊蓉裳荔裳諸同學感恩一日頭俱白王南寧少林太守陳博士澧堂學博我所思兮二三子􅁍憶征南幕下人一篇並寄吳江史冊厓文學重哭尙書師三日愁霖漲滿池打門消息到偏遲南來薏苡􅁈方白北渡瓊瑰夢已知無淚哭公惟有血此身閲世詎多時平原賔客消沉盡誰共筵前奠一卮謂邵學士諸人七夕夜坐戯擬古别離詞寄孫大山東中歳念師友懼或成晨星晨星今亦稀惟剩一啟明啟眀之東我則西天末囘首常淒迷一囘思君一囘切願減光明作殘月一月相隨得旬日不然此滅彼復生君爲啟明我長庚昬旦相代東西行我持此語思上告織女黄姑愁未報南極老人先大笑苦雨十日雨不停莓笞緣斗栱虛堂蒸毒霧梁燕欲移棟居鄰斷煙爨欵戶求火種爲言墻半圯床榻䧟成冡填街三尺水决竇不旋踵憂來展書坐蟲喙集窻孔心切望曉晴偏驚横螮蝀贈楊州倅廷煥卽題其傳硯堂卷子難兄薄宦久蹉跎時令兄倫檢發廣西軍營萬里新從馬伏波小别㝡憐饒涕淚半程相送越滹沱傳家硯比兼金重賣字錢無落葉多我是孔融交兩世一囘展卷一摩挲八月廿二日侵曉出西便門扺海淀約任軍門承恩共遊西山因小憇官􅅟待法􅀕酒式善何水部道生作我行月初升甫到月未落初日亦已煇星光尙囘薄􅄥􅄥開濕霧􅂊止巷南柝官齋野花艶􅂩地日開拓早飯及射堂紛然具羹􅌜年豐饒稻􅈉且喜鱠新斫傳觴休更緩有約在巖壑斜行車屢䧟溝水仍未涸周廬欣在望便道一省度園林甫修葺昨已飾丹雘笑指雲外樓今成草元閣時新修澄懷園余已移居近光樓下因便道入視循靑龍橋北入山高原無人居千頃堆白日前行驚眯眼沿道飛石屑流雲􅀔洶􅍅意欲礙車轍萬葉鼓北風斜衝一門岀騎行旣囘互徒步徑尤劣絶險度一岡同行儼相失􅌑瓏諸石竅往往野花茁秋蟲與相間竹徑亦幽絶到覺萬仞湖􅀌懸石樓末久憇龍神殿觀泉源并喜春海棠復開墮薪天半落知復有樵人及此林花放幽巖忽覺春稍稍開㝛雨黯黯及蕭辰三時金鑑影五色莓苔文土􅇸風旣迅石竇泉初分松陰灑危殿嵐光度寒門層層凌曲磴步步絶流塵禪扄雲欲活初地烏尤馴百念此時寂齋鐘亦不聞登蒼雪菴小軒望安定平則諸門并見白塔松陰甫迎人檞葉忽拒轍士垣從東頺了了露佛闕旋螺方數轉足險入石穴欹斜臻層軒眼界始􅋓兀窻櫺寧待啟雲怒已飛出重岡莽囘環幸有北口缺奔流從此注百里只一瞥􅄥􅄥煙盡處時逗人馬跡心空無窒碍木葉半俱脱誰云飛鳥迅詎若􅂩駒疾危瞻七層塔天際白如雪斜日下九門丹樓亦齊􅋓題羅山人聘爲周編修厚轅所作移居圖人生安得如淮酒更載奇書及嘉耦書完一卷酒一杯鶯燕一一飛前來倦餘卽卧書函下酒得美人斟較雅我疑醉鄉日月不可遊何意復戀鄉温柔或云藉銷奇氣慿萬卷否則佐此情話須千甌周郞舊乞金門假重到蓬萊已三夏偶然聚得薄笨車家貝如此方移家酸寒頓改儒生素玉軸金􅁫照衢路遂令畫鬼羅兩峯描繪人物仍能工馬嘶塞路車填轍一笑敵君如有術以劍扺君書以琴扺君妾惟餘酒癖未盡忘醉裏狂譚磨齒頰雖然此客尤可防倚酒或恐登君堂書能目十行酒亦吸一斗把君奇書覆君瓿惹得美人開笑口八月廿九日扺澄懐園成親王枉騎過訪并辱贈詩謹賦此報謝偶厠談經席頻勞問字車過汀喧列騎入室噪棲鴉土竈茶難熟丹林日易斜不因鄰禁籞猶認野人家中秋日何民部元烺水部道生招同法􅀕酒式善伊比部秉綬趙舍人懷玉遊法源寺竟日慈仁荒敗崇效逺禪窟此間稱最古維摩立地有丈六傑閣去天􅂊尺五三門乍啟通松徑百歩相連有花圃虚堂僧健老復丁靜夜人歸月亭午澄懷園九日荒園秋盡景蕭騷一半松林起怒濤是處岡巒行已徧破除今日不登高澄懷園夜起㸔月卷􅄕列㝛已全收是處天光接水流剰得一星隨一月慿欄㸔到五更頭周廬三面麯塵淸風起雲生與地平百步樓臺少人影馬嘶聲和客吟聲管夫人墨竹石徑空􅄥翠欲流琅玕影裏雨初收何緣不冩王孫草多恐人饒故國愁澄懷園卽事横塘萬頃荷花死蓮葉蓮根泣秋水参差鴛瓦鋪新霜螢火一夕收淸光枯楊半掩窻前卧抱葉寒蟬向空堕湖東明月湖西來緑窻此事開未開晩歩荒岡南去徑縱横半里斜飛落葉聲惹得暮鴉成陣噪夕陽人影樹頭生夜起落葉驚人起開軒月露迷􅁍從行馬外斜度濯龍西萬􅀣風聲肅千門燭焰􅊠勞勞我何意黙坐聽荒鷄築屋築屋臨官道郵書鎭日馳水寒雲去駛天逈月來遲劍閣初聞㨗荆門尙出師南征諸將士知否扺恩施澄懷園偕同人晩步歸鴉已入林未礙客幽尋風遞千門響雲飄四野陰訪經蕭寺冷照水石梁深不是逢揺落誰知天地心􅀽大令枚寄示擬戊午已未重宴鹿鳴瓊林詩二十首率成十二絶奉簡唐代詩人推李杜何曾雁塔得追陪先生要吐前賢氣兩向慈恩頂上來也逐遊塵上六街不知早已脱芒鞵賔筵開處􅊯􅊯鹿定帶長生苑内牌白首研摩事可憐從來一第比登天名經千佛雙番冩始悟公真劫外仙三月春光暖已囘五雲多處綺筵開劉郎前度誰能識錯認耆年賜第來一軰人皆上玉京獨留老眼識羣英先生遊歔蓬萊日多恐諸賢盡未生憶昔追陪聞喜筵記同上相説齊年謂庚戌登第日嵇文恭公重赴禮部宴不知此老來春宴更有何人步謫仙􅁍笑從前向子平苦留㛰嫁晩經營先生五岳書名徧游戲重題雁塔名老去重登􅃟佛場此翁何似魯靈光斷無門下門生在有亦居然大父行宴罷瓊林走璧車珠簾十里影横斜當時玉貌誰能識只有宜春苑裏花短笻秋到倍精神無數羣賢逐後塵畢竟姮娥愛蒼老桂枝全借白頭人屢枉山公問訊椷林泉歳月一何淹公與文成公阿桂同舉鄉試今文成已辭世少微不隕中台隕始信公眞文福兼王母蟠桃歳月長朅來屢見竊東方曲江杏比瑶池實也要先生三度嘗十月初六日同人集積善大令晩香精舍㸔菊并出古琴十六相示卽乞主人與何水部道生于花下撫琴率成長句琴琴不同聲花花不同色琴標六代元宋唐花放百枝黄赤白古琴泠泠一十六其外蕭踈盡叢菊琴囊滿墻花滿屋一本花開彈一曲主人豈止能愛琴愛琴兼賞琴知音何郎三十妙指法花下一見先題襟主人豈止能愛菊尤愛㸔花人不俗爲花築屋亦殊雅别自扃門不煩僕我生嗜古癖未忘舊物先撫澄心堂主人蓄唐琴三其一卽澄心堂物也題名元祐三十字洗以菊水逾淸光灌花初完撫琴好猶有春泥在長􅀲琴聲愔愔花裊裊花韵都浮七􅃶表客彈一囘主一囘千朶萬朶花徘徊罷琴置酒客不去花下促坐傾千杯琴停旣無聲菊暝亦無影主人離披客酩酊明月入來窺藻井輓王大令復二首昨得安陽札安陽趙大令希璜札來始得凶耗連篇悼偃師更憐交友少已愧哭君遲泲上猶相訊孫大昨來札尙詢君近狀函闗定未期錢州倅坫茫茫揮老淚西向酹親知謂畢尙書師及君中州民力竭防賊又防河屢處凋殘地偏能惠愛多敢期􅈾上計終自拙催科一卷新詩在明明勞者歌李大令符淸濮陽跨驢卷子琴堂三月别獨跨一驢來面目都非是衙胥各浪猜詎知行役苦安怪壯顔摧他日傳循吏推君利濟才乞友人作歳朝圖胎詒晋齋主人并綴四截句窈窕房櫳水一彎早春偶得著書閒休嫌屋後峯巒峻此是淮南大小山沿街都爲歳除忙淸絶城西半里坊却憶諸王勤問字未妨門有束脩羊詒晋齋中一事無㡬聲爆竹歳將除兒童簫鼓轟前後不碍閑堂讀道書日晩天街跨馬囘小疲聊復舉深杯房廊迤左休敎掩要盻西山臘雪來小除日章大令學濓遣人餉酒時適寫歳朝圖却寄并附以詩故人念我寒餉我酒一尊䦱門不敢應恐是催租人催租人不來送洒人踵至時郭大令亦遣人餉酒及食物開顔對使人汝亦大解事主人官赤縣騎馬日出城百事逼歳除猶能念友生銜杯對盆梅前數日承餉盆梅四種此意何可報聊寫春風圖博君元日笑受業吕培譚正治校字
