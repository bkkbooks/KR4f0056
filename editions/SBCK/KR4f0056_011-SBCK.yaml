body:
  text: 陽湖洪亮吉著五陘聯騎集辛亥壬子雨窗讀何水部道生詩適有饋蟹者率賦一首卽題卷末平明生輕寒秋􅀨閉門大窗風扇如鬼梢人竹數個起來天冥冥枯坐無一做攫得一本詩中邊頁先破案頭光正黒捉就窗􅂩卧讀一首兩首大呌急起坐波濤欲掀屋日月忽顛簸無端蟠虹霓光怪生土莝排空一枝筆五岳透皆過凝然七字出重欲百馬馱又如五兵利當者無不挫讀時忽狂笑一屋悉驚邏一句復一滴恍與檐漏和雖然萬言富無救一日餓忽然􅃻門來送蟹有鄰左是時雖正晝墻外黒若磨安排醋盈盞叠取薑桂剉呼童急斟酒好句我欲賀遺經嬾書冩卽此當清課時爲㓜子書爾雅讀詩一兩卷食蟹七八個快哉復快哉屋漏頂上墮自蘆溝橋西人山至花犁坎道中作山程七十里半道馬巳死時同行劉檢計湛齋馬忽斃主人寄坐僕告歸一馬乃載三人來前山蒼蒼月初出對面一山看落日微紅入水尙有光水底巳復鋪新黃山風斜衝兩山口倦客欲眠山石走一峯槲葉下趂人車上鈴鐸聲疑嗔客行無糧馬無草三兩人家閉門早却怪前頭紅樹多槖駝不到山初好自慧聚寺北行歴化陽朝陽觀音諸洞晩上極樂峯作峯形南北殊凹凸入地上天皆一日潜行五里不見天躐炬光遠空浮烟莓苔森森綠疑夢蝙蝠手捫皆不動一風衝出微􅅁腥足底萬竅聲俱鳴好奇徑欲窮顛末行僮失聲炬將滅四人急轉我後來風黒恍有千人追是時屈指當交酉岀洞見天天尙晝飮泉百盞神始清坐調鼻息方遠行樹巔斜行途轉窄鴉􅀧撲人如雨黑東行一洞􅀔較低一洞復出淸泉西斜陽沉沉嶺頭落客意極疲龕極樂下方巳黒天頂青側帽恐碍當頭星自潭柘寺至龍潭久憇一亭葢清泉再轉泉巳失山腹空􅀂囊時時怪風出青松高穴蒼鼠肥紅葉遠雜烏雛飛四山茫茫樵跡稀山翠沁骨思添衣斜陽下嶺客上山山寺防虎門先關坡陀百轉行客餓林果却從頭上墮宿慧聚寺山房寺門望殿樓樓逈􅀂天上一松蟠殿角高復出千丈山僧導客行不休石屋轉出青松頭客行開窗玩松頂下視僧房􅀂居井秋衾鋪月夢不成一夜枕七皆松聲松􅁘雲􅁘不能省月裏千重百重影三更闢戸禮上眞北斗正南來瞰人日午抵潭柘寺至猗玕亭久坐到門諸峯􅊠青翠収一殿􅀡上百級奇雲紅撲人面穿廊入厨院百匝水聲徧危亭圍衆綠當午無所見林杪開北風晴陽落如綫山牕當殿展涼燠亦時變朝饑誰可喻山果幸時薦呉筠雖說餅束晳仍賦麪卧枕明昌碑狂思永和讌亭有流觴曲水故云慧聚寺夜起行馬鞍山麓三更東峯明斜月逗林左連閭無人聲獨徃意亦果北戸昨巳扃山風自開鎖梢南通一徑細路出墻垜碧樹合作屏黃雲㪚成朶􅊠同馴鹿步高與彌勒坐一寺十數廊閒行止餘我徘徊念儔侣水黒月巳墮歸路愁徑昏山榴綻如火山房與卲侍講晉涵話舊兼呈曹侍御錫齡劉檢討錫五張運判道渥憶昨從君逰青山謝公宅五更揺夢醒君苦行不得出門殘月尙在牆照見四野黃花黃傍花前行衣􅃑香綠鬢欲與花争光看山百度花千度鏡裏朱顔已非故五嶽雖成汗慢逰一春毎被風光誤洪厓仙人寧足誇君亦嬾種青門􅀲雲山無意忽相合且拾山果烹谿茶對床七輩今誰似可惜三人巳前死壬辰三月同逰青山七人今朱竹君先生張上舍方海黃二尹仲則並下世學士才名上舍詩還餘李嶠眞才子今日張顛有替人曹劉聯轡出風塵青松白石談遥夜艶李夭桃訂好春時約明歲三月重逰歸途逰石鏡山作馬行半日城皆陡槲葉隨風出林走桑乾河北飲馬時却望樹色還參差平沙茫茫埋馬膝復有一山當路出遠㝷千級到寺巔寺外城堞皆衝天紅林蕭疎日光薄破樓無鐘殿扉落庭隅堆草濕一邊夜半或有山魈眠梧桐葉梧桐葉秋來大如掌肅肅西風催蕭蕭打門響何工部道生招飲卽席羅山人䀻曹指揮銳張運判道渥合作一圖名秋堂雅集因繋以詩一人畫山一人畵樹旁有六七人嘐嘐屋中住曹興宗昔時畵馬今畫松羅江東畫人不工􅀞鬼工張風子􅀞卽有風獦葉恍起秋堂中兵曹詩百篇法時㠶舍人酒一斗劉湛齋比部談天李石農我义手屋頭有樹樹杪山却怪樹底門常關晚晴巷口車聲接一徑呼僮掃紅葉斜陽入樹留一分道遠客欲趨城門時㠶居内城君不見山雛窺客喜復嗔認是昨日逰山人逰古寺入門悄無人北風吹小住誰肯揖先生長身一松樹朱孝女奉親圖孝女婺源人誓志不嫁以養父母父亡事母幾二十年及母沒孝女年巳五十依兄弟以居繪父母􅁚懸室中朝夕事之如生其兄某爲作奉親圖索詩云爾二十事父母三十依偏親四十作藐􅀌哀哀逮晨昏父亡事毋毋亦亡高齋却掃爲影堂影堂西偏兒所住生死不離親一步行年五十不下堂父毋以外無尊章畵師敬復瞻顔色髪白未笄何可得椿兮萱兮合作圖旁有几榻兼詩書君不見孝可生孝可死由周秦逮今此伊誰作配光青史北宫之女嬰兒子歲暮飲酒詩十篇一屋無閒人勉復出門走一巷無閒人驅車出坊口東西街十里排戸欵良友皆云出門久十至九不偶沿路爆竹聲兒童拍􅀟手車來仍復返斜日巳交酉一世無閒人誰同飲盃酒飲酒或不樂時時復嘯歌讀書有時疲披牋亦吟哦設榻書案旁所以消睡魔房廊亦周行時還撫庭柯大扺一日中良朋間經過飲酒時究少讀書時究多自爲京朝官童僕色不展連晨朔風至寒色到雞犬呉奴昨告去朱戸别思欵今辰關右僕衣被亦將捲欲留心不􅃘各爲計安善十年依倚乆一旦忽辭遠周親復交詈食窘衣不暖笑讀東觀書何如北門管學士不能飮而時負酒錢法時㠶喜招客侍講久輟詩卲二雲獨喜客贈篇孝亷耽宵吟王愓甫日出擁被眠廣文退食遲汪劍潭負劵愁逼年皆隔十里遥誰能比唫肩歡悰杳難尋俗累苦復牽惟應孫比部淵如時闖笙歌筵比鄰指揮署對戸車臝坊鄰雞第一聲馬嘶人亦忙否則公案側貫索聲琅琅羣動旣巳䌓吾行起徬徨門戸尙未開初日上北墻窺厨炊烟稀正苦瓶無糧吾師昔人言冬日則飮湯歸鴉値歸鴉十十復五五酒人憶酒人相思倍云苦寥寥心一寸誰復可傾吐欲因西逝日􅀉此蜀江滸江水杳以深高原復相阻思君不能見夜起聽更鼓安得雙鯉來奇篇槪今古此首寄張同年船山屋頭無星辰積晦巳三夕淩晨先習霰騎馬懶入􅀡生徒來饋歲野鶩間鮮鯽更有酒一樽聊云破岑寂雖慚通德里差比草元宅呼兒開美醖小酌經案側正好無俗人門前雪盈尺人皆處城西我獨居城東城西人不來賓坐時時空非徒息紛紜藉卧篇籍中日旰弱弟歸粥飯喜與同兒曹誦經餘得句輒復工爲善無近名我師陳仲弓干祿不欲多我法邴曼容興至卽舉杯消磨寺樓鐘昨來京華居闢室作影堂晨昏覲吾親旬朔申瓣香祿苦不逮親時時我心傷幸伴弱弟居諸甥亦隨行誨以勤讀書庶幾能顯揚歲晏風雪中懷人益傍偟一舅依郭門兩姊居江鄕何時能合并築室先壠旁向生無他奇貧甚益偃蹇人言年歲竟屏當無一件開函展然笑一室尙仰偃泉明乞食詩吾行恐難免欣然喻妻子且設歲除宴爲歡極今日先把百愁遣待過元日朝衣裘亦堪典歲除以酒炙酹亡僕窺園并繋以詩自余爲諸生汝卽侍左右皖江隨學使姑熟依太守兩年居白下一載住京口逮擢明經科相從浙東走窮冬遭大故九死返林藪汝也痛哭隨衣穿露跟肘經年堊廬内料理及糔􅘞一僕乘間逃蓬門汝兼守余心感其義待汝乃不苟除䘮來日下百事益粉糅春秋兩闈試十上九顚踣屈指十五年所値苦不偶親知久相弃汝乃誓不負落落十數州商量覔升㪹逰梁才匝歲客陜時􅇰久中謀金半百爲汝歸娶婦南下不半年長饑婦先詬踉蹌復追及訢室有病母汝才工料事兼復習科蚪毎寫百幅書人疑岀余手余交徧區宇能一數某某孫黃曁崔趙識我交􅇰厚不來同我憶來卽具尊酒各能諳食性黙爲理菘韭武昌城郭外客歲歴申酉地也南北衝邨墟雜花柳平生汝頗謹苦被僚僕誘到此亦有由都緣婦奇醜妄心希外遇或可副箕帚放艇夜渡江時時逐鷄狗衙推頻乘􅂩間値墨尿毆有時方縱笑遭我出行陡厲色一禁之鞭笞願甘受扶疴方就道風雪復連嘍余來幸通籍􅄙汝顔色愀遣歸迎眷屬兼爲覔糧糗汝時雖巳病聞語尙抖擻今年附舟至面色益昏黝殷勤覔醫藥病早醫乃後短至節氣長時時伏床嘔屏除諸食品日僅啖蔆藕沈疴由自取將死乃一剖彌留三兩日作札呼汝舅瞠目不得言頭從枕邊叩卅年爲一世誰識汝不壽汝行雖厠僕汝義實兼友汝不善攝生吾行又誰咎急爲馳惡耗書至月巳九汝母哭定癡汝父顔亦叟伶仃遺弱女學語未離㪍一棺雖草草必爲枕邱首除夕酹一杯傷心汝知否小除日寓齋卷施閣祭詩作昨年祭詩日同館挈仙史謂張船山今年祭詩時闔戸僅兒子一兒讀詩業未醇一兒學選粗有文呼來筵上作陪祭不向屋外招詩人事功一歲慙何有詩一百篇文十首偕之作達亦可憐敢向衆中誇不朽此筵設自我此例舉自唐浪仙詩句鏤肝腎積歲預恐心神戕我詩􅀡欲寫胸臆元氣未劚何由傷雖然一日間檢韵亦巳忙灤河仙鹿北谷羊作脯聊潤詩人腸南鄰詬誶聲北巷市􅒡沸吾廬雖冷一事無尤喜門無索租吏一詩焚筵前一詩寄蜀中狂生避債作臺後預想掩戸浮千鐘我行亦返卷施谷欲仿長江作詩屋更邀諸老同祭詩短趙狂孫附癯陸陸秀才繼輅年尚幼巳工詩兒子友也小除夕從家大人祭詩歌飴孫兒時放塾庭前過重􅄌提擕侍行坐桑陰屋側隨嬉逰手捧新詩當餘課十年負笈從師逰樓前學詠珊瑚鈎閒中分賦荷奇賞出語不肯同朋儔歸來朗誦喜阿母慈顔一笑開睂愁歲除亦􅄙束詩卷雅伴積軸堆床頭屋傍十畝富風景絶愛春晚兼新秋偶然好句覺自得僮僕徃徃􅅓吚嚘􅋈舟亭畔蠡河地花落花開摠能記年華二十春二分入世文章敢逰戲春明北上隨􅄌親歲星在亥月在辰曾登鳬繹望㤗岱更喜撃楫經渾淪看山看水不相識問名一一窮本根祝風咒􅀨一枝筆行客舟子驚竒珍燕中隨宦樂趨侍一卷兀兀隨晨昏過庭重誡爾小子學詩一語言重申閒堂月好命分賦擘牋搦管嘘陽春一篇偶合長者笑一篇􅀂拙長者嗔弟昆相賀復相戒冥索時復煩心神金臺芍藥閘河柳快飮百杯詩百首夜䦨掩戸時朗吟一屋兒童都上口卷施閣集排西東更列酒脯酬天工庭除恪侍作陪祭釭穗凝綠花冥􅄥太華培塿並時列光氣淩􅅍殊青紅瓣香縱不在前哲敢說家學能兼通他年倘得嫻一藝畧比過邁隨坡公花朝日獨逰二閘歸適馮編修集梧得田侍郎雯大通橋秋泛卷子索題因率書長句于後花朝日展重陽圖百年風光今在無蓼紅荇碧色不減只有卷裏人俱徂河流北去都成岸驢背紅塵亦頻換誰從物外觀古今石墖亭亭峙天半惜哉秋好何如春津水乍綠無纎塵獨逰徑苦意蕭瑟坐恨不見當時人百年似此清逰寡都䇿疲驢不騎馬沿堤正好迎面風攬得柳絲盈一把米船東來畵舸西百丈徃徃牽朱旗羣公觴詠致堪樂可念民力東南疲君不見東南十郡沿江滸陟險誰憐挽輸苦就中若以河沙量我亦江鄕一編戸田郎仁者固不同刻石告誡垂橋東即論文筆亦殊健赤幟巳植騷壇中風光過眼誰能久感舊懷人一杯酒春禽送客如有情約我重來看新柳葉舍人雯移居觀菜園上街東作圖索詩爲賦長句樓頭擘山作兩峯門外江漢流無窮先生開軒日正東繞宅萬樹桃花紅朝烹武昌魚􅇀飮江渚酒卅年􅁧述無不有􅀶士一官堪白首無端欲將閶闔排愛看紅藥翻當階江頭池館覔人住反使猨鳥情俱乖水程迢迢陸程少糧盡唯凴讀書飽津門橋南賃百驢􅇸金雖少書有餘朅來都門三易居菜圃開處眞吾廬盤盤老屋橫街後分半貯書嫌不彀鎻㕔退􅀡事亦忙目力若短書聲長談心時接北街李小松編修聨句尙有南頭王愓夫孝亷君不見買山何似還山住一様門前幾株樹屋頭添得十丈塵失􅁍􅀟川合流處法學士式善屬題曹指揮銳張運判道渥所繪二卷子蓬壺有仙人早歲卽食祿所居尤禁近丹闕森在目官清饒暇日當干駐車軸閉門詩作命萬事不貯腹我頃謂先生身外物皆足無須更誅茆天地卽詩屋苦吟朝復夜􅀟舉日月燭惟愁鑿幽險或致鬼夜哭元氣不可漓期君返眞璞詩名試屈指海内不五六餘如閱傳舍彼此可駐宿賞心雖偶寄過眼亦苦速茲龕庶􅊳兀表以出檐木名山原有待壇坫今已築我亦念故居卷施一隅谷右詩龕圖我家門前接早潮􅁍行一里數十橋橋邊朱樓橋下艇千尺䦨干􅃞清影扶橋楊柳高接天樓上著客疑飛仙偶然窗際落高詠却惹逰魚出波聽此橋此屋别幾年轉眼風月凋朱顔幸從塵外覔棲止百步尙有泉濺濺車聲馬聲何日歇毎遇橋名輒驚絶橋心何止無水流反惹岸塵高尺一先生詩思本􅇰超更喜畵裏逢溪橋桃花溪南楊柳梢著一斗室如鴉巢我因鄕夢頻生妒君爲尋詩盍延佇徑擕秃筆及􅇛蕉明日從君畵中住右溪橋詩思圖寒食出逰詞墻頭無雨聲墻下無草色杏花一枝空復情薄暝吹香作寒食春衣初試欲出門東風吹塵日已昏天嬌南去路如掌楊柳缺處藏春墳春墳高高盡尺五貼徧紙錢知有主橋西燕子飛不停啄得幾家墳上土啄殘墳上土來作梁間塵堂前宴客開酒樽卽是掃墓歸來人世間行樂皆如此一邊生人一邊死消沉代謝那得知冷眼却輸􅀟燕子東風吹塵日向西燕子亦逐逰􅉕飛成團蝴蝶出門去屋角幾樹桃花低城陀高􅊠土無􅂩高種花枝下栽麥老翁徃歲食有餘麥穗旣黃桃實赤今年無􅀨桃少華麥隴三月飛黃沙關心歲事各惆悵令我興盡思還家歸來閉戸同誰語一枕輕寒夜如許忽驚飛夢到江南借得鵓鴣來喚雨館僮折梨花一枝供膽瓶中率賦一絶折枝聊復詡春華插向文窗影絳紗蝴蝶一雙來入定錯疑添得樹頭花三月廿三夜丁香花下獨坐適法學士式善以庚戌辛亥兩年所作詩屬訂定因䟦于後丁香花底展君詩花穗千條月一絲句向卷中吟欲活月從窗裏墮多時商量握管題長句珍重臨風嗅亞枝明日欲邀花下醉更凴殘朶索新詞三月晦前一日清曉獨逰法源寺看海棠花下値馮戸部敏昌因同過寺旁亡友黃二景仁舊寓室已傾圯不可入感賦一首出門誰是看花路縱馬􅀡前知不誤斜行七里破曙光馬不識途能嗅香平明一寺攔街出萬綠衝門馬驚逸客行下馬方拂塵花下巳有先來人羡君何止尋花早花氣入簾餐欲飽十分花事惜巳過砌下漸比枝頭多明朝更惜花無幾窗外怪風成陣起看花人老花莫悲花下幾見常追隨不然花枝南頭兩間屋曾有詩䰟抱花宿眠時如鷗立如鶴看得開時復看落如今寂寞鎻幾春花屋祇當詩人墳門䦨雨圯紙窗破時聆唫聲夜深墮君行歎息欲出門我更代花招客䰟君不見客䰟定在花深處怪底曙鴉啼不住暇日校法學士式善張大令景運近詩率賦一篇代柬我詩時苦難法詩時苦易若欲詩筆工兩人先易地張君下筆有古人我詩下筆苦有我若論詩格超有人有我皆不可咄哉詩道匪易言何況雅頌至此巳及三千年誰無好句播人口大扺來徃起滅一一如雲烟天有日月星地有嶽與瀆筆端撼之不能動何以奴視荆朱僕賁育若夫一身之内理更該心志各淩爍口眼各闔開不將我之心志口眼寄于古人四體百骸内始覺我與天地錯立成三才不能已于心乃復出諸口爲天地立言于我亦何有有所溢于目乃復矢厥音爲山水寫照而我何容心一言二言精不磨千語萬語寧嫌多鋪牋􅀡可槪八極濡墨眞欲成江河然後張君詩法君詩牛腰巨卷擲我我欲頂禮同所師且令前萬古與後萬古得我數輩中立藉可相支持晦日卷施閣餞春偶賦十首紅杏枝前拜朔來丁香花底餞春囘冷官一日無餘事祇向疎䦨數舉杯經旬常坐此花前花幔愁開日影煎怪㡳鬢絲都不潤江南抛􅁍已三年白雲間有護花心時墮高枝作曉陰雲起接天花委地欲凴誰與判升沉細語檐鈴那得聞城東風物感羈䰟春原一様平如掌只少菜花黃到門雨絲眞欲比黃金尺五閑階草未侵九十日春晴過了却餘今日是春陰春殘排日鎭飛沙自掩疎櫺護碧紗誰向燕南記風土屋頭青草窖中花閒禽多半向城東花裏高樓面面通不看生紅看生綠天壇十里柳絲風送春歸處敞斜扉星露微茫􅀧裌衣休更梯墻看風色明朝不放紙鳶飛悟徹繁華摠是空興來擫􅅇自西東尙餘幾尺斜陽影要與春花鬥晩紅一種心情小婢猜四更猶自踏蒼苔燕疑殘月衝簾出那識幽人秉燭來惜春詞一風吹自東一􅀨來自西風催花作塵􅀨催花作泥作塵飛揚作泥定誰是春花舊心性桃枝欲窺廊柳枝欲窺樓窺廊見客行不休樓上柳眼看春愁入門復岀門不見碧天色離離滿徑堆綠陰明月欲從何地白心長夜短睡不甘曉夢亦復歸江南夢時看花醒時呌芍藥如盤向人笑四月十三日張運判道渥招同王給諫友亮劉舍人錫五伊比部秉綬何水部道生胡文學翔雲陶上舍渙悅至海北寺街古藤書屋看花小集分韵得花字一屋如舫門開斜半空吹香不見花入門老􅆬復橫路根古半入鄰人家抬頭花向竹梢颭一架正把天光遮綠雲􅄥􅄥雜紫霞花朶缺處􅉕爲衙花光豈止潤睂宇坐久衣上濃香加主人華筵開咄嗟有畫可質無須賖巷南喧喧來酒車花片驚落隨飛鴉以花入酒沁齒牙海濱石首津門蝦更喜蘆筍先抽芽年光􅁣如赴壑蛇春止一日須豪奢十五日立夏握拳透爪拇陣譁上樹百徧能搔爬酒盞嵌入枝了􅒎不爾恐有旁人挐十三清宵月正華笑視竹影生窗紗忽思逃席路復义一徑却好鳴官蛙到家冥冥吹曉笳袖底香氣留些些自御園囬半道逰五塔寺寺中有古樹二株出檐幾數十丈花開覆屋寺僧曰銀杏也爲賦一律五塔寺邊􅀟樹奇馬行迂道欵禪扉高枝似向雲中岀落蘂猶能天半飛清磬幾聲催夕照疎香十里􅀧朝衣鄰齋東去春如海寺旁卽極樂寺牡丹薔薇盛放較爾濃陰覆院稀廿二日侵曉偕孫大至豐臺看芍藥馬聲嘶過柳梢頭宛轉雲容清淺流十畝竟從人外闢萬花如向鏡中浮狂思海國春三月夢斷江城尺五樓小坐不妨遲日出滿汀濃綠撲簾鈎國花堂看牡丹新綠叢邊競吐芽柳陰先爲障飛沙縱敎風雨無寒色占得樓臺是此花幾日酒中勞悵望有人簾底惜韶華如盤莫向閒時笑第一銷䰟數謝家崇效寺看海棠入寺先敎􅉕蝶忙殿前一樹倚朝陽􅀂逢蜀客應回首不作秋花恐斷腸夢雨心情初挹露冠春顔色肯施香紅紅白白看千朶莫更臨風笑野棠題阿少空彌達西尋河源卷子鞭梢生層雲馬尾揺晴暉却行數里卽天上側㡌忽礙星芒歸雲外一株樹我疑是落棠不然何以夸父擲杖來茲方石林何周遭復疑天盡處不然何以豎亥逡巡欲回步地高于天石壓雲北斗背上生崚峋幾回洗眼望來路祇覺黃氣一縷從東奔漢家西南羌元人鄂端尾去此不知凢有幾一條天路雖分明歴萬萬古無人經飮源三日馬亦靈五色石上飛而行天河轉近滄溟遠三面銀光截雲斷行經萬里無一人立久氣如春日煖乃知山經水注皆放哉眼底甫覔眞源回道逢青鳥亦不訝見慣捧日黃人來圖中繪花翎黃馬挂君不見相公奉命安河流怒濤如雷喧七州此時那識鑿空使藐爾巳據天西頭一㝷其源一疏委同日奏功天子喜雲梯關北望板桐只隔地中三萬里立秋前一日法庶子式善邀諸同人至積水潭滙通寺泛舟觀荷分韵得學字入門一徑何磽确山鳥迎人如鼓樂繞垣三折到寺樓松櫟圍堂密如幄是時正値新晴後破曙園亭色班駮張顛窗裏先揮翰以指擘牋如可學卷頭祇寫波一層巳覺清光動榱桷苦唫尙􅌅人聲雜逕上高枝與商􅅦何生入座先邀客後日出逰期可確時約逰南西門外金尚書園亭坡陀高下石百堆坐啖氷棱與􅀲瓝新蓮去菂桃芟核客未及餐遭鳥啄纍纍紅果堆綠陰不問鄰家棗先撲誰人升屋思逃酒墻角銀衫險遭捉樹頭啖果人不知風峭時時墮菱殻碧筒盃好長三尺荷露殊清酒偏濁東西拇陣何喧雜熱暑欲將衣袖濯趁閒拉客淩波去忽有小舟無木􅅦船頭三四船梢兩喜得呉儂體修揱豈惟快飲荷盤露盤底嫩紅時一搦離離百頃生晩涼此樂江南庶堪較坐中誰復唫詩健欲以持橈抵橫槊弄波東去香尤逈指爪時驚刺菱角潭平日落風正生手撼前汀鷺絲覺法學士以康熈巳未鴻博前輩徐嘉炎等崇效寺雪公房探梅詩册索題爲賦一律棗花寺裏看花日我後諸君祇百年見說雪公疑古佛􅁍驚梅榦亦飛仙馬蹄聲冷春三月鴻爪泥留尺五天莫哂阿儂題卷末後來應又作前賢
