front:
  text: 更生齋詩餘卷一
  hash: sha256:b896e705374325f6c28c542068f96fb43b7a6d2ea58426c06731484b716d65b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_001-1a}
body:
  text: 陽湖洪亮吉著冰天雪窖詞主人少喜塡詞壯歲後恐妨學輟不復作卽偶一爲之終歲不過一二首歲戊午自京邸乞假回車箱無事輒塡至數十闋及自塞外回里亦時時作之遂滿一卷名曰冰天雪窖從其後言之也少日所作亦不忍棄并裁作一卷附焉機聲燈影詞是矣臨江仙綠鬢學仙愁已晚卽今況復蒼顏天空鳥去不曾還未知雙蠟屐再入幾名山半世著書難得了硯臺肯放淸閒酒人相約掩蓬關臉從花索笑心與石爭頑憶王孫涼風吹綻一天星約伴時時過水亭說鬼宵深不可聽掩踈屏小婢齊聲唄佛經過汀故說愛新涼躱過前頭姊妹行私語喃喃已不妨郤提防移得鸚哥出畫廊兩重門內忽相逢一串花香出袖濃剛賭秋千氣力慵且從容眼角回靑頰轉紅傷春長自下簾鈎杏葉扶踈柳葉柔三月花前雨不休沒來由私語催人上小樓滿江紅陳其年先生塡詞圖爲伯恭學士賦卅載塡詞香一瓣敬酬陽羨可可是家山百里畫中頻見前曾見先生四十畫像涉筆偶描秋士影關情别有春風面笑靑衫五十尚沉淪工排遣將擫笛先施韉乍展卷仍安硯仗卿卿壓盡等閒釵鈿别夜最憐天似水當頭吹落雲成片算個儂風味有誰窺梁閒燕試問熙朝人物在宋元之右只已未宏詞一榜尤稱淵藪前輩愛才眞似命昇平樂事吾能究趁閒來歌板兩三聲消淸晝竹垞老梅村叟招玉叔攜紅友且不知秦七何論黄九翡几暫停三寸管新腔已落千人口羨當年風月最淸華誰能又雙調江城子紅豆詞爲禮親王世子作深秋門巷動涼颸掩關遲雨如絲折得一枝紅豆立多時天上亦添新别恨人不見渺相思拈來枝葉影参差意誰知酒難辭且與梁園賓客譜離詞只有文園消渴甚賦不到九秋枝十六字令初冬風一夜千林葉墮空開軒望斜月正中峯減字木蘭花香濃月淡幾朶露蘭光欲泛行過房櫳福橘裁燈墮小紅茶甌淸洌留得那年元夜雪說夢聲低偏惹簾前鸚鵡疑唐多令眞氣本無前豪情忽欲顚一百番沉醉酣眠亂摘九天星與斗權當作酒家錢寥廓約頑仙踏紅雲種田待秋成歲月三千擬釣六鰲滄海去雖不飽且烹鮮眼兒媚杏花樓上杏花香無語斷人腸干他甚事鶯鶯燕燕咒盡年光依然簾幕依然鏡依舊隱斜陽如今再要當時人面郤費商量又嵌心百事總難忘閒處一端詳鮑姑紈扇柳孃羅襪謝姊縑囊愁多不合住江鄕夢少也千場笙歌元夕鶯花上已簫鼓端陽轉應曲雷鼓雷鼓打過春三四五還虧列闕豐隆催得前村挂龍龍挂龍挂一幅水鄕圖畫蝶戀花時欲乞假南回書示于弟十二闌干紅半曲桃杏將開一雨先舒蕚多分散人眞有福半春好夢無重複卅里迢迢煙艸綠欲望江南遠樹偏遮目好水好山生計足汝曹莫恨歸期促賣花聲春分艸綠未成茵柳線難勻等閑鶯語幾曾聞只讓杏花同燕子占盡春分心切望朝暾霧暗連晨關心西北有征塵日日玉堂天上坐卻是閒人謁金門誰决策除是劉琨祖逖一事差堪嬴越石承平非狎客义手巡行今夕放眼追思疇昔好友緣儒都入墨寥寥心孰白相見歡黄昏獨下珠簾病懨懨差喜睂頭常苦夢常甜三义渡三生路白雲尖惝怳長林斜月影纖纖鳳棲梧畢竟春來饒氣勢萬鳥啼春萬夢隨春至惹得玉梅添意智花開又豈干春事白袷春衫聞巳製輕暖輕寒春轉無倫次何是與秋非一致春人只把情懐試滿江紅譚子受英雄兒女圖大纛高牙問此是誰家年少只亘亘倚天長劍勢將離鞘千里偶追流電影萬金顧買傾城笑算渠儂二十五年前堪同調且緩緩金樽倒更艸艸離愁攪㸔車前努目急思投効兒女情懷何者是丈夫志業誰能料問卿卿何日定天山紅旗報菩薩蠻玉皇宮殿高無極東西龍虎更番直天上事偏多仙人鬢亦皤麻姑空一笑偶自舒長爪掐破碧桃花花光照萬家減蘭寄舍弟吾家阿弟先我一年辭帝里玉版銀鱗飽啖江南二月春小桃開落穩坐卷施東畔閣應念衰翁騎馬朝朝冒朔風應天長直廬卽事搆巢招得雙鴝鵒激水養成千屬玉長林麓横溪曲卻向此中開竹屋閑官殊不俗所喜更無拘束昨賜萬條官燭寫三朝要錄江南好時將乞假南回作此寄里中親舊鄕園夢昨已到雲溪生小樓臺三徧換柳邊門巷亦全非新綠浸簾衣鄕園夢昨已到花橋對舫乍憐詩社歇陸祁生毎與丁叔候兄弟及皃子飴孫等聯吟時並遠出隔河添得酒旗飄燈火徹淸宵鄕園夢昨到檥舟亭小港蓄魚橋半圮荒庵燒筍戸全扄僧老厭繙經鄕園夢昨到放生池煙柳綠交楊令宅楊大令西河宅在池側水雲碧罨謝家祠淸景待題詩鄕園夢昨到驛樓前障眼市塵高百尺關心鄕語别經年眞個說歸田鄕園夢昨到石橋村高隼欲盤雲外塔神魚時拜竹閒墳松子積臺門鄕園夢阿弟屢邀呼新築水亭招社燕别營山冢葬童烏猶子明男近殤作達且提壺鄕園夢好友遞將迎木杪軒中捜逸句竹初庵內證長生奇論尚縱横鄕園夢外舍最依依榆莢綠迷穿徑水薔薇紅隱上樓梯花發子規啼鄕園夢羣從亦翩翩坐我小樓𫾣句好輸卿長日枕書眠屋外水周天前調扺江南境作江南地一碧已無塵小市雨晴初試馬長隄星暗乍逢人猶剩一分春江南月不厭徹宵㸔無柰乍圓還乍缺未妨輕暖與輕寒長凭玉闌干江南岸屈曲漾蘭橈舊事乍思情漠漠夜程初急雨瀟瀟已過驛西橋江南艇鸂鶒與同飛待得柳稍殘月出水禽蹤跡已全迷留得夜烏啼江南屋低小只如􅊑一樹石榴初吐艶四更銀燭尚高然隱隱笛聲穿江南路從此遂幽尋韓偓艷詞容寄意陽城下考亦甘心别念撫孤琴江南夢日昨已全醒黄卷誤人頭欲白綠楊窺客眼猶靑閣小戸仍扄江南客天末溯歸蹤漁唱便須蘆笛和芰衣仍待柳絲縫鷗鷺且從容江南侶說著已銷魂松栢徑中尋舊友鶺鴒原上指新墳尤歎此衰門江南節屈指已天中絲柳乍靑蒲葉綠楊梅初紫杏丸紅水淺試雙龍虞美人黄昏獨坐闌干左竹葉深深鎖横陳玉體見何曾知道紅窗六月不燒燈夢中囈語愁人覺小婢都辭卻無聊長自睡瞢騰懊惱一鈎殘月鬢邊升江城子生踈廊屋幾曾經意忪惺步伶仃偏是半邊團扇有流螢縱向曲闌深處躱防照見一星星紅闌干外路三千病懨懨說當年贏得半生憔悴半生眠只有畫籠鸚鵡好渾不記有從前采桑子别來已覺無情緒放了風箏過了淸明總向閒門冷巷行何時約畧三春夢多比流螢少比踈星春睡瞢騰白晝醒轉應曲天上天上誰把兩丸安放東西滄海漫漫出沒眞如轉丸丸轉丸轉天也有時不管明鏡明鏡㸔了有時仍聽吉祥善事多般頓覺愁顏喜歡歡喜歡喜儂與鏡兒知已春夢春夢誰向小窗分送夢中說夢尤疑身外分身絶奇奇絶奇絶魂共燭花凝結千里千里只在離人足厎别來吳苑花香又復燕臺夜涼涼夜涼夜酒薄衾單多謝虞美人人人愛說芳菲節更愛團圞月箇儂心事獨嬌憨卻喜花㸔春半月初三長安道上金貂集靑紫容人拾到來生怕說頭銜只戀年時憔悴舊靑衫昭君怨原是一般年紀可可算他作弟記得小名無衆中呼入夜畫樓先鎖百計要將人躱何意學生踈上頭初柳梢靑纔賭千秋又邀鬥艸且漫藏鈎衆裏聰明箇中機警格外溫柔日斜剛下粧樓招女伴更番出遊鳳尾墩邊鵝毛洲上龍嘴灘頭西江月夢裏鶯花繚繞愁中風雨廉纖一般時節症懨懨相對燭花呵欠小膽疑聞鬼語細心時卜神籤病兒生怕不增添百計把人排陷減字木蘭花乍談心曲何事小名呼小玉彈指年華未比梅花比杏花最憐同調八字果然生剋肖判與他生自有麻姑肯玉成蝶戀花閒日偶從妝閣偵聞說驚鴻險被袁宗聘私語又防人竊聽團圞只指隨身鏡情短情長何自定除了今生更把來生訂一晌遲疑還未應喃喃只說心腸硬酷相思贈俠士日晚黄塵都似織徙倚徧樓南北便四海無家歸未得一劍也千金直一騎也千金直耻向人前稱羽客况肯談天釋任醉眼昬昬靑轉白天上也誰相識地上也誰相識醉春風好把春衣換更舉離觴勸眼前誰可寄相思算算算指上先掄心頭久嵌口中難喚合是人天眷莫更情懷亂個儂只怕太酸寒㸔㸔㸔爾許年華這回風格那般詞翰羅敷媚年來情事誰能識神也瞞他佛也瞞他小婢依微道着些無端兩地難牽合心在誰家身在誰家夢裏時愁去路賖又秋千架下分頭走姊住東谿妹住西谿只望秋千影不迷更闌重到秋千下月也低迷露也低迷畫索斜抛烏夜啼長相思風蕭蕭雨蕭蕭窗裏無人響玉簫紗燈壁上搖夢無聊醒無聊窗外荷珠落亂跳游魚蹴浪高木蘭花慢秋夜重憩團飄書屋示蔣二振三只團飄書屋仍一片挂斜陽算杏巳摧紅蘭先殞紫桂尚抒黄愔愔那邊門巷歎簾衣何短艸何長百徧欲尋歸燕幾番試問寒螿十年羣從半淪亡頭白剩蕭郞縱見了桃根尋他菱角也費猜詳平時枕書眠處是何人重與擺繩床酒醒佛燈藏幔夢回鬼語沿廊又太湖縱眺眼中何所有三萬頃太湖寬縱蛟虎縱横龍魚出沒也把綸竿林威丈人何在約空中同凭玉闌干薄醉正愁消渴洞庭山橘都酸更殘黑霧杳漫漫激電閃流丸有上界神仙乘風來往問我平安思量要栽黄竹只平鋪海水幾時乾歸路欲尋鐵甕望中陟落銀盤念奴嬌生日柬西家半秋纔過不多時到了初三新月八字雙飛胡蝶好生與菊花同日剛欲題糕仍邀說餅且把書聲歇齊肩齊歲那人先占佳節猶記七夕樓頭穿鍼簾厎腰痩頻頻折知道個儂勤頂禮偏喚小名何必笑靨方開愁睂更歛梁燕防饒舌燈花解事雙雙紅蕊偷結菩薩蠻贈俠客偶然來預朱門宴身輕只比梁閒燕驀地出人頭燈前尚閃眸一腔塡恨血七首懷中熱座客酒遲乾先防冷眼㸔木蘭花慢己未中秋內城南池寓舍作歎八年此夜移八處㸔陰晴算幾載持衡雨番入直一度歸耕西風欲催人老趁乍寒刮得鬢星星已被月中人笑從今莫更多情依然薄醉擁桃笙如水玉階平只三十年前境難依約夢不分明沉思那回塵劫把深杯都向夜臺傾一例碧虛解事半宵霞采横生臨江仙恭纂高宗純皇帝實錄第一分進呈擬欲乞假南下偶此書事人說綠簑靑箬好可容仍殿朝班玉堂官燭影闌珊昨朝書巳奏明日棹當還天上樓臺曾小住明湖如帶回環夜涼偏欲夢鄕關屋前雙叠港屋後一堆山琴調相思引歸燕一樣樓臺夕照昬杳無心緒入朱門欲飛還止銜得舊時恩差喜故巢同海上好春仍得話溫存倘逢精衞可許代招魂減字木蘭花夜涼人定正好明心同見性一縷茶煙透到梅花小閣邊休休莫莫夢好正嫌無着落與我周旋莫門睂梢眼角禪滿江紅贈崔三瘻生十八年前相見在謝家庭院驚一揖玉梅花厎與花同顫葛塢東西山水窟劉綱夫婦神仙眷便匆匆從宦向湖頭湖冰泮苕霅上頻開讌荆郢路頻傳箭只悠悠七載幾曾謀面蔥嶺南頭時入夢蒜山北下仍相見歎人生聚散總無端空中電昭君怨苦雨窗隙與誰同坐咒雨鵓鴣兩箇兜起卅年愁舊南樓暫向曲屏高臥夢又把人顚簸睡覺夜燈靑影伶仃滿庭芳雨窗簡蔣振三昆仲撇卻千山行完萬水偶來茅屋勾留又敎聽雨日日捲簾鈎畢竟誰人過訪三兩客兼雜鳴鳩門扄響奚奴睡熟親爲點茶甌䬒䬒風乍急紙窗搖動無異扁舟擬乘流徑去隨分淸遊東海波臣尚笑曾見汝大漠西頭祁連冢何時築就埋骨此荒丘念奴嬌元夕醉中復至城東憇㢲宮樓餘生何意擘蠻牋重寫孝侯風土醉我百杯元夕酒更聽一堂簫鼓我醉還歌歌仍引滿說盡邊亭苦妻孥雨泣昨年投卑豺虎殘夜出戸閒行城門東去彌望多平楚一領綠簑收拾好恰稱滆湖漁父踏曲歸來兒童指我睂目皆飛舞爲言此客與樓與月千古前調錢竹初松菊猶存圖十年歸計只剛剛長就滿籬松菊買得半園工位置儘可賞心娛目忽悟浮生因求大藥并禮西天竺回頭自望髩毛鏡裏先秃差幸服食祈年迷途未遠末路仍堪贖莫待扁盧俱束手醫雅難于醫俗一逕香淸一簾花好一味茶初熟這回休誤白駒頭上行速因而自省笑先生曷不工于責已萬里歸來行樂好何以埋頭不起幾尺牙簽三分燈影一寸書堆几蠧魚規客先生今盍休矣倘冀後世名乎三唐兩漢試問誰堪擬况是傳人皆有命不朽古來能幾文仿淵雲經研消歇已半登鬼籙半下名場别來萬里投荒幸絶域初歸鬢乍蒼便依然花鳥何時索笑依然樓閣何地傾觴蔥嶺煙雲祁連冰雪夢裏都憐徹骨涼君知我是愁多易老恩重難償金縷曲題萬大令亷山請纓圖圖作于大令年十五時後二十年大令隨畢秋帆尚書姜杜香侍郞勦辰州紅苗最著勞績此客眞先識趁升平時時留覽九邊阨塞試問請纓何太早髪正垂垂覆額天下事引爲已責手理韜鈐仍躍馬果湖湘陟建非常績勳勒徧壺頭石丈夫自信饒奇䇿况生平服膺所在劉琨祖逖如許少年能十輩分置楚南川北談笑盡萑苻之澤只我感恩思効死便歸耕尚枕投荒㦸隨爾去殺殘賊鷓鴣天秋杪雲溪曉望谿光未是廿年先一樣闌干到眼前風急萬鴉爭古木露寒獨鶴舞長天情漠漠淚綿綿舊家仍倚白雲邊尋春去問堂前柳破夢來穿渡口煙滿江紅中秋夕雨竆海歸來正盻望此年此夜還準擬半宵燈市半宵水榭三徑久憑風伯掃萬錢欲向天公借更持螯左手右持盃人聞暇雲驟暗重簾罅雷驟起層檐下忽蕭蕭瑟瑟瓦溝如瀉移樹鵲驚巢乍圮走橋人嬾粧先卸歎街泥滑處約良朋稱多謝西江月九月初七日雨窗遣悶門外愁霖似潑帳中淸淚同揮一年多事上心來不飮已防先醉明歲重陽何處去年此夕方歸人言死别復生回今日正當周歲鵲橋仙日斜時候日斜年紀又是日斜風味斷腸言語不須多况正値斷腸天氣前宵牢記昨宵牢記此夜更須牢記半生最怕說銷魂敢再到銷魂田地江城子柳絲南北罩通津水波勻月痕新卻到晏公祠畔暫逡巡偏是畫􅊑紅燭影頻照見夢中身又播錢堂上記還眞是穠春是花晨依約别來如影復如塵安得學他雙燕子來與去不隨人壺中天和女史歸佩珊韵卽寄令叔方伯伊犁從天試問恁詞華只付掃睂才子百歲含愁容易過經得幾番彈指未盡名心先抛世味且復營書史回㸔海水比來淸淺如此猶憶絶塞歸來君家癡叔憔悴何能死寥落雁鴻千萬里凴寄阿兄數紙并說中閨尤憐嬌女詩思淸如水比來相見怪他風味都似又贈僧鐵舟浮生如夢記忩忩滬瀆城邊小别石爛海枯重握手相對各驚華髪瓶鉢隨身才名葢世詩畫書三絶鋼經百錬鐡舟果否如鐵今日短簿祠前長洲苑外客路將鋪雪一領袈裟渾欲破賣字依然得活極目天南關心鄕國鞞鼓聲纔歇何時飛渡醉眠黄寉樓月僧漢陽人浣溪紗病後般般總率眞見時故故不溫存已敎銷盡昨宵魂開士心情居退院美人顏色賦長門年來偏重過時人鷓鴣天百罰深杯總不辭忽從酒半透微詞前房阿母都瞞卻只許靑溪小妹知重攬鏡更添衣衆中偏覺語支離不知天上頻攜手故說人閒會面稀臨江仙六月二十日詣學宮觀諸生釋菜并豋尊經閣遠望憶向校官稱弟子春秋祀屢追陪仲丁六十又三回舊題名已暗明倫堂有進士舉貢題名余皆預焉親爲拂塵埃尋徧講堂兼學舍兩株列栢誰栽尊經高閣暫時開靑衫皆後進紫燕亦新來浪淘沙壬戌中秋夜起望月不見時在洋川書院纔歇雨冥濛月甚朦朧玉堦處處有吟蟲咫尺好山都不見說是秋中少壯去如風老尚飄蓬别家還喜住江東金粟玉簪開已徧閒卻簾櫳舍閒㕔事側多此二花蘇幕遮醉題焦山月波臺屋禪關樓法界十仞高臺更在危樓外奇氣尚能除百怪穩坐蒲團且受江豚拜舉杯遲吟句快乞篆題縑總仗孤僧介一日已償詩畫債興來不學前人派瀟湘夜雨汪秀才次玉屬題夜意圖時余悼亡日近與君同病爰率賦此寄意悟徹前因銷磨塵劫又來樓上孤眠微黄燈影鏡臺偏聲惨惨寺鐘初動光黯黯簾幕斜褰無聊境我方匝月君已三年兩愁相校望夫山外愁更堪憐只投荒歸日病正纒綿渾欲訴金戈鐵馬念誰禁激管哀絃忘情好他時同穴百歲鎭隨肩入聲甘州夢亡婦向空房盡處瓦燈昬缺月影横陳算傷離感逝殘冬旣爾何况經春打叠半牀衾枕時爲拂纖塵奩鏡都安好與照歸魂畢竟瞞卿何事只夜臺相値問尚殷勤歎襄王孤館久已斷行雲想闌干東西十二便夢回總欲一周巡梅花句從今不賦防要含顰前調常熟訪吳祠部竹橋賦贈又匆匆扶醉入山城雪意釀寒更算玉芝堂朽赤厓閣圮紅豆莊傾今日劍門吾谷都已屬先生壓徧江南北壇坫崢嶸小弟頭銜一品但才名艷絶似遜難兄羨盈門弟子分日門心兵更傳聞量才尺好隔綘帷親授與雲英憑誰有平生奇福來入詩盟小重山夢不分明醒可憐小樓簾半卷月初弦喘聲低緩髻斜偏朦朧坐誤認卜金錢衾薄忍添綿舊曾揮淚處錦仍鮮擁來都恨夜如年無眠客今轉羨長眠如夢令十三日侵曉過碧浪湖龍氣出波冉冉鸂鶒鷺絲皆閃海日未升時幾片斷霞如斬休喊休喊驚破一羣鵝膽剩得曉星數顆芒角出同諫果尚未破天光水碧盡將魚裹孤坐孤坐千尺浪中一我菩薩蠻十四夜過南潯鎭高高下下游鱗繞侵人不已侵巢鳥一碧作魚天空明不起煙東西樓似織出水高千尺玉手盡垂空長廊接斷虹減字木蘭花十五日五鼓過平望湖偶開窗扇破曙鵲聲波上亂百頃湖光捲上先生六尺牀雪花難集倔强水蟲多不蟄落月團團東海魚龍尚愛㸔昭君怨吳江道中夜行惹得夜烏難住萬點鬼燐穿樹似復有人行散如星鸂鶒鷺絲屬玉齊傍水仙祠㝛宵半忽爭鳴學巡更淸平樂湖中迷道風風雨雨且向前湖去欲問來􅊑􅊑不遇進退總愁無據忽然香氣縱横半空舉手將迎岳瀆貴神抗禮算來只有書生浣溪紗萬頃橋萬頃湖頭萬頃橋雨簑煙柳共飄搖水從天外綠周遭㝛火照將鴻雁暝曉霞烘得鷺絲驕是誰來伴客無聊鳳棲梧戊子秋杪至虞山赴邵先生荀慈之䘮時亮吉結褵甫三日今復以事來遊則距悼亡日甚近也感而賦此憶昔來遊才合卺新婦三朝尚向紗帷隱小别乍歸爲整鬢對人言語尤奇窘三十三年眞轉瞬未比松筠早向深秋殞紅豆莊前紅淚隕回途魂已銷將盡虞美人寶帶橋蒲帆過盡危橋百徑縱無千尺便將螮蝀屈成梁只惜都無寶帶一般長泠泠橋外光如電雲朶裁成片頃傳三萬六千寬聞說眞仙不䐨放漁竿憶秦娥殘冬甚暖夏蟲並出感而賦此羊裘熱營營案上蠅聲出蠅聲出醉螯當漉凍魚須徹煤逋藥債都應逼商量艸艸營除夕營除夕年年共命此年獨活淸平樂孫解元子瀟屬題雙紅豆卷子夢回永晝滿地春光皺半領綠衫花氣透胡蝶趁香來嗅文窗特與丁寧東風格外垂靑欲配一雙紅豆除非天上雙星浪淘沙夢入小紅扉露灑簾衣鏡奩殘月影微微偏是獨眠人帳外胡蝶雙飛小膽更多疑怕踏層梯畫屏深處認依稀七尺紫檀香案上誰共扶乩前調斜照鬼門關落月彎環夜臺可有望夫山生怕痩魂扶不上添箇紅闌推枕漏初殘朱淚斑斑寒宵何止夢能還地下若無埋恨處仍到人閒十六字令拚厯徧長廊耐曉寒梅花痩不厭百回㸔聽一雁寥寥下遠汀荒寒境月黑鬼燈靑休斷送春人不上樓三更夢和月挂簾鉤遲已是踈鐘報曉時山禽影䔩䔩落高枝念奴嬌未至常熟四十里値大風雨三更向盡忽驚呼飛去葢頭竹笠鐵馬金戈聲乍沸波峭半篙難入絶壑魚龍陰厓神鬼空處通呼吸推篷起望一湖湖水全立只有卅里遙程前舟顚簸側搶回須急病羽樓頭秋蟲砌下纔復商量蟄愁人無寐殘宵短夢千摺水調歌頭自吳江常熟回舟欲至婁上作性旣不談釋又不學神仙半生纔一彈指何苦慕長年卿自埋憂地下我欲寄愁天上索醉向雲閒自有十洲客供我八方錢胥江口霅溪畔尚湖邊回頭三十三載舊事散如煙昔日蘆簾紙閣今日梅花紙帳淸冷耐孤眠短夢乍回處殘月影床前前調偶厭玉虛住屈作世閒人人生誰最快意良夜與良辰我欲花開地下更使水流天上耳目一番新倘荷化工允寧懼俗流嗔又誰願朝列闕叩羣眞百年三萬多日臥足幾回伸九野分鋪列㝛五岳塡平四海從此罷揚塵萬事等閒耳無鬼亦無神點絳唇題折枝圖贈友遠恨新愁半春已覺難消受海棠花瘦鴝鵒雙雙咒十二紅闌春氣應全透關心否鶯前燕後定有人垂手賣花聲過三义河贈練塘僧洲樣亦如瓜淺泊江沙二分月已透窗紗留得雪泥鴻爪影都爲梅花稍遠市樓譁港到三义山僧親爲煮山茶白髪一龕忘世久與證年華浣溪紗梨花和金手山秀才一棹春遊蘇小家紅紅紫紫信方賖玉闌干外幾枝斜仙子衣裳原縞素美人顏色本空花淡雲流水證年華望江南過京口訪駱佩香女史率成二首忘世事只有杜蘭香焚得一爐煙未燼萬帆門外去來忙吟客鬢都蒼淒冷處招得女生徒女徒殷姓其姊爲故尚書和琳側室琳死姊以身殉其妹流落無歸因依佩香以居桃李盛時顏宋莫海山佳處語糢糊猶憶故尚書洪北江先生年譜門人旌德呂培等同編次先生姓洪氏諱亮吉字君直一字稚存號北江晩號更生行一江蘇常州府陽湖縣左廂花橋里人先世本居歙縣洪坑系岀唐宣歙觀察使經綸始避唐敬宗諱改宏氏爲洪氏三十六世至先生高祖千運府君諱德健國子監生封中憲大夫娶程恭人生子二長爲先生曾祖秋山府君諱璟康熙戊寅拔貢生山西大同知府崇祀交城大同名宦祠娶汪恭人歙國子監生世昌女繼娶徐恭人歙處士成敎女生子十一次爲先生祖封旅府君諱公寀國子監生考授直隷州同知貤贈承德郞贅於常州趙氏遂遷居焉娶趙安人武進戸部尙書諡恭毅申喬孫女翰林院侍讀熊詔女生子五次爲先生父午峰府君諱翹國子監生累贈奉直大夫娶蔣太宜人武進歲貢生封奉政大夫金聲孫女雲南嶍峨知縣斆淳女生先生兄弟二人乾隆十一年丙寅先生一歲以九月初三日子時生於常州中河橋東南興隆里賃宅中宅後有積水池先生生於池南西舍十二年丁卯先生二歲十三年戊辰先生三歲十四年已巳先生四歲午峰府君命先生伯姊課之識字先生毎字必詢其義日晩皆爲蔣太宜人述之是年凡識七八百字十五年庚午先生五歲在家塾從季父希李先生授禮記大學中庸兩篇正月八日仲弟靄吉生按先生從父四人長諱翰字翮飛行一國子監生未婚卒次卽午峰府君次諱翔字雲上行三次諱翿字君佐行四國子監生贈修職郞次諱翺字希李行六先生仲弟字赤存行二十六年辛未先生六歲在家塾授論語七月二十日午峰府君客鎭洋縣署得疾歸未至家五十里以廿四日申時卒於洛社舟次越日殯於城東天寧寺華房先生隨蔣太宜人曁三姊一弟守殯宮凡五十日始歸十七年壬申先生七歲以午峰府君卒貧無所依隨蔣太宜人及姊弟寄居外家外王母龔太孺人之意也時外家亦窘蔣太宜人率諸女勤女工自給并儲修脯俾先生就外家塾受經率夜四鼓方就寢事詳機聲燈影圖記及南樓憶舊詩是歲塾師爲莊覲五先生城西坂上鄕人同學則其子騂剛表兄肇新廷耀馨凡四人讀論語畢十八年癸酉先生八歲在外家塾從惲牧菴先生銘受孟子惲先生武進縣學附生憫先生幼孤而慧常分館餐食之後其孫與三以乾隆甲午科舉順天鄕試爲先生同歲生惲先生猶及見之十九年甲戌先生九歲在外家塾從黃敬菴先生朝俊受孟子及毛詩國風黃先生武進縣學增生課讀極嚴是秋先生適楊氏從母亦以婺居貧苦無依率二女僦從兄啟宸後樓以居與外家相近移舍日値先生讀孟子旣醉以酒一章解塾詣其處龔太孺人及蔣太宜人適在坐因舉宜其室家句命之屬對卽應聲曰飽乎仁義龔太孺人極賞之自此益鍾愛焉是歲表弟定熙亦入塾與先生年相若後卒於叔素園先生官舍先生有詩哭之按先生舅氏三人長名樹諴字實君國子監生贈登仕郞次名琦字素園乾隆甲子舉人江西德興知縣皆蔣太宜人兄次名蘅字曙齋乾隆壬午科副榜貢生賜檢討銜出嗣世父淮安敎授文元後爲蔣太宜人弟事皆詳先生所撰外家記聞一卷處士肇新少府廷耀上舍馨處士定熙奎耀皆實君先生子蔣太宜人之姪先生之配蔣宜人兄弟也二十年乙亥先生十歲在外家塾從黄先生受毛詩畢二十一年丙子先生十一歲蔣太宜人率先生歸興隆里舊宅從旁舍塾師受尙書同學生徒十餘人不能徧課每篇音訓譌者恆至十數日夕歸蔣太宜人令之背誦必爲泣而正焉如濟河惟兖州兖讀作衮之類九月八日叔父君佐先生卒於廣西百色㕔寓舍無子以仲弟爲之後十二月伯姊適城北前橋村芮處士光照二十二年丁丑先生十二歲從周線里岳介錫先生受禮記是冬舅氏素園先生以國史館謄錄議敘選授江西德興知縣迎養龔太孺人於官舍自此蔣太宜人益貧苦無所依二十三年戊寅先生十三歲仍就外家從表兄肇新受禮記及周易塾課畢先生始學作詩嘗作中秋卽景詩有月出百尺樓花香三重門之句不敢示人惟以示表弟定熙冬十月舅氏實君先生卒於德興官舍表兄肇新奔喪西上因從陳𬎼賔先生寶讀書先是丙子科陳先生赴江寧鄕試舟覆於江午峰府君往館世執漳浦蔡太守觀瀾江寧官署塗次遇之急募舟以拯并助館金一笏爲試費陳後以已卯舉於鄕與先生亦中表兄弟也課徒之暇喜錄唐宋詩餘于是先生亦學作小令并與表兄馨日課漢魏六朝三唐詩成誦乃已是月仲姊適同里汪上舍德渭二十四年已卯先生十四歲在鹿苑菴從董獻䇿先生舒傳授春秋左傳并學作制舉文半篇董先生常州府學附生同學十數人惟與楊布衣毓舒交最宻暇卽唱酬往還是歲作詩數十篇及斥釋氏文一首二十五年庚辰先生十五歲在西廟溝謝氏塾從唐麟臣先生爲垣受左傳及史記漢書雜文唐先生武進縣學附生工詩三月上巳先生始作制舉文全篇題爲則以學文一句文成後唐先生極賞之同學爲謝孝亷榕上舍振祺等四人孝亷與先生極契後中乾隆戊申科順天榜舉人是歲先生有附塾驅兒諸詩及送表弟定熙至江西官署詩集中始有存稿二十六年辛巳先生十六歲從茭蒲里繆映藜先生謙受唐宋雜文及制舉義繆先生江陰縣學廩生同學爲陸上舍焜布衣文在張布衣先甲兄弟凡十餘人三月初應童子試不售二十七年壬午先生十七歲在百花樓巷莊氏塾從金壇荆廷緯先生汝翼受公羊穀梁及制舉義荆先生金壇縣學廩生先生從表姊子長於先生八歲舉業最工因是始識作文法荆先生後以是科副榜貢生中順天癸卯舉人已酉進士官華亭敎諭卒是歲同學爲莊上舍逑兄弟二人始學作古文有祭花神文及園居南樓夜宿初生十五六等詩初與唐上舍鵬訂交間有唱和焉二十八年癸未先生十八歲在城北四十里郵村鄒翁元士家塾仍從唐麟臣先生習制舉義同學爲鄒福梅廷梅金川三人鄒翁極重先生欲以女妻之知有所聘乃止五月解館歸卽染時疾復延及全家蔣太宜人病瀕危者數次大母趙安人大父封旅府君卽於是月相繼卒先生承重居廬至匝月後病稍瘳八月初復赴鄒氏塾是秋舅氏素園先生罷官奉龔太孺人旋里先生解塾卽從蔣太宜人仍居外家與表兄馨從表兄定安尤契倡酬談讌每徹晨夕郭北篇中井鄕歌諸詩皆是年作也二十九年甲申先生十九歲從北後街余芭貽先生豐受唐宋古文及制舉義余先生常州府學附生奇賞先生有異才之目每課文日先生常兼作數篇或一題卽製其二其三午餘諸同學方搆思未就輒已交卷時蒙擊節嘆賞歲暮解塾獨爲詩送先生次卽賞楊生淸輪後楊成乾隆甲辰進士里中皆謂余先生有知人之鑒焉是歲同學爲余先生子明經彤及楊章秦畢諸生共十餘人有雲谿春詞獨酌謠諸詩始學爲駢體文三十年乙酉先生二十歲在外家團瓢書屋授表弟兆峋經素園先生子歲得脩脯錢二千八百暇卽從舅氏曙齋先生問業時表兄馨從表兄定安皆授徒於家三人昕夕往還無間有春園唱和集又與里中諸名士結社訂交始廣有題阿房宮圖諸詩塡詞四十餘首三十一年丙戌先生二十一歲仍在外家授徒從學則表弟兆峋從表弟榮從舅氏秀君子衡章族舅氏濟川子三人歲入脩脯錢七千正月二十五日叔父雲上先生卒六月應童子試不售是歲詩社以洗研池賦㯽榔行雲谿竹枝詞命題先生試列第一又在楊氏騰光館會課凡四十人皆里中名宿先生年最少從舅氏榕􅴧先生閲其文奇賞之亦列爲第一此後先生常詣舍南竹屋問字至辛卯秋客皖江乃已又賦中秋減字木蘭花詞十首同輩傳鈔殆徧劉文學宸贈詩云才子淸眠起夜分新詞字字鏤香雲何當共握琉璃管寫盡羊欣白練裙是歲詩詞約及百首按雲上先生四子長開吉字元愷爲先生從兄次顯吉宇尙儀次亘吉字禹平次良吉字元良皆先生從弟蔣榕􅴧先生名和寧乾隆壬申進士由翰林院編修改官湖廣道監察御史三十二年丁亥先生二十二歲適汪氏仲姊以先生制義不進因與蔣太宜人謀復令先生在張王廟西潘氏塾從時月圃先生元福受作文法束脩二十千皆仲姊獨任之時先生乾隆壬申舉人中甲戌明通榜工帖括同學則潘上舍尙基方上舍起莘靑陽陳上舍蔚江陰陳秀才宏器諸人尙基之叔振煥亦舊識也六月應童子試不售七月諸同學就江寧鄕試先生又僦鹿苑菴後雲依閣讀書毎夜輒至三鼓僧徒厭之託言有賃宅者遷先生入菴旁土室中上漏下濕居之晏然冬十月外王母龔太孺人病劇先生自塾中歸侍疾衣不解帶者旬日及卒慟哭嘔血七七竟始奉蔣太宜人歸興隆里舊宅是歲有南樓贈書圖記訪從叔縣尉至昆山紀游哭外王母諸雜體詩三十三年戊子先生二十三歲在仲姊宅授汪甥楷經汪氏居天井里室宇深邃宅中所延經師則同里段布衣聖烈李布衣瑞寛與先生爲三其羣從皆好賔客每有文讌三人者恆首坐焉九月十六日蔣宜人來歸先生贅於外家凡三日始同歸興隆里舊宅宜人蔣太宜人兄實君先生女也婚甫五日卽赴弔邵先生齊燾於常熟邵先生乾隆壬戌翰林主常州龍城書院奇賞先生與黄君景仁是歲有催粧詞哭邵先生及游虞山詩又有寓興詩二十首及東鄰棄婦等詩寓興詩後卽失去三十四年已丑先生二十四歲仍館汪氏正月叔姊適同里史君德孚五月應童子試補陽湖縣學附生七月與諸同人訪城西徐墅陳刺史明善於亦園與無錫邵秀才辰煥江陰屠進士紳同里劉文學駿中表莊上舍寶書趙上舍懷玉唱和詩極多是月長女傳簫生未幾殤有贈趙表弟七言長歌按先生少孤午峰府君未及命名初名蓮字華峰是年以縣試第二府試第三院試第八補縣學生督學則副都御史滿洲景福也後以壬辰年改名禮吉辛丑年就試禮部以嫌名當有所避復改今名莊爲先生從母之子後官聊城縣丞趙爲先生祖母兄兩浙鹽驛道侗斆之孫後以庚子召試舉人官內閣中書靑州府同知三十五年庚寅先生二十五歲仍館汪氏從學者甥楷及汪生植等三人七月偕黄君景仁附瓜船至江寧鄕試九月榜發薦而不售有游京口三山及江寧雜詩是秋識錢唐袁大令枚於江寧大令謂先生詩有奇氣逢人輒誦之始與里中董太守思駉左刺史輔訂交三十六年辛卯先生二十六歲仍館汪氏從學者汪董諸生等四人五月偕趙表弟懷玉赴江陰同寓趙孝亷敬業寓齋科試一等四名補增廣生七月十日次女傳綫生越歲春卽痘殤偕楊秀才繼曾炳文劉上舍培基赴江寧鄕試同寓秦淮河房九月榜發不售十一月先生以館穀不足養親買舟至安徽太平府謁朱學使筠時學使尙未抵任沈太守業富素重先生留入府署未匝月適安徽道俞君成欲延書記太守以先生應聘已至蕪湖有留上朱學使書學使得之甚喜以爲文似漢魏卽專使相延入幕以臘月八日復抵太平黄君景仁已先在署學使作書徧致同朝謂甫到江南卽得洪黄二生其才如龍泉太阿皆萬人敵云是年秋在江寧與汪明經中顧進士九苞訂交及入學使署又與邵進士晉涵高孝廉文照王孝廉念孫章孝廉學誠吳秀才蘭庭交最宻由是識解益進始從事諸經正義及說文玉篇毎夕至三鼓方就寢是年所作詩文逾百篇三十七年壬辰先生二十七歲在安徽學使署隨厤徽州寧國池州安慶廬州鳳陽七府六安一州徧游采石靑山敬亭黄山齊雲齊山諸名勝六月以歸省旋里七月仍赴太平十一月以兩世六棺未舉歸奉先生祖父母及午峰府君叔父雲上君佐兩先生叔母趙孺人􅦮葬於城北前橋村新塋是冬以所負多訪蔣編修士銓汪孝廉端光於揚州編修解槖金助之乃得歸已廹除夜矣是歲作文二十餘篇詩二百餘首三十八年癸巳先生二十八歲時四庫館始開江浙􅊧采遺書安徽省設局太平聘先生總司其事沈太守業富并延兼管書記閏三月十六日長子飴孫生七月朱學使以閲卷乏人復延先生偕試徽寧二府九月自徽州偕汪孝廉端光歸里由新安江徧遊嚴陵富春及錢唐山水諸勝唱和幾及百首十月先生以不能家食往謁胡按察季堂於蘇州因訪趙表弟懷玉於穹嶐同游東西兩洞庭入林屋洞探金庭玉柱之勝宿包山寺二夕記游詩約十餘首月杪復歸時錢文敏公維城居憂在里見先生詩文奇之徒步過訪焉是冬移居白馬三司徒里賃宅十二月聞朱學使離任入都因附江陰繆君晉階赴廣西便舸至太平送之繆君爲先生舅氏素園先生壻時選來賔縣界牌司廵檢挈家赴任貧不能歸沈太守業富袁大令枚皆薄助行資於歲除日騎驢抵里有感族人饋新炭詩作兩晉南北史樂府二卷三十九年甲午先生二十九歲正月赴江陰補壬辰年歲試先是錢文敏公曾語學使彭閣學元瑞謂先生爲昌黎復生由是閣學亦久知先生十三日補試準附一等三名後又次蔣編修士銓元韻贈先生七古一篇薦入常鎭通道袁君鑒署授徒歲修百二十金并令在揚州安定書院肄業膏火費亦及百金自此將母稍裕七月偕黄君景仁赴江寧鄕試同寓明徐氏東園舊址是科闈中得文及五䇿已定作元房師賈先生景誼乾隆丁丑進士官蘇州總捕同知以首藝有别解與兩主司力爭因定作副榜第一焉座師則翰林院侍讀學士今文華殿大學士董公誥司經局洗馬今兵部尙書劉公權之也榜發座師及學使皆惋嘆不置十月復詣揚州冬杪始歸偕汪孝亷端光唱和詩極多是歲始與孫君星衍訂交同里則孫黄趙諸君外復偕楊君倫呂君星垣徐君書受唱酬無問里中號爲七子四十年乙未先生三十歲彭閣學薦入江寧陶太守易署中修校李鍇尙史匝月事竣太守亦重先生因延課其孫兼管書記四月以太守俸滿入都因歸省親七月復至江寧九月太守擢惠潮嘉兵僃道先生以親老不能遠游因就句容林大令光照聘課其壻漳浦鄭秀才聯華時孫君星衍尊人孝廉勳官句容敎諭而訓導全椒朱君沛縣丞錢唐汪君蒼霖皆工詩愛客縣中紳士王廣文吉士兄弟沈公子衣言亦慕與先生交凡客句容三月文讌殆無虛日又徧游茅山棲霞紀游詩約數十篇臘杪始歸里門十二月十日次子盼孫生四十一年丙申先生三十一歲正月仍至句容縣署二月歸里旋至揚州及江寧訪友三月復往句容校縣試文四月以林大令罷任歸里時浙江學使王公杰欲延先生校文七月往謁學使於紹興値其扃試例不當通刺資斧幾至乏絕及試畢往謁學使一見先生如舊相識遂偕往試台州處州二府中途厤天台雁蕩諸勝皆有詩紀事十月二十六日蔣太宜人在里猝得中風疾卒春秋六十有三仲弟以先生在千里外恐得訃後驚悼有他變卽作札言太宜人病狀屬姊壻史君德孚持至處州并促偕歸到日亦直扃試留書而返先生於試畢得書星夜遄返十一月十四日晡時舟至戚墅堰距常州三十里疾步至城有僕窺園父仇三爲營卒途遇之問家中狀仇以實吿先生驟聞哀耗五內昏迷方度八字橋忽失足墮水兩岸陡削人不及救隨流至滕公橋有汲者見髪颺水上攬之得人試心口尙微温始呼衆集救問里中識者共舁至家救者不知先生疑爲避債赴水及審狀則皆曰孝子孝子悲嘆而散天嚴寒衣履冰濕鄰人蔣松圓釋先生衣自解衣衣之舉家號哭呼救久之方蘇搶呼痛哭幾不欲生水漿不入口者五日諸姊以大義責先生始稍進米飮七七內僅啜糲粥席藁枕凷晝夜號哭終喪不進肉食不入內室所服皆白衣冠不御緇布自以未及侍蔣太宜人含歛哀感終身嗣後每遇忌日輒終日不食客中途次不變三十年如一日是歲在苫次撰次蔣太宜人行述四十二年丁酉先生三十二歲居憂在里授徒從學者汪甥楷劉生登禾孫生星衡瑀及張楊諸生凡七人長子飴孫時已五歲亦日課以爾雅十數行十一月座師劉公權之視學安徽遣人相延先生亦以營葬乏資遂於長至前由陸程赴太平并約孫君星衍偕行劉公相待有加以先生衣縞素不肯更易因約値節日朔望皆聽獨處專遣人司飮食在學署一載率以爲常及因先生譽孫君學行因并欵畱以助衡校自是先生與孫君助學使校文外共爲三禮訓詁之學畱太平度歲四十三年戊戌先生三十三歲在安徽學使署二月隨試太平徽州寧國池州四府五月中始返太平偕孫君至句容學署度夏七月復同詣太平隨試江北諸州府十一月在滁州因葬事先歸以十一月廿六日祔葬蔣太宜人於午峰府君墓知友在百里以內者咸來㑹葬如高郵金君蘭無錫楊君䒓燦兄弟及同里孫君等皆館於白馬三司徒里賃宅旬日方去先生在家次三日夜負土成墳始歸歲暮以負債多偕孫君至句容聞座師劉公遭母憂復親詣太平弔唁至除夕前仍回句容四十四年乙亥先生三十四歲仲弟以少孤失學假仲姊資學爲賈累歲虧折資本至無以償時先生服闋歸里决計攜弟北上别謀進取又以無行資袁觀察鑒薦入常州黄太守澤定署閲府試文薄有所贈方得成行過揚州汪孝廉端光復助以行資始舍舟從陸道遇漢軍繆秀才公儼今名公恩聯車北行五月初二日抵都居黄君景仁寓齋時四庫館甫開讎校事繁座師董公誥爲總裁官屬總校江寧孫舍人溶延先生至打磨厰寓齋總司其事歲脩二百金仲弟亦送入方略館効力先生節嗇所入半給仲弟館費以半寄歸爲衣食之資迎養叔母余孺人季父希李先生於家用度益窘每遇訪友或假書十里五里無不步行八月應順天鄕試不售時翁學士方綱蔣編修士銓程吏部晉芳周編修厚轅吳編修錫麒張舍人塤共結詩社首邀先生及黄君入會每一篇岀人爭傳之是以先生遇雖甚困而友朋之樂以此二年爲最九月朔日女紡孫生是年得駢體文四十首詩詞約二百篇四十五年庚子先生三十五歲在孫舍人寓校書仲弟以思家得咯血疾新歲益甚先生質衣具資遣人送歸時甫近上元以無衣不克岀門託疾斷慶弔絕過從者凡兩月時方南廵諸臣例獻賦頌先生爲山陰梁尙書國治製頌十八章首邀睿賞于是都下求屬稿者甚衆先生亦精力絕人日爲孫舍人校官書八巨冊類有攷證數十條夜則製進呈冊頁一通每至三鼓方休是年恭遇萬壽頌述之文益多自二月至七月所製凡五六十篇得酬金四百兩時前橋新塋前地一畝欲爲豪家佔買先生得家問卽以所得金之半寄歸先與立劵豪家遂不能奪仲弟病痊後復假貸北來先生爲盡償宿逋并取還前典質之物類皆賣文錢也八月應順天鄕試岀闈卽爲四川查按察禮聘掌書記入蜀歲修四百金先生以屢困塲屋不復有進取心九月朔遂辭孫舍人暫寓蓮花寺待查公同行適其方擢四川布政使未卽就道初七日揭曉中式第五十七名舉人孫舍人同獲雋查公遂力止先生無行于是復遷寓舍人宅是科座師爲協辦大學士漳浦蔡文恭公新刑部左侍郞無錫杜公玉林內閣學士滿洲嵩貴公房師爲掌貴州道監察御史淸苑李公孔陽李公閲薦首塲卽得疾二塲屬吳江丁郞中雲錦代閲三塲屬嘉定曹中允仁虎代閲座師以制藝皆散體已定作副榜第一矣忽中允得五䇿以爲顧亭林復生蔡文恭公取閲亦深賞之遂移入前列以五䇿進呈揭曉後未一月房師卽以疾逝先生與同門生視含歛并稱貸而厚賻之是歲與黄君及欽州馮編修敏昌順德張解元錦芳唱和及詩社所作共得詩百餘篇雜文數十篇著三國畺域志二卷四十六年辛丑先生三十六歲在孫舍人寓校書時移寓賈家胡同三月應禮部試本房山陰王編修增閲卷呈薦闈中已定作江南第二本矣固始吳副憲玉綸爲副總裁旋以軍機中書汪君學金卷易之先是孫君星衍已入關并札言陜西巡撫畢公沅欽慕之意先生遂决意游秦四月十六日偕崔同年景儀西行崔方至四川定省時征逆回京兵入陜道岀山西因迂道由館陶臨淸至河洛抵開封而資斧已竭適舊友楊司務仁甚同年管戸部世銘皆在開封共假資以行五月望後抵西安寓開元寺一宿畢公聞先生來倒屣以迎翊日遂延入節署時幕中爲長洲吳舍人泰來江寧嚴侍讀長明嘉定錢州判坫及孫君與先生凡五人陜西尙有回警日偕畢公籌兵晝餉暇卽分韻賦詩常至丙夜間游牛頭香積諸寺㝷曲江及漢唐古跡又代莊州判炘修延安府志歲杪方竣是月二十五日適汪氏仲姊以疾卒先生聞訃哭之慟仲弟以尙未議敘畱都每月揭資寄之是年道中懷古紀游及唱和詩共得二百首雜文數十篇四十七年壬寅先生三十七歲在西安節署三月偕同人至牛頭寺看桃花抵終南山麓始返四月黄君景仁以將赴選謀資入秦寓開元寺者三月間旬必借孫君出訪之或同游名勝竟日而還六月至朝邑訪莊大令炘回塗過潼關赴陸司馬維垣之約時陸署同州知府其子戸部鍾爲先生庚子同年畱二日卽順道游華山宿玉泉院質明坐竹兠行二十里至靑柯坪久憇自此以上皆當步行遂自千尺㠉直上小駐媪神洞飮泉由仙人窆日月崖蒼龍嶺至三天門塗皆危絕攀鉄索穿石脇方得上先生步行若飛餘人不能及也從天門東折詣玉女峯坐洗頭盆側蒼栢滿崖夕陽欲下天風泠泠渺非人境復上謁金天宮宮在落雁峯下距峯頂尙五里道士供果餌畢因至後山松檜亭視新月亭址卽秦昭王與天神博處時七月哉生魄日也薄暝仍回金天宮蔬食後出屋視星斗皆大於瓜皎潔异常倦宿東軒徹夜有聲不絕葢呼吸可通帝坐矣四鼔招道童秉炬上落雁峯視日出峯頂僅十餘步左爲華池右則鐵屋一間祀老子時夜尙昏黑忽閃電自隔河來八百里中條山畢見久之海日始上霞光萬千較黄山仙掌峯所見又不同矣蹲久下嶺天尙昏黑無所見復秉炬西至蓮花峯視巨靈擘山處又南折至環翠巖望山南諸峯并訪陳希夷習靜石屋徑從原路下山未刻至玉泉院華陰知縣來訪足力巳竭幾不能具禮兩日後始復舊以初八日返節署九月舊友湯大令大奎以輸餉至甘肅過陜相訪并岀炙研瑣談屬爲點定是歲几得詩百餘首文二十餘篇著漢魏音四卷撰淳化長武二縣志四十八年癸卯先生三十八歲在西安節署三月莊公子逵吉約游􅔛縣尊人炘方署縣事因同由興平抵馬嵬驛夜宿各有題壁詩畱􅔛縣五日登太白山從新開路至上池一勺久憇别日復上五丈原望陳倉𡵨山回塗過盩厔徧訪仙游樓觀諸勝時太倉王上舍開沃主講盩厔因畱宿書院中二日由鄠縣歸西安五月得黄君景仁安邑臨終遺札以身後事相屬先生由西安假驛騎四晝夜馳七百里抵安邑哭之于蕭寺中爲措資送其柩歸里時季父希李先生畱滯漢口約先生同歸先生遂自蒲州渡河由襄陽至漢陽而季父已先行座師杜公方鞫獄武昌喜先生至邀畱旬日陪遊黄鶴樓西塞山及隔江大别梅子諸山至七月望夜方行八月朔日抵里門因爲黄君營塟先是畢公知所居賃宅逼隘因贈資爲購宅卽今花橋北居第也以十月初三日移居焉十二月偕陸同年壽昌趙表弟懷玉計偕北上復迂道至句容江寧乃克成行時將南巡車馬皆乏僱小車前行除夕住拈花集度歲是歲紀游詩百餘首澄城縣志二十卷四十九年甲辰先生三十九歲正月十八日抵都門二月偕江陰繆孝廉汝和寓泡子河觀音寺時已締兒女姻其第四子先生壻也三月應禮部會試試畢偕同人游西山榜發薦而不售本房編修祥慶公閲卷最遲至四月四日方以三塲並薦總裁蔡文恭公及紀公盷奇賞之紀公尤擊節五䇿必欲置第一時內監試豐潤鄭侍御澂以得卷遲疑之欲移置四十名外紀公堅執不允因相與忿詈不可解總裁胡公高望調停其事遂置不錄紀公於卷末賦惜春詞寄意出闈卽先詣寓齋相訪焉先生以四月出都由山西赴陜道中爲田家詩寓意以資斧告匱迂道訪沈運使業富于運城五月半抵潼關聞畢公祈雨太白山因至盩厔仙遊寺相見翊日同游樓觀半道聞甘肅回警畢公卽回西安調撥兵餉先生以病暑畱盩厔縣署旬日方返西安莊公子逵吉繪元都訪古圖有百韻詩紀事是月十九日第三子符孫生時西安修濬城隍末竟而西事頗急畢公屬先生及孫君時假岀游爲名規畫其事六月程編修晉芳乞假來陜抵署卽病不起畢公與先生等日爲營畫醫藥及沒皆躬視含歛民歲著公羊穀梁古義二卷詩文合百餘首五十年乙巳先生四十歲在西安節署正月畢公入覲并摩唐開成石經進呈擬薦先生孫君及吳縣江布衣聲書國朝三體石經卽在西安刻石以進爲當軸者所阻而止二月偕嚴侍讀長明游紫閣白閣圭峯草堂寺由滻水橋巡第五橋諸舊蹟時畢公調撫河南趣先生至開封遂於月杪由陜入汴至則豫省方積旱又河工事塡委不復有關中唱酬之樂矣五月十一日季父希李先生卒十一月自豫南回枉道至固始謝大令聘署齋盤桓旬日方還里門仲弟以議敘從九品需次省先生於開封先生致書曹州守太谷吳君署俾就近食力焉後以史氏甥女歸其子上舍昭回里後歲歉甚復節嗇衣食贍諸親友間亦與錢大令維喬蔣太守熊昌諸人爲銷寒小集是歲得紀游詩百首修固始縣志按希李先生二子長名原吉字思周次名炳吉皆先生從弟五十一年丙午先生四十一歲在里中二月偕錢大令維喬等買舟至浙江省從舅氏榕􅴧先生時舅氏曙齋先生父子楊孝亷夢符孫振學吳祖健蔣承曾陸繼曾四上舍並以事至杭崔浣靑恭人曁公子景侃亦往任所連舫十數徧游錫山虎溪復至元墓靈巗流連篇什繼以淸歌極琴尊游覽之樂抵錢塘日卽居蔣表弟重耀寓齋榕􅴧先生子間日游龍井天竺靈隱淨慈諸名勝與邵編修晉涵楊孝亷蔣上舍崔公子吟咏常至徹夜畱月餘復歸里中三月重赴開封節署八月登封陸大令繼萼延修縣志并約爲嵩山之游以十月由鄭州宻縣抵登封陟太室少室訪嵩陽書院曁啟母石手搨三石闕銘信宿少林寺乃回甫抵開封聞榕􅴧先生之訃哭之慟是歲南北紀游詩約百五十首著東晉十六國畺域志修登封縣志爲友人改纂懷慶府志五十二年丁未先生四十二歲正月偕孫君星衍計偕北上入都寓繩匠胡同三月應禮部㑹試榜發不售以五月初抵里時競渡方盛與莊表兄寶書陳大令賔陸廣女壽昌日爲泛舟之游五月搆卷施閣于宅西稍有樹石及小池日偃仰其中畢公屢書促行十一月偕莊舍人復旦重赴開封節署是歲得詩二百首撰乾隆府㕔州縣圖志五十三年戊申先生四十三歲在開封節署賦寒食紀游詩四十首和者數十人八月畢公擢督兩湖先生偕行以九月五日抵武昌節署時楊進士倫亦主講于此時與岀游晴川黄鶴諸勝唱和甚多歲暮畢公甫自荆州堤工回署汪明經中毛州判大瀛方上舍正澍章進士學誠亦先後抵署談燕之雅不减關中五十四年己酉先生四十四歲正月二日計偕北行毛州判大瀛餞先生於江北三山徑梅巳半開矣由漢陽北上元夕後抵開封居同年徐大令書受寓齋數日渡河至武陟訪王大令復不遇因獨游濟源謁濟瀆廟至盤谷欲往王屋山不果二月抵都居孫君星衍琉璃厰寓齋三月應禮部會試榜發不售五月八日抵里七月之杭州訪友畱旬餘乃歸八月仲弟選授崇文門副使時同年李太守廷敬官常州延修府志并選唐百家詩以九月進署十二月返舍與錢大令維喬莊公子逵吉爲消寒小集是歲得詩六十餘首五十五年庚戌先生四十五歲正月元夕趁山東使船計偕入都至王家營以船行甚遲復由陸取道泰安登泰山至高老橋日已逼暮欲逕上同伴不可乃還以二月杪抵都居仲弟海岱門三條胡同寓齋三月應禮部㑹試四月初九日榜發獲雋座師爲東閣大學士王文端公杰吏部侍郞後官體仁閣大學士朱文正公珪工部侍郞鄒公奕孝房師爲刑部員外郞後官安襄鄖道王公奉曾也先是朱文正公雖未識面然知先生名已久入闈後欲暗中摸索得先生作第一人及得李君賡芸卷有駮䇿問數條以爲先生擬第一復得朱君文翰卷用古文奇字又以爲先生遂置李君卷第六而以朱君冠多士及拆號而先生名在第二十六乃相與嘆息以爲名次亦有定數云殿試先生卷條對詳明讀卷大臣進呈第一欽定第一甲第二名五月初一日引見授職翰林院編修七月派充國史館纂修官是秋先生與仲弟移寓三里河淸化寺街饒有竹木之勝查給事瑩舊宅也歲除先生以逋負多避債至城東數日除夕抵暮乃歸是歲偕同年張太史問陶唱酬甚多所得詩文數十首五十六年辛亥先生四十六歲在京供職正月十六日長子飴孫娶婦汪氏仲姊季女也四月蔣宜人率眷屬由水路抵都十月石經館開派充收掌及詳覆官時至國子監監視刻石以蔣衡所書十三經字多譌俗有上石經館總裁書欲一一更正不能從也是歲偕法學士式善劉檢討錫五伊刑部秉綬何工部道生王孝亷芭孫唱酬甚多五十七年壬子先生四十七歲在京供職三月考差引見蒙記名八月充順天鄕試同考官十四日又在闈中奉視學貴州之命向例未散館翰林無爲學政者有之自先生及同年石修撰韞玉始葢異數也九月榜發得士董履坦等十三人副榜希齡等二人卽日至海淀御園謝恩兼請聖訓卽蒙召見垂詢鄕貫科第甚悉并命速赴新任先生退卽束裝十六日次子盼孫殤二十四日挈家上道十月半抵樊城眷屬曁賔友由水程進發先生馳驛先行十一月十三日抵貴陽巡撫嘉興馮公光熊等皆岀郭相迓十五日接印任事卽緘題觀風十三府一㕔所屬生童以衙署逼窄捐貲搆署後樓閣卽今聽事西紅香館聽雨篷曉讀書齋千葉蓮臺等是也十二月初三日眷屬抵署從子繩孫悼孫史甥超宗並隨署讀書延表姪蔣上舍維垣敎之從弟顯吉原吉再從姪建禾蔣表弟曜西汪甥楷屠甥景儀及桂陽李秀才萬坤先後至署佐理閲文及幕中雜事是歲得詩七十餘首五十八年癸丑先生四十八歲在貴州任二月岀巡上游歲試安順南籠大定遵義四府五月回署六月歲試貴陽府八月出巡下游歳試平越思南石阡鎭遠思州銅仁六府十一月回署先生每課士皆終日坐堂皇評隲試卷積弊悉除又厤試諸府皆拔其尤者送入貴陽書院肄業一歲捐廉俸數百金助諸生膏火又購經史足本及文選通典諸書俾資諷誦其在省日每月必自課之令高等諸生進署講貫詩文娓娓不倦欵以飮饌奬之銀兩由是黔中人士皆知勵學好古甲寅乙卯兩科書院諸生中式者至五十餘人內如胡吏部萬淸花給諌杰黄大令鶴何編修應杰張工部本枝邱編修煌翟編修錦觀徐進士時英蘇大令廷棻焦進士承煒劉進士煜兄弟賀進士世淸等連翩擢第餘皆領鄕薦及登拔萃科以去五六年間所識拔之士無仍爲諸生者是歲具摺奏請以禮記鄭康成注易陳灝奉旨交部議奏爲部臣所格不行凡得紀游詩及雜文共百五十首著意言二十篇五十九年甲寅先生四十九歲在貴州任二月出巡下游歲試都匀黎平二府都匀試畢陸行至三脚􅋭由都江舟行古之牂柯江也至古州復登陸時彭提督廷棟兼攝古州總兵與孫司馬鑑出迓邀游五榕山入諸葛洞時方仲春百卉齊放菜甲花黃及一二十里先生嘗云江南無此春景也畱一日始行沿路苗寨中皆合隊岀迎男吹蘆笙衣錦衣挿雉尾女則衣黑䄡褕以銀圈飾頸富者至一二十圍晩至館驛必東西列亭下唱歌以荷包及銀犒之方去黎平以歲科並試畱四十日乃行中途厤游南泉山少寨洞獅子崖諸勝奇麗皆目所未睹先生並有游紀三四五月科試鎭遠思州銅仁思南石阡平越都勻七府五月十四日返署先一日長孫㝅曾生八月値甲寅恩科錄送士子入闈九月科試上游安順南籠二府十一月回署是歲所得詩文百餘篇著釋歲釋舟二篇六十年乙卯先生五十歲在貴州任正月十九日布政使以下奉邀巡撫馮公及先生至城南甲秀樓張讌放燈酒半得銅仁苗石柳鄧戕官起事耗署按察使張公繼辛貴東道尼堪富什渾公聞信卽行甫曙馮公繼往自此至任滿入都苗氛未淸數公並在軍營時有書函往復頗叅規畫焉三月科試大定遵義二府五月回署六月科試貴陽府八月値乙卯正科錄送士子入闈九月以將報滿蔣宜人先率子婦回里十一月十日先生自省城啟行督撫宻摺陳奏聲名以爲淸廉愛士數十年所未有諸生送者自圖寧關至貴定三日中常不絕熊生煥章楊生大奎隨行皆新中式無力入都者十五日抵鎭遠新任學使談君祖綬亦至當卽交印由洪江進發十二月抵辰州晤湖督畢公沅湖南巡撫姜公晟十九日抵荆州姻家崔太守龍見以公事出晤崔浣靑恭人錢上舍伯坰兄弟廿四日抵襄陽晤房師安襄鄖道王公奉曾除夕抵河南南陽府度歲是年得詩數十首著貴州水道攷三卷門下士爲先生校刊附鮚軒卷施閣二集嘉慶元年丙辰先生五十一歲元日偕南陽鎭總兵袁果南陽府知府完顔岱等至幄殿行朝賀禮初二日上道初七日至滎澤過河半渡風大作舟幾覆薄暮仍返南岸因步行攜從子悼孫及兩門生至惠濟橋行館草㝛越一日月夜復渡河夜半忽氷凌大下衝舟至四十里外方得泊明蚤復至滎陽驛索人夫帆䌫始成行午刻抵北岸十四日抵安陽晤同年趙大令希璜元夕宿磁州廿八日入都廿九日詣宮門覆命時先以任滿日黔省督撫保奏過優蒙諭見面時題奏當日軍機處將原摺先遞旋卽召見諭問黔中課士情形黔楚苗匪近狀民情安擾官吏賢否甚悉又垂詢祖父兄弟并甲第師生良久方遣岀是年以皇上登極恩詔贈先生父承德郞母安人復以本身妻室應得封典貤贈祖父母如例二月僦寓兵馬司前街四月散館一等奉旨畱館六月派本衙門撰文七月派充咸安宮官學總裁八月移寓沙土園八角琉璃井官房有亭池樹石之勝是歲得詩約百首二年丁巳先生五十二歲在京供職二月廿四日長孫女生三月初三日奉旨在上書房行走侍皇曾孫奕純讀書卽日移寓澄懷園近光樓下五月恩賜葛紗宮扇香串藥定有差蔣宜人率子婦等抵都八月丁酉朔皇上釋奠于太學奉旨偕李編修鈞簡石修撰韞玉王編修宗誠分獻後殿是日四子胙孫生其母侍姬鄭氏人蔣宜人前以多病爲先生購得之命隨入都侍巾櫛焉十月仲弟以嗣母余太孺人年邁乞養歸先生垂淚送之自此亦有歸志矣十二月恩賜御書福字風羊鹿尾諸品有差是歲得詩文七十餘首刊東晉畺域志竣三年戊午先生五十三歲在京供職元夕後仍遷入澄懷園直廬正月十二日仲弟副使君卒于里門二月廿七日大考翰詹諸員於正大光明殿欽命題爲井鮒賦春雨如膏詩征邪敎疏先生於疏內力陳內外弊政至數千言情詞剴切閲卷者皆動色初擬二等前列旋置三等二名三月初二日引見蒙高宗純皇帝記名時甫得仲弟凶訃痛哭不食者累日卽於初七日陳情引疾二十五日挈家屬從陸路南回四月二十五日抵里哭仲弟於厝舍五月詣蘇州哭畢公沅於其高宗純皇帝升遐以內廷翰林例應奔赴隨卽束裝北上三月初二日抵都奉旨在觀德殿隨班哭臨因赴本衙門銷假暫寓同年戴刑部敦元鐵厰寓齋四月派克實錄館纂修官偕總裁諸公首先訂定條例承纂第一分書卽高宗純皇帝初登極時事也是月以高宗純皇帝升祔太廟恩詔贈先生父奉直大夫母宜人本身妻室並請封典如例充己未科會試磨勘官殿試受卷官五月奉旨敎習已未科庶吉士分課湯君金釗張君惠言貴君慶等十四人移寓西華門南池子關帝廟八月第一分實錄吿成先呈御覽先生以春初束裝匆遽在都車馬衣履一切未具遂于二十日在本衙門乞假已准擬於九月初二日叩送高宗純皇帝梓宮後南行時川陜餘匪未靖湖北安徽尙率兵防堵時發諭旨籌餉調兵先生目擊時事晨夕過慮每聞川陜官吏偶言軍營情狀感嘆焦勞或至中宵不寐自以曾蒙恩遇不當知而不言又以翰林無言事之責不應違例自動章奏因反覆極陳時政數千言於二十四日上書成親王及座師吏部尙書朱公珪左都御史劉公權之冀其轉達聖聽發書後始以原稿示長子飴孫告以當弃官待罪是日宿宣南坊蓮花寺與知交相别同人皆懼叵測先生議論眠食如常二十五日卽經成親王等將原書先後進呈奉旨傳至軍機處指問旋有旨落職交軍機大臣會同刑部嚴審定擬具奏二十六日王大等在都虞司訊問並面傳諭旨洪亮吉係讀書人不必動刑先生感激聖恩伏地痛哭一一如問指陳無隱當經王大臣等擬以大不敬律斬立决奉旨免死發往伊犂交將軍保寧嚴行管束二十七日卽行時事出倉猝車馬行李俱無所出姻家崔大令景儼方在都門謁選偕同年王編修蘇同里莊上舍曾詒等日夜摒擋滿洲侍郞成格公時官戸部主事素未識先生自以屋劵質銀三百兩爲助方得成行計在刑部三日夜及自刑部至兵部曁岀彰儀門慰問者不絕於道其中多有未經識面者先生一一謝之崔莊二君及同里張庶常惠言陶孝廉登瀛皆送至蘆溝橋信宿而返二十八日至良鄕遣長子飴孫旋里支持家事遂挈二僕一車夫以行統計自京師至西安二千六百五十里計程二十六日自西安至蘭州一千六百九十里計程十八日自蘭州至肅州一千四百七十里計程十八日自肅州嘉峪關至伊犂萬一千里計程七十二日先生行篋蕭然資斧屢見匱乏賴故交素識殷勤贈贐饋食解衣始得遄行抵戍在直隷山西則如李大令景梅蔣刺史榮昌陳大令曰壽在陜西則如朱太守勲莊刺史炘費大令濬錢州判坫在甘肅則如楊戸部芳燦布政揆姜按察開陽唐大合以增周二尹能珂皆先生素交也十月初八日抵西安重僱車馬畱三日乃行十一月初四日抵蘭州十二月初一日抵肅州重儷出關長車除夕在鎭西府度歲事皆詳遣戍伊犂雜記是歲得詩一百四十首自西行以後遵旨不飮酒不賦詩五年庚申先生五十五歲在伊犂塗次正月二日自鎭西府西行十六日抵烏魯木齊二月初十日抵伊犂惠遠城自八月二十七日由都起程至是凡行百六十一日始抵戍所先是伊犂將軍保寧妄測聖意於未到之先先遞奏摺中有該員如蹈故轍卽一面正法一面入奏等語奉硃砒此等迂腐之人不必與之計較保公之意始息到日派辦冊房事務并給西城官墅一所先生自抵伊犂除謁見將軍外蹤跡不出戸庭所居環碧軒高柳百株亭亭蔽日軒下谿水四周暇則靜坐攤書間或廵欄閒步而巳是年四月京師亢旱皇上䖍禱三壇祈求雨澤因命淸理庶獄分别減等又敕刑部及各省詳查永遠監禁人犯分别省釋其在新疆年久未經釋回者俱分别開單候旨加恩先生以到戍未及三年例不開列自四月二十四日皇上親禱社稷壇之後經旬尙未得雨閏四月初三日因奉上諭從來聽言爲郅治之本拒諫乃失德之大朕從不敢自作聰明節非文過採擇羣言折衷而用兼聽並觀惟求一是而巳去年編修洪亮吉旣有欲言之事不自具摺陳奏轉向成親王及朱珪劉權之私宅呈送原屬違例妄爲經成親王等先後呈進原書朕詳加披閲寔無違碍之句仍有愛君之誠惟視朝稍宴小人熒惑等句未免過激令王大臣等詢問擬以重辟施恩改發伊犂然此後言事者日見其少卽有言者亦論官吏之常事而於君德民隱休戚相關之實絕無言者豈非因洪亮吉獲咎鉗口不敢復言以至朕不聞過下情復壅爲害甚鉅洪亮吉所論實足啟沃朕心故銘諸座右時常觀覽若實有悖逆亦不能壞法沽名不過違例奔競取巧營私之咎况皆屬子虛何須置辨而勤政遠佞更足警省朕躬今特明白宣諭王大臣并洪亮吉原書使内外諸臣知朕非拒諫飾非之主實爲可與言之君諸臣倖遇可與言之君而不與言大失致君之道負朕求治之苦心矣王大臣看此諭先行廻奏仍各殫心竭思隨時宻奏軍機大臣卽傳諭伊犂將軍保寧將洪亮吉釋放回籍等因欽此是日午刻皇上硃筆親書諭旨交軍機頒發中外下午以後同雲宻布卽得甘霖御製得雨敬述詩紀事御製詩注有納言克已乃爲民請命之大端本日親書諭旨將去年違例上書發往新疆之編修洪亮吉立子釋回宣諭中外并將其原書裝潢成卷常置座右以作良規正在頒發是夜子時甘霖大沛連宵達晝旋據報近郊入土三寸有餘保定一帶亦皆深透天鑒中誠捷於呼吸可感益可畏也等語是月二十七日先生在伊犂欽奉諭旨於將軍署庭涕泣叩首恭謝聖恩訖卽呈明將軍以五月初一日東還統計居伊犂僅及百日同人言自闢新疆以來漢員賜環之速未有如先生者有紀恩詩四首記事同人皆贈詩送别二十日抵烏魯木齊六月初六日抵哈宻二十一日抵肅州換車而行七月十三日抵蘭州十六日次孫宛曾生是月杪抵西安八月十六日抵開封九月初七日抵里親故話舊幾如隔世因自號更生居士十二月小除夕女紡孫適江陰繆氏繆壻梓入贅於家是歲得詩九十五首補作伊犂紀事等詩九十七首雜文十四篇著天山客話二卷紀程二卷外家紀聞二卷六年辛酉先生五十六歲在里門自二月以後偕里中耆宿爲壺碟之㑹毎逢花辰令節與趙觀察翼莊宮允通敏徵君宇逵蔣通守騏昌吳封君端彞陳大令賔蔣表兄廷耀等往還唱酬無間每歲皆然其於莊大令述祖臧明經鏞堂則時時相與商榷經義屢有辨證焉五月十三日孫宛曾殤六月避暑焦山定慧寺詩僧慧超巨超皆從論詩同年曾都轉燠邀遊揚州平山堂數日仍返焦山七月孫總戎廷璧邀游太湖東西二山遂至消夏灣觀荷十月松太道李觀察廷敬邀游吳淞江鎮洋汪庶子學金邀游趣園遂自蘇州徧游婁東諸勝而返是歲得詩二百十九首文三十一篇七年壬戌先生五十七歲在里門旌德譚君子文居下洋鎮自建洋川書院延課諸郡生童聘先生主講席遂以二月攜第三子符孫壻繆梓至洋川與諸生講經談萟每至宵分遠近聞風從游者日衆四月旋里八月靑陽陳明經蔚邀游九華厤天臺東巖諸勝復游黄山浴朱砂泉重至洋川書院十月旋里十九日蔣宜人卒有悼亾八首記事作蔣宜人行狀十二月吳江徐待詔達源邀遊黎里旬餘而返先生自塞外歸尤喜導揚後進每遇世交子弟才藻過人者輒向名公鉅卿稱道不置同里如劉編修嗣綰莊上舍曾詒黄孝亷載華丁明經履恆陸孝廉繼輅秀才耀遹黃上舍乙生莊秀才綬甲周孝廉儀暐陸上舍鏞高秀才星紫瞿孝廉溶等皆得奬勵之益其專心古學者如劉孝廉逢祿董上舍士錫諸人則以漢魏諸儒朂之其在蘇州松江鎭江徽州寧國池州及浙江東西諸郡簮屐所至從游最多每有異才必加奬許其尤邀心賞者至折輩行相交請質文字纍纍常盈几案至有數千里轉輾介紹以求詩文題字者如雲南師大令範袁明經揆四川郭主簿蘭芬等不可勝計至如羽士緇流素工吟咏者亦欲得一言以爲幸偶歸里中及所過之地戸屨恆滿樽酒過從論文考古動輒移晷先生不憚其煩也是歲得詩百七十七首文三十五篇著左傳詁二十卷八年癸亥先生五十八歲在里門正月同年曾都轉燠過訪因偕同里趙觀察翼劉宮贊種之莊宮允通敏舅氏曙齋先生莊庶常詵男謝庶常榦爲詞館之㑹畱讌數日始行二月鹺政額勒布公聘主揚州梅花書院因游京口諸山遂至平山堂看梅四月以揚州講席酬應較繁辭之而歸仍赴洋川書院是月廿八日次孫女生五月旋里六月至焦山定慧寺避暑旬餘而返八月仍赴洋川書院十一月自洋川由水程沿江至蕪湖張太守祥雲陳孝廉懿本畱游後湖蟂磯諸勝遂訪孫觀察星衍於江寧月杪旋里偕同里諸公爲消寒雅集杯酒往還更迭置讌十二月復游上海偕李觀察廷敬及幕中諸客爲消寒㑹旬日返里十二日塟蔣宜人于前橋先塋昭穴復遷塟仲弟副使君於穆穴先生自營生壙戒子孫毋得更葬爲詩以記之葬事旣畢因至句容茅山徧游靑元館華陽岡乾元觀與舊友王司馬周南談燕竟日而返是歲於宅西西圃小築泉石創曙華臺更生齋得詩二百九十九首文三十二篇刊竣乾隆府㕔州縣圖志五十卷著比雅十二卷九年甲子先生五十九歲在里門正月率長子飴孫弔平學使恕於江陰同年邢大令㴻邀游長興龍華寺遂泛湖至長興自長興訪王少冦昶於靑浦李觀察廷敬復邀游上海徧訪南園吾園及葉氏也是園三月重赴洋川書院四月自洋川至歙縣洪源謁先祠展大同府君之墓五月旋里初七日第五子齮孫生六月送書院諸生至江寧鄕試畱居報恩寺精舍匝月八月重游上海李觀察邀同先生及吳祭酒錫麒祝編修堃趙表弟懷玉諸人以中秋夜泛月至吳淞江飮宴達旦各有詩紀事十月如臯汪觀察爲霖邀游北園遂偕登狼山絕頂望海訪水繪園故址回塗溯江復至焦山小憇十二月至蘇州游天平支􅛜諸山久住吾與菴遂往鄧尉香雪海探梅而返是歲得詩二百五十九首文二十一篇十年乙丑先生六十歲在里門正月自宜興渡太湖至長興偕詩僧巨超游卞山遂自湖州至天台徧游天台石梁赤城瓊臺諸勝宿桐栢宮國淸寺數日而返三月涇縣李大令德淦聘修縣志設志局於蕭公祠先生日與縣人趙舍人良􅉈廣文紹祖左明經煊朱廣文煐等訂定志例酬酢往還無間五月旋里六月重至涇縣志館八月旋里復爲太湖包山之游徧訪石公山林屋洞綠楊灣諸處九月三日爲先生周甲初度長子飴孫等於里第授經堂稱觴二日初十日第三子符孫娶婦崔氏乾隆辛巳進士分廵湖北荆宐施道永濟崔君龍見之孫乾隆壬子科副榜貢生甘肅兩當知縣景儼之女也十月由京口溯江至星子縣登匡廬絶頂自香爐峰厤石門澗天池佛手巖黄龍澗秀峰寺諸勝回塗重至涇縣是月七日次孫女殤十二月旋里是歲得詩三百四十三首文二十二篇十一年丙寅先生六十一歲在里門正月至杭州以元夕泛舟西湖遂至餘杭縣徧游徑山大滌山諸勝宿洞霄宮回舟復至鄧尉看梅二月寧國魯太守銓聘修寧國府志設志局于城北戚氏故居先生以涇縣志事將成命長子飴孫先往編校自畱寧國訂定條例閒訪敬亭南湖之勝四月自寧國至涇縣由水程旋里五月復至寧國七月自寧國至涇縣遂由旌德太平往游黄山浴朱砂泉宿紫雲菴復自黟縣祁門溪行至崇安縣游武夷山徧厤九曲溪及天樞玉女諸峯入桃源紫雲洞自上饒玉山舟行旋里是月四日孫凱曾生第三子符孫所生二十三日第三子婦崔氏卒八月二十三日孫彪曾生長子飴孫所生十月重赴涇縣十一月以涇縣志吿成自涇縣至寧國壻繆梓補江陰縣學生十二月由寧國旋里是歲得詩三百十七首文二十二篇著六書轉注錄八卷編纂涇縣志三十二卷十二年丁卯先生六十二歲在里門正月往游金焦二山小憇定慧寺二月舟行至於潛縣游東西天目山宿禪源寺數日而返重赴寧國志局第三子符孫侍行五月旋里避暑焦山定慧寺六月重至寧國是月二十日次女生二十二日側室鄭氏卒七月自寧國至江寧八月嘉興李太守賡芸邀游煙雨樓遂游常熟虞山至嘉興復渡浙江至紹興登北榦山訪快閣天池之勝十月重至寧國十一月以府志吿成自寧國旋里是歲常州大旱秋霧復傷稼禾苗不成飢民皇皇城邑尤甚先生首請于蔣太守榮昌及武進陽湖兩明府設局營田廟捐資施賑先生總理局事自捐三百金爲倡餘按城鄕各商賈殷戸酌資勸捐每日卯刻入局漏下一二十刻始返風雨無間又慮賑鬻賑米有疾疫及狼藉粒米之虞於是改賑以錢自十二月至戊辰四月每月放賑一次訃在局四閲月凡捐銀一萬七千九百餘兩錢十萬六千四百餘千所賑飢口二十萬四千九百六十餘其鄕歸鄕辦者不在此數閭閻稍蘇而災厲不作鄕人感之是歲得詩二百九十二首文二十四篇編纂寧國府志五十卷十三年戊辰先生六十三歲在里門二月六日偕陽湖畢明府開煜在武廟放第二次賑三月十六日偕陽湖馬明府紹援在西廟放第三次賑是月自江陰渡江至通州遊雲台山及狼山登支雲塔觀海四月十八日偕馬明府在武廟放第四次賑是月至杭州小住湖上游雲棲理安諸寺回舟復觀吳門競渡而返六月避暑焦山定慧寺是月二十日適芮氏伯姊卒先生哭之慟浹旬不岀戸庭八月率第三子符孫至江寧鄕試回塗復至揚州訪友重憇焦山以中秋月夕徧游月波臺巨公崖與詩僧巨超等談游竟夕十月江行至漢陽訪洪山南湖晴川黃鶴之勝月杪旋里十二月游荆溪南山入張公洞里許而還初五日孫序曾生第三子符孫妾戈氏所生是歲靖江朱方伯勳居憂寓郡中先生偕方伯及其客陳司馬玉鄰唱酬往來最數得詩二百七十一首文二十篇十四年已巳先生六十四歲在里門正月至蘇州鄧尉看梅久憇吾與菴三月重游焦山小憇定慧寺及海門菴四月廿二日先生偶患脇疾服醫家消導之劑月杪漸愈五月初五日脇痛復劇飮食漸減猶日坐歲寒堂未嘗偃臥有問疾者皆自謝之初九日服醫家降伐之劑脇痛未減時有喘逆十二日氣息漸微家人環問頻云無所苦彌畱之際老媪抱幼孫彪曾侍側呼先生猶徐應之未刻先生卒越一日殯于北江草堂子飴孫等以是年十二月二十四日申時葬先生于武進縣德澤鄕前橋祖塋昭穴
