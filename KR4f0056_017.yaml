front:
  text: 卷施閣詩卷十七
  hash: sha256:a055c4b482420890be9e527daf2e39ab932cf59744402b9fe26c426d48971621
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_017-1a}
body:
  text: 陽湖洪亮吉著回舟百嶠集乙卯丙辰自鎮逺舟行至常德雜詩時正會勦銅仁沅州紅苗一路皆傳箭送舟僅乃得過亦幸水程距札營處稍逺也靑溪及玉屏水程從此起飛夢入吳江迢迢七千里兩關皆虎豹一棹若蜻蛉昨得軍門札傳烽送使星孤猿攀危崖意思亦若懾仙人飛空行投杖手復接一程復一程幸爾水流急山頭看花苗排刀向空立水祇深三尺舟搖亦不妨來朝衫笠影隨月漾瀟湘見慣即不驚殘骸蔽江黑鷹隼何不仁抽腸作常食楊柳千條巷夫容百尺樓可憐兵火後剩有夜烏愁浦市甫經燒劫所見尤慘空灘三百級一石一文裸更有莓苔影朱文漾錦波殺聲喧落日何處可潛逃幸是昏黃月騰身附鵲巢泊舟仙人房仙人遁無影我欲上帆竿延回瞰深井楚女生來好淩晨掉小舟神魚知好色出水看梳頭及到洪江口材官馬上迎蘆灘都有諜不敢點燈行人頭及人脛一半出魚腹怪底帆不前荒灘鬼叢哭淩晨坐淸寒閉目養心性過盡千百灘都從雙耳聽烽煙不到處幾樹發黃梅鵲語先傳喜雲光亦四開六州兼十縣魚鳥竄紛紛只惜桃源洞難容爾許人辰州謁畢尚書師出所定詩文集見示即席賦呈二首一半戈船下瀨橫烽煙開處見山城天南縱置籌邊驛研北仍聞擊鉢聲幕府盡稱詩弟子謂劉侍御錫嘏等虛窗間禮古先生軍容荼火由來盛未改臣門似水淸述作多應拜下風憐才如此復誰同諸生並致三霄上五嶽分標各卷中歲月釀成無事福災氛消盡未言功殿頭第一人爭羡不負科名僅有公常德胡同年文銓招飮郡齋即席賦贈十年前事重徘徊曾醉梁王百尺臺未覺壯懷輸少日不妨間裏門深杯掃除硯北橫經席料理城東小史來淸興到今仍未減春風先為拆踈梅成奇功稜稜俠氣填胸抱可惜君偏著書老卅年知已薑侍郎薑巡撫晟一見猶能一傾倒雖然此遊不可忘踏遍七澤兼三湘零珠斷璧篋中字尚抵陸賈千金裝欲行不行更搔首握别還思素心友君不見竹初菴內證無生應笑勞人日奔走荆州官𪠘偕錢上舍鉞令弟伯坰暨崔恭人作消寒七集即席有懷崔丈龍見欵客荆臺苦致思舊遊重到酒難辭猶憐匹馬衝寒日却值間庭詠絮時久別未妨書代面故交多已鬢添絲冰弦彈至傷心處時話文敏舊事不管花窗夜漏遲一載軍書插羽飛人傳公瘦我寧肥路穿烽火驚身在夢逐波濤入姊歸時在宜昌一帶讞獄會面未能忘息壤關心先自理初衣君時乞養疴歸里未允天南佇看苗氛淨好買蓉湖築釣磯題崔恭人秋山訪菊圗幽窗雨過點靑苔蠟屐曽從響􅓏回自覺向來秋氣少不隨探菊祇探梅丙午二月曽追陪鄧尉看梅衫裳葉葉起雲霞簇蝶裙飄一徑斜却過小橋天路近絶無人迹有飛鴉飛瀑渾疑石上琴欲從何處更幽尋空明一點靈山月與證迢世外心雲裏紅闌曲折橫半秋時節出山城飛仙一個花千朵都署頭銜太瘦生間從卷裏憶西州零落羊曇感舊遊苦向尊前問癡叔謂大令維喬渚宫殘雪不勝愁少日談詩有性靈後堂延客眼先靑願營百本梅花屋更展紗帷乞授經酬錢上舍丙曜舊時門巷判西東蠟屐常穿楊柳風占得雲溪一灣淥小樓都在水聲中詞筆欣看萃一門比年風月共琴尊龍華會上如相問交到彭佺四葉孫余幼時謁蕭山公即蒙奬識及長受尚書之知又與大令及伯坰兄弟並稱莫逆鄉園春半飮屠蘇握別仍行萬里途自笑逰蹤太遼濶更從北夢説西湖前在西湖與君别襄陽呈房師王觀察遠宦迢迢各一方馬頭真喜向襄陽西南尚見烽煙赤師弟初驚鬢髮蒼懷古池臺聊駐節探春簾幕偶傳觴是日立春盈箱案牘須勤理肯學山公醉百場立春日過襄陽謁羊杜二公祠有懷孫觀察星衍山東君為東國諸侯長我作南方多士師竹馬共思逃孰歲土牛又見迓春時酬恩尚愧身無補傳世先驚鬢有絲至竟古人能及否薄醺間謁二公祠元日南陽幄殿趨朝夜向晨宛南春首淨無塵早聞內禪光唐宋又見元年值丙辰全楚正欣秋再稔史官應奏日重輪堯階未在追陪列尚愧西淸侍從臣人日扺鄭州巡撫景安遠遣人相迓書此報謝握别梁園已八年憶君風味逼前賢大河南北頻經歉好為蒼生計息肩人日聊登百尺樓繁臺東望久淹留破除舊例吾何敢瘦馬羸童入鄭州君淸素如昔一切酬應送迎之禮皆絶今獨遣一介相及是以云衙齋聨句記經時風雪甘涼苦致思在甘肅籌邊最久尚以書生待開府􅑮人仍索憶山詩君所著有憶山詩草王大令復專人約遊偃師余以驛路迂回未果翊日從岡里渡河半渡風發舟幾覆日晚僅得扺南岸因徒步携從子兩門生至惠濟橋行館宿却寄大令一省故人一别經歲時封書約我遊偃師把書沉吟復東走塵土隨人已三斗津頭塵暗風尚微挂席如馬從風飛忽驚風從半空旋長年大呼人語亂眼看北岸離才尺帆急欲收收不得一風吹舟舟轉輕樓櫓盡訝凌空行蕭然天末一使星河伯已遣鮫人迎盤渦欲下仍未下惡浪幸從船後㵼舟人心定客始猜欲扺岸北偏南來聳身一躍得平地觀者居然詫神異鄰舟望我竟若仙餘艇尚在風中顛君不見故人此日遲高會客卧津亭自顛沛瓦燈一盞土橋南且喚行童理生菜時覓食物無有僅得生菜數把葉縣道中雜詩保安及昆陽一驛三十里奔馬逐歸鴉齊入黃塵裏屠蘇酒乍傾簫鼓賽升平爆竹聲何脆年頭年尾晴卓午昆陽道溪橋細細風春衫紅一片併揚日華中寄王大令復南來已是一旬馳真擬忩忩入偃師河外土風堪作宰洛中人日偶題詩何因祖客筵前酒轉憶孫郎帳下兒來書言及舊僕吳順已作孫郎帳下兒矣幾許笙歌兩行燭昵人魂夢憶多時黃河阻風却至惠濟橋行館晚携從子門生至橋東玩月作寂寥山館許停驂酒薄都憐興未酣多謝北風能欵客吹帆三日住河南頺墻三折路參差拂樹先驚鵲踏枝艷殺野橋山店月不妨人去立多時過新鄉贈孫同年希元籃輿薄晚過山莊飛騎驚看迓道旁一代相門傳縣譜君為文定公從孫千年古邑號新鄉采風近郭民謡肅話舊虛窗月影涼更喜外臺條教密時景侍郎撫豫有善政又為州縣設立科條甚周兩河應可息痍傷曉發湯陰破曉趨南郭城荒竹木稠地為今下邑山即古中牟殘雪明華表驚沙暗驛樓停驂吾不願昨已飯宜溝將至安陽先柬趙大令希璜二首尋常三五團欒月自到牂柯見未曾料得鄴中元夜好故人應為剪春燈爾許情懷漸不支屛除絲竹已多時還能與門筵前酒可有孫郎帳下兒壬子冬飲君署醉甚幾欲逃席值孫兵備舊僕郭勺藥代飲數觥乃解湯陰謁嶽忠武祠古木叢臺起怒風嶽王祠倚堞樓東何因浣盡孤臣血不祀前朝嵇侍中埋骨西湖恨已多小朝廷久厭兵戈此方立廟非無意尚為君王障兩河扺安陽境塵土撲人戲柬大令一首主人倘厭客經過故遣飛沙織似梭休望琴堂鬥尊酒元規塵已汚人多十四日未刻抵安陽趙大令為招春燈社火宴客海棠詩屋至三鼓乃別翊日更邀遊天寧禪寺設百戲餞別醉中賦贈鄴中十萬戶一戶排雙燈城東城西徑十里萬影礙月難東升安陽大令我素知飛書約我停少時排門燈影看不足中有戛竹兼吹絲紅塵障天緑波掣馬尾搖風馬頭月鼓樓街北蕭寺東齊捲珠簾看飛雪昨日醉幾場好友為我招張王皆幕中賔客海棠詩屋圍社火夜半更約傾千觴今晨别何地更遣聾丞控飛騎佛樓開處面廣場闢戶為余陳百戲此回元夕無不有月影燈光與杯酒董生董生惜前走謂上舍達章時已入都説與王郎應妒否謂大令復更排石級上石亭一城華燈尚若星摩挲金石百回步寺有元至元十二年鐘銘及至正中石刻足力倦處開僧扃念君官事忙如許衆裏離觴復頻舉一晌歌聲壓彩雲梅花山館飛如雨君持手板輿前立我瓣心香馬頭揖時以所刋近著見贈别袂猶餘燭燼光離亭已暗風沙色晚發安陽至磁州行館一路燈火甚盛喜而有作十里平沙柳數層漳河橋上月初升何因爛醉安陽酒來看磁州郭外燈李舍人鼎元登岱圖平生心力瘁躋攀五嶽遊完鬢未班肯待向禽婚嫁畢僅留老眼看靑山欲捫星斗挹穹蒼杖䇿仍須辟榖方我是上春君早伏入山先已異炎涼戲題秦人種桃采芝圖童男童女五百桃實桃花萬千何不合成鄉里婚男嫁女耕田毛女忽然大笑惹他四皓顔開商洛山連太華大家飛去飛來馮給諫培竹鶴圖意中我有間樓閣閣下亭亭立雙寉寉徑時看一花落胸中我有奇峯巒此外觸處皆琅玕六月更有松風寒乘軒豪此君直開徑居然得三益門開無人寉亦應門叢竹兩兩為除行塵門關無人竹亦索笑仙禽翩翩自詡同調先生此圖實得我心寉既有侣修篁成陰尚恨竹外無月寉邊無雲石牀無積書竹几無淸尊客來不醉相對何以能追古人君不見今人不來古人往寉步空庭竹森爽畫中山好不可居何不歸為五湖長寒食早得家書偶題二絶寄南中小兒女莫怪尋常鶯燕猜踏靑時節未花開鉤簾欲訪春消息却值江南驛使來平堤一色緑初鋪四月江鄉畫不如遙憶風前小兒女紫藤花下讀家書奉酬邵學士晉涵病中見寄之作與君卜鄰意非好欲拉酒徒時醉倒墻西望汝一樹花君病未瘳春遽老箋云日噉半甌粥頗厭墻東酒徒擾墻東酒徒非得已匝月行完七千里轟天炮火衝身出弔影驚魂可知矣昨來偶自窺靑鏡不覺二毛填鬢底期君醉我君辭疾反作新詩惱行客酒逋我縱盈門索藥劵知君亦山積君如戒藥我戒酒一日顛毛恐俱白李公子存厚梅窩圖羅兩峯畫橫斜影百枝坡陀石千尺不知是我不得來或是君家不招客花遮簾櫳柳藏槅空裏似飛鶴一隻有魚千頭禽百翼幽人一一與之數晨夕兩峯畫石如屈鐡兩峯畫梅如值戟披圖我忽念疇昔三十載前携蠟屐余未弱冠時從叔為崑山尉曾過訪留居旬日一峯如頺一峯劈更上一峯吹竹笛此時不知梅窩在南復在北但見高低屋橫脊屋上殘冬雪花積百年君居此山側孫時看梅祖所植幸我淵源盡相識不然何以揮灑千言有餘力詩成對卷仍嘆息兩峯老懶殊可惜君不見玉峯前頭湖水碧咫尺應須望鄉國倘使餘箋更有一丈長直接吾家水西宅却扇詩為吳孝廉鼒賦譽婦詩成百口傳可知標格本天然靑綾步帳曾相識我是張􅏏友謝􅏏吳所娶為孫兵備從妹半臂新裁蜀錦鮮薄寒聊與壓吟肩馬頭明月如團扇偏照匆匆惜别筵耳語臨岐記可真回頭生怕阿兄憎看花遲早尋常事莫作蓬瀛第二人怔忪鞭馬出金臺失意偏教笑口開我憶壻鄉風日好紅荷百頃待郎回白髮詩為胡上舍唐作鄰東胡生昨呌絶白髮忽然衝帽出大呼擲帽理髮末幸喜根株惟有一胡生胡生意若失走馬索詩兼口述我為生語生勿怵此事何關存與殁古來賢聖半夭折顔賈頭中無此物矧生飾貌有不屑從此何妨罷梳櫛平生品與陸展別無子未聞收側室鉗之鑷之可不必生聞我語笑兀兀二三子者粗有筆為我責頭須痛切我聞生言意亦豁一毛雖小慎勿拔或者明朝生七八疾呼奚僮馳急札朋來盍簪賀白髮茅柴之筵咄嗟設生今上坐非忝竊燕毛之禮誰敢忽雖然生不可不察此物上頭急作達從兹陸行乘驢水乘筏面垢莫除塵莫刮衛玠弗愁人看殺題王太守宸仿董北苑瀟湘圖為徐孝廉嵩賦此卷長三尺零陵老守圖居然棐几側陡落洞庭湖山水情今古荒唐夢有無卧遊吾尚記千里下黔巫豫自黔中還朝取道洞庭四月草日與胡公子稷會飮金光祿孝繼宅被酒醉甚歸途于馬上得五百字即送南歸兼柬莊上舍逵吉陸秀才繼輅今年絶代才皆下考功第汪端光王芭孫徐嵩趙懷玉張問安尤苦不得意王生除學博賣字作歸計趙生居僻巷忽爾閙車騎無端長鬚奴失笑復垂涕揭曉前一日誤報中式汪生將外擢以助教當得同知畢力此一試寅初聞揭曉側立門隙伺猛聞𫾣扉聲妻子雜沓至寧知非報捷有客誤投刺徐生病支離一夜屢登厠先期吟病鶴君甫作病鶴賦讖已兆垂翅蒙頭聞報罷急起理囊笥張生已獲售黜落為奇字欲歸東西川奈此楚氛熾相邀避人迹戚戚聚蕭寺吳生鼒示不屑頻日酒筵肆監厨得驚坐謂假陳肖生宅燕客肴饌悉精緻酒徒七八輩痛飮日三四我慚居下位不克挽風氣尚書名知人紀宗伯昀本可愜羣議微嫌心有主意在急防弊遂令中材升𣏌梓或被棄几兹數君子一一洵國器中年饒底藴詎止文藻麗沉淪致顛蹶此事亦匪細今晨聞剝啄君又理歸㘘君才希數子靡不夙投契况兹年尚少拭目盼遭際嗟貧兼歎老與衆不一例感君行計速飮餞為粗備不愁分袂早反恨遲把臂君歸過庭暇勤學戶嘗閉吾州衙署厰古檜陰拂地側聞賢太守一歲興百廢􅌑瓏疏曲河搆閣臨睥睨春闈兩人捷吾鄉獲售二人已獲毁橋利形家言吾鄉戚墅堰及城中白雲渡橋皆與縣學有礙太守今已折之其餘懲薄俗悉力整凋敝侯賢實桑梓豫與太守本從歙徙東望舉足企明春當乞假官閣倘可詣蒙莊雖從甥夙昔視猶弟知君過從數一語煩逺寄逋錢三百萬土木苦煩費園成諸債集何不築臺避陸生才筆健竟欲逾老驥陸生嘗從豫遊昨來觀近作好句我能計吾鄉兹數子得不詫尤異相思不相見發念時一疐遊山我防懶日在室中肄所欣腰腳健百里走尚易一裸聊負篋一僕持絮被預思重握手不得到春季倘及三月三春江可修禊五月初八日方比部體吳孝亷鼒邀同人出西直門小集金氏園亭即席賦贈並送桂大令馥之官雲南雨絲踈不斷一路出西城日閃塔頭影雷轟澗底聲草高飛騎入花滿露舟橫淸絶尚書塢當門𣏌已生幾許關心客無多賣賦錢暫拋官裏事來趁酒家眠岸柳陰三面溪雲白四邊遙程愁更數西去萬三千城南雅集圖城南雅集圖凡八人法祭酒式善李編修如筠張檢討問陶劉舍人錫五何戶部元烺水部道生兄弟王廣文芭孫徐孝廉嵩圖成屬亮吉跋之云爾城南百萬家屈指無幾人匪繄果無人下直常閉門幾年我苦居天末間煞城南好風月側聞我友興尚豪把卷呼之齊欲出法祭酒王廣文近來作詩稱雅馴徐孝廉張檢討倔強自誇長句好介休詩老偏改官貧甚不厭居長安稜稜弱冠才尤異難得何家好兄弟我交短李惜已遲覿面却值居憂時八人所貴忘形久不問圖中貌妍醜昨日作一篇今日作一篇城南㕓舍不數里時有飛騎馳吟箋流傳俗口殊難耐只説羣兒自相貴豈知帝京景物本冠十七州賴有數子晨夕成淸遊不然東西紅塵曰如織何以使春花生輝月饒色一奴前行不著鞭八騎矯首皆如仙穿行古剎及荒墅日永或借間齋眠數君才調皆經世所喜升平無一事木天粉署官本間欲以琴尊消壯志徐生忽然䇿蹇驢時下第南歸王子亦欲燈牛車時赴華亭教諭任遂令七客忙不已分日載酒延王徐還君斯圖三太息勝會如今亦難得卷圖水竹自生涼差信此中無熱客法祭酒雪窗課讀圖堂中一寸書門外三尺雪孤兒讀未完慈母心若結朝行課讀書暮行課讀書孤兒業甫成慈母年先徂衰親無百齡積雪不逾月所以人子心常思事親日感君與我孤露同六歲七歲稱孤童君以七歲孤余甫六歲貧家無師讀不得卒業皆在紗帷中雖然我與君稍異憂患餘生復難記五雅三蒼業縱同經旬九食談何易白雲前頭一曲溪余昨繪機聲燈影卷子亦圖太安人課讀時事昔者我友曾分題長檠無光短檠繼持較此卷殊依稀我家茅三層君家竹千箇我家屋比君家破雪朵盡從頭上墮君家門向左我家門向右我家雪比君家厚徹夜有光飛甕牖可憐遲暮猶耽讀只惜春暉杳難續每值窮冬風雪辰攤書時向茅簷哭吁嗟乎今年之雪非去年今日之景非從前安得衰親常存雪不化兒寧讀書終老茅簷下少宗伯鐵保暨少宰玉保繪聨床聽雨圖屬題率賦一篇散人步入蓬萊遲大茅小茅皆本師天門不敢與鈞禮却憶抗手同行時余與少宰同舉京兆鄉試祇疑未換仙人骨間掃落花消白日忽聞天上落吟聲矯首不禁狂興發披圖乃仿逍遙堂下直兩兩登匡牀置身高處莫忘却但見榻畔左右竹柏搖靑蒼誰言天上淸間極一例苦吟能入癖他時竹杖或𫾣門慎莫移牀先逺客送桂大令馥之官永平汪錢盧邵汪明經中錢教授塘暨盧文弨邵晉涵兩學士相繼作海內故人今益稀洪生終日塊然坐欲哭不哭常歔欷數君豈止傷夭折汪錢邵年皆僅五十左右六藝微言亦將絶間􅊧篋底出手箋精義猶堪補殘缺桂生亦是今儒者六十扄門校蒼雅遠官萬里無一錢手抱遺經尚難捨君不見許君弟子有尹珍首以小學傳蠻人二千年來師授絶得母待爾一一重敷陳君不見蠻方志乘尤踈略若水蘭滄考須確博南倘許宦三年他日應傳眭君學題陳布衣嵩畫梅册子君前築屋臨江屯老梅一株香一村冷泠江水半彎緑更向花下開橫門幾年作客思家切手寫一枝如鐵屈猶嫌比屋多塵氛不遣虬枝四邊出一花中間綴一星空處掩映天光靑嚴寒百鳥絶無影間有老鶴來梳翎客來時立梅花側是客是花渾不識三更月淡雨又來淸冷獨抱花魂回題陳同年慶槐借樹山房人生天地間百物無不借日受天地恩不向天地謝况乎百年內偶復賃傳舍何人開此巷此屋又誰架主人名誰何何日得間暇因而覓奇樹一一種如稼何年高出屋淸影相激射自從有樹來人事疊交卸前者有因依後者得慿藉冬有以為冬夏有以為夏時而蔭淸晝時而響長夜賖此千尺陰無須一金價居人不之德鄰亦不之訝我今為評量不得不枉駕知非乞諸鄰造物者所貰君如思報德日日羅酒炙邀此一世人相與酣樹下狂來鋪席卧林密已無罅倘問身所來亦從天地假七月七夕吳侍講錫麒招集澄懷園賞荷即席賦贈居然秋雨餘邀客集深徑何止盈眸花葉聲淸可聽槐黃堆北牖香氣一窗迸奇書隨手讀兼復展明鏡婉婉越客謡沉沉洛生詠雖無鸞鳳翮雅有麋鹿性蒙莊方任達管輅苦言命坐中趙味辛舍人談命不已莫負佳節歡移樽酌波暝酒半移酌池上與張同年問陶皆失足墮水戲作一篇並呈西頭萬葉戰秋雨東岸百花明夕陽夕陽紅退遜花色秋雨緑淨逾溪光張郎酒行冠已側笑道一年惟此夕携觴約客臨北池指點塘拗欲鋪席影先入水身誤從前與君同里井三十六峯懸倒景烏聊山頭筍堪煮更摘鄉園雨前茗時吳上舍文桂出問政山筍及松蘿茶啖客千杯百杯酒不辭簾角月已來絲絲排頭生客座旁聽鄉語拉雜愁難知鼓聲隆隆街北響我醉欲歸神忽愴馬嘶聲苦步亦慵瘦馬轉若憐疲童君不見魂燈已出門藥帳猶在舍世間百事皆代謝新僕逡巡候簷下初十日吳上舍文桂邀津門李生為余寫管領九秋圖爰贅以二絶句管領秋花事可知姚黃魏紫不同時算來也被仙人妒東海新教月上遲籬前薄薄有花陰小立居然爽客襟一曲紅闌天萬里是誰能識九秋心桂大令馥戴花騎象圗與其北方騎槖他不若跨象踰牂柯與其東中餐苜蓿不若簮花撫蠻服我官蠻服諳土風民戴長吏同家翁車前何必八騶列象鼻舒卷如長虹花枝紅紅罩官帽六十使君猶若少有時象背吟欲顛惹得幼姬開口笑祝君官滿無一錢堆鬢花好垂吟肩君不見三年政成歸亦好叱象北來耕海島趙大令希璜雲車飛步圗我昔至盤谷欲登王屋山馬疲僕懶不能到日晚僅訪靈源還是時間雲逐歸鳥天半夕陽紅不了空林飛瀑送張孝廉問安歸蜀朝看東籬花暮折北提柳人生無根株安得不奔走張生年四十抱道苦不偶西顧有老親曰歸覓升斗窮秋霜霰集戚戚聚儕耦相對慘不歡惟應市篘酒君家難弟好縱飮日濡首長飢資薄俸未足糊兄口我意亦勸歸名山闢窗牖沉潛三十載庶可冀不朽努力盡一尊西行寡良友邵進士葆祺邀集寓齋餞張孝廉即席賦贈邵生不特詩才逸兼買黃花醉行客就中行客我素知西蜀才人張亥白十餘年來詩道乖正論往往參俳諧汪孫端光星衍近亦輟吟詠欲覓長句誰能隹張郎令弟才如虎酒後千言氣頗粗只惜奇書束不觀沉酣自欲成千古生成進士方少年乃復憔悴長安眠郎官上可應列宿何必蓬島方神仙聨吟快得閨中友艷體疊成三百首璧人居處亦不凡螮蝀裁扉月為牖花前揖客屢舉杯客醉欲別花徘徊攔門殘月向東逗興發尚能騎馬回君不見醉中歲月偏無據落葉紛紛訝飛絮東頭言八朝標折柬來明日酒人須復聚寓中獨坐荒園倚古井三折逺市塵傍屋十數株鳥巢多于人蕭然一徑東南好豈止無花且無草堆簷黃葉一尺深下有著書人不老草三日雪邵進士葆褀餉酒并約張同年問陶過卷施閣小飮别後復獨酌池上讀亡友黃景仁悔存軒集至二鼓作酒人携酒來賞我庭畔雪我時方讀史一卷粗巳畢掃兹盈尺地相與坐林樾風爐依土銼隨意雜陳設間官兩移居皆喜境孤絶當時沉醉處依約記庚戌倏忽六七年雲煙事生滅橫街南北路好友半夭折謂邵學士楊比部如何不酣飮坐待生白髮君看空中花真如電光掣淺醉不出門送客竹籬畔酒人從此去蒼鼠亦隨竄前車方越巷後騎忽聲喚俄頃人語希來塗雪飄斷移尊酌池上看此冰欲泮舊友陡上心遂令爵無算沉酣到中夜空白忽欲暗正好殘月來光華與凌亂題黃上舍恩長印譜雅覺一拳堅緻尚須八體摩描試問誰工此技山農谷口三橋叔孫不朽三事江夏無雙一人文苑儒林藝術恐君難以分身送黃戶部鉞乞假還蕪湖黃生通籍久而乏仕進意郎官才半歲堅欲潔歸計乞間書既允偃卧無一事歸日萬斛濤空明洗胸次築屋古鳩兹于焉可終老苦無江上田可刈霜前稻仍然携襆被逺復客江島時將遊皖江一世無相知何人識飢飽十一月十四夜卷施閣待月適蔣表弟良書以惠泉酒索售因留飮至醉作所居偏西南十日寡良友今夜明月圓淸輝殊膩手蔣生叩門入半日俯其首索我助急裝餉我一尊酒開尊與酬酢鄉味汝知否移坐石屋中淸談亦云久苦言辭我去相送出門走夜半西北風泠泠吹笑口十六夜獨坐玩月至四鼓月食詣太常寺隨班行禮全家既南歸一婢携向北欣聞月當頭為我具肴核軒墀開左右雲向瑣窗白古木十數株居然富泉石携壼隨處坐淺醉不終夕官間乏塵事敢尚曠厥職三更驅贏車入寺救月食感舊忍向三生石畔過此情除有劫能磨愁中花月催人老夢後樓臺易主多紫燕巳聞移舊棟白雲猶是宿層阿惟將一掬東風淚和雨和煙逐逝波胡上舍唐屬題夢李昌谷圗即戲效昌谷體古錦裁作囊時嘔心中血古錦裁作被時縈夢中結江南仙客夢隴西魂氣上覺南山低左耳黃河聲右耳瀉滄海塵飛接黃雲如鈎月沉采闌干十二行不前轉眼巳及三千年玉京路向瑶池直金虎玉龍攔不得却怪仙人酒面紅映天天作桃花色淸虛帝所宅何有白玉樓一語道破天應愁天公愁山鬼笑神雞亂嚼星斗完飛上燭龍頭上呌夢中授受詩百篇只借東壁為長箋從兹投溷詩仍須出人間來何翩翩去何遽出戶有光團若絮長爪纎纎破天去柬錢三維喬竹初庵主近如何習靜翻憐歲月磨到枕水雲淸夢適應門汀鶴道心多黃金久已欺中壘白璧誰能剖卞和君前宰鄞縣為接任者所纍大為上官白眼一片五湖千頃月收帆擬共著漁簔夢入從舅氏白雲溪舊宅感賦長句一半軒窗面水隈已涼頻奉板輿來簾從碧月光中捲花向紅雲影裏開分砌𥿄燈搜蟋蟀過汀蠟屐點莓苔歡場總被風吹散嬴得春宵夢百回張烈婦詩烈婦王氏余友人張大令景運之子婦文學慧裕之妻也慧裕以勤學得瘵疾氏刲肱療之不愈卒後一月氏繪夫像于壁雉經其側以殉張烈婦交河人年二十歸所天所天勤讀書氏亦助攻苦朝聞雞嘐嘐暮聽紞如鼓所天學成病轉危夢裏血淚時時垂誰言色如花匝月成死灰叩天乞緩須臾死割肉如丸啖夫子臂創未合髻巳髽奈此出腹兒􅈱􅈱嗟嗟一塊肉敢纍翁與姑長跪向保母願乞存遺孤捐軀却憶前三日心事曾為小姑説翁姑有叔兒有母地下良人待余久神完志定反不忙却掃東壁如銀光七尺軀墻上植烈婦善繪事先畫良人像于壁乃就旁縊三尺繩梁上直墨光血光相對射形影不離夫一尺君不見婦先兕兒童烏阿翁復作鬼董狐大令近作述異記數種一家奇行皆堪圗偶成哀樂中年詎可支未衰恐巳鬢添絲遭讒真悔知名早投隙方嫌見性遲乍識面人偏入夢不關心事忽沉思平生學行吾能審豈待悠悠論定時百種芟除癖尚留閉門索句出門遊研摩未及唐餘史蹤迹粗窮禹九州胸次漸能忘寵辱舌鋒從不快恩讐白雲溪畔三間屋略有頭銜好乞休間來屈指溯從前孤露餘生我自憐平輩半皆成老宿故人多巳學神仙難忘硯北千秋業却有城南二頃田一事冷官差可慰趨朝常得弟隨肩亘亘平生一寸心不同朝士􅔡升沉慿誰可解胸中結倩客時彈海上琴乞與藥罏希駐景肯從塵網索知音南舟北馬頻來往坐使勞勞變古今草五日雪蓬門且喜絶將迎繞砌南頭自在行一片廣場三畝雪好同心地證空明十二月十九日卷施閣招同人祀蘇文忠公即席賦一章並邀諸人同作七百年來彈指過又隨裙屐壽東坡生天至竟誰能免傳世如公庶不磨香篆裊時詩思入風簾開處雪花多狂吟痛飮君休惜不見勞人鬢巳皤謂吳侍讀錫麒時以病未至小除日邀同吳侍讀錫麒戴吉士殿泗趙舍人懷玉溫舍人汝能方比部體劉舍人錫五伊比部秉綬葉舍人繼雯張檢討問陶彭明經蕙交戴禮部敦元集卷施閣祭詩作洪生除日築兩臺餔糟避債人俱來客來不來豈須速先注滿堂銀蠟燭歲聿云暮興轉高分半債帥兼詩豪卷施之門如鐵立百輩申頭不容入側聞門外客暗數堂中人九州仙客萃一門休嫌坐上賔僚少閩粵楚吳兼蜀趙坐中十二人凡四川湖北廣東福建山西浙江安徽江蘇共八省無端聚飮衆或嗤轉假舊例稱祭詩多逾二百篇少乃十數首吾曹自有傳世資不藉詩篇成不朽燭花分從肩上飛蠟淚滿滿堆春衣忽驚屋後雷聲墮四面𥿄窗齊欲破山雌水母并入肴逺有吳客貽車螯百壺不嫌多一觴不言寡夜半淸談振簷瓦肉伴貂酒汚茵脫略極處無人嗔明宵莫守庚申歲後日早朝才破醉偶成客來半不知名姓到即隨堂住幾時醉後忽然長揖去主人不問僕難知破工夫把蜀茶煎一枕新涼乍欲眠不合約他狂道士騎驢直到竹牀前受業吕培談正治校字
