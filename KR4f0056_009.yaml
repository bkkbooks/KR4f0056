front:
  text: 卷施閣詩卷第九
  hash: sha256:a332b824da4221c4215830cc144f5b098d6255ac28700e1aa17c0152dd5920e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_009-1a}
body:
  text: 陽湖洪亮吉著西苑祝釐集庚戌辛亥萬壽樂歌三十六章并序臣謹按唐臣元結有補樂歌十章白居易有新樂府五十篇類皆言簡意深可以播于樂章歌曲臣嘗慕之伏見我皇上御極五十五年仁如天宏如地舉凡廣聖極神謨文定武類非形容所克盡致今者恭值八旬萬壽慶節臣幸得擢巍科僃員詞館自正月一日恭讀恩詔以後親見皇上敬天法祖勤民察吏諸大政足以度越百王而垂則萬世者已不下數十事輒不自量謹依類撰次為萬壽樂歌三十六章非敢繼元白之逸塵亦庶乎衢謡壤詠得附本朝樂章之末云爾元日詔第一上章之年月初建旭日初升太和殿詔宣宗伯上玉墀二十二條宣讀遍九門以外齊歡呼一日數驛馳郵夫巴勒部第三巴勒一部遠在西徼酪食漿飲同時獻表云敬大皇帝如敬佛三寶珠瑟瑟衣班班道畢拉兼烏闌哈哩薩野先稽顙巴拉八都還合掌坎扒窪經第四樹頭棕高五六丈其實纍纍花可釀葉名貝葉取寫書一葉百字如聨珠梵經不到西南部以意作經遂四布國基既兆立普哇傳經亦名坎扒窪坎扒窪經有義不歸佛法不歸僧只願歸依大皇帝貢子象第五南掌所貢貢子象貢子象人面刺花人性獷遠邦百載名老左佩右佩皆雕瓜别乘數象來中華不嘉遠物嘉誠效特敕象房增俸料春燈詞第六昆明湖水連天碧萬盞燈輝一天月臨湖亭上看春燈魚龍曼衍從東升春燈詞接春帖子遠自乾隆丙寅始辛壬以後皆八篇却與卦象同綿延生生不巳真堪卜今歲自隨還至復年年歲歲遊豫同誰識義蘊陰陽通宸篇下計歸政日却合伏羲全部易普免租第七免錢糧免漕糧四次兩次看謄黃今年詔下恩尤厚普免正供由萬壽三分減一十減三前史盛事何庸談大農錢粟雖頻散耕九餘三積儲慣戶部銀仍八千萬殿勤政第八夜未央乾清宫中燭煌煌日將出勤政殿前傳警蹕機庭綸閣三兩賢日或一再瞻天顔萬幾當晝皆周遍七品宰官多引見法官御苑名總同行在亦復懸堂中江寧行宫有勤政堂讀書若以今方古隻日視朝何足數續石鼓第九太學中周石鼓二千年來石文古若將一字比一篇却合關雎及殷武石鼓舊存僅三百十字親加排比較短長重刻十石陳堂皇舊者藏疧珍球琅流傳至久還堪數周宣中興製石鼓乾隆萬壽年春補八徵璽第十古稀天子古巳稀復越十載符貞期重華宫中製聨句既壽永昌猶泛語嘉名肇錫得未曾璽章特與鐫八徵石經若舉殷宗例享國百年重製璽五福堂第十一萬年天子兮萬年觴五代元孫兮五福堂儒臣厯檢明宋唐得者六輩錢吳張士夫獲此慶巳長帝籙從未膺斯祥膺斯祥由慶洽十一世還徵玉牒釐四部第十二四部書帙萬萬提要一百卷臣昀臣熊奉敕撰全書告竣巳十年有敕亥魯須重編木朝實事皆求是不遣傳疑留一字文淵畢釐文源百臣日夕來御園東南三分皆無誤海上然藜校文溯御製集第十三御製詩御製文近自巳酉溯丙辰文一千詩五萬五十五年成百卷九經草史義蘊宣四嶽五瀆搜根源遠紹二典三謨傳巍巍卷軸如山立豈特帝王難冀及十倍漢唐文士集五國朝第十四東西南北車書極朝正國王三十一三十一國分年來春秋冬夏邸第開普天同慶當斯日五國遙遙適相值神雞五色魚八捎貢及犀兕兼狧獠史臣若舉春秋筆五國來朝王正月開經筵第十五讀洪範讀召誥五三六經開祕奧萬幾之暇日一編春仲敬復開經筵經筵樂奏何噰噰抑詩還取衛武公昔賢今聖皆先覺九十耄期還好學親釋奠第十六臨雍歌幸學詩八十天子猶尊師崇賢坊大成殿二月上丁來釋奠春渠如鑑波溶溶前年天子臨辟雍太平盛事皆稽古鄉飲酒歌詩樂譜朝日壇第十七朱旗絳扇來城東至尊親詣朝日宫黃軒紫幄光如燭至尊親詣齋宫宿太平五色雲擁輪迎日正見雙黃人雙黃人捧日起朝日禮成天下喜登岱宗第十八會稽南恆嶽北西及五臺中太室天旋向左帝邁東卅年六遍巡岱宗吾皇卓識超秦漢但禮天中不封禪天門日觀瑞色開八旬天子騎龐來謁闕里第十九猗昭維則聖人在昔衆善若林六經乃宅猗皇是欽聖人在今宗謨既纂祖訓是尋青旗央央越歲來謁前聖後聖其揆則一歲則庚戌月維庚辰山左三大禮祀畢臻百歲民第二十廣督摺直督摺百歲耆民比肩立滇撫章皖撫章民間五世共一堂太和翔洽超前代不産麟皇産人瑞朱提文綺出上方幾餘染翰錫一章耆年壽婦布魯特絶域貢珍由感德萬壽科第二十一萬壽節萬壽科九十八十來婆娑春官一百二進士外一百人年巳至詔出東華盡宣賜膠庠抑厄五十年閬苑盡許稱神仙白髮亦戴花盈顚升平盛事誰能及兩宴南宫值庚戌大學士臣璜謝摺勤察吏第二十二盜不讞責總督清苑縣官愆莫贖吏蠧民責撫臣高郵州牧罪較真皇躬一日周萬幾外省案牘何從稽詔書直下諸大吏當戒江南與直隸清字藏經第二十三西華門中闢經館大小乘經堆欲滿法門先寫百二章排比兩晉兼三唐國書結體尤嚴重舉筆如龍復如鳳經成一藏功萬千佛力祚皇萬萬年黑龍潭第二十四三月麥四月秧不雨麥瘁秧將黃行宫宵旰無時釋先詣黑龍潭外歇排空萬朵雲垂垂真龍下禱雨不來三大祀第二十五三大祀歲必親五十一月象輦陳南天壇北大內百尺燈竿與相對壇內宫中合虔拜耆民夾道成風謡五十五遍躬南郊山莊夏第二十六灤河之北臨邊墻每年避暑來山莊雲山四面奎文署云是山莊最高處澄然四海集一心日日亭上占晴陰殿前引見員嘗滿吏部帶來分月選更撥幾餘念柔遠山莊但識無炎歊日昃可念宸衷勞經壇設第二十七九門中官吏車一日百輩來徐徐殊方絶域摩肩入在籍諸臣亦羣集分曹百輩為一班盡檢大寺開經壇湖山郁作栴檀味初日輝輝照初地青梯樓閣須暫開無量壽佛拈香來盛典增第二十八萬壽盛典凡六門聖德聖文兼聖恩萬方集慶儀文重其次繪圖同獻頌巍巍蕩蕩難具書特徵二事古所無八徵五代奇祥起塞外闢疆三萬里夕月壇第二十九朝禮日來東郊草禮月來西郊鸞輿親向齋宫出萬壽節過才一日規壇不獨祀夜明二十八宿兼經星不見唐貞觀樂五闋隋開皇坎三尺豈如吾皇大祀躬致虔禮成光景生中天千秋金鑑懸當前安南來第三十安南來安南來國統雖舊基新開廣南大吏為陳奏親詣天朝祝天壽路人指點盡識名安南國王阮光平海邦自此知冠履好變文身與椎髻阮光平奏請從木朝章服特旨俞允前殿宴第三十一太和門中頻列宴日日平明御前殿七旬宴後復八旬下逮屬國兼陪臣年九十階一品特賜金尊殿前飮千人統計歲萬千稽首合作今皇年就中受恩誰最樂國子監臣郭鍾嶽祝嘏樂第三十二祝嘏樂樂一部歌者歌舞者舞𫾣銀瓶擊銅鼓萬里遙遙來祝嘏太常樂奏列四蕃不數貞觀兼開元蕃王親向階前祝更獻十章名法曲法曲十可歌亦可謡一章一章名特標謁金門賀聖朝阮光平進壽詞凡十章萬升乎寶筏第三十三三層樓百盤砌上干青雲下無際上有立部伎坐部伎其下回皇陳百戲蟠天際地不足名特賜大樂名升平考聲動復關民事不特壽人兼濟世萬方一日登春臺快看寶筏從天來王會圖第三十四東西草里如繩直夾道樓臺成頃刻千層覆屋百尺臺大舸載自東南來回廊曲檻天然合空處扉􅎉自開闔方壺圓嶠咫尺間海上頓訝移三山拈毫若準唐貞觀王會圖應添百卷普天慶第三十五日庚申圓明園中法駕陳日甲子乾清宫中鹵簿起宫中御苑石作塗萬叟夾道還嵩呼如山燈火連湖曲想見太平調玉燭萬萬壽第三十六萬壽節日以十三時八月月琯日徽皆叶律我皇御極當丙辰越若稽古堯期臻五五數復箕書陳無疆若展大衍策萬有一千還五百馮少卿應榴夢蘇草堂卷子時馮作蘇詩合注少卿室冷無纎塵潁濱翩然來叩門履聲皇皇響空谷欲前不前猶躑躅褰簾一笑霜滿空迎門次公立長公長身高冠貌奇古七百年來覲詩祖邀公不入亦可思一屋光𦦨皆公詩夢中自謂得所師敬告欲續施元之公雖不言心巳可來處仙雲落如朵峩睂山月清可憐半夕移挂高齋前來時不迎去何送我謂非真亦非夢醒來急詣南頭翁謂翁閣學方綱證以畫象將毋同君不見少卿詩名滿人海夢裏師公醒如在因君我亦念瓣香太白樓前一江水自蒙陰縣界早發從車上望泰山半日始抵山麓又步行半日憩高老橋日巳曛黑乃尋路而返夙昔好大言岱宗視秋毫茲來距百里意念肅不驕靈風吹車帷總向西北飄日上戴一山半白雪未消平明開東峯忽與天爭高向背卅里間巨細無不包聖人坐明堂若受萬國朝半日走未休才能憩巖腰絶頂豁一門注視久亦勞誰云千丈松貼若徑寸苗海氣漬石崖天聲走林梢來乘西月光去揭北斗杓小酌白石泉吾行過飛橋臚傳日馬上口占寄畢尚書師湖北五年為客曲江頭屢向慈恩寺裏逰曾解緑衫陪廣宴愛拈紅杏上高樓看花未必輸前度擢第偏教遜一籌好繳公門舊衣鉢至今慙愧説袁州昨年里中有人都者偶占五篇寄友海內交舊見之共詫以為洪體今適一年余留官京師里中知好復往來不能去懷適汪甥楷以定省南歸爰更賦五篇寄諸同人末章并以示弟原吉及兒子飴孫見者幸勿復以為創體也盧學士文弨里中誰最憶我憶抱經堂抱經翁七十讀易猶琅琅餘經貯案頭日漬丹與黃盤盤經師居庭草一尺長問字數百人誰來上堂皇匪徒文體乖書仍誤偏旁俗學錮性靈反厭師説詳一月偶一來惟應伺餱糧就中領悟誰庶有顧明與臧鏞堂顧生嗜説文臧生勤爾雅百里澄江中誰如二人者錢大令維喬里中誰最憶我憶竹初居前年養疴歸買地十畝餘四邊何周遭桃梅竹棕櫚規高欲巢禽掘地乃種魚魚鳥既獲安餘力營吾廬一室開八窗風日來徐徐主人欲登樓花氣為縈紆主人欲出門芳草攔衣𥚑北巷吕秀才景尚南頭畢居士涵偶有剝啄聲經旬一來此趙舍人襄王里中誰最憶我憶味辛齋味辛齋中居風日多好懷五日一出逰經旬宴朋儕我居與若居僅隔南北街花時與月時出入必與偕君尤善清談觸緒理不乖差苦持論莊時為雜詼諧同志六七人均能外形骸無日無客來闥敞不必排不來亦有時或值體不佳盛惇大吳堂近南歸莊寶書蔣齊耀復遠宦預苦離别多臨觴定三歎蔣上舍馨里中誰最憶我憶杏花樓杏花既巳枯種杏人在不雖無一株花花下石尚留雖無種花人畫象懸樓頭昔為大母居謂外王母龔太孺人今屬孫曾逰孫曾昨問訊敬我齒巳優童年看花詩黏壁尚四周種杏曾幾時一讀一淚流檢點樓下人半又客遠州阿三庶堆行阿二廷耀尚兄事何時續栽花吾當日三至弟原吉兒子飴孫里中誰最憶我憶卷施谷拔心不死人時來谷中宿谷中有羣書谷中有嘉木主人出門去書好無人讀花紅上斗栱草緑出垣腹賴有主人兒時來埋書簏稍移礙簾燕時剪出墻竹昨宵家問至北上期亦卜愁無束裝具典却里申屋一書寄令弟一書示飴孫此谷不入劵為吾鎖重門自題城東訪月圖余家清暉橋距城東門不三十步出城古寺五六排比而立寺後為晉陵縣故址廣場數百畝幽人三兩家余每晚食後必一詣其處半里之內鳥之有巢花之有名者莫不與余相識即風雨夕不能至夢亦詣焉庚戌獻歲將北行友人錢明府竹初畢上舍蕉鹿為合作城東訪月圖遂係以詩云爾月初三至初九一日一回城外走十三以後人不間人靜月好更先闌徹夜不遣城門關月過二十看星出乘殘月歸更欲絶人言我愛月如癡不識城東月尤潔城東有白塔城東有紅橋橋痕下欲枕蘋澡塔影上直干雲霄迎春堂北東西路一草一花都識數匝月能來二十回繞堤何止三千步三松一客靜淹留復有危巢結四周好寄吟魂與烏鵲夜深隨月上城頭張進士若采梅屋讀書圖築室高丈餘鑿楹深尺一我愛一屋中書外無長物無心種桃李無心種桑麻我愛一屋旁梅外無餘花書窗只向梅邊拓果熟好從書上落長身如玉忽然來不是主人疑是寉送莊通判炘至漢陰新任太乙從西來終南向東轉我前甚羡君十宰山水縣君歷宰􅔛鄠宜君盩厔富平長安咸寧渭南朝邑諸縣今擢判漢陰高觀潭上銘牛頭寺中詩君前亦羡我五醉桃李時花枝歷亂山南路紅欲上天雲轉妬君從山縣偶然來一路尋花入韋杜黃河西岸渭水隈我頃亦復騎驢來君官􅔛及盩厔朝邑時余皆曾至其署中君家令子亦好友十日留飮三千杯仙逰壇北風飄瓦君坐藍輿我騎馬意外孫郎手重把慈恩塔下日炙軒君摹石刻我上巔拍手尚有婁江錢謂獻之尚書賓從居然異醉裏後先升上第萬條紅燭百篇詩嬴得人傳杜書記識君巳卅載别君又五年重陽風日正晴好相與共話金臺邊治中别駕今何有五十才名作通守鄠杜山田買不成全家更進褒斜口離筵重傍菊花開適有尚書信使回畢竟梁園賓客好如今視草用鄒枚吳布衣蓬癡寄示𥿄仿秦漢瓦當為題二絶陶泥作瓦形難古近西安陶者能燒漢瓦當與真者無二爛𥿄為泥法轉良總是劫灰燒不盡有人間裏仿阿房應共錢獻之程彞齋作雅逰青門西去曲江頭蠻箋十樣如分寄君定能成五鳳樓送李同年賡藝赴任浙江上章閹茂歲科舉由萬壽我方登岱宗三月乃北首逰山筆殊健得逐衆賢後同舉一百人于君契尤厚君才富詞藻早復窮篆籀闈中萬言䇿兩䇿蒙進奏春官遲錫宴新例試當覆光明殿東西賢良門左右聖人親試士如漢䇿孝秀衆中君最捷一卷成正畫引見來御園麻衣改紳綬人才較清拔竟以民社授官由楚改越以親老改近毋老欲遷就十月始出都風號雪花驟同袍凡八輩執酒道旁候疲馬出北門依然學寒瘦阿翁循吏傳君尊人亦以進士宰江西有惠政車上可尋究努力報最先無徒事琛䞀輶軒倘重到舊侶可全覯郎官改祕閣此例亦有舊二十有七人今歲蒙恩入館者共二十七人待子成列宿王大令復自汴中來邀同人小集惜陰秉燭山房羅布衣聘作圖紀事是日并送儲明經潤書南歸分韻得租字有客歸何急疑收陽羡租似君來正好還挈朗陵厨官滿趨金闕春濃買玉壺朝衣吾幸典衫笠入斯圖十五夜對月獨坐有懷里中舊逰獨酌一樽酒含情上小樓故人難會面明月却當頭隻影長廊入清輝滿鏡收誰云天上好今夜不勝愁送萬大令應馨之官廣東謫仙樓頭乍相揖君年三十我二十初識君在朱竹君先生節署下所云高顧張黃皆署中客也平山堂外飄長裾君年四十我有鬚草年歲月真如駛高東井顧文子張方海黃此中死即今海內論心交汪子劍潭憔悴孫郎淵如豪馬蹄亂踏長安市前後與君成進士若論位置殊可商君為外吏我漫郎一官遙遙六千里三月仍難具行李僮飢馬瘦住不安我轉質衣謀爾餐孫郎汪子交終厚日揭破車門外走窮冬行色略巳成此時送君須出城崇文門前别不足更借宣南坊裏宿故人有子稱能文謂仲則子昨歲主我今依君君不見貧交生死原非偶此子年來況無毋君先令讀等身書我為故人兒娶婦錢同年福胙乞假南回書此送别君歸我何憶我憶西湖水飮水亦巳香水中菱更美湖中誰最憶我憶裏湖魚小繫雙篷艇時來五柳居湖頭誰最憶我憶山陰酒一葉載百樽千錢沽十斗湖邊誰最憶我憶上山茶煎向深甌內如開數朵花預想君歸時食單先出宅烹魚水要鮮醒酒茶先摘此時却憶金臺人無米飽飯天街塵人生快意當有日君倘能來我應出崔公子景稱竹樓圖竹緑參天筍亦抽偶然竹裏有高樓不知樓上人何處我欲打窗尋不休三尺寒檠七尺牀阿三曾共捉迷藏謂令兄景侃落來畫裏還相識為我窗西補夕陽袁安卧雪圖為王太守嵩高作屋頭無炊煙門外一丈雪此時屋中人巳恐不能活永平及永元三世弼天子此時屋中人如何遽能死閉門一卧歷一時門外雪深殊不知洛陽縣令來何巧從事汝南飢欲倒門外雪花飛入竈從茲舉足一出門衣被四海皆陽春眼前高卧匪無意預想俗敝當還醇君不見丈夫一世歸褱抱有事日多無事少即論無事亦須眠那得間心訪安道三月草五日小病初愈至法源寺看花適得崔三景侃書却寄剩得韶光有幾時病餘端不負花枝商量欲把春衫典又值微寒揚雨絲幾日人間蝶却忙引人花底欵逰廊傷春正憶昨年事迎面一枝紅海棠冥蒙花外語呢喃燕子真同佛一龕千尺緑陰吹不斷粉紅墻北是江南鶯鶯燕燕可憐春乍欵花枝乍欵人無數亂紅飛上柳更疑楊柳是花身一春心事費商量欲趁春陰夢幾埸花上曉星花底露分明著眼看年光春盡傷心抵歲除江南别後意何如丁香花底懵騰醉却展崔三二月書五月初三日偶成蜀葵如錦粲籬根簷雨初添屋漏痕新月乍來簾正捲槐花落盡不開門五日憶白雲溪競渡作示兒輩兼寄錢三趙大里中黍裹菰蒲酒泛藝薄醺間話小兒羣江鄉四月饒新雨樓閣三時盡白雲溪果作紅偏礙帽岸波搖緑欲煎裙誰憐天上清如水手擘桃符遠憶君送丁二履端南歸白雲溪水向東流我住南頭爾北頭小市酒簾頻夜飲斷橋蠟屐共春逰朅來天上愁無盡却惹人前罵不休屈作宰官原可惜時擬偕崔曼亭太守至荆州以教習期滿以知縣用而止也應差勝客荆州法學士式善招飮詩龕并至西直門看荷花即席賦贈一首翰林近日詩名盛遠有詩龕近詩境翁閣學方綢額其齋曰詩境詩龕主人尤嗜詩退直閉戶吟多時龍樓鳯閣森前後尺五天邊住偏久五陘山色落墻頭時有間雲墮高柳開門十頃荷花潭邀我早日同幽探啓明星落巳催駕我本蓄意來詩龕馬前遙遙兩紅燭十里路中晨睡足詩龕已到不索詩舊讀主人詩已熟東頭詞宗百菊溪百侍御齡宗伯宅復連街西鐵侍郎保三人分日操選政時有滿洲四朝詩選一室墨雨揮淋漓以詩存史誰能及佚事多年苦􅊧輯遺山巳矣傳習亡北斗以南惟此集清談巳竟還傳餐飽食散步來河干城門正對御河口萬柄荷葉風聲搏官衢南北車如織騎馬欲歸歸未得青槐影裏晝初長我亦玉堂將入直七月初四日逰極樂寺看荷花分韻得看字出西直門三里而近有極樂寺焉長河蔭前高阜倚後其東有國花堂西有勺亭皆城外之幽搆也梧門學士以偶日下直遍招同人飯于詩龕接軫以往車行者三里舍車而徒復二里甫抵寺門緑陰當空赤日亭午池荷東西曾不百步間以傑閣繞之回廊水氣升岸結為輕綃林香入波漾此晴采于是或瞑坐巖側或孤行竹中或擘箋庭隅或讀畫塢側堂高于垣者一尋門低于砌者百級重寮洞開直視十里負戴而來者望之如鷗乘軒而過者擬之以艇坡塘高低岡阜回互香氣拉雜雲光降升促織繞砌聲如碎琴風蟬過枝韻疑零鐸逰藤綿延上樹皆紫細草芬郁抒花必黃乃蔽炎牖爰開北窗松露尚零柏風成陳家京國者離然有雲表之慕宅南中者又恍然有江鄉之思焉林陰屢移羽觴乍接果則紅暈徑寸與藏冰而共升瓜則生黃滿盤汲井華而并薦陶令之榼無時不擕韋公之荈適心而飮相與商確今古縱談雅俗據石命句臨流作圖幽襟既抒勝賞斯愜又破曙而逰薄暝始返星河滿空影乍曵乎籠燭雷雨在後勢忽掣于軒帷此又晴晦出于一時涼燠交于俄頃者焉同逰者為許封君兆桂張運判道渥李刑部鑾宣何工部道生吳明經方南及梧門學士與余凡七人運判既為之圖余因序其顚末云時辛亥年七月初四日也長河萬柄紅荷花匝月不來開已半花枝似嫌河水窄幾葉亭亭欲升岸初陽入浦看難定十里雲光自淩亂寺門南下景最幽可惜年時水波斷田田葉瘦花枝悴我欲重煩桔橰灌新秋天意亦可知雷雨急將新水換别來花不忘前約一朵迎人出橋畔東西燕剪掠不停惹得盤珠落無算鶯黃鷺白來成陳一一見花如欲喚花香深處朱樓好檢點新涼放詩案明朝無用騎馬來畫取花枝卷中看送趙大令希璜之官夏邑即題其三十二峯詩集後昨來缷輕􅋔今復馳急騎牛腰詩卷行必偕復恐人呼作塵吏趙生三十詩名早脫手羣公已傾倒黃生謂仲則租屋與對門五夜疊誇詩句好爾來十載官長安君行入關我出關終南太華昔皆歷所恨背我逰梁山搜奇剔勝狂如馬好古如君亦應寡摩天欲覓秦昭箭掘地能尋漢宫瓦山南山北行不休官好到處容勾留幾年頗喜善摘伏一事可慙同摸邱盤盤法物歸樽俎奇字入詩詩愈古我披三日手不停可惜良朋巳黃土指仲則歷官差喜名區多昔傍陸海今黃河譙城北去黍邱右不日佇聽疲民歌河流日夜奔馳速此土年來亦非沃故人一語欲規君好破夜吟披案牘跋鐡宗伯保容臺詩卷後梧門學士交何遲乍見示我容臺詩宗伯屬梧門學士轉示亮吉容臺詩名高北斗三百二篇如一首誰言官貴詩難工此卷半出雲霄中西清南苑日趨侍日月滉漾天花紅橫山北上灤陽道眼底萬峯青不了直廬夜半忽朗吟拔地倚天長句好琅邪參政劉尚書墉嘉禾翁錢侍郎載詩名海內歸秩宗先生健筆復軒舉要與冀北開宗風萬條紅燭聨官騎正好同官有難弟閣學玉保玉河斜月午門鐘馬上百篇成復易我前讀公詩今復隨公逰殿頭作賦公最賞可許執筆從螭頭君不見丈夫事業垂區夏豈僅曹劉與方駕他時一品集編成我欲作文同鄭亞法學士式善山寺説詩圖茅屋十數間青松百餘樹昔為説法埸今作談詩處説法祇了生死緣不若説詩能使死者不朽生者傳倘同天釋較功德一瞬萬古殊相懸梧門學士才名徑説法亦同僧入定席前傾耳凡幾人木佛都疑座旁聽談深不知寺在山高論往往通天關指揮若假鐡如意花雨欲落茅簷間詩龕左右詩如海時選近人詩丹墨紛披幾年載他時悟後忘語言更有不傳詩法在送周同知世紹回西安詩名宦迹草年中雅與高三十五同君行二十五故云雙節正堪膺上佐百篇曾共賦東風同官一輩憐亭長錢獻之自號閲音亭長時宦況甚苦因爾連旬夢石公君與張舍人石公交最厚欲别更邀通夕飲城頭殘月已如弓贈陳方伯淮十年兩度謁行旌叩閣皆逢失喜迎殘雪尊罍滋水驛經秋風月武昌城詩名早見題襟集世澤欣承曵履聲倘許從容話鄉里鵝籠我本舊書生偶成白露甫三日闌干著意涼偶然飛雨至花亦點頭忙雨中答法學士見懷之作重門三日雨百鳥響俱寂秋館渺無人青苔夢行客間房夜難寐矯首望城北昏霧接半天連林色如墨遙憐通德里定閉草元宅瓦燈紅一盞砌草荒三尺應有苦吟人披窗簷漏滴卷施閣小集秋樹脫一葉素心來幾人將以屐齒頻補此間庭春間亭立多時一客入門喜胡蝶亦翩翩飛來客懷裏斜陽倏西頺新月巳在東同心六七人團坐秋陰中秋陰何離離一榼傾未了幸有石上藤先扶醉人倒屋南青梧桐屋北雙株槐諸君欲言歸正好月滿街十三日張運判道渥招同人小集分韻得露字長安路花無邊酒無數醉中陶陶十年住酒客家家識門戶西風幾遍吹酒人去何處今朝花下飮忽復思前度主人愛客黃金富何不先將酒人鑄長安路人生行樂須及時君不見屋角殘星草頭露中秋曰無月獨飮中秋月一年無一年有有月即出門無時滯杯酒離離雞冠花短短鴨腳草秋紅既傷心秋緑如何好秋雲吹黑入酒尊長安比來無酒朋坊南深冷一間屋判與無月還無人闌干影外初停雨舞罷筵前小兒女我有心情梁燕知三更尚作將離語十六夜有月幽人喜新晴屋角看星影巡廊才數武圓月出西嶺白雲東西飛不停七里壇樹秋煙平危樓驚起白蝙蝠似曳匹練空中行天橋南北千家宅萬瓦參差月光濕柳絲如沐草垂珠添得碧苔無限色微風吹空月流波山翠落向城隅多清輝入掌覺微膩衣上似復傾銀河歸來敞南軒傾此一榼酒三更靜後無一人却喜戴頭惟北斗北斗未落客不眠一榼酒盡愁無錢光明如此不須燭却把道書梯上讀
