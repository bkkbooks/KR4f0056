  text: 卷施閣詩卷第十二
  hash: sha256:924b7307cddec249d20e8a8c2e3f882566e20afad65a173253673eb7c4c27675
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_012-1a}
body:
  text: 陽湖洪亮吉著黔中持節集壬子八月十四日闈中奉視學黔中之命紀恩八首手披口誦日巡環清福誰言不等間却愧主恩原過厚校文才了許看山未妨旬日緩征程官閣西偏瑣院清時居會經堂西八百孤寒倘回首使星猶傍玉階明學荒寧好作人師心賞偏教下筆遲日向一堂橫處坐沉思不異課經時二十三人説聚星三主試十八同考及內收掌二人共二十三人橫排几案敞屝櫺諸公僻事勞相訪我尚應慙劉石經一紙除書下九重凌晨傳遍棘闈中神仙亦有升沉感間向瑶階説杜沖時分校十八人惟余及江西李編修傳熊奉視學恩命箱擎甲乙卷縱橫宵漏沉沉入五更忽得一篇勤擊節却逢紅燭語分明俗言燭花語為吉祥七尺筠藍手乍拋舉子入場例㩦竹藍貯什物竟㩦文筆試同曹官資深淺由君較坐中有言科分深淺者是以及之只我前年尚白袍姓名題向榜頭遲短李才偏噪一時填榜畢本房頗有知名之士才欲解顔先不淚孤兒十載已無師豫少孤從太安人授經今太安人下世巳十七年矣九月十六日次子盼孫殤一病經旬朔行蹤為爾遲如何束􅏻日却值蓋棺時檟楚威初斂豫督課頗嚴參苓命不支九原翻羡汝先得侍重慈兒為太安人所愛臨發志感萬里初持節經旬屢斷魂受恩原色喜念母忽聲吞負米程非昔傳經席尚溫明明昨宵夢親見倚閭門蚤發良鄉小雨村雞喔喔五更餘馬陟坡陀步轉徐昨日晚涼翻急雨滿堤黃葉似逰魚良鄉道中我行雖值秋氣候巳冬月尚喜天宇溫風霰猶未烈𪷟𪷟遠道開濕光楊柳緑盡初生黃歉鄉豈獨民無業樹底飢烏亦餐葉早發涿州寒夜雞失晨馬嘶聲愈警十籠銀燭輝遠遜殘月影由涇陽驛早發至望都縣小憩復扺淸風店早發涇陽驛兼程日未西力疲山縣馬聲短戍垣雞淀落雲千頃秋成菜百畦傳餐吾自愧車下有飢黎蓮花池草訪汪修撰如洋不值留柬一律豈料塵千尺猶留水一方風沙來數驛煙雨忽橫塘漿仄開波暝星圓蓋樹涼主人何處在雙寉入書堂趙州雨花庵小憩壁間有雍正三年吳少宗伯襄題句和者甚衆亦用其韻作一首示菴僧滿坤一菴當孔道終日鐸鈴譁但願土宜麥不須天雨花乍醒完縣酒頻浣趙州茶知我南來客勞勞問九華宗伯自題九華山人故菴僧詢及之邯鄲題吕祖祠兩年前尚一書生持節今看萬里行自恐功名亦如夢漫逢人説是皇程自柏鄉至磁州道中雜詩一日行兩驛所苦乏昏曉十日歷數州尤愁值僵殍眼中過百井生計殊草草閭邑雖尚盈歡顔抑何少日斜楊柳外一一閉門早驛亭依北郭路斷垣亦倒吏辝供億困愍此山縣小僮僕有人心宵餐不能飽昨日馳縣東今日馳縣西屈指兩月中萬里積四蹄我願騎馬人惜此馬力疲渴引就水源行無使長飢此寧欲市恩體物或庶幾廄吏慘不仁鞭撻詎有期我詩寫驛亭墨淡字亦欹用以警牧民危言匪無稽十里一驛樓三里一堡房塗皆列五軌楊柳踈成行持較江以南地力殊太荒行者色苦飢居者無餘糧岡原何高低土脈鬱不揚洺水既巳微滏流庶湯湯欲著水利書俾引清濁漳越俎倘代謀何人宦茲方北風連晨來節候巳冬月荒荒野燒紅補此炊煙缺人家林木外氣象何凜冽飢來聊飮水乾糗苦時絶誠知年歲歉生理亦殊拙道逢駝背叟引與話清切辛苦無他言惟祈一冬雪道中寄真定邱太守學敏雨花庵內柏林中太守文章老更工得句便思勤寄與郵筒今變作詩筒湯陰道中簡管同年世銘時在河南撫署強半詩從馬上成孤吟不覺過層城人因入洛三年别天許看山萬里行尚喜石交難割席若論子舍各沾纓時君方居憂夷門東去繁臺路明日知君望遠情衛輝行館憶己酉春計偕北上阻雨于此一日逆旅主人尚識之臨街樓上雨縱橫三載重來感客情莫訝馬前雙節引道旁還識棄繻生早發鄭州此地通河洛車聲徹旦昏適逢秦歲首來過鄭時門百戰荒原在三椽遺愛存謂子産祠土垣青不斷一線上朝暾鄭州十八里鋪連閭擊柝跛林昏候吏迎人過一村無數鵲聲原上起日光濃塞戍樓門自鄭州至新鄭道中作鄭州及新鄭百里劣不足程其土色堅乃可礪剛鏃森森秃邱阜厥性不宜木行過郭店驛益覺欹地軸土門何陰森岡隴愈回復出如囊露穎入訝車脫輹是知名函陵曾不異函谷前行泥沒髁後矚塵眯目危橋經洧水我馬行始速十里陘山青原田亦輸緑早發新鄭作陘山月落尚有星紅燭亂注幽禽驚坡陀逼仄若行巷楊柳缺處天初明𪷟𪷟豈獨衣垂霧點滴初明馬頭露天寒十月已有梁無假縮足升車箱將至潁水橋高原日午露初收紅葉踈林尚帶秋岸勢欲南岡自北一條清潁向中流十一日暮扺襄城行館作龍陂山色參天半城內石坊高插漢昏時騎馬出南門煙水微茫欲無岸沿橋南北皆石堤鋪岸月色何高低排空忽奏軍門樂驚起大魚波面躍扺南陽行館蔣表弟青曜自舞陽來訪因邀至前驛共宿談次出行卷索題為拉雜書此并以志别白雲溪之東書屋名團瓢君家屋東偏小巷走北條酣嬉少年逰厥性誰最豪我齒加長三賭跳欲競高阿母愛汝深縱汝孰屢逃壓袖十數錢日市倪婆糕上樹或偶間墻東紙鳶飄阿定與阿馨屈指無汝刁光景若目前歲月忽巳遙自余為孤兒怕與親串遭往事一縱思痛極只欲號十年三值君京洛及漢皋情話苦太長日短繼以宵今作萬里别離褱益蕭騷為汝設一筵環之以兒曹汝姊亦不眠頻將燭花挑袖中出短圖灑落白紵袍頺松兩三株日午響怒濤不飮顔亦紅吟聲激林梢鬢豈類秃鶖須亦磔蝟毛欲我作一詩為汝略解嘲前贅汴水頭樂土願久僑我意乃不然欲汝返舊巢庶幾三徑中剪此蓬茅蒿他時我歸田與汝頻招邀投老暇日多歡悰續垂髫支木斗拱間勻􅰫補堂拗盆池益栽荷更植千葉桃因君夢還鄉小立紅闌橋我醒君已行雙淚頻頻拋王大令復以雪苑消寒集屬題因憶甲辰乙已間與大令同客西安畢尚書師幕府亦有此集預其會者吳舍人泰來嚴侍讀長明賈上舍元模莊通判炘錢州倅坫朱秀才􅕩徐布衣堅蔣縣丞齊耀王文學開沃孫比部星衍凡十人今甫八年存沒相間不勝褱舊之情爰作一篇跋大令集後并寄尚書師武昌憶昨三冬飲誰如十客間嚴吳歸地下王賈散人間别有神仙侣偏淪簿尉班謂錢蔣朱雲稱久疾孫楚亦長鰥避債媧山側謂莊逃禪胥水灣謂徐襟期總霄漢逰戲偶塵寰醉每忘階級狂寧避謗訕别來經歲月遙隔萬雲山吾子官初達高齋客乍還一編沿故事百首許重刪驚坐名原振陳明經燮詩最多登樓賦早嫻勝逰何灑落逸興與躋攀水碧圍衣帶峯青鬥髻鬟嘔心憐句好握手恨緣慳我愧持雙節行將化百蠻凌門欣咫尺謂尚書師在武昌沔水歎回環屬有同堂誼時方子雲孫香泉皆同在幕府都愁會面艱感恩情抑抑懷舊淚澘澘爾日風多厲相思月乍彎持箋不能寐巳恐鬢添斑夜至林水驛薄醉馳三驛迷途轉數岡岸藏茅屋小村入密林長水鳥依沙白天星映月黃依微有漁火此景是江鄉夜扺吕堰驛因憶戊申八月與方五正澍赴武昌阻雨于此却寄一首時方尚在武昌節署歷歷經逰所明明關語溫半廊斜礙砌雙榻小依門隸覺飢年瘦燈憐雨夜昏思君幾回喚恐有舊時魂樊城樊城三萬戶關語徹晴江帶得斜陽影都開臨水窗賽神沿楚俗吹笛雜吳腔正好衝風渡漁人蕩漿雙涉漢欲至峴首輿丁誤輿入九宫山時日巳將暝因小憩而返山光欲雨江欲晴雲黑復白波微明此時擊楫涉江去薄暝始向前山行林梢一抹斜陽色高下山磎一千尺雲中道士來遠迎語不分明指碑石纍纍林果紅一山傾耳只覺禽聲蠻道旁䃰石削如鐵山溜滴瀝苔花斑沿岡久立怯北風送客出戶聞􅒱鐘昏江稜稜水聲起却喜一星明舵尾羊杜祠拍手兒童送遠行荒祠重到轉欹傾金環倘識生前事石碣誰爭死後名偶爾折肱成素志居然垂癭戮遺氓何如祇學山公飮日日高陽未解醒宜城一路沿江轉隨帆到郭門燈明小河集縣古大堤村欲飲宜城酒偏貽京口尊是夕署縣事楊君餉京口百花酒壁間詩句在三復憶狂孫行館壁上黏余及淵如聨句詩將至荆州先柬太守崔丈龍見昔年判塢鎮昨來佐臨安我皆騎驢來訪舊河之干痛飲曾幾時丈人復原官君前守順慶緣事左遷近始復原官郎君昨來稱使星次者近復成明經劉綱夫婦鬢猶緑往往聨句開中庭漆前五輩吾皆識阿四形疲阿三瘠因君我復念存亡痛哭東山謝安石君為尚書錢文敏公壻是以云我今行役敢厭遙昔者司寇馳星軺相傳一日行五驛髀肉總向忙中消稜稜執法原無礙過峻差貽後時悔王令先悲少子亡鄭公幸有孤孫在此州地大甲楚中城險况值江流衝五年民氣未全復所願吏好年常豐尚書用法公施惠法立民方識慈愛但使遺黎説有瘳何妨大府稱無害武昌欲往道苦迂我視荆郢兼程趨心知尺一定相迓果有驛使來通衢談深夜久殊難别駐馬缷􅋔謀久歇酒酣試問座上人量好何如浙西曰我持使節難久停明日送我西南程匆匆更作道旁語殘月欲向衣邊明武陵南去桃源路回望荆門在何處一山歷盡復一山不到青天恐難住自麗陽至石橋驛道中作移居欲避千章木山鳥山人齊出谷高低一月共苦辛高處結巢低蓋屋客行望谷如可逰前欲涉水愁無舟茅齋了了見煙火笑語自共溪聲流背岡北去行難速懶向溪東石橋宿三更入門甫缷􅋔頻起開戶看山光寺鐘初鳴鵲聲起月墮長林三十里早扺荆門州憩象山書院殘月巳墮風淒清水緑自向城頭明冥𪷟山徑開一線􅓋栗吹處幽禽驚吟堂豈獨山堆案堂下水聲還拍岸芙渠雖枯菱葉黃枝幹尚帶前時香周堂緑竹復千箇惹我百遍吟回廊堂虛無人水聲急寉到空亭與長揖出門數步馬忽驚却訝樹頭山欲立本欲詣武昌以驛道迂回不果行次建陽驛三鼓得尚書師急遞以適欲至襄陽閲兵為先期行二日約相會于鍾祥塗次時亮吉巳越行二百餘里勢不能回車再圖握手夜起不寐輒成長句一篇却寄從公十年逰八年居幕府離公祇兩載月僅二十五余自巳酉春從武昌計偕北上至壬子三月尚書入覲都門復得握手統計别時僅二十五月耳昨年公入覲復得旬日從自喜師弟緣時可意外逢慈恩縱愧傳衣鉢幸出公門早持節盤盤百驛敢厭遙更喜路從荆沔出才過新野縣已得鄂渚箋􅐤鞬一何雄控馬拜道邊襄陽日訪間僧寺兩日待公書不至酒酣上馬懶出城縱有峴首愁重經大堤南去方逾夕夜宿荆門建陽驛三更門外遞急郵失喜讀罷翻成愁偏憐此度緣難巧急遞書遲我行早自悔王尊叱馭忙欲從墨子回車好細思會合亦有期公待入相光綸扉同門數子各清要謂卲二雲孫淵如我亦官滿歸京師城南奕奕鳴珂里早侍趨朝歸邸三館讐書我定隨百篇脫稿公應喜此時憶公因不眠起視落月行簷前瞢騰却夢旌麾過只隔武陵山一座扺荆州早行荆南展然喜碎甓砌塗三十里渡舟復有兩下篷恍若置我秦淮中𪷟𪷟水緑低飛鳥近郭更聞人語好差憐屋瓦碎不完昨者江浪衝城垣危樓傾欹石坊倒城北至今人戶少爾來差喜皆有年移戶漸入居城邊長衢似砥房廓寡願飭官窰急燒瓦此州歷歷鎮重兵戶號十萬田疇盈災傷元氣亦易復吏不擾民民巳足宰官迓我勸駐驂導訪息壤來城南荆臺遺迹渺何處但見蒼茫接江樹西琛南貝夾道陳簫鼓一城稱賽神君不見新城峩峩堤屹屹我仰廟謨同禹烈城工及堤皆奉敕建至公安寄崔三景侃十年五度手頻分猶喜常時入夢勤行到驛亭殘月出一叢修竹卧思君澧州城外渡涔澧諸水作澧水緑如玉水清魚露目沿波惹得鷺絲忙高下日光飛不足紅霞欲渡波攔往一線分明接天處涔波入澧澧入沅欲向何處尋江湍殊方晚稻收偏早黃葉自零花自好行人十里香筍蹊踏得涔陽岸頭草宿澧州行館夜雨因柬州守方維褀昨來行館宿蕉柏雨縱橫更漏分明處思君吏術精一麾今出守三拜昔知名他日涔陽浦彌添望遠情至清化驛澧州六十里行扺清化驛其中涉三水淺者亦沒膝前旌及行李半晌渡方畢盤盤升頳岡轉轉歷􅉳穴肩輿忽高視天上炊煙出回頭戒僕御至彼謀久歇初日出縱高杉林帶殘月晴光時破碎宿雨明復滅岡南勢稍坦我馬行巳疾手劈樹上橙聊先慰飢渴大龍驛道中五塘泛南塗百折二十四岡斜刺日大岡如龍小如虎復有如雷水聲阻肩輿力盡跨馬行屈指籠燭當相迎溪風蕭蕭生馬尾一線日光馳卅里桃源行沅江水碧疑無岸一路布帆飛入縣藍輿偶憶義熙年三復陶公一篇傳我知栗里宅即是桃花源武陵路遠不須涉咫尺好上潯陽船陶然酒後詩成偶可識漁人亦烏有試問千株洞口桃何如一帶門前柳北窗日共羲皇逰眼底尚恐無殷周何言秦漢與魏晉卑論不欲驚時流華胥以上風尤厚事隔千年巳非舊雲中雞犬倘有知肯出淮南八公後但書甲子仍作詩此意亦有誰人知永初開國是何世不若洞裏忘年時沉沉遠岸楓林出恍若溪桃欲成實波流千折樹百盤再轉或恐逢真源夜扺桃源宿江上行館澧水既巳緑沅江流益清三更鑑江波波影逾空明昨宵雨足山流黛添得江波幾層翠帆空若行明鏡中鏡裏對舞山禽紅涉江何處江波狹欲向回塘問鵯鵊鸕鷀忽迎殘月飛扇得水波流向西溪深緑暗途尤阻才見郵亭一燈吐三層閣上客少休閣底自任江聲流虛窗閃白疑人面却是布帆來一片桃源行館夜起明知宵漏竟開牗光尚黑萬木裹一亭森森日難赤瞻西殘月影微露遠山碧高低飄濕翠不放白雲白江溜昨有聲回汀沒三尺涉蘇溪蘇溪何彎環中有百家屋出門臨水坐炊飯白如玉樹頭山果殊酸甜祇向縣中求食鹽涉溪前行馬礙腳水鴨多于枝上鵲過長板塘進山口作甫過長水塘山色當晝昏林木既回翳湍聲急東奔樹杪出數家􅔡闢東出門非徒便趨麓藉可瞻朝暾欲習筋力勤絶壁居子孫昨搆木百章營巢畜雞豚空處立一橋下倚松柏根我渴趨此林索水貯瓦盆箕踞進一瓢詎識官長尊戒吏勿使呵喜彼風俗淳武陵行館飯畢戲作飲溪何其涼佐以稜稜薑自常德以上水性過寒每食必啖薑少許煮魚何過美芼此青青菜溪田晚稻亦有香山果嫩緑橙生黃虀腸似荷山神憫為我一林生瘦筍新店驛夜起四更林梢明月出光甚暫山禽影落波反使逰魚啖欲㩦雙艇子遠至溪南泛離岸山雨來衝波閃燈暗出新店驛雨暫止留柬李學使傳熊積晦殊難霽山靈倘待君料量三日雨留得一溪雲高閣燈初燼東峯曙欲分猶餘竹間露衣上灑紛紛入沅陵縣界雨中遠望壺頭諸山沿溪雨猶零上嶺天始曙帶得桃源雲來穿沅陵樹𪷟𪷟竹木覆一山不見馬公穿岸處男兒出身須立名足底萬里逰行輕雖然垂老亦宜審當日何意輕南征君不見二十八將登雲臺馬革獨裹公尸回論功我意亦未允不特薏苡遭嫌猜蕭蕭谷口松杉直怒幹都抽一千尺精靈倘化蜀山蛇夜夜山頭望京國相傳穿岸處有一巨蠎即公精靈所化也發界亭驛昨宿新店驛今居界亭谷試看黔中山久巳離地軸藍輿不至天恐未得歸宿雲中數騎出北斗貼馬足我驚一回顧詫是後來僕𪷟𪷟露迷眼背上北風肅高處難久停身心願時束草八日五鼓師子塘西見殘月如塵似霧影溪流惹得行人馬上愁却比初三更消瘦曉星一箇占當頭過揚武堡升嶺我方下嶺謀少休前騎又復穿雲頭藍輿待得上岡脊一谷白雲無馬迹高高下下半日中百遍起伏隨雲峯有時望嶺行欲及石復離雲自孤立半空山果紅欲然連臂恨不如羣猿到來始信高居好從此擡頭巳無鳥將至辰州先柬陳太守廷慶到州巳歷百重山消息應知太守間釀酒乍迎千里客作歌欲化五溪蠻日邊書至顔先啓天上詩成手自刪為問玉堂前度宿可曾飛夢入壺關界亭驛南以山險肩輿增縴夫八名卅日歷萬山所幸軀未損今晨出門望失喜忽一哂輿丁增八箇繫縴筍輿本為言塗崎嶇藉此力勉黽不然升陡壁或復致狂窘我感郵卒意百計致安穩回思立身處曾未藉牽引茲雖憑衆力失足亦能殞途同蟻旋磨客類牛負紖高低既相倚曲折若施凖天路即可通吾心尚當忖白露塘道中沅陵三百里秀止萃林木居人讀書少見客輒瞪目雖云枕山往愛結水邊屋十月溪無梁行歌赤雙足山深寒不至荷幹尚芬馥商略出市鹽門前菜畦緑山行日光沉入淵水光浮上嶺水日空明中禽魚趣何永無窮物外意所苦人不省魚將蘋作屋鳥以谷為井飛行寧復越各若守疆境我讀莊周書間觀倘心領草八夜飮陳太守廷慶署醉甚四鼓起行四十里至馬溪河乃稍醒森森萬竹竿日出溪上緑涉此徑寸波溪魚圍馬足溪流三折忽暫停石上戴土營危亭茅菴一僧間誦經烹茶餉客酒始醒指途南行入峯缺壁陡仍煩數人曵沿山松竹忽無聲一嶺蘆花白如雪將至辰州道中望大小酉諸山作施黔江上望山路劣才通天壓松杉緑雲連橘柚紅緩行長水驛時見伏波宫入沅陵界居人祀伏波甚虔我亦無他願書藏大酉中初一日未曙渡辰溪一州及四縣皆以水得名凌晨渡辰溪天黑尚未明卧聽柔櫓聲知較沅水平上流一燈飄爭渡喧有聲輕帆觸煙來誤向溪左行船丁正徘徊穿出林鳩鳴從山塘驛行十里至龍門塘一陡坡作削峯峩峩天半立白馬白雲爭路入有時雲向馬首飄馬足亦與雲爭高坡陀直下蹄難駐雲始離山欲升樹乃知馬亦戀白雲行過西坡復回顧渡周溪入山沿山三日西南行山果愈美溪魚腥出門忘挈種樹經靈橘百樹疑冬青水花茫茫亦登陸一頃寒蘆雜修竹山危不平心轉平馬上睡起知身輕十一月朔日發懷化驛輿丁甚速行三十里至板橋塘天始曙四更排馬陟山岡候火齊明竹樹光欲向藍輿續殘夢鑼聲驚過第三塘每至一塘塘兵輒擊鉦相迎雙溪水繞一山流溪上冥𪷟薄霧收睡起不知雲弄采錯疑天半有朱樓大山頂山頂樹樹杪人樹底歷歷吹輕塵回頭人復出樹底樹上稜稜一山起危塗似却反得前要在絶地方通天拋書莫關無心得幾日山行增學識板橋塘北入山五色溪光炫眼新到來不信是蕭辰穿林石墮偏驚鳥出嶺雲奇欲趂人小夢乍迷千樹橘長吟想見萬山春行經谷口須重問恐有當時鄭子真巳刻扺羅舊驛我來羅舊驛日已及午候陰晴勢未分赤白雲相鬥須臾赤雲升日影乃微溜白雲復歸谷空作一川皺山雲本無心人意有左右白鳥亦喜晴勞勞向川咒扺羅舊泛即沿無水行今來見無溪不復憶沅澧同此石磷磷無流清到底沿溪山百折勢斷復中起似欲勒波住不放出山裏魚逰戀潭曲鳥亦鑑波喜最羡臨水居峯峯石如洗房廊藏暗谷石罅墮蕉尾天半露一窗知聞馬嘶起山行至一谷好奇往往入雲扄此谷樵人或未經行到上頭心轉怯四山緑欲破天青至巴洲泛無水中生一洲長幾一里無水至此分流復合無溪忽分流水色仍可辨洲窮溪復合波影益蔥舊沿溪盤細徑直下欲如線馬走北谷中恍若帆一片紆回出林杪馬上露人面同行成久别忽復得相見稍休崖石上一一喚名遍愛水故緩行吾真欲成殿自芷江縣曉行沅州出西門頗苦歷永巷出城即板橋長逾一里上皆覆屋馬行幾不能舉首坊㕓無隙地覆屋不獲仰俯行一里始出坊欲曙未曙星猶光溪深谷陡杳難辨撲面祇覺林蒼蒼前旌半日途疑失數騎驚看隔山出人行貼樹馬逼崖上下朱纓紅奪橘看山一路不覺疲吐納雲氣忘朝飢峯奇正惹人回顧急溜偏從馬頭注下山至大栗塘輿丁愁上山我意怯下嶺步放不得停顚危出俄頃白雲英英鋪嶺平誰識左右山崎􅋂行人欲前飛鳥停勸客暫憩山前亭一坡稜稜注千尺直下途危況深黑始知身世總若浮瞥若鴻毛輕一擲上回龍關夕宿無溪西朝發明山東藍輿天半忽一折坐處正落空潭中心驚不敢復俯視尚喜缺處交長松回頭顧僕復不至人説尚隔雲重重行經平地願少憩飽聽萬壑衝松風山行探奇因失路觸處總高墳渡水雲成陳爭山獸作羣轉愁人迹少渺與世塗分一晌支頥坐沉沉靜見聞便水驛行館見水仙一盆幹長三尺香亦較江鄉者馥郁為賦一絶傍山臨水幾人家下馬匆匆感歲華牽得客懷無别事芷江驛裏一枝花騎馬行我昔居里門騎馬如騎龍屏息不敢言急復掣馬騣十年作客奔馳急與馬誰知日相習風陵渡北中條西百里風馳入安邑謂赴黃仲則之喪一日駝二百餘里即今騎馬如騎羊馬亦步步隨低昻愛之不忍復鞭策一日常教餘馬力朱纓纍纍玉鞭把我馬力常先衆馬舉鞭問僕笑不休何似吳下蜻蜓舟渡無溪土人名大河溪亭皆有屋分半水禽巢昨夜前灘漲逰魚上樹梢無溪道中我行十日歷五溪馬蹄不南即向西凡渡澧沅施辰無五水山深愈轉塗愈出令我日日看山疲臨溪飯罷行尤急轉眼斜陽欲追及亦知此地近西垂好擇一山看日入將至波州泛行入一山轉轉不得出林木甚美為小憩少頃乃别沿溪北折山如夢濃緑堆林欲無縫忽然樹杪一線開穴底倒射天光來一村松竹復疑繪雞犬亦雜居樓臺林陰染黛山成幄我酌水泉疑潄玉君不見炊光上與雲頭平煙火亦徹仙人扃他時縱復得霞舉誓與此山通性靈僕夫催行三十里我坐松陰不能起卜鄰結宅亦虛言但假十日山中眠波州泛南上山東峯視西峯巳與碧天界南峯更孤逈意乃出天外峯頭一峯雲不收似向天外仍回頭前山行完後山阻我識天公用心苦六曲屏風界黔楚將至大魚塘山行水聲湍急處山亦讓溪流只此萬峯隙何來一葉舟石潭魚瑣碎竹徑鳥鉤輈正覺孤吟好黃梅發嶺頭過風木塘有感及此塘西路連岡百折餘徑荒飛野馬名古泣皋魚人説官資好吾傷祿養虛望原徒步過不忍坐藍輿曉發玉屏劉教諭嗣武陳訓導秀升率諸生相送輿中口占六首示之一例青衫馬首迎羅施山半見諸生眼前指點為文法似此峯巒始不平童年敢説有師承一事如今記尚能堂北雪深三尺路不曾辜負讀書燈豫少孤蒙太安人授經潛修莫恨閉門遲倍惜分陰是此時却喜十州民氣願殿頭早荷聖人知召見日蒙諭以黔省士習淳朴須勤為教導閣帖堂碑奈俗何烏馬三寫巳成訛子雲門下生徒盛誰比侯芭識字多一字離音總不成黔音差較楚音清諸生莫慣稱天籟好屈周顒學四聲我無奇術報殊恩欲闢當時通德門他日講堂勤問業六經誰似鄭公孫發玉屏縣玉屏及清溪五十里不足其中山雜沓頗覺寡平陸寥寥依斥堠時有幾家屋西南緑吞山雲斂日光縮猶欣枝上竦土性無曲木山凹諸土著居各面林麓邊徼歲屢登稍聞事儲蓄深林鵲聲喜時得啄餘粟前及羊坪塘村煙巳成簇山行出山泉百折殊有戀山心澗水復時落重源何處尋紫藤垂岸陡白鳥渡波陰卧聽灘聲急勞勞自古今將至慢溪塘漫溪途猶危絶巘立斥堠心疑不能到再轉谷已湊遵坡何洶洶雲出與石鬥不知雲起落但覺一山皺前行塗轉晦時見涉波獸濃緑復萬重密林無正晝將至清溪縣上嶺障坡千萬樹不覺有山城忽訝鳥巢外時飄人語聲撥雲看塔峻映柳識橋橫及渡清溪水方知水色清清溪行館見梅一株花甚爛漫喜而有作風利如刀雨若梳一林花密竹蕭踈墻頭更有山無數疑是江南二月初何曾驛使解封題空向長安醉似泥三載别來惟兩面白雲溪外即青溪都門不産梅惟庚戌春初計階北上蔣大齊耀餞我于舍南竹屋時老梅適放數花然不及此十分之一夜移瓶梅入𥿄帳作伴曉起香愈酷烈復賦一首自來荆郢南山路愛曉行馬蹄慣踏紅燭影送盡殘月聞鐘清偏憐昨夕山窗裏魂滯踈香不能起風踈雨薄送出城猶執一花籠袖底發清溪縣至梅溪塘二十里沿無水行山徑逼仄幾不能上盤山道險幾不通大石礙路如癡龍灘聲愈急嶺愈峻嶺似不放溪流東一卒引馬十卒引輿頗念衝途人不得常安居兒童生小登山易履險真如履平地百錢縛肘餅繫腰口吸山泉詫甘味梅溪才過復小溪十里肩上藍輿飛書簽倒落茶具剖只有梅枝猶在手山行望舟始覺平舵樓客眠尚未醒君不見行經平地僕夫喜一葉舟驚􅊳波起渡水至焦溪行館山水環抱林木尤邃覺嚴灘剡中無此奇勝也山百折溪百回到來山水欲俱斷一葉忽破青冥來南津樓北津樓津樹對出雲分流嵐光密處山花好十月猶青堤上草沿溪一帶飛緑煙偏向人家鏡中裊人來岸南立少時岸北征馬聞驚嘶行人衝寒馬流汗馬影度波魚忽竄盤石塘黔中行兩日山險止梗道東西無起訖所苦寡厄要行經盤石泛石脈始森峭奇峯破天出頳石􅊳若廟排空立一徑萬古不得到中疑穴靈怪縷縷雲出窽飛瀑復百重誰能抉真奧生平好奇性失喜忽一笑尋路欲出山鸕鷀恍前導侵曉入太和洞轉覺岡巒峻難容地脈回客万升閣望山欲渡溪來市郭燈初暗帆檣霧未開半時心境徹孤坐此層臺上油榨關一石橫絶天一石橫塞地盤空兩巨石缺處復鋒利雖云置營泛劣僅入隻騎前經絶壁下轉覺人馬細東南初破曙一縷入雲氣大息撫鳥巢吾形願同寄下關逢驛使却寄張同年問陶時張方由蜀入都君來蜀道如天上我渡黔關入地中今夜相思倘回首各從北斗辨西東相見坡小相見坡折不休三起三落時句留藍輿正對我來路迎面不復勞回頭盤盤路向雲中辨七里來尋大相見石古途危細如線馬頭亂撥雲𪷟𪷟馬上人面猶雲中東西對立峯何陡天半驚看一招手馬頭巳西人面東隱約尚見坡竿紅飛泉攔路復衝出人面始同坡面隔下坡十里行轉遲縱不相見還相思還相思不相見我願天下人皆如此坡面東西縱復隔浮雲一日之中時隱見或云會面數則離此則仍復分東西雙坡近又判兩縣大相見坡屬施秉亦若古者好友百里愁分擕乃知在遠仍如邇我念神交倘如此劉家塘畔作一詩火急封貽二三子偏橋重鎮當年建節旄石闌千步尚迢迢江南到此川程絶想亦應名萬里橋天梯關在施秉縣城內樓閣排空雉堞齊霓旌高閃夕陽低萬山過盡疑天上不信前頭尚有梯二鼓至飛雲巖秉炬上巖略周覽即回至養雲閣宿平明獨行上巖并至聖果亭雲根泉等久憩藍輿小睡巳二更半里外響飛泉聲入門一徑生虛白是石是雲同一色前行百級即少休秉炬却憩巖西頭征衣暫付山童浣先煮山泉與山欵自來京國夢始寒枕上一夜鳴飛湍平明待得雲全出始向山根搜石窟乃知雲亦無石奇石轉覺瘦雲嫌肥纍纍却似枝垂果一朵峯尤奇一朵飛騰只在人眼前不遽拔地思升天遵巔欲及仍難及石却戴松空處立玲瓏百窽生百松飛起松亦當排空松身夭矯本若龍會見汝植天門中須臾日晦光開闔雲復飛來與山合出門雲動石覺行雲腳送我來黃平巖側古梅一株花正放碧澗層層暗緑苔石闌干畔久徘徊不知樹向巖中出祇覺香從頭上來新月正宜當檻坐高枝疑欲待人開寺僧云今日花始盛放泉聲石色都成戀便繞花光亦百回黃平州西見日出黔中行兩日天短日苦陰玉屏及清溪尤若日草行黃平州北逢初七甫見平衢流赤日車前歡喜到八騶馬上曝背寒威收宜娘山外風尤峭一半花苗出趨廟紅綾肩上羊一腔七尺花幡引神轎相違百里風土殊山前老苗亦讀書怪來門帖宜春字明日欣逢日長至至日發重安江行館憶京師早朝諸君子過盡州西屴崱峯重安江水緑溶溶獨從萬里橋邊宿却憶千官闕下逢三殿左趨燈影密石經國史諸館皆在殿左五雲高捧日華重幾年此夕朝天慣猶向山齋數曉鐘渡重安江上嶺作三里與江背泠泠響尚聞前經百重樹始隔一川雲天向松梢暝途從石罅分寄書情較切空有雁成羣入大風洞半里阻水不得進途行扺清平山不秀而朴盤盤十里外石脈已潛伏巉巖當面出劣欲轉地軸停輿入欹徑風氣早森肅泉流四飛注細石時礙足絶險劈一門途寬不紆曲東南諸洞穴所苦地維促茲逰庶森爽敞及萬間屋恍若古達人推心貯人腹渾淪含衆有不太别清濁巖奇列千窽尚未及雕劚乘虛一燈入百怪露人目風輪覺森森大氣自回復寨裳行欲進捫黑若相觸陰房長入夜日月光不燭狂思傾海水一洗龍霧毒東西靈境闢真見列松竹方志云洞深可草里許昔有高一廬者秉炬深入忽見天光豁然洞外松竹森列暝坐一縱思莓苔照人緑晚晴自白泥塘至楊老驛山行才收薄霧即新晴似畫溪山馬首迎添得白雲成睥睨連岡真似古長城白泥塘北石零星下坂難教足暫停幽絶山村幾家屋晚霞黃處炊煙青宿楊老驛雨山中間夾一驛驛路如繩盡高出山凹忽現數百家瓦屋鱗鱗若居穴下山欲向橋南住水碧堤青渺無路更殘繞砌空百回新月不過山岡來度響琴峽排空石筍立一山人向筍上行彎環藍輿舍此即無路危在皆從筍尖步行人至此亦掉心空有細響同鳴琴琴聲愈急步愈促一跌幾將陷山腹我行萬山無此奇過此一折山仍夷君不見危塗莫謂無人到此是康莊通六詔黃花坪道中黔中雖易雨一雨亦易晴濕翠甫欲收早喜霞光明山花亦時開助以百草馨最好山徑奇一轉一曲屏才過清水塘巳扺黃花坪回頭望諸山復覺雲冥冥泠溪塘四山盡高出中陷若一井居人欲入縣數里方及嶺松櫟若井闌沈沈閉升景塘兵瞻導騎半日巳引領樹杪百尺樓樓前柝聲永相將過溪去溪水清鑑影太古雪尚留何嫌水光冷牟珠洞層山天半列作屏下有洞壑藏真經到門口缺若建瓴一徑斜入天光青飛空真人倚踈櫺法象奇古忘年齡千百萬態韜真形旋螺三折步不停石上戴石何瓏􅌑巖深無人杳冥冥石腹夭矯參龍形中陷若穴堆蜻蜓凝脂點乳流素馨石嫩可搯膏猶零恍如鴻鐘撞寸莛絶巘往往揚空舲有聲無聲難可聆偉哉造物實至靈鑿出雷斧穿飛霆另闢一洞居明星小者如盎粗如瓶否亦或是仙人庭百丈高處懸飛鈴更有一曲雕雲軿馬前兩兩排仙伶馬旁力士疑五丁後來一人殊伶俜側首鬢影光熒熒回身匿避如尹邢千年老寉初刷翎絶壁萬丈懸猱㹶或如空原萃鶺鴒或如高枝綴蜻蛉如人狒狒似豹鼮回毛宜乘細角麢形奇態詭孰使令久視方得心神寧稍南一崖結作廳嫩緑錯雜同回汀碎影點出踈踈螢一門森森列萬釘五色變幼形竛竮巨者恍若浮江萍山南如坎北若陘幸有巨石層層回萬古不入蛟龍腥靈風蕭蕭雨𪷟溟晦朔惜乏知時蓂來逰如夢出若醒刻石欲作山前銘我留一言神倘聽巨斧徑欲鐫嶺嵤一線裂處開明廷從茲光怪不得扃正午赤日來亭亭時議欲用四川開鹽井法于巖頂鑿一穴以通日光過新安塘未三里見絶頂一關高出鳥道即隴首關也延回行半日始至才過新安塘未扺壠首界嶺樹千重復萬重驚看白道懸天外計程七里行半時我意尚覺來何遲回頭忽驚飛鳥墮隔却白雲穿不過晚至龍里縣清絶山城祇百家城門樓上晚吹笳猶餘濕翠收難盡商略明朝作曉霞早發龍里縣道中雜詩𪷟𪷟四山雨中有一山晴漏得朝暾影林鳩復怪鳴絶巘疑無路雲穿一徑斜野花隨意放不復有人家山樵值山樵陡壁亦相揖𪷟𪷟雨不晴莓苔綴圓笠牛羊識分界不復過溪隈只有溪魚好斜穿石罅來全家三五輩種藥此山中開牖摘生果朝霞滿袖紅誅茅搆一亭遠近皆可徙因貪聽溪聲移入前林裏觀音閣溪聲流不盡三折到橋南初日紅猶斂殘冬緑尚酣乍疑僧入定真與佛同龕北閣休教掩衝寒性所耽小除夕祭詩作南行逾萬里小歲入三更爆竹驚心碎桃花照眼明時桃杏及海棠諸種並巳盛開祭應遵舊例醉復盡餘觥笑向兒曹語今年帙已盈除夕寫歲寒圖貽徐太守日紀樂府新傳二十篇太守近勘事定番州有樂府二十篇蠻花犵鳥倍鮮妍使君循迹吾能識記得相逢又草年壬辰年太守官英山令時爾隨學使者至六安得識面風光知否入春無竹葉青蔥柳眼蘇欲祝一番交誼永臨溪仍寫歲寒圖
