front:
  text: 擬兩晉南北史樂府卷上
  hash: sha256:e33911c713c94718bcb705d2599e1a88339cd1d82efb0ab9ded5921e2a5cda44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_000-1a}
body:
  text: 陽湖洪禮吉稚存譔馬同槽聲嘈嘈馬騰槽火炎炎龍上天去年秉黃鉞今年加九錫龍旂十二旒天子在頃刻桃花源武陵船問魏與晉何茫然魏武帝夢三馬同食一槽甚惡之謂太子丕日司馬懿非人臣也泰始元年晉王炎稱皇帝廢魏主爲陳留王廣武嘆一日哭留狂名百日醉留酒名酒名狂名俱不免先生能作靑白眼驅車何茫茫廣武何荒荒當時楚與漢莽莽百戰塲百戰塲斜日下𥪡子成名尙堪詫擾擾何况牛與馬阮籍登廣武觀楚漢戰處嘆曰時無英雄使豎子成名籍能爲靑白眼見禮俗之士以白眼對之蘇門嘯阮生狂耶稽生傲耶先生何人泠泠嘯耶咸熙魏耶咸寧晉耶先生何人冥㝠隱耶孫登隱蘇門山善嘯阮籍見之歸著大人先生論稽康從登遊三年問其所圖終不荅將别謂曰子才多識寡難乎免於今之世矣社稷勲炎精中燼赤帝死祖龍西來作天子大開明堂錫弓矢謀臣誰裴與王股肱誰荀與羊金符玉冊何琅琅䇿勲第一推平陽當時曾殺高貴鄕武帝將廢賈后楊太后爭之日賈公閭有大勲於社稷公閭賈充字充使成濟殺高貴鄕公作佳傳一丸藥勞侍婢千斛米作傳紀彼哉譙周及門弟三分竊據孫興曹正統那付當途高君不見一士已沒賴半士定論早出習鑿齒陳壽遭父䘮使婢丸藥謂丁儀子曰覔千斛米爲尊公作佳傳習鑿齒作漢晉春秋以蜀爲正統因有蹇疾苻堅稱爲半士别駕謡海沂之康寔頼王祥邦國不空别駕之功嗚呼别駕今三公惜哉不作徐州終王祥爲徐州别駕郡中謡云云魏亡入晉官太保年八十五始卒峴山碑杜公碑碑書功高岸爲谷谷作陵叶羊公碑碑墮泪茫茫淚枯碑不碎碑不碎由民心君不見古來賢達皆爭名羊公碑後碑俱冺此碑非金亦非石碑之崇崇以德羊祜墮泪碑在襄陽峴山杜預好爲後世名刻石爲二碑紀其􅈴績一沉萬山之下一立峴山之上飛渡江前揚帆後執柁南人倉皇北人坐橈居前楫居左岸軍愁呼水軍卧城門開降帆來七萬騎全軍回當時若聽王渾指北兵安得飛至此王濬率舟師直抵建業吳人曰北來諸軍乃飛渡江也詔濬至秣陵受王渾節度渾遣信令濬暫過計事濬舉帆直指報曰風利不得泊也銅駝嘆立人當立德擇子先擇嫡宫門老臣三嘆息銅駝會見在荆棘老奴亦言座可惜爲官乎爲私乎此座何不歸桃符索靖知大下將亂指洛陽宮銅駝嘆曰㑹見汝在荆棘中齊獻王攸小字桃符文帝嘗指御座曰此桃符坐也淸談誤王與謝揮麈尾樂與衛饒名理淸談亹亹從天來洛中已建單于臺王弼謝琨善淸談樂廣衛玠善名理桓温自江陵北伐登平乗樓望中原嘆曰遂使神州陸沉百年邱墟王夷甫諸人不得不任其責雉短短雉短短飛來入宮院欲竊主權欺主闇昨日殺龍母今日殺龍子可憐銅駝宮化作荆與枳惠帝后賈充女也武帝嘗日賈公女有五不可種妬而少子醜而短黑后廢楊太后於金墉城絶膳八日而卒使太醫令程據毒太子金谷䜟紅𬎼花開置行幕一盃兩盃緩行樂美人頭向盤中落珠歌翠舞昕斜陽珊瑚七尺施作牀人間夢醒春茫茫花枝如烟墮高閣散盡黄金恣揮霍白首同歸訊潘岳潘岳金谷園詩投分寄石友白首同所歸後岳與石崇同死趙王倫之難遂成䜟中台坼去年誅韓信今年醢彭越駿珧旣首禍瓘亮亦繼沒南風當國勢絶倫手持天下歸先生叶中台星坼日復蝕先生不言務簡黙金墉城太后薨許昌宮太子凶誰與殺者張司空中台星圻張華少子韙勸華遜位華不聽華將死謂張林日卿欲害忠臣耶林稱詔詰之日卿爲宰相太子之廢不能死節何也華日式乾之議諌事俱在曰諌而不聽何不去位華不能答華亭鶴華亭鶴雲間哭聲何悲悲二陸白祫喜談兵貉奴寧作督机山深三泖陰蓴鱸千里方揚舲此時笑殺張季鷹陸機將死嘆曰華亭鶴唳可得聞乎張翰聞秋風起思菰菜蓴羹鱸魚膾卽日挂冠歸除三害禾兮芃芃稷兮翼翼父老不樂仰天太息一解長跪吿父老父老䆒何苦父老不苦長橋之蛟與南山之猛虎二解父老愼勿悲山有虎兮虎可摧水有蛟兮蛟可揮兒不讀書兒身何爲三解兒讀書讀書不忘始少慕奮身十年俠士長慕事親十年孝子四解兒讀書讀書不近名兒爲良臣兮天王聖明兒爲忠臣兮䜛人釁成五解周處爲御史中丞梁王彤違法處深文按之及齊萬年反彤都督關中諸軍事賊有衆七萬彤逼處以五千兵撃之絃盡矢絶遂力戰而没思子臺南風狂惠風閉千歲髑髏齒牙利承華門詔誰作黄門侍郞有潘岳許昌宮逆誰預黄門將軍有孫慮思子臺愁雲結許昌一聲飛蓋裂金墉城中貯金屑惠帝爲愍懐太子立思子臺太子妃名惠風太子䘮發許昌大風雷電幃蓋飛裂賈后廢金墉城飮金屑酒死寧馨兒寧馨兒乃貝媚人骨少無宦情皇皇詣闕長無宦情營營三窟一代龍門竟誰識可憐車前拜石勒阿堵積室中持籌亦錢癖新婦可作阿戎匹樂府上七王衍勸石勒稱帝衍妻郭氏好聚歛嘗令婢以錢繞牀使衍不得行衍晨起見之謂婢日舉阿堵物却侍中血長安門開鼓聲死賊騎如雲走天子西來從輦無一人萬乗蒼茫草間止行間殺氣何紛紛侍中獨拜車前塵馬前飛矢着龍節侍中獨濺衣上血侍中血中散琹琴聲欲絶日欲沉有子乃不傳廣陵稽紹蕩陰死節血濺帝衣後左右欲浣衣帝曰稽侍中血勿浣也稽康將刑顧視石影索琴題之日廣陵散于今絶矣龍虎爭虎皇皇北來牽兩狼南飛值龍龍角張洛中碩䑕尺二長一解莫打虎打虎先傷龍龍鱗十十五五二解莫打䑕打䑕已驚犬犬聲欲聞數武三解雄鷄黙雌鷄啼大馬死小馬饑四解元康中童謡虎從北來鼻頭汗龍從南來登城看指齊王冏成都王頴永嘉初童謡洛中碩䑕尺二長若不早去大狗至鼠指東海王越狗指苟晞大寜初童謡老馬死小馬饑指明帝崩成帝幼而言十三月十三月狼生貙十五月貙生狳貙生已難禦狳生奈何許蛟龍何况得雲雨絳灌無文隨陸無武以之讀書横覽今古父作蒙珠離子作遮須夷神州擾擾不可止洛中又出新天子劉淵十三月而生淵子聰十五月而生聰子嘗死復蘇見淵爲蒙珠離國主且日遮須夷國無主待汝父爲之赤白氣旗獵獵天門開雲中天子騎龍來赤光耀以西白氣耀以東非烟非霧杳不知其𪷟𪷟熒熒煌煌遂開明堂礌礌落落雄藝卓犖石武鄕一生低首惟高皇幕中乃有張子房石勒生時赤光滿室白氣自天屬於中庭勒嘗謂人曰若逢高皇當北靣事之遇光武當竝驅中原勒以張賔爲謀主賔自比張子房特尙可鍾離崩䧟石穴一如丹一如漆入穴多于蟲出穴莫敢雄㧞劍刺屋居其中鹽神冉冉兮紛相從神之一飛兮九日盡落浹旬茫茫兮不見城郭天空空野夢夢遺以靑縷射以雕弓鹽神去王廩地特與雄廩君裔欲寄食寧作賊官貪如狼政如火李特尙可尙殺我李特爲廪君苗裔先鍾離山崩䧟赤黒二穴出黑穴者四姓岀赤穴者卽特先五姓爭爲神相約以劍刺穴屋惟廪君劍獨着遂爲神有鹽神從之其飛閉天廪君射殺之天乃開朗特據廣漢百姓謠日李特尙可羅尙殺我壯士歌七尺刀八尺鞍壯士歌悲陳安啾啾喞喞天陰雨黑伏兵邀我西飛騎追我北班騅無聲草間匿嗟嗟見入不見出西流水東流河壯士歌奈尓何陳安與趙將平先戰㑹日暮雨甚匿於山中爲呼延靑所殺隴上人思之作壯士歌留降欵一千義軍守陴哭城中天子亦食粥誰歟守者索都督長安城闕生蒿萊長安城門不肯開車騎來萬戸來劉曜逼長安城中飢甚愍帝食麴屑粥索琳留降欵不發使子說曜日若許琳以車騎萬戸者請以城降中興瑞綿綿延延華光燭天正氣萃此者五百二十六年時巳過運乃昌朱旗卓地一丈長金符落天走建康化龍一馬興眞王龍爲王馬遂亾始秦時望氣者云五百年後金陵有天子氣至晉元帝中興果五百二十六年初玄石圖有牛繼馬後故宣帝深忌牛氏及恭王妃夏后氏竟通小吏牛氏生元帝太安時童謡五馬浮渡江一馬化爲龍夜半舞鷄三聲客三喚起視東壁有疎燈啓明光已亂英雄乗時空浩嘆元明之間久無旦祖逖與劉琨俱爲司州主簿共𬒳同寢中夜聞荒鷄鳴蹴琨起舞王與馬王與馬共大下將軍前丞相亞將軍無謀丞相詐丞相謂將軍三州勢堪藉事成爲王失爲覇嗚呼將軍遽叱咤鼓頻頻肆逆氛丞相大義已滅親白旗懸首煩將軍王敦王導秉政時人語日王與馬共天下昌元年敦率衆内向以誅劉隗刁協爲名永敦死懸首南桁莫敢收塟者新亭淚愼勿學楚囚對愼勿酒新亭淚天茫茫天方醉人茫茫人方睡過江人士毎至暇日相要出新亭飮宴周顗中坐嘆日風景不殊舉目有山河之異皆相視流涕王導愀然變色日當共戮力王室尅復神州何至作楚囚相對呼伯仁渡江來不安坐茂倫一言伯仁賀向見夷吾在江左夷吾有急呼伯仁伯仁百口還理君爲君瀝肝膽爲君全令名叶伯仁言感天子夷吾不言伯仁死三司耶令僕耶知人不易古所嗟夷吾亦殺鮑叔牙王敦反王導毎旦率子弟詣朝待罪見周顗入導呼日伯仁以百口累卿顗不應及人爲導申救甚至出又上書明導忠誠導不知甚恨之及王敦問顗于導三問不對敦遂殺之拜士行朝亦運百甓暮亦運百甓欲淸中原還致力古人陰惜寸今人時擲尺欲淸中原先惜日叶陶士行眞名臣神機魏武忠孔明叶陸遜陸抗非其偷前年撃杜􅌢今年殺蘇峻君不見元規枉自受顧命賊來亦拜陶士行蘇峻反庾亮詣陶侃拜謝侃止之日庾元規亦拜陶士行耶尙書梅陶與曹識書日陶公机神明鍳似魏武忠順勤勞似孔明陸抗諸人不能及也踐海水北風吹海海欲立海底潛蛟抱氷泣馬蹄踏海聲隆隆三日不拆玻璃宮玻璃平鋪三百里鐵騎茫茫踐之起君不見一聲篳篥海水開海厎已執乖龍回燕慕容皝討慕容仁天寒海凍從昌黎東踐海氷而進凡三百餘里仁部下叛執仁以降義旗指去年反王敦今年反蘇峻六師束手庾元規八州觀望陶士行君父之難安可逃義旗一指天爲高官軍已成白石壘賊騎不越朱雀穚功成倘憶絶裾處夜夜精靈泣牛渚蘇峻之難温嶠約陶侃東下後侃以糧盡欲返嶠謂曰公若沮衆敗事義旗將回指于公矣初嶠欲將命母崔氏固止之嶠絶𥚑而去獻行璽獻行糧獻行璽尙薄袁本初何敢學成李二十八宿纒宮門大業無愧張耳孫龍章九錫未八告白帢八棺還自悼還自悼百六乾坤總羣盜執手傳家自忠孝前凉張軌漢張耳十七世孫據凉時有􅏏石白點成二十八宿于茂以未受王命白帢八棺勉嗣子以忠孝一目主長安天子眇一目長安城中月鼎足妖星茫茫射黃屋死我者堅活我雄東海大魚化爲龍男皆爲王女爲公苻生眇一目童時祖洪戲之日吾聞瞎兒一泪信乎生引佩刀刺岀血日此亦一泪也性殘忍祖洪殺之雄勸乃止生立太史奏長安城中三月竝岀識英物兒勿啼兒啼驚一切兒啼何竒知兒是英物兒勿來兒來光一室兒來何殊知兒有竒骨星茫茫墮兒顂中七山巖巖横兒頂中一君不見温太眞擅竒術燃犀照餘幽魅出何不擕來照英物桓温生未朞温嶠見之日此兒有竒骨可試使啼及聞其聲日眞英物也温靣有七星日書空夷甫矜空談神州已陸沉深源復中起蒼生更誰倚嗟嗟一百年處士相後先書空計已左周旋猶作我東山捉鼻四十春蒼生所望眞斯人殷浩𬒳廢在信安終日恒書空作字揚州吏民㝷義逐之竊視唯作咄咄怪事四字而已海西公局縮肉馬作犢海西公犢化龍犢化龍是龍子朝向離宮生暮向吳宮死吳宫死悲何如君不見永嘉袖手永昌呼入廟曾言帝室儲何因龍種欺黄犢㑹見鷄雌擾鳳雛海西公不男使左右句龍與内侍接生子以爲世子民間謡云本言是馬駒今定成龍子局縮肉元帝時謡孝武時謡云黄雌鷄莫作雄父啼鬼董狐鬼董狐事何畧天地茫茫總初覺元凱誰蟒而攫元海誰鱗而躍敦與温重筆削君不見枋頭旣敗史筆誣定論只有鬼董狐干寳作搜神記劉惔日卿可爲鬼之董狐杜預在荆州因宴醉卧外人聞嘔吐聲竊窺於戸見一大蛇垂頭而吐劉淵母祈子于龍門見一大魚頂有二角伏于祭所夜夢旦所見魚變爲人遂生淵孫盛作晉陽秋直書枋頭之敗温見之大怒孫諸子懼遂竊改之東山臥大謝執如意小謝揮麈尾中謝無所爲泠泠善名理一門羣從眞無慙閨中飛絮還撒鹽君不見四十東山臥初足與人同憂亦同樂别墅風流賭棋局謝安兄奕爲桓温司馬喜執玉如意弟萬常着鶴􅌁裘白綸巾安悅兄子元戲賭紫香囊得卽焚之牛心炙欲知名啖牛心欲書名聚鵞羣叶昔不减阮主簿今可伍王懐祖擕諸子抱弱孫婚嫁畢學尙平學尙平事亦足中年以後傷哀樂叶得閒且自陶絲竹王羲之十三時詣周顗時重牛心炙坐客未啖顗先割啖之由是知名阮裕有重名爲王敦主簿敦嘗謂羲之日汝不減阮主簿王述字懐祖與羲之齊名阿房城鳳凰鳳凰止阿房一雌一雄雙翶翔不見雀來入燕室但見浮雲閉白日鳳西飛雀東飛膓斷朱宮復紫隄錦袍一領軍前却鳳皇鳳皇不如雀苻堅時謡云一雌復一雄雙飛入紫宫又謡云鳳皇鳳皇止阿房時慕容冲與姊淸和公主俱有寵慕容垂妻亦得幸於堅與同輦宦者趙整歌日不見雀來入燕室但見浮雲閉白日慕容冲逼長安堅使送錦袍一領冲却之長星見熒惑入南斗天子下殿走熒惑來天垣天子坐未安坐未安亦何有長星勸汝一盃酒臣願天子聖列辟賢追古七十二帝恩綿延臣更左執矢右執鞭妖星射落淵厎眠陛下聖壽千萬年長星見孝武帝甚惡之于華林園舉酒祝日長星勸汝一盃酒自古何有萬年天子耶負畚來負畚來洛陽鬻望塵來司隷逐卿無忘螭蟠朕無忘龍伏嗟嗟景畧奪何速不事西夷事南服八公山悲苻融五將山毒吳忠景畧有君死萇手景畧有兒縶泓首丕登先亡鎭惡後鎭惡死報苻氏王猛少時鬻畚於市苻堅七歲戲官道左徐統戲日不畏司隷縛耶堅至五將山姚萇遣將軍吳忠圍之求傳國璽不得遂縊堅猛孫鎮惡奔晉隨劉裕滅後秦爲沈田子所殺行路難行路難歌以哭四座茫茫慘無樂叶松栢何啾啾屋下尸自愁挽歌何慨慷道上殯自往袁山松愁何工君家兄弟才偏雄呼盧十萬擲布帽卿軰可識袁彦道袁山松喜歌行路難詞又喜道上作輓歌時謂張湛屋下陳尸山松道丄行殯袁耽字彦道桓温嘗博進負數萬求濟于耽耽許之就局十萬一擲直上百萬探布㡌擲地日竟識袁彦道不丁零王丁零中一隅地幾人稱王幾人帝翟斌據丁零慕容垂以爲河南王翟釗改元定鼎後敗爲慕容永所殺新平寺長星出天十丈長東掃宛洛趨雍凉明光殿前老父走甲申乙酉悲魚羊魚羊食人人更少長安十陵長秋草威鳳重飛入禁中蛟龍更出屯官道東帝鮮卑西帝秦英雄歸骨向新平萇登自搆君臣禍垂永還操門戸兵後秦姚萇縊堅于新平佛寺堅時有人于明光殿大呼日甲申乙酉魚羊食人慕容永爲西蕪後燕主垂復滅之苻登載堅木主與萇戰毎事必啓主後行五經表宗生去大事已趙生來大事濟彼棄龍頭附蛇尾才何竒九州小書何竒五經表不處城廬處洲島沮渠據北乞伏西自鄶以下還無譏秃髪烏孤據廣武秦王興使韋宗覘之歸日吾乃知九州之外五經之表復自有人也宗生名敞趙生名振烏孤日吾得趙生大事濟矣沮渠據張掖乞伏據金城借鬼兵城門西鬼兵十萬啾啾啼城門東陰旗獵獵愁燐紅賊騎欲向南鬼伯趨䟃𧽼賊騎欲向北啾啾啼鬼伯城門開待鬼來椒漿爲汝奠靈甲爲汝裁一朝賊退歸海中幕府上簿皆鬼功鬼兵不來兮奈何許賊兵皇皇兮矢如雨風折兮蝥弧血染兮頭顱將軍苦身折天師竟無術彼夫人兮眞丈夫抽刀殺賊賊卽呼天壤欲似王郞無孫恩攻㑹稽内史王凝之素奉天師道官屬請出兵凝之日我已請大道借鬼兵守諸城門各數萬不足憂也及敗遂爲恩所殺妻謝道藴聞變肩輿出手殺數人續佛經君不見長安天子好禪論浮屠沙門多以萬殿陛空陳豐草詩深宮自進伊蒲飯又不見長安天子多武功蜀氛西靖燕東封一朝熒惑星失守萬刼昆明火更紅可憐德脩期愈促自謂當時邀佛福邀佛福三千佛經盈卧閣萬死難懴姚萇惡後秦姚興好佛與鳩摩羅什續佛經長安里中沙門至萬人興好獵杜挻著豐草詩以諌熒惑入瓠瓜中忽亾不知所在是歲秦大旱昆明池竭童謡訛言國人不安槐樹賦槐樹賦述志賦撰作遐方一何富上馬能殺賊下馬作露布龍吟夜半興眞人譜系乃出飛將軍彼夫人兮亦淸節三年不言似亾息西凉王李嵩隴西人李廣裔著槐樹賦述志賦夫人尹氏有志節以先適馬元正三年不言虎臺謀兄爲囚妹爲虜父命事仇無不可叶父已死兄已誅父命殺仇仇卽夫父仇不報豈女子反面事人有餘恥事已不成寧惜死黄泉有血流浩浩九州之外五經表南凉王傉檀女爲秦王熾磐后與其兄虎臺謀殺熾磐事泄死沐謙刺一尺七首三尺雲首提革囊飛入秦飛入秦殺龍子感恩茫茫復中止君有疾吾侍之君有藥吾奉之涔涔淚下不能止義士今時爲君死匣中夜半風颼颼恨不飛斬仇人頭劉裕使沐謙刺司馬楚之楚之待謙甚厚謙未得間乃夜稱疾楚之果自齎湯藥往視情意勤篤謙感楚之恩反爲之用彗星岀明堂坐一龍纔升一龍墮慟哭來徐公徐公得無過星離離入太微經北斗絡紫微茫茫一百二十祀酖君以生不如死晉亡亦有死節士彗星出天津晉恭帝禪位於宋自遜于瑯琊第秘書監徐廣痛哭謝晦日徐公得無小過裕使張偉酖帝偉日酖君以生不如死遂自飮而卒義羲號仇池一隅世忠孝宋家日月飛不到永初年間義羲號當時彤弓與盧矢老臣自當臣晉死我死善事新天子嗚呼國亡不與亡柴桑處士仇池王仇池王楊盛聞晉亡不改義羲年號謂世子厷日吾老矣當終爲晉臣汝善事宋帝及厷立始用元嘉年號桃源記不聞人聲但聞琴聲不聞絃聲但聞指聲桃源中人羲皇上人何論魏人何論晉人陶濳性不解音畜素琴一張絃徽不具毎朋酒之會則撫而和之日但識琴中趣何勞絃上聲擬兩晉南北史樂府卷上終擬兩晉南北史樂府卷下陽湖洪禮吉稚存譔一尺劍一尺劍馴兩蛇五百載還劉家一解炎精斷典午亂眞人興紹皇漢二解草粛肅沒輦轂金之刄之悔不速三解宋武帝本漢後爲高祖弟楚元王交裔武帝伐荻新洲大蛇長數丈射之傷明日見數童子靑衣擣藥宋時有童謡云欲知其姓草肅肅蓋蕭道成受禪之䜟味卿言恪誰長慕容暐有霍光猛誰伍秦符堅有仲父裕誰堪司馬宗有曹瞞知人何詳已何畧如君之才總誰角可憐死慙高著作崔浩與魏太宗論近世將相之臣太宗悅賜御縹醪十觚水精鹽一兩日朕味卿言如此鹽酒浩後以譔國史族誅高允爲著作郞十七年不遷官金昌亭東華吳聲猶未已司空中書執戈起同謀亦聞檀道濟廬陵何人武皇愛子陛下弟金昌亭邊鼓聲沸磨刀霍霍且及帝五蛇升一龍去龍歸若得瞻皇馭應問爾來何太據徐羡之與傅亮謝晦受遺詔輔少帝帝居䘮無禮羡之等令檀道濟引兵入廢帝爲營陽王復弑之金昌亭并殺廬陵王義真東山屐東山屐屐不釋屐不釋作山賊西堂夢夢莫論夢莫論思王孫君才苦多實苦少别夢盈盈滿春草君心苦雜迹苦幽探竒累累山靈愁山靈愁向天訴桃墟邨中夜相捕君鬚成佛骨未仙生天乃落孟顗前謝靈運旣徙廣州欲要合鄕里小兒于三江口篡取爲秦郡將宋齊所發于桃墟郵獲七人靈運遂坐誅靈運將刑捨鬚作維摩詰像孟顗事佛精懇靈運素輕之日卿生天當在靈運前成佛當在靈運後檀江州可憐白浮鳩枉殺檀江州萬里長城君自毁明年飮馬長江水長江飮馬君有知目光裂電神騅馳魏人聞檀道濟雄名憚之圖以禳鬼收脫幘投地怒日乃壞汝萬里長城道濟𬒳魏太武引兵南下文帝登石頭城望之謂江湛日檀道濟若在豈使胡馬至此春月畋咄爾簔嗟爾笠曷不遠暱我馬欲逸咄爾騎差爾王曷不傍皇我田欲荒一日荒不得實一日飢不得活王將四征營三驅驅斥老農胡爲乎還君壺觴不敢食我田我田食我力衡陽王義季都督荆湘嘗春月岀畋有老父𬒳苦而耕左右斥之老父曰盤於游畋古人所戒今陽和布氣一日不耕民失其時奈何以從禽之樂而驅斥老農也義季曰賢者也賜之食不受封狼胥朔風一夜長城倒百萬甲兵如電掃石頭城上烽連天不見居人見秋草秋草秋肥胡馬驕江南地赤總無雍徐白骨連靑冀又見催書集飛騎君不見耕當問奴織問婢封狼居胥亦何易朱文帝欲經畧中原王元謨尤好進䇿帝日觀元謨言令人有封狼居胥意沈慶之諌日耕當問奴織當問婢陛下伐國而與白靣書生謀之何由濟帝不聽魏人凡破南徐徐兗豫靑冀六州所過赤地無苗春燕歸巢於林木佛貍䜟江水飮莫飽佛貍死江島去年歲在寅今年歲在卯崔伯深死亦早魏太武南下童謡云虜馬飮江水佛貍死卯年佛貍太武小字崔浩字伯深宜速斷禁林半夜愁烏號深宮一舉雙鴟梟䲭梟食母獍食父假以羽翼授以刀齋宮門開燭未滅舉几一揮指齊裂湛之不斷江湛遲陛下裁弟難裁兒難裁兒已殺父嗟嗟雙鴟梟更假一鸚鵡太子劭始興王濬與嚴道育王鸚鵡巫蠱事發帝欲廢太子劭賜濬死與徐湛之江湛王僧綽謀之僧綽日事宜速斷當斷不斷反受其亂帝久不决更以謀告潘淑妃妃濬母也以告濬於是太子劭遂與濬弑帝并殺潘淑妃徐湛之江湛俱死見要人衣如鶉馬如狗道逢八騶不得走平生不喜見要人要人近復生公門君不見要人耶亦堪喜陛下有綸臣仲禮顔延之子竣旣貴常乗羸牛笨車道逢竣鹵簿卽屏往道左謂竣日平生不喜見要人今不幸見汝侯景圍臺城邵陵王綸及都督柳仲禮按兵不戰梁武帝嘗問䇿於柳津對日陛下有邵陵臣有仲禮不忠不孝賦何由平竹林堂寧馨兒父不知渠大齄鼻何如斯齄鼻不懼鬼射鬼鬼殺爾今日當屠猪急付大官㕑猪來代爾宰天下竹林堂空鬼亦怕廢帝射鬼於竹林堂爲壽寂之等所殺王太后疾篤呼廢帝不往怒曰那得生寜馨兒帝人太廟指世祖像日渠大齄鼻如何不齄帝嘗惡湘東王彧呼爲猪王一日忤㫖帝縛之使擔付大官厨曰今日屠猪建安王休仁笑曰猪未應死待皇太子生彧遂免違導㫖欲言耶負導㫖不言還負翟黑子宮中門啓戈矛森臣寜負迹不負心天威煌煌距尺咫臣寧負生不負死高渤海眞純臣天文書上天顔温臣才區區勞奬述淸河司徒臣不及高允嘗授太子經及崔浩國史事發并欲誅允太子人言允小心謹宻且制由浩請赦其死魏太武問曰國書皆浩所爲乎對曰浩所領事多總裁而已至於著述臣多於浩太武怒曰允罪甚於浩何以得生太子懼日天威嚴重允迷亂失次耳臣向問皆言浩所爲太武問信如東宮所言乎對曰臣罪當滅族不敢虚妄殿下哀臣欲乞其生耳太武爲太子曰臨死不易辭信也爲臣不欺君貞也遂赦之允退爲人曰我不奉東宮導㫖者恐負翟黑子耳先是翟黑子奉使并州受布千匹事發謀於允允勸首寔翟黑子不從太武殺之魏太武使允集天文災異書凡八篇太武善之謂不減雀浩領軍腹七日宴愼勿開司空血裹長安臺牽牛星愼勿見蒼梧首離仁壽殿江州首禍徐州亡天意總在蕭建康箙中有箭箭有鏃痛恨不穿領軍腹宋明帝以七月七日殺巴陵王休若後廢帝亦以七夕死帝醉寢仁壽殿令楊玉夫何織女渡河日見當報我不見當殺汝玉夫懼遂弑之帝嘗直人領軍府值蕭道成晝卧帝畵其腹爲的欲射之以王天恩言遂以骲箭射石頭城石頭城悲孝子悲忠臣寜爲粲死慙淵生叶江陵市爲忠臣爲節士不作充生作陵死袁粲與子最同死日汝不失孝于我不失忠臣沈攸之將起兵日吾寧爲王陵死不作賈充生攸司馬邊榮亦不屈死天王家生不落降王車死不入天王家王敬則虎而翼板輿迎居别宫耳司馬家亾亦如此王光祿獺尾哭興亾兩見勿復哀鸞飛又向天邊來宋順帝禪位於齊王敬則以板輿入迎帝帝曰欲見殺乎敬則曰岀居别宫耳官先取司馬家亦如此帝曰願生生世世勿復生天王家右光祿大夫王琨晉世已爲郎中至是攀車獺尾慟哭曰人以壽爲歡臣以壽爲戚旣不能先驅螻蟻遂復頻見此事移吾牀紀僧眞無所須從官乞作士大夫士大夫非天子命江家謝家聽不聽欲娶須造中書堂欲貴須近尙書牀桃笙三尺牀七尺尙書移牀遠俗客糺僧真得幸於齊武帝請日臣岀自武吏階榮至此爲兒復得婚荀昭光女無所復須但願乞作士大夫武帝曰此由江斆謝㵸可自詣之僧眞詣斆登榻坐定斆顧左右曰移吾牀遠客僧眞䘮氣返曰士大夫固非天子所命易犬子延昌宮中國祚短神龍墮地化作犬楊婆咒禱空紛紛寧知金翅啣王孫王孫憶翁須好作翁死旬時還奏樂花枝裊裊春綿綿楊郞宮中恣醉眠狐裘錦衣左右直徐郞殿前躬畫敕寧失官家朝莫犯周侯刀寧違至尊訓莫拒舍人命禁中刀敕空縱横國運詎識歸宣城尙書不言侍中走舉朝盡醉吳興酒齊武帝時有小史姓皇名太子帝爲移點於外作犬子何點日太子作犬不得立矣後文惠太子果卒鬰陵王爲皇太孫時令女巫禱祀速求天位及太子卒益加敬信世祖崩大歛畢卽呼伎作樂帝左右楊珉與何后同寢處帝寵任綦母珍之周奉叔及宦者徐龍駒等珍之有所求無不應有司相語日寜拒至尊敕莫違舍人命奉叔有單刀二十日嘗語人日周侯刀不識君龍駒至代帝畫敕宜城公鸞謀繼大統多引朝中名士參畫侍中謝朏心不願求止爲吳興太守至郡致酒數斛與弟吏部尚書㵸日可力飲此勿豫人事郎君書郞君書悲欲死不死三軍死尺𥿄田横客走安歸先生血染門生衣陸家門生頸已折袁家門生遭狗齧先生之靈幾時沒晉安王子𢡟與防閤陸超之董僧會舉兵討蕭鸞爲參軍于琳之所殺僧會見𢡟子昭基書曰郎君書也悲痛而卒或勸超之遠遁超之曰恐田横客笑人遂爲門生所殺頭斷而身不僵門生亦助舉棺棺墮折其頸而死袁粲死後其家匿一少子投粲門生狄靈慶靈慶遂抱兒以首兒死後靈慶嘗見兒騎大㲰狗戲年餘靈慶竟爲㲰狗所殺解散髻華林園中宴初設彦回琵琶稱第一淸歌沈季琹王郎三公解事惟拍張尙書尙書技偏乏稽首臣須用臣法臣今有法臣知書當時封禪推相如帝日休哉盛德事琵琶聲停拍聲止一代風流比謝安插簪散髻解朝冠王郞何似吳興守力飮不肯解璽綬王儉爲國子祭酒作解散髻斜插簪嘗謂人日江左風流宰相惟有謝安意以自比齊高帝幸華林園宴集使各効技藝禇彦回琵琶王僧䖍柳世隆彈琹沈文季歌子夜來王敬則脫朝服拍張獨儉無所解誦相如封禪書齊主日此盛德事也齊主受宋禪以謝朏爲侍中不背解璽綬乃用王儉爲之八騶嘆君不見鄧仲華二十佐命人爭誇又不見王僕射弱冠興齊推定䇿君名照耀同扶桑三十官止中書郞前無八騶任搥壁人何轟轟我寂寂絳衫戎服官門來嗟君殊非濟世才濟世才任輕薄驢乎驢乎汝好作如汝人材皆令僕叶中書郎王融自恃人地三十内望爲公輔嘗夜直省中嘆曰爲爾寂寂鄧禹笑人行逢朱雀桁開喧啾不得進槌車壁嘆曰車前無八騶安得稱大丈夫齊武帝疾亟融欲矯詔立竟陵王子良戎服絳衫于中書省閣口斷太孫仗不果遂坐誅融嘗與劉祥同載祥見道旁驢日好爲之如汝人才今皆令僕矣閱武堂閱武堂種楊柳至尊屠肉妃酤酒阿兄來盤馬走阿丈來醉一斗宮中夜遊誰敢毀宰相巳作破靣鬼東昏侯於芳樂苑設店坐而屠肉百姓歌曰閱武堂種楊柳至尊屠肉潘妃酤酒東昏呼潘妃父爲阿丈俞靈韻爲阿兄沈昭畧臨死罵徐孝嗣日廢昏立明古今令典宰相無才致有今日以甌擲其靣日使作破靣鬼合肥捷合肥城邊鼓三下將軍乗輿不跨馬麾幢繖扇沿河堤兵不貴多還貴寡三關關北增高樓將軍閉壘征人愁征人誰知法中法法在用强還用怯百戰孰比將軍功將軍豈數曹景宗原頭射獵師不競行路空歌霍去病韋叡體素羸毎戰未嘗跨馬嘗乗板輿合肥之捷魏人歌之日不畏蕭娘與呂姥但畏合肥有韋虎先是諸將請益兵叡日兵貴用竒豈在衆也梁武帝使叡救馬仙琕叡至安陸増築城二丈餘更開大塹起高樓衆頗訊其怯叡日不然爲將當有怯時曹景宗救義陽頓兵不進但原頭射獵而已談風月南尙書奔競謫詹事官求不獲北尙書選格裁洛陽令爭不廻停年格銓選格羽林夜火尙書宅南尙書北不如宵來風月談軒渠徐勉爲吏部尙書客有因宴求詹事五官者勉正色日今日祗可談風月魏崔亮爲吏部尙書立停年格洛陽令崔琡上書諫不聽先是張瑀立銓選格排抑武人羽林相率焚其宅山中相華陽夢破生紅塵山中宰相作外臣芒鞋尋山芝草竟茯苓屢辱官家命官家手敕來岩陬先生不願金籠頭同時亦有何處士將鬚不得臣老子陶宏景隱居茅山國有大事毎遣使咨訪時號山中宰相梁武帝遣所在給茯苓武帝手敕禮聘不岀唯畫兩牛一著水草間一金籠頭武帝欲拜何點爲侍中點捋帝鬚日乃欲臣老子耶鹿子開建康城頭衆驚走棖棖取人飼天狗朝呼食肉宵呼肝棖棖得人食始歡食始歡殺鹿子龍公不死鹿子死四十八年王氣止梁武帝立長子統爲皇太子時民間謡云鹿子開城門蓋反語爲來子哭也後太子果薨天監十三年都下訛言有棖棖取人肝肺及血以飴天狗百姓大懼房公馬糗盈升草盈把兒童競養房公馬見公之馬還思公連錢蹀􅞃奔兒童兒童粟多果馬腹更瓣名香馬前哭馬前哭因思公君不見房公之馬鮑氏驄房謨爲大寧太守有惠政以不起兵應爾朱世隆爲所執以其馬别給戰士戰敗蜀人得之謂謨遇害莫不悲泣善養之謂爲房公馬鮮卑奴銅㧞打鐵㧞元家歲將末鮮卑奴起渤海東電隱隱兮雷轟轟朱家魏家總非匹一冐空拳一穿鼻賊來百箭殺百人武牢不死眞有神宜訓宮中叩頭列一母三天亦人傑高歡累世北邊習其俗遂同鮮卑魏孝明時洛下以兩拔相撃謡言銅拔打鐵拔元家歲將末武牢之敗親信都督尉興慶謂歡曰王去矣興慶腰邊百箭足殺百人歡妻婁氏生六子洋演湛皆爲帝時謡云一母生三天水東流欲要君四十啟叶欲爭君二千騎東帝不成作西帝征途歔欷悲啼勿啼君心有南北此水無東西水東西猶入海魏東西天命改魏孝武帝惡丞相高歡西依宇文泰歡上帝四十啓帝不省泰率二千騎逆帝中途帝謂侍臣日此水東流而朕西上因流涕泣下帝至關中復與丞相泰有隙飮酒遇酖而殂南飛吉烏鴉耶燕雀耶南飛者利耶轅門中置大鼓將軍紫衣氣如虎彎弓北來射鸚鵡賀㧞勝奔梁三年梁武帝遇之甚厚屢乞師討高歡不果乃求還勝自後毎執弓矢見飛鳥南向者皆不射之以申懷德之意魏時童謡云可憐靑雀子化作鸚鵡子靑雀指孝靜帝鸚鵡指高歡明月謡明月明月相隨不滅昨宵入懐抱今宵委荒草魏孝武帝閨門無禮從妹不嫁者三人皆封公主平原公主明月尤寵帝以之人關爲宇文泰所殺狐非狐天門開焦梨狗子天邊來狐非狐貉非貉吠聲長達河朔靑雀何嗷嗷新巢復舊巢舊巢鸚鵡啄新巢飽犬腹犬乎犬乎爾何酷㑹見金鷄樹頭哭魏孝武時謡云狐非狐貉非貉焦梨狗子嚙㫁索蓋指宇文泰俗謂之黑獺也泰母孕泰時夢抱子升天纔不至而止周初童謡云白楊樹頭金鷄鳴祗有阿舅無外甥葢指隋受周禪之兆金甌缺蕭繹盲老公侯景跛老子中原龍戰四十春乾坤戾氣歸斯人斯人不來國不破誰使金甌向空墮當殺不殺慕紹宗當斷不斷吳老公跛奴之禍禍已酷盲僧釁成還骨肉梁武帝欲納侯景日我國家如金甌無一傷缺脫納景致紛紜奈何後以朱异言卒納之景右足偏短慕容紹宗追景急景謂日景若就擒公復何用乃縱之湘東王繹眇一目初武帝夢盲僧託生王宫遂生繹臣如龍天子勿走馬大將軍嗔大將軍勸陛下酒敢勿聞黄門郞來前且受意癡人勢亦小差未欲進食先揮刀龍耶虎耶亾崇朝亾崇朝反及禍臣如龍北面坐臣如虎尙是可臣如䑕已殺我東魏高澄忌魏靜帝使黄門郞崔季舒伺帝動靜嘗與書日癡人比復何似癡勢小差未澄爲膳奴蘭京所殺高洋欲受魏禪母婁氏日汝父如龍兄如虎尙終身北面汝何人欲行舜禹之事乎寒山石一片石寒山頂餘者誰比蛙黽蛙聲蚓聲猶可識邢家魏家工作賊庾信使北歸人問北方人士何如日惟温子昇寒山一片石堪共語餘若驢鳴犬吠耳邢邵日江南任昉文體木疎魏收非直模擬亦大偷竊收聞之謂人日伊嘗于沈約傳中作賊何敢言我百年冤濟南毅魄死不灰九死上呌天關開精誠入日日忽變白氣夾日如長圍凉風臺前血一斗百年來時繞堦走兒今何罪生王家乞命作奴還俯首深宮半玦留分明兒今已死忍獨生忍獨生還把玦明月不來空斷絶君不見婁家血泪還纏綿濟南悲罷悲百年北齊昭帝廢故主爲濟南王㝷復弑之立子百年爲太子及昭帝疾婁太后視之問濟南所在者三不對太后怒日殺之耶遂不顧而去武成帝立封百年爲樂陵王河淸三年五月白虹圍日再重又赤星見帝欲以百平厭之使召百年百年知不免割帶玦與妃斛律氏别見帝于凉風臺日乞命與阿叔作奴帝不聽卒殺之妃把玦不食月餘亦卒玦猶在手父光自擘之乃開握槊來臣彈箏君進酒君持觴臣爲壽君王沉醉宮生春兒家乃有握槊臣趙郡痛哭宮門首臣爲國家不爲酒珠簾終蔽和士開兗州刺史需君來士開生趙郡死非常作事有龍子北齊和士開以善握槊彈琵琶有寵於武成帝使士開與胡后握槊復得幸於胡后及武成帝殂後主尤委任之趙郡王叡與司空婁定遠立請岀士開外任太后命賜叡巵酒叡正色日臣論國家大事非爲巵酒後主不得已出爲兗州刺史士開載二美女珠簾詣婁定遠願得一辭二宮定遠許之士閒遂與太后及後主謀殺叡瑯琊王儼殺和士開斛律光聞之撫掌日龍子作事固自不凡劉桃枝劉桃枝信力士所爲如此事永安耶鐵籠死平秦耶露車死趙郡耶雀離死大明宮裏呼家家膓肥臘滿悲瑯琊桃枝桃枝技還絶飛向靑天斬明月劉桃枝愼勿過君如鵂鶹見者禍嗚呼爾首何時墮劉桃枝齊天保間力士齊文宣囚永安王浚上黨王渙於鐵籠使桃枝就籠刺浚因自殺渙平秦王歸彦𬒳獲載以露車使桃枝拉殺之桃枝拉殺趙郡上叡于雀離佛院瑯琊王儼將死呼日乞見家家桃枝以䄂掩口殺之周韋孝寛畏斛律光縱謡言日百升飛上天明月照長安光字眀月故言光至凉風臺桃枝自後撲之不仆光反顧日桃枝嘗爲如此事我不負國家齊文宣嘗使桃枝殺高德政桃枝不敢下顯祖怒日爾首卽墮金叵羅爲丞郎郞善盗金叵羅在官帽爲達官官善温胡桃油獻至尊爲三司司善刺黄金丹寛一死爲流囚囚善柔蕪菁子薰兩眸盲人當國亦識古官欲殺弟引慶父盲人當國還傾朝官欲殺舅引薄昭盲人耶竟誰恃外有和老公内有女媧氏北齊著作郞祖珽疎率無行嘗因宴失金叵羅于珽髻上得之武成帝爲長廣王時珽爲胡桃油以獻武成帝將殺珽􅓨日陛下勿殺臣臣爲陛下合金丹因徙光州置地牢中夜以蕪菁于爲燭由是失明胡長仁瑯琊王儼之死皆珽引經成之珽媚後主保母陸令萱謂後主日令萱女媧以後一人而已延年杖延年杖南靣植大司馬前爲進舄太師前爲設席皇帝陛下北面進爵百僚捧匜三公洗勺臣學孫吳不學孔孟羣公雍雍陛下至聖周武帝視太學以太傅于謹爲三老賜以延年杖謹入門帝迎拜謹荅拜太師宇文䕶設席謹升席南面坐大司馬豆盧寧正舄帝立于斧扆之前西面有司進饌帝跪設醬豆祖割謹食畢帝跪受爵以酳謹幼好孫子兵書于經史但畧窺而巳無愁曲日短短苦未足夜遊還秉燭琵琶絃撥無愁曲鬪鷄開府鷹儀同無愁天子歡無窮歡無窮起相和𣏌人莫自憂天墮女媧宮中捧石坐北齊後主好自彈琵琶爲無愁之曲内侍和者百數民間謂之無愁天子有鬭鷄號開府狗馬及鷹皆有儀同郡君之號百升謡淸風園中菜租减盲老公言百升反棗枝十束弓廿張百升反貝何㝷常老公言時老母証官家比來亦大聖天亾明月資秦人中河不事椎層氷吁嗟二妃一皇后敕勒老公知不久北齊後主以鄴淸風園賜穆提婆於是官無菜賖買于人負錢至三十萬斛律光以爲言提婆大怨祖珽以韋孝寛謡言啟後主且續之日肓老公背受大斧饒舌老母不得語盲老公自言老母指陸令萱後主日人心亦大聖我前疑其欲反果然籍光家得棗枝二十束弓廿張先是周人懼齊兵之西度恒以冬月中河椎氷及齊政衰反畏周至冬月氷結齊嘗使人椎之殺一圍撮許賊何能爲官家更勸殺一圍平陽城頭賊鋒挫美人不來城不破嚴兵何紛紛伐鼓何喧喧美人一呼官家奔官家奔亦何往君不見馬上徒膺禕翟榮車前已作降王長周師圍急安吐根日一撮許賊馬上刺取擲汾水中耳後主與馮淑妃獵于天池聞晉陽䧟齊主欲還淑妃請更殺一圍齊人作地道攻平陽城䧟十餘歩將士乗勢欲入後主敕馮淑妃共觀之妃粧點不時至城遂不下先是後主以淑妃爲有功動將立爲左皇后遣使詣晉陽取服御禕翟等至是遇於中途後主按轡爲淑妃着之脚杖痕欲從君君不可從陛下爲不孝孝伯爲不忠欲爲身身不可避堂上有老母地下有武帝天昏昏誰與伸嗟嗟陛下勿捫脚杖痕周宣帝爲太子時有過武帝輙加捶撻及武帝崩捫杖痕大罵日死晩矣宣帝嘗從容問鄭譯日我脚杖痕誰所爲也對日事由烏丸軌宇文孝伯宣帝與孝伯謀殺齊王憲對日陛下爲不孝臣爲不忠尉遲運勸孝伯出外孝伯日今堂上有老母地下有武帝爲臣爲子知欲何之景陽樓樓高高插天表玉樹一聲天下曉宮中天子樂事新一日可敵千萬春齊軍三來周再至不恃人心恃形勢宮女烟花狎客箋送君還上九重天噫吁嘻胭脂井冷何堪辱此間樂復不思蜀一曲吳歌酒千斛陳後主聞隋兵臨江日王氣在此齊兵三度來周兵再度至無不摧敗彼何爲者乎後主入隋嘗耽醉罕有醒時隋文帝問飮酒幾何對日與子弟日飮一石毎預宴文帝恐致傷心爲不奏吳音高凉洗中原龍戰苦不息兵戈變盡狼虎跡帝以倫常付巾幗江南王氣悲銷沉銷沉忠義無一人投袂乃屬夫人城許家善心亦國士陳亾不死隋亾死死時應愧夫人耳陳亾嶺南數郡共奉高凉郡太夫人洗氏爲主號聖母保境拒守隋遣陳叔寳遺夫人書諭以國亾使之歸隋夫人集首領數千人盡日慟哭許善心聘於隋㑹陳亾痛哭三日後以宇文氏篡弑不屈死阿干歌附外域莫聽阿干歌阿干心獨苦棘城西去白蘭山茫茫隔今古阿干爲弟言馬傷君莫怒弟言報阿干連枝本同父阿干歌悲無窮阿干有子還思忠登高山而望遠海慨異國之朝宗阿干歌歌自悼阿干有孫還識孝報讐不得留讐衣縛草作讐兮射讐貌阿干歌歌以風此歌安得流寰中君不見宋湘東與梁湘東河南王吐谷渾慕容廆之庻兄也因二部馬鬬廆使讓之吐谷渾遂度隴而西居於白蘭地方數千里廆追思之爲作阿干之歌河南王吐延雄勇多猜忌爲羗酋姜聽所殺子葉延立痛念父讐常縛草泣射白蘭王阿柴登西强山觀墊江源見水東流慨思朝宗因遣使入貢於宋魚鼈橋高句麗乃是河伯之甥赤烏子精誠貫日日倒戈河伯乃遣魚鼈爲塡河魚耶鼈耶今日濟我犬耶豕耶昔日飼我高麗王嘗得河伯女閉於室内女爲日所照遂有孕生一卵大如五升王棄於野犬豕飼之後破卵得一子名日朱蒙高麗人謀殺朱蒙朱蒙出走遇一大水無梁後追騎甚急朱蒙告水日我是日之子河泊外孫今追兵垂及如何得濟於是魚鼈爲之成橋鬼鼓喧銀刀霍霍波𥻘𥻘江魚見水不見人與魚同居識魚性刺魚要伺魚入定魚一尾直百錢得魚買醉神祠邊深秋鬼鼓何塡塡獠人能卧水厎持刀刺魚百發百中以口嚼食以鼻飲取人面皮籠之于竹及燥號日鬼鼓毎有慶賞卽用之雌雉卜羽肅肅飛來手中伏男王叩頭女王祝欲得粟須剖腹腹中粟如玉今年穀大熟九層樓中仙樂作蘇毗千秋阿脩羅萬福女國在葱嶺南世以女爲王姓蘇毗俗祠阿脩羅神歲初以人祭祭畢入山祝之有一鳥如雌雉來集掌上破其腹視之有米穀則稔瓦礫則凶謂之鳥卜土嘗居尤層樓金羊牀陽春有脚不得走赤帝騎龍作歲首蠻王笑擁金羊牀琉璃珊瑚琥珀光眞珠瓔珞垂兩襠七月七日華筵張腰銀弓手金㦸橐駝飛來能啖客波斯國王坐金羊牀視朝國以六月爲歲首有鳥如橐駝能高飛丈餘食草與肉亦能食人其國嘗以七月七日宴㑹新羅人新羅人新羅人新羅山多水復險終古猶匿秦遺民當是避秦竟深入深入千年作都邑武陵太守空驚傳寧知處處皆桃源桃源中共棲歇他時飮馬長城窟城邊猶認秦時月新羅國其先世本秦亾人避長城役來此馬韓割其東界居之以秦人故名之日秦韓雨爲歲婆羅蠡鼓喧沙堤綠魚千頭迎客飛舟行海中不見海云是鯨鯢腹中水王開北戸迎北人蔗酒旣設椰漿陳椰漿陳且高醉春爲年雨爲歲赤土國在南海中冬夏常温多雨少霽隋使常駿通之旣入海見綠魚羣飛水上又數日至一處水色黄氣腥舟行一日不絶云是大魚糞也其國重北戸北靣毎有南使至則啓北戸迎之以甘蔗作酒亦以椰漿爲酒孔雀羣孔雀孔雀頭珠懸尾翠壓朝飛暮飛與人狎蠻中不識文禽尊呼作家鷄與野鴨毛霏霏羽堪衣尉犁山北不可棲雀乎何不東南飛龜兹國土多孔雀羣飛山谷間人取而食之孳乳如鷄鶩其王家常養千餘隻尉犁山在龜兹國南燉煌西燉煌西白骨撑日月飛不進鬼火欲與天爭靑朝行暮行不見影鬼聲西來落空井魑魅耶魍魎耶叢叢細草生枯骸枯骸欲歌人欲哭燉煌之西且裹足高昌國在燉煌西自燉煌向其國多沙磧茫然無有蹊徑欲往者㝷其人畜骸骨而去路中毎聞歌哭聲行人㝷之多致亾失蓋魑魅魍魎也日出處子夷人不可悉我家乃在扶桑之東見日出日出不識日所歸茫茫渡海㝷光輝㝷光輝光欲竭汝家乃在滄溟之西見日沒日出必有方日入必有鄕願隨東升日東升朝日王倭國人自稱子夷其王以天爲兄日爲弟嘗以夜半治事至日出而息日付諸弟其誕妄如此隋時遣使入貢日日出處天子致書日入處天子無恙擬兩晉南北史樂府卷下終呂子曰樂之有情譬若肌膚形體之性情也情失則蕩音必鉅失則隘音必小失則危音必淸失則煩音必濁太鉅太小太淸太濁則必若震霆若聚蛟若哀弦若噪蜩夫古之爲樂也有節有侈有正有淫陽散則定以陰陰閉則宣以陽陰陽滯則爲滛爲侈陰陽調則爲節爲正其所以爲滛爲侈者情之失也其所以爲節爲正者情之得也夫上古之樂情至而樂興中古之樂樂成而情生是故笙簧琴瑟樂之器也詞章譜曲樂之文也而皆非其情也執笙簧琴瑟之所調詞章譜曲之所著而强襲焉脗合焉以爲是樂也是情也人人皆樂樂幾何不亡耶夫漢魏晉唐之樂府樂之糟粕也當其時之爲之則皆有情焉然其文止以述時事非以敘古人也叙古難於述時則以古人之情未必今人之情以情述情無過情無不及情則古今又未必不相及也何也夫人之形骸肥者瘠者高者矮者髯者疾者肌膚之白者墨者赭者而皆不得以已與也然其爲情也則必隨乎其肥瘠高矮髯疾白墨赭者各自肖而各不相肖故其爲樂也可觀可興可羣可怨其爲詞也可曲可直可豐可廉皆適如乎其情而止夫適如其情而止雖古之樂府可也况今之樂府乎夫今之詞章譜曲無所施於笙簧琴瑟之用而以爲樂府則樂之各有而樂之實亾矣然而吾不以名存實亾而樂府之者何也夫必漢魏之人之樂府有是題有是篇而今之人之樂府亦因以有是題有是篇是無情也是無樂也若古無是樂而今樂之則不必笙簧琴瑟而詞章譜曲固可以如其情而出之譬如優孟衣冠以爲樂也吾不謂然陶氏之琴無弦乃眞琴聲也夫今之樂府鉄崖始之茶陵繼之悔菴又繼之稚存洪子曰吾之爲樂府也祖此矣昨歲喜晤洪子且喜讀洪子之樂府將以吾之所以論樂府者質之而未有以間也今洪子梓其樂府乞余之序之余固何以序之錄其將以告洪子者以寄洪子以爲然否耶夫淸廟之瑟朱弦而疏越一唱而三嘆者有進乎音者矣洪子年少力學而性情自得將不徒乎樂之有節無侈有正無淫已也異日者且與洪子相遇於無言也峕乾隆歲次辛卯夏月松崖學弟管幹珍拜䟦余童時從黄石緘先生遊先生素䆳史學平居爲說典午南北之際事極詳余聽之靡靡忘倦毎日夕自塾中歸粗憶其節畧爲諸姊弟言之太夫人顧而色喜忽忽十數載余童而冠而先生則已休神家衖矣頃歲以來粗知讀史又以不獲從先生遊得悉其緒論爲恨今秋文戰報罷因取兩晉南北史事雜書之爲擬古樂府百二十首非敢計工拙亦以誌童時結習未盡而所聞于先生者雖忘失殆半輙棖觸于燈昏雨黑時也抑余聞先生言西涯西堂皆以樂府名家然西涯上下千百年而篇什較少西堂則珊瑚木難與牛溲馬勃竝列有陸平原才多之嘆則先生雖伏􅈾二公之樂府而尙不能無遺議也因先生言益増今日之愧乾隆三十五年長至後二日稚存洪禮吉自序䟦南北史樂府後屠紳譔小年欲㝱堪逞志者墨兵大雅相歡乍移情兮樂部擅三長而搦管原四始以審音聲與政通辭縁情綺論許毎稱爲史咏史那得廢詩振古如斯當今無輩耳洪君對巖才不患多書能求間以譚天之口成擲地之聲謂夫兩介山河六朝金粉天醉投壼之酒感此茫茫人迷夾岸之花憐其擾擾龍爭入好竒之局鵲起高鬥靡之文試將翠管塡詞難盡摸魚戀蜨若命紅牙按曲何妨換羽移宮爰變新聲獨彈古調事或未經人道言無不獲我心晉啓化龍陳亡擒虎三百年王氣將終甥承冒頓舅代宇文十六國人情可見易淫哇而高如白雪裁穢史則穆若淸風葢筆有鹿盧胸無芥蔕矣若夫呼豨飮馬陳陳已苦於相因鹽州石壕戞戞更難其獨造何似取千秋金鑑爲兩部鼓吹登傀儡干塲中追魂而攝魄寄陽秋于皮裏怵目以劌心縣門且不易千金畫壁豈徒驚一絶此日博聞强識官可秘書異時按部就班郞宜協律走也不知許事欲喚奈何樂認鈞天編疑艶異彼羌無故實等閒當賸馥􅋊膏苟别有㑹心遮莫付銅喉鐵板附鮚軒詩目録卷一機聲鐙影集古今體詩一百一首卷二采石敬亭集古今體詩八十七首卷三黄山白嶽集古今體詩五十三首卷四長淮清潁集古今體詩四十一首卷五桐廬林屋集古今體詩五十九首卷六鍾阜蜀岡集古今體詩八十五首卷七茅峰攝山集古今體詩八十二首卷八天台雁蕩集古今體詩六十一首擬兩晉南北史樂府目錄卷上陽湖洪禮吉稚存譔屠紳笏巖管幹珍松崖錢維喬竹初趙懷玉味辛馬同槽廣武嘆蘇門嘯社稷勲作佳傳别駕謡峴山碑飛渡江銅駝嘆淸談誤雉短短金谷䜟中台坼華亭鶴除三害思子臺寧馨兒侍中血龍虎爭十三月赤白氣特尙可壯士歌留降欵中興瑞夜半舞王與馬新亭淚呼伯仁拜士行踐海冰義旗指獻行璽一目主識英物日書空海西公鬼董狐東山卧牛心炙阿房城長星見負畚來行路難丁零王新平寺五經表借鬼兵續佛經槐樹賦虎臺謀沭謙刺彗星岀義羲號桃源記擬兩晉南北史樂府目錄卷上終擬兩晉南北史樂府目錄卷下陽湖洪禮吉稚存譔屠紳笏巖管幹珍松崖錢維喬竹初黃景仁仲則一尺劍味卿言金昌亭東山屐檀江州春月畋封狼胥佛貍䜟宜速㫁見要人竹林堂違導㫖領軍腹石頭城天王家移吾牀易犬子郞君書解散髻八騶嘆閱武堂合肥捷談風月山中相鹿子開房公馬鮮卑奴水東流南飛吉明月謡狐非狐金甌缺臣如龍寒山石百年冤握槊來劉桃枝金叵羅延年杖無愁曲百升謡殺一圍脚杖痕景陽樓高凉洗阿干歌附外域魚鼈橋鬼鼓喧雌雉卜金羊牀新羅人雨爲歲孔雀群燉煌西日岀處擬兩晉南北史樂府目錄卷下終
