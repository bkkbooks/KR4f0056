  text: 卷施閣詩卷第十三
  hash: sha256:5b0261bc1719df102352b83ddb080879121206f449cddc009ff32c7706d3818e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_013-1a}
body:
  text: 陽湖洪亮吉著黔中持節集癸丑人日登東山遇雪復㩦客至黔靈山久憇别來方十日春色滿山村樹矯將穿牖峯奇欲宇門半城新綠影齊上振衣岡露濕棲鴉徑春濃選佛埸我愧非安石山眞似白門乍披天半牖同醉雪中樽松陰委曲廊杏樹攅高閣城中客始來原上花先落積雨厨烟重穿雲澗水溫馬頭山鵲噪牛角野禽蹲樹侵官道窄山壓女墻低馬逐雲頭上人隨雨脚西三層樓上雪百尺樹頭花白欲迷天影紅疑迓歲華廊長縱獨行龕小容危坐天上有人聲山樵墮松顆小亭三面影清磬四時聲樹暗蔵西嶺窗明瞰北城半窗初積霰一枕昨聞雷時連夕雷鳴臘意屏前散春容鏡裏開新正初一日發筆誰向黔陽記歲時殘年氣候較參差夢回昨夜燈猶永春入空園柳巳知小病乍將人事減薄寒聊遣酒杯支驚雷爆竹都成陣門外三更雨若絲初春憶里中諸同人萬山深處住忽憶海邊春不特花香好兼思花下人花枝𪷟𪷟柳條長花裏高樓日堪上危橋東轉多坡陀一水出城名蠡河河流至此剛三折亭號艤舟人亦歇左家兄弟工煑茶閑訪屋北踈梅花錢郞多愁趙生矯痩董超然癯崔瘦生兄弟鄕語好毘耶室冷晝不扃塔影七級看亭亭圍罏聚久清談足小卧還繙蔵經讀蒙莊興逸不可當來及曙色歸斜陽一童㩦錢毎先走爛醉城東市嬌酒此時十輩五客燕兩客復住荆江邊我頃南行路七千遠道誰拍洪厓肩山形盤回水迢遞夢裏還家亦非易作詩火急欲寄回屈指到日榴花開貴陽元夕燈詞花墅連宵爆竹催惹他桃杏一齊開惟餘徑草難全綠却値山南絲雨來西南郭外盡平疇節使筵開百尺樓燈火似山人似海忽驚天半一回頭廿家門巷一樓燈火樹銀花夾數層只有笛聲淒怨甚四更還待月華升金鎖橋西送客回趁人叢處廣埸開蘆笙吹徹秧歌起逐隊花苗跳月來一旬强半雨連綿不信黔南是漏天騎馬出門思鏡聽沿街却喜說豐年亷訪齋南笑語譁姜亷使開陽工射每集同官角勝負當筵絶技使人誇射棚一盞銀燈上墻外驚傳鼓子花花枝不異故園春短巷長廊記却眞倚徧石䦨干畔月就中只少走橋人簫鼓初停坐客稀魯巖節使以予不觀劇爲擇日另設一筵半酣筵上換春衣七千里隔津門路却有黃魚入饌肥古墻陰碧燭花紅待月樓高影數重一簇銀燈山半墮乍看眞訝下天龍踈楊成幄水如烟錯認江南二月天星月未來樓閣暝萬枝燈裏漾秋千淸鎭道中春陰一堆紅百堆山翠缺處桃花開冥𪷟綠意石根迸春筍昨夕聞驚雷行人衣上泥猶濕高樹塘邊漾晴色山泉日午開鏡光菜甲花滿疑斜陽過龍井塘上坡李花如含顰桃花巳迎笑藍輿再轉復一岡天外奇峯鬥清峭春塘北折凡幾家飛葢過樹驚棲鴉回厓陰陰蝶飛滿春在海棠㴱處暖春分日扺安平行館作清削峯巒得未曾峭厓馬上却肩承山泉圍郭綠三里村樹接天紅一層遠道書來春正半小樓人去月初升商量欲待尋巢燕齊捲踈簾喚上燈沙作塘西上陡坡連聲爆竹鵲驚回正好山南雨欲來只有桃花解迎客趁人叢裏一枝開人家多住石塘西石屋參差望欲齊空裏鵓鴣聲轉急山雞飛上故巢啼中火塘西入山東厓及西厓深巷密無縫厓窮山寺宇補此密林空行人下岡脊騎劣急施鞚石罅三百家隨波綠疑動冥𪷟遠天外飛鳥忽相送宿雨時一零檐間杏花重却葢一層雲山房尚春夢寒食出安順府西門校射閉門甫經旬芳草巳如積黃花瀰平疇春露曉逾白青山迎道左濕翠馬頭滴闢圃三里餘朝晴試騎射隄旌紅閉野岸柳綠窺隙山鵲閃畫弓林烏占門㦸于焉心寄賞觀者足若植慙無養生技敢論扶風德聊記在蠻方西郊度寒食三十日逰金鐘山百盤升作嶺一石削成臺山筍高逾屋天風響若雷澹紅雙徑羃新綠一窗開正好容危坐齋鐘莫屢催武當山久憇道人侵曉初唘關一城花光浮上山䦨干影外春陰膩香氣依微塞空際交鳴鶯燕殊有情三里路中飛不停深紅淺白看難足葉底參差間新綠看山百回眼轉青山殿開處祠元冥殿旁一徑天風墮我借蒲團向風坐此行訪客擬夕陽一騎忽復來山房傍花南行衣袂濕花裏先聞響鳴鏑是日彭軍門廷棟約射鼓子初一日出南門至華嚴洞持燭入三里許百折山巳深遵巖復千轉山扃深萬仞欲徃怯途遠洞門蠟炬擲兩頭直下無底光難留奮身一擲若飛鳥回視偏驚洞門小土花𪷟𪷟綠滿衣巨石碍路如雙扉牽衣屈曲入扉罅飛瀑偏從兩肩下危厓覆釡下轉空大聲如鐘疑蟄龍孤笻欲拄不得拄地㡳陡復衝天風厓窮路斷天愁晩半寸燭中人復返高低三里路蜿蜒出履平地同登天當時誰把華嚴說巳覺豐干太饒舌我欲磨厓易舊名讀書山畔藏書穴華嚴洞外山甚秀折而無名縣人趙氏聚族居焉余歲試安順趙氏子弟獲隽者文武各二人因以讀書名其山從土人所請也城南十里路回環百折烟嵐水一灣却喜青衫迎馬首華嚴洞口讀書山是日値諸生釋菜回初六日發安順作昨旬騎馬入行臺草脚踈青尚未回今日藍輿向西去海棠花放蜀葵開韶光欲老愁梁燕碧月初圓照酒杯莫更匆匆感時序山榴紅綻客仍來上巳日自鎭寧扺安莊道中銀塘北去山如鎖正好一村新綠裹沿林乳鵲飛刺天掠得餘花落千朶藍輿小睡轉數岡夢裏時觸幽蘭香山危巳換長繩挈一半花苗帶花出林㴱綠暗路欲迷却喜穿樹如鴉飛今年上巳風差緊分水橋邊鑒春影過橋南北分兩堤樵徑北去行人西柳絲𪷟𪷟挽客衣去路開徧黃荼蘼白水河我尋白水源澗削流殊細西經白虹橋河聲始如沸前行十里響不停巨石欲裂穿驚霆河流至此經千曲激得飛濤欲升屋回頭屋後山俱破却讓河流隙中過非烟非霧鬱不開此景豈是人間來忽驚一白垂無際高欲切天低蓋地泉聲落處搆一亭水色正壓羣山青離潭一尺波如斛襯出空潭影逾綠蠻方三月景不妍賴此兩兩懸珠簾轉愁萬古簾難捲隔得仙源愈㴱遠潭側有水簾洞爲昔人避兵之所潭旁一枝花較紅照影只在空潭中四圍山色高如岸祇覺白雲顔色暗眼中神物誰得看潭中相傳有犀牛伏此㑹待月午波心寒行客去不停孤吟我偏久泉飛兩派君知否分送行人出山走亭側有二道往雲南及南籠府者于此分鷄公嶺險絶鷄公嶺枝蟠百斛蛇嶺背有古藤粗幾百斛上樓天欲墮攀樹日初斜怪石團孤寺蠻烟簇幾家下山途更窄警客有棲鴉關索嶺山南路飛鳥亦不知排空翠巘逼天住乃識細路懸如絲前行問路頻相失時入穴中時出穴東西向背杳莫分幸向林梢辨斜日兩山中間夾一橋細水畢集聲如簫過橋三折万遵嶺忽訝危橋若㴱井前行籧篨後戚施時俯時仰愁難支征衣匆匆棘心挽攫客復有青松枝居然一廟藏山半上視山巔尙霄漢停輿聊復酌山泉以手讀碑疲復換後先濟美誰所云嶺上有關索廟相傳祀蜀漢前將軍子當日或隸征南軍神扉開處山僧迓我敬英靈且先拜虛亭留客聽晩鐘炊火遠雜山花紅出門撲面風尤大幸有扶人竹千箇君不見來途一綫雲初破天上驚看馬頭墮永寧道中一馬行天半雙旌逼嶺頭澗光黃奪月山勢黑吞州蟻穴開平郭猨梯直戌樓人家止三兩相對雨中愁哈馬塘哈馬塘邊路肩輿趁午晴山如重甗合人亦左擔行竹密都題字花杳不識名前旌且囬緩留酌野泉清扺盤江過鐵索橋久憇復下坡至涼水營午飯盤江水流千里三月江水清泠泠望無底岸東安順西南籠天半一橋飄若虹空中疋練交如織知費當時幾州鐵高低兩層鋪板平人行半空馬不驚登樓試面晴江色陡下驚看一千尺四圍山勢若削成樹亦直上無縱橫危厓盡處僧房鎖三月榴花巳如火䦨干影裏望行人一半分趨石厓左蠻中節物何太忙百卉開落誰平章賞心豈獨無儔侣鶯燕南來亦蠻語出門石罅路不分鳥道十里鋪黃雲涼塘三百家忽覺春如海我食盤江魚還憶盤江水普安道中作書寄南中諸友别來春色巳成團一種花枝隔水看榴火樹中風驟暖芭蕉聲裏雨仍寒蠻方不定陰晴景瘴嶺先慵旦晚餐南籠一府處貴州極南微有瘴氣客此者宜節飲食居處是以云便欲寄書無别語七千里外客平安新城行館卽事繞廊不厭百回行客巳離軒酒尚傾銀燭一條花兩樹伴人清夢到三更䦨干都復綴青苔鋪地松陰綠不開半捲竹簾貪看月鵓鴣啼雨枕邊來南籠苦旱余扺郡二日卽得驟雨然麥苗未暢發也十三夜甫就枕卽聞雷聲自南來雨急如注徹曉不止喜而有作卽柬張太守鳳枝經旬誰說使車閒憂旱心情未解顔乍覺清涼思擁被忽驚雷雨欲移山沿堤松栢争飛瀑合隊烏鴉猛叩關却趁電光升閣望巳聞歡喜到苗蠻荅張太守鳳枝見贈之作領郡天南復幾春退衙仍是苦唫身苗蠻繞郭風偏悍孔李通家誼最親千樹影中圓月上萬山深處一官貧閑情譜到雙紅豆莫哂呉儂白髪新太守有紅豆詞二闋極工南籠府東郊試射士作盤馬場西綠欲勻紅旗獵獵起纎塵貪看一角春山翠忘却當前角伎人一條馳道倚晴空破曉先聞響角弓正是柳塘風急處亂花隨馬入雲中南籠道中夜行藍輿三折面方塘雨後溪光著意涼行到石橋剛夜半野花殘月鬬深黃羊埸塘西見海棠三月風光疑有恨十分顔色巳無香林昏露薄誰人看留得松陰護曲廊發新城道中値雨别來春色巳陰陰収拾高低徧野金來時菜花極盛一晌東風豈無意雨絲都灑百花心三望坡騎馬厯黒土坡老鴉關諸隘三望坡前綠欲迷一鞭高與白雲齊多因馬上人回首惹得春禽逐馬蹄楊柳三層接綠苔春陰如海浸樓臺山凹一騎穿花出錯認雲㠶天半來度老鴉關絶險疑無路回頭雨復來正愁疲馬惑却値嶺雲開細草黒如霧野泉聲若雷輿前長官拜何處與徘徊安南令張君世昌迓至此過保甸塘至盤江道中隔江途若綫正對行人面更轉百坡陀江流尚難見春盡日發新鋪至永寧州道中到曉風難定山雲欲亂飛上樓初破夢過嶺復霑衣石澗草蟲響藥欄花事非去程三十里如夢雨霏微道中作家書戲占一律過得鷄公嶺蠻風說亦愁春田喧蟋蟀晴木囀鵂鶹雷雨輒排戸牛羊分占樓居人怕飛瀑竹屋製成舟自永寧州署發至北口塘値雨百折途如綆千林晝若昏嶺藏初祖塔苗别仲家屯竹瘦欲穿石雲奇竟塞門隨車謡巳愧偶値雨翻盆連日至安南永寧皆得雨土人有隨車之謡觀音洞仄徑西來日欲曛洞門流水綠沄沄擡頭忽覺峯奇峭錯認天空數朶雲半厓音響若聞鐘石罅纔開蘚復封誰識洞中仍有洞小橋流水一株松自界首塘至駱家橋道中南岡北阜自分條如雨谿光路轉遥欲引行人向東去柳花攔定駱家橋乾溝道中書所見新綠塡街馬過遲幾家竹屋枕陂池鴨欄明浄鵲巢整却有野棠開一枝初六日渡鴨池河至四方井道中作隔窗催客鳥何勤涼甚先將濁酒醺才欲出門衣袂濕馬頭猶罨昨霄雲江干清曉泛浮槎隔岸山隅路幾叉行入白雲紅萬點半空都放石榴花將至黔西柬州守張同年曾垿一首憶昨相逢渭水邊忠宣門下說齊年同官萬里君尤遠曾宰三峯吏是仙到處溪山疑綠野予曽兩詣桐城並至相國園林别來京國望紅箋時郎君計偕北上衙齋借榻心殊慰爲我先開卜夜筵四方井至黔西州道次危途旣稍夷平壤拓十里溪聲流四面山亦伏不起良田富林麓百鳥展然喜固知巢危厓心亦匪得巳溪田新雨後波活掉魚尾裊裊青竹竿抽捎入雲裏途長怯晴日迂道走坡㡳一頃荷花風炎蒸忽如洗十九日至大定城西坡上校射歸塗復詣斗母閣看飛瀑射場距五里清曉聞吹笳初日旗幟翻鳴鉦出官衙拂露過北郊先驚樹頭鴉藝士植若墻臺高建崇牙下馬入鎖㕔山青四周遮臺杪射的紅高低奪明霞一水出道旁來源抑何賖墻缺竹樹交路若之字斜直下百尺餘依微有人家雲氣復四飛驚風走汀沙回路改郭西山田夾鳴蛙飛瀑空際來濕此半嶺花客倦欲暫停禪扉試煎茶路穿巖萬仞峯何峻巖腰豁一扉遠從波影入巳有日光飛攀徑野花綠排空石笋肥谷鶯偷覻客時復閃紅旗烏西塘清晨馬上來薄草烏西宿烏西人巳知巖頭注雙燭黔西州署西偏有海棠一株大䕃半畝惜花時巳過同年張君約科試時再過此相賞因作此以贈之海棠籠半畝辜負此花時車馬何因暇闌干有所思碧窗懸舊句紅藥剩殘枝不是張公子誰能訂後期張同年邀逰東山寺山厨連日綺筵開邀客東峯角伎回是日約同人在山棚角射我比謝公心更泠屏除絲竹始能來石峭潭空夜氣生少焉亭上燭縱橫酒䦨倘復待殘月北斗欲斜山四更將至爛泥溝上嶺四山飛瀑合鳥亦誤西東乍劈林梢綠遥分寺角紅幾家波影外終日雨聲中絶險藍輿折尤防撲面風革撥塘遇急雨百道飛泉合魚龍欲上天戍樓何處在野水忽無邊徑仄花迷眼厓傾棘刺肩夜程猶十里愁絶馬難前夜黒行三重堆汎南諸山中卅里羊膓路高低夜色浮虎風腥撲面榴火艶擡頭雨急三層磴雲迷百尺樓林梢一聲磬隱隱出平疇贈周刺史景益卅年家住蠡河灣只隔衡門不徃還清切早聞登上第沈淪我亦厠朝班閒情偶欲消餘晷君善度曲遠宦同應歴萬山何日對床鄕夢好白雲流水自潺潺渡渭河橋渭河北去路尤稀急溜橫衝石徑微二十二條衣帶水劈空争欲上山飛楊柳塘道中雨絲初斷日光微十里亭前試裌衣剛被軟香吹破夢滿山黃徧野薔薇白蠟坎道中忽覺身無據藍輿下半空冥𪷟萬重綠中隱夕陽紅客醉連宵雨花殘昨夜風誰言播州惡土脉較疎通鴨溪道中水田千百級中有石泉青一道復孤下四山相與冥過溪晴乍永隔岸雨猶零最是椒花好時時破夢馨五月五日遵義試院憶里中􅔡渡之勝十首卽寄錢三維喬趙大褱玉溪流一曲巷雙條燈影三層接畫橋我亦趙家樓上客七千里外憶今朝新闢柴門遠市􅒡病餘讀畫復逃禪謂錢三多因暇日添逰興偷上呉孃鴨嘴船内河昨日雨蕭騷溪水平添綠半篙惹得龍舟銜尾去十番船泊北城壕簫鼓聲聲壓畫檐整衣多半出褰簾橛頭艇子如飛去就近還趨八字尖河干扶醉却歸來聽雨樓窗半面開偏是謝孃諳食性枕函堆徧紫楊梅兒童撲手說端陽杏子輕紅梅子黃乞與一瓶桑落酒醉眠仍入少年場三元閣上久裵徊天氣陰晴乍熟梅畫舫塞河人塞岸忽驚雷雨打頭來雲谿谿北接官衙添得紅闌眼乍遮好是一河燈影白橋東錯認月西斜連日河頭畫舫開無端鄰嫗亦追陪溪南一樹石榴盡都到美人頭上來艾葉紛披蒲葉長盈觴酒綠泛芸黃蕭王里畔鄕風好幾日門前角黍香遵義試院花紅結作屏山綠圍成障引領望山城山城在天上遵義校射場在城外六七里因就近假副將署射圃校士三面青山繞角場僅餘一面入斜陽沿林石細馬堤脆帶得落花來射堂三里周垣百尺臺斷碑如㦸翳莓苔多應曾作老蛟宅夜半石厓喧怒雷署本明楊應龍舊宅回龍洞過橋凡五折巳到遠公廬徑削才容馬溪喧欲土魚曉烟揺竹栢初日定村墟莫訪乖龍洞泉靈脉久淤桃源洞名區馬到亦徘徊竹葉迎人鳥語催巳覺溪山隔城市絶無鷄犬有樓臺前塵事向殘碑讀洞土人相傳爲李太白聽鶯處絶壁花争五色開依舊澗聲流不住錯疑重到武陵來渡烏江出山殊有戀山心飛漿迎人過浦陰百折水紋千折嶺急流時見點波禽江流中劈四山開雨後江聲怒若雷萬朶白雲空際落錯疑潮自海門來馮巡撫光熊招飮卽席賦贈二首是日馮初度早識雲間大小馮時令子開州牧克鞏亦隨侍在署蠻方何幸服官同欣看裙屐筵初唘難得民苗歲屢豐橐筆卅年呼内相公久値機廷趨朝四日領司空自山西巡撫入覲持㫖署工部侍郞四日卽有黔撫之命到來倘覔稱觴地却有東山若待公咫只衙齋遞徃還識公心跡幾曾閒五年官巳移三嶽公自山東布政司調直隸旋擢湖南巡撫又謂山西八月恩先洽百蠻涖貴州任甫八月又調撫雲南秋半風雲迎使節樓高烟雨夢鄉關移家我合稱同里只隔明湖水一灣使院後墻俯臨縣倉有荷池十頃癸丑二月將按試上游命工築三層臺于墻内五月杪歸池荷正花臺適告竣因分日讌客于上同里楊上舍浦爲繪千葉蓮臺雅集長卷同人各繋以詩余亦率成此篇云爾北人喜看山南人喜看水我雖南人居北久有水有山方不悔胷中先有萬仭山山外流水聲潺潺欲從山斷水流處更種疎花築廬住拜官昨歲來筑中所見宛與胷中同不特有山有水有高閣且喜山綠繞閣閣外十頃荷花紅爲補竹百竿爲築臺三層倉厫百舍比如櫛静裏巳落書窗燈花枝紅水流碧雲氣時黃亦時白有時天黒雨欲來却好一窗収五色宴客旣有藕藕㡳復有魚池蓮可劈桃可食酒盞借此青芙蕖簾垂百尺樓千丈讌客眞疑在天上窗櫺八角燈影聨一城居民望若仙樓高高觴滿滿豐歲莫敎行樂緩黔中有山皆可田雨足便巳成豐年新秋昨夜涼風起樓閣都歸雨聲裏君不見紅荷花開亦無幾接得稻花香十里七月五日曉出南門三里至南嶽山下射圃校士回塗小憇野人籬落偶成數月不一出禾麻巳盈疇炎暑曾幾時節序慨巳秋離離瓜田花黃朶露未収日出鷄尙鳴沿灘飲羣牛射圃向北開南折路苦修旗門揭峯前東西兩高樓迤左百尺墻觀者積上頭山鵲噪不停矢向巢上流馳道滃白雲馬行亦遲留回途改西南偶作物外逰園扉映方塘竹筍秋尚抽防驚幽人眠花裏停鳴騶七夕四首示女紡孫一歲十二回回回拜新月何事禮雙星一年惟一夕牛女緣何摯天人路本殊何須借靈鵲月裏有蟾蜍挈得書千卷樓頭曝不停分將小兒女樓下拜雙星銀漢間紅墻迢迢理七襄天孫如果巧何事不成章十六日姜亷使開陽招同馮巡撫光熊萬方伯寧呉超尼堪什張繼辛三觀察曁徐太守日紀聽綠軒賞荷卽席爲賦采蓮詞十二首并邀諸君同作牂柯秋到雨如麻盻得新晴露巳華我自看紅君聽綠一月前余曾邀同人集紅香舘賞荷參差一月賞名花曉日華筵水上開瑣㕔千尺接層臺笙歌小部雍容甚都雜兒童竹馬來門前赤棒肯攔遮齊放逰人入使衙恠底鷺絲無立處壓波人影黒于鴉鳴騶來處甫侵晨午榻橫排任欠伸各占一亭陳百戲却忘賓主是何人束素腰纎點屐高是日令諸歌童結束作采蓮女子花非勺藥卽櫻桃旁人錯認紅粧好十五吳姬刺錦篙偶然撃楫趁波平也學津船打鼓行消受小年無個事一花開處一飛觥繚垣日午轉驕陽一例都將小繖張知有美人空處立好雲低爲䕶明璫水心亭北接危城亭左先聞按玉笙且覔柳陰深處坐暫停雜伎奏新聲無端燈影欲迷星高拄檐牙下繞汀空裏忽驚添异采晩霞黃入電光青百重擔子憇墻陰小合高擎唱點心一樣酒帘花外颭亂吹羌笛搊胡琴薄暝遥看打漿迎紫微花點照波明若非萬里橋橫岸軒側有萬里橋尚認呉頭楚尾行卄年前乏此花枝貴州近年始有荷花小艇何由泛曲池此日黔陽似江左當筵爲譜采蓮詞十七日徐太守曰紀偕安順遵義思南石阡黎平銅仁六太守威寧麻哈開州普安四刺史松桃丹江兩司馬貴筑遵義及候補諸大令復邀集聽綠軒賞荷是日馮巡撫萬方伯以事未至卽席戲柬諸君子笙歌隊裏許閑行月黒簾櫳水自明鸚武亦知逰客意此來看雨昨看晴夜涼移席屋西頭燭䟦都同笑語流怪㡳諸君興偏逸座中有蟹少監州是日始食蟹鄭州倅錕自永豐寄近作百篇乞爲點定因率成長句題後并寄張太守鳳枝我從黔靈山望子萬峯㡳知君升黨嶺夢遠亦千里山能隔面不隔心一月不斷瑶華音官閒一室開常早虎跡訝多人跡少使君句好誰能謳高吟祇凴石點頭怪來詩札霉如許道遠聞經普安雨我時宴客開華堂發函先擲馮侍郞侍郞讀詩笑語我屈宋衙官何不可東南賓從萃一時更拓北牖哦君詩八行莫訝詩牋皺入坐荷香可同嗅三更客去益朗吟涼月正墮層波心倦來復憶南荒守索米還家得之否書成燭䟦贅一言蠻府參軍我詩友時太守欲假百金歸爲兩親壽聞尚未得馮巡撫旣作外臺讌集詩及見余采蓮詞十二章卽日復依韵見答其用韵之妙不減皮陸爰作此志謝傳牋飛騎一何忙射虎將軍善挽强不特事功吾拜倒辦香直欲到文章新秋回憶早春時頻把餘閒付酒卮燈影兩層花幾朶博公二十五篇詩公元夕燈詞及兩次賞荷詩共二十五首呉司馬玉墀洗硯圖瓶花齋中書有目不減鮑家知不足摉羅各本元宋明天一閣中無此精東万􅞀萬言南閣九千字盤盤嗜古三十年歲宴不知門外事忽然四十作慢郞騎馬遠復來炎荒牙籖錦軸誰寄將書少乃珍硯一方蠻陬豈獨無書假硯亦止凴縑素寫君未㩦硯來所見止有圖耳一世難耕嘅石田半生卒業思蒼雅可憐有硯不鈔書僅寫年來主客圖開緘忽欲念良友讀畫巳覺忘朝餔因君我憶卷施谷千本異書碑百束他時兩客各歸田硯北還從借書讀十四夜坐月初三逮十四月止晴一宵差喜魄巳圓淸光徹層霄鄰東歌吹聲舍北亦呌號豐歲庶有期中坐喧酒豪而我亦甚閒銜杯飮陶陶一酌天宇開再酌雲氣消悠然到三酌月采如鮫綃兒女集我前􅔡索梨與桃礎潤旣巳収房㢃步周遭幸此徹夜光歡喜到汝曹他時返江南水郭景倍饒結伴或采蔆沿堤泛輕橈比舍㩦密親相將走谿橋此景汝勿忘興至我欲謡紅燭忽斂輝開簾巳崇朝寫管下名山圖八幅寄富尚書綱古人祝長年類取象岡阜我今頌尚書亦以山爲壽尚書八州督惠澤及民久前時持節處閩海及陜右仁風所丕播地力實雄厚毎于奇絶處皆得未曾有中南從東趨太白向西走武夷清暎海崋岳秀參斗尚書前按部一一迎馬首飄然來萬里清夢憶之否雲奇嶺復奇倏又落吾手碧阜出我前蒼山峙其後烟嵐日千變各各入窗牖春秋多勝日時復挈賓友咸云享清福得此葢非偶慙余課士暇秃筆有如帚翩然圖名山不敢雜培塿圖成寄尚書應復開笑口倘有飛仙人同來獻春酒過隴首關排空傑閣勢迢迢百折才能及嶺腰只向密林深處轉怕凴風力上層霄新安塘道中橘柚叢中半里遥秋雲如畫束林腰溪南欲訪閒親串趁曉先支獨木橋村村都喜說豐年板屋斜開䆉椏邊飽飯芋魁無個事盡収雞犬上樓眠廿二夜看殘月團欒時節雨辛酸待得如鉤轉耐看那識幽人有深意五更樓閣坐高寒谷子塘人行谷子塘林木始回互野花生東西葉葉悉垂露肩輿欲東轉黃犢忽攔路斾影拂曙鴉驚飛四穿樹初陽開谷口樓閣恍無數知有山僧居泠泠曉鐘度九日偕署中同人至城南福泉山高眞觀登高鄭大令五典設筵于此相待卽席賦贈纔經寒露辰巳値題餻節騎馬上城時暉暉半樓日臙脂花紅菜甲黃夾道半里來山房主人開筵樂未央琥珀作盞茱萸觴幽禽語琳琅淸磬聲疎越騎馬下城時輝輝半樓月仙人樓閣涼意生隔嶺遞響山泉聲爨光如霞出山頂却厭萬家燈火影九月十一日發平越至葛公橋作平明天氣晴送者逾五里言尋葛公橋乃復居釜㡳泠泠江一綫絶壁插江汜嶺樹鬱百重淩晨露如洗危亭峙林表初日出亭裏花朶映日紅晨扉竹中唘鄰舂杵相答童叟色俱喜白屋飯巳香幽人睡難起清平道中四山茶花香黃白均可愛花苗聨袂出時折一枝戴秋葵盈半畝野蓼色如醉危塗穿竹徑竹密出岡背險絶天半程疲蹤屢思退前旌久延佇半晌甫及隊行及羅仲塘山雲轉深晦藍嶠至草塘關道中藍嶠及草塘十里壁如削𪷟𪷟棘生刺左右難著腳回崖野花艷谷口日西灼石窽嘘北風鷹驚馬頭掠人禽争一竇撲面險欲著東西缺盈丈道險藉畧彴樹杪俯石樓窗櫺望依約驚沙莽成陣馬走前復却半道聞語聲長鑱劚山藥過偏橋西三里上一陡坡石黒雨亦黒行人向何處巉巖當面出欲徃決無路蹊斜非意想時隱復時露石罅逗一門奇花忽無數高低盤百級樹杪作回互摚客西北風洶洶有如怒頻于奇絶處欲把生命置老樹猛攫人踉蹌敢回顧危疑行半日深險巳畢度出谷路轉平欣然下徒步翁頭塘道中半嶺􅡜雲積不開空山秋盡恍聞雷怪他百道山泉合却詫藍輿飛渡來翁頭塘北路尤賖屋脊橫看一徑斜誰向閑門訪秋色夫容開徧野人家自平貫塘至白巖汎道中午餘都枕白雲眠兩兩飛泉出竈邊肯向淮南乞靈藥本來雞犬只居天馬頭濃綠間㴱紅半日全行複嶂中百轉千回抱村塢江南無此好屏風𪷟𪷟絲雨日千回夕照光中霧半開怪㡳樹頭山鵲噪却驚天上筍輿來秋來風味足山家深淺園林百種花先有入樓紅杮子飽嘗聊可當谿茶石阡城南溫泉石罅空𪷟逗燭光訪泉亭上拂衣忙半生莫訝塵勞甚巳試人間第七湯予所試溫泉直隸則盤山陜西則臨潼盩厔江南則黃山硃砂泉及和州句容與此而七矣白石渾疑築釣磯流從壁隙漾依微形神釋後却危坐蝙蝠嚇人頭上飛自塘頭舟行至思南府城外青山至塘頭南北忽中斷驚流適有幾葉舟一半舟行半登岸帆影欲入地馬嘶驚上天高高下下行不歇馬力反後帆居前雙江合處波流拓急溜平添水千斛高低橘柚合一村五色石中魚比目風㠶北轉飄雨絲馬上戴笠知多時舵樓半晌酣清夢馬背人愁濕衣重江流曲處城郭開岸上一騎驚先來船頭吹笳船尾鼓濕霧驚開日剛午出思南府遵化門道中一山方如筐一山圓若筥山眞中繩尺雲亦就規矩偉㦲造化功幻此亦奚取奇零不能割嵌以數僧字霞景正欲升炊烟穿縷縷林紅初曙日澗綠昨宵雨誰闢天半扉幽人正軒舉至思南府城東七里校射作三里出郭門七里至角場材官藝士巳先待日乍破曙雲蒼涼忽然對面誰能覷霧捲千人萬人去須臾一騎來破空帽影正罩晴暉紅斗坡直下誇輕舉馬背白雲飛鏤縷山雲高高上接天萬綠倏現屏山前紅林蕭疎噪山鵲屋後人家飛矢著夜起至射堂看殘月樓臺高下樹縱橫環郭峯巒不見城好是四更山月上獨來亭裏聽灘聲觀音閣到來巳覺上青天尚有人耕屋上田老樹綠零前夜雨夕陽黃破半城烟江聲似恨山重叠鄕夢都迷路七千且倚石䦨閒啜茗半空靈果落僧肩小厓關足㡳先驚萬叠山半空樓閣自回環紅雲堆砌不知冷白水繞門無用關日影鏡光偏照燿鳥聲人語合綿蠻差憐送客殷勤甚七里岡前馬未還將至掌溪塘道中厯徧危岡陟淺沙沿江途細欲如麻蠻鄕秋盡饒春氣十月猶黃菜甲花客程難得片時閒穩卧藍輿出險關欲剩心情看江水垂簾行過幾重山將至石阡道中水西林塢好迢遞隔東村偶跨水牛渡閒從石嶠蹲嶺穿疑有路雲定不知門清絶垂綸叟忘機坐竹根重浴石阡溫泉百里裝方缷孤亭馬獨來誰云此冬日聊比坐春臺磴削穿巖竇屏虛障水隈奚童欵扉入一綫夕陽開嘵發路瀨塘離堂尚聞雞暗谷甫見日𪷟𪷟荆棘影披草至絶壁露氣周一山秋衣冷侵骨回瞻驚後隊如蟻穴中出前旌復穿雲石瘦路如髪風蘆聳淸聽時墮隔林橘客倦欲少休茅軒樹頭宇將扺荆蓬塘誠知山百折毎折非意想飛瀑間一層泠泠愈神徃茅齋雲際逗絶壁倚仙掌十月花尚紅松濤落清響山田欣倍入石囷列三兩豈僅人事饒雞豚藉生長兒童乘冬隙倚戸結絲網相約捕渚魚烹鮮佐樽盎過思南塘道中高下田如百衲衣人家初日唘雙扉草中尚有閒胡蝶却恨蘆花作雪飛轉覺空山氣候春冥𪷟花氣拂蕭辰峯根獨石誰來坐時有松枝掃落塵出鎭遠城南三里試射士一半山雲雜水雲到來空裏草香薰環墻人語覺清脆曉日射堂紅一分寥寥飛矢去如星惹得樵蘇跡暫停天半午鷄啼不徹東南樓閣㸑烟青沿流歸復誤西東出郭燈光映水紅不信鳥巢皆戴屋幾家樓貼半空中送姜亷使開陽入都相離眞不忍且盡酒千壺毎歲衝風雪憐君在道途君自言五年除夕皆在途中計應朝北闕且莫憶西湖好趁㠶墻便行過故里無同官凡幾輩接跡戌三邊謂歸王顧三方伯吾子能孤立君恩僅左遷暫還諸季節行贈繞朝鞭他日金臺側相思屢寄牋冒雨訪諸葛洞雨聲無時停天宇忽巳黒輿從空際下㷖路有白石前行未及轉飛瀑巳及額蒼蒼兩層厓萬古積暝色懸流至三仞雲出波下白排空列千窽難作老蛟宅居人掩關坐屋上浪花織傾耳聽此聲天空地疑拆再度響琴峽黃平州度玉虹玉虹峽在黃平州南青天飛下一白龍魚梁江度琴峽十萬絃聲驚拉雜大聲疑宫小聲徵激得山雲去如駛斷厓崚峋石色紫厓上沈沈日光死離波百步飛雨飄隨響曲折經危橋溪風蕭蕭溪月静疑有神魚出波聽黃花坪道中連岡西去路千重竹色蕭蕭間嶺松照路野花然似火出山流水活于龍風棱時掣當風燭雲朶驚飄隔院鐘錯認脫綿時序近豈知寒序廹隆冬再經隴首關朝晴爽氣通胡蝶尚西東錯訝春花放平原野燒紅掩關草復朝香篆生林末孤客心易驚上樓雲欲活雪意試貴山書院諸生題得先字嚴凝樓閣杳難眠是處林巒戞暝烟飛霰乍飄孤嶼外重陰欲釀小寒先光埋高下三更月雲黯西南半壁天不是官齋望偏切欲凴盈尺卜豐年
