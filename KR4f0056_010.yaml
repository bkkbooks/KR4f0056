  text: 卷施閣詩卷第十
  hash: sha256:097c7d6da1a8965283f814b53eeb05f1f6fdb59747a0439864c0d331bf64bce2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0056_SBCK_010-1a}
body:
  text: 陽湖洪亮吉著祕閣研經集辛亥南樓憶舊詩四十首并序夫鳥以高為巢魚以深為穴居魚鳥之中者人也築基九層而上為之樓則與鳥爭高矣濬池十仞而中為之島則與魚競深矣然鳥啁啾而為巢使無矰繳之患則終歲猶是也魚屏營而為穴使非芳餌之誤則畢世無易也人則不然飛狐落雁之嶺八埏之險也鳥所不能飛者人或上之矣奔霆浴日之區九州之浸也魚所不能歷者人或過之矣則夫陟險不巳將迷東西揚帆倏來杳無津涘當此者其亦有故巢之戀在沼之思乎南樓者外王母龔太孺人所居也余以孤童幼蒙鍾愛年未毁齒從母移居姊越十齡弟才匝歲魯國男子方驚毁巢漢陽孤生未歌窮鳥由春徂冬衣無單復之製以夜繼日瓶無逮晨之糧煢煢焉踽踽焉蓋十五年于此焉若夫雨龍竹馬瓦狗泥車探春燕于棟頭捉秋蟲于徑裏岡睹跳而將平井投甎而欲滿臨溪咒鴨涉渚撈蝦既兒戲之無方亦童蒙之求我此一時也隨母梳頭之歲從師識字之辰烏焉混于一篇蚯蚓登于半紙藏書之篋時匿意錢衣帶之旁私携面具同學則謝家阿買送餐則裴氏小奚盻日影之不西怨雞聲之太早此一時也至乃歲值元枵門憐奇窘仲理則厨難耗鼠史雲則釜欲生魚井淘麥屑反避知親徑拾墮薪偏逢長者然而天青入牖水緑周堂秋月塞門春花交砌何嘗不破啼而四顧擁絮以周逰此一時也又或蘇季上書全家盡返桓姫索米半舫爰來謂曙齋舅氏及適楊氏從母中外則雙丁二到不乏奇童弟兄則羯末封胡并饒道蘊虛堂論史鵲亦垂頭側經􅒱詩蟲來嚙踵篙師南巷雅乞書符蠶妾北頭偏多問字此亦一時也授徒北館作贅東堂卜商色養之時賈誼秀才之曰會稽僚壻動色而見嚴生陽元尊章改顔而親劇子鄰有束綯之饋室無戞釡之聲闢竹徑而待賓借柏堂而宴客此又一時也詩曰維桑與梓必恭敬止又況螟蛉果裸之場與松柏蔦蘿之所乎此則明明如月難忘在闥之辰悠悠我思無踰樹𣏌之里遺聞傳于厮養瑣事得于鄰童畦栽赤莧則湔上之蒼頭穴識金鐶則羊家之故媼失簮楚國墮履徐方燕知春社之人犬識衰門之客延陵之劍無封樹之堪懸班惠之書有篇題之可認能無墮傷心之淚鐫思舊之銘乎又況臘頭社尾上已元宵餅值春辰糕名令節楊柳半橋之月芙容北市之燈水增一尺則巳嚙閭門樹密三重則隱開樓扇燭龍之首與鴟尾競高彩鷁之竿與神燈並出販脂鬻粥擊鉢吹簫莫不紛至沓來風馳雨驟此又晏嬰之宅因近市而居奇虞氏之樓以臨街而角勝標孝侯之風土記荆楚之歲時差可連類而書削箋以奏者哉詩四十篇稿成以寄巡檢二兄上舍三兄文學四弟凡為此者亦所云寄魚鳥之思今昔之感也沿溪樓閣枕南頭溪水迢迢自北流怪底近來鄉夢好一旬多半杏花樓載來塵具不盈車孤另偏應託外家絶似幾番霜信後一枝籬落寄生花余家自追賠先曾祖大同城工核減帑項田産悉入官至先君子下世遂無乙椽可居循廊三折入層梯板屋居然判畛畦不向大家厨索米自泥新竈小樓西外王母以南樓西偏一間令太安人率余兄弟及三姊居之七齡入學感孤兒逃孰先教都講嗤燈下國風還課讀始知阿母勝嚴師余七齡附學實君舅氏書孰蒙師為惲牧菴先生外兄肇新則學長也婉轉隨娘識百憂貧家照水亦梳頭不知梁燕緣何事却怪春人懶下樓此言諸姊隨太安人作苦終歲不下樓也三月青黃不接時燕南書札寄歸遲朝來欲糴桃花米巳報租船到水湄外祖母田不滿百食指浩繁每及缺乏時素園舅氏館于京師亦間寄修脯歸供匱乏黃泥墻北揚街塵簫鼓嘈嘈聽未真清曉上書還未半巷頭不放看迎舂夜寒窗隙雨淒淒長短燈檠焰欲迷分半紡絲分半讀與娘同聽五更雞余八九歲時自孰中遣歸每夜執經從太安入紡側讀恆至漏盡一年多半住江村饋歲匆匆入里門不待郡城元日到江船先巳送河豚此謂素園舅氏妻楊孺人江陰楊文定名時猶女也一歲歸寧時多惟蠟臘乃回十齡左右謝家甥孤露偏憐易長成綰得一般雙角髻家家戶戶拜新正侍郎宗派號東莊愛女先教住近坊便了作奴如願婢有人分日饋羹湯此謂適莊氏從母事外王母最孝常分日饋羹西頭阿姊慣句留小極扶梯不上樓約得走橋諸女伴背人月午更梳頭天中節後賽神多十六雲車次第過剛是卷簾迎面看水嬉又報進城河吾鄉雲車相傳隋司徒陳杲仁守城時所創今司徒誕日及賽神皆設之城丙外凡十六坊故數亦十六迎門西去徑欹斜曲曲房廊被柳遮一尺井闌涼沁骨記曾團坐説人家外家門西偏有井最清洌近聞巳湮矣清明過了又端陽母不梳頭針線忙幾日斷餐緣底事疊錢來買束修羊吾鄉從師者饋束修常以清明端午九日及歲除為四節衆裏聰明百不如學將新樣寫神荼比鄰一半迎春帖乞取蕭郎弱腕書歲除前數日臨溪三五少家每將紅箋乞書春帖子久别都應見面生相逢幾遍問年庚早來阿母房前過親切重聞喚小名此指適河橋程氏姊姊為曙齋舅氏次女與余同庚從宦京邸十年歸而問齒長幼故云江鄉豐歲景偏饒親製連環小樣糕一榼牢丸三百顆歲除筵上吃元宵此指適楊氏從母居城東鄉芳茂山下歲除嘗饋外王母糕及粉丸外王母以分給諸孫及余等粉丸俗名元宵走索人教細馬馱十番才了又秧歌臨街樓上懵騰坐要看魚龍徹夜過樓前為縣學場每春日百戲俱集問訊厨娘去不回歸寧百遍使人催五更枕上春波響知是山橋艇子來從母楊自婺矛牙居後隔一二歲始一歸寧外王母必遣人促之方至樓前楊柳最依依樓下人家試夾衣那識清明好時節滿樓胡蝶雜花飛雲溪清明前後風景尤勝尋常不放到門邊生小都憐疾病牽記得草三逢縣考小心囑上渡頭船此指十五歲時初寄籍陽湖應童子試也連㕓北出竈新添疊日齋厨課米鹽買得吕家新宅子小房分住白雲尖曙齋舅氏出後從外祖文元遂徙居白雲尖新裁錦襖束當胸競渡先將逆浪衝日午晏公祠外路暖波初試小青龍吾鄉􅔡渡最盛以余所見不下十餘有金龍小金龍青龍小青龍白龍及五色龍諸目别開池館隔重墻半種芙容半海棠留得一方明月在倩人涼夜捉迷藏此指從舅氏啓宸先生所居在南樓西偏饒有花木余幼時常與中表寅谷定安等嬉戲于此社公生日是來朝巳聽沿門畫鼓􅒱今歲燭龍添九節簇燈還插滿池茭元宵及社日並有龍燈自三節至九節不等其簇燈之佳者俗名滿池茭八字門偏路復義春陰曾不隔窗紗冥𪷟添得墻頭黑知是東鄰皂莢花此指從舅氏秀君先生所居在南樓東偏鄰有皂莢一株覆屋常滿塵上真疑欲汚人尋常衆裏亦嫌身蓬門一例先教鎖明日高齋會六親自移居後外家有大宴集太安人常鑰余兄弟于室中不令出一條幽徑幾家通徑轉偏憐曲似弓擕得𥿄燈何處去石榴廳北捉秋蟲外家東廳側有長巷一條門凡三四從外祖永嘉及從舅氏于璜先生等並宅焉石榴廳即從舅氏居也銀泥槅子粉紅墻蛺蝶逰蜂爾許忙一陳暖風初過處百花齊撲曬衣場南樓後有隙地一㕓為諸宅曬衣之所才過中元又下元賽神簫鼓巷頭喧年來臺閣多新樣都插宫花扮杏園賽神會中每用七八人扛一棹上扮金元院本諸故事名曰臺閣手簡先蒙羣從招郭東明日合登高晚來乳媼床頭説好吃倪家九日糕南樓外臨水有小家住宅三四其一以賣糕為業倪姓即乳母王氏女夫也新來小婢勝樵青識字依稀認一丁乞與百番書𥿄仿韋郎十五擅書名此指素園舅氏自江西罷任回有浙婢名小丁最慧常給事書堂故云一室如瓢枕水隈緑楊影裏小門開𥿄鳶脫手人驚散却值先生曵杖來外家書孰名團瓢書屋昨宵短至飲梅漿功課新添日影長還喜學堂人散早初三新月上紅墻南樓迤東即學宫繚垣槅子通明刷綘紗小庭三面放秋花巳涼天氣清如許約伴今宵守月華庚辰辛巳歲後值中秋日每與外兄弟鴻三定安重光等及外家姊妹于南樓守月華恆至徹曉除夕初開宴喜筵諸孫合隊拜床前有心欲乞奇書讀辭却朝來押歲錢歲除日選青錢結百索賜小兒名押歲錢亦名百索園扉斜對禮門開才著􆇰衫馬巳催惹得比鄰皆注目秀才初謁泮宫來此余初補博士弟千員日也從舅氏園門與學官禮門正對露滴新紅水染藍兩重門裏試單衫薺花撩亂春如海記得年時三月三吾鄉諺云三月三薺菜花兒單布衫只把聰明譽愍孫説將孤露便聲吞紗帷寂莫庭花死垂淚頻過通德門外祖母以乾隆丁亥十月晦日下世不數年樓前杏花亦萎題張同年問陶詩卷同輩二三子詩各有所優或優春夏氣亦或優于秋惟君一卷詩盡把秋氣收讀詩亦不同候有昏與夙或當映踈星或欲秉明燭惟君一卷詩宜剪秋燈讀昨携君詩歸氣候已迫冬翛然一室居四面皆秋蟲又疑秋鳥鳴嘐嘐滿寒空此聲非出砌此聲非出籠有聲亦無聲均出詩卷中秋燈乍滅還乍明時復朗誦時孤行思君此意不可得無乃造物賦爾偏多情燕臺住十旬蜀道遠千里思親兼念友悒悒何能已我欲借春氣生君十指間方君作詩時桃李皆開顔逮余讀詩日花色猶斑斕然後登君堂飮君酒我狂可百樽君捷亦千首謫仙和仲二公皆蜀人故云並庶幾若説今人已無偶附原贈作張問陶翰林昔未遇名高神采王歌聲塞寰瀛筆與嶽瀆抗今春同拜官識面鑾坡上示我紀遊詩雙眸豁層障墨雲騰十指一往但奔放嵩華想嶔崎江湖寫清曠眼前真實語入手見奇創五字作長城騷壇踴名將我生齊楚間望古心無讓衣染泰山雲帆回洞庭浪年來苦飢走轉喜逰蹤暢足迹半人寰舟車隨所向夢中窺海日愁外看雲嶂方域所區分鶯花亦殊狀方知詩律難一得終無當小技具神工乾坤歸醖釀軒然讀大作一片宮音亮萬象羅心胸此才胡可量詩人遇不窮名士語何妄努力頌升平殷勤副時望長至前一夕久坐待張同年不至兼懷里中舊逰拉雜書畢不覺破曉三更正懷人一馬嘶過巷失喜自啓門正與馬鞭撞馬鞭東指客面生孟浪客前還致聲入門無聊出門走更向街西市春酒歸來風葉隨打門打門童驚欲詈人僮癡貪眠客貪起十二曲闌行不巳隨闌一曲酒一杯靜若主客相追陪青天淡淡雲如掃月光畢竟江南好金波樓閣紅闌橋去年此月還此宵相思不獨人如鶴兼有野梅初破蕚梅枝開落未一年轉眼客路成三千人燒銀燭朝天早我典金貂猶醉倒坊南遠客期不來不覺一窗先白曉君不見我居咫尺郊壇中壇外雲氣升如龍更殘烏鵲不敢東天子今夜居齋宫附張問陶臘月十三日與朱習之石竹堂錢質夫飲酒半夜忽有作道士裝者影門掩入視之則洪稚存也相與痛飮達旦明日作詩一首分致四君同博一笑勝侣偶然合何妨一舉杯南鄰朱老聲如靁大呼僮僕無遲回曼卿亦復隱于酒錢郎爭勝惟狂吼閉門歡笑儼一家掃除賸客如揮帚回看好月來窗下更洗清樽同卜夜肴盡將擒寺狗烹壺傾又向鄰僧借客貧歲暮時搔首豈不懷歸愛吾友任他風析響三更密坐談心還執手何處微風入開簾若有人羊裘氊履五柳巾莊嚴妙相如天神大呌取酒來四座皆逡巡疑是唐朝酒人李太白不然定是荷鍤所埋劉伯倫屋漏之神或大笑公等無鑿混沌之七竅樽有餘瀝且澆之乾坤浩浩知為誰吁嗟乎乾坤浩浩知為誰醉中各化飛雲飛十二月初三日雪霽邀同年張問陶顧王霖過飲醉後作墻東半畝園雪積難置足客來門亦鎖護此一庭玉高低枝上白萬條愛惜不遣兒童搖今宵却初三新月出墻腹峩眉山下人聞來訪庭竹掃此枝上雪迸作杯中春泠飲亦可堪胸次饒春溫間中富貴誰能有白玉黃金合成酒屏除童僕不入門行酒却驅坐上賓公榮不飮亦殊苦罰作怪禽筵上舞墻陰一尺掃不開醉便埋此何須回一層銀燭輝一層新月影樹頭屋角看更奇倒射清光百餘頃主人不送客亦行脫略酒後皆呼名來時衣上黃去時衣上碧來乘斜陽去月色君不見人奇馬亦清到骨嚼我海棠枝上雪附同作張問陶臘月初三雪後拉容堂就稚存飲酒醉後酣卧雪中不知何以遂至松筠禪院五更酒醒見案上有朱習之方茶山名刺僮云此二公者昨日戍時過訪坐此室中談笑久之乃厺主人不知也因細詢昨日事僮云主人在雪裏時但聞洪顧二公呼李太白主人在床上時但聞朱方二公呌劉伯倫而巳賓主威儀一笑空酒杯嵌入雪當中大家伏地同牛飮直有無褱巳上風錦衣玉帶雪中眠醉後詩魂欲上天十二萬年無此樂大呼前輩李青蓮何人負我入輕車混把空門當敝廬寄語鄰僧須看樣非仙非佛是真如上帝𫾣門也不開偶然醉死亂書推比鄰二妙真多事悄入逰仙夢裏來張同年將乞假歸蜀醉後作兩生行送之一生居坊南一生住坊北車聲馬聲不得停十里路中常若織我馬見君馬鳴聲一何高君僮與我僮望著手即招我來時多子來少馬繫寺門僮醉倒青天如磨旋不休醉裏有時來打頭心癡直欲走天外下瞰日月方開眸朝沽三升草盈斗吸盡東西兩坊酒朝衣典盡百不憂尚有身上青羔裘一生皇然開笑口那著酒錢街上走一生無聊想更奇酒盡伏舐壚邊泥有時忽下牀有時忽出門人來雪裏衣盡白疑是送酒柴桑人幕天席地原無礙十萬人中兩人醉醉中分手亦不辭淚墮黃公酒壚內君不見長安莫復輕酒人酒人腹裏饒經綸容卿百輩等間事爛醉尚復噓陽春一篇我作臨行曲馬帶離聲僮欲哭從此長安少一生酒星只照南頭屋附同作張問陶讀君兩生行涕笑一時作黑夜關門讀不休打窗奇鬼爭來攫懷詩急走心茫然遠登雲棧如登天人言彼土即吾土藏詩可以經千年我方欲西行一星墮我前戴樽衣甕佩龍勺俗客驚駭疑真仙莫驚鬼奪詩我為公呵護且復立斯須和此好詩去是時下界冬已殘風狂雪虐天漫漫一生牽衣愁欲絶一生和詩嘔出血城南萬柳秃無枝天詔酒星綰離别重讀兩生行如見兩生情一一若吾語大痛難為賡翩然一躍入杯底繞地萬人呼不起生瑜生亮偏同時萬古之名今已矣酒星抱月來擲入兩生杯兩生驚起糟􅏀臺歡呼轟作隆冬雷忽聞門外征馬語兩童泣下紛如雨馬聲高朗童聲俯似訴兩生離别苦一生聞之悲一生聞之喜兩生悲喜人不知天外浮雲地中水君不見開天盤古氏其情最可憐九州莽莽無人煙獨坐獨行一萬年又不見高真之居亦孤寂舉酒招人人不昵九天費盡百神謀僅奪唐朝一長吉兩生把盞同軒眉居然日日相追隨一生偶送一生去臨期何必吞聲悲我馬莫憐君馬獨君僮莫向我童哭雲天萬里好聨吟共把長空當詩屋再送張同年一律更從何處别且復上高樓一世真遊戲三旬偶滯留巳超生死劫難破古今愁何日青天外同君一舉頭附同作張問陶吸盡都城酒萬杯此行原不算空回眼前醉語天收去别後詩情夢補來小住談心孤月滿狂呼拍馬亂山開思君他日書千紙定向峩眉頂上裁小除日仿唐賈島例與張同年問陶祭一歲所作詩並屬王文學澤為作圖各係以詩君詩四百篇我詩六十首君詩苦多我苦少差喜流傳同不朽我年二十登詞場接詠巳有橋西黃仲則晏公祠內祭詩處一屋神鬼皆憎狂生年三十尤奇肆是日孫郎號同志筆壓南山白額愁挺鋒復把生龍試燕秦楚趙逰何壯所不能臻祇天上風月千埸酒萬場醉中歲月偏奔放爾來四十氣已降筆陳敢詡今無雙異才爾復出西蜀百斛龍鼎邀同扛前年同客龜山左我不知君子知我直待蓬山頂上行相知一世方能果我詩與君詩識者不能别雖然我自知與爾陳一一長江一萬里先瀉君門前若論飮水源我較輸君先一年三百日日日有昏曉若量日出時我比君家早君如吸盡江水源使我門外朝夕無奔湍我如繫住西馳日令爾屋頭終古長如漆我放白日西爾蹴江水東高高下下總無極與爾分半填心胸爾筆何處架青城與蛾眉我硯何所支黃山與天台天公夜半笑口開餘子位置綦難哉此時一瓣香裊入九霄碧惹得千家與萬家如椽紅燭都無色君不見黃郎黃郎巳前死不及見君詩百紙孫郎雖狂一字無見爾亦作奇人呼今宵約不來苦説有官事坊西令我走不休欲拉間人作陪祭醉中一客為作圖更遣一客題分書時朱同年文翰適至君不見門前車轍痛掃除分付鬱壘同神荼今夜俗客不許來催租送張同年問陶乞假歸蜀并序乾隆五十六年歲在辛亥二月朔日同歲生張君問陶乞假歸蜀其㕛洪亮吉采玉田之蔬挈山陰之尊送之于國西門曰足下家居遂寧婦留成都鼻子遠宦巳傷親心纍臣贅秦復悲身計然則足下辭金門而南邁並赤日以西馳勞乎此行蓋非能巳仍復迂道崈洛戒途雍梁爰謀裹糧並訪親舊西嶽道士留之而不能東方細君隨之而共反百武之外弱弟出迎一門之中密親咸萃解笏金而貯案被采服以娛親雖嚴生告歸相如乘傳不是過也又足下宰相四世孫也葛侯冡畔八百之株尚存召公祠旁一隅之宅能割溪茶可采則病婦㩦筐山筍欲抽則衰年補徑秋原半頃稅給于王官春韭一畦食供于家老而且煮米作舂麥為䄟以􅓵餘人或給耕者甫生之犢等愛于孩提頻來之燕視同于親故則亦物我均適心形兩忘者焉又況蠶經禽演不乏竒書蛤港裸田别開精舍臘頭宴客社尾迎神朝衫忽著則鄰里詫觀縣令偶來則牛羊驚竄南軒既闢北牖時開果落枕前花開鏡裏一林百樹招鵲辭雅雙澗疊波留魴放鱧若是者采其吉語娛我眉梨懲彼殺機戒茲子弟播三田之種閣上巡觀賡七月之章房中屬和未嘗不集吉門之慶極幽居之致焉定省之暇時而出逰則峩眉當其前青城出其後大江流其左􅓵水徑其西解角之鹿可施鞍橋浮鼻之牛以當舟楫餐雲欲曙之嶺采藥斜陽之洲團蕉數尺非佞佛而可趺危梯百層不學仙而亦往間防疾厄時覽方書偶有篇題緘之經藏此則金門大隱不止平原玉笥真人復來宏景若夫㒒與足下之交道又可言焉僕處鴂音之里君居吠日之方蛩距之合無由牛馬之風不及乃闕前一覿忽若素知飲中百篇愛同前哲顧性嗤釋氏敢侈前因亦鄙道流詎云緣法靜言思之逮即吾儒之所謂如舊相識乎夫卅年成世足下既近之僕則又過半矣俯仰一身離合萬里常恐百年交道不盡然精氣不散當成神明風車電帷來往不絶則僕與足下又何慮哉又何慮哉自此之别一日之內僕眺朝陽君眺夕采一江之流君飲水源我飲波末則亦何嘗有須臾之間遠近之殊哉保嗇神理時時讀書簡牘不詳悉之于夢亮吉頓首頓首城南初日照高樓樓下勞勞僕馬愁此日别君須握手古人見爾尚低頭交同北郭推三世學許東方記十洲竟欲上天留不住夢魂隨過古安州附留别詩張問陶離筵相對别情多曾與羣仙會大羅半世心交偏得爾十年詞筆偶登科堅持壁壘爭詩律亂擲尊罍閧酒魔忽送孤鴻天際去月明千里意如何年年奔走逐風塵又對春明折柳人藎篋隨身千管秃鶉衣衝雪一童貧山中酒熟還家好雲外心間得句真肯學長卿西去日高車駟馬嚇鄉鄰一椽破屋寄三川纍我西行欲上天十萬峯巒生足下尋常雲月在眉前花時泥飲從田父雪夜狂歌理釣船只恐重來忘禮數倒持手版謁同年小碾輕車出鳯城東風暖到子規聲一官偶得常疑夢萬里能歸豈好名細詠白華真樂事便言晝錦亦人情回鞭忽下憐才淚八百孤寒羡此行袁大令枚病中以自挽詩索和率賦一篇寄呈我生為鮮民逮養苦未果孤真同孟陋名合作楊軻雖然檢此身欲死尚不可唯公丈人行早結文字緣事勳與文章一一喜可傳即論委蛻期事亦須推袁幸公未死時我欲代公述二十厲志初七十著書畢若論文福兼公可死者一早年預清班繼復作循吏風謡至今留俎豆倘可兾若論位望亨公可死者二君卿取十妻諸葛得二男身如柏枝強境若蔗尾甘若論居處優公可死者三十洲縱未遵五嶽巳畢至黃山武夷間垂老遊復肆若論山水緣公可死者四拾遺踣耒陽供奉隕江滸昌黎不攝生和仲備疾苦若論年命豐公可死者五中書草四考方鎮四十年汾陽處危疑長沙疾綿延身命匪不達得不償失焉何如公致身半世卧巖谷入門與出門偃仰無不足若論心志舒可死不止六世凡號為儒家置公一編上者師公文次學公詩篇下逮決科䇿誦之口流涎公名聾瞽知公貌僮媼識或疑天上人或引作前哲寧知公尚在年僅七十七如此復不死寧能望神仙勢必神采離形作塊壘牽與其卧閨闈曷若墟塜間顔公自為銘陶令自作詩頗怪同輩中一一不和之逮公始創例遍索執紼詞我謂果愛公生并致脯奠及公能飮食一切口嘗遍庖人出新意尚可令公羡又公在地上説鬼不肯休恐歸地下時萬鬼聲啾啾蓄憾既巳深瓦礫伺間投公其見夢余聊可助一臂公雖塊然亡我尚有生氣鬼車與鬼馬辟易一萬騎公今雖自挽我更欲速公公如讀之竟大笑聲隆隆當嘉此狂生交道有始終袁大令以辛亥除日復作告存詩七首索和戲加二絶奉答赴書昨日過江東消息傳來總不同我信戴逵無死法越中名士勝吳中時誤傳錢少宗伯載赴書至京儻來勳業那堪論絲竹東山道自尊却見白雞原不礙故應久占謝公墩巳扺紅塵一百齡名山五十載韜形如何更展人間限天上多應妒歲星告存才接七篇詩此語賓朋喜可知誰識仙山樓閣裏有人望眼欲穿時準擬銘旌已欲題無端白日忽回西生天成佛都應後莫哂精廬孟會稽耆舊居然壓輩羣老來心力著書勤十分彭祖當時壽却愧公還未一分人嫌不及此偏過恐是神仙受折磨謫籍至今填未滿周妻何肉纍公多名山咫尺好攀躋趁此春江緑欲迷畢竟太真年命脆請公來日試然犀脫手新詩衆競鈔豐干莫怪舌偏饒兩篇多作非無意先代巫咸賦九招里中十二月詞辛亥小除夕避債沙河門側因憶里中舊逰及諸勝事爰成十二月詞十二首西瀛里畔人聲沸翠色染天紅蓋地排門剝粉書豐年屋後水扉燈影連橋上人橋下艇不斷櫓聲兼帽影東迎𨝍水西接城夾河祇聞爆竹聲料量香燭南街口共向喜神方上走元宵節近當出逰却喜客歲晴中秋吾鄉西瀛里中為百貨叢集之所臨河一帶半皆染坊屋上飛竿插天大率皆嚗布廊也除夕爆竹聲尤盛詰朝紅緑紙積地常至寸許又里諺云中秋雨打上元燈若隔歲中秋晴則元夕月必大好以此為驗十常不失一右正月神祠昨日鐙花笑屈指社公生日到龍鐙九節茭滿池就近還參各神廟後街絲管聲沸天鐙影直接斜橋邊衣香隊裏春雲熱謁廟仍須夜深出鐙光疏處穿市過社公不拜拜社婆延回只説歸塗枉朱雀橋邊水聲響笑指鄰家姊姝言百花生日還相訪里申近年尤重社公生日鐙火較元宵更盛城內外社公祠數十區惟北後街及斜橋二處最修整至期絲竹聲每徹夜不絶傾城士女皆于更定後出逰朱雀橋在玉梅橋東過橋即楊氏園亭也右二月二月二過三月三薺花黃遍穿單衫單衫何處尋春好先踏艤舟亭畔草紅梅閣接迎春堂一路草香花亦香紅墻缺處危樓􅊳正好滿塘春水活賣花擔子不得停昨日寒食今清明花間古廟門開早一片香煙接花裊傾城人出不遽歸緩步却從城北回君不見興闌欲訪間桃李却惜山莊前已圯里諺云三月三薺菜花兒單布衫艤舟亭紅梅閣迎春堂皆在城東距城北三里有青山莊為前明吳氏别墅林壑之勝甲于郡中雍正中張布政適居之後籍入官為里中富民所有乾隆三十一二年其家中落遂拆以償逋今久鞠為茂草矣右三月玫瑰花香一城懶數起數眠天不晚城彎北去覔午涼柳線亂將行客綰鰣魚上市值萬錢山筍轉嫩櫻桃鮮微泉閣枕緩雲閣商略欲啓荼蘼筵亷纎梅雨才經夕巳報江波入三尺趙家樓上望欲驚畫舫却與樓窗平出東門至天寧寺後有曲巷一條名城彎夏中納涼所也微泉閣在縣學西侍御史董玉虬别業今歸趙氏緩雲閣在雲渡東舊屬呂氏今圯右四月柁工昨日支關鈔迓得龍頭出神廟龍身沉處奠酒肴頃刻龍尾波心搖六龍城古龍舟七城北東西按方色一層彩襭鐙一層水面徑看高百尺晏公祠外臨河滸朔日先聞賽神鼓三元高閣颭錦標聨尾北出迎春橋飛竿快漿都成隊船上樓中卷簾對打招要取波面寬一舸前呼百船退雲溪半里樓接天一河鐙光人不眠龍頭才過看龍尾四面十番絃索起洞庭楊梅甜不酸更有盧橘堆成盤舵樓吳姫約早餐港口昨到江魚船每嵗競渡時一龍舟例支滸墅關稅銀十餘兩常州城有六門舊號六龍城余所見龍舟有大小青大小白及烏龍金龍五色龍凡七午節後篙工取大石沉舟身于河底而以龍頭藏廟中至用時乃迎取焉晏公祠三元閣皆在雲溪右五月萬花開後園林老日永如年客來少銀衫斗笠思出逰城北水上多危樓窗櫺豁處天光現十頃荷香撲人面東西兩水夾寺門水緑欲把門扉吞紅闌幾曲生林杪屋古似巢僧若鳥間僧喚客客不應小艇出市前溪菱晚涼莫向間街走九柏山房鬥新酒城北放生菴內外有池寬至十數頃荷花甚盛菴南即元處士謝應芳祠祠後有樓甚涼敞又西行數十步即楊進士倫九柏山房也右六月七月七日侵曉妝牛郎廟中燒股香回塗更把裙衫整織女橋邊鑒春影彎彎新月看至圓結伴好上臨河船東塘北岸人爭覷倚艇低頭放鐙去今年鐙樣人更誇飄出萬朵紅荷花年年歲歲祈無疾自信今宵鬼緣結君不見東家女兒結束工染得指甲如花紅斜簮茉莉作幡勝鬢影過處饒香風又不見西家女兒還未嫁閉戶挑鐙坐深夜神鐙社火總不看獨望銀河占米價北門外十里有牛郎廟旁一木橋俗名為織女橋中元日土俗普放河鐙又多市楮幣于深夜燒之名結鬼緣七夕前後天河隱不見者常十數日吳俗以日數之多寡驗米價貴賤多不爽右七月十三月如元宵十四十五光尤饒蒹葭莊來鶴莊更有蘆墅菱堪嘗歸來樓上開扉望正見光從海門上江波濯月月更涼千戶萬戶堆新霜層樓影向三更直高下稜稜瓦簷濕更殘女伴出走橋行過八字剛三條頳顔難却鄰姬請更走烏衣及紅杏莊家燈謎猜不完曲巷更有花鐙看打十番跳百索攔路復看飛鼠落兜鞋才了復墮叉南街怯行行北街君不見團團明月方迎面一入采棚天不見蒹葭來鶴二莊桂花最盛蘆墅在北門外産菱尢佳八字橋在城東與紅橋及元豐橋斜對烏衣紅杏二橋名在𨝍溪上近年中秋鐙謎盛行巳酉庚戌莊公子逵吉在里門延名士十數人專司其事以是所製尢膾炙人口中秋前二日恭值萬壽聖節居民皆結采為棚張鐙至五畫夜大街及西瀛里尤盛右八月中秋説餅辰重九題糕節汪三湯餅倪婆糕却與龔丸作三絶出門衣袂多北風偏向南郭聽齋鐘再轉僻寺來城東驚聞天半人聲雜一郡人登七層塔攔門一客索一錢鼓勢直上浮屠巔窗櫺八扇迷方向咳吐皆飛鳥巢上前行如挽後若推足底復有人頭來飛梯盡處波如鏡坐久蒲團始神定間尋菊種來僧房更借苦茗澆詩腸歸途忽見紅鐙簇禮斗筵前夜焚籙雲溪倪婆製糕葛仙橋汪三製餅皆舊有名近厨人龔玉魁製粉丸亦精清涼寺在南郭外九月中香會頗盛自城南至東郭必出崇慶寺前太平寺在東郭有塔七層為九日登高處里中人常以九月禮斗城東毗即室塔隱山房皆禮斗壇右九月一花一草都無色黃葉砌邊堆數尺下元會好強出逰乍冷客亦披輕裘蕭辰欲借笙歌暖排得雲車大街滿迎神曲好還送神香篆影裏回陽春馬山紫蟹螯鸛蕩青魚尾屈指消寒會當起舍南竹屋梅乍開掃室便巳安尊罍趙君飽噉吳君飮更有蔣君工食品潁州酒政推嚴明不到四更杯不停君不見坐中有客歸何遽欲附租船上墳去里中賽神以清明中元下元三節屆期城隍神皆詣北壇行禮出入儀從甚盛兼設雲車臺閣故事傾城士女咸設幕觀焉蟹産太湖者佳鸛蕩在西門外五里産魚最多里中諸老輩趙丈繩男食量兼人吳上舍祖健稱豪飲蔣太守熊昌酒政尢嚴舍南竹屋則余侍御舅氏書舍也食品每出新意他人倣之皆不及又吾鄉展墓以清明及十月右十月租船歸日盈筐載精穀上倉粗入碓嚴寒料理及薺鹽買得城南幾挑菜花豬成隊羊一羣冬至日前商祀神蠟筵開處賓朋滿紅燭壓簾行酒緩清歌小部方上場門外嫁女笙簫忙君不見東鄰贅壻仍開宴自説豐年百般便連天爆竹西半城一月不停歌吹聲樂工醺醺里巫飽却詡今年日辰好吳俗于冬日預蓄菜數百斤以鹽漬之可經久不壞里中富人于冬至後報賽名曰蠟筵是日必遍請親朋又里俗婚嫁事必擇冬季若遇豐歲則更多亦昔人霜降逆女氷判而止之遺意也右十一月桃仁滿把糖盈掬臘八家家煮膏粥袈裟三百紅滿街穿遍一城云化齋闌干影裏飛花爆相約草三先祀竈神祇五路土五方屋後有井堂前倉小兒新年上學堂牲醴并欲祠文昌年殘百物先儲蓄家宴賓筵喜俱足君不見書生生計絶可憐研斷凍墨書春聨臘月八日以百果煮粥并饋親鄰城東天寧寺僧徒常三百餘人臘月初則空寺盡出名化臘八米祀竈舊以草四日今則家計稍裕者皆移草三土俗以五路神為行人歲盡則祀五方土士人則加祀文昌朱衣歲除寒士之最窘者恆設筆硯于通衢代寫春聨可日得數百錢右十二月
